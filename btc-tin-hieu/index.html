<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BTC Tín Hiệu</title>
<meta name="theme-color" content="#f7931a" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root{
    --bg:#0b0e14; --panel:#141a26; --panel2:#1b2333; --line:#26304a;
    --text:#e7ecf5; --muted:#94a0b8; --orange:#f7931a;
    --green:#2ec77a; --yellow:#f2c14e; --red:#ef5350; --blue:#5b9dff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 48px}
  header{display:flex;align-items:center;gap:10px;margin:6px 0 4px}
  header .logo{width:34px;height:34px;border-radius:9px;background:var(--orange);
    display:flex;align-items:center;justify-content:center;color:#0b0e14;font-weight:800;font-size:20px}
  header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12.5px;margin:2px 0 16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:14px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
    margin:0 0 10px;font-weight:700}
  /* Đèn tổng */
  .meter{text-align:center;padding:22px 16px}
  .lamp{width:96px;height:96px;border-radius:50%;margin:0 auto 12px;position:relative;
    display:flex;align-items:center;justify-content:center;font-size:38px;
    box-shadow:0 0 0 6px rgba(255,255,255,.04)}
  .lamp.green{background:radial-gradient(circle at 35% 30%,#5fe6a0,#1e9c5c);box-shadow:0 0 34px rgba(46,199,122,.5),0 0 0 6px rgba(46,199,122,.12)}
  .lamp.yellow{background:radial-gradient(circle at 35% 30%,#ffdd85,#d9a021);box-shadow:0 0 34px rgba(242,193,78,.5),0 0 0 6px rgba(242,193,78,.12)}
  .lamp.red{background:radial-gradient(circle at 35% 30%,#ff8a86,#c8302c);box-shadow:0 0 34px rgba(239,83,80,.5),0 0 0 6px rgba(239,83,80,.12)}
  .lamp.gray{background:radial-gradient(circle at 35% 30%,#4a556e,#2b3346)}
  .meter .level{font-size:22px;font-weight:800;margin:2px 0 4px}
  .meter .guide{color:var(--muted);font-size:14px;max-width:440px;margin:0 auto}
  .scorebar{height:8px;border-radius:6px;background:var(--panel2);margin:16px auto 0;max-width:320px;overflow:hidden;display:flex}
  .scorebar > i{display:block;height:100%}
  /* Giá */
  .price-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .price{font-size:30px;font-weight:800;letter-spacing:.3px}
  .chg{font-size:14px;font-weight:700}
  .up{color:var(--green)} .down{color:var(--red)}
  .emagrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .ema{background:var(--panel2);border-radius:11px;padding:10px 12px}
  .ema .k{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .ema .v{font-size:16px;font-weight:700;margin-top:2px}
  .ema .rel{font-size:11.5px;margin-top:1px;font-weight:600}
  .trendtag{display:inline-block;margin-top:14px;padding:5px 11px;border-radius:20px;font-size:12.5px;font-weight:700}
  .trendtag.below{background:rgba(239,83,80,.15);color:#ff9a97}
  .trendtag.above{background:rgba(46,199,122,.15);color:#7fe6ab}
  .trendtag.mixed{background:rgba(242,193,78,.15);color:#ffd97a}
  svg.spark{width:100%;height:56px;margin-top:14px;display:block}
  /* Fed */
  .fed-days{font-size:30px;font-weight:800;color:var(--blue)}
  .fed-days small{font-size:14px;color:var(--muted);font-weight:600}
  /* Công tắc */
  .switch-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .switch{position:relative;width:50px;height:29px;flex:0 0 auto}
  .switch input{opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .slider{position:absolute;inset:0;background:var(--panel2);border:1px solid var(--line);
    border-radius:20px;transition:.2s;pointer-events:none}
  .slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:2.5px;
    background:#8a94ab;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:rgba(239,83,80,.35);border-color:var(--red)}
  .switch input:checked + .slider:before{transform:translateX(21px);background:var(--red)}
  textarea{width:100%;margin-top:10px;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);border-radius:10px;padding:9px 11px;font:inherit;font-size:13px;resize:vertical;min-height:38px}
  textarea::placeholder{color:#6b768f}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  /* Danh sách tín hiệu */
  .factor{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
  .factor:first-child{border-top:0}
  .factor .dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:0 0 auto}
  .factor .ftext .fl{font-weight:700;font-size:14px}
  .factor .ftext .fd{color:var(--muted);font-size:12.5px}
  .factor .fw{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap;align-self:center}
  .btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .btn.on{background:rgba(247,147,26,.16);border-color:var(--orange);color:#ffc06b}
  .disclaimer{font-size:11.5px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.6}
  .updated{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px}
  .err{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.4);border-radius:10px;
    padding:9px 11px;font-size:12.5px;color:#ff9a97;margin-bottom:12px}
  .skel{color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const LS_KEY = 'btc-tin-hieu:v1';
const CG_CHART = 'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=365&interval=daily';

/* ---------- helpers ---------- */
function loadState(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }catch(e){ return {}; }
}
function saveState(s){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(s)); }catch(e){}
}
function fmtUSD(n){
  if(n==null || isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString('en-US');
}
function computeEMA(prices, period){
  if(!prices || prices.length < period) return null;
  const k = 2/(period+1);
  let ema = prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<prices.length;i++) ema = prices[i]*k + ema*(1-k);
  return ema;
}
function trendOf(price, e50, e200){
  if(price==null || e50==null || e200==null) return null;
  if(price > e50 && price > e200) return 'above_both';
  if(price < e50 && price < e200) return 'below_both';
  return 'mixed';
}
function daysToNextFOMC(meetings){
  if(!meetings || !meetings.length) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  let best = null;
  for(const m of meetings){
    const d = new Date(m.date+'T00:00:00');
    const diff = Math.round((d - today)/86400000);
    if(diff >= 0 && (best==null || diff < best.days)) best = {days:diff, meeting:m};
  }
  return best;
}

/* ---------- tính điểm thận trọng ---------- */
function computeScore(trend, fomc, etf, mstr){
  let score = 0; const factors = [];
  if(trend === 'below_both'){
    score += 2;
    factors.push({w:2,c:'red',l:'Giá dưới cả EMA50 & EMA200',d:'Xu hướng ngắn–trung hạn đang yếu (đà giảm chưa đảo chiều).'});
  } else if(trend === 'mixed'){
    score += 1;
    factors.push({w:1,c:'yellow',l:'Giá nằm giữa EMA50 và EMA200',d:'Xu hướng chưa rõ ràng, đang giằng co.'});
  } else if(trend === 'above_both'){
    factors.push({w:0,c:'green',l:'Giá trên cả EMA50 & EMA200',d:'Cấu trúc xu hướng đang tích cực.'});
  }
  if(fomc){
    if(fomc.days <= 3){
      score += 2;
      factors.push({w:2,c:'red',l:'Sát cuộc họp Fed (còn '+fomc.days+' ngày)',d:'Quanh ngày Fed công bố, giá dễ chao đảo mạnh — cả hai chiều.'});
    } else if(fomc.days <= 7){
      score += 1;
      factors.push({w:1,c:'yellow',l:'Gần cuộc họp Fed (còn '+fomc.days+' ngày)',d:'Bắt đầu vào vùng nhạy cảm trước quyết định lãi suất.'});
    }
  }
  if(etf){
    score += 1;
    factors.push({w:1,c:'red',l:'Dòng ETF đang rút ra',d:'Tiền quỹ lớn đang bán/đứng ngoài — thiếu lực mua đỡ giá. (bạn tự bật)'});
  }
  if(mstr){
    score += 1;
    factors.push({w:1,c:'red',l:'MicroStrategy vừa bán lớn',d:'Tay chơi hay gom mua bất ngờ bán ra — tín hiệu bất thường. (bạn tự bật)'});
  }
  let level, color, guide;
  if(score <= 1){
    level='Thoáng'; color='green';
    guide='Ít tín hiệu cản trở. Môi trường tương đối bình thường — vẫn nên mua chia nhỏ theo kế hoạch, đừng dồn một lần.';
  } else if(score <= 3){
    level='Cần chú ý'; color='yellow';
    guide='Có vài tín hiệu thận trọng. Cân nhắc chia nhỏ lệnh mua, giữ một phần tiền mặt dự phòng, đừng vội.';
  } else {
    level='Rất thận trọng'; color='red';
    guide='Nhiều tín hiệu cùng xuất hiện. Ưu tiên chia nhỏ, không dồn tiền, chờ thị trường rõ ràng hơn trước khi mua mạnh.';
  }
  return { score, factors, level, color, guide };
}

/* ---------- sparkline ---------- */
function Spark({data}){
  if(!data || data.length < 2) return null;
  const w=600, h=56, pad=3;
  const min=Math.min(...data), max=Math.max(...data), rng=(max-min)||1;
  const step=(w-pad*2)/(data.length-1);
  const pts=data.map((v,i)=>[pad+i*step, h-pad-((v-min)/rng)*(h-pad*2)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const up = data[data.length-1] >= data[0];
  const col = up ? 'var(--green)' : 'var(--red)';
  return (
    <svg className="spark" viewBox={'0 0 '+w+' '+h} preserveAspectRatio="none">
      <path d={d} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

/* ---------- app ---------- */
function App(){
  const init = loadState();
  const [etf, setEtf] = useState(!!init.etfOutflow);
  const [mstr, setMstr] = useState(!!init.mstrSelling);
  const [etfNote, setEtfNote] = useState(init.etfNote||'');
  const [mstrNote, setMstrNote] = useState(init.mstrNote||'');
  const [notify, setNotify] = useState(!!init.notify);

  const [data, setData] = useState(null);   // {price,e50,e200,history,live}
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [fomc, setFomc] = useState(null);
  const [updatedAt, setUpdatedAt] = useState(null);

  // lưu state người dùng
  useEffect(()=>{ saveState({etfOutflow:etf,mstrSelling:mstr,etfNote,mstrNote,notify,
    lastNotifiedDate:init.lastNotifiedDate||''}); },[etf,mstr,etfNote,mstrNote,notify]);

  // nạp lịch FOMC
  useEffect(()=>{
    fetch('./data/fomc.json').then(r=>r.json())
      .then(j=>setFomc(daysToNextFOMC(j.meetings)))
      .catch(()=>setFomc(null));
  },[]);

  // nạp giá: ưu tiên CoinGecko live, lỗi thì fallback data/btc.json
  useEffect(()=>{
    let done=false;
    async function run(){
      try{
        const r = await fetch(CG_CHART);
        if(!r.ok) throw new Error('CoinGecko '+r.status);
        const j = await r.json();
        const prices = (j.prices||[]).map(p=>p[1]).filter(v=>typeof v==='number');
        if(prices.length < 200) throw new Error('thiếu dữ liệu lịch sử');
        const price = prices[prices.length-1];
        const e50 = computeEMA(prices,50), e200 = computeEMA(prices,200);
        const prev = prices[prices.length-2];
        if(!done){
          setData({price,e50,e200,prev,history:prices.slice(-90),live:true});
          setUpdatedAt(new Date());
          setLoading(false);
        }
        return;
      }catch(e){
        // fallback file tĩnh
        try{
          const r2 = await fetch('./data/btc.json');
          const j2 = await r2.json();
          if(j2 && j2.price!=null && !done){
            setData({price:j2.price,e50:j2.ema50,e200:j2.ema200,prev:null,
              history:(j2.history||[]).map(h=>h.price),live:false});
            setUpdatedAt(j2.generatedAt?new Date(j2.generatedAt):null);
            setErr('Không lấy được giá trực tiếp — đang dùng dữ liệu dự phòng (cập nhật hằng ngày).');
            setLoading(false); return;
          }
        }catch(e2){}
        if(!done){
          setErr('Chưa lấy được dữ liệu giá BTC. Kiểm tra kết nối rồi thử lại.');
          setLoading(false);
        }
      }
    }
    run();
    return ()=>{done=true;};
  },[]);

  const trend = data ? trendOf(data.price, data.e50, data.e200) : null;
  const result = useMemo(()=>computeScore(trend, fomc, etf, mstr),[trend,fomc,etf,mstr]);

  // thông báo khi mở app (giới hạn: chỉ khi app đang mở; 1 lần/ngày)
  useEffect(()=>{
    if(!notify || loading || !data) return;
    if(!('Notification' in window) || Notification.permission!=='granted') return;
    const today = new Date().toISOString().slice(0,10);
    const st = loadState();
    if(st.lastNotifiedDate === today) return;
    const hot = result.color==='red' || (fomc && fomc.days<=2);
    if(hot){
      try{
        new Notification('BTC Tín Hiệu — '+result.level, {
          body: result.guide, icon:'icon.svg'
        });
        saveState({...st, lastNotifiedDate:today});
      }catch(e){}
    }
  },[notify,loading,data,result,fomc]);

  const toggleNotify = useCallback(async ()=>{
    if(notify){ setNotify(false); return; }
    if(!('Notification' in window)){ alert('Trình duyệt không hỗ trợ thông báo.'); return; }
    let p = Notification.permission;
    if(p!=='granted') p = await Notification.requestPermission();
    if(p==='granted') setNotify(true);
    else alert('Bạn chưa cấp quyền thông báo.');
  },[notify]);

  const chg = data && data.prev ? (data.price-data.prev)/data.prev*100 : null;
  const relTag = (v,e)=> e==null||v==null ? '' : (v>=e ? 'up' : 'down');
  const relTxt = (v,e)=> e==null||v==null ? '' : (v>=e ? '▲ trên' : '▼ dưới');
  const barColors = {red:'var(--red)',yellow:'var(--yellow)',green:'var(--green)'};

  return (
    <div className="wrap">
      <header>
        <div className="logo">₿</div>
        <h1>BTC Tín Hiệu</h1>
      </header>
      <div className="sub">Bảng tín hiệu thận trọng — trợ lý ra quyết định mua từ từ, không phải lời khuyên đầu tư.</div>

      {err && <div className="err">{err}</div>}

      {/* ĐÈN TỔNG */}
      <div className="card meter">
        <div className={'lamp '+(loading?'gray':result.color)}>
          {loading?'…':(result.color==='green'?'🟢':result.color==='yellow'?'🟡':'🔴')}
        </div>
        <div className="level">{loading?'Đang tính…':('Mức thận trọng: '+result.level)}</div>
        <div className="guide">{loading?'Đang lấy dữ liệu thị trường.':result.guide}</div>
        {!loading &&
          <div className="scorebar">
            <i style={{width:Math.min(result.score,6)/6*100+'%',background:barColors[result.color]}}></i>
          </div>}
      </div>

      {/* GIÁ + EMA */}
      <div className="card">
        <h2>Giá BTC &amp; xu hướng</h2>
        {loading && <div className="skel">Đang tải giá…</div>}
        {!loading && data &&
          <div>
            <div className="price-row">
              <span className="price">{fmtUSD(data.price)}</span>
              {chg!=null &&
                <span className={'chg '+(chg>=0?'up':'down')}>
                  {(chg>=0?'▲ +':'▼ ')+chg.toFixed(2)}% <span style={{color:'var(--muted)',fontWeight:400}}>(24h)</span>
                </span>}
            </div>
            <Spark data={data.history}/>
            <div className="emagrid">
              <div className="ema">
                <div className="k">TB 50 ngày (EMA50)</div>
                <div className="v">{fmtUSD(data.e50)}</div>
                <div className={'rel '+relTag(data.price,data.e50)}>{relTxt(data.price,data.e50)} giá hiện tại</div>
              </div>
              <div className="ema">
                <div className="k">TB 200 ngày (EMA200)</div>
                <div className="v">{fmtUSD(data.e200)}</div>
                <div className={'rel '+relTag(data.price,data.e200)}>{relTxt(data.price,data.e200)} giá hiện tại</div>
              </div>
            </div>
            {trend &&
              <span className={'trendtag '+(trend==='below_both'?'below':trend==='above_both'?'above':'mixed')}>
                {trend==='below_both'?'Dưới cả 2 đường TB → xu hướng yếu'
                  :trend==='above_both'?'Trên cả 2 đường TB → xu hướng tích cực'
                  :'Nằm giữa 2 đường TB → giằng co'}
              </span>}
          </div>}
      </div>

      {/* FED */}
      <div className="card">
        <h2>Đếm ngược cuộc họp Fed (FOMC)</h2>
        {fomc ?
          <div>
            <div className="fed-days">{fomc.days} <small>ngày nữa</small></div>
            <div className="hint">{fomc.meeting.label} — ngày {fomc.meeting.date.split('-').reverse().join('/')}. Quanh ngày này giá thường biến động mạnh, khó đoán hướng.</div>
          </div>
          : <div className="skel">Chưa có lịch họp sắp tới trong dữ liệu.</div>}
      </div>

      {/* ETF */}
      <div className="card">
        <h2>Dòng tiền ETF</h2>
        <div className="switch-row">
          <div><b>ETF đang rút ra?</b><div className="hint">Bật khi bạn đọc tin các quỹ ETF bán ròng nhiều phiên liền.</div></div>
          <label className="switch"><input type="checkbox" checked={etf} onChange={e=>setEtf(e.target.checked)}/><span className="slider"></span></label>
        </div>
        <textarea placeholder="Ghi chú (vd: rút ròng 3 phiên liền, ~-500 triệu $)…" value={etfNote} onChange={e=>setEtfNote(e.target.value)}/>
      </div>

      {/* MSTR */}
      <div className="card">
        <h2>MicroStrategy (Strategy)</h2>
        <div className="switch-row">
          <div><b>Vừa bán lớn / bất thường?</b><div className="hint">Bật khi có tin họ bán ra lượng BTC đáng kể (họ vốn hầu như chỉ mua).</div></div>
          <label className="switch"><input type="checkbox" checked={mstr} onChange={e=>setMstr(e.target.checked)}/><span className="slider"></span></label>
        </div>
        <textarea placeholder="Ghi chú (vd: bán ~216 triệu $ — cần xác minh nguồn)…" value={mstrNote} onChange={e=>setMstrNote(e.target.value)}/>
      </div>

      {/* PHÂN TÍCH TÍN HIỆU */}
      <div className="card">
        <h2>Các tín hiệu đang tính ({result.score} điểm thận trọng)</h2>
        {result.factors.length===0 && <div className="skel">Chưa có tín hiệu thận trọng nào nổi bật.</div>}
        {result.factors.map((f,i)=>(
          <div className="factor" key={i}>
            <span className="dot" style={{background:f.c==='red'?'var(--red)':f.c==='yellow'?'var(--yellow)':'var(--green)'}}></span>
            <div className="ftext"><div className="fl">{f.l}</div><div className="fd">{f.d}</div></div>
            <div className="fw">{f.w>0?('+'+f.w):'0'}</div>
          </div>
        ))}
      </div>

      {/* THÔNG BÁO */}
      <div className="card">
        <h2>Nhắc nhở</h2>
        <button className={'btn'+(notify?' on':'')} onClick={toggleNotify}>
          {notify?'🔔 Đang bật nhắc — bấm để tắt':'🔕 Bật nhắc khi thị trường thận trọng'}
        </button>
        <div className="hint">Khi mở app mà mức là 🔴 hoặc sát ngày Fed (≤2 ngày), app sẽ nhắc 1 lần/ngày. (Giới hạn: chỉ nhắc khi bạn mở app — trình duyệt không cho app tĩnh tự chạy ngầm khi đóng hẳn.)</div>
      </div>

      {updatedAt &&
        <div className="updated">
          Dữ liệu giá: {data && data.live?'trực tiếp (CoinGecko)':'dự phòng'} · cập nhật {updatedAt.toLocaleString('vi-VN')}
        </div>}
      <div className="disclaimer">
        ⚠️ Đây là công cụ tổng hợp tín hiệu để tham khảo, <b>không phải lời khuyên đầu tư</b>.
        Không tín hiệu nào đảm bảo giá sẽ lên hay xuống. Tự chịu trách nhiệm với quyết định của mình,
        và chỉ dùng tiền bạn sẵn sàng chấp nhận rủi ro.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
