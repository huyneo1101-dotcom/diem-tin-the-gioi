name: Sync reader preferences
# Keo tong hop 👍/👎 (view cong khai vote_stats) tu Supabase ve repo => preferences.json.
# Chay tren may GitHub (khong bi Cloudflare/proxy chan nhu moi truong quet), commit vao main
# de session quet doc file LOCAL (luon truy cap duoc, khong phu thuoc mang ngoai).
on:
  schedule:
    - cron: '0 11 * * *'   # 18:00 gio VN moi ngay (truoc gio quet 19-21h)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: sync-preferences
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch vote_stats from Supabase
        env:
          # Publishable key la key CONG KHAI (da co trong index.html) — view vote_stats chi tra
          # so dem tong hop, khong lo danh tinh. Khong can GitHub secret.
          SB_URL: https://ltmlueqkajqmduoqghdf.supabase.co
          SB_KEY: sb_publishable_74Lm6cc0CkoOOzy3A4IRrQ_BX0jHQcg
        run: |
          set -euo pipefail
          resp=$(curl -sS --fail-with-body \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/vote_stats?select=*&order=scope.asc,net.desc")
          echo "$resp" | jq -e 'type == "array"' >/dev/null
          # vote_items (tieu de da vote) — best-effort: neu view chua tao thi bo qua, khong lam fail job
          items=$(curl -sS -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/vote_items?select=*&order=sign.desc,n.desc" || echo '[]')
          echo "$items" | jq -e 'type == "array"' >/dev/null || items='[]'
          new=$(jq -n --argjson s "$resp" --argjson i "$items" '{stats:$s,items:$i}' | jq -S -c .)
          old=$(jq -S -c '{stats:(.stats//[]),items:(.items//[])}' preferences.json 2>/dev/null || echo 'null')
          if [ "$new" = "$old" ]; then
            echo "khong doi — bo qua."
            echo "changed=0" >> "$GITHUB_ENV"
          else
            jq -n --argjson stats "$resp" --argjson items "$items" --arg t "$(date -u +%FT%TZ)" \
              '{generatedAt:$t, source:"supabase vote_stats + vote_items (auto by GitHub Action)", stats:$stats, items:$items}' \
              > preferences.json
            echo "changed=1" >> "$GITHUB_ENV"
            echo "Cap nhat preferences.json:"; cat preferences.json
          fi
      - name: Commit if changed
        if: env.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preferences.json
          git commit -m "chore: cap nhat so thich nguoi doc (vote_stats)"
          # Nhieu nguon cung push vao main => rebase roi thu lai neu bi tu choi
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push bi tu choi — rebase roi thu lai ($i/5)"
            git pull --rebase origin main || { echo "::error::rebase conflict, can xu ly tay"; exit 1; }
            sleep $((i * 5))
          done
          echo "::error::push that bai sau 5 lan"
          exit 1
