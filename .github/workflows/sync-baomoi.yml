name: Sync Baomoi saved articles
# Keo danh sach "Bai da luu" tu tai khoan Bao Moi ve repo (baomoi-saved.json)
# + phan tich so thich (baomoi-analysis.json, baomoi-preferences.md).
# Chay tren may GitHub (mang mo, khong bi chan nhu moi truong quet).
# Can GitHub Secret BAOMOI_COOKIE = chuoi cookie dang nhap Bao Moi (co bmsid...).
on:
  schedule:
    - cron: '30 1,13 * * *'   # 08:30 & 20:30 gio VN — de import-news-from-drive (08:00/20:00) xong han
                              # roi moi chay, tranh 2 job cung push vao main mot luc
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: sync-baomoi
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch saved articles + analyze
        env:
          BAOMOI_COOKIE: ${{ secrets.BAOMOI_COOKIE }}
        run: |
          if [ -z "$BAOMOI_COOKIE" ]; then
            echo "::error::Thieu secret BAOMOI_COOKIE. Vao Settings > Secrets and variables > Actions de them."
            exit 1
          fi
          python3 scripts/baomoi_sync.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add baomoi-saved.json
          if git diff --cached --quiet; then
            echo "Khong co thay doi — bo qua commit."
            exit 0
          fi
          git commit -m "chore: cap nhat bai da luu Bao Moi (loc dung chu de)"
          # Nhieu nguon cung push vao main => rebase roi thu lai neu bi tu choi
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push bi tu choi — rebase roi thu lai ($i/5)"
            git pull --rebase origin main || { echo "::error::rebase conflict, can xu ly tay"; exit 1; }
            sleep $((i * 5))
          done
          echo "::error::push that bai sau 5 lan"
          exit 1

