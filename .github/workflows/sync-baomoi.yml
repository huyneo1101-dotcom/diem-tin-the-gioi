name: Sync Baomoi (bai da luu + quet chuyen muc)
# Hai nguon Bao Moi, doc lap nhau:
#   baomoi-saved.json  <- bai NGUOI DUNG tu bookmark (CAN cookie). Lay het, dang thang.
#   baomoi-topics.json <- quet chuyen muc cong khai (KHONG can cookie). Chi la kho ung vien,
#                         phien quet chon loc theo bo loc so thich roi moi dang.
# Ca hai chi giu bai DANG TRONG 24H gan nhat va dung 4 chu de cua web.
on:
  schedule:
    - cron: '5 1,13 * * *'   # 08:05 & 20:05 gio VN — chay SAU import-news-from-drive (08:00/20:00)
                             # va TRUOC routine quet web (09:15/20:15), de phien quet thay du
                             # ca tin Drive lan tin Bao Moi ma ne trung. Push race da co
                             # pull --rebase + retry o buoc commit ben duoi.
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: sync-baomoi
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Chay TRUOC va doc lap voi buoc can cookie: cookie het han thi van con nguon nay.
      - name: Quet chuyen muc cong khai (khong can cookie)
        run: python3 scripts/baomoi_topics.py

      - name: Keo bai da luu (can cookie)
        id: saved
        continue-on-error: true   # cookie het han khong duoc lam mat luon phan quet chuyen muc
        env:
          BAOMOI_COOKIE: ${{ secrets.BAOMOI_COOKIE }}
        run: |
          if [ -z "$BAOMOI_COOKIE" ]; then
            echo "::error::Thieu secret BAOMOI_COOKIE. Vao Settings > Secrets and variables > Actions de them."
            exit 1
          fi
          python3 scripts/baomoi_sync.py

      - name: Canh bao neu cookie hong
        if: steps.saved.outcome == 'failure'
        run: echo "::warning::Keo bai da luu THAT BAI (cookie het han? xem docs/baomoi-sync.md). Phan quet chuyen muc van chay."

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add baomoi-saved.json baomoi-topics.json
          if git diff --cached --quiet; then
            echo "Khong co thay doi — bo qua commit."
            exit 0
          fi
          git commit -m "chore: cap nhat tin Bao Moi (bai da luu + ung vien chuyen muc, 24h)"
          # Nhieu nguon cung push vao main => rebase roi thu lai neu bi tu choi
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push bi tu choi — rebase roi thu lai ($i/5)"
            git pull --rebase origin main || { echo "::error::rebase conflict, can xu ly tay"; exit 1; }
            sleep $((i * 5))
          done
          echo "::error::push that bai sau 5 lan"
          exit 1

