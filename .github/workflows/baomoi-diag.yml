name: Baomoi diag (temporary)
on:
  push:
    branches: [claude/baomoi-saved-articles-k7jvhp]
    paths: ['.github/workflows/baomoi-diag.yml']
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Probe (decompressed)
        run: |
          BASE="https://w-api.baomoi.com/api/v1/user/get/contents-by-type"
          CAP_CTIME=1784379006
          CAP_SIG=a88b5f86ea991fd566dc12486b55889db9108f47bd475dad83529a25fd1bd0d3
          NOW=$(date +%s)
          H=(-H 'user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36' -H 'referer: https://baomoi.com/' -H 'origin: https://baomoi.com' -H 'accept: */*')
          probe () {
            echo "=================== $1 ==================="
            code=$(curl -sS --compressed -o /tmp/body.txt -w '%{http_code}' "${H[@]}" "$2")
            echo "HTTP: $code | md5: $(md5sum /tmp/body.txt | cut -d' ' -f1) | bytes: $(wc -c </tmp/body.txt)"
            echo "BODY (first 900 chars):"; head -c 900 /tmp/body.txt; echo; echo
          }
          probe "1_EXACT (fixed sig+ctime, no cookie)" "$BASE?listType=3&page=1&ctime=$CAP_CTIME&version=0.8.26&sig=$CAP_SIG&apiKey=kI44ARvPwaqL7v0KuDSM0rGORtdY1nnw"
          probe "2_NEWCTIME_OLDSIG" "$BASE?listType=3&page=1&ctime=$NOW&version=0.8.26&sig=$CAP_SIG&apiKey=kI44ARvPwaqL7v0KuDSM0rGORtdY1nnw"
          probe "3_GARBAGE_SIG" "$BASE?listType=3&page=1&ctime=$CAP_CTIME&version=0.8.26&sig=deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef&apiKey=kI44ARvPwaqL7v0KuDSM0rGORtdY1nnw"
          probe "4_NO_SIG" "$BASE?listType=3&page=1&ctime=$CAP_CTIME&version=0.8.26&apiKey=kI44ARvPwaqL7v0KuDSM0rGORtdY1nnw"
          probe "6_NO_APIKEY" "$BASE?listType=3&page=1&ctime=$CAP_CTIME&version=0.8.26&sig=$CAP_SIG"
          echo "=== DONE ==="
