name: Gửi email điểm tin khi có bản tin mới

# Chạy khi index.html được push lên main. CHỈ gửi email khi commit là bản tin thật
# (message bắt đầu "Cap nhat ban tin ...") — nên commit sửa code/UI hay commit SKIP
# sẽ không gửi mail rác. Bắt cả phiên sáng lẫn tối (khác notify-push chỉ theo ngày).
on:
  push:
    branches: [main]
    paths: ['index.html']
  workflow_dispatch:

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Kiểm tra commit có phải bản tin mới không
        id: chk
        run: |
          msg=$(git log -1 --format=%s)
          echo "commit: $msg ; event: ${{ github.event_name }}"
          # Chạy tay (workflow_dispatch) luôn gửi để test; tự động thì chỉ khi commit là bản tin.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || echo "$msg" | grep -qiE '^Cap nhat ban tin'; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.chk.outputs.go == '1'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: steps.chk.outputs.go == '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Tạo file docx toàn bộ tin vừa quét
        if: steps.chk.outputs.go == '1'
        run: |
          pip install --quiet python-docx
          out=$(python3 .github/scripts/make_docx.py)
          echo "$out"
          echo "DOCX_PATH=${out#DOCX=}" >> "$GITHUB_ENV"

      - name: Gửi email
        if: steps.chk.outputs.go == '1'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ vars.EMAIL_TO || 'lamgiaphat1603@gmail.com' }}
        run: |
          npm install nodemailer@6 --no-save
          node .github/scripts/send-email.js

      # Gửi kèm file docx sang Discord. Chỉ chạy khi đã khai báo secret DISCORD_WEBHOOK —
      # chưa khai báo thì bỏ qua im lặng, KHÔNG làm đỏ workflow (email vẫn là kênh chính).
      - name: Gửi file docx lên Discord
        if: steps.chk.outputs.go == '1'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Chưa có secret DISCORD_WEBHOOK — bỏ qua bước Discord."
            exit 0
          fi
          if [ ! -f "$DOCX_PATH" ]; then
            echo "Không thấy file $DOCX_PATH — bỏ qua bước Discord."
            exit 0
          fi
          ngay=$(TZ='Asia/Ho_Chi_Minh' date +%d/%m/%Y)
          code=$(curl -s -o /tmp/discord_resp.txt -w '%{http_code}' \
            -F "payload_json={\"content\":\"📰 **Điểm tin ngày $ngay**\"}" \
            -F "file=@$DOCX_PATH" \
            "$DISCORD_WEBHOOK")
          echo "Discord HTTP $code"
          # 200/204 = ok. Lỗi thì in phản hồi để chẩn đoán nhưng KHÔNG fail cả job.
          if [ "$code" != "200" ] && [ "$code" != "204" ]; then
            cat /tmp/discord_resp.txt
            echo "::warning::Gửi Discord thất bại (HTTP $code) — email vẫn đã gửi."
          fi
