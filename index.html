<style>
:root{--fs:1}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2ec;color:#1b1b1b;font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double #1b1b1b;margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:#b3282d;font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:#6b6459;margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #d8d2c6;padding:7px 2px;font-size:calc(11.5px*var(--fs));color:#6b6459;text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;gap:2px;overflow-x:auto;margin:14px 0 16px;border-bottom:2px solid #1b1b1b}
.tb{white-space:nowrap;padding:9px 15px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:#6b6459;cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
.tb.on{color:#b3282d;border-bottom-color:#b3282d}
.note{font-size:calc(13px*var(--fs));color:#5a5349;background:#efeae0;border-left:3px solid #b3282d;padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:#fff;border:1px solid #d8d2c6;color:#6b6459;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:#1b1b1b;color:#fff;border-color:#1b1b1b}
.chip.on .dot{outline:1px solid #fff}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid #ded8cc;padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#b3282d}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:#8a8378;text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:#141414}
.sum{font-size:calc(14px*var(--fs));color:#3a352e}
.take{font-size:calc(13.5px*var(--fs));color:#1b1b1b;background:#efeae0;border-radius:2px;padding:8px 11px;margin:7px 0}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:#8a8378}
.src{font-size:calc(12.5px*var(--fs));color:#b3282d;text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.empty{color:#8a8378;text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double #1b1b1b;font-size:calc(11.5px*var(--fs));color:#8a8378;text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:#1b1b1b;color:#fff;border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:#fff;border:1px solid #d8d2c6;border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:#8a8378;margin-bottom:8px;border-bottom:1px solid #ece7dd;padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#8a8378;margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid #d8d2c6;background:#f7f5f1;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:#1b1b1b;color:#fff;border-color:#1b1b1b}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid #d8d2c6;background:#fff;border-radius:6px;cursor:pointer;font-size:16px;color:#1b1b1b}
.rp-fonts button .vi{font-size:12px;color:#8a8378;font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:#b3282d;background:#fbeceb}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}
</style>
</head>

var DATA = {"brand":"Điểm Tin Thế Giới","tagline":"Chính trị · Kinh tế · Quân sự · Ngoại giao — cập nhật hằng ngày","generatedAt":"2026-07-06","worldGeneratedAt":"2026-07-06","techGeneratedAt":"2026-07-06","worldNews":[{"date":"2026-07-06","category":"Ngoại giao","title":"Chủ tịch Trung Quốc Tập Cận Bình phá lệ, gửi thông điệp chúc mừng Quốc khánh Mỹ tới Tổng thống Trump","summary":"Bộ Ngoại giao Trung Quốc xác nhận ông Tập Cận Bình gửi lời chúc nhân dịp Mỹ kỷ niệm 250 năm Quốc khánh (250th Independence Day) tới ông Donald Trump, điều Bắc Kinh thường không công khai. Động thái nối tiếp thượng đỉnh tháng 5 tại Bắc Kinh, nơi ông Tập nhấn mạnh 'lợi ích chung lớn hơn khác biệt' và kêu gọi tránh 'Bẫy Thucydides' (Thucydides Trap).","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3359616/chinas-xi-jinping-sets-new-precedent-july-4-message-trump-and-us"},{"date":"2026-07-06","category":"Kinh tế","title":"OPEC+ tăng sản lượng dầu tháng thứ năm liên tiếp, bơm thêm 188.000 thùng/ngày từ tháng 8","summary":"Bảy nước OPEC+ gồm Ả Rập Xê Út, Nga, Iraq, Kuwait, Kazakhstan, Algeria và Oman nhất trí nâng sản lượng thêm 188.000 thùng/ngày từ tháng 8, sau khi cuộc chiến Mỹ-Israel với Iran hạ nhiệt. Giá dầu Brent giảm còn 72 USD/thùng, từ đỉnh 126 USD hồi tháng 4, khi phong tỏa Eo biển Hormuz (Strait of Hormuz) được nới lỏng.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/economy/2026/7/6/opec-countries-say-they-will-expand-monthly-oil-production"},{"date":"2026-07-06","category":"Quân sự & Công nghệ","title":"Không quân Philippines yếu thế nhận nhiệm vụ phòng thủ Biển Đông giữa căng thẳng với Trung Quốc","summary":"Không quân Philippines đang hiện đại hóa để tăng cường phòng thủ Biển Đông (South China Sea), dù bị xếp yếu nhất trong sáu quân đội lớn Đông Nam Á. Phát ngôn viên Đại tá Maria Christina Basco nhấn mạnh nhu cầu 'phòng thủ 360 độ', với các máy bay Super Tucano mở rộng tầm hoạt động và khả năng phối hợp với đồng minh Mỹ.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/week-asia/politics/article/3359533/outgunned-philippine-air-force-takes-south-china-sea-defence"},{"date":"2026-07-06","category":"Quân sự & Công nghệ","title":"Hai chiến hạm Hải quân Trung Quốc rời Hong Kong sau chuyến thăm cảng năm ngày","summary":"Khu trục hạm mang tên lửa dẫn đường Nam Ninh (Nanning) và hộ vệ hạm Hành Dương (Hengyang) rời Hong Kong sau chuyến thăm cảng năm ngày. Cục trưởng Chính vụ Eric Chan Kwok-ki chủ trì lễ tiễn tại căn cứ hải quân trên đảo Stonecutters, gọi đây là dịp giáo dục lòng yêu nước cho giới trẻ về thành tựu quốc phòng.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/hong-kong/society/article/3359522/i-didnt-want-miss-it-hongkongers-see-pla-warships-after-5-day-port-call"},{"date":"2026-07-05","category":"Chính trị","title":"Nga nói Ukraine bác đề xuất ngừng bắn cục bộ tại Kostiantynivka; ông Trump đề nghị làm trung gian","summary":"Bộ Quốc phòng Nga tuyên bố đề xuất ngừng bắn sáu giờ quanh Kostiantynivka ngày 7/7 để trao trả thi thể nhưng Ukraine từ chối, đồng thời khẳng định đã chiếm thành phố hôm 3/7 — điều Tổng thống Zelenskyy phủ nhận là 'lời dối trá của Nga'. Ông Trump đã điện đàm với cả ông Putin và ông Zelenskyy, đề nghị hỗ trợ chấm dứt xung đột kéo dài năm năm.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/5/russia-says-ukraine-rejects-local-ceasefire-in-dispute-over-kostiantynivka"},{"date":"2026-07-05","category":"Quân sự & Công nghệ","title":"Startup chip AI Trung Quốc rời chế độ ẩn danh, đặt cược công nghệ xếp chồng 3D để né kiểm soát Mỹ","summary":"Dongfang Suanxin, hãng chip AI Trung Quốc thành lập năm 2024 do ông Ngụy Thiếu Quân (Wei Shaojun) dẫn dắt, ra mắt công khai với công nghệ 'chip định nghĩa bằng phần mềm' và 'điện toán gần bộ nhớ xếp chồng 3D' (3D stacked near-memory computing) dùng chuỗi cung ứng nội địa. Đây là nỗ lực xây hệ sinh thái chip AI tự chủ, né kiểm soát xuất khẩu của Mỹ.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/tech/tech-trends/article/3359336/chinese-ai-chip-start-exits-stealth-mode-bets-3d-stacking-bypass-us-controls"},{"date":"2026-07-04","category":"Chính trị","title":"Ông Trump ca ngợi quân đội, chỉ trích chủ nghĩa cộng sản trong diễn văn kỷ niệm 250 năm Quốc khánh Mỹ","summary":"Phát biểu tại Núi Rushmore ngày 3/7 nhân 250 năm Quốc khánh, Tổng thống Donald Trump ca ngợi quân đội Mỹ và tuyên bố có 'sự trỗi dậy của hiểm họa cộng sản', gọi chủ nghĩa xã hội dân chủ là 'mối đe dọa lớn nhất kể từ khi lập quốc'. Bài diễn văn diễn ra trước bầu cử giữa kỳ tháng 11, giữa lo ngại về lạm phát và giá năng lượng từ cuộc chiến Mỹ-Israel với Iran.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/4/trump-praises-army-rails-against-communism-in-us-250th-anniversary-speech"},{"date":"2026-07-03","category":"Quân sự & Công nghệ","title":"Đà tiến của Nga tại Ukraine sụp đổ, ước tính 40.000 lính thiệt mạng chỉ trong tháng 6","summary":"Quân đội Ukraine ước tính Nga chịu 39.490 thương vong trong tháng 6/2026, trong khi chỉ chiếm 622 km² nửa đầu năm, so với 2.190 km² cùng kỳ 2025. Chiến dịch 'Phong tỏa Hậu cần' (Logistical Lockdown) của Ukraine tăng số đòn tập kích tầm trung lên 303 vụ, khiến doanh thu dầu mỏ Nga giảm 30% và gây thiếu nhiên liệu diện rộng.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/3/russian-advance-collapses-in-ukraine-as-anxiety-rises-in-moscow"},{"date":"2026-07-02","category":"Ngoại giao","title":"Chiến tranh Mỹ-Iran thúc đẩy các nước Vùng Vịnh 'đa dạng hóa' liên minh an ninh, giảm phụ thuộc Mỹ","summary":"Sau xung đột Mỹ-Israel với Iran khởi phát ngày 28/2/2026, các nước Hội đồng Hợp tác Vùng Vịnh (GCC) tìm cách mở rộng quan hệ an ninh với Pakistan, Trung Quốc, Thổ Nhĩ Kỳ và châu Âu. Ả Rập Xê Út đã ký hiệp ước quốc phòng với Pakistan, có thể mở rộng thành 'nhóm bộ tứ' gồm cả Thổ Nhĩ Kỳ và Ai Cập, khi hoài nghi về cam kết an ninh của Mỹ gia tăng.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/2/how-us-iran-war-may-push-gulf-countries-to-diversify-security-alliances"},{"date":"2026-07-01","category":"Ngoại giao","title":"Mỹ tuyên bố không gia hạn hiệp định thương mại USMCA với Canada và Mexico ở lần rà soát đầu tiên","summary":"Đại diện Thương mại Mỹ Jamieson Greer nói 'Mỹ không đồng ý gia hạn USMCA ở hình thức hiện tại', viện dẫn thâm hụt thương mại với hai nước. Khi ba bên không đạt đồng thuận gia hạn 16 năm, cơ chế rà soát hằng năm tự động kích hoạt, giữ hiệp định có hiệu lực đến 2036; Mỹ dự kiến họp với Mexico từ tuần 20/7.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/economy/2026/7/1/us-says-it-wont-agree-to-renew-usmca"},{"date":"2026-07-01","category":"Ngoại giao","title":"Mỹ 'rút ruột' chương trình nghị sự G20, biến thượng đỉnh Miami thành phông nền cho cuộc gặp Trump-Tập","summary":"Theo các nguồn tin của SCMP, Mỹ đang thu hẹp nội dung thực chất của thượng đỉnh G20 tháng 12 tại Miami, biến nó chủ yếu thành dịp để ông Trump gặp ông Tập Cận Bình. Trong đàm phán giữa các sherpa ngày 30/6-1/7, phía Mỹ đòi loại bỏ ngôn ngữ về giảm nghèo, chuyển đổi năng lượng và bình đẳng giới, chỉ tập trung vào nhập cư, tội phạm xuyên quốc gia và thương mại.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/us/diplomacy/article/3358958/us-hollows-out-g20-agenda-casts-miami-summit-backdrop-trump-xi-meeting-sources"}],"techNews":[{"date":"2026-07-06","category":"Lục quân","title":"KONGSBERG (Na Uy) và DevDroid (Ukraine) ký biên bản tích hợp trạm vũ khí điều khiển từ xa lên robot mặt đất chiến đấu","summary":"Ngày 3/7/2026, tập đoàn KONGSBERG của Na Uy và công ty quốc phòng Ukraine DevDroid ký biên bản ghi nhớ (MOU) nhằm kết hợp các trạm vũ khí điều khiển từ xa (remote weapon station) với xe mặt đất không người lái (UGV) đã được thử lửa trên chiến trường, hướng tới sản xuất quy mô lớn. DevDroid hiện có robot Droid TW 12.7 (súng máy 12,7mm) và Droid NW 40 (súng phóng lựu tự động 40mm), còn KONGSBERG mang kinh nghiệm từ chương trình CROWS của Lục quân Mỹ. Thoả thuận hướng tới chuẩn hoá robot chiến đấu thay cho các giải pháp ứng biến thời chiến.","significance":"Đánh dấu bước chuyển từ robot chiến đấu tự chế thời chiến sang hệ thống không người lái vũ trang được chuẩn hoá và sản xuất hàng loạt, kết hợp công nghệ NATO với kinh nghiệm thực chiến Ukraine.","sourceName":"Army Recognition","sourceUrl":"https://www.armyrecognition.com/news/army-news/2026/ukraine-devdroid-ground-robots-could-get-kongsberg-remote-weapon-stations-for-frontline-combat","sourceDate":"2026-07-06"},{"date":"2026-07-04","category":"Hải quân","title":"Saronic hạ thuỷ tàu mặt nước không người lái Mirage đầu tiên dài 16 mét, tầm hoạt động trên 2.500 hải lý","summary":"Saronic công bố hạ thuỷ chiếc Mirage đầu tiên vào ngày 2/7/2026, một tàu mặt nước tự hành (ASV) dài 52 ft (16 m) đạt tốc độ trên 35 hải lý/giờ, tầm hoạt động vượt 2.500 hải lý và tải trọng 3.500 pound. Mirage là nền tảng chủ lực thứ ba của hãng bên cạnh Corsair (24 ft) và Marauder (180 ft), được điều khiển qua nền tảng chỉ huy Echelon. Con tàu đi từ thiết kế đến hạ thuỷ trong chưa đầy một năm, hiện bắt đầu thử nghiệm trên mặt nước tại Galveston, Texas trong khi chiếc thứ hai đã lên dây chuyền.","significance":"Thể hiện năng lực sản xuất hàng loạt tàu tự hành ở tốc độ và quy mô lớn của ngành công nghiệp Mỹ, phục vụ chiến lược hạm đội lai (hybrid fleet) với đông đảo tàu không người lái.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/saronic-launches-first-mirage-16-meter-uncrewed-surface-vessel/","sourceDate":"2026-07-04"},{"date":"2026-07-03","category":"Không quân","title":"Anh, Ý, Nhật trao hợp đồng phát triển 4,6 tỷ bảng cho Edgewing đẩy nhanh tiêm kích thế hệ 6 GCAP","summary":"Ba nước Anh, Ý và Nhật Bản trao hợp đồng phát triển trị giá 4,6 tỷ bảng (khoảng 6,1 tỷ USD) cho Edgewing - liên danh công nghiệp gồm BAE Systems, Leonardo và JAIEC - để hoàn thiện thiết kế tiêm kích tàng hình thế hệ 6 thuộc Chương trình Không quân Chiến đấu Toàn cầu (GCAP). Hợp đồng nối tiếp gói 686 triệu bảng hồi tháng 4/2026 và cấp vốn tới hết năm 2027. Anh cam kết 8,6 tỷ bảng trong bốn năm qua Kế hoạch Đầu tư Quốc phòng; các mẫu bay thử Excalibur và Combat Air Flying Demonstrator dự kiến cất cánh cuối 2027.","significance":"Tháo gỡ bế tắc tài chính (đặc biệt phía Nhật) và giữ nhịp cho một trong những chương trình tiêm kích thế hệ 6 lớn nhất của phương Tây, đối trọng với nỗ lực của Mỹ và Trung Quốc.","sourceName":"The Aviationist","sourceUrl":"https://theaviationist.com/2026/07/03/gcap-fighter-project-contract-edgewing/","sourceDate":"2026-07-03"},{"date":"2026-07-02","category":"Vũ khí","title":"80.000 nhà thầu quốc phòng Mỹ chỉ còn ~20 tháng để đạt chứng nhận an ninh mạng CMMC giữa tình trạng thiếu đơn vị đánh giá","summary":"National Defense cảnh báo cơ sở công nghiệp quốc phòng Mỹ có khoảng 20 tháng để chứng nhận ước tính 80.000 nhà thầu theo chuẩn an ninh mạng CMMC, trong khi chỉ có chưa tới 100 tổ chức được cấp phép đánh giá (khoảng 97 tính đến tháng 3). Giai đoạn 2 của CMMC bắt đầu từ 10/11 khi chứng nhận Cấp 2 trở thành điều kiện trao hợp đồng; chuẩn gồm 110 yêu cầu bảo mật theo NIST SP 800-171. Nhiều nhà thầu cần 12-18 tháng chuẩn bị, tạo khoảng cách lớn giữa cung và cầu đánh giá.","significance":"Nút thắt an ninh mạng có thể loại nhiều doanh nghiệp nhỏ khỏi chuỗi cung ứng quốc phòng Mỹ, ảnh hưởng trực tiếp tới năng lực và sức bền của cơ sở công nghiệp quốc phòng.","sourceName":"National Defense Magazine","sourceUrl":"https://www.nationaldefensemagazine.org/articles/2026/7/2/industry-should-apply-y2k-lessons-learned-to-cmmc-crunch","sourceDate":"2026-07-02"},{"date":"2026-06-30","category":"AI/Tự hành","title":"Lầu Năm Góc lập chương trình tuyển dụng \"War Force\" chiêu mộ kỹ sư AI cắm sâu tới cấp đơn vị","summary":"Lầu Năm Góc cùng Văn phòng Quản lý Nhân sự (OPM) công bố sáng kiến tuyển dụng mang tên \"War Force\" nhằm chiêu mộ chuyên gia AI và kỹ sư phần mềm cho các vị trí \"kỹ sư triển khai tiền phương\" (forward deployed engineer) cắm sâu tới cấp đơn vị. Mức lương tới gần 200.000 USD/năm cho cam kết hai năm, tìm người giỏi AI tiên phong, học máy, tự động hoá và hệ thống dữ liệu. CTO Emil Michael gọi đây là lời kêu gọi hành động theo Chiến lược Tăng tốc AI; OPM muốn tuyển \"hàng trăm\" kỹ sư, hạn nộp 17/7.","significance":"Cho thấy nỗ lực đưa nhân tài AI/phần mềm khu vực tư nhân trực tiếp vào các đơn vị tác chiến, đẩy nhanh ứng dụng AI ở cấp chiến thuật của quân đội Mỹ.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/06/30/trump-administration-announces-war-force-effort/","sourceDate":"2026-06-30"},{"date":"2026-06-29","category":"AI/Tự hành","title":"Bộ Tư lệnh Vận tải Mỹ (TRANSCOM) tìm đối tác nghiên cứu tàu thuyền tự hành chở quân, chở hàng cho tương lai","summary":"Bộ Tư lệnh Vận tải Mỹ (TRANSCOM) tìm kiếm các thoả thuận hợp tác nghiên cứu-phát triển (CRADA) để nghiên cứu tàu mặt nước tự hành (Maritime Autonomous Surface Ships - MASS) vận chuyển binh sĩ và hàng hoá trong mạng lưới cơ động toàn cầu và chuỗi cung ứng. Hạn nộp bản đề xuất (white paper) là 6/7, các CRADA dự kiến kéo dài khoảng 2 năm, tiếp nối yêu cầu của Quốc hội về kế hoạch tăng năng lực vận tải biển và giải pháp tự hành cho hậu cần trong môi trường tranh chấp.","significance":"Phản ánh việc quân đội Mỹ mở rộng tự động hoá sang lĩnh vực hậu cần - vận tải biển, hướng tới \"hậu cần trong môi trường tranh chấp\" trước nguy cơ xung đột ở Ấn Độ Dương - Thái Bình Dương.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/06/29/autonomous-cargo-moving-drone-boats-us-transportation-command/","sourceDate":"2026-06-29"},{"date":"2026-06-27","category":"Không quân","title":"Tiêm kích tàng hình F-35A Na Uy áp sát, kèm oanh tạc cơ chiến lược Tu-160 của Nga gần Vòng Bắc Cực","summary":"Tiêm kích F-35A của Không quân Hoàng gia Na Uy đã đánh chặn và bám sát các oanh tạc cơ chiến lược Tu-160M của Nga trong chuyến tuần tra kéo dài 16 giờ trên Biển Barents và Biển Na Uy ngày 23/6/2026. Đội hình Nga gồm hai chiếc Tu-160, ít nhất hai tiêm kích hộ tống MiG-31 và một máy bay tiếp dầu Il-78M. Các máy bay NATO từ Na Uy, Pháp và Bồ Đào Nha phối hợp theo dõi nhiều máy bay Nga; F-35A Na Uy xuất phát từ căn cứ Evenes cho nhiệm vụ Trực chiến Phản ứng Nhanh (QRA).","significance":"Cho thấy vai trò ngày càng lớn của F-35 trong nhiệm vụ trực chiến phòng không NATO ở sườn Bắc Cực, khu vực căng thẳng gia tăng với hoạt động của không quân chiến lược Nga.","sourceName":"The Aviationist","sourceUrl":"https://theaviationist.com/2026/06/27/norwegian-f-35as-shadow-russian-tu-160/","sourceDate":"2026-06-27"}],"analyses":[{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân sự Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Morris lập luận rằng giới phân tích phương Tây bị bó hẹp nghiêm trọng trong việc hiểu chiến lược quân sự Trung Quốc do khó tiếp cận tài liệu học thuyết hiện hành của Quân Giải phóng Nhân dân (PLA) và phải dựa vào các nguồn tham chiếu đã lỗi thời. Sự thiếu hụt thông tin này buộc nhà hoạch định chính sách và người lập kế hoạch tác chiến phải suy đoán và 'soi gương' (mirror-imaging) thay vì dựa trên nguồn chính thống của Trung Quốc.","takeaway":"Nên khôi phục một Dịch vụ Thông tin Phát thanh Nước ngoài (FBIS) công khai, đặt tại Thư viện Quốc hội, để cung cấp bản dịch và phân tích ấn phẩm quân sự Trung Quốc cho giới nghiên cứu.","url":"https://warontherocks.com/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chiến dịch Nga tại Ukraine","outlet":"Institute for the Study of War (ISW)","author":"","title":"Đánh giá chiến dịch tấn công của Nga, ngày 2 tháng 7 năm 2026","summary":"ISW ghi nhận Nga tiến hành đợt tập kích quy mô lớn bằng 570 drone và tên lửa vào Kyiv đêm 1-2/7, khiến ít nhất 27 người chết và 91 người bị thương, trong đó phòng không Ukraine đánh chặn khoảng 476 quả. Nga đang triển khai drone động cơ phản lực nhanh hơn và đổi tần số (3.900-4.100 MHz) khiến việc đánh chặn khó hơn nhiều, trong khi trên các mặt trận Kharkiv, Donetsk và Zaporizhia lực lượng Nga tiếp tục tấn công nhưng không tiến được.","takeaway":"Chiến dịch hè-thu 2026 của Nga vẫn bế tắc về lãnh thổ, đổi lại bằng tổn thất lớn và chiến thuật tập kích drone-tên lửa ngày càng gây hại cho dân thường.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-2-2026"},{"date":"2026-07-01","region":"Trung Đông","topic":"Hizballah & Lebanon","outlet":"War on the Rocks","author":"Anthony Elghossain, Grace Wermenbol","title":"Thế lưỡng nan Hizballah: Vì sao cần một cách tiếp cận tích hợp","summary":"Hai tác giả lập luận rằng bản chất lai ghép của Hizballah - vừa là dân quân, đảng chính trị, mạng lưới dịch vụ xã hội, vừa là đường dây buôn lậu - khiến nó không thể bị hóa giải bằng những can thiệp đơn lẻ ở cấp khu vực hay địa phương. Họ cho rằng 'các giải pháp thuần khu vực hoặc thuần nội bộ đều không đủ' và cần chiến lược phối hợp giữa lãnh đạo Lebanon, các bên khu vực và giới chức Mỹ.","takeaway":"Kiềm chế Hizballah hiệu quả đòi hỏi cách tiếp cận tích hợp đồng thời trên các trục chính trị, quân sự, kinh tế và ngoại giao, thay vì các nỗ lực chắp vá.","url":"https://warontherocks.com/the-hizballah-predicament-why-an-integrated-approach-is-necessary/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Chính trị hóa tình báo Israel","outlet":"War on the Rocks","author":"Ofek Riemer, Ehud Eiran, Daniel F. Wajner","title":"Từ Shin Bet đến Mossad: Netanyahu định hình lại tình báo Israel","summary":"Các tác giả phân tích cách quan hệ giữa Netanyahu và các cơ quan tình báo Israel chuyển từ đối đầu công khai sang hợp tác bề ngoài, phản ánh sự củng cố quyền lực chính trị chứ không phải hòa giải thực chất. Những thất bại chính sách - nhất là về Iran - tạo ra vòng luẩn quẩn biến các định chế tình báo thành 'vật tế thần', biện minh cho việc chính trị hóa và làm suy yếu tính độc lập chuyên môn.","takeaway":"Sự xói mòn nguyên tắc statecraft phi đảng phái (mamlachtiut) cho thấy lãnh đạo dân túy dùng thất bại tình báo để hợp thức hóa cải tổ làm tổn hại nền quản trị dân chủ.","url":"https://warontherocks.com/from-shin-bet-to-mossad-netanyahu-reshapes-israeli-intelligence/"},{"date":"2026-06-25","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Đất hiếm & tàu ngầm Mỹ","outlet":"War on the Rocks","author":"Ryan Musto","title":"Lỗ hổng đất hiếm dưới đáy biển của Hải quân Mỹ","summary":"Musto cảnh báo chương trình tàu ngầm lớp Columbia đối mặt lỗ hổng chiến lược nghiêm trọng vì hệ thống động lực, tàng hình và dẫn đường gần như phụ thuộc hoàn toàn vào đất hiếm được tinh luyện tại Trung Quốc - nước kiểm soát khoảng 91% năng lực chế biến đất hiếm toàn cầu. Bắc Kinh đã vũ khí hóa ưu thế này bằng chu kỳ nâng giá rồi bán phá giá để làm phá sản đối thủ phương Tây (như vụ Molycorp sụp đổ năm 2015).","takeaway":"Thay vì bắt chước mô hình nhà nước nắm cổ phần của Bắc Kinh, Mỹ nên tạo tín hiệu cầu bền vững qua các khoản tài trợ DPA Title III, bảo lãnh vay và cam kết bao tiêu nhiều năm của Lầu Năm Góc để dựng chuỗi cung ứng nội địa và đồng minh trước năm 2030.","url":"https://warontherocks.com/cogs-of-war/the-u-s-navys-subsea-rare-earth-vulnerability/"}]};
function esc(s){s=(s==null?'':''+s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtVN(s){if(!s)return '';var p=(''+s).split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):(''+s);}
function sortD(a){return (a||[]).slice().sort(function(x,y){return (''+(y.date||'')).localeCompare(''+(x.date||''));});}
var WMETA={'Chính trị':['🏛️','#c0392b'],'Kinh tế':['💹','#1f8a54'],'Quân sự & Công nghệ':['🎖️','#2b5f9e'],'Ngoại giao':['🕊️','#7a4fb0'],'Thăm & Ký kết':['🤝','#b3282d']};
function wmeta(c){return WMETA[c]||['🌍','#6b6459'];}
var RCOLOR={'Ấn Độ Dương - Thái Bình Dương':'#1f8a54','Châu Âu/NATO':'#2b5f9e','Trung Đông':'#c98a2e','Đông Á':'#c0392b','Nam Á':'#7a4fb0','Châu Phi':'#2f9e6b','Châu Mỹ':'#4a5fb0','Bắc Cực':'#3a8fb8','Toàn cầu':'#6b6459'};
function rcolor(r){return RCOLOR[r]||'#6b6459';}
var CATMETA={'Không quân':'✈️','Hải quân':'⚓','Lục quân':'🪖','Drone/UAV':'🛩️','Siêu thanh':'🚀','Vũ trụ':'🛰️','AI/Tự hành':'🤖','Tên lửa/Phòng thủ':'🎯','Năng lượng định hướng':'⚡'};
var state={tab:'world',wcat:'Tất cả',areg:'Tất cả'};

/* ==== Người đọc tự chọn phông + cỡ chữ (ưu tiên phông đẹp tiếng Việt) ==== */
var FONTS=[
  {n:'Times New Roman', s:"'Times New Roman',Times,serif", note:'Cổ điển, có sẵn'},
  {n:'Be Vietnam Pro', s:"'Be Vietnam Pro',sans-serif", note:'Thiết kế riêng cho tiếng Việt'},
  {n:'Noto Serif', s:"'Noto Serif',serif", note:'Có chân, đủ dấu'},
  {n:'Lora', s:"'Lora',serif", note:'Có chân, thanh lịch'},
  {n:'Merriweather', s:"'Merriweather',serif", note:'Có chân, dễ đọc'},
  {n:'Roboto', s:"'Roboto',sans-serif", note:'Không chân, hiện đại'},
  {n:'Noto Sans', s:"'Noto Sans',sans-serif", note:'Không chân, đủ dấu'},
  {n:'Arial', s:"Arial,Helvetica,sans-serif", note:'Không chân, có sẵn'}
];
function getPref(k,d){try{var v=localStorage.getItem(k);return v==null?d:v;}catch(e){return d;}}
function setPref(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function applyFont(s){document.documentElement.style.setProperty('--reader-font',s);}
function applyFs(v){document.documentElement.style.setProperty('--fs',v);}
function ensureReaderUI(){
  var curFs=getPref('dt.fs','1'), curFont=getPref('dt.font',FONTS[0].s);
  applyFs(curFs); applyFont(curFont);
  var fab=document.createElement('button'); fab.id='reader-fab'; fab.textContent='Aa'; fab.setAttribute('aria-label','Cỡ chữ và phông chữ');
  var panel=document.createElement('div'); panel.id='reader-panel'; panel.hidden=true;
  var sizes=[['0.9','A'],['1','A'],['1.18','A'],['1.4','A']];
  var h='<div class="rp-h">Tuỳ chỉnh hiển thị</div><div class="rp-sub">Lựa chọn được lưu trên máy bạn.</div>';
  h+='<div class="rp-lbl">Cỡ chữ</div><div class="rp-sizes">';
  sizes.forEach(function(s){h+='<button data-fs="'+s[0]+'"'+(s[0]===curFs?' class="on"':'')+'>'+s[1]+'</button>';});
  h+='</div><div class="rp-lbl">Phông chữ (đọc tiếng Việt tốt)</div><div class="rp-fonts">';
  FONTS.forEach(function(f){h+='<button data-font="'+esc(f.s)+'" style="font-family:'+f.s+'"'+(f.s===curFont?' class="on"':'')+'>'+f.n+' <span class="vi">— '+f.note+'</span></button>';});
  h+='</div>';
  panel.innerHTML=h;
  document.body.appendChild(fab); document.body.appendChild(panel);
  fab.addEventListener('click',function(e){e.stopPropagation();panel.hidden=!panel.hidden;});
  panel.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return; e.stopPropagation();
    if(b.getAttribute('data-fs')!=null){var v=b.getAttribute('data-fs');applyFs(v);setPref('dt.fs',v);
      var ss=panel.querySelectorAll('.rp-sizes button'); for(var i=0;i<ss.length;i++)ss[i].classList.toggle('on',ss[i]===b);}
    else if(b.getAttribute('data-font')!=null){var s=b.getAttribute('data-font');applyFont(s);setPref('dt.font',s);
      var fs=panel.querySelectorAll('.rp-fonts button'); for(var j=0;j<fs.length;j++)fs[j].classList.toggle('on',fs[j]===b);}
  });
  document.addEventListener('click',function(){if(!panel.hidden)panel.hidden=true;});
}

function srcLink(o){var u=o.sourceUrl||o.url||'';var n=o.sourceName||o.outlet||u;return u?'<a class="src" href="'+esc(u)+'" target="_blank" rel="noreferrer">Nguồn ↗</a>':(n?'<span class="meta">'+esc(n)+'</span>':'');}
function card(inner){return '<div class="card">'+inner+'</div>';}
function renderWorld(){
  var arr=sortD(DATA.worldNews);
  var cats=[];arr.forEach(function(a){if(a.category&&cats.indexOf(a.category)<0)cats.push(a.category);});
  var items=state.wcat==='Tất cả'?arr:arr.filter(function(a){return a.category===state.wcat;});
  var chips='<div class="chips"><span class="chip'+(state.wcat==='Tất cả'?' on':'')+'" data-wcat="Tất cả">Tất cả ('+arr.length+')</span>';
  cats.forEach(function(c){var m=wmeta(c);chips+='<span class="chip'+(state.wcat===c?' on':'')+'" data-wcat="'+esc(c)+'"><i class="dot" style="background:'+m[1]+'"></i>'+m[0]+' '+esc(c)+' ('+arr.filter(function(a){return a.category===c;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){var m=wmeta(a.category);
    return card('<div class="crow"><span class="badge"><i class="dot" style="background:'+m[1]+'"></i>'+esc(a.category||'Thời sự')+'</span><span class="date">'+fmtVN(a.date)+'</span></div><div class="title">'+esc(a.title)+'</div>'+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.sourceName||'')+'</span>'+srcLink(a)+'</div>');
  }).join(''):'<div class="empty">Chưa có tin.</div>';
  return '<div class="note">Tin <b>chính trị · kinh tế · quân sự-công nghệ · các chuyến thăm & ký kết</b> nổi bật trong <b>24 giờ qua</b>, tổng hợp từ các báo lớn thế giới.</div>'+chips+'<div class="list">'+cards+'</div>';
}
function renderTech(){
  var arr=sortD(DATA.techNews);
  var cards=arr.length?arr.map(function(t){var ic=CATMETA[t.category]||'📰';
    return card('<div class="crow"><span class="badge"><i class="dot" style="background:#2b5f9e"></i>'+ic+' '+esc(t.category||'Công nghệ')+'</span><span class="date">'+fmtVN(t.date)+'</span></div><div class="title">'+esc(t.title)+'</div>'+(t.summary?'<div class="sum">'+esc(t.summary)+'</div>':'')+(t.significance?'<div class="take">'+esc(t.significance)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(t.sourceName||'')+'</span>'+srcLink(t)+'</div>');
  }).join(''):'<div class="empty">Chưa có tin.</div>';
  return '<div class="note">Tổng hợp <b>hằng tuần</b> tin quân sự - công nghệ nổi bật (vũ khí, khí tài, chương trình, thử nghiệm). Cập nhật: '+fmtVN(DATA.techGeneratedAt||DATA.generatedAt)+'.</div><div class="list">'+cards+'</div>';
}
function renderAnalysis(){
  var arr=sortD(DATA.analyses);
  var regs=[];arr.forEach(function(a){if(a.region&&regs.indexOf(a.region)<0)regs.push(a.region);});
  var items=state.areg==='Tất cả'?arr:arr.filter(function(a){return a.region===state.areg;});
  var chips='<div class="chips"><span class="chip'+(state.areg==='Tất cả'?' on':'')+'" data-areg="Tất cả">Tất cả ('+arr.length+')</span>';
  regs.forEach(function(r){chips+='<span class="chip'+(state.areg===r?' on':'')+'" data-areg="'+esc(r)+'"><i class="dot" style="background:'+rcolor(r)+'"></i>'+esc(r)+' ('+arr.filter(function(a){return a.region===r;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){
    return card('<div class="crow"><span class="badge"><i class="dot" style="background:#7a4fb0"></i>'+esc(a.topic||'Phân tích')+'</span>'+(a.region?'<span class="date">'+esc(a.region)+'</span>':'')+'</div><div class="title">'+esc(a.title)+'</div>'+(a.takeaway?'<div class="take">'+esc(a.takeaway)+'</div>':'')+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.outlet||'')+(a.author?' · '+esc(a.author):'')+(a.date?' · '+fmtVN(a.date):'')+'</span>'+srcLink(a)+'</div>');
  }).join(''):'<div class="empty">Chưa có bài phân tích.</div>';
  return '<div class="note">Phân tích, báo cáo chiến lược từ các viện nghiên cứu (think tank) uy tín. Lọc theo khu vực.</div>'+chips+'<div class="list">'+cards+'</div>';
}
function content(){return state.tab==='tech'?renderTech():state.tab==='analysis'?renderAnalysis():renderWorld();}
function render(){
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thế giới'],['tech','🛡️ Quân sự - Công nghệ'],['analysis','🧠 Phân tích']];
  var h='<div class="wrap">';
  h+='<div class="mast"><div class="kicker">Bản tin độc lập</div><h1>'+esc(DATA.brand)+'</h1><div class="tag">'+esc(DATA.tagline)+'</div></div>';
  h+='<div class="dateline"><span>Cập nhật '+stamp+'</span><span>Tổng hợp từ nguồn mở</span></div>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<button class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</nav>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">'+esc(DATA.brand)+' — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Mỗi tin đều dẫn liên kết nguồn gốc. Không đại diện quan điểm của bất kỳ tổ chức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  if(window.scrollTo)window.scrollTo(0,0);
}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg]'):null;if(!t)return;
  if(t.getAttribute('data-tab'))state.tab=t.getAttribute('data-tab');
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  render();
});
ensureReaderUI();
render();
</script>
</body>
</html>
