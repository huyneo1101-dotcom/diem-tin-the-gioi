u cầu nội địa yếu","summary":"Đất hiếm do các công ty được chính phủ Mỹ hậu thuẫn sản xuất đang chảy sang châu Á do nhu cầu trong nước chưa phát triển, dù chính quyền Trump nỗ lực xây chuỗi cung ứng đất hiếm quốc gia.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/dat-hiem-my-dang-duoc-ban-cho-cac-nuoc-chau-a.htm","significance":"Nghịch lý này phơi bày điểm yếu trong tham vọng tự chủ đất hiếm của Mỹ: có thể khai thác nhưng thiếu năng lực chế biến và thị trường tiêu thụ nội địa để cạnh tranh với Trung Quốc."},{"date":"2026-07-09","category":"Kinh tế","title":"Trump chuẩn bị xé bỏ 'bản ghi nhớ' với Iran nhưng Phố Wall gần như phớt lờ","summary":"Dù Tổng thống Trump tuyên bố sẵn sàng hủy MOU và tái chiến với Iran, thị trường Mỹ chỉ dao động nhẹ trong phiên 9-7, dầu hạ nhiệt sau khi có lúc vượt 80 USD/thùng.","sourceName":"Fortune","sourceUrl":"https://fortune.com/2026/07/09/trump-iran-memorandum-of-understanding-stocks/","significance":"Phản ứng dửng dưng cho thấy nhà đầu tư đang định giá xung đột vùng Vịnh là rủi ro 'có kiểm soát', miễn là eo biển Hormuz chưa bị phong tỏa hoàn toàn."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"CENTCOM hoàn tất đợt không kích thứ hai, đánh khoảng 90 mục tiêu quân sự Iran","summary":"Bộ Tư lệnh Trung tâm Mỹ cho biết đã tấn công khoảng 90 mục tiêu gồm hệ thống phòng không, trạm giám sát ven biển, kho tên lửa - UAV và năng lực hải quân dọc bờ biển Iran, sau đợt đánh 80 mục tiêu đêm trước.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/09/latest-strikes-hit-90-military-targets-in-iran-us-military","significance":"Chiến dịch tập trung phá hủy năng lực đe dọa hàng hải của Iran ở eo Hormuz cho thấy Mỹ theo đuổi mục tiêu quân sự có giới hạn - né đánh Tehran và cơ sở hạt nhân - nhưng vẫn duy trì áp lực hỏa lực cường độ cao."},{"date":"2026-07-09","category":"Chính trị","title":"Ông Trump khẳng định Mỹ muốn ở lại NATO","summary":"Tổng thống Trump tuyên bố Mỹ muốn tiếp tục là thành viên NATO, trấn an các đồng minh sau loạt phát ngôn dọa rút quân khỏi châu Âu.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/ong-trump-khang-dinh-my-muon-o-lai-nato-c55575411.epi","significance":"Trấn an sau loạt đe dọa rút quân; phản ánh chiến thuật \"gây sức ép rồi trấn an\" của Trump nhằm buộc đồng minh tăng chi, nhưng vẫn để lại hoài nghi về độ tin cậy của cam kết Mỹ."},{"date":"2026-07-09","category":"Chính trị","title":"Mỹ: Việc rút khỏi USMCA có thể buộc Quốc hội phải hành động","summary":"Khả năng Mỹ rút khỏi hiệp định thương mại USMCA với Canada và Mexico có thể buộc Quốc hội phải vào cuộc, đặt ra rủi ro cho chuỗi cung ứng Bắc Mỹ.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/my-viec-rut-khoi-usmca-co-the-se-buoc-quoc-hoi-phai-hanh-dong-c55575158.epi","significance":"Cho thấy rủi ro lớn với chuỗi cung ứng Bắc Mỹ nếu Mỹ rút khỏi hiệp định; phản ánh xu hướng bảo hộ và bất định thương mại lan cả sang các đối tác láng giềng thân cận."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lầu Năm Góc tìm UAV giá rẻ thay MQ-9 Reaper sau khi mất gần 30 chiếc ở Iran","summary":"Sau khi khoảng 30 UAV MQ-9 Reaper bị bắn hạ trong xung đột với Iran, Lầu Năm Góc và Đơn vị Đổi mới Quốc phòng (DIU) đang tìm các mẫu drone rẻ hơn có thể sản xuất hàng loạt để \"gánh\" tổn thất mà vẫn áp đảo phòng không đối phương.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/08/pentagon-to-explore-cheaper-replacements-for-the-mq-9-reaper/","significance":"Tổn thất lớn của loại UAV đắt tiền trước phòng không Iran buộc Mỹ chuyển từ số ít khí tài đắt đỏ sang chiến lược \"số đông giá rẻ\" — một sự thừa nhận thay đổi bản chất chiến tranh trên không."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Trump gợi ý cấp phép cho Ukraine tự lắp ráp tên lửa Patriot","summary":"Rời thượng đỉnh NATO, Tổng thống Trump ca ngợi sự \"thống nhất\" của liên minh và nêu khả năng cấp giấy phép cho Ukraine tự lắp ráp đạn đánh chặn Patriot. Giới chuyên gia lưu ý việc này trên thực tế sẽ mất nhiều tháng mới thành hiện thực.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/trump-leaves-summit-praising-nato-unification-floats-ukraine-made-patriots/","significance":"Ý tưởng \"Patriot made in Ukraine\" vừa là tín hiệu chính trị trấn an Kyiv, vừa cho thấy giới hạn năng lực sản xuất đạn đánh chặn của phương Tây khi nhu cầu phòng không vượt xa nguồn cung."},{"date":"2026-07-08","category":"Kinh tế","title":"Iran tập kích 85 căn cứ Mỹ ở vùng Vịnh, chứng khoán toàn cầu bán tháo và giá dầu vọt tăng","summary":"Iran phóng loạt tên lửa - máy bay không người lái vào 85 mục tiêu Mỹ và đồng minh ở Bahrain, Kuwait; dầu Brent tăng từ 72 lên gần 78 USD/thùng, KOSPI Hàn Quốc mất 5,35%, S&P 500 futures giảm 0,82%.","sourceName":"Fortune","sourceUrl":"https://fortune.com/2026/07/08/iran-strikes-gulf-global-selloff-stocks-oil-price/","significance":"Xung đột Mỹ - Iran bước sang tháng thứ tư đang trở thành cú sốc năng lượng và rủi ro lạm phát lớn nhất với kinh tế Mỹ, đẩy lợi suất trái phiếu 10 năm lên trên 4,5%."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Anduril giành hợp đồng NATO đầu tiên với nền tảng AI Lattice","summary":"Cơ quan Thông tin - Truyền thông NATO (NCIA) chọn Anduril triển khai Lattice cho sáng kiến nền tảng dữ liệu Chỉ huy - Kiểm soát trên không tăng cường (eAirC2), qua giai đoạn đánh giá 9 tháng.","sourceName":"Anduril","sourceUrl":"https://www.anduril.com/news/anduril-secures-first-nato-contract-lattice-for-eairc2-data-platform-initiative","significance":"Hợp đồng NATO đầu tiên của một startup quốc phòng Mỹ cho thấy khối này đang chuyển sang kiến trúc dữ liệu mở, kết nối hệ thống thay vì thay thế, và mở đường cho công nghệ Thung lũng Silicon vào chỉ huy tác chiến."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump nghiêng về việc gỡ trừng phạt và bán lại F-35 cho Thổ Nhĩ Kỳ","summary":"Sau cuộc gặp Tổng thống Erdogan tại Ankara, ông Trump phát tín hiệu sẽ dỡ trừng phạt và cho Thổ Nhĩ Kỳ tái gia nhập chương trình tiêm kích tàng hình F-35. Israel lo ngại động thái này làm lung lay ưu thế quân sự khu vực của mình.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/07/us-will-lift-sanctions-on-turkey-possibly-sell-f-35-fighter-jets-trump-says/","significance":"Cú đảo chiều chính sách lớn nhằm thưởng cho Erdogan; phản ánh việc Mỹ ưu tiên kéo Thổ về phía mình, nhưng làm lung lay ưu thế quân sự của Israel và trật tự khu vực."},{"date":"2026-07-08","category":"Kinh tế","title":"Chính quyền Trump gỡ hạn chế với OpenAI, mở đường phát hành rộng GPT-5.6","summary":"Nhà Trắng dỡ bỏ các hạn chế đối với mô hình mới nhất của OpenAI, cho phép hãng tiến hành phát hành rộng rãi GPT-5.6 ngay trong tuần sau giai đoạn kiểm thử bổ sung. Đây là bước nới lỏng chính sách công nghệ đáng chú ý giữa lúc Mỹ siết cạnh tranh AI.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/08/openai-gpt-trump-ban-lifted","significance":"Nới lỏng chính sách công nghệ để giữ lợi thế AI của Mỹ; phản ánh xu hướng ưu tiên chạy đua AI hơn là thận trọng về quản lý rủi ro."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung hai startup vào nhóm phóng tên lửa nhỏ và vừa","summary":"Space Force chọn thêm hai công ty khởi nghiệp tham gia cạnh tranh các nhiệm vụ phóng vệ tinh cỡ nhỏ và vừa, nhằm mở rộng nguồn cung phương tiện phóng và giảm phụ thuộc vào số ít nhà thầu lớn.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/space-force-adds-two-startups-to-small-medium-launch-pool/","significance":"Đa dạng hóa nhà cung cấp phóng giúp Mỹ tăng khả năng phục hồi và tốc độ triển khai vệ tinh quân sự."}],"analyses":[{"date":"2026-07-09","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Răn đe hạt nhân","outlet":"Naval News","author":"","title":"Phân tích: Vụ thử SLBM Thái Bình Dương của Trung Quốc báo hiệu chuyển sang răn đe trên biển liên tục","summary":"Naval News phân tích vụ thử SLBM ngày 6/7 của Trung Quốc, cho rằng nó phản ánh mức độ trưởng thành của lực lượng răn đe hạt nhân trên biển của PLAN và bước tiến tới tuần tra răn đe liên tục (CASD).","takeaway":"Nếu Trung Quốc đạt năng lực răn đe trên biển liên tục, cán cân hạt nhân ở Ấn Độ Dương - Thái Bình Dương sẽ thay đổi căn bản, gia tăng sức ép lên Mỹ và các đồng minh.","url":"https://www.navalnews.com/naval-news/2026/07/china-pacific-slbm-test-casd-nuclear-deterrence/"},{"date":"2026-07-09","region":"Châu Âu/NATO","topic":"Đoàn kết liên minh","outlet":"Al Jazeera","author":"","title":"Trump nhắm vào Tây Ban Nha, NATO hậu thuẫn Ukraine: Liên minh còn thống nhất?","summary":"Bài phân tích của Al Jazeera đánh giá dù các thành viên NATO nhất trí tăng chi tiêu quốc phòng, các đòn công kích của Trump nhằm vào Tây Ban Nha và Greenland đang đe dọa sự gắn kết của khối.","takeaway":"NATO đối mặt nghịch lý: cùng lúc tăng cường năng lực quân sự nhưng lại rạn nứt về chính trị nội bộ, làm suy yếu độ tin cậy của cam kết răn đe tập thể.","url":"https://www.aljazeera.com/news/2026/7/9/trump-targets-spain-nato-backs-ukraine-is-the-alliance-still-united"},{"date":"2026-07-08","region":"Trung Đông","topic":"Xung đột Mỹ - Iran","outlet":"CSIS","author":"","title":"Lệnh ngừng bắn Mỹ - Iran mong manh: những vấn đề cần theo dõi","summary":"CSIS phân tích tình trạng ngừng bắn Mỹ - Iran giữa bất định ở eo biển Hormuz và thị trường năng lượng, cho rằng đàm phán do Pakistan trung gian đang bế tắc dù đột phá bất ngờ vẫn có thể xảy ra.","takeaway":"Israel và Iran nhiều khả năng mắc kẹt trong xung đột cường độ thấp kéo dài thay vì đạt hòa bình bền vững; Mỹ khó áp đặt kết cục quân sự dứt điểm.","url":"https://www.csis.org/analysis/fragile-us-iran-ceasefire-issues-watch"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Hệ quả quốc phòng","outlet":"CSIS","author":"","title":"Những hệ quả ngoài dự tính của xung đột Mỹ - Iran với quốc phòng và an ninh","summary":"CSIS đánh giá các hệ quả ngoài dự tính của cuộc xung đột Mỹ - Iran đối với quốc phòng và an ninh, từ tiêu hao khí tài (như MQ-9) đến bài học về phòng không, hậu cần và sức bền công nghiệp quốc phòng.","takeaway":"Xung đột phơi bày điểm yếu về kho đạn và khí tài đắt tiền của Mỹ, thúc đẩy xu hướng chuyển sang vũ khí giá rẻ, sản xuất hàng loạt và tự động hóa.","url":"https://www.csis.org/analysis/what-are-unintended-consequences-us-iran-conflict-defense-and-security"},{"date":"2026-07-08","region":"Toàn cầu","topic":"An ninh","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Hải tặc Somalia trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Nạn hải tặc Somalia tái bùng phát với ba tàu hàng bị cướp gần Sừng châu Phi, sau gần một thập kỷ bị dẹp yên. Bối cảnh địa chính trị đã đổi khiến các liên minh hải quân đa quốc gia kiểu 2011 khó tái lập.","takeaway":"NATO đã dồn về phòng thủ lãnh thổ, Mỹ xoay trục sang Ấn Độ Dương - Thái Bình Dương và sa lầy hậu chiến Iran, châu Âu thiếu tàu; giải pháp phải là kiến trúc an ninh khu vực làm nòng cốt, có đối tác bên ngoài hỗ trợ và xử lý gốc rễ quản trị - kinh tế trên bờ.","url":"https://warontherocks.com/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-08","region":"Trung Đông","topic":"An ninh","outlet":"War on the Rocks","author":"Allison Minor","title":"Nhìn lại mối đe dọa của Houthi với vận tải biển","summary":"Tác giả xem lại phân tích năm 2024 của chính mình về các cuộc tấn công của Houthi trên Biển Đỏ, khi sự chú ý toàn cầu chuyển sang eo biển Hormuz. Dù các đợt không kích Mỹ - Israel làm suy giảm năng lực Houthi, nhóm này vẫn là mối đe dọa dai dẳng.","takeaway":"Houthi hiện đang tái tổ chức lực lượng thay vì tấn công chủ động, nhưng vẫn nắm ảnh hưởng lên các tuyến hàng hải thương mại nhờ nguy cơ ngầm về việc nối lại chiến sự.","url":"https://warontherocks.com/a-fresh-look-at-the-houthi-threat-to-maritime-shipping/"},{"date":"2026-07-08","region":"Châu Mỹ","topic":"Xét lại hiệp định USMCA","outlet":"CSIS","author":"William Alan Reinsch","title":"Giai đoạn tiếp theo của USMCA","summary":"Chính quyền Trump đã kích hoạt cơ chế rà soát 10 năm của USMCA vào ngày 1/7, bác bỏ phương án gia hạn đơn thuần. Đàm phán nay xoay quanh lo ngại an ninh — nhất là chặn hàng Trung Quốc đi vòng qua 'cửa sau' Bắc Mỹ — cùng tranh cãi về quy tắc xuất xứ và các vấn đề ngành.","takeaway":"Bất định kéo dài sẽ ghìm đầu tư doanh nghiệp, dù cách tiếp cận chuyên nghiệp của USTR để ngỏ khả năng đạt thỏa thuận sửa đổi.","url":"https://www.csis.org/analysis/next-phase-usmca"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Cướp biển Somalia trở lại","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Cướp biển Somalia đã trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Cướp biển Somalia tái xuất với các vụ bắt tàu hàng gần đây, nhưng liên minh hải quân đa quốc gia từng dẹp yên hồi 2011 không thể tái lập vì ưu tiên địa chính trị đã đổi. Tác giả đề xuất cấu trúc lấy khu vực làm trung tâm, để lực lượng biển địa phương dẫn dắt với hỗ trợ tình báo và năng lực chuyên biệt từ bên ngoài.","takeaway":"Giải pháp bền vững đòi hỏi an ninh hàng hải do khu vực dẫn dắt, đồng thời xử lý gốc rễ là quản trị yếu kém ở Somalia.","url":"https://warontherocks.com/2026/07/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-07","region":"Trung Đông","topic":"An ninh hàng hải","outlet":"CSIS","author":"","title":"Canh bạc eo biển Hormuz của Iran và giới hạn sức mạnh quân sự Mỹ","summary":"CSIS mổ xẻ chiến lược của Iran ở eo biển Hormuz và những giới hạn của sức mạnh quân sự Mỹ trong việc bảo đảm tự do hàng hải trước chiến thuật quấy rối bằng tàu nhỏ, thủy lôi và tên lửa bờ.","takeaway":"Mỹ có ưu thế hỏa lực áp đảo nhưng khó ngăn Iran gây gián đoạn ngắn hạn tuyến hàng hải huyết mạch, khiến rủi ro địa chính trị với giá dầu luôn thường trực.","url":"https://www.csis.org/analysis/irans-strait-hormuz-gambit-and-limits-us-military-power"},{"date":"2026-07-07","region":"Đông Á","topic":"An ninh","outlet":"CSIS","author":"Joseph Rodgers, Bonny Lin, Leon Li","title":"Vụ thử tên lửa đạn đạo phóng từ tàu ngầm của Trung Quốc cho thấy cần một thỏa thuận thông báo phóng","summary":"Ngày 6/7, Trung Quốc lần đầu bắn một tên lửa đạn đạo phóng từ tàu ngầm ra vùng biển quốc tế ở Thái Bình Dương, bay khoảng 7.300 km và có thể bay qua Philippines. Ba chuyên gia CSIS phân tích ý nghĩa chiến lược và rủi ro từ việc thiếu quy trình thông báo.","takeaway":"Vụ thử lần đầu phô diễn năng lực răn đe hạt nhân từ tàu ngầm của Bắc Kinh ngay tại Ấn Độ Dương - Thái Bình Dương; tác giả kêu gọi Trung Quốc tham gia Bộ Quy tắc Hague để tránh tính toán sai, giữa lúc kho đầu đạn tăng từ 200 lên hơn 600 trong sáu năm.","url":"https://www.csis.org/analysis/chinas-slbm-test-underscores-importance-ballistic-missile-launch-notification-agreement"},{"date":"2026-07-07","region":"Châu Âu/NATO","topic":"Dư luận Nga và chiến tranh Ukraine","outlet":"CSIS","author":"Maria Snegovaya & Jade McGlynn","title":"Thái độ người Nga đang đổi khi hệ quả chiến tranh về đến nhà","summary":"Các đợt tập kích bằng drone của Ukraine vào hạ tầng năng lượng Nga đang đưa hệ quả kinh tế của cuộc chiến đến tận người dân qua thiếu nhiên liệu và gián đoạn dịch vụ. Tác giả nhận định cú sốc kinh tế đời thường có sức bào mòn ủng hộ chiến tranh mạnh hơn các cú sốc quân sự đơn thuần.","takeaway":"Phương Tây nên phối hợp trừng phạt và truyền thông để gắn khó khăn trong nước Nga với lựa chọn gây chiến của Kremlin.","url":"https://www.csis.org/analysis/russian-attitudes-are-shifting-wars-effects-come-home"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Tự chủ quốc phòng châu Âu","outlet":"CSIS","author":"Max Bergmann & Otto Svendsen","title":"Hãy biến Thượng đỉnh Ankara thành chuyện tự chủ quốc phòng châu Âu","summary":"Các tác giả kêu gọi thành viên châu Âu của NATO dùng thượng đỉnh Ankara để chuẩn bị cho kịch bản Mỹ giảm hậu thuẫn, bằng kế hoạch cụ thể cho phòng thủ lục địa tự chủ. Việc Mỹ cạn nguồn lực, dồn sang Trung Quốc khiến tự lực của châu Âu là tất yếu.","takeaway":"Châu Âu cần lộ trình chuyển giao gánh nặng có thời hạn rõ, tăng tốc công nghiệp quốc phòng và cải tổ hợp tác NATO-EU.","url":"https://www.csis.org/analysis/make-ankara-summit-about-european-defense-autonomy"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Chiến tranh Nga - Ukraine","outlet":"Institute for the Study of War (ISW)","author":"Christina Harward, Jennie Olmsted, Tetiana Trach, Anna Thacker, Karolina Hird","title":"Đánh giá chiến dịch tấn công của Nga, ngày 6/7/2026","summary":"ISW ghi nhận Nga vừa thực hiện đợt tập kích tên lửa - drone quy mô lớn thứ tư kể từ 1/6, phóng tổng cộng 419 quả nhắm chủ yếu vào Kyiv, gây hàng chục thương vong dân thường. Nga khai thác việc Ukraine cạn kho đạn đánh chặn bằng cách dồn tên lửa đạn đạo trong mỗi gói tấn công. Đợt đánh diễn ra ngay trước thượng đỉnh NATO (7-8/7) nhằm phô trương sức ép. Đáp lại, Ukraine tập kích nhà máy lọc dầu lớn nhất của Nga ở Omsk, cách biên giới hơn 2.500 km.","takeaway":"Nga leo thang tập kích chiến lược và khiêu khích NATO để tạo áp lực trước thềm thượng đỉnh, trong khi Ukraine chứng minh năng lực đánh sâu chưa từng có.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-6-2026"},{"date":"2026-07-06","region":"Trung Đông","topic":"Hành lang thương mại - năng lượng","outlet":"Atlantic Council","author":"Allison Minor","title":"Các hành lang mới ở Trung Đông không chỉ để né eo biển Hormuz","summary":"Minor phân tích làn sóng dự án hạ tầng đường sắt, đường ống và logistics trên bộ đang nổi lên khắp Trung Đông sau những gián đoạn ở eo biển Hormuz. Saudi Arabia, UAE và Oman mở rộng mạng lưới đường sắt và trung tâm trung chuyển, trong khi Hành lang Ấn Độ - Trung Đông - châu Âu (IMEC) cần tái cấu trúc theo cách tiếp cận 'mạng lưới' thay vì một tuyến đơn lẻ. Thành công đòi hỏi tích hợp hải quan số, hài hòa quy định và cam kết chính trị bền vững, thậm chí mở ra một 'hành lang điện toán'.","takeaway":"Các hành lang này vượt xa mục tiêu né chốt chặn hàng hải, mở ra cơ hội đa dạng hóa kinh tế và hội nhập khu vực nếu có quản trị đủ mạnh.","url":"https://www.atlanticcouncil.org/blogs/menasource/new-middle-east-corridors-are-about-more-than-just-bypassing-the-strait-of-hormuz/"},{"date":"2026-07-06","region":"Đông Á","topic":"Trật tự toàn cầu - Trung Quốc","outlet":"The Diplomat","author":"","title":"Thời cơ để Trung Quốc định hình trật tự toàn cầu mới","summary":"Bài phân tích cho rằng chuyến thăm Bắc Kinh giữa tháng 5 của Tổng thống Mỹ Donald Trump đã bộc lộ một động lực mới trong quan hệ Mỹ - Trung, khi Bắc Kinh thể hiện vai trò chủ động hơn trong việc định hình quan hệ song phương. Theo tác giả, chuỗi tiếp xúc ngoại giao gần đây đưa Trung Quốc vào trung tâm sân khấu thế giới và củng cố năng lực định hình trật tự quốc tế, thay vì chỉ tuyên bố tham vọng. Bắc Kinh đang chuyển từ thế phòng thủ sang chủ động dẫn dắt chương trình nghị sự khu vực và toàn cầu.","takeaway":"Trung Quốc đang tận dụng thế chủ động ngoại giao mới để chuyển từ tuyên bố tham vọng sang thực sự định hình trật tự quốc tế.","url":"https://thediplomat.com/2026/07/chinas-moment-to-shape-a-new-global-order/"},{"date":"2026-07-03","region":"Châu Âu/NATO","topic":"Chiến lược quân Mỹ ở châu Âu","outlet":"War on the Rocks","author":"Benjamin H. Friedman & Moritz S. Graefrath","title":"Sai lầm và bị hiểu lầm: Cách tiếp cận của Trump với quân Mỹ tại châu Âu","summary":"Hai tác giả cho rằng sai lầm của chính quyền Trump không nằm ở việc dọa rút quân, mà ở chỗ không thực sự rút — thay vào đó theo đuổi 'bá quyền phi tự do', đổi sự hiện diện quân sự lấy các cam kết tăng chi tiêu mơ hồ của châu Âu.","takeaway":"Mỹ nên rút quân khỏi châu Âu theo lộ trình có kiểm soát vì mối đe dọa Nga hạn chế, thay vì mặc cả nửa vời.","url":"https://warontherocks.com/2026/07/misguided-and-misunderstood-trumps-approach-to-u-s-troops-in-europe/"},{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"An ninh","outlet":"Atlantic Council","author":"Ian Brzezinski, Philippe Dickinson","title":"Châu Âu nên đặt cược dài hạn vào Mỹ và quan hệ an ninh xuyên Đại Tây Dương","summary":"Bất chấp căng thẳng thời 'NATO 3.0' của Trump vốn đẩy trách nhiệm quốc phòng sang châu Âu, bài viết lập luận châu Âu nên duy trì cam kết dài hạn với quan hệ xuyên Đại Tây Dương. Lý do: sự ủng hộ của công chúng và Quốc hội Mỹ dành cho NATO vẫn vững.","takeaway":"Thái độ hoài nghi của chính quyền Trump không phản ánh tâm lý chung của người Mỹ (68% ủng hộ NATO, 76% ủng hộ đáp trả quân sự khi đồng minh bị tấn công); châu Âu nên chứng minh đóng góp quốc phòng tại Ankara và tránh những bước đi thúc đẩy Mỹ rút lui không thể đảo ngược.","url":"https://www.atlanticcouncil.org/dispatches/europe-should-take-the-long-bet-on-the-us-and-the-transatlantic-security-relationship/"}],"xNews":[{"date":"2026-07-22","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky điện đàm với đặc phái viên Trump, thúc đẩy nối lại đàm phán hòa bình","summary":"Tổng thống Ukraine Zelensky điện đàm với đặc phái viên Mỹ Steve Witkoff và Jared Kushner, gọi đây là cuộc trao đổi 'tốt và quan trọng' về cách tái khởi động ngoại giao. Ông nhấn mạnh Ukraine từ lâu đã sẵn sàng cho một nền hòa bình 'xứng đáng'.","significance":"Dấu hiệu đầu tiên về khả năng nối lại đàm phán ba bên Kyiv-Washington-Moscow sau nhiều tháng bế tắc.","url":"https://x.com/ZelenskyyUa/status/2079977905384202283"},{"date":"2026-07-23","handle":"@mercoglianos","name":"Sal Mercogliano","title":"Houthi tấn công hai tàu chở dầu Saudi, mở mặt trận mới ở Biển Đỏ","summary":"Chuyên gia hàng hải Sal Mercogliano cho biết Houthi đã tấn công hai tàu chở dầu treo cờ Saudi là Encelia và Layla bằng tên lửa và drone, khiến tàu Encelia bốc cháy ở Biển Đỏ. Đây là cuộc tấn công tàu thương mại đầu tiên kể từ khi Houthi tuyên bố phong tỏa hàng hải nhằm vào Saudi Arabia hôm 20/7.","significance":"Vụ tấn công đe dọa mở rộng chiến sự Mỹ-Iran sang một mặt trận hàng hải mới, có nguy cơ làm gián đoạn thêm tuyến vận tải qua eo Bab el-Mandeb bên cạnh khủng hoảng Hormuz.","url":"https://x.com/mercoglianos/status/2080175394389438653"},{"date":"2026-07-22","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky sa thải Tổng Tư lệnh Syrskyi, bổ nhiệm Drapatyi thay thế","summary":"Sau nhiều ngày biểu tình rầm rộ khắp Ukraine, Zelensky công bố trên X việc hoàn tất quyết định thay đổi lãnh đạo Các Lực lượng Vũ trang: cách chức Tổng Tư lệnh Oleksandr Syrskyi, bổ nhiệm Thiếu tướng Mykhailo Drapatyi (chỉ huy Lực lượng Liên hợp) làm người kế nhiệm.","significance":"Xáo trộn nhân sự quân sự cấp cao nhất của Ukraine kể từ vụ cách chức Zaluzhnyi năm 2024, diễn ra chỉ một tuần sau khi Bộ trưởng Quốc phòng Fedorov bị thay, cho thấy áp lực từ biểu tình trong nước đang định hình lại bộ máy chỉ huy chiến tranh.","url":"https://x.com/ZelenskyyUa/status/2079864149241139457"},{"date":"2026-07-21","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Iran tìm cách mở rộng xung đột sang Biển Đỏ qua đòn phong tỏa của Houthi","summary":"Báo cáo đặc biệt ngày 21/7 của ISW nhận định Iran đang thúc đẩy Houthi phong tỏa Bab el-Mandeb nhằm mở rộng phạm vi địa lý xung đột với Mỹ và gây thêm xáo trộn thị trường quốc tế. ISW cũng ghi nhận một số quan chức Iran lo ngại chiến sự kéo dài sẽ làm trầm trọng thêm khủng hoảng kinh tế và an ninh nội bộ.","significance":"Cho thấy Iran đang cố quốc tế hóa xung đột để đẩy chi phí về phía Mỹ, đồng thời hé lộ rạn nứt trong nội bộ giới lãnh đạo Tehran về cách ứng phó chiến tranh.","url":"https://x.com/TheStudyofWar/status/2079712510932848686"},{"date":"2026-07-18","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM: 2 quân nhân Mỹ thiệt mạng, 1 mất tích tại Jordan sau đòn tập kích của Iran","summary":"CENTCOM xác nhận ngày 17/7, hai quân nhân Mỹ thiệt mạng và một người mất tích khi lực lượng Mỹ cùng đối tác chống đỡ đợt tấn công bằng tên lửa đạn đạo và drone của Iran nhắm vào căn cứ ở Jordan (Al-Azraq). CENTCOM cho biết sẽ không công bố danh tính cho tới 24 giờ sau khi thân nhân được thông báo.","significance":"Đây là thương vong quân nhân Mỹ đầu tiên do hỏa lực Iran kể từ khi xung đột leo thang trở lại, kéo theo Mỹ mở đợt không kích trả đũa mới — đánh dấu bước leo thang đáng kể trong cuộc chiến Mỹ-Iran.","url":"https://x.com/CENTCOM/status/2078530691109974522"},{"date":"2026-07-19","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM hoàn tất đêm không kích Iran thứ 8 liên tiếp, nhắm hạ tầng quân sự sâu trong nội địa","summary":"CENTCOM thông báo hoàn tất đêm không kích thứ 8 liên tiếp nhằm vào Iran, đánh trúng các cơ sở giám sát bờ biển, phòng không, năng lực hàng hải và kho tên lửa/drone, tiếp tục làm suy yếu năng lực quân sự Iran và trừng phạt lực lượng IRGC đứng sau vụ tấn công tại Jordan ngày 17/7.","significance":"Chuỗi 8 đêm không kích liên tục cho thấy chiến dịch quân sự Mỹ nhằm vào Iran đang mở rộng cả về quy mô lẫn thời gian, không có dấu hiệu hạ nhiệt hay quay lại đàm phán ngừng bắn.","url":"https://x.com/CENTCOM/status/2078685229418483982"},{"date":"2026-07-16","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM vô hiệu hóa tàu chở dầu vi phạm phong tỏa hải quân nhắm vào Iran","summary":"CENTCOM thông báo máy bay Mỹ bắn tên lửa Hellfire vào ống khói tàu chở dầu treo cờ Curacao mang tên M/T Belma khi tàu hướng tới đảo Kharg - cảng xuất dầu chính của Iran - bất chấp nhiều cảnh báo, vô hiệu hóa tàu mà không đánh chìm. Đây là tàu đầu tiên bị xử lý kể từ khi Mỹ tái áp đặt phong tỏa hải quân với Iran từ 14/7.","significance":"Bước leo thang mới - Mỹ chuyển từ cảnh báo sang hành động vũ lực trực tiếp với tàu dân sự, làm tăng rủi ro cho vận tải biển và giá dầu qua eo Hormuz.","url":"https://x.com/CENTCOM/status/2077496765553811628"},{"date":"2026-07-16","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Mỹ lần đầu không kích mục tiêu sâu trong nội địa Iran, cách bờ biển hơn 200km","summary":"ISW dẫn truyền thông nhà nước Iran cho biết lực lượng Mỹ tấn công doanh trại Lữ đoàn Cơ giới 388 thuộc Lục quân Artesh tại Iranshahr, tỉnh Sistan-Baluchistan - mục tiêu nằm sâu trong nội địa hơn hẳn các đợt không kích trước vốn tập trung ở vùng ven biển phía nam Iran.","significance":"Phạm vi chiến dịch không kích của Mỹ mở rộng ra ngoài khu vực ven biển/Hormuz sang mục tiêu quân sự sâu trong nội địa, phản ánh mức leo thang cao hơn.","url":"https://x.com/TheStudyofWar/status/2077544526793584900"},{"date":"2026-07-15","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM mở đợt không kích mới nhằm vào phòng thủ bờ biển và kho tên lửa Iran","summary":"CENTCOM thông báo hoàn tất đợt không kích sáng 15/7 (90 phút) nhắm hệ thống phòng thủ bờ biển và kho/bệ phóng tên lửa hành trình Iran trên đảo Greater Tunb; buổi chiều mở thêm đợt thứ hai nhắm năng lực quân sự Iran đang đe dọa tàu thuyền qua eo Hormuz.","significance":"Mỹ tiếp tục leo thang tấn công có chủ đích (không chỉ phong tỏa) sang ngày thứ 4-5 liên tiếp, nhắm cụ thể năng lực chống hạm/tên lửa hành trình của Iran quanh Hormuz - phù hợp cảnh báo ngừng bắn đã sụp và Trump đe dọa mở rộng mục tiêu.","url":"https://x.com/CENTCOM/status/2077359847696212197"},{"date":"2026-07-15","handle":"@defense_news","name":"Defense News","title":"Zelensky cách chức Bộ trưởng Quốc phòng Fedorov sau 6 tháng tại nhiệm","summary":"Tổng thống Ukraine Zelensky cách chức Bộ trưởng Quốc phòng Mykhailo Fedorov sau 6 tháng, ngay sau cuộc họp với lãnh đạo quân đội. Lý do: bất đồng hệ thống giữa Fedorov và Tổng Tư lệnh Syrskyi cùng việc không phối hợp mua sắm quốc phòng với Bộ Tổng tham mưu. Bộ trưởng Nội vụ Ihor Klymenko được đề xuất thay thế.","significance":"Xáo trộn lớn trong bộ máy chỉ huy quốc phòng Ukraine giữa chiến sự - phản ánh căng thẳng giữa cải cách công nghệ-hoá quân sự và giới quân sự truyền thống, có thể ảnh hưởng nhịp độ cải cách mua sắm.","url":"https://x.com/defense_news/status/2077509272296972793"},{"date":"2026-07-15","handle":"@BarakRavid","name":"Barak Ravid (Axios)","title":"Trump họp Situation Room bàn tấn công quy mô lớn hơn vào Iran","summary":"Tổng thống Trump chủ trì cuộc họp tại Situation Room hôm 14/7 cùng Phó Tổng thống Vance, Ngoại trưởng Rubio, Bộ trưởng Quốc phòng Hegseth, Chủ tịch Hội đồng Tham mưu trưởng Liên quân Caine và Giám đốc CIA Ratcliffe để bàn kế hoạch tấn công Iran quy mô rộng hơn nhiều so với các đợt không kích quanh eo Hormuz, nhắm cả nhà máy điện và cầu nếu Iran không quay lại đàm phán.","significance":"Dấu hiệu Washington cân nhắc leo thang vượt phong tỏa hải quân/không kích giới hạn sang tấn công hạ tầng chiến lược Iran - bước ngoặt tiềm tàng trong xung đột Mỹ - Iran.","url":"https://x.com/BarakRavid/status/2077224198699659318"},{"date":"2026-07-14","handle":"@USTreasury","name":"Bộ Tài chính Mỹ","title":"Mỹ mở rộng trừng phạt mạng lưới vận chuyển dầu lậu của Shamkhani","summary":"OFAC (Bộ Tài chính Mỹ) trừng phạt hơn 50 cá nhân, tổ chức và tàu thuyền thuộc mạng lưới vận chuyển và né tránh trừng phạt của Mohammad Hossein Shamkhani - mắt xích chính giúp Iran xuất khẩu dầu lậu, nay mở rộng sang vận tải container và giao dịch hàng hóa toàn cầu.","significance":"Phần trong chiến dịch gây sức ép kinh tế nhắm nguồn thu dầu mỏ Iran ngay sau khi ngừng bắn sụp đổ, nâng tổng số thực thể bị trừng phạt liên quan Shamkhani lên hơn 200 - Washington kết hợp đòn kinh tế song song chiến dịch quân sự.","url":"https://x.com/USTreasury/status/2077125017783943671"},{"date":"2026-07-13","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM tái áp đặt phong tỏa hải quân với Iran, hiệu lực từ 14/7","summary":"CENTCOM thông báo theo chỉ đạo của Tổng thống, lực lượng Mỹ tái phong tỏa tàu thuyền ra vào cảng Iran từ chiều 14/7 (giờ Mỹ), sau khi lệnh ngừng bắn Mỹ-Iran (tháng 6) đổ vỡ và giao tranh tái diễn tại eo Hormuz. Phong tỏa áp dụng với mọi tàu ra/vào cảng, kho dầu và vùng biển Iran; tàu không tuân thủ có thể bị chặn, chuyển hướng hoặc cưỡng chế.","significance":"Đảo ngược trạng thái 'Hormuz mở' ngày 12/7 — đánh dấu chấm dứt thỏa thuận ngừng bắn 60 ngày và nguy cơ leo thang toàn diện trở lại vùng Vịnh, tác động trực tiếp giá dầu và vận tải biển toàn cầu.","url":"https://x.com/CENTCOM/status/2076732825349628250"},{"date":"2026-07-13","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Ngừng bắn Mỹ-Iran về bản chất đã chấm dứt","summary":"Trong Iran Update ngày 13/7, ISW đánh giá lệnh ngừng bắn Mỹ-Iran đã 'về bản chất chấm dứt' với các đợt giao tranh dồn dập hơn tại vùng Vịnh, dù quy mô còn nhỏ hơn đợt tháng 3-4/2026; việc tái áp đặt phong tỏa và tăng không kích đánh dấu bước sang giai đoạn mới của xung đột.","significance":"Nhận định tầng 3 xác nhận xu hướng leo thang mà tuyên bố CENTCOM phản ánh, cảnh báo nguy cơ quay lại chiến sự toàn diện Mỹ-Iran thay vì căng thẳng cục bộ tạm thời.","url":"https://x.com/TheStudyofWar/status/2076846265736802511"},{"date":"2026-07-13","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky trình bày Chương trình Phòng thủ Chống tên lửa đạn đạo tại Paris","summary":"Bên lề hội nghị Liên minh Tự nguyện (Coalition of the Willing) và cuộc họp đầu tiên của liên minh phòng thủ chống tên lửa đạn đạo tại Paris, Tổng thống Zelensky cho biết sẽ trình bày với các đối tác Chương trình Phòng thủ Chống tên lửa đạn đạo của Ukraine, ưu tiên hàng đầu hiện nay nhằm tăng cường năng lực phòng không.","significance":"Cho thấy Ukraine thúc đẩy một khuôn khổ hợp tác phòng thủ chống tên lửa đạn đạo mới bên lề hội nghị nhiều nguyên thủ tại Paris, tiếp nối cam kết 70 tỷ euro viện trợ quân sự tại Thượng đỉnh NATO Ankara.","url":"https://x.com/ZelenskyyUa/status/2076634937990562023"},{"date":"2026-07-12","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM khẳng định eo biển Hormuz vẫn mở cho tàu bè qua lại","summary":"CENTCOM ra tuyên bố trên X bác bỏ tuyên bố của IRGC rằng Iran kiểm soát eo biển Hormuz, khẳng định tuyến hàng hải quốc tế này vẫn mở cho mọi tàu di chuyển hợp pháp và lực lượng Mỹ đã sẵn sàng bảo đảm tự do hàng hải bất chấp các đe dọa từ Iran.","significance":"Cho thấy Washington ưu tiên trấn an các hãng vận tải/bảo hiểm về rủi ro chiến sự leo thang ở Hormuz.","url":"https://x.com/CENTCOM/status/2076278945993888116"},{"date":"2026-07-11","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky công bố cải tổ ngoại giao để đẩy nhanh giao vũ khí từ đồng minh","summary":"Tổng thống Zelensky thông báo chuẩn bị thay đổi lớn trong bộ máy ngoại giao, phân công người phụ trách cụ thể cho từng hướng chính sách đối ngoại nhằm bảo đảm các thỏa thuận cấp lãnh đạo về cung cấp vũ khí được thực thi nhanh và đầy đủ hơn, ngay sau thượng đỉnh NATO Ankara.","significance":"Phản ánh sức ép từ Kyiv buộc đồng minh hiện thực hóa cam kết vũ khí giữa lúc kho Patriot cạn kiệt.","url":"https://x.com/ZelenskyyUa/status/2076264578229391430"},{"date":"2026-07-10","handle":"@IEA","name":"International Energy Agency","title":"IEA cảnh báo bất ổn thị trường dầu vì căng thẳng Hormuz tái bùng phát","summary":"IEA cho biết dòng chảy dầu qua eo biển Hormuz đã tăng mạnh sau lệnh ngừng bắn tạm thời hồi tháng 6, nhưng các hành động thù địch tái diễn trong tuần này làm gia tăng đáng kể sự bất định cho triển vọng thị trường dầu mỏ toàn cầu, theo Oil Market Report mới nhất.","significance":"Đánh giá của cơ quan năng lượng hàng đầu cho thấy khủng hoảng Hormuz tác động trực tiếp tới an ninh năng lượng toàn cầu.","url":"https://x.com/IEA/status/2075490712309686501"},{"date":"2026-07-10","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky lập bộ chỉ huy mới cho tấn công tầm xa, tuyên bố đã đánh trúng mọi nhà máy lọc dầu lớn của Nga","summary":"Tổng thống Zelensky thông báo ký sắc lệnh thành lập một bộ chỉ huy chuyên trách trong quân đội Ukraine phụ trách các đòn tấn công tầm xa vào Nga. Ông cho biết Ukraine giờ đã đánh trúng toàn bộ các nhà máy lọc dầu lớn nhất của Nga.","significance":"Đánh dấu bước thể chế hóa chiến dịch tấn công tầm xa của Ukraine thay vì các đợt tập kích rời rạc.","url":"https://x.com/ZelenskyyUa/status/2075668189778674113"},{"date":"2026-07-10","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Mỹ áp thêm trừng phạt Iran khi hai bên chuẩn bị nối lại đàm phán, lập trường Iran không đổi","summary":"Báo cáo của ISW ngày 10/7 cho biết Mỹ và Iran chuẩn bị nối lại đàm phán sau các đợt không kích 8-9/7, nhưng mục tiêu của Iran (kiểm soát Hormuz, giữ chương trình hạt nhân, bảo vệ Hezbollah) không đổi. Cùng ngày Mỹ áp thêm trừng phạt lên 8 cá nhân và 6 thực thể liên quan tài chính Iran.","significance":"Cho thấy đàm phán tái khởi động không đồng nghĩa nhượng bộ thực chất từ phía Iran.","url":"https://x.com/TheStudyofWar/status/2075718254853607591"},{"date":"2026-07-08","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky gặp Thủ tướng Ý Meloni giữa lúc Nga tiếp tục tấn công","summary":"Tổng thống Ukraine Volodymyr Zelensky cho biết đã có cuộc gặp quan trọng với Thủ tướng Ý Giorgia Meloni để thông báo tình hình Ukraine, trong ngày Nga tiếp tục phóng tên lửa đạn đạo và drone tấn công các thành phố. Ông bày tỏ tiếc thương về thương vong dân thường từ các đợt tấn công mới nhất.","significance":"Cho thấy Ukraine tiếp tục vận động ngoại giao với đồng minh châu Âu để duy trì hỗ trợ phòng không giữa lúc Nga leo thang tấn công.","url":"https://x.com/ZelenskyyUa/status/2074771617750622453"},{"date":"2026-07-09","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Ước tính tổn thất quân sự của Nga tính đến 09/07/2026","summary":"Theo Lực lượng Vũ trang Ukraine, Nga đã chịu khoảng 1.414.820 binh sĩ tổn thất kể từ khi bắt đầu cuộc xâm lược toàn diện ngày 24/2/2022 đến 09/07/2026, tăng thêm 1.310 người trong 24 giờ qua.","significance":"Con số tổn thất lớn cho thấy chi phí cao của cuộc xâm lược đối với Nga và khả năng phòng vệ bền bỉ của Ukraine.","url":"https://x.com/KyivIndependent/status/2075115022594830821"},{"date":"2026-07-08","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM tuyên bố mở loạt đòn tấn công mạnh nhằm vào Iran để đáp trả các vụ tấn công tàu hàng ở Hormuz","summary":"Bộ Tư lệnh Trung tâm Mỹ thông báo bắt đầu loạt không kích nhằm vào Iran để \"áp đặt cái giá đắt\" cho việc Tehran nhắm vào tàu thương mại chở thủy thủ dân sự ở tuyến hàng hải quốc tế.","significance":"Tuyên bố chính thức của quân đội Mỹ xác nhận Washington chuyển từ răn đe sang hành động quân sự trực tiếp, đặt dấu chấm hết cho lệnh ngừng bắn.","url":"https://x.com/CENTCOM/status/2074603238175998290"},{"date":"2026-07-08","handle":"@Breaking911","name":"Breaking911","title":"CENTCOM tập kích khoảng 90 địa điểm quân sự Iran ngày 8/7","summary":"Đợt tấn công mới nhằm vào phòng không, giám sát bờ biển, kho tên lửa/UAV và hạ tầng hậu cần, tiếp nối đợt đánh khoảng 80 mục tiêu (gồm hơn 60 xuồng cao tốc IRGC) hôm trước.","significance":"Quy mô và loại mục tiêu cho thấy Mỹ tìm cách vô hiệu hóa năng lực đe dọa hàng hải của Iran ở Hormuz thay vì chỉ trả đũa tượng trưng.","url":"https://x.com/Breaking911/status/2075069861936422962"},{"date":"2026-07-08","handle":"@BarakRavid","name":"Barak Ravid (Axios)","title":"Mỹ lần đầu tập kích hạ tầng bên trong Iran kể từ ngừng bắn 8/4, bắn tên lửa hành trình vào 2 cầu đường sắt","summary":"Theo quan chức Mỹ, quân đội nước này đã tấn công hai cầu đường sắt ở miền bắc Iran bằng tên lửa hành trình trong đợt đánh ngày thứ Tư — lần đầu nhắm hạ tầng Iran kể từ ngừng bắn.","significance":"Mở rộng mục tiêu sang hạ tầng dân - quân sự cho thấy leo thang vượt khỏi phạm vi \"tự vệ hàng hải\", làm tăng nguy cơ chiến tranh toàn diện.","url":"https://x.com/BarakRavid/status/2075011509323796967"},{"date":"2026-07-08","handle":"@MarioNawfal","name":"Mario Nawfal","title":"Cảnh Bandar Abbas cho thấy đợt tập kích nặng nhất kể từ ngừng bắn, Iran có thể đóng eo biển","summary":"Hình ảnh mới từ cảng Bandar Abbas cho thấy mức thiệt hại được cho là nặng nhất kể từ khi thỏa thuận ngừng bắn ban đầu được ký, giữa lo ngại Iran đóng hoàn toàn eo biển Hormuz.","significance":"Nếu Iran đóng Hormuz — nơi trung chuyển khoảng 1/5 dầu thế giới — cú sốc giá dầu và vận tải biển toàn cầu sẽ rất lớn.","url":"https://x.com/MarioNawfal/status/2074615677764202845"},{"date":"2026-07-08","handle":"@straits_times","name":"The Straits Times","title":"Trump quay sang chỉ trích Tây Ban Nha và đòi Greenland, phơi bày rạn nứt NATO","summary":"Tại thượng đỉnh NATO, Trump công kích Tây Ban Nha vì chi tiêu quốc phòng thấp và tái nêu yêu sách Greenland, khiến hội nghị bộc lộ chia rẽ nội bộ.","significance":"Cho thấy mâu thuẫn Mỹ - đồng minh về chia sẻ gánh nặng và chủ quyền lãnh thổ đang thử thách sự gắn kết của liên minh.","url":"https://x.com/straits_times/status/2074824111709175894"},{"date":"2026-07-08","handle":"@SkyNews","name":"Sky News","title":"Trump nêu lại yêu sách Greenland, dọa rút quân khỏi châu Âu tại thượng đỉnh NATO","summary":"Tổng thống Trump tái khẳng định đòi hỏi với Greenland và dọa rút quân Mỹ khỏi châu Âu ngay tại hội nghị NATO ở Thổ Nhĩ Kỳ, trong khi Ukraine tiếp tục vận động gia nhập liên minh.","significance":"Đe dọa rút quân là quân bài gây sức ép mạnh, buộc châu Âu tính đến kịch bản tự lo an ninh.","url":"https://x.com/SkyNews/status/2074614570178498894"},{"date":"2026-07-08","handle":"@NATO","name":"NATO","title":"NATO công bố Tuyên bố thượng đỉnh Ankara","summary":"Các nguyên thủ và người đứng đầu chính phủ NATO ban hành Tuyên bố thượng đỉnh Ankara, ghi nhận các cam kết về chi tiêu quốc phòng và lập trường chung của liên minh.","significance":"Văn kiện chính thức phản ánh mẫu số chung đạt được bất chấp căng thẳng, là thước đo mức độ đoàn kết thực chất của khối.","url":"https://x.com/NATO/status/2074834022019014926"},{"date":"2026-07-08","handle":"@Defence_IDA","name":"International Defence Analysis","title":"Trung Quốc phô diễn tên lửa siêu vượt âm DF-17 trên truyền thông nhà nước giữa lúc RIMPAC diễn ra","summary":"Trung Quốc trưng ra tên lửa siêu vượt âm DF-17 (tầm 1.800–2.500 km, đầu đạn lượn cơ động) trên truyền thông nhà nước, được xem là tín hiệu răn đe giữa lúc tập trận RIMPAC diễn ra.","significance":"Phô trương khí tài đúng thời điểm RIMPAC là đòn tâm lý - chiến lược nhắm cảnh báo Mỹ và đồng minh về năng lực xuyên thủng lá chắn tên lửa.","url":"https://x.com/Defence_IDA/status/2074829888423645586"},{"date":"2026-07-08","handle":"@WarMonitor3","name":"WarMonitor","title":"Video UAV hải quân Ukraine đánh trúng tàu chở dầu lớn của Nga trên Hắc Hải","summary":"Đoạn video cho thấy một xuồng không người lái của Ukraine lao vào một tàu chở dầu cỡ lớn của Nga trên Hắc Hải giữa lúc thủy thủ đoàn bắn xối xả để ngăn chặn.","significance":"Minh chứng cho hiệu quả của drone hải quân giá rẻ trong việc đe dọa tàu lớn, làm thay đổi thế trận trên Hắc Hải. (Nguồn OSINT, cần đối chiếu thêm.)","url":"https://x.com/WarMonitor3/status/2074871209200689585"},{"date":"2026-07-08","handle":"@EU_ISS","name":"EU Institute for Security Studies","title":"Phân tích: Tổng thống Erdogan nổi lên là bên hưởng lợi chính trị lớn nhất từ thượng đỉnh NATO tại Ankara.","url":"https://x.com/EU_ISS/status/2074778368210268419","summary":"Giới phân tích cho rằng việc đăng cai thượng đỉnh NATO tại Ankara giúp Tổng thống Erdogan củng cố vị thế cả trong nước lẫn trên trường quốc tế.","significance":"Phản ánh cách nước chủ nhà tận dụng sự kiện đa phương cho lợi ích chính trị; cho thấy Thổ Nhĩ Kỳ đang nâng vai trò cầu nối trong NATO."},{"date":"2026-07-08","handle":"@Reuters","name":"Reuters","title":"Reuters: 'Ủy ban Hòa bình' do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm ở Gaza.","url":"https://x.com/Reuters/status/2074932816211591392","summary":"Reuters đưa tin một \"Ủy ban Hòa bình\" do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm tại Gaza.","significance":"Phản ánh nỗ lực Mỹ định hình giai đoạn hậu xung đột ở Gaza; xu hướng quản trị vùng lãnh thổ bằng cơ chế do bên ngoài dẫn dắt, tiềm ẩn tranh cãi chủ quyền."},{"date":"2026-07-07","handle":"@AndrewSErickson","name":"Andrew S. Erickson","title":"Vụ phóng SLBM 6/7 vào Nam TBD là lần đầu Trung Quốc công khai kể từ 1982","summary":"Chuyên gia hải quân Andrew Erickson nhận định vụ phóng ngày 6/7 vào vùng phi hạt nhân Nam Thái Bình Dương dường như là chuyến bay SLBM tầm xa ra Thái Bình Dương đầu tiên PLAN công khai thừa nhận kể từ vụ phóng JL-1 năm 1982.","significance":"Khoảng cách 44 năm cho thấy đây là cột mốc lịch sử trong tiến trình hoàn thiện bộ ba răn đe hạt nhân trên biển của Trung Quốc.","url":"https://x.com/AndrewSErickson/status/2074315675036721291"},{"date":"2026-07-07","handle":"@aadilbrar","name":"Aadil Brar","title":"Bằng chứng nghiêng về khả năng tên lửa Trung Quốc thử là JL-3","summary":"Nhà báo Aadil Brar phân tích hình ảnh do truyền thông nhà nước và PLA công bố, cho rằng tên lửa được thử nhiều khả năng là JL-3 dù giới phân tích quốc tế ban đầu còn chia rẽ giữa JL-2 và JL-3.","significance":"Xác định đúng loại tên lửa quan trọng để đánh giá tầm bắn và khả năng vươn tới lục địa Mỹ của lực lượng tàu ngầm hạt nhân Trung Quốc.","url":"https://x.com/aadilbrar/status/2074342035096768672"},{"date":"2026-07-07","handle":"@CBSNews","name":"CBS News","title":"Trung Quốc phóng thử tên lửa đạn đạo tầm xa từ tàu ngầm ở Nam TBD, khu vực phản đối","summary":"CBS News đưa tin quân đội Trung Quốc phóng thử một tên lửa đạn đạo tầm xa từ tàu ngầm hạt nhân ở Nam Thái Bình Dương, gây phản đối và quan ngại từ các nước trong khu vực.","significance":"Phản ứng của các quốc đảo Thái Bình Dương cho thấy vụ thử đụng chạm tới cam kết phi hạt nhân hóa khu vực và làm nóng cạnh tranh chiến lược.","url":"https://x.com/CBSNews/status/2074085955816804743"},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Cơ quan thực thi pháp luật Ukraine khám xét hãng drone hàng đầu Vyriy Industries, làm dấy lên lo ngại siết chặt ngành công nghệ quốc phòng.","url":"https://x.com/KyivIndependent/status/2074623512027832799","summary":"Cơ quan thực thi pháp luật Ukraine khám xét Vyriy Industries, một nhà sản xuất drone hàng đầu, gây lo ngại trong ngành.","significance":"Cho thấy căng thẳng giữa nhu cầu giám sát và việc bảo vệ ngành công nghệ quốc phòng non trẻ; rủi ro làm nản lòng doanh nghiệp quốc phòng thời chiến."},{"date":"2026-07-07","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky ký thỏa thuận hợp tác sản xuất drone với Đan Mạch — thỏa thuận thứ chín thuộc mô hình liên kết quốc phòng của Ukraine.","url":"https://x.com/ZelenskyyUa/status/2074543396996161846","summary":"Tổng thống Zelensky ký thỏa thuận sản xuất drone chung với Đan Mạch — thỏa thuận thứ chín theo mô hình liên kết quốc phòng của Ukraine.","significance":"Phản ánh chiến lược Ukraine \"nội địa hóa + hợp tác\" để tự chủ vũ khí; xu hướng châu Âu gắn công nghiệp quốc phòng với Kyiv thay cho viện trợ đơn thuần."},{"date":"2026-07-07","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Iran tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz.","url":"https://x.com/TheStudyofWar/status/2074608031799652776","summary":"ISW đánh giá Iran đang tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz cho tàu bè.","significance":"Cho thấy Hormuz là đòn bẩy chiến lược của Iran; phản ánh nguy cơ gián đoạn nguồn cung dầu và leo thang xung đột hàng hải."},{"date":"2026-07-07","handle":"@MarketWatch","name":"MarketWatch","title":"Giá dầu thô tăng khi Mỹ mở các đợt không kích nhằm vào Iran.","url":"https://x.com/MarketWatch/status/2074618951120584923","summary":"Giá dầu thô đi lên sau khi Mỹ mở các đợt không kích nhằm vào Iran.","significance":"Phản ánh mức độ nhạy cảm của thị trường năng lượng với xung đột Trung Đông; xu hướng rủi ro địa chính trị định giá dầu mạnh hơn cung–cầu."},{"date":"2026-07-07","handle":"@Rory_Johnston","name":"Rory Johnston","title":"Mỹ thu hồi quyền miễn trừ trừng phạt dầu mỏ với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","url":"https://x.com/Rory_Johnston/status/2074568070908002448","summary":"Mỹ thu hồi các quyền miễn trừ trừng phạt dầu mỏ đối với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","significance":"Cho thấy Washington siết tối đa sức ép kinh tế lên Tehran; phản ánh việc dùng trừng phạt dầu mỏ như vũ khí trong đối đầu leo thang."},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Ước tính tổn thất chiến đấu của Nga tính đến ngày 7/7 theo số liệu của Lực lượng Vũ trang Ukraine.","url":"https://x.com/KyivIndependent/status/2074386662059024384","summary":"Bộ Tổng tham mưu Ukraine công bố ước tính tổn thất chiến đấu của Nga tính đến ngày 7/7.","significance":"Là số liệu một chiều cần thận trọng, nhưng phản ánh cường độ tiêu hao khốc liệt của cuộc chiến; công cụ tuyên truyền–tâm lý của cả hai bên."},{"date":"2026-07-07","handle":"@AJEnglish","name":"Al Jazeera English","title":"Hamas tuyên bố giải thể bộ máy dân sự cầm quyền ở Gaza sau gần 20 năm điều hành.","url":"h
