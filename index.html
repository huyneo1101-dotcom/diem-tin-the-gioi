egory":"Kinh tế","title":"Số nhà khởi công tại Mỹ tăng vọt 19% nhờ phục hồi phân khúc chung cư","summary":"Số liệu ngày 17/7: số nhà mới khởi công tại Mỹ tháng 6 tăng 19% so với tháng trước, đạt tốc độ 1,43 triệu căn/năm - cao nhất kể từ tháng 3, vượt mọi dự báo. Mức tăng chủ yếu từ phân khúc chung cư (tăng 76,3%), trong khi nhà đơn lập giảm nhẹ tháng thứ ba do lãi vay và giá nhà còn cao.","sourceName":"Bloomberg","sourceUrl":"https://www.bloomberg.com/news/articles/2026-07-17/us-housing-starts-rebound-on-multifamily-construction","significance":"Chỉ báo Fed theo dõi khi cân nhắc lãi suất; cho thấy phân khúc nhà nhiều hộ hồi phục dù nhà đơn lập vẫn chịu áp lực chi phí vay cao."},{"date":"2026-07-16","category":"Kinh tế","title":"Bán lẻ Mỹ tăng nhẹ, đơn xin trợ cấp thất nghiệp xuống mức thấp mười tuần","summary":"Cục Điều tra Dân số Mỹ ước tính doanh số bán lẻ và dịch vụ ăn uống tháng 6 đạt 768,6 tỷ USD, tăng 0,2% so với tháng trước và 6,7% so với cùng kỳ. Bộ Lao động báo cáo 208.000 đơn xin trợ cấp thất nghiệp lần đầu, mức thấp nhất trong mười tuần. Hai chỉ báo cho thấy tiêu dùng và thị trường lao động vẫn có sức chống chịu dù lãi suất cao và bất ổn địa chính trị. Dữ liệu một tháng có thể biến động và còn được điều chỉnh, nhưng trước mắt làm yếu lập luận cần cắt giảm lãi suất khẩn cấp.","sourceName":"U.S. Census Bureau","sourceUrl":"https://www.census.gov/retail/sales.html","significance":"Sức cầu và việc làm bền hơn dự kiến có thể giữ lợi suất trái phiếu và USD ở mức cao, ảnh hưởng dòng vốn, tỷ giá và chi phí vay của các thị trường mới nổi."},{"date":"2026-07-16","category":"Công nghệ quân sự","title":"Cơ quan Phát triển Không gian Mỹ nối lại phóng vệ tinh Tranche 1 Transport Layer sau 9 tháng tạm dừng","summary":"SDA phóng 21 vệ tinh truyền dữ liệu Tranche 1 Transport Layer E (York Space Systems) bằng Falcon 9 từ Vandenberg, nối lại chương trình sau 9 tháng 'tạm dừng chiến lược' để khắc phục lỗi mô hình nhiệt và kết nối mặt đất phát hiện ở 42 vệ tinh đợt đầu. Đây là một phần kiến trúc Proliferated Warfighter Space Architecture (PWSA), cung cấp kết nối dữ liệu quân sự độ trễ thấp toàn cầu qua liên kết laser liên vệ tinh.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/sda-resumes-data-relay-satellite-launch-following-tech-fixes/","significance":"Việc nối lại phóng cho thấy SDA vượt giai đoạn khủng hoảng kỹ thuật đe doạ mô hình 'proliferated LEO' của Lầu Năm Góc - nền tảng kết nối cho cả hệ thống cảnh báo/đánh chặn Golden Dome."},{"date":"2026-07-16","category":"Kinh tế","title":"Mỹ áp thuế 25% lên hầu hết hàng hoá Brazil sau điều tra Section 301","summary":"Đại diện Thương mại Mỹ (USTR) Jamieson Greer ngày 16/7 công bố áp thuế 25% lên phần lớn hàng nhập từ Brazil, sau điều tra Section 301 kết luận Brazil có chính sách thương mại bất hợp lý về thương mại số/thanh toán điện tử, ưu đãi thuế, tiếp cận thị trường ethanol và phá rừng. Thuế hiệu lực từ 22/7, miễn trừ cà phê, thịt bò, quả bơ, dầu thô và phụ tùng máy bay.","sourceName":"USTR","sourceUrl":"https://ustr.gov/about/policy-offices/press-office/press-releases/2026/july/ustr-section-301-action-brazils-unreasonable-acts-policies-and-practices","significance":"Leo thang căng thẳng thương mại Mỹ - Brazil giữa quan hệ Trump-Lula xấu, tạo tiền lệ dùng Section 301 nhắm chính sách số/môi trường của đối tác thay vì chỉ tranh chấp thuế truyền thống."},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"Không quân Mỹ lần đầu bắn tên lửa AMRAAM thật từ drone đồng đội CCA","summary":"Drone chiến đấu tự hành YFQ-44A Fury của Anduril, thuộc chương trình Collaborative Combat Aircraft (CCA), lần đầu bắn thành công tên lửa không đối không AIM-120 AMRAAM trúng mục tiêu số hóa trên sa mạc Mojave, cất cánh từ căn cứ Edwards.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/in-first-air-force-fires-live-shot-off-cca-wingman-drone/","significance":"Cột mốc chứng minh drone 'wingman' có thể tự chủ tác chiến không đối không thực sự chứ không chỉ mang vũ khí giả lập, thúc đẩy Không quân Mỹ tiến tới biên chế CCA quy mô lớn."},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"Không quân Mỹ ký khung hợp đồng dài hạn mua hàng nghìn tên lửa hành trình giá rẻ FAMM","summary":"Bộ Quốc phòng Mỹ công bố thỏa thuận khung nhiều năm với Anduril (Barracuda), CoAspire (RAACM) và Zone 5 Technologies (AGM-188 Rusty Dagger) sản xuất dòng tên lửa hành trình phóng từ máy bay giá rẻ FAMM, tầm 250-500 dặm, dự kiến 8.000 quả/năm.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/15/us-air-force-turns-to-cheaper-cruise-missiles-it-can-buy-by-the-thousand/","significance":"Chiến lược 'vũ khí giá rẻ số lượng lớn' bù đắp kho tên lửa dẫn đường chính xác cạn kiệt sau các chiến dịch cường độ cao, tăng răn đe bằng số lượng."},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"Raytheon hoàn thành cột mốc thử nghiệm tên lửa phòng không tầm ngắn thế hệ mới NGSRI","summary":"Raytheon (RTX) hoàn tất loạt bắn thử tên lửa Next Generation Short Range Interceptor (NGSRI) - dự kiến thay thế Stinger cho Lục quân Mỹ - từ bệ phóng vác vai, đánh chặn trúng nhiều mục tiêu trên không mô phỏng nhờ quang học chính xác và động cơ nhiên liệu rắn cải tiến.","sourceName":"RTX (Raytheon)","sourceUrl":"https://www.rtx.com/news/news-center/2026/07/15/rtxs-raytheon-completes-key-milestone-for-u-s-armys-next-generation-short-rang","significance":"NGSRI mở rộng tầm bắn so với Stinger hiện tại, đáp ứng nhu cầu cấp bách nâng cấp phòng không tầm ngắn của Lục quân Mỹ trước mối đe dọa drone và máy bay tầm thấp."},{"date":"2026-07-15","category":"Kinh tế","title":"Chủ tịch Fed Warsh: Fed 'độc lập' dù thường xuyên gặp chính quyền Trump","summary":"Trong phiên điều trần bán niên trước Ủy ban Ngân hàng Thượng viện ngày 15/7, tân Chủ tịch Fed Kevin Warsh khẳng định Fed là 'ngân hàng trung ương độc lập', gặp 'thường xuyên' với chính quyền Trump nhưng cam kết chỉ theo luật và dữ liệu; nhắc lại Fed 'không khoan nhượng' với lạm phát kéo dài dù đầu tư trung tâm dữ liệu/AI đang là điểm sáng nhất của kinh tế Mỹ.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/15/feds-warsh-says-he-meets-often-with-trump-administration.html","significance":"Tính độc lập của Fed trước áp lực chính trị từ Nhà Trắng là tâm điểm theo dõi của thị trường trước cuộc họp FOMC cuối tháng 7."},{"date":"2026-07-15","category":"Kinh tế","title":"Cố vấn thương mại Trump nhận định Trung Quốc vi phạm thỏa thuận nhưng Mỹ chọn không trả đũa","summary":"Theo Bloomberg, cố vấn thương mại của Trump kết luận nội bộ rằng Trung Quốc vi phạm thỏa thuận thương mại ký với Tập Cận Bình năm ngoái - đặc biệt về cam kết mở lại tiếp cận đất hiếm/khoáng sản chiến lược - nhưng Washington không có động thái trả đũa đáng kể. Trung Quốc trước đó đưa MP Materials và USA Rare Earth vào danh sách kiểm soát xuất khẩu đáp trả Lầu Năm Góc.","sourceName":"Bloomberg","sourceUrl":"https://www.bloomberg.com/news/articles/2026-07-15/trump-s-aides-see-china-cheating-on-trade-but-shun-retaliation","significance":"Cho thấy khoảng cách giữa tuyên bố cứng rắn và thực thi thực tế trong chính sách thương mại Mỹ - Trung, ảnh hưởng độ tin cậy thỏa thuận song phương và an ninh chuỗi cung ứng khoáng sản chiến lược."},{"date":"2026-07-15","category":"Chính trị","title":"Hạ viện Cộng hòa công bố gói ngân sách đối chiếu 'Reconciliation 3.0' với 60 tỷ USD cho quốc phòng","summary":"Ngày 15/7, lãnh đạo Hạ viện Mỹ cùng Ủy ban Ngân sách công bố khung dự luật đối chiếu ngân sách mới, phân bổ 60 tỷ USD cho Ủy ban Quân vụ Hạ viện - thấp hơn 67 tỷ USD Nhà Trắng đề nghị cho chi phí liên quan chiến tranh Iran và kém xa mức 350 tỷ USD ban đầu; Ủy ban Ngân sách dự kiến markup ngày 16/7.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/house-gop-releases-reconciliation-3-0-with-60b-for-defense/","significance":"Dùng cơ chế reconciliation để né filibuster cho thấy Đảng Cộng hòa chấp nhận mức tài trợ quốc phòng thấp hơn nhiều đề xuất Nhà Trắng, phản ánh giới hạn chính trị nội bộ dù nêu cao 'hoà bình qua sức mạnh'."},{"date":"2026-07-15","category":"Chính trị","title":"Dân chủ phản đối trao quyền thuế quan đơn phương cho Trump trong dự luật trừng phạt Nga","summary":"Ngày 15/7, các nghị sĩ Dân chủ cấp cao (Gregory Meeks, Richard Neal, Ron Wyden) công khai phản đối 'Sanctioning Russia Act of 2026', cho rằng điều khoản trao quyền áp thuế đơn phương tới 100% lên các nước mua dầu Nga (gồm TQ, Ấn Độ) là 'con ngựa thành Troy' mở rộng quyền thuế quan của Tổng thống mà Quốc hội không thể ngăn - đe dọa làm chậm thông qua dự luật vốn có hơn 26 nghị sĩ lưỡng đảng bảo trợ.","sourceName":"The Hill","sourceUrl":"https://thehill.com/homenews/senate/5970400-democrats-oppose-russia-sanctions-act/","significance":"Phơi bày căng thẳng thể chế giữa quyền thuế quan hành pháp mở rộng và vai trò giám sát của Quốc hội, ngay trong một dự luật trừng phạt Nga vốn có đồng thuận lưỡng đảng hiếm hoi."},{"date":"2026-07-14","category":"Ngoại giao","title":"Trump tiếp Thủ tướng Iraq tại Nhà Trắng, xác nhận Mỹ rút hết quân khỏi Iraq trước 30/9","summary":"Tổng thống Trump đón tân Thủ tướng Iraq Ali al-Zaidi tại Nhà Trắng; hai bên xác nhận quân đội Mỹ (dưới 2.000 quân còn lại) rút hoàn toàn khỏi Iraq trước 30/9/2026, kết thúc sứ mệnh quân sự 23 năm. Lầu Năm Góc ra tuyên bố tái khẳng định thỏa thuận song phương 2024 về chấm dứt chiến dịch chống IS.","sourceName":"U.S. Department of War","sourceUrl":"https://www.war.gov/News/Releases/Release/Article/4319286/iraq-transition/","significance":"Kết thúc chính thức hiện diện quân sự Mỹ tại Iraq sau 23 năm, chuyển trọng tâm quan hệ song phương sang kinh tế - năng lượng, giữa lúc Mỹ tái cơ cấu ưu tiên nguồn lực quân sự khỏi Trung Đông."},{"date":"2026-07-14","category":"Kinh tế","title":"Lạm phát Mỹ hạ nhiệt bất ngờ xuống 3,5% trong tháng 6, giảm mạnh nhất 6 năm","summary":"Báo cáo CPI của BLS ngày 14/7 cho thấy chỉ số giá tiêu dùng tháng 6 giảm 0,4% so với tháng trước - mức giảm hàng tháng lớn nhất kể từ tháng 4/2020 - đưa lạm phát năm về 3,5%, thấp hơn nhiều dự báo 3,8% và giảm từ 4,2% tháng 5. Giá năng lượng giảm 5,7% là động lực chính; lạm phát lõi đi ngang còn 2,6%.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/14/consumer-price-index-inflation-report-june-2026.html","significance":"Số liệu tốt hơn dự kiến giảm áp lực buộc Fed nâng lãi suất ngay, nhưng Chủ tịch Fed Warsh cùng ngày điều trần nhấn mạnh chưa phải 'mission accomplished' do rủi ro thuế quan và chiến sự Iran - thị trường vẫn nghiêng về khả năng Fed nâng lãi tháng 9."},{"date":"2026-07-14","category":"Chính trị","title":"Thượng viện Mỹ chặn dự luật ngân sách quốc phòng 1,15 nghìn tỷ USD vì chiến sự Iran","summary":"Với tỷ lệ 50-46 (thiếu 10 phiếu so với ngưỡng 60), Thượng viện không thông qua thủ tục cloture để đưa S.4784 - Đạo luật Ủy quyền Quốc phòng (NDAA) tài khóa 2027 - ra biểu quyết. Phe Dân chủ viện dẫn việc chính quyền Trump nối lại xung đột quân sự với Iran mà không xin phép Quốc hội làm lý do phản đối.","sourceName":"The Hill","sourceUrl":"https://thehill.com/policy/defense/5967878-senate-democrats-block-ndaa/","significance":"Phơi bày căng thẳng thể chế giữa quyền chiến tranh của Tổng thống và quyền giám sát ngân sách quốc phòng của Quốc hội theo War Powers Act, đặt NDAA FY2027 vào thế bế tắc lưỡng đảng giữa lúc xung đột Mỹ - Iran leo thang."},{"date":"2026-07-14","category":"Công nghệ quân sự","title":"Hải quân Mỹ ra yêu cầu thông tin cho dòng UAV thế hệ mới trên tàu sân bay, đảm nhận 8 nhiệm vụ","summary":"Hải quân Mỹ phát hành RFI ngày 14/7 tìm dòng máy bay không người lái cất/hạ cánh trên tàu sân bay thế hệ mới thuộc 'Không đoàn Tương lai', yêu cầu đảm nhận 8 nhiệm vụ: tấn công mặt biển, tấn công mặt đất, chống ngầm, không chiến, tác chiến điện tử, ISR, tiếp dầu và tiếp tế. Tầm tối thiểu 1.000 hải lý cho nhiệm vụ tấn công; hạn nộp 13/8.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-navy/2026/07/14/the-us-navy-is-eyeing-next-gen-carrier-based-drones-heres-what-they-might-do/","significance":"Hải quân Mỹ định hình lại không đoàn tàu sân bay quanh máy bay không người lái đa nhiệm thay vì chỉ bổ trợ (như MQ-25), phản ánh áp lực cắt chi phí vận hành và mở rộng tầm trước năng lực chống tiếp cận (A2/AD) của Trung Quốc."},{"date":"2026-07-14","category":"Công nghệ quân sự","title":"Lầu Năm Góc công bố hơn 500 triệu USD mua sắm mới qua chương trình APFIT, ưu tiên hệ thống tự hành và tác chiến điện tử","summary":"Bộ Chiến tranh Mỹ công bố ngày 14/7 vòng trao thầu mới của chương trình APFIT trị giá hơn 500 triệu USD (hơn 70 triệu cho phần mềm), tập trung hệ thống tự hành, tác chiến điện tử, chống UAS, thông tin liên lạc chống nhiễu, hậu cần môi trường tranh chấp. Tổng giá trị APFIT vượt 2 tỷ USD.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/14/pentagon-announces-new-apfit-procurements-software/","significance":"Nỗ lực đẩy nhanh đưa công nghệ mới (tự hành/AI, chống drone) ra chiến trường của Lầu Năm Góc sau bài học chiến dịch chống Iran, rút ngắn chu kỳ mua sắm truyền thống."},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"SDA trao 1,75 tỷ USD cho L3Harris và Sierra Space chế tạo 36 vệ tinh theo dõi tên lửa cho Golden Dome","summary":"Cơ quan Phát triển Không gian Mỹ (SDA) trao tổng cộng 1,75 tỷ USD cho L3Harris (955 triệu USD, 18 vệ tinh) và Sierra Space chế tạo 36 vệ tinh theo dõi mối đe doạ tên lửa thuộc chương trình Accelerated Missile Defense Tranche 3, mang cảm biến trường nhìn trung bình cung cấp dữ liệu kiểm soát hoả lực; sản xuất tại Indiana và Florida, phóng trước cuối 2028 phục vụ tầng cảm biến lá chắn Golden Dome.","sourceName":"Space Development Agency","sourceUrl":"https://www.sda.mil/space-development-agency-issues-awards-to-build-36-accelerated-missile-defense-tracking-layer-satellites-for-tranche-3-in-support-of-golden-dome-for-america/","significance":"Bước cụ thể đầu tiên hiện thực hoá tầng cảm biến không gian của Golden Dome, sau nhiều tháng bị CSIS đánh giá là chậm tiến độ triển khai thực tế."},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Lầu Năm Góc dừng khẩn cấp yêu cầu chứng nhận an ninh mạng CMMC Giai đoạn 2","summary":"Giám đốc Thông tin Lầu Năm Góc Kirsten Davies dừng ngay yêu cầu đánh giá an ninh mạng bên thứ ba theo Mô hình Chứng nhận Trưởng thành An ninh mạng (CMMC) Giai đoạn 2 — dự kiến áp dụng từ 10/11/2026 — sau khi phân tích cho thấy chi phí lên tới 593.800 USD/nhà thầu quốc phòng nhỏ; lập tổ công tác rà soát báo cáo trong 60 ngày, trong khi yêu cầu tự đánh giá Giai đoạn 1 vẫn giữ hiệu lực.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/pentagon-announces-immediate-suspension-of-cmmc-mandates/","significance":"Cho thấy áp lực buộc Lầu Năm Góc cân bằng giữa siết an ninh mạng chuỗi cung ứng quốc phòng và nguy cơ đẩy nhà thầu nhỏ ra khỏi thị trường — chủ đề CISA/CSET theo dõi sát."},{"date":"2026-07-13","category":"Kinh tế","title":"Thống đốc Fed Waller: có thể phải tăng lãi suất nếu lạm phát lõi tiếp tục nóng","summary":"Phát biểu tại New York Association for Business Economics, Thống đốc Fed Christopher Waller cho biết lạm phát lõi PCE đã tăng từ 3% (12/2025) lên 3,4% (5/2026), một phần do xung đột Trung Đông làm gián đoạn dầu mỏ. Ông cảnh báo nếu CPI/PPI tuần này tiếp tục nóng, FOMC sẽ phải cân nhắc thắt chặt trong ngắn hạn, dù cần thêm dữ liệu trước khi hành động.","sourceName":"Federal Reserve","sourceUrl":"https://www.federalreserve.gov/newsevents/speech/waller20260713a.htm","significance":"Đánh dấu khả năng Fed đảo chiều từ kỳ vọng cắt giảm sang cân nhắc tăng lãi suất khi lạm phát do thuế quan và cú sốc năng lượng Trung Đông cộng hưởng — đúng cảnh báo của BIS về điểm nghẽn áp lực kinh tế toàn cầu."},{"date":"2026-07-13","category":"Chính trị","title":"Bộ Tài chính Mỹ trừng phạt mạng lưới hạ tầng hỗ trợ ransomware, phối hợp với Anh","summary":"OFAC (Bộ Tài chính Mỹ) trừng phạt dịch vụ VPN FirstVPN (1VPNS) cùng quản trị viên Dmytro Rashevskyi và cá nhân Yevgeniy Silayev — người bán công cụ 'cryptor' giúp ransomware né phần mềm diệt virus. Hành động phối hợp cùng Bộ Ngoại giao Anh (FCDO), nhắm triệt hạ hạ tầng dịch vụ hỗ trợ các nhóm ransomware từng gây thiệt hại hạ tầng trọng yếu của Mỹ.","sourceName":"U.S. Department of the Treasury","sourceUrl":"https://home.treasury.gov/news/press-releases/sb0559","significance":"Bước chuyển chiến lược trừng phạt của Mỹ từ nhắm trực tiếp nhóm ransomware sang triệt hạ mạng lưới hạ tầng/dịch vụ hỗ trợ (VPN, cryptor) phía sau — mô hình phối hợp xuyên Đại Tây Dương ngày càng được thể chế hoá."},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Thượng viện Mỹ rót 40 triệu USD tích hợp tên lửa Bullseye cho Thủy quân lục chiến đối phó Trung Quốc","summary":"Bản dự thảo NDAA FY2027 của Ủy ban Quân vụ Thượng viện bổ sung 40 triệu USD để tích hợp và trình diễn tên lửa hành trình Bullseye (General Atomics, tầm bắn 300km, phát triển từ Ice Breaker của Rafael) cho các Trung đoàn Duyên hải Thủy quân lục chiến, phục vụ răn đe ở Tây Thái Bình Dương.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/usmc-general-atomics-bullseye-missile-china","significance":"Thể hiện ưu tiên ngân sách quốc phòng Mỹ dồn vào năng lực tấn công tầm xa chi phí thấp hơn tên lửa truyền thống, phù hợp chiến lược Marine Littoral Regiment đối phó Trung Quốc mà CSIS/CNAS đã phân tích."},{"date":"2026-07-11","category":"Kinh tế","title":"Sa thải tại Amazon phơi bày thị trường lao động Mỹ bị AI làm bão hòa","summary":"Hơn 8 tháng sau đợt cắt giảm nhân sự lớn nhất lịch sử, nhân viên bị Amazon sa thải đang vật lộn trong thị trường việc làm ngày càng bão hòa; ngành công nghệ Mỹ đã cắt khoảng 140.000 việc làm từ đầu 2026. AI được nêu là lý do chính trong 4 tháng liên tiếp, chiếm khoảng 23% tổng số thông báo sa thải năm 2026.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/11/burnout-frustration-and-heartbreak-amazon-layoffs-take-their-toll.html","significance":"Làn sóng sa thải do AI đang làm suy yếu thị trường lao động Mỹ ngay cả khi chứng khoán tăng mạnh nhờ kỳ vọng AI."},{"date":"2026-07-10","category":"Kinh tế","title":"Chứng khoán Mỹ lập đỉnh trong khi tăng trưởng thực chỉ quanh 1,9%, giới kinh tế chỉ ra AI","summary":"Chứng khoán Mỹ bùng nổ nửa đầu 2026 trong khi tăng trưởng GDP thực giảm từ ~3,3% (2023) xuống ~1,9%; tỷ lệ tham gia lực lượng lao động gần mức thấp nhất 50 năm. Các nhà kinh tế cho rằng đầu tư và lợi nhuận AI là động lực khiến thị trường tách rời khỏi nền kinh tế thực.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/10/stock-market-and-economy-out-of-sync.html","significance":"Sự phân kỳ giữa thị trường do AI dẫn dắt và nền kinh tế thực yếu hơn làm dấy lên lo ngại về tính bền vững của đà tăng."},{"date":"2026-07-10","category":"Chính trị","title":"Trump sa thải toàn bộ ủy viên còn lại của Ủy ban Hỗ trợ Bầu cử Mỹ","summary":"Nhà Trắng ngày 10/7 xác nhận Tổng thống Trump đã cách chức 3 ủy viên cuối cùng của Ủy ban Hỗ trợ Bầu cử (EAC) - cơ quan lưỡng đảng độc lập hỗ trợ vận hành bầu cử liên bang - khiến cơ quan này không còn ủy viên nào chỉ vài tháng trước bầu cử giữa kỳ.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/10/donald-trump-removes-final-members-of-independent-us-election-commission","significance":"Làm dấy lên lo ngại Nhà Trắng can thiệp sâu hơn vào tiến trình bầu cử giữa kỳ, sau khi Tòa Tối cao mở rộng quyền sa thải lãnh đạo cơ quan độc lập của tổng thống."},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Thủy quân lục chiến Mỹ thử nghiệm thành công hệ thống phòng không tầm trung MRIC tại Guam","summary":"Trong diễn tập Valiant Shield, Thủy quân lục chiến Mỹ tại Guam bắn thử thành công hệ thống Đánh chặn tầm trung (MRIC) dựa trên công nghệ Iron Dome của Israel — lần đầu binh chủng này có phòng không tầm trung kể từ khi loại biên HAWK thập niên 1990. MRIC dùng tên lửa SkyHunter của Raytheon, tầm bắn 4-70km.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-military/2026/07/10/us-marines-successfully-test-fire-new-medium-range-air-defense-system/","significance":"Lấp khoảng trống phòng không giữa Stinger vác vai và Patriot tầm xa, tăng bảo vệ các căn cứ tiền tiêu ở Thái Bình Dương như Guam."},{"date":"2026-07-11","category":"Công nghệ quân sự","title":"Space Force hậu thuẫn thử nghiệm động cơ đẩy lai DOTS của Parabilis cho vệ tinh CubeSat cơ động","summary":"Phối hợp cùng Space Delta 89, công ty Parabilis Space Technologies hoàn tất thử nghiệm bắn nóng hệ thống đẩy lai DOTS (module 2U) kết hợp nhiên liệu rắn với chất oxy hóa lỏng để đạt lực đẩy cao hơn động cơ lai truyền thống. Phần cứng sẵn sàng bay thử trên quỹ đạo sớm nhất năm 2027.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/parabilis-tests-propulsion-system-for-maneuverable-cubesats/","significance":"Giúp vệ tinh nhỏ cơ động nhanh hơn để né mảnh vỡ hoặc ghép nối trên quỹ đạo, phục vụ tác chiến không gian linh hoạt của Mỹ."},{"date":"2026-07-11","category":"Công nghệ quân sự","title":"Space Force đưa vào biên chế hệ thống gây nhiễu vệ tinh đối phương Meadowlands","summary":"Bộ Tư lệnh Tác chiến Không gian tiếp nhận hệ thống gây nhiễu mặt đất Meadowlands do L3Harris phát triển, có khả năng phát bức xạ điện từ vô hiệu hóa vệ tinh đối phương — vũ khí giúp 'phát hiện, từ chối, gây rối và làm suy giảm' năng lực đối phương trong không gian.","sourceName":"Task & Purpose","sourceUrl":"https://taskandpurpose.com/news/space-force-meadowlands-jamming-system/","significance":"Bước leo thang trong năng lực tác chiến phản vệ tinh công khai của Mỹ, phản ánh xu hướng quân sự hóa không gian."},{"date":"2026-07-10","category":"Kinh tế","title":"Fed công bố Báo cáo Chính sách Tiền tệ bán niên, tân Chủ tịch Warsh cam kết ổn định giá","summary":"Báo cáo trình Quốc hội đầu tiên dưới thời tân Chủ tịch Fed Kevin Warsh mô tả tăng trưởng kinh tế Mỹ vững chắc, năng suất mạnh, hệ thống ngân hàng ít rủi ro. Báo cáo ghi nhận lạm phát tăng do chiến tranh Iran, thuế quan và chi phí công nghệ, dù một số thước đo lạm phát khác đã giảm.","sourceName":"Federal Reserve","sourceUrl":"https://www.federalreserve.gov/monetarypolicy/files/20260710_mprfullreport.pdf","significance":"Báo cáo chính sách tiền tệ đầu tiên dưới thời tân Chủ tịch Kevin Warsh, định hình kỳ vọng thị trường về lãi suất nửa cuối năm."},{"date":"2026-07-10","category":"Ngoại giao","title":"Ngoại trưởng Mỹ điện đàm với Ngoại trưởng Saudi Arabia về an ninh khu vực","summary":"Ngoại trưởng Mỹ Marco Rubio điện đàm với Ngoại trưởng Saudi Arabia Hoàng tử Faisal bin Farhan Al Saud ngày 10/7, thảo luận các diễn biến khu vực và nhấn mạnh tầm quan trọng của việc phối hợp thúc đẩy an ninh, ổn định Trung Đông.","sourceName":"Bộ Ngoại giao Mỹ","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/secretary-rubios-call-with-saudi-foreign-minister-prince-faisal-bin-farhan-al-saud-13","significance":"Duy trì kênh đối thoại Mỹ - Saudi Arabia về an ninh khu vực giữa lúc căng thẳng Trung Đông tiếp diễn."},{"date":"2026-07-10","category":"Ngoại giao","title":"Mỹ và các nước \"Shield of the Americas\" ra tuyên bố chung về tiến trình bầu cử ở Colombia","summary":"Ngày 10/7, Mỹ cùng 12 nước thành viên sáng kiến \"Shield of the Americas\" ra tuyên bố chung bày tỏ quan ngại về những phát ngôn nghi ngờ tính toàn vẹn của tiến trình bầu cử tại Colombia mà không có căn cứ. Tuyên bố khẳng định ý chí cử tri, được cơ quan bầu cử có thẩm quyền xác nhận, là nền tảng duy nhất của tính chính danh quyền lực công.","sourceName":"Bộ Ngoại giao Mỹ","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/joint-statement-by-members-of-the-shield-of-the-americas-3","significance":"Thể hiện áp lực ngoại giao tập thể của Mỹ và các đối tác khu vực với tiến trình chính trị nội bộ Colombia."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lầu Năm Góc trao hợp đồng vũ khí laser cho Lockheed Martin và nLIGHT","summary":"Bộ Quốc phòng Mỹ trao hợp đồng cho Lockheed Martin Aculight và nLIGHT Defense phát triển Hệ thống Vũ khí Laser Liên quân (JLWS), giá trị khởi điểm 86 triệu USD, có thể tăng lên tối đa 847 triệu USD. Nguyên mẫu ban đầu công suất 150 kW, sau nâng lên 300-500 kW để đánh chặn tên lửa hành trình.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/pentagon-picks-lockheed-nlight-for-laser-defense-project/","significance":"Bước tiến quan trọng trong nỗ lực triển khai vũ khí laser chống drone và tên lửa hành trình quy mô lớn của quân đội Mỹ."},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Không quân Mỹ tìm giải pháp máy bay tiếp dầu cỡ nhỏ cho kịch bản chiến tranh Thái Bình Dương","summary":"Các cuộc diễn tập ở Thái Bình Dương liên tục cho thấy giải pháp phân tán máy bay tiếp dầu cỡ nhỏ như KC-390 của Embraer để duy trì nhiên liệu, thay vì phụ thuộc máy bay tiếp dầu lớn dễ tổn thương. Embraer đang hợp tác Northrop Grumman phát triển tiếp dầu bằng cần tự động theo yêu cầu của Không quân Mỹ.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/the-solution-to-the-tanker-problem-the-us-military-keeps-finding-in-pacific-wargames/","significance":"Phản ánh thay đổi tư duy hậu cần của Không quân Mỹ nhằm tăng khả năng sống sót trong xung đột ở Ấn Độ Dương-Thái Bình Dương."},{"date":"2026-07-10","category":"Chính trị","title":"Đạo luật nhà ở lớn nhất nhiều thập niên thành luật mà không cần chữ ký của Trump","summary":"Dự luật nhà ở lưỡng đảng '21st Century Road to Housing Act' chính thức thành luật rạng sáng 11/7 sau khi Tổng thống Trump từ chối cả ký lẫn phủ quyết trong thời hạn 10 ngày theo hiến pháp. Ông Trump nói không ký để 'phản đối' việc Thượng viện chưa thông qua dự luật xác minh cử tri SAVE Act mà ông ủng hộ.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/10/trump-housing-bill-affordability","significance":"Cho thấy giới hạn quyền phủ quyết của Tổng thống khi Quốc hội đồng thuận lưỡng đảng đủ mạnh."},{"date":"2026-07-10","category":"Chính trị","title":"Nghị sĩ Cộng hòa lo ngại nguy cơ chính phủ đóng cửa ngay trước bầu cử giữa kỳ","summary":"Các Thượng nghị sĩ Cộng hòa lo ngại khả năng chính phủ Mỹ đóng cửa khi hạn chót ngân sách 30/9 đến gần, chỉ một tháng trước bầu cử giữa kỳ tháng 11. Đàm phán ngân sách giữa bà Susan Collins và bà Patty Murray đã đình trệ, trong khi Thượng viện từng trải qua 3 lần đóng cửa trong năm qua.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/10/government-shutdown-congress-republicans-midterm-elections","significance":"Rủi ro đóng cửa chính phủ ngay trước bầu cử giữa kỳ có thể ảnh hưởng lớn tới triển vọng của đảng Cộng hòa."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ trao loạt hợp đồng công nghệ nhanh cho ngành công nghiệp thương mại","summary":"Lực lượng Không gian Mỹ công bố đã trao 7 thỏa thuận Other Transaction Authority (OTA) trong tháng 5-6/2026 và dự kiến trao thêm 6 thỏa thuận trong tháng 7, tổng cộng 13 hợp đồng trị giá hơn 500 triệu USD cho các nhà cung cấp thương mại để phát triển năng lực chiến đấu không gian. Chương trình phối hợp với Phòng thí nghiệm Nghiên cứu Không quân, Cơ quan Phòng thủ Tên lửa và NASA.","sourceName":"Lực lượng Không gian Mỹ","sourceUrl":"https://www.spaceforce.mil/News/Article-Display/Article/4537826/space-force-delivers-rapid-tech-awards-for-commercial-industry/","significance":"Cho thấy Mỹ đẩy nhanh chiến lược 'tech pull' để rút ngắn thời gian đưa công nghệ vũ trụ thương mại vào phục vụ quân sự."},{"date":"2026-07-09","category":"Kinh tế","title":"Ông Trump ký sắc lệnh yêu cầu đàm phán thương mại về máy bay, động cơ phản lực nhập khẩu","summary":"Ngày 9/7, Tổng thống Donald Trump ký tuyên bố theo Mục 232 Đạo luật Mở rộng Thương mại 1962, chỉ đạo Bộ Thương mại và Văn phòng Đại diện Thương mại Mỹ đàm phán với các đối tác về máy bay thương mại, động cơ phản lực và phụ tùng nhập khẩu vì lo ngại an ninh quốc gia. Sắc lệnh chưa áp thuế ngay nhưng cảnh báo có thể áp thuế nếu không đạt thỏa thuận trong 180 ngày.","sourceName":"Nhà Trắng","sourceUrl":"https://www.whitehouse.gov/fact-sheets/2026/07/fact-sheet-president-donald-j-trump-adjusts-imports-of-commercial-aircraft-jet-engines-and-aircraft-and-engine-parts-into-the-united-states/","significance":"Đặt ngành hàng không thương mại toàn cầu, gồm cả chuỗi cung ứng liên quan tới Boeing/Airbus, trước nguy cơ thuế quan mới nếu đàm phán thất bại."},{"date":"2026-07-08","category":"Ngoại giao","title":"Mỹ, Nhật Bản, Hàn Quốc ra tuyên bố chung tái khẳng định cam kết hòa bình eo biển Đài Loan","summary":"Bên lề Thượng đỉnh NATO tại Ankara, Ngoại trưởng Mỹ Marco Rubio cùng ngoại trưởng Nhật Bản và Hàn Quốc nhấn mạnh tầm quan trọng của hòa bình, ổn định tại eo biển Đài Loan, phản đối mọi hành động đơn phương thay đổi hiện trạng bằng vũ lực. Ba bên cũng ký biên bản ghi nhớ hợp tác năng lượng hạt nhân dân sự và tái khẳng định cam kết phi hạt nhân hóa Triều Tiên.","sourceName":"Bộ Ngoại giao Mỹ","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/united-states-japan-republic-of-korea-rok-trilateral-foreign-ministers-meeting","significance":"Củng cố liên kết ba bên Mỹ-Nhật-Hàn về an ninh Ấn Độ Dương-Thái Bình Dương trong bối cảnh Trung Quốc gia tăng hoạt động quanh Đài Loan."},{"date":"2026-07-08","category":"Kinh tế","title":"Biên bản họp Fed hé lộ bất đồng sâu sắc về hướng đi lãi suất","summary":"Biên bản cuộc họp tháng 6 của Fed cho thấy các quan chức chia rẽ rõ rệt: một nhóm nghiêng về khả năng hạ lãi suất cuối năm nay, trong khi nhóm khác cho rằng mức lãi suất phù hợp phải cao hơn biên độ hiện tại 3,5%-3,75%. Ủy ban vẫn nhất trí giữ nguyên lãi suất tại cuộc họp đầu tiên do tân Chủ tịch Kevin Warsh điều hành.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/08/fed-minutes-june-2026-.html","significance":"Sự bất đồng trong nội bộ Fed làm gia tăng bất định về lộ trình lãi suất Mỹ nửa cuối năm, ảnh hưởng tới thị trường tài chính toàn cầu."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Giới chuyên gia: chương trình tên lửa đánh chặn giá rẻ của Lục quân Mỹ có triển vọng nhưng nhiều rủi ro","summary":"Hai tuần sau khi Lục quân Mỹ chính thức khởi động chương trình Low-Cost Interceptor (LCI) nhằm giảm phụ thuộc vào các hệ thống đánh chặn đắt đỏ như PAC-3 MSE, SM-3, SM-6 trước drone giá rẻ kiểu Shahed, chuyên gia Stacie Pettyjohn (CNAS) đánh giá hướng đi hợp lý nhưng cảnh báo nguy cơ nghẽn sản xuất linh kiện như đầu dò tên lửa và đất hiếm.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/theres-promise-and-pitfalls-in-the-armys-low-cost-interceptor-plan-experts-say/","significance":"Phản ánh áp lực tiêu hao đạn đánh chặn đắt tiền của Mỹ sau các đợt tiêu hao lớn, thúc đẩy tìm giải pháp đánh chặn rẻ hơn."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Hải quân Mỹ tiết lộ bước tiếp theo của chương trình tàu mặt nước không người lái MUSV","summary":"Theo thông báo ngày 7/7, Hải quân Mỹ chuẩn bị phát hành yêu cầu đề xuất nguyên mẫu (dự kiến tháng 8) cho dòng tàu mặt nước không người lái cỡ trung (MUSV) sức chứa lớn, phục vụ hậu cần và vận chuyển hàng hóa container hóa, theo mô hình 'marketplace' cạnh tranh mới Hải quân áp dụng từ đầu năm.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/defense-systems/2026/07/navy-teases-next-step-key-drone-boat-program/414683/","significance":"Đánh dấu bước tiến cụ thể tiếp theo trong nỗ lực mở rộng hạm đội tàu không người lái của Hải quân Mỹ, sau khi chương trình mua sắm cấp tốc trước đó bị hủy và tái khởi động."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung Relativity Space và Impulse Space vào chương trình phóng an ninh quốc gia","summary":"Lực lượng Không gian Mỹ đưa 2 công ty khởi nghiệp California là Impulse Space và Relativity Federal vào hợp đồng phóng NSSL Phase 3 Lane 1 trị giá 5,6 tỷ USD, mỗi công ty nhận đơn hàng ban đầu 5 triệu USD để đánh giá năng lực. Impulse Space dùng tàu vũ trụ Helios chuyển tải từ quỹ đạo thấp lên quỹ đạo cao trong chưa đầy 1 ngày; Relativity Federal dự kiến phóng tên lửa tái sử dụng Terran R từ Cape Canaveral cuối năm nay.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-adds-relativity-impulse-space-to-national-security-launch-program/","significance":"Mở rộng cạnh tranh trong nhóm nhà cung cấp phóng vệ tinh an ninh quốc gia Mỹ, vốn đang bị đặt câu hỏi vì tập trung quá nhiều vào SpaceX."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump thông báo Quốc hội ý định đưa Syria ra khỏi danh sách quốc gia bảo trợ khủng bố","summary":"Tổng thống Trump thông báo cho Quốc hội Mỹ về quyết định đưa Syria ra khỏi danh sách quốc gia bảo trợ khủng bố mà nước này bị liệt vào từ năm 1979, sau cuộc gặp với Tổng thống Syria Ahmed al-Sharaa. Ngoại trưởng Marco Rubio dẫn các thay đổi tích cực và cam kết chống khủng bố của chính quyền al-Sharaa làm căn cứ; quyết định sẽ có hiệu lực sau 45 ngày nếu Quốc hội không ngăn cản.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/08/trump-informs-congress-of-intent-to-remove-syria-from-state-sponsor-of-terror-list","significance":"Đánh dấu bước ngoại giao lớn nhất của Mỹ với chính quyền hậu Assad, chấm dứt 47 năm cô lập ngoại giao với Syria."},{"date":"2026-07-09","category":"Kinh tế","title":"Đơn xin trợ cấp thất nghiệp Mỹ giảm xuống 215.000 vào tuần kết thúc ngày 4/7","summary":"Số đơn xin trợ cấp thất nghiệp mới của Mỹ giảm 4.000 xuống 215.000 vào tuần kết thúc ngày 4 tháng 7, thấp hơn dự báo của các nhà kinh tế kỳ vọng 218.000-220.000. Dữ liệu cho thấy thị trường lao động Mỹ vẫn ổn định tuy đã chứng tỏ dấu hiệu nguội lạnh.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/video/2026/07/09/jobless-claims-moved-lower-during-holiday-week.html","significance":"Mức yêu cầu trợ cấp thấp hơn dự báo cho thấy sức khỏe tương đối của thị trường lao động Mỹ."},{"date":"2026-07-09","category":"Kinh tế","title":"Doanh số bán nhà cũ Mỹ giảm 2,4% tháng 6, giá đạt kỷ lục","summary":"Doanh số bán nhà cũ tại Mỹ giảm 2,4% từ tháng 5 xuống 4,09 triệu unit, vượt quá dự báo của các nhà phân tích. Tuy nhiên, giá trung vị của căn nhà đã bán đạt mức kỷ lục 440.600 USD, tăng 1,8% so với năm trước.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/09/june-home-sales-prices.html","significance":"Doanh số nhà cũ giảm dù giá cao kỷ lục phản ánh sự cạnh tranh dữ dội và căng thẳng của người mua nhà."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Quân đội Mỹ thử nghiệm hệ thống đặt mìn tự động Autonomous Volcano","summary":"Quân đội Mỹ thử nghiệm thành công phiên bản tự động của bộ phân tán mìn M139 lắp trên xe Palletized Load System. Hệ thống có thể đặt tới 960 mìn trên diện tích 32 mẫu Anh mà không cần điều khiển từ xa, tự động ghi vị trí lên bản đồ chiến trường chung.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-military/2026/07/07/us-army-tests-autonomous-mass-mine-laying/","significance":"Nâng cao khả năng công binh chiến đấu thông qua tự động hoá, giảm rủi ro cho binh sĩ."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lầu Năm Góc tiếp tục gặp khó trong phát triển vũ khí, báo cáo GAO","summary":"Báo cáo của Cơ quan Kiểm toán Chính phủ Mỹ (GAO) cho thấy thời gian phát triển vũ khí trung bình đã vượt 12 năm. Nhiều chương trình theo lộ trình rút gọn MTA dù công nghệ chưa chín muồi, gây đội chi phí và trễ tiến độ.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/pentagon-continues-to-struggle-with-key-weapons-development-timelines-gao/","significance":"Phản ánh thách thức dài hạn trong quá trình phát triển vũ khí hiệu quả của Lầu Năm Góc."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump tín hiệu sẵn sàng nâng cấp quan hệ với Thổ Nhĩ Kỳ, xem xét bán máy bay F-35","summary":"Trong cuộc gặp song phương ở Ankara, Tổng thống Trump thông báo sẽ nâng cấp quan hệ với Thổ Nhĩ Kỳ bằng cách dỡ bỏ lệnh trừng phạt và xem xét bán máy bay chiến đấu F-35. Trump khẳng định sẽ ra quyết định sớm về việc cho phép Thổ Nhĩ Kỳ quay trở lại chương trình F-35.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/7/trump-says-will-lift-sanctions-on-turkiye-consider-selling-f-35s","significance":"Động thái này đánh dấu sự thay đổi đáng kể trong chính sách Mỹ đối với Thổ Nhĩ Kỳ và có thể tác động đến cân bằng quân sự ở Trung Đông."},{"date":"2026-07-09","category":"Ngoại giao","title":"Mỹ cam kết tiếp tục đàm phán với Iran bất chấp các cuộc tấn công gần đây","summary":"Phát ngôn viên Mỹ xác nhận rằng Mỹ sẽ tiếp tục các cuộc đàm phán kỹ thuật với Iran mặc dù hai bên vừa trao đổi các cuộc tấn công. Các quan chức Mỹ nhấn mạnh cam kết của họ đối với quá trình đàm phán để tìm kiếm giải pháp lâu dài cho xung đột.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/09/trump-iran-strait-hormuz-battle","significance":"Cam kết tiếp tục đàm phán của Mỹ cho thấy kỳ vọng rằng hòa bình vẫn có thể đạt được bất chấp những thách thức quân sự gần đây."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ hoàn tất tái cơ cấu mua sắm, lập 9 danh mục đầu tư","summary":"US Space Force hoàn tất tái tổ chức hệ thống mua sắm, chia thành 9 danh mục đầu tư (acquisition portfolios) nhằm tăng tốc phát triển và triển khai năng lực không gian.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-completes-procurement-reorganization-creating-nine-acquisition-portfolios/","significance":"Cho thấy nỗ lực cải tổ quy trình mua sắm quốc phòng Mỹ để bắt kịp tốc độ cạnh tranh không gian với Trung Quốc và Nga."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ trao 40 triệu USD cho Pulse Space phát triển truyền năng lượng bằng laser","summary":"Lực lượng Không gian Mỹ (US Space Force) cấp 40 triệu USD cho công ty Pulse Space để phát triển công nghệ truyền tải năng lượng bằng laser trên quỹ đạo.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-awards-pulse-space-40-million-to-advance-laser-power-technology/","significance":"Phản ánh Mỹ đầu tư vào hạ tầng năng lượng không gian — nền tảng cho các hệ thống quân sự trên quỹ đạo thế hệ mới."},{"date":"2026-07-09","category":"Chính trị","title":"Dự luật lưỡng đảng có thể cho phép quân nhân Mỹ kiện quân đội vì bị tấn công tình dục","summary":"Một dự luật do các nghị sĩ Dân chủ và Cộng hòa giới thiệu có thể tháo gỡ 'học thuyết Feres' năm 1950 vốn cấm quân nhân tại ngũ kiện chính phủ, mở đường cho các vụ kiện liên quan tấn công tình dục trong quân đội.","sourceName":"Task & Purpose","sourceUrl":"https://taskandpurpose.com/news/military-law-assault-feres-lawsuit/","significance":"Nếu thông qua, sẽ đảo ngược tiền lệ pháp lý kéo dài 75 năm và thay đổi căn bản trách nhiệm giải trình của quân đội Mỹ."},{"date":"2026-07-09","category":"Chính trị","title":"Mỹ không kích 90 mục tiêu Iran, tuyên bố chấm dứt ngừng bắn","summary":"Bộ Tư lệnh Trung tâm Mỹ (CENTCOM) thông báo hoàn tất đợt không kích bổ sung nhằm vào khoảng 90 mục tiêu quân sự Iran ngày 8/7 — gồm hệ thống phòng không, kho tên lửa/UAV và hạ tầng hậu cần — nhằm làm suy yếu khả năng đe dọa hàng hải của Tehran ở eo biển Hormuz. Cả Mỹ và Iran đều tuyên bố ngừng bắn đã chấm dứt.","sourceName":"Dân Trí","sourceUrl":"https://dantri.com.vn/the-gioi/my-trut-hoa-luc-tan-cong-90-muc-tieu-cua-iran-20260709142425458.htm","significance":"Việc Mỹ tấn công cả hạ tầng bên trong Iran — lần đầu kể từ thỏa thuận ngừng bắn 8/4 — cho thấy lệnh ngừng bắn đã sụp đổ và nguy cơ quay lại chiến tranh toàn diện đang hiện hữu, kéo theo rủi ro cho giá dầu và an ninh hàng hải toàn cầu."},{"date":"2026-07-09","category":"Chính trị","title":"Lý do Tổng thống Trump phát lệnh không kích liên tiếp vào Iran","summary":"Một quan chức Mỹ nêu hai lý do chính khiến Tổng thống Trump quyết định tiến hành các đợt không kích mới nhằm vào Iran trong hai ngày, chủ yếu là để đáp trả các vụ tấn công tàu chở dầu ở eo biển Hormuz và răn đe Tehran đóng eo biển.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/vi-sao-tong-thong-trump-quyet-dinh-khoi-phuc-tan-cong-iran-tren-quy-mo-lon-185260709071823944.htm","significance":"Quyết định leo thang phản ánh Nhà Trắng ưu tiên bảo vệ tự do hàng hải và nguồn cung dầu hơn là giữ nguyên trạng ngừng bắn, đặt Trump vào thế phải chọn giữa xung đột kéo dài và áp lực cạn kho dự trữ dầu trong nước."},{"date":"2026-07-09","category":"Ngoại giao","title":"Trump dọa cấm vận thương mại Tây Ban Nha, đòi Greenland tại thượng đỉnh NATO","summary":"Tổng thống Trump chỉ trích gay gắt Tây Ban Nha vì đóng góp quốc phòng không đủ và muốn các nước NATO cắt toàn bộ giao thương với Madrid, đồng thời tái khẳng định yêu sách với Greenland, phơi bày rạn nứt trong liên minh.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/tong-thong-trump-muon-cac-nuoc-nato-cat-toan-bo-giao-thuong-voi-tay-ban-nha.htm","significance":"Việc công khai gây sức ép với một đồng minh NATO cho thấy Trump sẵn sàng dùng công cụ kinh tế để ép chi tiêu quốc phòng, làm dấy lên lo ngại về sự gắn kết của liên minh ngay tại hội nghị được cho là biểu tượng đoàn kết."},{"date":"2026-07-09","category":"Ngoại giao","title":"Trump ngỏ ý rút bớt quân Mỹ khỏi châu Âu, gắn với vấn đề Greenland","summary":"Tổng thống Trump cho biết quyết định về quy mô hiện diện quân sự của Mỹ tại châu Âu sẽ phụ thuộc vào việc giải quyết vấn đề Greenland, tạo thêm sức ép lên các đồng minh sau thượng đỉnh NATO Ankara.","sourceName":"Dân Trí","sourceUrl":"https://dantri.com.vn/the-gioi/tong-thong-trump-noi-ve-kha-nang-rut-bot-quan-doi-my-khoi-chau-au-20260709143820283.htm","significance":"Gắn cam kết an ninh với một đòi hỏi lãnh thổ là bước đi chưa từng có, buộc châu Âu phải tính đến kịch bản tự chủ quốc phòng nếu chiếc ô
