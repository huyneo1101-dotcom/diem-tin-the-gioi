<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f5f2ec">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Điểm Tin">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>try{var _t=localStorage.getItem('dt.theme');var _v=(_t==='dark'||_t==='intel')?_t:'light';document.documentElement.setAttribute('data-theme',_v);}catch(e){}</script>
<title>Điểm Tin Thế Giới</title>
<meta name="description" content="Kinh tế · Chính trị · Ngoại giao · Công nghệ quân sự — Thế giới Chính trị · Kinh tế · Quân sự · Ngoại giao — cập nhật hằng ngàyamp; Mỹ">
<meta property="og:title" content="Điểm Tin Thế Giới">
<meta property="og:description" content="Kinh tế · Chính trị · Ngoại giao · Công nghệ quân sự — Thế giới Chính trị · Kinh tế · Quân sự · Ngoại giao — cập nhật hằng ngàyamp; Mỹ">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&family=Lora:wght@400;700&family=Merriweather:wght@400;700&family=Noto+Sans:wght@400;700&family=Noto+Serif:wght@400;700&family=Roboto:wght@400;700&display=swap">
<style>
:root{--fs:1;
  --bg:#f5f2ec;--paper:#fff;--paper2:#f7f5f1;--ink:#1b1b1b;--title:#141414;--sum:#3a352e;
  --muted:#6b6459;--muted2:#8a8378;--line:#d8d2c6;--line2:#ded8cc;--accent:#b3282d;
  --soft:#efeae0;--note-ink:#5a5349;--star:#c4b48f;--star-on:#d4a017;--accent-soft:#fbeceb;
  --drill-bg:#fbfaf7;--relate-bg:#eef3ee;--green:#1f8a54}
[data-theme=dark]{
  --bg:#1a1712;--paper:#242019;--paper2:#2a251d;--ink:#ece7db;--title:#f5f1e8;--sum:#cfc8ba;
  --muted:#a89f8f;--muted2:#8f8676;--line:#3a352b;--line2:#322e26;--accent:#e07a6f;
  --soft:#2b2620;--note-ink:#cfc8ba;--star:#6b6353;--star-on:#e0b53a;--accent-soft:#3a2622;
  --drill-bg:#201d17;--relate-bg:#1e2620;--green:#4fb07a}
[data-theme=intel]{
  --bg:#12151c;--paper:#1a1e27;--paper2:#1e2530;--ink:#e6e8ec;--title:#f3f5f8;--sum:#aab1bd;
  --muted:#8b93a3;--muted2:#6b7280;--line:#2a303c;--line2:#232935;--accent:#d99a2b;
  --soft:#1e2530;--note-ink:#aab1bd;--star:#5a6472;--star-on:#d99a2b;--accent-soft:#2a2417;
  --drill-bg:#171b23;--relate-bg:#17211c;--green:#4faa78}
/* Chế độ Intel: vạch hổ phách bên trái mỗi thẻ + tiêu đề mục mono cho ra chất bản tin tình báo */
[data-theme=intel] .card{border-left:3px solid var(--accent)}
[data-theme=intel] .bs-eye,[data-theme=intel] .bs-colh,[data-theme=intel] .bs-si .k{font-family:ui-monospace,Menlo,Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double var(--ink);margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:7px 2px;font-size:calc(11.5px*var(--fs));color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;flex-wrap:wrap;gap:2px 4px;margin:14px 0 16px;border-bottom:2px solid var(--ink)}
.tb{white-space:nowrap;padding:9px 14px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted);cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
@media(max-width:520px){.tb{padding:8px 11px;font-size:calc(13.5px*var(--fs))}}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}
.note{font-size:calc(13px*var(--fs));color:var(--note-ink);background:var(--soft);border-left:3px solid var(--accent);padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:var(--paper);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.on .dot{outline:1px solid var(--paper)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid var(--line2);padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
.tier{display:inline-block;font-size:calc(9.5px*var(--fs));font-weight:800;letter-spacing:.2px;padding:1px 7px;border-radius:10px;border:1px solid var(--line);color:var(--muted2);white-space:nowrap}
.tier.t1{color:#1f8a54;border-color:#1f8a5455}.tier.t2{color:#2b5f9e;border-color:#2b5f9e55}.tier.t3{color:#8e44ad;border-color:#8e44ad55}.tier.t4{color:#0e7c86;border-color:#0e7c8655}.tier.t5{color:var(--muted2)}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:var(--title)}
.sum{font-size:calc(14px*var(--fs));color:var(--sum)}
.take{font-size:calc(13.5px*var(--fs));color:var(--ink);background:var(--soft);border-radius:2px;padding:8px 11px;margin:7px 0}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:var(--muted2)}
.src{font-size:calc(12.5px*var(--fs));color:var(--accent);text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.favb{margin-left:auto;background:none;border:none;cursor:pointer;font-size:calc(18px*var(--fs));line-height:1;color:var(--star);padding:0 2px;font-family:inherit}
.favb:hover{color:var(--star-on)}
.favb.on{color:var(--star-on)}
.filterbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px 18px;margin:-2px 0 14px}
.fg{display:inline-flex;align-items:center;gap:6px}
.filterbar .fg>span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.filterbar>span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px}
.dsel{font-family:inherit;font-size:calc(13px*var(--fs));padding:6px 9px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);cursor:pointer}
.empty{color:var(--muted2);text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
/* ==== Tab Tập trận ==== */
.drill{margin-bottom:24px;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--drill-bg)}
.drill-h{padding:14px 14px 12px;background:var(--soft);border-bottom:1px solid var(--line2)}
.drill-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:6px}
.dpill{font-size:calc(10.5px*var(--fs));font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px}
.dpill.live{background:#c0392b;color:#fff}
.dpill.up{background:#2b5f9e;color:#fff}
.dpill.done{background:#1f8a54;color:#fff}
.seg{display:flex;gap:5px;margin:0 0 16px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;padding:4px}
.seg button{flex:1;padding:9px 6px;border:none;background:none;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700;font-size:calc(13.5px*var(--fs));color:var(--muted);white-space:nowrap}
.seg button.on{background:var(--ink);color:var(--bg)}
/* Pill "Bị loại" — tách khỏi cụm chip lọc (đẩy về cuối hàng), tô đỏ nhạt cho khác luồng đọc. */
.chips .chip-rej{margin-left:auto;border-color:#c0392b;color:#c0392b}
.chips .chip-rej.on{background:#c0392b;color:#fff;border-color:#c0392b}
@media (max-width:640px){.chips .chip-rej{margin-left:0}}
#concept-fab{position:fixed;z-index:90;background:var(--accent);color:#fff;border:none;border-radius:16px;padding:7px 13px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.32);display:none}
.cadd{display:flex;gap:7px;margin:0 0 14px}
.cadd input{flex:1;min-width:0;border:1px solid var(--line);background:var(--paper);border-radius:7px;padding:9px 11px;font-family:inherit;font-size:calc(13.5px*var(--fs));color:var(--ink);outline:none}
.cadd button{border:none;background:var(--ink);color:var(--bg);border-radius:7px;padding:9px 16px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.acctform{display:flex;flex-direction:column;gap:8px}
.acctform input{width:100%;border:1px solid var(--line);background:var(--paper);border-radius:7px;padding:9px 11px;font-family:inherit;font-size:calc(13.5px*var(--fs));color:var(--ink);outline:none}
.acctform input:focus{border-color:var(--accent)}
.acctbtns{display:flex;gap:8px}
.acctbtns .wbtn{flex:1;justify-content:center}
.wbtn:disabled{opacity:.45;cursor:not-allowed}
.wbtn.ghost{font-weight:600;color:var(--muted)}
.pickb{display:inline-flex;align-items:center;gap:4px;font-size:calc(11.5px*var(--fs));color:var(--muted);cursor:pointer;user-select:none;padding:2px 7px;border:1px solid var(--line);border-radius:999px;white-space:nowrap}
.pickb input{margin:0;cursor:pointer;accent-color:var(--accent)}
.pickb.on{color:var(--accent);border-color:var(--accent);font-weight:700}
.clist{display:flex;flex-direction:column;gap:10px}
.citem{border:1px solid var(--line2);border-radius:8px;padding:11px 13px;background:var(--drill-bg)}
.cterm{font-weight:800;font-size:calc(15px*var(--fs));color:var(--title);display:flex;align-items:center;gap:8px}
.cx{margin-left:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;font-family:inherit;line-height:1;padding:0 2px}
.cx:hover{color:var(--accent)}
.cexp{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:6px;line-height:1.55}
.cpend{font-style:italic;color:var(--muted2)}
.expbar{margin:0 0 14px}
.wbtn{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:7px;padding:9px 14px;font-weight:700;font-family:inherit;font-size:calc(13.5px*var(--fs));cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.wbtn:hover{border-color:var(--accent);color:var(--accent)}
.wbtn:active{transform:scale(.98)}
.drill-dates{font-size:calc(12px*var(--fs));color:var(--muted);font-weight:700}
.drill-name{font-family:inherit;font-size:calc(21px*var(--fs));font-weight:800;line-height:1.25;color:var(--title);margin-bottom:5px}
.drill-meta{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:2px}
.drill-sum{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:8px;line-height:1.5}
.drill .list{padding:0 14px 4px}
.drill .card{padding:14px 0}
.drill .card:last-child{border-bottom:none}
.relate{font-size:calc(13px*var(--fs));color:var(--ink);background:var(--relate-bg);border-left:3px solid var(--green);border-radius:2px;padding:8px 11px;margin:8px 0 2px;line-height:1.5}
.relate b{color:var(--green)}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double var(--ink);font-size:calc(11.5px*var(--fs));color:var(--muted2);text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:var(--muted2);margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid var(--line);background:var(--paper);border-radius:6px;cursor:pointer;font-size:16px;color:var(--ink)}
.rp-fonts button .vi{font-size:12px;color:var(--muted2);font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:var(--accent);background:var(--accent-soft)}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}

/* ==== Tính năng mới ==== */
.toolbar{display:flex;align-items:center;gap:8px;margin:0 0 14px}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 11px}
.search input{flex:1;min-width:0;border:none;background:none;outline:none;font-family:inherit;font-size:calc(14px*var(--fs));color:var(--ink)}
.search .sx{cursor:pointer;color:var(--muted2);border:none;background:none;font-size:16px;font-family:inherit;padding:0 2px;line-height:1}
.searchinfo{font-size:calc(12.5px*var(--fs));color:var(--muted2);margin:-4px 0 12px}
.card.read .title{color:var(--muted)}
.card.read .sum{opacity:.7}
.newb{display:inline-block;font-size:calc(9.5px*var(--fs));font-weight:800;letter-spacing:.5px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 6px;margin-right:6px;vertical-align:1px}
.foot-act{margin-left:auto;display:inline-flex;align-items:center;gap:9px}
.foot-act .favb{margin-left:0}
.shareb,.copyb{background:none;border:none;cursor:pointer;color:var(--muted2);padding:2px;line-height:0;display:inline-flex;align-items:center;border-radius:5px}
.shareb svg,.copyb svg{display:block}
.shareb:active,.copyb:active{transform:scale(.9)}
.shareb:hover,.copyb:hover{color:var(--accent)}
.voteb{background:none;border:none;cursor:pointer;padding:1px 2px;line-height:1;font-size:calc(15px*var(--fs));font-family:inherit;opacity:.4;filter:grayscale(1);transition:opacity .12s,filter .12s,transform .1s}
.voteb:hover{opacity:.85;filter:grayscale(.3)}
.voteb:active{transform:scale(.88)}
.voteb.on{opacity:1;filter:none}
.rejsec{font-weight:800;font-size:calc(13.5px*var(--fs));color:var(--muted2);margin:14px 2px 6px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.rejcard{opacity:.92}
.rejwhy{font-size:calc(12.5px*var(--fs));color:#c0392b;background:rgba(192,57,43,.08);border-radius:7px;padding:6px 9px;margin:8px 0 0}
.rejacts{display:flex;gap:8px;align-items:center;margin:9px 0 0;flex-wrap:wrap}
.rejb{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:8px;padding:7px 12px;font-weight:700;font-family:inherit;font-size:calc(13px*var(--fs));cursor:pointer}
.rejb.like:hover{border-color:var(--green);color:var(--green)}
.rejb.like.on{background:rgba(46,199,122,.16);border-color:var(--green);color:var(--green)}
.rejb.dislike:hover{border-color:#c0392b;color:#c0392b}
.rejb.dislike.on{background:rgba(192,57,43,.14);border-color:#c0392b;color:#c0392b}
.rejb.move{margin-left:auto}
.rejb.move:hover{border-color:var(--accent);color:var(--accent)}
.rejb:active{transform:scale(.97)}
#toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(18px);z-index:80;background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:8px;font-size:14px;font-family:inherit;box-shadow:0 6px 24px rgba(0,0,0,.35);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.rp-themes{display:flex;gap:6px}
.rp-themes button{flex:1;padding:8px 6px;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-size:12.5px;font-family:inherit;color:var(--ink)}
.rp-themes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.morebtn{flex:none;background:none;border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:.8rem;color:var(--ink);cursor:pointer;white-space:nowrap}
.morebtn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.morebtn.sm{padding:2px 9px;font-size:.72rem}
/* ==== Trang chủ — layout Broadsheet (A). Màu qua biến --* nên tự đổi theo Sáng/Tối/Intel ==== */
.bs-lead{display:grid;grid-template-columns:1.62fr 1fr;gap:0;border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);margin-bottom:20px}
.bs-main{padding:16px 22px 18px 0;border-right:1px solid var(--line)}
.bs-eye{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:7px}
.bs-main h2{font-family:Georgia,"Times New Roman",serif;font-size:clamp(1.35rem,3.4vw,1.75rem);line-height:1.14;margin:0 0 9px;font-weight:800;color:var(--title);letter-spacing:-.01em;text-wrap:balance}
.bs-lede{margin:0 0 10px;font-size:.9rem;line-height:1.55;color:var(--sum)}
.bs-meta{font-size:.72rem;color:var(--muted);margin-bottom:6px}
.bs-latest{display:block;font-size:.82rem;color:var(--ink);text-decoration:none;padding:8px 0;border-top:1px solid var(--line2);margin:8px 0;line-height:1.35}
.bs-latest b{color:var(--accent);font-family:Georgia,serif}
.bs-latest:hover{color:var(--accent)}
.bs-side{padding:16px 0 16px 20px;display:flex;flex-direction:column;gap:12px}
.bs-sideh{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:800;border-bottom:1px solid var(--line2);padding-bottom:6px}
.bs-si{display:block;text-decoration:none;color:var(--ink);border-bottom:1px solid var(--line2);padding-bottom:11px}
.bs-si:last-of-type{border-bottom:0}
.bs-si .k{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700}

<script>
var DATA = {"brand":"Điểm Tin Thế Giới","tagline":"Kinh tế · Chính trị · Ngoại giao · Công nghệ quân sự — cập nhật hằng ngày","generatedAt":"2026-07-23","worldGeneratedAt":"2026-07-23","usGeneratedAt":"2026-07-23","worldNews":[{"date":"2026-07-22","category":"Ngoại giao","title":"Úc phản đối Trung Quốc thử tên lửa đạn đạo phóng từ tàu ngầm rơi gần các đảo quốc Thái Bình Dương","summary":"Ngoại trưởng Úc Penny Wong tuyên bố vụ tên lửa đạn đạo phóng từ tàu ngầm (SLBM, mang đầu đạn giả) của Trung Quốc bay sâu vào Thái Bình Dương và rơi gần Solomon, Nauru, Tuvalu là hành động 'gây mất ổn định', và đã nêu thẳng với Ngoại trưởng Vương Nghị bên lề họp ASEAN ở Manila. Bà cho biết Úc không nhận được thông báo trước đầy đủ, và khoảng 12 quốc đảo Thái Bình Dương cũng lên tiếng phản đối vì khu vực này tự tuyên bố phi hạt nhân.","sourceName":"Associated Press","sourceUrl":"https://www.yahoo.com/news/world/articles/australia-protests-chinas-destabilising-missile-053643489.html","significance":"Vụ thử SLBM ngay sát các đảo quốc Thái Bình Dương làm gia tăng lo ngại về năng lực răn đe hạt nhân biển của Bắc Kinh và đẩy căng thẳng ngoại giao Úc-Trung lên cao ngay trước thềm các cuộc họp an ninh khu vực.","region":"Ấn Độ Dương - Thái Bình Dương","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Công nghệ quân sự","title":"Hy Lạp chi 3,5 tỷ euro mua lá chắn phòng không đa tầng 'Achilles Shield' của Israel","summary":"Chính phủ Hy Lạp phê duyệt hợp đồng trị giá 3,5 tỷ euro (khoảng 4 tỷ USD) mua hệ thống phòng không đa tầng Achilles Shield do Rafael và IAI (Israel) phát triển, tích hợp radar và tên lửa chống đạn đạo, chống máy bay và chống drone. Bộ trưởng Quốc phòng Nikos Dendias cho biết hệ thống sẽ vận hành đầy đủ trong 35 tháng, với ít nhất 25% linh kiện sản xuất tại Hy Lạp.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/23/greece-to-buy-4-billion-air-defence-system-from-israel/","significance":"Thương vụ nằm trong kế hoạch chi 28 tỷ euro quốc phòng đến năm 2036 của Hy Lạp nhằm thay các hệ thống Patriot/S-300 cũ, phản ánh xu hướng châu Âu tăng tốc mua vũ khí công nghệ cao từ Israel giữa lúc căng thẳng với Thổ Nhĩ Kỳ chưa hạ nhiệt.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Công nghệ quân sự","title":"Fincantieri ký hợp đồng 317 triệu euro nâng cấp chương trình tàu ngầm U212 NFS cho Hải quân Ý","summary":"Tập đoàn Fincantieri (Ý) ký thỏa thuận trị giá 317 triệu euro với cơ quan vũ khí chung châu Âu OCCAR để mở rộng chương trình tàu ngầm thế hệ mới U212 NFS, bổ sung hệ thống đối kháng của WASS, pin lithium-ion và hệ thống quản lý tác chiến mới nhằm tăng khả năng tàng hình và an ninh mạng. Chiếc tàu ngầm thứ tư được đẩy nhanh bàn giao từ năm 2034 lên 2032.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/fincantieri-strengthens-the-u212-nfs-program-with-new-technologies-advanced-services-and-accelerated-delivery-schedule/","significance":"Việc đẩy nhanh tiến độ và nâng cấp công nghệ cho hạm đội tàu ngầm chủ lực của Ý củng cố năng lực tác chiến dưới nước của NATO tại Địa Trung Hải, đồng thời giữ vững vị thế công nghiệp quốc phòng châu Âu.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Kinh tế","title":"ECB giữ nguyên lãi suất 2,25%, để ngỏ khả năng tăng thêm vào mùa thu","summary":"Ngân hàng Trung ương châu Âu (ECB) giữ nguyên bộ ba lãi suất chủ chốt (tiền gửi 2,25%, tái cấp vốn 2,40%, cho vay biên 2,65%) sau lần tăng đầu tiên trong ba năm hồi tháng 6. Chủ tịch Christine Lagarde cảnh báo bất định vẫn cao và tác động lạm phát đầy đủ từ cú sốc năng lượng do xung đột Trung Đông chưa bộc lộ hết, để ngỏ khả năng tăng lãi suất lần hai vào mùa thu.","sourceName":"Euronews","sourceUrl":"https://www.euronews.com/business/2026/07/23/ecb-holds-rates-at-225-as-the-reignited-iran-war-keeps-a-second-hike-in-play","significance":"ECB cân bằng giữa rủi ro lạm phát do giá dầu tăng vì chiến sự Iran và đà tăng trưởng yếu của Eurozone, cho thấy các ngân hàng trung ương lớn ngày càng bị cuốn vào biến động địa chính trị thay vì chỉ dữ liệu kinh tế nội địa.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Kinh tế","title":"Dầu Brent vọt qua mốc 100 USD/thùng lần đầu sau nhiều tháng, chứng khoán Mỹ lao dốc","summary":"Giá dầu Brent có lúc vượt 100 USD/thùng (tăng khoảng 5-6%) trong phiên 23/7, mức cao nhất kể từ tháng 5, sau khi Houthi thân Iran tuyên bố tấn công hai tàu chở dầu của Saudi Arabia trên Biển Đỏ và ông Trump đe dọa ném bom hạ tầng Iran nếu nước này tấn công tàu ở eo biển Hormuz. Phố Wall phản ứng tiêu cực: S&P 500 giảm 1,1%, Dow Jones mất 415 điểm, Nasdaq giảm 1,7%.","sourceName":"Associated Press","sourceUrl":"https://www.pressdemocrat.com/2026/07/23/wall-street-brent-crude-iran-war/","significance":"Nguy cơ gián đoạn dòng chảy dầu qua Hormuz - nơi vận chuyển 1/5 lượng dầu khí giao dịch toàn cầu - đe dọa đẩy lạm phát tăng trở lại, có thể buộc các ngân hàng trung ương trì hoãn hạ lãi suất và làm chậm tăng trưởng toàn cầu.","region":"Trung Đông","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Kinh tế","title":"Yen Nhật xuyên thủng mốc 163 đổi 1 USD, thấp nhất khoảng 40 năm, cảnh báo can thiệp","summary":"Đồng yen giảm quá 163 yen/USD lần đầu tiên kể từ năm 1986, làm dấy lên nguy cơ Bộ Tài chính Nhật can thiệp thị trường ngoại hối. Bộ trưởng Tài chính Satsuki Katayama tuyên bố chính phủ sẵn sàng can thiệp nếu biến động tỷ giá quá mức đe dọa ổn định tài chính, trong khi thị trường đồn đoán BOJ có thể tăng lãi suất nhanh hơn dự kiến.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/22/yen-slides-past-163-raising-intervention-alert.html","significance":"Đà mất giá yen kéo dài phản ánh khoảng cách lãi suất Nhật-Mỹ và rủi ro tài khóa, đặt Nhật Bản trước lựa chọn khó giữa can thiệp thị trường và đẩy nhanh lộ trình thắt chặt tiền tệ.","region":"Đông Á","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Kinh tế","title":"Thuế 25% của Mỹ lên hàng Brazil chính thức có hiệu lực, Lula dọa kiện WTO","summary":"Mức thuế Section 301 25% mà USTR áp lên phần lớn hàng hóa Brazil (viện dẫn thương mại số, sở hữu trí tuệ, phá rừng bất hợp pháp) chính thức có hiệu lực từ 22/7, ảnh hưởng khoảng 18% kim ngạch xuất khẩu Brazil sang Mỹ (~7,4 tỷ USD). Tổng thống Lula tuyên bố thuế này 'bất hợp pháp và áp đặt tùy tiện', sẽ dùng Luật Đối ứng và khiếu nại lên WTO, nhưng tạm hoãn trả đũa ngay để bảo vệ doanh nghiệp xuất khẩu.","sourceName":"The Washington Post","sourceUrl":"https://www.washingtonpost.com/world/2026/07/22/trumps-new-tariffs-brazil-could-tip-election-lula-over-bolsonaro/","significance":"Phép thử cho chiến lược thuế quan đơn phương của Mỹ dựa trên cáo buộc phi thương mại (chính trị, môi trường), có thể định hình cách Washington gây sức ép với các đối tác khác.","region":"Châu Mỹ","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Chính trị","title":"Pháp thông qua luật cấm mạng xã hội với trẻ dưới 15 tuổi, nước EU đầu tiên","summary":"Sau khi Thượng viện thông qua, Hạ viện Pháp biểu quyết 279-81 chốt luật cấm trẻ dưới 15 tuổi lập tài khoản mạng xã hội, đồng thời cấm dùng điện thoại trong trường học. Lệnh cấm áp dụng hai giai đoạn: chặn tài khoản mới từ 1/9/2026, tài khoản hiện có từ tháng 1/2027; điều khoản buộc nền tảng xác minh tuổi qua cơ quan Arcom đã bị loại khỏi văn bản cuối.","sourceName":"CBS News","sourceUrl":"https://www.cbsnews.com/news/france-social-media-ban-under-15s-first-in-eu/","significance":"Pháp trở thành nước EU đầu tiên luật hóa lệnh cấm mạng xã hội theo độ tuổi, có thể tạo tiền lệ pháp lý cho cả khối EU trong tranh luận về quản lý nền tảng số và bảo vệ trẻ em.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Chính trị","title":"Duma Nga thông qua luật 'tử hình dân sự' cắt quyền lợi ngân hàng, lãnh sự với người bất đồng chính kiến ở nước ngoài","summary":"Hạ viện Nga (State Duma) thông qua ở cả lần đọc thứ hai và thứ ba gói dự luật cho phép đóng băng tài sản, chặn giao dịch ngân hàng trực tuyến và tước dịch vụ lãnh sự đối với công dân Nga bị kết án vắng mặt vì 'nói xấu' quân đội, tham gia tổ chức 'không mong muốn' hoặc bị gắn mác 'đặc vụ nước ngoài'. Dự luật chuyển lên Hội đồng Liên bang và có hiệu lực ngay khi Tổng thống Putin ký.","sourceName":"The Moscow Times","sourceUrl":"https://www.themoscowtimes.com/2026/07/22/state-duma-passes-civic-death-bills-cutting-off-exiled-critics-from-banking-and-consular-services-a93308","significance":"Thể chế hóa công cụ trấn áp giới bất đồng chính kiến lưu vong, siết chặt kiểm soát nhà nước Nga đối với công dân ở hải ngoại giữa lúc chiến tranh Ukraine kéo dài.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Công nghệ quân sự","title":"Úc lắp ráp hệ thống phòng không lai từ tên lửa SM-2 và Aegis ảo hóa","summary":"Bộ Quốc phòng Úc cùng Lockheed Martin và Hải quân Mỹ thử nghiệm nguyên mẫu phòng không mặt đất tầm trung tại thao trường Woomera, dùng tên lửa SM-2 Block IIIB/IIIC, bệ phóng Derringer, radar mảng pha CEA Technologies và hệ thống chiến đấu Aegis ảo hóa từ tàu khu trục lớp Hobart. Hệ thống đã bắn hạ thành công mục tiêu bay BQM-74E, được xem là phương án chi phí thấp thay cho việc mua mới Patriot.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/23/australia-whips-together-a-hybrid-air-defense-weapon/","significance":"Cho thấy Úc tận dụng khí tài hải quân sẵn có để nhanh chóng lấp khoảng trống phòng không mặt đất, giảm phụ thuộc vào mua sắm hệ thống mới đắt đỏ.","region":"Ấn Độ Dương - Thái Bình Dương","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Công nghệ quân sự","title":"Ấn Độ biên chế tàu săn ngầm ven bờ INS Malvan lớp Mahe","summary":"Hải quân Ấn Độ chính thức biên chế INS Malvan, tàu săn ngầm duyên hải lớp Mahe thứ hai do Cochin Shipyard đóng với hơn 80% linh kiện nội địa. Tàu dài 78m, giãn nước 900 tấn, tốc độ tối đa 25 hải lý/giờ, trang bị sonar gắn thân, tác chiến điện tử và ngư lôi hạng nhẹ phục vụ chống ngầm và rà phá thủy lôi ven bờ.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/indian-navy-commissions-ins-malvan-the-2nd-of-mahe-class-asw-swc/","significance":"Nằm trong loạt 16 tàu ASW-SWC dự kiến hoàn tất năm 2028, củng cố năng lực chống ngầm ven bờ của Ấn Độ tại Ấn Độ Dương.","region":"Ấn Độ Dương - Thái Bình Dương","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Mỹ thông qua xuất khẩu 80 động cơ F110 cho tiêm kích KAAN của Thổ Nhĩ Kỳ","summary":"CEO Turkish Aerospace Mehmet Demiroglu xác nhận Quốc hội Mỹ đã thông qua giấy phép xuất khẩu 80 động cơ General Electric F110, lô đầu dự kiến giao năm 2027 và sản xuất loạt từ 2028. Thổ Nhĩ Kỳ sẽ dùng động cơ Mỹ cho tới khi động cơ nội địa TF35000 sẵn sàng vào năm 2032.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/turkish-aerospace-ceo-us-cleared-kaan-fighter-engines-for-export/","significance":"Gỡ rào cản địa chính trị lớn từ vụ Thổ Nhĩ Kỳ mua S-400 năm 2019 từng khiến nước này bị loại khỏi chương trình F-35, giúp chương trình tiêm kích thế hệ 5 KAAN giữ đúng tiến độ.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Ukraine ra mắt drone đánh chặn phản lực P1-SUN Jetkiller tốc độ 370km/h diệt Shahed","summary":"Công ty Skyfall của Ukraine giới thiệu phiên bản nâng cấp drone đánh chặn phản lực P1-SUN Jetkiller, tốc độ tối đa 370km/h (từ 310km/h), đã có hàng chục lần bắn hạ Shahed ngoài mặt trận. Drone có thể phóng từ mặt đất hoặc gắn lên trực thăng để tăng tầm, sản xuất loạt từ tháng 8 với mục tiêu 50.000 chiếc/tháng.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/ukraines-skyfall-unveils-new-drone-interceptor-to-strike-russian-shaheds-faster/","significance":"Tăng tốc độ đánh chặn giúp Ukraine đối phó hiệu quả hơn với chiến thuật Nga giảm tốc Shahed để né phòng không cũ, đồng thời hạ giá thành mỗi lần đánh chặn.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Anh: Babcock, ACUA Ocean và Frankenburg hợp tác hệ thống chống drone trên biển","summary":"Ba công ty Anh ký thỏa thuận hợp tác tại Farnborough Airshow, tích hợp bệ phóng đa năng của Babcock, tên lửa dẫn đường sản xuất hàng loạt của Frankenburg và tàu mặt nước không người lái lớp Pioneer của ACUA Ocean thành hệ thống phòng thủ chống UAS trên biển. Tàu Pioneer đã hoạt động liên tục hơn 100 giờ trên biển không cần can thiệp thủ công.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/babcock-partners-with-acua-ocean-technologies-and-frankenburg-on-maritime-counter-drone-air-defence-systems/","significance":"Đáp ứng nhu cầu cấp bách bảo vệ hạ tầng hàng hải và tàu chiến Anh trước mối đe dọa drone giá rẻ ngày càng phổ biến.","region":"Châu Âu/NATO","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Ngoại giao","title":"Ngoại trưởng Philippines và Trung Quốc trao đổi phản đối gay gắt về vụ đụng độ tại Bãi Cỏ Mây","summary":"Trong cuộc gặp song phương đầu tiên sau hai năm tại Manila ngày 22/7, Ngoại trưởng Philippines Maria Theresa Lazaro phản đối mạnh hành động của hải cảnh Trung Quốc khiến một quân nhân Philippines bị thương gần Bãi Cỏ Mây hôm 20/7. Vương Nghị đáp trả bằng phản đối việc tàu Philippines 'đâm va' tàu chấp pháp Trung Quốc; hai bên nhất trí giữ kênh liên lạc và quản lý căng thẳng.","sourceName":"The Diplomat","sourceUrl":"https://thediplomat.com/2026/07/philippine-chinese-foreign-ministers-exchange-protests-over-south-china-sea-clash/","significance":"Cuộc gặp cấp ngoại trưởng đầu tiên sau 2 năm diễn ra ngay sau vụ đụng độ mới ở Biển Đông, cho thấy hai bên vẫn duy trì kênh đối thoại dù căng thẳng quanh Bãi Cỏ Mây tiếp tục leo thang.","region":"Đông Á","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Ngoại giao","title":"Diễn đàn Khu vực ASEAN thông qua Kế hoạch Hành động Manila 2026-2036","summary":"Tại Diễn đàn Khu vực ASEAN (ARF) lần thứ 33 ở Manila ngày 23/7, các bộ trưởng ngoại giao thông qua Kế hoạch Hành động Manila giai đoạn 2026-2036, định hướng ARF trong thập niên tới theo hướng chuyển từ 'đối thoại phản ứng' sang 'quản lý rủi ro chủ động'. Kế hoạch kêu gọi giải quyết hòa bình tranh chấp theo luật pháp quốc tế và thực hiện đầy đủ các thỏa thuận về Biển Đông.","sourceName":"Báo Tin Tức (TTXVN)","sourceUrl":"https://baotintuc.vn/the-gioi/dien-dan-khu-vuc-asean-thong-qua-ke-hoach-hanh-dong-manila-giai-doan-20262036-20260723181606946.htm","significance":"Văn kiện định hướng chiến lược đầu tiên của ARF trong 10 năm tới, được thông qua với sự tham dự của Mỹ, Trung Quốc, Nga, EU, Nhật Bản, phản ánh nỗ lực ASEAN duy trì vai trò trung tâm trong kiến trúc an ninh khu vực.","region":"Đông Á","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Ngoại giao","title":"ASEAN-Anh thông qua Kế hoạch hành động 2027-2031 và tuyên bố chung về Ấn Độ Dương-Thái Bình Dương","summary":"Tại Hội nghị Bộ trưởng Ngoại giao ASEAN-Anh ở Manila, đồng chủ trì bởi Việt Nam và Anh, hai bên thông qua Kế hoạch hành động ASEAN-Anh giai đoạn 2027-2031 và Tuyên bố chung về hợp tác trong khuôn khổ Tài liệu quan điểm ASEAN về Ấn Độ Dương-Thái Bình Dương. Kế hoạch trước đó (2022-2026) đạt tỷ lệ thực thi 98,9%; văn kiện mới tập trung hợp tác hàng hải, kết nối, phát triển bền vững và kinh tế số.","sourceName":"GOV.UK","sourceUrl":"https://www.gov.uk/government/news/asean-uk-joint-ministerial-statement-on-cooperation-on-the-asean-outlook-on-the-indo-pacific-advancing-together","significance":"Đánh dấu 5 năm quan hệ đối tác đối thoại ASEAN-Anh và làm sâu sắc thêm cam kết của Anh với an ninh hàng hải và luật pháp quốc tế (UNCLOS) tại khu vực Ấn Độ Dương-Thái Bình Dương.","region":"Đông Á","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Kinh tế","title":"Trung Quốc siết bán thiết bị đất hiếm, Lynas đội chi phí mở rộng nhà máy Malaysia","summary":"Hãng khai khoáng Úc Lynas Rare Earths cho biết chi phí mở rộng nhà máy đất hiếm nặng tại Malaysia tăng từ 180 triệu lên gần 294 triệu AUD, do Trung Quốc hạn chế bán thiết bị chế biến đất hiếm cho nhà sản xuất nước ngoài, buộc công ty tìm nguồn thiết bị ngoài Trung Quốc với giá cao hơn.","sourceName":"Nikkei Asia","sourceUrl":"https://asia.nikkei.com/business/markets/commodities/lynas-says-china-s-export-curbs-pushing-up-costs-of-malaysia-expansion","significance":"Đất hiếm là đầu vào chiến lược cho quốc phòng, xe điện và chip; việc Trung Quốc siết xuất khẩu thiết bị chế biến đang định hình lại nỗ lực đa dạng hóa chuỗi cung ứng khoáng sản quan trọng toàn cầu.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-23","category":"Kinh tế","title":"Samsung đàm phán rót khoảng 1 tỷ euro vào startup AI Pháp Mistral, định giá lên 20 tỷ euro","summary":"Theo Financial Times, Samsung Electronics đang đàm phán đầu tư khoảng 1 tỷ euro vào Mistral AI (Pháp) trong vòng gọi vốn mới, có thể đưa định giá công ty lên khoảng 20 tỷ euro, gần gấp đôi mức tháng 9/2025. Quỹ Scaleup Europe của EQT (Thụy Điển) cũng tham gia, ngay sau khi Microsoft cam kết chi hàng tỷ USD cho hạ tầng điện toán của Mistral tại châu Âu. Samsung và Mistral chưa xác nhận.","sourceName":"Reuters","sourceUrl":"https://finance.yahoo.com/technology/ai/articles/samsung-talks-invest-mistral-20-041121785.html","significance":"Nếu hoàn tất, khoản đầu tư củng cố vị thế Mistral như lựa chọn AI 'chủ quyền' của châu Âu nhằm giảm phụ thuộc công nghệ Mỹ, đồng thời cho thấy Samsung mở rộng chiến lược AI ra ngoài mảng bán dẫn/phần cứng.","region":"Châu Âu/NATO"},{"date":"2026-07-22","category":"Kinh tế","title":"EU lần đầu dùng hải quân chặn kiểm tra tàu dầu nghi thuộc 'hạm đội bóng tối' Nga","summary":"Đại diện cấp cao đối ngoại-an ninh EU Kaja Kallas ngày 22/7 xác nhận Chiến dịch EUNAVFOR MED IRINI đã lên kiểm tra tàu chở dầu MV South Star ngày 20/7 vì nghi treo cờ giả (Cameroon) và thuộc 'hạm đội bóng tối' giúp Nga né trừng phạt dầu mỏ. Tàu từng bị Anh và EU trừng phạt dưới tên cũ năm 2025. EU cũng cho phép chiến dịch Atalanta ngoài khơi Somalia thực hiện kiểm tra cờ tương tự.","sourceName":"Ukrainska Pravda","sourceUrl":"https://www.pravda.com.ua/eng/news/2026/07/22/8045390/","significance":"Lần đầu EU dùng lực lượng hải quân trực tiếp chặn kiểm tra tàu 'hạm đội bóng tối' trên biển thay vì chỉ trừng phạt hành chính, đánh dấu bước leo thang siết nguồn thu xuất khẩu dầu của Nga.","region":"Châu Âu/NATO"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Pháp coi Đức là 'tiên phong' trong lá chắn răn đe hạt nhân châu Âu","summary":"Tổng thống Macron nói Đức đóng vai trò 'tiên phong' trong sáng kiến 'răn đe tiền phương' của Pháp công bố tháng 3/2026, đã có 9 nước từ Na Uy đến Hy Lạp tham gia. Tiêm kích Rafale mang vũ khí hạt nhân của Pháp đã ghé căn cứ Nörvenich ở Đức (17/7) tập tiếp dầu chung; Đức sẽ tham gia diễn tập hạt nhân 'Poker' của Pháp vào tháng 9/2026, song vẫn duy trì cơ chế chia sẻ hạt nhân với NATO/Mỹ song song.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/22/backed-by-france-macron-sees-germany-as-nuclear-deterrence-vanguard-in-europe/","significance":"Đánh dấu bước mở rộng ô hạt nhân châu Âu độc lập hơn với Mỹ, giữa lúc châu Âu lo ngại về độ tin cậy của cam kết an ninh Mỹ.","region":"Châu Âu/NATO"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Vệ tinh Thực Tiễn-31 của Trung Quốc quét toàn bộ vành đai địa tĩnh bằng quỹ đạo lạ","summary":"Vệ tinh Shijian-31 (phóng 16/6/2026 bằng Trường Chinh 3B) bay theo quỹ đạo Molniya cải biến nghiêng 63,46 độ, chu kỳ 12,5 giờ, khiến điểm viễn địa gần 39.900km quét qua toàn bộ vành đai địa tĩnh sau khoảng 23 ngày. Công ty theo dõi không gian ComSpOC gọi đây là 'quỹ đạo chưa từng thấy'; Trung Quốc chỉ mô tả vệ tinh dùng để 'khảo sát môi trường không gian'.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/chinas-shijian-31-satellite-is-sweeping-geo-using-a-unique-orbit/","significance":"Cho thấy Trung Quốc phát triển năng lực giám sát/nhận thức tình huống không gian tinh vi, có thể phục vụ theo dõi vệ tinh đối phương ở quỹ đạo địa tĩnh.","region":"Đông Á"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"BAE Systems trình làng Brontanax, máy bay không người lái phối hợp đầu tiên của Anh","summary":"BAE Systems ra mắt Brontanax tại triển lãm Farnborough (22/7): máy bay không người lái tự hành cỡ tương đương Hawk, phối hợp cùng tiêm kích Typhoon để tác chiến điện tử và tấn công chính xác. Thuộc chương trình StormFighter được chính phủ Anh cấp 300 triệu bảng, đang thử nghiệm mặt đất tại Warton, dự kiến bay thử năm 2027 và vào biên chế trước cuối thập kỷ.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/bae-systems-unveils-brontanax-autonomous-combat-aircraft/","significance":"Bước tiến của Anh hướng tới năng lực không quân thế hệ 6, cạnh tranh với các chương trình máy bay không người lái phối hợp (CCA) của Mỹ và Australia.","region":"Châu Âu/NATO"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Drone MQ-28 Ghost Bat của Australia lần đầu bay cùng liên quân trong tập trận Thái Bình Dương","summary":"MQ-28 Ghost Bat do Boeing Defence Australia phát triển trở thành máy bay chiến đấu không người lái phối hợp (CCA) đầu tiên tham gia tập trận đa quốc gia Valiant Shield 2026 tại quần đảo Bắc Mariana, bay cùng F-35 và F-15EX. Giám đốc chương trình MQ-28 toàn cầu của Boeing gọi đây là 'bước đầu tiên' quan trọng, dù Ghost Bat chưa được chọn vào hợp đồng CCA sản xuất ban đầu của Không quân Mỹ.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/business/2026/07/australian-cca-flew-pacific-exercise-boeing-exec-says-its-important-first-step/414951/","significance":"Chứng minh khả năng vận hành thực tế của máy bay không người lái phối hợp trong môi trường liên minh, mở đường triển khai rộng hơn ở Ấn Độ Dương - Thái Bình Dương.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-22","category":"Ngoại giao","title":"Tổng Thư ký NATO Rutte tiếp Bộ trưởng Quốc phòng Nhật Bản, gắn kết an ninh Âu - Ấn Độ Dương-TBD","summary":"Tổng Thư ký NATO Mark Rutte đón Bộ trưởng Quốc phòng Nhật Bản Shinjiro Koizumi tại trụ sở NATO ngày 22/7, bàn hợp tác công nghiệp quốc phòng, hỗ trợ Ukraine và nhấn mạnh diễn biến Ấn Độ Dương-Thái Bình Dương tác động trực tiếp tới an ninh Âu-Đại Tây Dương. Nhật Bản là 1 trong 4 đối tác Ấn Độ Dương-Thái Bình Dương của NATO.","sourceName":"NATO","sourceUrl":"https://www.nato.int/cps/en/natohq/news_240001.htm","significance":"Củng cố liên kết giữa an ninh châu Âu và Ấn Độ Dương-Thái Bình Dương, mở rộng vai trò của NATO ngoài phạm vi Bắc Đại Tây Dương truyền thống.","region":"Châu Âu/NATO"},{"date":"2026-07-22","category":"Ngoại giao","title":"Hội nghị Ngoại trưởng Mekong - Nhật Bản lần thứ 17 ra tuyên bố đồng chủ tịch tại Manila","summary":"Ngoại trưởng Nhật Bản Motegi Toshimitsu và phía Việt Nam đồng chủ trì Hội nghị Ngoại trưởng Mekong - Nhật Bản lần thứ 17 bên lề AMM tại Manila, ra Tuyên bố đồng chủ tịch triển khai Chiến lược Hợp tác Mekong - Nhật Bản 2024, xác định 5 lĩnh vực ưu tiên gồm kết nối hạ tầng, chuỗi cung ứng, chuyển đổi số, quản lý nguồn nước và an ninh mạng, chuẩn bị cho Thượng đỉnh Mekong - Nhật Bản lần 13.","sourceName":"VietnamPlus","sourceUrl":"https://en.vietnamplus.vn/mekong-japanese-foreign-ministers-reaffirm-commitment-to-co-creating-partnership-post348764.vnp","significance":"Làm sâu sắc khuôn khổ hợp tác tiểu vùng Mekong - Nhật Bản giữa lúc cạnh tranh ảnh hưởng khu vực gia tăng.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-22","category":"Chính trị","title":"Tổng thống Lebanon nêu 3 điều kiện giải giáp Hezbollah, gắn với việc Israel rút quân","summary":"Tại Washington cuối chuyến thăm Mỹ và gặp Tổng thống Trump, Tổng thống Lebanon Joseph Aoun nêu 3 điều kiện để giải giáp Hezbollah: Israel chấm dứt hiện diện tại lãnh thổ Lebanon; quân đội Lebanon giành toàn quyền kiểm soát an ninh cả nước; và chương trình tái thiết kinh tế do nhà nước quản lý để tạo việc làm thay thế vũ khí. Ông dẫn mô hình giải giáp từng áp dụng với FARC (Colombia) và IRA (Bắc Ireland).","sourceName":"Anadolu Agency","sourceUrl":"https://www.aa.com.tr/en/middle-east/lebanese-president-sets-3-conditions-for-hezbollah-disarmament-including-israeli-withdrawal/4005481","significance":"Tuyên bố công khai chi tiết nhất từ trước đến nay của Beirut về lộ trình giải giáp Hezbollah, đặt điều kiện tiên quyết là Israel rút quân, cho thấy tiến trình vẫn bế tắc nếu thiếu nhượng bộ song phương.","region":"Trung Đông"},{"date":"2026-07-22","category":"Kinh tế","region":"Đông Á","title":"Thâm hụt thương mại Nhật Bản phình to vì yen chạm đáy 40 năm và giá dầu do chiến sự Iran","summary":"Thâm hụt thương mại tháng 6 của Nhật Bản tăng lên 406,9 tỷ yen (2,49 tỷ USD), gấp hơn 3 lần dự báo: nhập khẩu vọt 25,4% (dầu thô tăng 59,3%) trong khi xuất khẩu tăng 19,3% - tháng tăng thứ mười liên tiếp nhờ yen yếu và nhu cầu gắn với trung tâm dữ liệu AI. Đồng yen rơi về mức thấp nhất 40 năm cộng gián đoạn qua eo Hormuz đẩy chi phí năng lượng nhập khẩu lên cao.","sourceName":"Reuters","sourceUrl":"https://finance.yahoo.com/economy/policy/articles/japans-exports-jump-june-weak-002536228.html","significance":"Yen yếu cộng chi phí năng lượng leo thang đặt Ngân hàng Trung ương Nhật Bản vào thế kẹt giữa kiềm chế lạm phát và hỗ trợ tăng trưởng, cho thấy xung đột Iran đang lan tới các nền kinh tế nhập khẩu năng lượng lớn ở châu Á."},{"date":"2026-07-22","category":"Chính trị","region":"Châu Âu/NATO","title":"EU bế tắc gói trừng phạt Nga thứ 21 vì Hy Lạp phản đối cấm vận LNG","summary":"Ngoại trưởng 27 nước EU họp tại Brussels ngày 22/7 nhưng chưa chốt được gói trừng phạt Nga thứ 21 do Hy Lạp phản đối điều khoản cấm tàu châu Âu vận chuyển LNG Nga, lo thiệt hại cho đội tàu LNG lớn nhất châu Âu của nước này. Gói này nhắm vào khoảng 215 cá nhân và thực thể, trong đó gần 90 ngân hàng Nga, và cần đồng thuận tuyệt đối của cả 27 nước.","sourceName":"Euronews","sourceUrl":"https://www.euronews.com/my-europe/2026/07/22/brussels-double-deadlock","significance":"Bế tắc phơi bày rạn nứt lợi ích kinh tế trong nội bộ EU đang làm chậm dòng trừng phạt hỗ trợ Ukraine, ngay trước kỳ nghỉ hè của các đại sứ EU."},{"date":"2026-07-21","category":"Công nghệ quân sự","region":"Châu Âu/NATO","title":"Thụy Điển đặt mua 3 máy bay cảnh báo sớm GlobalEye, bổ sung cho đội bay NATO","summary":"Không quân Thụy Điển xác nhận đặt mua 3 máy bay cảnh báo sớm và chỉ huy trên không GlobalEye do Saab chế tạo, giao hàng từ năm 2027 hoặc sớm hơn, song song với 10 chiếc mà NATO vừa chọn mua đầu tháng 7 thay vì Boeing E-7 Wedgetail. Thụy Điển còn dự kiến tích hợp dữ liệu vệ tinh Planet Labs vào hệ thống GlobalEye.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/business/2026/07/swedens-trio-radar-planes-will-complement-natos-10-says-air-force-chief/414891/","significance":"Việc NATO chọn GlobalEye thay vì E-7 Wedgetail của Mỹ cho thấy dịch chuyển năng lực cảnh báo sớm trên không của liên minh, giữa lúc Nga gia tăng gây nhiễu GPS ở Baltic."},{"date":"2026-07-21","category":"Công nghệ quân sự","region":"Châu Âu/NATO","title":"Thụy Điển đẩy nhanh 4 năm chương trình vệ tinh quân sự, vướng nút thắt năng lực phóng của Mỹ","summary":"Thụy Điển đã phóng vệ tinh quân sự đầu tiên (do Planet Labs chế tạo, phóng bằng Falcon 9 tháng 5/2026) sớm hơn kế hoạch 4 năm, hướng tới 10 vệ tinh hoạt động và bổ sung vệ tinh radar ICEYE của Phần Lan trong năm nay. Chỉ huy lực lượng không gian Thụy Điển cảnh báo năng lực phóng toàn cầu hạn chế nên nước này đang xây sân bay vũ trụ Esrange để giảm phụ thuộc Mỹ.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/defense-systems/2026/07/sweden-needs-us-get-satellites-orbit-launch-tempo-problem-space-chief-says/414880/","significance":"Số vụ Nga gây nhiễu GPS ở Baltic tăng từ 55 vụ năm 2023 lên hơn 700 vụ năm 2025, thúc đẩy các nước NATO nhỏ tự chủ trinh sát vệ tinh thay vì lệ thuộc năng lực phóng của Mỹ."},{"date":"2026-07-21","category":"Công nghệ quân sự","region":"Đông Á","title":"Nhật Bản bắt tay startup Phần Lan Kuva Space, thêm vệ tinh siêu phổ vào chòm quan sát trái đất","summary":"Hãng IHI của Nhật ký biên bản ghi nhớ với Kuva Space (Phần Lan) để tích hợp vệ tinh siêu phổ Hyperfield-2 vào chòm 100 vệ tinh quan sát trái đất của Nhật, dự kiến đặt hàng từ năm 2027. Khoảng 20 vệ tinh loại này có thể giám sát hằng ngày chừng 20 triệu km2 quanh Nhật Bản.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/ihi-explores-kuva-hyperspectral-satellites-for-japans-multi-sensor-constellation/","significance":"Chủ tịch IHI nhấn mạnh năng lực không gian tự chủ ngày càng thiết yếu với an ninh quốc gia Nhật, giữa lúc Đông Á tăng tốc cạnh tranh trinh sát vệ tinh với Trung Quốc."},{"date":"2026-07-22","category":"Công nghệ quân sự","region":"Châu Âu/NATO","title":"Anh chi 20 triệu bảng phát triển mục tiêu giả lập siêu vượt âm để thử phòng không","summary":"Lockheed Martin UK giành hợp đồng 20 triệu bảng (27 triệu USD) từ Bộ Quốc phòng Anh trong khuôn khổ Project Bowline, phát triển hệ thống mục tiêu giả lập mối đe dọa siêu vượt âm để kiểm tra cảm biến và tên lửa đánh chặn của Anh. Dự án hỗ trợ khoảng 63 việc làm và 15 doanh nghiệp vừa và nhỏ trong nước.","sourceName":"The Defense Post","sourceUrl":"https://thedefensepost.com/2026/07/22/lockheed-hypersonic-test-target/","significance":"Nằm trong khuôn khổ AUKUS Pillar 2 và Chiến lược Quốc phòng 2025, dự án cho thấy Anh ưu tiên xây kiến trúc phòng không - tên lửa tích hợp thay vì tự phát triển riêng một hệ thống đánh chặn siêu vượt âm."},{"date":"2026-07-21","category":"Ngoại giao","region":"Châu Âu/NATO","title":"Azerbaijan và Đức ký Tuyên bố chung về Chương trình nghị sự Chiến lược song phương","summary":"Tại Berlin ngày 21/7, Tổng thống Azerbaijan Ilham Aliyev và Thủ tướng Đức Friedrich Merz ký Tuyên bố chung về Chương trình nghị sự Chiến lược cho quan hệ đối tác song phương, kèm loạt thỏa thuận về năng lượng, giao thông, hạ tầng, thương mại - đầu tư và khoa học - công nghệ. Hai bên cũng ký tuyên bố lập Hội đồng Doanh nghiệp Azerbaijan - Đức.","sourceName":"Presidency of Azerbaijan","sourceUrl":"https://president.az/en/articles/view/73037","significance":"Thỏa thuận củng cố vai trò của Azerbaijan trong chiến lược đa dạng hóa năng lượng và tuyến Hành lang Giữa của châu Âu nhằm giảm phụ thuộc Nga, đồng thời nâng quan hệ song phương lên tầm đối tác chiến lược."},{"date":"2026-07-21","category":"Công nghệ quân sự","region":"Châu Mỹ","title":"Canada thành quan sát viên đầu tiên của liên minh tiêm kích thế hệ 6 GCAP","summary":"Sau cuộc họp tại London ngày 21/7 giữa Bộ trưởng Quốc phòng Anh, Nhật Bản, Italy và Canada, Canada chính thức trở thành Quốc gia Quan sát viên đầu tiên của GCAP - chương trình tiêm kích thế hệ 6 trị giá 8,6 tỷ bảng do Anh, Italy và Nhật Bản sáng lập năm 2022. Canada được tiếp cận thông tin phát triển năng lực và hợp tác công nghiệp nhưng KHÔNG có quyền quyết định trong chương trình.","sourceName":"Bộ Quốc phòng Anh","sourceUrl":"https://www.gov.uk/government/news/canada-joins-next-generation-fighter-jet-programme-as-first-observer-nation","significance":"Đây là lần mở rộng chính thức đầu tiên của GCAP, mở đường cho Canada tham gia sâu hơn và củng cố hợp tác công nghiệp quốc phòng Anh - Canada trong khuôn khổ Five Eyes/NATO."},{"date":"2026-07-21","category":"Công nghệ quân sự","region":"Trung Đông","title":"Lầu Năm Góc: chiến dịch nhằm vào Iran đã tốn 37,5 tỷ USD, xin bổ sung 87,6 tỷ USD","summary":"Điều trần trước Ủy ban Chuẩn chi Thượng viện ngày 21/7, Bộ trưởng Quốc phòng Pete Hegseth cho biết chi phí chiến dịch nhằm vào Iran đã lên 37,5 tỷ USD tính đến hết năm tài khóa (30/9). Nhà Trắng xin Quốc hội cấp bổ sung 87,6 tỷ USD, trong đó 67,1 tỷ USD cho Lầu Năm Góc - gồm 21 tỷ USD đạn dược, 17,3 tỷ USD chi phí vận hành và 1,5 tỷ USD nhiên liệu. Hegseth cảnh báo huấn luyện sẽ bị cắt giảm nếu không có khoản bổ sung.","sourceName":"Air & Space Forces Magazine","sourceUrl":"https://www.airandspaceforces.com/hegseth-iran-war-cost-37-5b/","significance":"Con số cho thấy quy mô tốn kém thực của chiến dịch chống Iran đang thành điểm tranh cãi tại Quốc hội, và sức ép buộc ngân sách quốc phòng FY2027 tiếp tục phình to."},{"date":"2026-07-21","category":"Ngoại giao","region":"Đông Á","title":"Mỹ và Trung Quốc sẽ đối thoại chính thức về trí tuệ nhân tạo vào tháng 9","summary":"Theo nguồn tin của Reuters, Mỹ và Trung Quốc sẽ tổ chức đối thoại chính thức đầu tiên về AI dưới nhiệm kỳ Tổng thống Trump vào tháng 9/2026, do Bộ trưởng Tài chính Scott Bessent dẫn đầu phái đoàn Mỹ, nhiều khả năng diễn ra trước chuyến thăm Mỹ dự kiến ngày 24/9 của Chủ tịch Tập Cận Bình. Thành phần còn lại, chương trình nghị sự và địa điểm vẫn đang được bàn.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/21/us-china-ai-talks-bessent.html","significance":"Đây là kết quả cụ thể từ thượng đỉnh Trump - Tập hồi tháng 5, cho thấy hai bên thử tìm khuôn khổ quản trị chung cho các mô hình AI tiên phong - thứ có thể tăng cường năng lực quân sự, hỗ trợ tấn công hạ tầng trọng yếu và xáo trộn thị trường lao động."},{"date":"2026-07-22","category":"Kinh tế","region":"Châu Mỹ","title":"Trump tuyên bố áp thuế 100% lên thuốc gốc nhập khẩu từ tháng 8/2028","summary":"Tổng thống Trump công bố kế hoạch áp thuế leo thang lên thuốc gốc (generic) nhập khẩu: 100% từ tháng 8/2028 và tăng gấp đôi lên 200% từ tháng 8/2029. Trump nói mục tiêu là 'đưa sản xuất thuốc gốc trở lại nước Mỹ'; thuốc còn bằng sáng chế không nằm trong diện áp thuế này.","sourceName":"Bloomberg","sourceUrl":"https://finance.yahoo.com/economy/policy/articles/trump-plans-100-tariff-generic-230559381.html","significance":"Chính sách nhằm buộc hồi hương chuỗi sản xuất thuốc gốc vốn phụ thuộc nặng vào Ấn Độ và Trung Quốc, nhưng có nguy cơ xáo trộn nguồn cung thuốc giá rẻ toàn cầu và đẩy chi phí y tế Mỹ tăng trước khi năng lực nội địa kịp thích ứng."},{"date":"2026-07-21","category":"Chính trị","region":"Châu Mỹ","title":"Bầu cử giữa kỳ Mỹ năm 2026 và 'những khoảng trống tín nhiệm'","summary":"Tỷ lệ tín nhiệm của Tổng thống Trump còn 36% tính đến 17/7, khoảng cách giữa nhóm ủng hộ và phản đối tăng gấp đôi lên khoảng 20 điểm phần trăm. Giới phân tích như Kyle Kondik (Sabato's Crystal Ball) chỉ ra Đảng Dân chủ chưa chuyển hóa được sự bất mãn này thành lợi thế bầu cử rõ rệt, khi tới 90% cử tri ủng hộ Trump vẫn cam kết bỏ phiếu Cộng hòa.","sourceName":"Thế giới & Việt Nam","sourceUrl":"https://baomoi.com/bau-cu-giua-ky-my-nam-2026-va-nhung-khoang-trong-tin-nhiem-c55665288.epi","significance":"Kết quả bầu cử giữa kỳ tháng 11 sẽ quyết định quyền kiểm soát lưỡng viện, tác động trực tiếp tới khả năng Nhà Trắng duy trì chính sách đối ngoại cứng rắn hiện nay với Iran và thuế quan trong hai năm cuối nhiệm kỳ.","_baomoi":true},{"date":"2026-07-22","category":"Kinh tế","region":"Toàn cầu","title":"Mỹ sắp áp thuế mới ngay trong thứ Sáu khi mức thuế tạm thời 10% hết hạn","summary":"Chính quyền Trump chuẩn bị áp thuế mới lên hàng hóa từ hàng chục đối tác ngay khi mức thuế toàn cầu tạm thời 10% hết hạn vào thứ Sáu. Mức đề xuất theo điều tra lao động cưỡng bức là 10% với Canada, Mexico, EU và Đài Loan, và 12,5% với các nền kinh tế lớn khác gồm Trung Quốc, Ấn Độ và Nhật Bản. Đại diện Thương mại Jamieson Greer nói 'chúng tôi dự kiến sẽ sớm có hành động'.","sourceName":"Bloomberg","sourceUrl":"https://finance.yahoo.com/economy/policy/articles/us-set-impose-tariffs-friday-194016612.html","significance":"Việc tiếp tục áp thuế bất chấp thất bại pháp lý tại Tòa Tối cao cho thấy Nhà Trắng quyết giữ chương trình nghị sự bảo hộ, tạo thêm bất định cho chuỗi cung ứng ngay trước bầu cử giữa kỳ.","_baomoi":true,"_baomoiUrl":"https://baomoi.com/my-chuan-bi-ap-muc-thue-moi-voi-60-doi-tac-thuong-mai-c55665400.epi"},{"date":"2026-07-21","category":"Công nghệ quân sự","region":"Toàn cầu","title":"Lockheed Martin ra mắt 'Patriot con' PAC-3 ACE để lấp khoảng trống phòng không cấp bách","summary":"Lockheed Martin công bố PAC-3 ACE (Adapted Capability Effector), phiên bản rẻ hơn của tên lửa đánh chặn Patriot PAC-3, dùng động cơ, radar và bộ điều khiển rẻ hơn nhưng tái sử dụng bệ phóng và phần mềm chỉ huy hiện có. Sản xuất có thể bắt đầu từ năm 2028 hoặc sớm hơn, với khả năng hợp tác cùng đối tác châu Âu trong số 18 nước đang sở hữu bệ phóng PAC-3.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/technology/2026/07/lockheed-martin-unveils-baby-patriot-missile-address-urgent-gap/414897/","significance":"Ra mắt đúng lúc Ukraine đã cạn kho PAC-3 và kho Mỹ giảm khoảng một nửa sau xung đột với Iran, PAC-3 ACE nhắm thẳng vào khủng hoảng nguồn cung tên lửa phòng không mà Ukraine không thể tự sản xuất.","_baomoi":true,"_baomoiUrl":"https://baomoi.com/patriot-co-ten-lua-danh-chan-gia-re-c55665752.epi"},{"date":"2026-07-21","category":"Ngoại giao","region":"Đông Á","title":"Ngoại trưởng Vương Nghị gặp Tổng Thư ký ASEAN Kao Kim Hourn tại Manila","summary":"Bên lề Hội nghị Bộ trưởng Ngoại giao ASEAN lần thứ 59 tại Manila, Ngoại trưởng Trung Quốc Vương Nghị gặp Tổng Thư ký ASEAN Kao Kim Hourn và tuyên bố Bắc Kinh sẵn sàng làm sâu sắc hợp tác với khối. Hai bên nhắc tới mốc 50 năm Hiệp ước Thân thiện và Hợp tác (TAC) cùng Quan hệ Đối tác Chiến lược Toàn diện Trung Quốc - ASEAN, và nhấn mạnh ủng hộ vai trò trung tâm của ASEAN.","sourceName":"Xinhua","sourceUrl":"https://english.news.cn/20260721/be7497c385f741dca01c5a0e58b6037d/c.html","significance":"Trung Quốc đẩy mạnh ngoại giao láng giềng với ASEAN giữa lúc căng thẳng Biển Đông với Philippines leo thang và Mỹ, Nhật, Ấn Độ, Australia cùng hiện diện tại Manila. (Nguồn Tân Hoa Xã — dùng đúng phạm vi cho phép: tường thuật phát ngôn của chính Trung Quốc.)","_baomoi":true,"_baomoiUrl":"https://baomoi.com/trung-quoc-san-sang-tang-cuong-hop-tac-voi-asean-c55666063.epi"},{"date":"2026-07-20","category":"Kinh tế","region":"Châu Âu/NATO","title":"Số người chết trên tàu chở ngô Golden Leo ngoài Odesa tăng lên 10, Ấn Độ phản đối","summary":"Giới chức Ukraine xác nhận 10 người thiệt mạng sau khi tàu chở ngô Golden Leo (sở hữu Thổ Nhĩ Kỳ, treo cờ Guinea-Bissau) bị tên lửa đánh trúng khi rời Odesa; tám người được cứu. Ukraine nói Nga phóng ba tên lửa Kh-59/Kh-69, một quả đánh vào mạn phải gây cháy khu sinh hoạt. Moscow tuyên bố đánh tàu chở 'hàng quân sự' nhưng chưa đưa bằng chứng riêng cho Golden Leo. Ấn Độ xác nhận bốn công dân thiệt mạng và lên án việc tấn công tàu thương mại.","significance":"Đây là vụ đánh tàu thương mại gây chết người nghiêm trọng nhất trong đợt leo thang gần đây ở Biển Đen, làm tăng phí bảo hiểm, rủi ro thiếu tàu và nguy cơ giảm năng lực xuất khẩu ngũ cốc của Ukraine, đồng thời kéo Thổ Nhĩ Kỳ, Ấn Độ và các cơ quan hàng hải quốc tế sâu hơn vào tranh cãi.","sourceName":"The Maritime Executive","sourceUrl":"https://maritime-executive.com/article/multiple-crewmembers-killed-in-russian-strike-on-turkish-bulker"},{"date":"2026-07-20","category":"Công nghệ quân sự","region":"Trung Đông","title":"Houthi tuyên bố phong tỏa đường biển Saudi Arabia tại Bab el-Mandeb, mở mặt trận hàng hải thứ hai","summary":"Trong đêm không kích thứ chín của Mỹ vào Iran, lực lượng Houthi tại Yemen tuyên bố phong tỏa đường biển Saudi Arabia, mở thêm mặt trận tại Bab el-Mandeb và đẩy rủi ro gián đoạn năng lượng từ eo Hormuz sang tuyến Biển Đỏ. Iran tiếp tục đánh mục tiêu liên quan Mỹ tại Kuwait và Jordan, trong khi Qatar cùng Pakistan thúc đẩy đề xuất ngừng bắn khoảng 10 ngày. Các bên vẫn để ngỏ ngoại giao nhưng chưa cam kết một cơ chế đình chiến mới.","significance":"Việc đồng thời gây sức ép tại Hormuz và Bab el-Mandeb có thể đe dọa hai cửa ngõ hàng hải quan trọng của thương mại năng lượng, khiến thị trường không còn một tuyến thay thế an toàn rõ ràng. Nếu Houthi thực thi phong tỏa trên thực địa, Saudi Arabia và các nước Vùng Vịnh có thể bị kéo sâu hơn vào chiến tranh; giá dầu, bảo hiểm và cước vận tải sẽ chịu thêm cú sốc.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/world/middle-east/us-launches-iran-strikes-ninth-day-another-american-confirmed-killed-2026-07-20/"},{"date":"2026-07-20","category":"Kinh tế","region":"Châu Âu/NATO","title":"EU phạt AliExpress 550 triệu euro vì vi phạm Đạo luật Dịch vụ Kỹ thuật số","summary":"Ủy ban châu Âu phạt AliExpress 550 triệu euro vì không đánh giá và giảm thiểu đầy đủ rủi ro liên quan việc bán hàng bất hợp pháp, không an toàn hoặc giả mạo trên nền tảng, đồng thời yêu cầu doanh nghiệp khắc phục; không tuân thủ có thể dẫn tới phạt định kỳ bổ sung. Đây là một trong những biện pháp thực thi lớn nhất theo Đạo luật Dịch vụ Kỹ thuật số (DSA) đối với một nền tảng thương mại điện tử ngoài EU. Brussels nhấn mạnh quy mô nền tảng không phải lý do miễn trừ trách nhiệm bảo vệ người tiêu dùng.","significance":"Án phạt nâng mức rủi ro pháp lý với các nền tảng xuyên biên giới, có thể buộc họ đầu tư mạnh hơn vào kiểm duyệt nhà bán, truy xuất sản phẩm và chia sẻ dữ liệu. Nó cũng cho thấy EU dùng quy định số như một công cụ chủ quyền kinh tế, tác động trực tiếp tới doanh nghiệp Trung Quốc.","sourceName":"European Commission","sourceUrl":"https://digital-strategy.ec.europa.eu/en/news/commission-fines-aliexpress-eu550-million-breaching-digital-services-act"},{"date":"2026-07-20","category":"Chính trị","region":"Châu Âu/NATO","title":"Andy Burnham trở thành Thủ tướng Anh, cam kết kế hoạch 10 năm và giữ kỷ luật tài khóa","summary":"Andy Burnham chính thức trở thành Thủ tướng Anh sau khi Keir Starmer từ chức và Quốc vương Charles III mời ông thành lập chính phủ. Trong phát biểu đầu tiên, Burnham hứa hỗ trợ khẩn cấp chi phí sinh hoạt, xây dựng kế hoạch 10 năm về kinh tế, giáo dục, nhà ở xã hội và sức khỏe tâm thần, đồng thời cam kết tuân thủ quy tắc tài khóa và nghĩa vụ quốc phòng, tái khẳng định hỗ trợ Ukraine. Thị trường phản ứng tương đối bình tĩnh, nhưng lợi suất gilt tăng nhẹ khi nhà đầu tư chờ lựa chọn bộ trưởng tài chính và nội các.","significance":"Anh là cường quốc hạt nhân, thành viên thường trực Hội đồng Bảo an và trụ cột viện trợ Ukraine. Chuyển giao lãnh đạo giữa nhiệm kỳ có thể làm thay đổi ưu tiên tài khóa, quan hệ với EU và cách London cân bằng chi tiêu xã hội với quốc phòng trong bối cảnh chi phí vay và năng lượng tăng.","sourceName":"Associated Press","sourceUrl":"https://apnews.com/article/2cbc843c2f81ca7046b022c419e62769"},{"date":"2026-07-19","category":"Công nghệ quân sự","region":"Châu Âu/NATO","title":"Nga tập kích tên lửa đạn đạo lớn nhất vào Kyiv kể từ đầu chiến tranh, phơi bày khoảng trống phòng thủ Patriot","summary":"Nga phóng 41 tên lửa và 125 UAV vào Ukraine trong đợt tập kích kéo dài nhiều giờ, tập trung vào Kyiv và vùng phụ cận. Ít nhất sáu người thiệt mạng trên toàn quốc, hàng chục người bị thương; hỏa hoạn và thiệt hại được ghi nhận tại nhiều quận thủ đô, cùng thương vong ở Kharkiv, Kherson, Sumy và Zaporizhzhia. Ukraine tuyên bố đánh chặn 18 tên lửa và hơn 100 UAV nhưng thiếu hệ thống Patriot để chống tên lửa đạn đạo. Cùng thời điểm, Ukraine tiếp tục đánh kho hậu cần và hạ tầng dầu của Nga.","significance":"Quy mô tên lửa đạn đạo cho thấy Nga đang khai thác điểm yếu phòng không có tính hệ thống của Ukraine. Khả năng Kyiv duy trì bảo vệ đô thị và hạ tầng phụ thuộc trực tiếp vào tốc độ bổ sung Patriot, tên lửa đánh chặn và năng lực sản xuất; các đòn đánh trả vào hậu cần, dầu khí Nga cũng làm tăng rủi ro mở rộng mục tiêu kinh tế.","sourceName":"Associated Press","sourceUrl":"https://apnews.com/article/ddea9c0a10367fc84b3cb563896102e3"},{"date":"2026-07-19","category":"Kinh tế","region":"Châu Âu/NATO","title":"Cú sốc dầu đặt ECB trước lựa chọn khó tại cuộc họp ngày 23/7","summary":"ECB họp chính sách tiền tệ ngày 23/7 tại Frankfurt trong bối cảnh giá dầu tăng trở lại vì chiến tranh Trung Đông. Financial Times cho biết thị trường nghiêng về khả năng giữ nguyên lãi suất sau đợt tăng trước đó, dù lạm phát khu vực đồng euro tháng 6 ở mức 2,8% và một số nhà kinh tế vẫn dự báo có thể tăng tiếp vào tháng 9. Lịch chính thức của ECB xác nhận cuộc họp và họp báo ngày 23/7. Tại Anh, giá dầu cũng làm tăng nguy cơ lạm phát quay lại, có thể ảnh hưởng thời điểm điều chỉnh của Ngân hàng Anh.","significance":"Quyết định của ECB sẽ định hình lợi suất, tỷ giá euro và chi phí vốn khi châu Âu vừa đối mặt tăng trưởng yếu vừa chịu sốc năng lượng. Thông điệp cứng rắn hỗ trợ chống lạm phát nhưng làm xấu điều kiện tài chính; thông điệp mềm có thể gây áp lực lên đồng euro và kỳ vọng giá.","sourceName":"Financial Times","sourceUrl":"https://www.ft.com/content/c1b04338-8fc8-45fc-8a35-f623843d4dda"},{"date":"2026-07-16","category":"Ngoại giao","region":"Toàn cầu","title":"29 quốc gia ký thỏa thuận thành lập Tổ chức Hợp tác Trí tuệ Nhân tạo Thế giới (WAICO)","summary":"Đại diện 29 quốc gia ký thỏa thuận tại Thượng Hải thành lập World Artificial Intelligence Cooperation Organization (WAICO), một tổ chức liên chính phủ dự kiến đặt trụ sở tại thành phố này. Nhóm sáng lập gồm Nga, Belarus, Serbia, Cuba, Brazil, Venezuela cùng nhiều nước châu Á, châu Phi; Indonesia, Kazakhstan, Lào và Pakistan cũng được nêu tên. Bắc Kinh định vị WAICO là nền tảng hợp tác, quản trị và thu hẹp khoảng cách tiếp cận AI. Tuy nhiên điều lệ, cơ chế tài chính, quyền biểu quyết và nghĩa vụ thành viên chưa được công bố đầy đủ trong nguồn mở.","significance":"WAICO biến cạnh tranh AI từ cuộc đua doanh nghiệp thành cạnh tranh thiết chế. Trung Quốc có thể dùng đào tạo, mô hình nguồn mở và tiêu chuẩn kỹ thuật để mở rộng ảnh hưởng tại Global South, song khả năng thực thi còn cần kiểm chứng.","sourceName":"Xinhua","sourceUrl":"https://en.chinadiplomacy.org.cn/2026-07/16/content_118603108.shtml"},{"date":"2026-07-17","category":"Ngoại giao","region":"Toàn cầu","title":"Pháp và Morocco ký gói hợp tác rộng, chuẩn bị một hiệp ước song phương mới","summary":"Tại cuộc họp cấp cao lần thứ 15 ở Rabat, Pháp và Morocco ký nhiều văn kiện về tài chính đường sắt cao tốc Kenitra–Marrakech, nước, hàng không dân dụng, giáo dục, bưu chính, văn hóa, hàng hải và nghiên cứu nông nghiệp. Hai bên mở tiến trình tìm phương án thương mại cho tuyến kết nối điện trực tiếp, có thể đưa điện tái tạo Morocco sang Pháp. Paris và Rabat đang chuẩn bị một hiệp ước song phương toàn diện, dự kiến ký khi Vua Mohammed VI thăm Pháp, cùng một thỏa thuận an ninh tổng thể, nhưng thời điểm chưa được công bố.","significance":"Gói văn kiện biến sự hòa dịu chính trị sau thay đổi lập trường của Pháp về Tây Sahara thành liên kết hạ tầng và chuỗi giá trị. Tuyến điện có thể mở thêm hành lang năng lượng Bắc Phi–châu Âu.","sourceName":"MAP (Maroc.ma)","sourceUrl":"https://maroc.ma/en/news/morocco-france-seal-several-cooperation-partnership-agreements-15th-hlm"},{"date":"2026-07-18","category":"Kinh tế","title":"Iraq và doanh nghiệp Mỹ ký gói thỏa thuận hơn 60 tỷ USD, ưu tiên đường ống né Hormuz","summary":"Tại hội nghị kinh doanh Mỹ–Iraq ở Washington, Chevron ký ba thỏa thuận với phía Iraq: hai văn kiện nhằm tăng sản lượng và một văn kiện đầu tư tuyến ống xuất khẩu mới. Iraq và Syria cũng ký thỏa thuận hợp tác khôi phục đường ống Kirkuk–Baniyas; ConocoPhillips nhận 42% cổ phần trong đơn vị BP phát triển các mỏ Kirkuk. Tổng giá trị các thỏa thuận, MOU và quan hệ đối tác được công bố vượt 60 tỷ USD, bao trùm năng lượng, y tế, viễn thông và hạ tầng. Một phần quan trọng là văn kiện sơ bộ hoặc không ràng buộc, nên chưa đồng nghĩa vốn đã cam kết hoàn toàn.","sourceName":"Associated Press","sourceUrl":"https://apnews.com/article/582b42f21cb62cfe8dc6c8e73d1dcafa","significance":"Gói ký kết phản ánh nỗ lực cấu trúc lại an ninh năng lượng Trung Đông bằng các cửa xuất khẩu Địa Trung Hải và Thổ Nhĩ Kỳ, đồng thời mở rộng ảnh hưởng kinh tế Mỹ tại Iraq trước vị thế lâu năm của Trung Quốc.","region":"Trung Đông"},{"date":"2026-07-18","category":"Ngoại giao","title":"Pháp–Đức mở rộng hợp tác răn đe hạt nhân và lên kế hoạch diễn tập chung","summary":"Tổng thống Emmanuel Macron và Thủ tướng Friedrich Merz công bố tại căn cứ Nörvenich một khuôn khổ tăng cường hợp tác an ninh–quốc phòng sáu lĩnh vực. Lực lượng thông thường Đức dự kiến tham gia một cuộc diễn tập do lực lượng hạt nhân Pháp dẫn dắt trước cuối năm 2026; Berlin không vận hành vũ khí hạt nhân và Paris vẫn giữ toàn quyền tài trợ, quyết định sử dụng kho vũ khí của mình. Hai bên đồng thời cam kết phối hợp phòng thủ tên lửa, đòn đánh tầm xa và quản trị các dự án chung sau khó khăn của chương trình tiêm kích FCAS.","sourceName":"Bundesregierung","sourceUrl":"https://www.bundesregierung.de/resource/blob/992814/2447554/da8ac3d9e083ec89fbecb012973e69da/2026-07-17-dfvsr-erklaerung-deutsch-data.pdf?download=1","significance":"Đây là bước thể chế hóa đáng kể của trụ răn đe châu Âu trong bối cảnh nghi ngờ về độ bền cam kết an ninh Mỹ, dù chưa tạo ra cơ chế chia sẻ hạt nhân tương tự NATO.","region":"Châu Âu/NATO"},{"date":"2026-07-17","category":"Kinh tế","title":"Brazil cấp gần 13,3 tỷ real tín dụng khẩn cấp để đỡ khu vực nông thôn trước thuế Mỹ","summary":"Brazil cho phép gần 13,3 tỷ real, tương đương khoảng 2,6 tỷ USD, tín dụng bất thường cho các chương trình phát triển nông thôn, tái cơ cấu nợ và hỗ trợ nhà sản xuất mía chịu tác động từ thuế nhập khẩu mới của Mỹ. Thuế 25% dự kiến có hiệu lực ngày 22/7 đối với nhiều nhóm hàng, khiến Brasília song song chuẩn bị biện pháp pháp lý, hỗ trợ doanh nghiệp và khả năng trả đũa. BNDES cho biết chương trình Brasil Soberano 2026 cũng có hạn ký hợp đồng đến 22/7 nếu sắc lệnh tạm thời không được chuyển thành luật, tạo áp lực thời gian triển khai.","sourceName":"BNDES","sourceUrl":"https://www.bndes.gov.br/wps/portal/site/home/emergenciais/brasil-soberano","significance":"Động thái cho thấy thuế quan Mỹ đang tạo chi phí ngân sách thực tại đối tác lớn ở Nam Mỹ và có thể kích hoạt vòng trả đũa, làm sâu thêm phân mảnh thương mại Tây bán cầu.","region":"Châu Mỹ"},{"date":"2026-07-17","category":"Kinh tế","title":"Nikkei rơi vào vùng điều chỉnh khi cổ phiếu bán dẫn toàn cầu bị bán tháo","summary":"Chỉ số Nikkei 225 giảm 4,03% phiên 17/7, đóng cửa 64.141 điểm, giảm hơn 11% so với đỉnh 25/6 - chính thức vào vùng điều chỉnh. Nguyên nhân chính là làn sóng bán tháo cổ phiếu bán dẫn/AI toàn cầu sau khi TSMC nâng dự báo chi vốn 2026 lên 60-64 tỷ USD, làm dấy lên lo ngại đầu tư hạ tầng AI vượt nhu cầu thực; căng thẳng Trung Đông đẩy giá dầu và đồng yen yếu càng gây áp lực.","sourceName":"Bloomberg","sourceUrl":"https://www.bloomberg.com/news/articles/2026-07-17/japan-s-stocks-dive-as-investors-worry-about-ai-rally-s-run-mro83xih","significance":"Giới đầu tư bắt đầu nghi ngờ tính bền vững của chu kỳ đầu tư AI toàn cầu, nguy cơ lan sang định giá công nghệ ở các thị trường khác và tác động chuỗi cung ứng bán dẫn Đông Á.","region":"Đông Á"},{"date":"2026-07-16","category":"Kinh tế","title":"Ngân hàng Trung ương Hàn Quốc nâng lãi suất lên 2,75%","summary":"Ngân hàng Trung ương Hàn Quốc nhất trí nâng lãi suất cơ bản từ 2,50% lên 2,75%. Cơ quan này viện dẫn tăng trưởng xuất khẩu và đầu tư, lạm phát còn trên mục tiêu cùng rủi ro ổn định tài chính. Quyết định cho thấy Seoul ưu tiên kiềm chế áp lực giá và đòn bẩy dù môi trường bên ngoài nhiều bất định. Đây là tín hiệu quan trọng với đồng won, trái phiếu châu Á và các nền kinh tế có cấu trúc thương mại tương tự. Tuy nhiên, tác động tiếp theo phụ thuộc giá năng lượng, tỷ giá và độ bền của nhu cầu bán dẫn.","sourceName":"Bank of Korea","sourceUrl":"https://www.bok.or.kr/eng/bbs/E0000634/view.do?depth=400423&depth2=400417&depth3=400423&menuNo=400423&nttId=11062944&oldMenuNo=400423&pageIndex=1&pageUnit=10&programType=newsDataEng&searchCnd=1&searchKwd=","significance":"Đợt tăng lãi suất có thể hỗ trợ đồng won nhưng làm chi phí tín dụng và nợ hộ gia đình cao hơn. Nó cũng củng cố khả năng các ngân hàng trung ương châu Á trì hoãn nới lỏng.","region":"Đông Á"},{"date":"2026-07-16","category":"Kinh tế","title":"TSMC báo lợi nhuận quý II kỷ lục và nâng tổng cam kết đầu tư tại Mỹ","summary":"TSMC công bố lợi nhuận quý II tăng 77% lên 706,6 tỷ Đài tệ, tương đương khoảng 22 tỷ USD, nhờ nhu cầu chip AI. Doanh thu quý đạt khoảng 40,2 tỷ USD; công ty nâng triển vọng tăng trưởng doanh thu cả năm lên hơn 40% và dự kiến chi 60–64 tỷ USD cho đầu tư vốn. Financial Times cho biết TSMC bổ sung 100 tỷ USD đầu tư tại Mỹ, đưa tổng cam kết lên 265 tỷ USD, gồm bốn nhà máy Arizona nữa. Kế hoạch mở rộng lớn, nhưng tiến độ, nhân lực và chi phí sản xuất tại Mỹ vẫn là biến số.","sourceName":"TSMC Investor Relations","sourceUrl":"https://investor.tsmc.com/english/quarterly-results/2026/q2","significance":"Năng lực chế tạo chip tiên tiến đang dịch chuyển một phần sang Mỹ, giảm rủi ro tập trung địa lý nhưng làm tăng chi phí. Quy mô đầu tư cũng định hình cạnh tranh trợ cấp và an ninh chuỗi cung ứng AI.","region":"Đông Á"},{"date":"2026-07-16","category":"Chính trị","title":"EU buộc Google mở khả năng tương tác AI trên Android và chia sẻ dữ liệu tìm kiếm","summary":"Ủy ban châu Âu ban hành quyết định cuối cùng theo Đạo luật Thị trường Kỹ thuật số, yêu cầu Alphabet triển khai các biện pháp cho phép dịch vụ AI của bên thứ ba tương tác với 11 tính năng Android và làm rõ cơ chế chia sẻ dữ liệu tìm kiếm. Mục tiêu là giảm lợi thế cổng kiểm soát của Google và giúp đối thủ tiếp cận chức năng, dữ liệu theo điều kiện công bằng hơn. Quyết định đã được thông qua ngày 16/7, nhưng hiệu quả cạnh tranh sẽ phụ thuộc thông số kỹ thuật, thời hạn thực thi, bảo vệ dữ liệu và cách Google đáp ứng hoặc khiếu nại.","sourceName":"European Commission","sourceUrl":"https://ec.europa.eu/commission/presscorner/detail/en/ip_26_1634","significance":"EU đang tác động trực tiếp tới lớp phân phối AI di động và dữ liệu tìm kiếm, có thể tạo tiền lệ cho cơ quan quản lý Mỹ và các thị trường khác, đồng thời thay đổi chi phí gia nhập của nhà phát triển.","region":"Châu Âu/NATO"},{"date":"2026-07-16","category":"Ngoại giao","title":"Ukraine và Đông Nam Âu thúc đẩy trừng phạt Nga cùng hợp tác công nghệ quốc phòng","summary":"Kyiv tổ chức hội nghị thượng đỉnh Ukraine–Đông Nam Âu với lãnh đạo và đại diện từ Ủy ban châu Âu, Albania, Moldova, Romania, Serbia, Slovenia, Croatia, Bắc Macedonia, Montenegro, Bulgaria và Hy Lạp. Tuyên bố của Phủ Tổng thống Ukraine kêu gọi gói trừng phạt thứ 21 của EU, siết lách trừng phạt và tăng hợp tác an ninh. Romania và Bulgaria bày tỏ quan tâm đến công nghệ quân sự và sản xuất drone. Đây là nguồn chính thức của phía Ukraine, nên mức đồng thuận thực tế và cam kết cụ thể của từng nước cần được kiểm tra thêm.","sourceName":"Office of the President of Ukraine","sourceUrl":"https://www.president.gov.ua/en/news/u-kiyevi-vidbuvsya-v-samit-ukrayina-pivdenno-shidna-yevropa-105477","significance":"Kyiv đang tìm cách biến ủng hộ ngoại giao thành năng lực sản xuất phân tán trong khu vực. Thành công sẽ giúp bổ sung công suất drone và thu hẹp các kênh né trừng phạt của Nga.","region":"Châu Âu/NATO"},{"date":"2026-07-16","category":"Công nghệ quân sự","title":"Đài Loan - Mỹ đạt thoả thuận đồng sản xuất drone tấn công Mighty Hornet I","summary":"Đài Loan và Mỹ đạt thoả thuận cùng sản xuất drone tấn công Chien Feng I (Mighty Hornet I) do Viện Khoa học Công nghệ Trung Sơn (NCSIST) phát triển, đã trang bị cho TQLC Đài Loan và qua thử nghiệm bắn đạn thật, phóng được từ tàu cao tốc, xuồng không người lái, xe mặt đất và drone Albatross II. Thoả thuận còn chờ thẩm định an ninh và ngân sách từ Lập pháp viện; Mỹ làm đại diện bán ra nước ngoài, mục tiêu 500-1.000 drone.","sourceName":"Taipei Times","sourceUrl":"https://www.taipeitimes.com/News/front/archives/2026/07/16/2003860815","significance":"Đồng sản xuất giúp Đài Loan mở rộng quy mô drone tấn công giá rẻ kiểu 'tổ ong' đối phó ưu thế số lượng của Trung Quốc, đồng thời mở kênh xuất khẩu vũ khí Đài Loan qua danh nghĩa Mỹ - hướng răn đe phi đối xứng eo biển Đài Loan.","region":"Đông Á"},{"date":"2026-07-16","category":"Kinh tế","title":"IEA: Hạn chế xuất khẩu đất hiếm của Trung Quốc đe dọa 6.500 tỷ USD sản xuất công nghiệp phương Tây","summary":"Trong báo cáo Global Critical Minerals Outlook 2026 công bố ngày 16/7, IEA cảnh báo nếu Trung Quốc thực thi đầy đủ kiểm soát xuất khẩu đất hiếm, khoảng 6.500 tỷ USD giá trị sản xuất ở ô tô, công nghệ cao, quốc phòng và năng lượng ngoài Trung Quốc có thể chịu rủi ro gián đoạn. Mỹ và châu Âu chiếm gần một nửa tác động; kiểm soát graphite đe dọa thêm ~300 tỷ USD.","sourceName":"IEA","sourceUrl":"https://www.iea.org/reports/global-critical-minerals-outlook-2026","significance":"Cho thấy mức độ tập trung chuỗi cung ứng khoáng sản chiến lược vào Trung Quốc vẫn là điểm yếu an ninh kinh tế lớn của phương Tây, củng cố áp lực đa dạng hoá nguồn cung và đẩy nhanh đầu tư khai thác/tinh luyện đất hiếm ngoài Trung Quốc.","region":"Toàn cầu"},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"Đài Loan điều động HIMARS và tên lửa diệt hạm cho tập trận phòng thủ lớn","summary":"Đài Loan huy động hệ thống pháo phản lực HIMARS do Mỹ cung cấp cùng bệ phóng tên lửa diệt hạm Hùng Phong nội địa trong cuộc tập trận phòng thủ 5 ngày (13-17/7), phát triển năng lực tác chiến liên quân nhắm máy bay và tàu chiến đối phương.","sourceName":"USNI News","sourceUrl":"https://news.usni.org/2026/07/15/taiwan-mobilizes-himars-anti-ship-missiles-for-major-defense-drill","significance":"Thể hiện năng lực răn đe phi đối xứng của Đài Loan trước sức ép quân sự gia tăng từ Trung Quốc, kết hợp vũ khí Mỹ viện trợ với hệ thống tên lửa nội địa.","region":"Đông Á"},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"Elbit Systems đề xuất biến tàu thương mại thành căn cứ nổi cho drone hải quân","summary":"Hãng quốc phòng Israel Elbit Systems công bố khái niệm chuyển đổi tàu thương mại thành nền tảng phóng và thu hồi 9-12 máy bay không người lái Hermes 650 Spark - giải pháp thay thế tàu sân bay truyền thống để mở rộng tầm hoạt động hải quân với chi phí thấp hơn.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/mideast-africa/2026/07/15/israeli-firm-wants-to-convert-commercial-ships-into-floating-drone-bases/","significance":"Phản ánh xu hướng 'tàu sân bay drone giá rẻ' đang được các nước có vùng biển rộng cân nhắc để mở rộng giám sát/tấn công hàng hải mà không cần đóng tàu sân bay đắt đỏ.","region":"Trung Đông"},{"date":"2026-07-15","category":"Kinh tế","title":"ASML nâng dự báo doanh thu 2026 lần hai trong năm nhờ nhu cầu chip AI bùng nổ","summary":"ASML công bố doanh thu quý 2/2026 đạt 9,3 tỷ euro, biên lợi nhuận gộp 54%, đều vượt dự báo; nâng dự báo doanh thu cả năm 2026 lên 43-45 tỷ euro (lần nâng thứ hai trong năm). Hãng độc quyền máy quang khắc EUV cho biết đơn hàng tăng mạnh nhờ khách hàng đẩy nhanh mở rộng năng lực sản xuất chip AI, dự kiến tăng 30% năng lực EUV cho 2027.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/15/asml-2q-earnings-ai-chips-orders.html","significance":"Tín hiệu chu kỳ đầu tư chip AI toàn cầu vẫn tăng tốc mạnh, củng cố vị thế Hà Lan/EU trong chuỗi cung ứng bán dẫn chiến lược mà Mỹ đang tìm cách kiểm soát xuất khẩu sang Trung Quốc.","region":"Châu Âu/NATO"},{"date":"2026-07-14","category":"Ngoại giao","title":"Việt Nam - Indonesia ký Kế hoạch hành động 2026-2030 triển khai Đối tác Chiến lược Toàn diện","summary":"Bộ trưởng Ngoại giao Lê Hoài Trung thăm chính thức Indonesia, đồng chủ trì Kỳ họp lần 6 Ủy ban hỗn hợp và cùng Ngoại trưởng Sugiono ký Kế hoạch hành động 2026-2030 hiện thực hóa Đối tác Chiến lược Toàn diện, đặt mục tiêu kim ngạch thương mại 18 tỷ USD vào 2028, mở rộng hợp tác quốc phòng - an ninh biển, phòng chống tội phạm xuyên biên giới.","sourceName":"Vietnam+ (TTXVN)","sourceUrl":"https://en.vietnamplus.vn/vietnam-indonesia-chart-new-strategic-cooperation-agenda-post348317.vnp","significance":"Văn kiện cụ thể hóa quan hệ Đối tác Chiến lược Toàn diện Việt Nam - Indonesia, hai nước lớn ASEAN, với điều khoản hợp tác an ninh biển - có ý nghĩa với lập trường chung về Biển Đông giữa cạnh tranh nước lớn ở Ấn Độ Dương - Thái Bình Dương.","region":"Ấn Độ Dươn
