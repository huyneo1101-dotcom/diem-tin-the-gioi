aine, làm tăng nhu cầu đạn Patriot của Kyiv.","url":"https://x.com/TheStudyofWar/status/2074262425554067757"},{"date":"2026-07-06","handle":"@Saveraaintl","name":"Saveraa International","title":"Giá đậu tương tăng vọt do thời tiết Mỹ nóng khô và tin Trung Quốc mua vào","summary":"Hợp đồng tương lai đậu tương tăng mạnh khi dự báo thời tiết Mỹ nóng và khô hơn trong 8–14 ngày tới làm dấy lo ngại về năng suất, cùng tin đồn Trung Quốc đấu thầu mua đậu tương và ngô Mỹ.","significance":"Diễn biến giá nông sản phản ánh cả yếu tố thời tiết lẫn tín hiệu tan băng thương mại Mỹ - Trung, tác động tới lạm phát lương thực toàn cầu.","url":"https://x.com/Saveraaintl/status/2074315464281612428"},{"date":"2026-07-06","handle":"@ShanghaiEye","name":"ShanghaiEye","title":"Trung Quốc và Nga khởi động tập trận \"Joint Sea-2026\" tại Thanh Đảo","summary":"Trung Quốc và Nga chính thức khởi động cuộc tập trận hải quân chung \"Joint Sea-2026\" tại một quân cảng ở Thanh Đảo, tỉnh Sơn Đông, miền đông Trung Quốc.","significance":"Tập trận chung định kỳ củng cố \"quan hệ đối tác chiến lược toàn diện\" Trung - Nga và phát tín hiệu răn đe với Mỹ cùng đồng minh ở Tây TBD. (Tài khoản gắn với truyền thông TQ, chỉ dùng làm đầu mối.)","url":"https://x.com/ShanghaiEye/status/2074256079043924148"},{"date":"2026-07-06","handle":"@WarshipCam","name":"WarshipCam","title":"Tuần dương hạm Varyag (lớp Slava) của Nga xuất hiện tại Thanh Đảo","summary":"Ảnh chụp ngày 6/7 cho thấy tuần dương hạm mang tên lửa dẫn đường Varyag (Project 1164 lớp Slava) của Hải quân Nga có mặt tại Thanh Đảo, Trung Quốc, tham gia Joint Sea-2026.","significance":"Việc Nga điều soái hạm Hạm đội Thái Bình Dương tới cho thấy mức độ coi trọng cuộc tập trận và độ sâu hợp tác hải quân Trung - Nga. (Nguồn OSINT.)","url":"https://x.com/WarshipCam/status/2074680188416274448"},{"date":"2026-07-06","handle":"@NewsHour","name":"PBS NewsHour","title":"Tổng thư ký NATO Rutte yêu cầu các thành viên đưa ra kế hoạch 'rõ ràng, cụ thể, khả tín' để đạt mục tiêu chi tiêu quốc phòng.","url":"https://x.com/NewsHour/status/2074278726158672130","summary":"Tổng thư ký NATO Mark Rutte yêu cầu các thành viên trình kế hoạch \"rõ ràng, cụ thể, khả tín\" để đạt mục tiêu chi tiêu quốc phòng.","significance":"Phản ánh sức ép nội khối buộc các nước hiện thực hóa cam kết tăng chi; xu hướng NATO chuyển từ mục tiêu con số sang lộ trình thực thi."},{"date":"2026-07-06","handle":"@Reuters","name":"Reuters","title":"Reuters: Iran bắn tên lửa vào các tàu hàng thương mại tại eo biển Hormuz.","url":"https://x.com/Reuters/status/2074317554584031253","summary":"Reuters đưa tin Iran bắn tên lửa vào các tàu hàng thương mại tại eo biển Hormuz.","significance":"Cho thấy nguy cơ hiện hữu với tuyến vận tải dầu huyết mạch; phản ánh việc Iran sẵn sàng dùng đòn hàng hải để đáp trả sức ép của Mỹ."},{"date":"2026-07-06","handle":"@amnestyusa","name":"Amnesty International USA","title":"Ân xá Quốc tế: Sudan là cuộc khủng hoảng di tản tồi tệ nhất thế giới với hơn 10,5 triệu người phải rời bỏ nhà cửa.","url":"https://x.com/amnestyusa/status/2074142099021160926","summary":"Ân xá Quốc tế cảnh báo Sudan là cuộc khủng hoảng di tản tồi tệ nhất thế giới với hơn 10,5 triệu người phải rời bỏ nhà cửa.","significance":"Phản ánh quy mô thảm họa nhân đạo bị thế giới lãng quên; cho thấy khoảng trống chú ý và cứu trợ quốc tế giữa các điểm nóng cạnh tranh."},{"date":"2026-07-06","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky cho biết Nga tập kích Kyiv bằng 68 tên lửa và 351 drone trong đêm, gây thiệt hại tại hơn 10 địa điểm.","url":"https://x.com/ZelenskyyUa/status/2074026731581624489","summary":"Tổng thống Zelensky cho biết Nga tập kích Kyiv bằng 68 tên lửa và 351 drone trong đêm, gây thiệt hại tại hơn 10 địa điểm.","significance":"Cho thấy Nga duy trì chiến thuật tập kích bão hòa nhằm bào mòn phòng không Ukraine; phản ánh cuộc đua tiêu hao giữa số lượng đạn tấn công và năng lực đánh chặn."},{"date":"2026-07-06","handle":"@thewarzonewire","name":"The War Zone","title":"Cấu hình vũ khí mới trên tiêm kích Su-57 của Nga hé lộ nhiệm vụ phòng thủ chống drone và tên lửa hành trình.","url":"https://x.com/thewarzonewire/status/2072395726030524917","summary":"Cấu hình vũ khí mới trên tiêm kích tàng hình Su-57 của Nga hé lộ vai trò phòng thủ chống drone và tên lửa hành trình.","significance":"Phản ánh việc drone giá rẻ đang buộc cả tiêm kích đắt tiền phải thích ứng; xu hướng tái định nghĩa nhiệm vụ không quân trong chiến tranh drone."},{"date":"2026-07-06","handle":"@ReutersLegal","name":"Reuters Legal","title":"22 tổng chưởng lý bang thuộc phe Dân chủ phản đối kế hoạch áp thuế tới 12,5% của chính quyền Trump lên 59 nước và EU.","url":"https://x.com/ReutersLegal/status/2074264698564857881","summary":"22 tổng chưởng lý bang thuộc phe Dân chủ phản đối kế hoạch áp thuế tới 12,5% của chính quyền Trump lên 59 nước và EU.","significance":"Phản ánh mặt trận pháp lý–chính trị trong nước chống chính sách thuế quan; cho thấy thương chiến của Trump gây chia rẽ ngay trong lòng nước Mỹ."}],"xGeneratedAt":"2026-07-23","exercises":[{"name":"Predator's Run 2026 (tập trận Mỹ - Úc - Philippines)","status":"ongoing","dates":"21-29/07/2026","location":"Townsville Field Training Area, Queensland, Australia","scale":"Đa quốc gia - Thủy quân lục chiến Mỹ (MRF-Darwin 26), Lữ đoàn 1 Lục quân Úc, Lữ đoàn 1 Quân đội Philippines","summary":"Tập trận lục quân đa quốc gia Predator's Run 26 khai mạc ngày 21/7 tại Townsville, kéo dài 9 ngày, hợp nhất ba quân đội Mỹ - Úc - Philippines thành một lực lượng tác chiến chung dưới cơ cấu chỉ huy thống nhất. Nội dung gồm phối hợp cấp trung đội tiến tới bài bắn đạn thật phòng thủ hợp đồng, nhằm tăng khả năng phối hợp tác chiến trong khu vực Ấn Độ Dương - Thái Bình Dương.","items":[{"date":"2026-07-22","title":"Lục quân Philippines và Australia khởi động Exercise Carabaroo 2026 trong khuôn khổ Predator's Run","summary":"Lữ đoàn Chiến đấu số 1 Quân đội Philippines cùng Lữ đoàn 1 Quân đội Australia khởi động Exercise Carabaroo 2026 tại thao trường Townsville (Queensland) - cuộc tập trận hải ngoại lớn nhất năm 2026 của Lục quân Philippines, nằm trong khuôn khổ Predator's Run 2026 cùng Thủy quân lục chiến Mỹ. Ba lực lượng huấn luyện dưới một cơ cấu chỉ huy thống nhất, hướng tới bài bắn đạn thật phòng ngự tổng hợp.","sourceName":"Daily Tribune","sourceUrl":"https://tribune.net.ph/2026/07/22/phl-australian-armies-launch-exercise-carabaroo-2026"},{"date":"2026-07-21","title":"Khai mạc Predator's Run 26 tại Townsville: Mỹ, Úc, Philippines hợp nhất chỉ huy","summary":"Thủy quân lục chiến Mỹ thuộc Lực lượng Luân phiên Darwin 26 cùng Lữ đoàn 1 Lục quân Úc và Lữ đoàn 1 Quân đội Philippines khởi động Predator's Run 26 tại Townsville, tích hợp ba lực lượng thành một khối tác chiến chung, hướng tới bài bắn đạn thật phòng thủ hợp đồng.","sourceName":"U.S. Indo-Pacific Command","sourceUrl":"https://www.pacom.mil/Media/News/News-Articles/Article/4551982/us-marines-australian-army-armed-forces-of-the-philippines-kick-off-exercise-pr/"}]},{"name":"RIMPAC 2026 (Rim of the Pacific)","status":"ongoing","dates":"24/6 – 31/7/2026","location":"Quần đảo Hawaii và vùng biển lân cận","scale":"30 nước, ~31 tàu mặt nước, 5 tàu ngầm, 15 lực lượng bộ binh, hơn 200 máy bay, 30.000 quân — kỳ RIMPAC lớn nhất lịch sử (lần thứ 30)","summary":"RIMPAC là cuộc tập trận hải quân đa quốc gia lớn nhất thế giới do Hạm đội Thái Bình Dương Mỹ chủ trì, tổ chức hai năm một lần. Kỳ 2026 với chủ đề \"đối tác: hợp nhất và sẵn sàng\", có nhiều nước lần đầu tham gia (Ba Lan, Tây Ban Nha, Guatemala, Hy Lạp, Fiji) bên cạnh các thành viên thường xuyên như Úc, Nhật, Hàn, Anh, Pháp, Ấn Độ.","items":[{"date":"2026-07-22","title":"RIMPAC 2026: liên quân diệt hạm bằng loạt tên lửa đa quốc gia trong diễn tập SINKEX","summary":"Trong bài tập bắn chìm tàu thật (SINKEX) ngoài khơi Hawaii, Mỹ và đồng minh dùng HIMARS, tên lửa Type 12 của Nhật, Harpoon từ tàu Tây Ban Nha và tàu ngầm Mỹ, LRASM từ Super Hornet cùng SPIKE NLOS từ Apache để đánh chìm hai tàu cũ USS Peleliu và USS Mobile Bay ở độ sâu khoảng 15.000 feet gần đảo Kauai. Lực lượng Nhật, Tây Ban Nha, Úc, Philippines, Hàn Quốc, New Zealand và Mỹ tham gia.","sourceName":"DVIDS","sourceUrl":"https://www.dvidshub.net/news/570552/us-and-partner-nations-conduct-sinkex-during-rimpac-26"},{"date":"2026-07-16","title":"USV Typhoon lần đầu tiếp tế tự động trên biển cho tàu đổ bộ USS Essex tại RIMPAC 2026","summary":"Xuồng không người lái tự hành Typhoon của Splash Industries (tốc độ hành trình hơn 50 hải lý/giờ, tầm 600+ hải lý) tự hành hoàn toàn tiến vào khoang chứa tàu đổ bộ tấn công USS Essex (LHD-2) để chuyển linh kiện - lần đầu một USV thực hiện tiếp tế trên biển cho tàu chiến lớn có thủy thủ đoàn, trong khuôn khổ RIMPAC 2026 tại Hawaii.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/typhoon-usv-uss-essex-at-sea-resupply"},{"date":"2026-07-14","title":"RIMPAC 2026 trình diễn in 3D kim loại trên tàu sân bay và tiếp tế bằng drone tự hành","summary":"Trong khuôn khổ RIMPAC 2026, Bộ Quốc phòng Mỹ thử nghiệm tích hợp in 3D tiên tiến với drone tự hành lớn nhất từ trước tới nay để tiếp tế hậu cần trên biển. Tàu sân bay USS Theodore Roosevelt lần đầu mang máy in 3D kim loại lai (HYBRiD-X) ngay trên tàu, trong khi drone mặt nước tự hành vận chuyển phụ tùng qua sóng cao tới 3,6m tới nhiều tàu Mỹ và đối tác.","sourceName":"Stars and Stripes","sourceUrl":"https://www.stripes.com/theaters/asia_pacific/2026-07-14/three-d-printing-autonomous-delivery-rimpac-22260494.html"},{"date":"2026-07-13","title":"RIMPAC 2026 bước vào giai đoạn tác chiến trên biển, nhấn mạnh gắn kết liên minh","summary":"Ấn phẩm của Bộ Tư lệnh Ấn Độ Dương - Thái Bình Dương Mỹ đưa tin RIMPAC 2026 đã vào giai đoạn tác chiến trên biển với 30 quốc gia, hơn 30 tàu mặt nước, 5 tàu ngầm và hơn 200 máy bay, do nhóm tác chiến tàu sân bay USS Theodore Roosevelt dẫn đầu. Đợt tập trận kiểm nghiệm phối hợp tác chiến đa miền và công nghệ mới; Philippines lần đầu cử tàu Cảnh sát biển tham gia bên cạnh tàu Hải quân.","sourceName":"Indo-Pacific Defense Forum","sourceUrl":"https://ipdefenseforum.com/2026/07/rimpac-2026-puts-coalition-cohesion-into-practice/"},{"date":"2026-07-08","title":"Máy bay tuần thám P-8A Hàn Quốc lần đầu diễn tập săn ngầm tại RIMPAC 2026","summary":"Trong giai đoạn trên biển của RIMPAC 2026 gần Honolulu, máy bay tuần thám săn ngầm P-8A Poseidon của Hải quân Hàn Quốc lần đầu thực hiện đầy đủ quy trình tác chiến chống ngầm, phối hợp cùng P-8A Mỹ dùng phao sonar truy tìm mục tiêu ngầm giả định. Đây là lần đầu Hàn Quốc triển khai loại máy bay này tại RIMPAC.","sourceName":"Korea Times","sourceUrl":"https://www.koreatimes.co.kr/southkorea/defense/20260708/korean-navys-p-8-demonstrates-submarine-hunting-capability-at-rimpac"},{"date":"2026-07-08","title":"Indonesia lần đầu tham gia tập trận RIMPAC 2026 tại Hawaii","summary":"Quân đội Indonesia chính thức gia nhập cuộc tập trận hải quân đa quốc gia RIMPAC 2026 với 37 binh sĩ, đánh dấu lần đầu tiên Indonesia tham gia cuộc tập trận quy mô 30 quốc gia này.","sourceName":"ANTARA News","sourceUrl":"https://en.antaranews.com/news/421996/indonesian-military-joins-2026-rimpac-to-reinforce-regional-stability"},{"date":"2026-07-08","title":"Trung Quốc phô diễn tên lửa siêu vượt âm DF-17 trên truyền hình nhà nước","summary":"Trung Quốc trưng ra clip tên lửa siêu vượt âm DF-17 trên truyền thông nhà nước; chuyên gia cho rằng đây là màn phô trương sức mạnh đáp lại các cuộc tập trận ở châu Á - TBD.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/08/china-shows-snazzy-clip-of-df-17-missile-on-state-tv-in-show-of-force/","relate":"Được giới chuyên gia đọc là đòn răn đe của Bắc Kinh nhằm đáp trả RIMPAC và trấn an nội bộ về năng lực xuyên thủng phòng thủ tên lửa của đối phương."},{"date":"2026-07-08","title":"Trung Quốc thử SLBM ra Nam Thái Bình Dương, bị nói làm suy yếu vùng phi hạt nhân","summary":"Vụ phóng SLBM ngày 6/7 của Trung Quốc ra Nam Thái Bình Dương vấp phản đối vì bị cho là làm suy yếu vùng phi hạt nhân khu vực; Bắc Kinh nhiều lần chỉ trích thỏa thuận tàu ngầm AUKUS.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/07/chinese-ballistic-missile-test-is-said-to-undermine-nuclear-weapons-free-zone-in-south-pacific/","relate":"Diễn ra ngay khi RIMPAC quy tụ 30 nước tại Thái Bình Dương, vụ thử là màn đối trọng chiến lược, phát tín hiệu răn đe hạt nhân của Trung Quốc với liên minh do Mỹ dẫn dắt."}]},{"name":"Joint Sea-2026 (Tập trận hải quân Trung - Nga)","status":"recent","dates":"Đầu tháng 7/2026","location":"Vùng biển và không phận gần Thanh Đảo (Hoàng Hải), Sơn Đông; nối tiếp tuần tra chung Bắc TBD","scale":"Chủ đề \"phản ứng chung với các mối đe dọa an ninh biển\"; Nga cử tuần dương hạm Varyag, khinh hạm Surovy, tàu ngầm cỡ lớn Ufa và tàu cứu hộ Igor Belousov","summary":"Joint Sea là cuộc tập trận hải quân thường niên giữa Trung Quốc và Nga. Kỳ 2026 khai mạc tại quân cảng Thanh Đảo ngày 6/7 sau khi biên đội tàu Nga tới hội quân ngày 5/7, triển khai theo ba giai đoạn: tập kết lực lượng, hiệp đồng tại cảng và tác chiến trên biển.","items":[{"date":"2026-07-13","title":"Trung Quốc, Nga kết thúc tập trận hải quân chung Joint Sea-2026 tại Thanh Đảo","summary":"Tân Hoa Xã đưa tin tập trận hải quân chung Joint Sea-2026 giữa Trung Quốc và Nga đã kết thúc tại quân cảng Thanh Đảo (Sơn Đông) hôm 13/7, hoàn tất các khoa mục đã định. Đây là lần thứ 12 trong chuỗi tập trận từ 2012, diễn ra 6-13/7 qua 3 giai đoạn gồm trinh sát liên hợp, phòng không - phòng thủ tên lửa và tấn công trên biển.","sourceName":"Xinhua","sourceUrl":"https://english.news.cn/20260713/9379d756304e40088458553afd2c8264/c.html"},{"date":"2026-07-09","title":"Hải quân Trung - Nga bắt đầu diễn tập bắn đạn thật trong khuôn khổ Joint Sea-2026","summary":"Ngày 9/7, tàu chiến Trung Quốc và Nga bắt đầu tiến hành các khoa mục bắn đạn thật tại khu vực chỉ định gần Thanh Đảo, đánh dấu bước tiếp theo của giai đoạn trên biển. Khu trục hạm Kaifeng của Trung Quốc thực hành bắn vào mục tiêu trên không, cùng các khoa mục trinh sát liên hợp, phòng không - phòng thủ tên lửa.","sourceName":"Xinhua","sourceUrl":"https://english.news.cn/20260709/092ca13570a74054af614464467bb24e/c.html"},{"date":"2026-07-09","title":"Tập trận hải quân Trung-Nga chuyển sang giai đoạn hoạt động trên biển","summary":"Sau khi hoàn thành giai đoạn lập kế hoạch tại cảng Thanh Đảo, tàu chiến Trung-Nga rời cảng sáng 9/7 để bắt đầu giai đoạn hoạt động trên biển, gồm tuần tra chung, phòng không-tên lửa, tấn công hàng hải và cứu hộ tàu ngầm.","sourceName":"CGTN","sourceUrl":"https://news.cgtn.com/news/2026-07-09/China-Russia-joint-naval-drills-move-to-at-sea-phase--1OE4RgJMxpu/p.html"},{"date":"2026-07-08","title":"Trung Quốc thử SLBM ra Thái Bình Dương (nhiều khả năng JL-3)","summary":"Hải quân Trung Quốc phóng thử tên lửa đạn đạo chiến lược từ tàu ngầm hạt nhân ra Nam Thái Bình Dương ngày 6/7, được cho là bước tiến tới răn đe trên biển liên tục.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/china-pacific-slbm-test-casd-nuclear-deterrence/","relate":"Diễn ra gần như đồng thời với Joint Sea-2026, cho thấy Bắc Kinh vừa phối hợp phô diễn sức mạnh với Nga vừa độc lập trình diễn năng lực răn đe hạt nhân trên biển ở Tây Thái Bình Dương."}]}],"dipEvents":[{"name":"Thượng đỉnh NATO Ankara 2026","status":"recent","dates":"7–8/7/2026","location":"Ankara, Thổ Nhĩ Kỳ (khu tổ hợp phủ tổng thống Beştepe/Külliye)","scale":"Nguyên thủ và người đứng đầu chính phủ các nước thành viên NATO; lần đầu một Tổng thống Mỹ thăm Thổ Nhĩ Kỳ kể từ 2015; ban hành Tuyên bố thượng đỉnh Ankara","summary":"Hội nghị thượng đỉnh thường niên của NATO năm 2026 do Thổ Nhĩ Kỳ đăng cai, tập trung vào chi tiêu quốc phòng, hỗ trợ Ukraine và loạt sáng kiến năng lực chung. Hội nghị diễn ra trong bầu không khí căng thẳng khi Mỹ công kích một số đồng minh và cuộc chiến Mỹ - Iran leo thang.","items":[{"date":"2026-07-10","title":"Zelensky thúc giục xúc tiến khẩn cấp việc sản xuất tên lửa Patriot tại Ukraine","summary":"Sau khi Tổng thống Trump đồng ý cấp phép tại thượng đỉnh NATO Ankara, Tổng thống Zelensky ngày 10/7 kêu gọi Ukraine gấp rút triển khai các bước kỹ thuật để bắt đầu tự sản xuất tên lửa đánh chặn Patriot (PAC-3), nhằm khắc phục tình trạng thiếu hụt nguồn cung khi Nga tăng cường tấn công tên lửa đạn đạo. Giới chức quốc phòng Ukraine cảnh báo việc thiết lập dây chuyền sản xuất trong nước có thể mất nhiều tháng.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/10/zelenskyy-urges-urgent-efforts-in-ukraine-to-start-patriot-production"},{"date":"2026-07-08","title":"NATO cam kết 70 tỷ euro viện trợ quân sự cho Ukraine giai đoạn 2026-2027","summary":"Kết thúc hội nghị thượng đỉnh tại Ankara, NATO chính thức cam kết cung cấp 70 tỷ euro viện trợ quân sự, thiết bị và huấn luyện cho Ukraine trong hai năm 2026-2027 — cam kết lớn nhất lịch sử liên minh dành cho một quốc gia đang xung đột.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/nato-pledges-70-billion-euros-for-ukraine-as-trump-praises-peace-progress"},{"date":"2026-07-08","title":"NATO phê duyệt sáng kiến 'Drone Edge' 40 tỷ USD và gói tái trang bị 50 tỷ euro","summary":"Bên lề thượng đỉnh Ankara, NATO công bố các thỏa thuận mua sắm quốc phòng mới trị giá hơn 50 tỷ euro và phê duyệt sáng kiến 'NATO Drone Edge' với khoản đầu tư 40 tỷ USD trong 5 năm cho hệ thống máy bay không người lái, cùng cam kết 27 tỷ euro cho hạ tầng nhiên liệu.","sourceName":"Kyiv Post","sourceUrl":"https://www.kyivpost.com/post/79928"},{"date":"2026-07-08","title":"Trump quay sang chỉ trích Tây Ban Nha, đòi Greenland","summary":"Tổng thống Trump công kích Tây Ban Nha vì chi tiêu quốc phòng thấp và tái nêu yêu sách Greenland, phơi bày rạn nứt trong liên minh; văn phòng Thủ tướng Sanchez nói xem đây là chuyện \"bình thường\".","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/08/trump-turns-on-spain-and-demands-greenland-as-nato-summit-exposes-cracks/","relate":"Là tâm điểm gây chia rẽ của thượng đỉnh, cho thấy mâu thuẫn Mỹ - đồng minh về chia sẻ gánh nặng và chủ quyền lãnh thổ ngay tại sự kiện biểu tượng đoàn kết."},{"date":"2026-07-08","title":"Trump ca ngợi NATO \"thống nhất\", nêu khả năng Ukraine tự lắp Patriot","summary":"Rời hội nghị, Trump ca ngợi sự \"thống nhất\" của NATO và gợi ý cấp phép cho Ukraine tự lắp ráp đạn đánh chặn Patriot, dù chuyên gia nói việc này mất nhiều tháng.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/trump-leaves-summit-praising-nato-unification-floats-ukraine-made-patriots/","relate":"Kết quả trực tiếp của thượng đỉnh về hồ sơ Ukraine, cân bằng lại thông điệp cứng rắn của Trump với cam kết hỗ trợ phòng không cho Kyiv."},{"date":"2026-07-09","title":"Đức mua tên lửa Tomahawk của Mỹ, triển khai trên lãnh thổ","summary":"Đức đạt thỏa thuận mua tên lửa hành trình Tomahawk của Mỹ và bố trí trên lãnh thổ, bước chuyển tới năng lực tấn công tầm xa được công bố quanh dịp thượng đỉnh.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/09/germany-to-buy-us-tomahawks-in-shift-toward-own-long-range-capability/","relate":"Nằm trong làn sóng cam kết tăng cường năng lực của các đồng minh xung quanh thượng đỉnh, củng cố răn đe của NATO ở sườn đông."},{"date":"2026-07-08","title":"Lithuania ký MoU tham gia chương trình tàu chuẩn hóa của Na Uy bên lề thượng đỉnh","summary":"Na Uy và Lithuania ký biên bản ghi nhớ liên chính phủ hợp tác về chương trình tàu chuẩn hóa của Na Uy, ký ngày 8/7 bên lề thượng đỉnh NATO.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/kongsberg-norway-standardised-vessels-lithuania-uk/","relate":"Minh họa cho hàng loạt thỏa thuận năng lực song phương/đa phương được chốt bên lề thượng đỉnh, làm sâu hội nhập quốc phòng Bắc Âu - Baltic."},{"date":"2026-07-09","title":"Phân tích: Trump nhắm Tây Ban Nha, NATO hậu thuẫn Ukraine — liên minh còn thống nhất?","summary":"Al Jazeera phân tích nghịch lý của thượng đỉnh: NATO nhất trí tăng chi tiêu quốc phòng nhưng công kích của Trump nhằm vào Tây Ban Nha và Greenland lại đe dọa sự gắn kết.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/9/trump-targets-spain-nato-backs-ukraine-is-the-alliance-still-united","relate":"Bài phân tích chiều sâu về kết quả và ẩn ý chiến lược của thượng đỉnh, đánh giá mức độ đoàn kết thực chất của khối."}]},{"name":"Nhật Bản – New Zealand nâng cấp hợp tác an ninh (ACSA 2026)","status":"recent","dates":"10/7/2026","location":"Tokyo, Nhật Bản","scale":"Ngoại trưởng Nhật Motegi Toshimitsu và Ngoại trưởng New Zealand Winston Peters; ký Hiệp định Trao đổi Hậu cần và Dịch vụ Tương hỗ (ACSA), Hiệp định Bảo mật Thông tin chính thức có hiệu lực","summary":"Nhân chuyến thăm Nhật Bản của Ngoại trưởng New Zealand Winston Peters, hai nước hoàn tất ký Hiệp định Trao đổi Hậu cần và Dịch vụ Tương hỗ (ACSA) và đưa Hiệp định Bảo mật Thông tin vào hiệu lực, đánh dấu bước nâng cấp khuôn khổ hợp tác an ninh - quốc phòng giữa hai đối tác quan trọng của Mỹ tại Ấn Độ Dương - Thái Bình Dương.","items":[{"date":"2026-07-10","title":"Nhật Bản - New Zealand ký thỏa thuận hậu cần quân sự ACSA, nâng cấp quan hệ song phương","summary":"Ngoại trưởng Nhật Bản Motegi Toshimitsu hội đàm với Ngoại trưởng New Zealand Winston Peters tại Tokyo ngày 10/7. Hai bên xác nhận ACSA đã được ký kết và Hiệp định Bảo mật Thông tin chính thức có hiệu lực, đồng thời cam kết tăng cường hợp tác song phương.","sourceName":"Bộ Ngoại giao Nhật Bản","sourceUrl":"https://www.mofa.go.jp/press/release/press1e_000382.html"}]},{"name":"Tuần lễ cấp cao Đại hội đồng LHQ khóa 81","status":"upcoming","dates":"Tháng 9/2026","location":"New York, Mỹ","scale":"Lãnh đạo và trưởng đoàn gần 200 quốc gia thành viên LHQ; các phiên thảo luận chung và loạt cuộc gặp song phương","summary":"Tuần lễ cấp cao thường niên của Đại hội đồng Liên Hợp Quốc, nơi lãnh đạo thế giới phát biểu và tiến hành ngoại giao bên lề. Kỳ 2026 dự kiến xoay quanh xung đột Trung Đông, chiến sự Ukraine và cạnh tranh nước lớn.","items":[]},{"name":"Thượng đỉnh G20 2026 (Mỹ chủ trì)","status":"upcoming","dates":"Cuối năm 2026","location":"Mỹ","scale":"Lãnh đạo 20 nền kinh tế lớn nhất thế giới cùng khách mời","summary":"Mỹ giữ chức chủ tịch luân phiên G20 năm 2026 và sẽ đăng cai hội nghị thượng đỉnh, tập trung vào kinh tế toàn cầu, năng lượng và thương mại trong bối cảnh căng thẳng địa chính trị gia tăng.","items":[]},{"name":"Thủ tướng Ấn Độ Modi công du Australia và New Zealand (07/2026)","status":"recent","dates":"08-11/07/2026","location":"Melbourne (Australia) và Auckland (New Zealand)","scale":"Thăm cấp nguyên thủ tại 2 nước, gồm Thượng đỉnh thường niên Ấn Độ - Australia lần thứ 3","summary":"Thủ tướng Ấn Độ Narendra Modi công du Australia (8-10/7) và New Zealand (10-11/7), đạt loạt kết quả cụ thể: với Australia là Tuyên bố chung Quốc phòng-An ninh, thỏa thuận uranium dân sự, hành lang khoáng sản thiết yếu và Lộ trình an ninh hàng hải Ấn Độ Dương - Thái Bình Dương; với New Zealand là nâng cấp lên Đối tác Chiến lược cùng thỏa thuận hợp tác hàng hải và hậu cần quốc phòng - chuyến thăm New Zealand đầu tiên của một Thủ tướng Ấn Độ trong 40 năm.","items":[{"date":"2026-07-09","title":"Ấn Độ - Australia ký Tuyên bố chung Quốc phòng-An ninh và thỏa thuận uranium dân sự","summary":"Tại Melbourne, Thủ tướng Modi và Thủ tướng Albanese công bố Tuyên bố chung Quốc phòng-An ninh, thỏa thuận xuất khẩu uranium dân sự cho chương trình điện hạt nhân Ấn Độ, hành lang khoáng sản thiết yếu và Lộ trình an ninh hàng hải Ấn Độ Dương - Thái Bình Dương.","sourceName":"Văn phòng Thủ tướng Australia","sourceUrl":"https://www.pm.gov.au/media/australia-india-joint-statement"},{"date":"2026-07-11","title":"Ấn Độ - New Zealand nâng cấp lên Đối tác Chiến lược, ký thỏa thuận hàng hải và hậu cần quốc phòng","summary":"Trong chuyến thăm New Zealand đầu tiên của một Thủ tướng Ấn Độ sau 40 năm, Thủ tướng Modi và Thủ tướng Christopher Luxon nâng quan hệ lên Đối tác Chiến lược, công bố Lộ trình đến 2030 và ký Thỏa thuận Hợp tác Hàng hải (MCA), Thỏa thuận Hỗ trợ Hậu cần song phương cùng hợp tác thủy văn - hải đồ.","sourceName":"Văn phòng Thủ tướng Ấn Độ","sourceUrl":"https://www.pmindia.gov.in/en/news_updates/india-new-zealand-joint-statement/"}]},{"name":"Liên minh phòng thủ tên lửa đạn đạo tích hợp châu Âu (Paris 2026)","status":"recent","dates":"13/07/2026","location":"Paris, Pháp (Điện Invalides)","scale":"10 nước sáng lập: Ukraine, Anh, Pháp, Đức, Ý, Đan Mạch, Hà Lan, Na Uy, Tây Ban Nha, Thụy Điển; ~25 lãnh đạo châu Âu dự","summary":"Ukraine cùng 9 nước châu Âu công bố thành lập Liên minh phòng thủ tên lửa đạn đạo tích hợp tại hội nghị Coalition of the Willing ở Điện Invalides (Paris) do Tổng thống Pháp Macron chủ trì, có Tổng thống Ukraine Zelensky tham dự. Mục tiêu xây dựng năng lực phòng thủ tên lửa đạn đạo chung cho châu Âu, hậu thuẫn dự án lá chắn Freyja do công ty Ukraine Fire Point phát triển (~700.000 USD/quả đánh chặn, rẻ hơn nhiều so với 3,8 triệu USD của Patriot PAC-3), kỳ vọng vận hành trong 12 tháng.","items":[{"date":"2026-07-14","title":"10 nước ký tuyên bố lập Liên minh phòng thủ tên lửa đạn đạo, phát triển hệ thống Freyja","summary":"Tại Paris ngày 13-14/7, Ukraine cùng 9 nước châu Âu ký tuyên bố thành lập liên minh phòng thủ tên lửa đạn đạo tích hợp, trọng tâm phát triển hệ thống Freyja - phương án thay thế rẻ hơn Patriot dựa trên kinh nghiệm chiến đấu của Ukraine; đặt mục tiêu đạt năng lực vận hành ban đầu trong 12 tháng.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/14/9-nations-back-ukraines-patriot-alternative-freyja-and-want-it-flying-in-a-year/"},{"date":"2026-07-13","title":"Pháp và 9 nước công bố thành lập Liên minh phòng thủ tên lửa đạn đạo tích hợp cho châu Âu","summary":"Tại Điện Invalides (Paris), Tổng thống Pháp Macron cùng Tổng thống Ukraine Zelensky và lãnh đạo 8 nước châu Âu (Anh, Đức, Ý, Đan Mạch, Hà Lan, Na Uy, Tây Ban Nha, Thụy Điển) ra tuyên bố chung thành lập Liên minh phòng thủ tên lửa đạn đạo tích hợp, nhằm xây dựng năng lực phòng thủ chung trước tên lửa đạn đạo Nga và hậu thuẫn dự án Freyja của Ukraine.","sourceName":"Élysée","sourceUrl":"https://www.elysee.fr/en/emmanuel-macron/2026/07/13/joint-declaration-on-the-establishment-of-the-integrated-anti-ballistic-missile-coalition"}]},{"name":"Hiệp định Thương mại Tự do Ấn Độ - Anh (CETA) có hiệu lực","status":"recent","dates":"Hiệu lực từ 15/07/2026 (ký 24/07/2025)","location":"Ấn Độ - Anh","scale":"Song phương","summary":"Hiệp định Thương mại Tự do toàn diện Ấn Độ - Anh (CETA), ký tháng 7/2025, chính thức có hiệu lực từ 15/7/2026 cùng Hiệp định An sinh xã hội song phương. CETA mở miễn thuế cho khoảng 99% dòng thuế xuất khẩu của Ấn Độ, được xem là FTA toàn diện nhất Ấn Độ ký với một nước G7 và là hiệp định thương mại song phương lớn nhất của Anh kể từ khi rời EU.","items":[{"date":"2026-07-15","title":"CETA Ấn Độ - Anh và Hiệp định an sinh xã hội chính thức có hiệu lực","summary":"Chính phủ Ấn Độ công bố CETA và Hiệp định An sinh xã hội với Anh có hiệu lực từ 15/7/2026, mở đường miễn/giảm thuế cho 99% dòng thuế hàng hóa và giảm gánh nặng đóng bảo hiểm xã hội trùng lặp cho lao động Ấn Độ tại Anh.","sourceName":"PIB India","sourceUrl":"https://www.pib.gov.in/PressReleasePage.aspx?PRID=2274280"}]},{"name":"Hội nghị Bộ trưởng Ngoại giao ASEAN (AMM) & kỷ niệm 50 năm Hiệp ước TAC tại Manila 2026","status":"upcoming","dates":"19-24/07/2026","location":"Manila, Philippines","scale":"10 Ngoại trưởng ASEAN + đối tác đối thoại: Mỹ (Rubio), Trung Quốc (Vương Nghị), Nga (Lavrov), Nhật, Ấn Độ, Úc, New Zealand, EU","summary":"Philippines - chủ tịch ASEAN 2026 - chủ trì tuần lễ cấp cao gồm Hội nghị Bộ trưởng Ngoại giao ASEAN (AMM, 21/7), các hội nghị Post-Ministerial với đối tác đối thoại, tham vấn không chính thức về Myanmar (Đồng thuận 5 điểm), và lễ kỷ niệm 50 năm Hiệp ước Thân thiện và Hợp tác Đông Nam Á (TAC) ngày 24/7 - văn kiện nền tảng về nguyên tắc chung sống hoà bình khu vực.","items":[{"date":"2026-07-22","title":"Đụng độ tại bãi Cỏ Mây phủ bóng AMM-59, Rubio gặp Vương Nghị tại Manila","summary":"Ngày 21/7, tàu Philippines và Trung Quốc va chạm gần bãi Cỏ Mây (Ayungin) khiến một thủy thủ Philippines bị thương, hai nước triệu tập đại sứ của nhau; Mỹ lên án hành động 'nguy hiểm và hung hăng' của Trung Quốc. Ngoại trưởng Mỹ Marco Rubio tới Manila dự AMM-59 và dự kiến gặp Ngoại trưởng Trung Quốc Vương Nghị ngày 22/7 bên lề hội nghị.","sourceName":"Philippine Daily Inquirer","sourceUrl":"https://www.inquirer.net/481662/rubio-in-manilaas-us-hits-dangerouschina-actions/"},{"date":"2026-07-22","title":"Bộ tứ Quad ra tuyên bố chung bên lề AMM-59 tại Manila","summary":"Ngoại trưởng Mỹ, Nhật Bản, Australia và Ấn Độ họp bên lề loạt hội nghị ASEAN tại Manila ngày 22/7, ra tuyên bố chung tái khẳng định cam kết với một Ấn Độ Dương - Thái Bình Dương tự do, rộng mở và ủng hộ vai trò trung tâm, đoàn kết của ASEAN. Cuộc họp diễn ra chỉ hai ngày sau vụ va chạm giữa tàu Philippines và Trung Quốc ở Biển Đông.","sourceName":"The Tribune","sourceUrl":"https://www.tribuneindia.com/news/asean/quad-fmm-reaffirms-free-open-indo-pacific-commitment-backs-asean-unity-centrality"},{"date":"2026-07-20","title":"Philippines vận động các nước hạt nhân ký Nghị định thư SEANWFZ, ASEAN thúc đẩy mở lại Hormuz","summary":"Tại AMM-59 ở Manila, Philippines kêu gọi các quốc gia sở hữu vũ khí hạt nhân ký và phê chuẩn Nghị định thư của Hiệp ước Khu vực Đông Nam Á không có vũ khí hạt nhân (SEANWFZ) mà không bảo lưu — hồ sơ tồn đọng nhiều năm. Các ngoại trưởng khu vực cũng dự kiến kêu gọi mở hoàn toàn eo Hormuz do gián đoạn năng lượng gây sức ép lên các nền kinh tế nhập khẩu. Ngoại trưởng Mỹ (Rubio), Trung Quốc (Wang Yi) và Nga (Lavrov) đều có mặt, tạo cơ hội tiếp xúc bên lề, nhưng chưa có bằng chứng các nước hạt nhân sẵn sàng ký trong tuần này.","sourceName":"Philippine News Agency","sourceUrl":"https://www.pna.gov.ph/articles/1279867"},{"date":"2026-07-20","title":"AMM-59 khai mạc tại Manila; ASEAN chuẩn bị kêu gọi mở lại eo Hormuz, lễ ký TAC giữ lịch 24/7","summary":"Ngoại trưởng ASEAN bắt đầu chuỗi hội nghị tại Manila với chiến tranh Iran, an ninh năng lượng, Myanmar và Biển Đông trong chương trình nghị sự. Dự thảo cho thấy các nước Đông Nam Á muốn kêu gọi mở lại hoàn toàn eo Hormuz vì gián đoạn dầu khí đã tác động tới lạm phát, thương mại và chuỗi cung ứng khu vực. Ngoại trưởng Mỹ Marco Rubio, Vương Nghị (Trung Quốc) và Sergei Lavrov (Nga) dự kiến tham gia các cuộc họp liên quan; lễ ký kết nạp các bên mới vào TAC vẫn được lên lịch ngày 24/7.","sourceName":"Associated Press","sourceUrl":"https://apnews.com/article/2b968e79424b31ad4899331de0f214e4"},{"date":"2026-07-19","title":"ASEAN khai mạc vòng họp quan chức cao cấp (SOM) và Cấp cao Đông Á (EAS SOM) tại Manila, mở màn tuần lễ AMM 59","summary":"Ngày 19/7, Hội nghị quan chức cao cấp ASEAN (SOM) và Hội nghị quan chức cao cấp Cấp cao Đông Á (EAS SOM) đã khai mạc tại Manila, quy tụ các quan chức cấp cao ASEAN cùng Phó Tổng Thư ký ASEAN phụ trách Cộng đồng Chính trị-An ninh, nhằm chuẩn bị nội dung cho Hội nghị Bộ trưởng Ngoại giao ASEAN lần thứ 59 (khai mạc chính thức dự kiến 20/7). Hai chủ đề an ninh nổi bật được thảo luận là tiến trình đàm phán Bộ quy tắc ứng xử ở Biển Đông (COC) với Trung Quốc và tình hình Myanmar.","sourceName":"ASEAN Secretariat (asean.org)","sourceUrl":"https://asean.org/asean-senior-officials-meeting-convenes-in-manila/"},{"date":"2026-07-17","title":"ASEAN ấn định lễ ký kết nạp các bên mới vào TAC ngày 24/7 tại Manila","summary":"Ban Thư ký ASEAN xác nhận chuỗi Hội nghị Bộ trưởng Ngoại giao lần thứ 59 và các cuộc họp liên quan diễn ra tại Manila từ 18 đến 24/7. Ngày 24/7 sẽ có hội nghị cấp cao kỷ niệm 50 năm Hiệp ước Thân thiện và Hợp tác Đông Nam Á, kèm lễ ký dành cho các bên tham gia mới. Bộ Ngoại giao Philippines nói khoảng sáu đến bảy quốc gia dự kiến ký; danh sách cuối cùng chưa được công bố đầy đủ. Lịch và lễ ký đã được xác nhận chính thức, nhưng số bên tham gia vẫn phụ thuộc hoàn tất thủ tục trong tuần họp.","sourceName":"ASEAN Secretariat","sourceUrl":"https://asean.org/secretary-general-of-asean-to-participate-in-the-59th-asean-foreign-ministers-meeting-and-related-meetings-in-manila-the-republic-of-the-philippines/"},{"date":"2026-07-17","title":"Manila xác nhận đón Ngoại trưởng Mỹ, Trung Quốc, Nga dự loạt hội nghị ASEAN tuần tới","summary":"Philippines xác nhận Ngoại trưởng Mỹ Rubio, Trung Quốc Vương Nghị, Nga Lavrov cùng đại diện Nhật, Ấn Độ, Úc, New Zealand, EU sẽ dự tuần lễ cấp cao ASEAN tại Manila 19-24/7, gồm AMM, tham vấn Myanmar và kỷ niệm 50 năm Hiệp ước TAC.","sourceName":"Manila Times","sourceUrl":"https://www.manilatimes.net/2026/07/17/news/manila-to-host-rubio-yi-during-asean-foreign-ministers-meeting-next-week/2386192"}]},{"name":"Cơ chế Điều phối An ninh chung (JSCM) - Hiệp định Hoà bình CHDC Congo-Rwanda","status":"recent","dates":"15-17/07/2026","location":"Geneva, Thụy Sĩ","scale":"Mỹ, CHDC Congo, Rwanda, Qatar, Togo (trung gian Liên minh châu Phi), Ủy ban Liên minh châu Phi","summary":"Các bên họp phiên thứ 5 Cơ chế Điều phối An ninh chung triển khai Hiệp định Hoà bình Washington giữa CHDC Congo và Rwanda. Tuyên bố chung 17/7 tái khẳng định đẩy nhanh vô hiệu hoá FDLR, rút quân/dỡ biện pháp phòng thủ, và nhất trí khám phá cơ chế xác minh độc lập.","items":[{"date":"2026-07-17","title":"Mỹ, CHDC Congo, Rwanda ra tuyên bố chung sau phiên họp an ninh thứ 5 tại Geneva","summary":"Tuyên bố chung của Mỹ, CHDC Congo, Rwanda, Qatar, Togo và Ủy ban Liên minh châu Phi tái khẳng định triển khai Hiệp định Hoà bình Washington, nhất trí khám phá cơ chế xác minh và tiếp tục họp trong những tuần tới.","sourceName":"U.S. Department of State","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/joint-statement-on-the-fifth-meeting-of-the-joint-security-coordination-mechanism-for-the-peace-agreement-between-the-democratic-republic-of-the-congo-and-the-republic-of-rwanda"}]},{"name":"New Zealand - Papua New Guinea ký thỏa thuận hợp tác quốc phòng 2026-2029","status":"recent","dates":"22-23/07/2026","location":"Papua New Guinea","scale":"song phương","summary":"New Zealand và Papua New Guinea ký Tuyên bố Ý định về Hợp tác Quốc phòng giai đoạn 2026-2029, mở rộng đối thoại quốc phòng, huấn luyện, diễn tập chung và trao đổi nhân sự. Thỏa thuận nối tiếp Tuyên bố Đối tác NZ-PNG 2025-2029, nằm trong nỗ lực của Australia, New Zealand và Mỹ nhằm củng cố quan hệ an ninh với các đảo quốc Thái Bình Dương trước ảnh hưởng ngày càng lớn của Trung Quốc.","items":[{"date":"2026-07-22","title":"New Zealand, Papua New Guinea ký Tuyên bố Ý định về Hợp tác Quốc phòng 2026-2029","summary":"Bộ trưởng Quốc phòng New Zealand Chris Penk và Bộ trưởng Quốc phòng Papua New Guinea Elias Kapavore ký thỏa thuận mở rộng đối thoại, huấn luyện, diễn tập và trao đổi nhân sự quốc phòng, giữa lúc phương Tây đẩy mạnh gắn kết an ninh Thái Bình Dương.","sourceName":"Beehive.govt.nz","sourceUrl":"https://www.beehive.govt.nz/release/nz-and-png-strengthen-defence-ties"}]}],"terms":[{"term":"SLBM","explain":"Tên lửa đạn đạo phóng từ tàu ngầm — vũ khí hạt nhân chiến lược khó bị phát hiện, là trụ cột \"răn đe trên biển\" trong bộ ba hạt nhân."},{"term":"JL-3","explain":"Tên lửa đạn đạo phóng từ tàu ngầm thế hệ ba của Trung Quốc, tầm bắn ước tính trên 10.000 km, đủ vươn tới lục địa Mỹ từ vùng biển gần Trung Quốc."},{"term":"DF-17","explain":"Tên lửa của Trung Quốc mang đầu đạn lượn siêu vượt âm, tầm ~1.800–2.500 km, cơ động cao nhằm xuyên thủng các lá chắn phòng thủ tên lửa."},{"term":"MQ-9 Reaper","explain":"Máy bay không người lái vũ trang tầm xa của Mỹ, dùng cho trinh sát và tấn công; đơn giá cao khiến tổn thất lớn gây tốn kém."},{"term":"Patriot","explain":"Hệ thống tên lửa phòng không của Mỹ (biến thể PAC-3 chuyên đánh chặn tên lửa đạn đạo), được nhiều đồng minh sử dụng."},{"term":"Tomahawk","explain":"Tên lửa hành trình tấn công mặt đất tầm xa (~1.600 km) của Mỹ, phóng từ tàu chiến, tàu ngầm hoặc bệ mặt đất."},{"term":"Eo biển Hormuz","explain":"Điểm nghẽn hàng hải chiến lược giữa Vịnh Ba Tư và Vịnh Oman, nơi trung chuyển khoảng 1/5 lượng dầu tiêu thụ toàn cầu."},{"term":"CENTCOM","explain":"Bộ Tư lệnh Trung tâm Mỹ, phụ trách các hoạt động quân sự ở Trung Đông, Bắc Phi và Trung Á."},{"term":"IRGC","explain":"Vệ binh Cách mạng Hồi giáo Iran — lực lượng quân sự - chính trị tinh nhuệ, kiểm soát chương trình tên lửa và các lực lượng ủy nhiệm của Iran."},{"term":"Hạm đội 5","explain":"Hạm đội 5 Hải quân Mỹ, đặt bộ chỉ huy tại Bahrain, phụ trách vùng Vịnh, Biển Đỏ và Ấn Độ Dương."},{"term":"RIMPAC","explain":"Rim of the Pacific — cuộc tập trận hải quân đa quốc gia lớn nhất thế giới do Mỹ chủ trì hai năm một lần tại Hawaii."},{"term":"Joint Sea","explain":"Chuỗi tập trận hải quân chung thường niên giữa Trung Quốc và Nga, biểu tượng cho hợp tác quân sự ngày càng sâu giữa hai nước."},{"term":"NATO","explain":"Tổ chức Hiệp ước Bắc Đại Tây Dương — liên minh quân sự phòng thủ tập thể gồm Mỹ và các nước châu Âu, Canada, Thổ Nhĩ Kỳ."},{"term":"AUKUS","explain":"Hiệp ước an ninh ba bên Úc - Anh - Mỹ (2021), trọng tâm là trang bị tàu ngầm chạy bằng năng lượng hạt nhân cho Úc."},{"term":"ASBM","explain":"Tên lửa đạn đạo diệt hạm — tên lửa đạn đạo có khả năng đánh trúng tàu chiến di động trên biển, thay đổi cán cân tác chiến hải quân."},{"term":"CASD","explain":"Continuous At-Sea Deterrence — răn đe trên biển liên tục, tức luôn có ít nhất một tàu ngầm mang tên lửa hạt nhân tuần tra sẵn sàng."},{"term":"AWACS","explain":"Máy bay chỉ huy - cảnh báo sớm trên không (như E-3 Sentry), làm \"mắt thần\" quản lý không phận và điều phối tác chiến."},{"term":"ADB","explain":"Ngân hàng Phát triển châu Á — định chế tài chính đa phương hỗ trợ phát triển kinh tế - xã hội khu vực châu Á - Thái Bình Dương."},{"term":"IMF","explain":"Quỹ Tiền tệ Quốc tế — định chế giám sát ổn định tài chính toàn cầu, cho vay và tư vấn chính sách cho các nước thành viên."},{"term":"Vùng phi hạt nhân Nam Thái Bình Dương","explain":"Khu vực được Hiệp ước Rarotonga (1985) tuyên bố cấm thử, bố trí và tàng trữ vũ khí hạt nhân ở Nam Thái Bình Dương."},{"term":"Lợi suất trái phiếu","explain":"Mức sinh lời của trái phiếu; lợi suất tăng phản ánh nhà đầu tư đòi bù đắp rủi ro cao hơn hoặc lo ngại tài khóa/lạm phát."},{"term":"Phi đô la hóa","explain":"Xu hướng các nước giảm phụ thuộc vào đồng USD trong dự trữ, thanh toán và thương mại quốc tế."},{"term":"Đất hiếm","explain":"Nhóm 17 nguyên tố thiết yếu cho điện tử, xe điện và vũ khí công nghệ cao; Trung Quốc hiện thống trị khâu chế biến toàn cầu."},{"term":"Greenland","explain":"Hòn đảo tự trị thuộc Đan Mạch, vị trí chiến lược ở Bắc Cực và giàu khoáng sản; là mục tiêu tham vọng lãnh thổ của Trump."},{"term":"Su-35","explain":"Tiêm kích đa năng hạng nặng thế hệ 4++ của Nga, một trong những chiến đấu cơ chủ lực của không quân Nga."},{"term":"Vốn hóa thị trường","explain":"Tổng giá trị thị trường của toàn bộ cổ phiếu một công ty, bằng giá cổ phiếu nhân số cổ phiếu lưu hành."},{"term":"Lớp Slava","explain":"Lớp tuần dương hạm mang tên lửa dẫn đường thời Liên Xô (Project 1164) của Nga; soái hạm Varyag thuộc Hạm đội Thái Bình Dương."}],"rejectedNews":[{"date":"2026-07-23","category":"Công nghệ quân sự","title":"Hạ viện Mỹ thông qua dự luật quốc phòng và kế hoạch ngân sách kỷ lục","summary":"","sourceName":"Báo Thế Giới & Việt Nam","sourceUrl":"https://baomoi.com/ha-vien-my-thong-qua-du-luat-quoc-phong-va-ke-hoach-ngan-sach-ky-luc-c55674786.epi","region":"","reason":"Ứng viên Báo Mới không được chọn — 👍 để đưa vào bản tin","addedAt":"2026-07-23"},{"date":"2026-07-23","category":"Kinh tế","title":"Houthi tấn công hai tàu chở dầu của Saudi Arabia trên Biển Đỏ","summary":"","sourceName":"Báo Thế Giới & Việt Nam","sourceUrl":"https://baomoi.com/houthi-tan-c lein làm giám đốc chương trình lá chắn tên lửa toàn quốc Golden Dome (ước tính hơn 175 tỷ USD), phụ trách tích hợp Space Force, Missile Defense Agency, Army, Navy, Air Force.","sourceName":"Air & Space Forces Magazine","sourceUrl":"https://www.airandspaceforces.com/space-force-guetlein-confirmed-golden-dome-czar/","region":"Toàn cầu","reason":"Ngoài khung ngày (17/7, cần 18-19/7).","addedAt":"2026-07-22"},{"date":"2026-07-16","category":"Công nghệ quân sự","title":"DARPA và Không quân Mỹ bay thử F-16 do AI điều khiển tự động (chương trình VENOM)","summary":"F-16 gắn bộ kit VENOM (Viper Experimentation and Next-generation Operations Model) của DARPA lần đầu chuyển từ thử nghiệm mặt đất sang bay thật với AI điều khiển một phần chuyến bay, phi công an toàn giám sát và có thể can thiệp bất kỳ lúc nào.","sourceName":"DARPA","sourceUrl":"https://www.darpa.mil/news/2026/darpa-us-air-force-fly-ai-controlled-f-16","region":"Toàn cầu","reason":"Ngoài khung ngày (16/7, cần 18-19/7).","addedAt":"2026-07-22"},{"date":"2026-07-18","category":"Công nghệ quân sự","title":"Rafael trưng bày laser Iron Beam và hợp đồng SPYDER 2,3 tỷ USD với Romania tại Farnborough","summary":"Bài viết quảng bá dịp Farnborough Airshow 2026 nhắc lại việc Rafael giao hệ thống laser Iron Beam cho Israel (đã diễn ra 28/12/2025) và hợp đồng SPYDER với Romania (đã ký 24/6/2026) — không phải sự kiện/ký kết mới.","sourceName":"Tech Times","sourceUrl":"https://www.techtimes.com/articles/320931/20260718/rafael-brings-worlds-first-operational-laser-23b-nato-deal-farnborough.htm","region":"Trung Đông","reason":"Ngày đăng bài (18/7) đạt khung nhưng nội dung thực chất là tin cũ tái đăng (giao hàng 12/2025, ký hợp đồng 6/2026), không phải diễn biến mới.","addedAt":"2026-07-22"},{"date":"2026-07-18","category":"Công nghệ quân sự","title":"Mỹ mở rộng không kích Iran sang cầu, ga và hạ tầng cảng trong đêm thứ bảy","summary":"Mỹ tiếp tục đêm không kích thứ bảy, đánh các cầu quanh Bandar Abbas, ga đường sắt, sân bay Iranshahr và tháp giám sát tại Chabahar; lực lượng Mỹ cũng lên tàu trong khuôn khổ phong tỏa cảng. Iran đáp trả bằng tên lửa và drone vào các mục tiêu tại Qatar, Kuwait, Bahrain, Jordan và Oman. Tehran báo cáo ít nhất 38 người chết và hơn 400 người bị thương kể từ khi ngừng bắn sụp đổ ngày 8/7, nhưng một số tuyên bố thiệt hại của hai phía chưa được xác minh độc lập. Lưu lượng qua Hormuz tiếp tục suy giảm mạnh.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/world/2026/jul/17/us-marines-board-ship-gulf-oman-expanded-airstrikes-iran","reason":"Mỹ-Iran chiến sự/không kích đã đưa nhiều tin - tránh lặp","region":"Trung Đông","addedAt":"2026-07-22"},{"date":"2026-07-18","category":"Chính trị","title":"Ukraine bước vào khủng hoảng lãnh đạo quốc phòng giữa biểu tình và tranh cãi chiến lược","summary":"Ukraine vận hành với quyền bộ trưởng quốc phòng Yevhenii Khmara sau khi Tổng thống Volodymyr Zelenskyy bãi nhiệm Mykhailo Fedorov, người gắn với cải cách drone, dữ liệu và mua sắm minh bạch. Biểu tình tiếp diễn sang ngày thứ hai, trong khi tranh cãi công khai tập trung vào xung đột giữa Fedorov và Tổng tư lệnh Oleksandr Syrskyi về đổi mới chiến trường, tổn thất và quyền kiểm soát dân sự. Việc Khmara được quốc hội phê chuẩn có thể vướng lịch nghỉ và thủ tục. Nhiều chi tiết động cơ chính trị vẫn là nhận định báo chí, chưa được tổng thống giải thích đầy đủ.","sourceName":"Associated Press","sourceUrl":"https://apnews.com/article/966aa6f66b81df96310531af1f11fba5","reason":"tiếp nối vụ cách chức Fedorov đã đưa + nghiêng khủng hoảng nhân sự","region":"Châu Âu/NATO","addedAt":"2026-07-22"},{"date":"2026-07-17","category":"Ngoại giao","title":"Iran tuyên bố tấn công gần al-Tanf, lần đầu chiến sự hiện tại lan trực tiếp sang Syria","summary":"IRGC nói đã đánh một trung tâm chỉ huy đặc nhiệm Mỹ tại khu vực al-Tanf ở đông Syria để trả đũa các binh sĩ Iran thiệt mạng tại Iranshahr. Một nguồn quân sự Syria xác nhận có đòn đánh gần al-Tanf nhưng nói căn cứ không bị trúng, không có thương vong hay thiệt hại; Mỹ đã rút khỏi căn cứ này từ tháng 2. Reuters không thể xác minh độc lập tuyên bố của Tehran. Đây là lần đầu Iran nhận trách nhiệm tấn công lãnh thổ Syria trong vòng chiến sự hiện tại, trong khi Damascus tiếp tục tuyên bố muốn đứng ngoài xung đột khu vực.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/world/middle-east/irans-irgc-say-they-targeted-us-command-centre-syria-state-media-reports-2026-07-17/","reason":"Mỹ-Iran lan Syria - chủ đề đã bão hoà","region":"Trung Đông","addedAt":"2026-07-22"},{"date":"2026-07-17","category":"Kinh tế","title":"Trung Quốc tăng giá bán lẻ xăng dầu từ 18/7 khi cú sốc Hormuz lan sang châu Á","summary":"Cơ quan hoạch định kinh tế Trung Quốc thông báo tăng giá bán lẻ xăng và diesel từ ngày 18/7, phản ánh đợt tăng của dầu thô quốc tế do chiến sự Mỹ–Iran và bất ổn tại eo Hormuz. Đây là tín hiệu truyền dẫn nhanh từ rủi ro an ninh hàng hải sang chi phí vận tải và sản xuất tại nền kinh tế nhập khẩu năng lượng lớn nhất thế giới. Quyết định điều chỉnh theo cơ chế giá trong nước chưa tự thân cho thấy thiếu nhiên liệu, nhưng nếu Hormuz tiếp tục tắc nghẽn, Bắc Kinh có thể phải cân bằng giữa kiểm soát lạm phát, hỗ trợ tăng trưởng và bảo đảm nguồn cung.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/business/energy/china-raise-domestic-retail-petrol-diesel-prices-july-18-2026-07-17/","reason":"giá bán lẻ xăng dầu TQ - niche/thường quy","region":"Đông Á","addedAt":"2026-07-22"},{"date":"2026-07-16","category":"Kinh tế","title":"29 nước ký thành lập Tổ chức Hợp tác AI Thế giới (WAICO) tại Thượng Hải","summary":"Trung Quốc, Nga, Brazil, Indonesia... ký hiệp định thành lập WAICO (cơ quan quản trị AI đặt tại Thượng Hải), Tổng thư ký LHQ Guterres dự lễ ký.","sourceName":"Caixin Global","sourceUrl":"https://www.caixinglobal.com/2026-07-17/china-launches-shanghai-based-ai-governance-body-with-29-founding-nations-102465524.html","region":"Đông Á","reason":"Ngày ký 16/07 - ngoài khung 2 ngày (nhưng đáng chú ý: quản trị AI toàn cầu)","addedAt":"2026-07-22"},{"date":"2026-07-15","category":"Kinh tế","title":"Nội các Ấn Độ duyệt chương trình Semicon 2.0 trị giá 1,275 nghìn tỷ rupee cho ngành bán dẫn","summary":"Nội các Ấn Độ do Modi chủ trì phê duyệt gói Semicon 2.0 (~13,2 tỷ USD) phát triển toàn diện hệ sinh thái thiết kế, chế tạo, đóng gói và R&D bán dẫn.","sourceName":"PIB India","sourceUrl":"https://www.pib.gov.in/PressReleasePage.aspx?PRID=2284784","region":"Ấn Độ Dương - Thái Bình Dương","reason":"Đúng gu chuỗi cung ứng bán dẫn nhưng phê duyệt 15/07 - ngoài khung 2 ngày","addedAt":"2026-07-22"},{"date":"2026-07-17","category":"Chính trị","title":"Mỹ siết phong tỏa xuất khẩu dầu Iran, tàu chở dầu vòng tránh qua eo Hormuz","summary":"Ngày 17/7 nhiều tàu chở dầu liên quan Iran quay đầu, đổi hướng hoặc di chuyển zig-zag ở Vịnh Oman/biển Arab khi Hải quân Mỹ siết phong tỏa; CENTCOM chuyển hướng 3 tàu thương mại, lên 1 tàu kiểm tra, vô hiệu hóa 1 tàu không tuân thủ.","sourceName":"Bloomberg","sourceUrl":"https://www.bloomberg.com/news/articles/2026-07-17/iran-linked-tankers-u-turn-and-zig-zag-as-us-enforces-blockade","region":"Trung Đông","reason":"Mỹ-Iran phong tỏa đã đưa nhiều tin gần đây - tránh lặp chủ đề","addedAt":"2026-07-22"},{"date":"2026-07-16","category":"Chính trị","title":"EU chuẩn bị gói trừng phạt mini nhắm linh kiện drone Shahed/Geran của Nga","summary":"Hội đồng EU dự kiến thông qua 17/7 gói trừng phạt nhắm 5 pháp nhân và 1 cá nhân sản xuất linh kiện tăng năng lực chiến đấu cho drone Shahed/Geran, sau khi gói 21 không đạt đồng thuận 13/7.","sourceName":"Ukrainska Pravda","sourceUrl":"https://www.pravda.com.ua/eng/news/2026/07/16/8044404/","region":"Châu Âu/NATO","reason":"chủ đề trừng phạt Nga/EU đã đưa nhiều lần - tránh lặp","addedAt":"2026-07-22"},{"date":"2026-07-14","category":"Công nghệ quân sự","title":"Hãng drone AI Đức Helsing huy động 1,8 tỷ USD, mở nhà máy Mỹ đầu tiên sản xuất drone tấn công HX-2","summary":"Helsing (đối thủ châu Âu của Anduril) hoàn tất vòng Series E 1,8 tỷ USD (định giá 18 tỷ USD) và chọn Martinsburg, West Virginia đặt nhà máy đầu tiên tại Mỹ cho drone tấn công AI HX-2.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/german-uav-firm-helsing-picks-west-virginia-for-first-us-manufacturing/","region":"Châu Âu/NATO","reason":"Đúng gu AI quân sự/drone nhưng đăng 14/07 - ngoài khung 2 ngày","addedAt":"2026-07-22"},{"date":"2026-07-03","category":"Công nghệ quân sự","title":"Chương trình tiêm kích thế hệ 6 GCAP (Anh-Ý-Nhật) ký hợp đồng 6,1 tỷ USD giai đoạn thiết kế","summary":"Liên doanh Edgewing (BAE Systems, Leonardo, JAIEC) nhận hợp đồng 4,6 tỷ bảng (6,1 tỷ USD) hoàn tất giai đoạn concept and assessment và chuyển sang thiết kế chi tiết tiêm kích tàng hình thế hệ 6 GCAP, hướng biên chế 2035.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/european-next-gen-gcap-fighter-program-pushes-ahead-with-6-1-billion-contract/","region":"Châu Âu/NATO","reason":"Khí tài đúng gu nhưng ký 03/07 - ngoài khung 2 ngày","addedAt":"2026-07-22"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"4 nước NATO mua drone trinh sát tầm cao MQ-4C Triton","summary":"Đan Mạch, Phần Lan, Đức, Na Uy công bố tại Diễn đàn Công nghiệp Quốc phòng NATO ở Ankara việc mua tới 5 drone trinh sát tầm cao/độ bền dài MQ-4C Triton của Northrop Grumman, bổ sung phi đội AGS ở Sigonella (Ý).","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/nato-mq-4c-triton-procurement-uav-isr/","region":"Châu Âu/NATO","reason":"drone/ISR đúng gu nhưng công bố 07/07 - ngoài khung","addedAt":"2026-07-22"},{"date":"2026-07-15","category":"Ngoại giao","title":"Chỉ huy quân đội Mỹ-Nhật-Hàn họp phiên 23, ra tuyên bố chung tái khẳng định hợp tác an ninh","summary":"Tướng Jin Yong-sung, Dan Caine, Hiroaki Uchikura họp tại Washington, cam kết duy trì tập trận Freedom Edge.","sourceName":"The Korea Herald","sourceUrl":"https://www.koreaherald.com/article/10811642","region":"Đông Á","reason":"họp 15/07 + chỉ tái khẳng định, không văn kiện mới - ngoài khung","addedAt":"2026-07-22"},{"date":"2026-07-13","category":"Ngoại giao","title":"Úc-New Zealand ký lại Plan ANZAC","summary":"Tư lệnh Lục quân Úc và New Zealand ký lại thoả thuận hợp tác quân đội song phương Plan ANZAC.","sourceName":"Defence Connect","sourceUrl":"https://www.defenceconnect.com.au/land/18530-australian-army-signs-renewed-plan-anzac-bilateral-agreement-with-new-zealand-army","region":"Ấn Độ Dương - Thái Bình Dương","reason":"ký 13/07 - ngoài khung 2 ngày","addedAt":"2026-07-22"},{"date":"2026-07-16","category":"Công nghệ quân sự","title":"Nguồn tin nói Iran yêu cầu Houthi sẵn sàng đóng Bab el-Mandeb nếu Mỹ đánh lưới điện","summary":"Reuters dẫn các nguồn am hiểu cho biết Tehran đã yêu cầu lực lượng Houthi chuẩn bị chặn Bab el-Mandeb nếu Mỹ tấn công mạng lưới điện của Iran. Theo bài độc quyền, tên lửa và drone đã được bố trí cho kịch bản này, nhưng Iran và Houthi chưa phản hồi, còn Reuters không xác minh độc lập được kế hoạch tác chiến. Thông tin vì vậy phải được xem là tín hiệu cảnh báo có điều kiện, chưa phải quyết định đóng tuyến. Nếu xảy ra, cú sốc sẽ nối Hormuz với cửa ngõ Biển Đỏ–Suez, tạo áp lực lớn lên vận tải toàn cầu.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/world/middle-east/iran-tells-houthis-close-red-sea-gateway-if-us-hits-power-network-sources-say-2026-07-16/","reason":"tin 'nguồn tin nói' (đe dọa/tình báo) chưa xác nhận — chưa đủ chuẩn sự kiện","region":"Trung Đông","addedAt":"2026-07-22"},{"date":"2026-07-16","category":"Công nghệ quân sự","title":"Nga và Ukraine đưa ra tuyên bố đối nghịch về các vụ đánh tàu; giá lúa mì bật tăng","summary":"Ukraine tuyên bố đã đánh 11 tàu Nga, trong khi Moscow nói lực lượng Nga phá hủy một tàu và một xuồng cao tốc Ukraine. Reuters chưa thể xác minh độc lập các tuyên bố chiến trường. Nga hạn chế hoạt động hàng hải tại Biển Azov; phía Ukraine cho biết hai cảng vẫn hoạt động bình thường nhưng lượng tàu vào Chornomorsk giảm. Thị trường phản ứng ngay: lúa mì Euronext tăng khoảng 7% và hợp đồng Chicago tăng khoảng 5%. Tác động kinh tế đã rõ hơn kết quả quân sự, đặc biệt với xuất khẩu ngũ cốc qua Biển Đen.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/business/aerospace-defense/russia-says-it-hits-military-targets-kyiv-ukrainian-ports-2026-07-16/","reason":"bộ lọc: Nga-Ukraine chiến sự lặp","region":"Châu Âu/NATO","addedAt":"2026-07-22"},{"date":"2026-07-15","category":"Kinh tế","title":"Fed nhấn mạnh rủi ro lạm phát trong khi Beige Book cho thấy kinh tế Mỹ còn chống chịu","summary":"Thống đốc Fed Lisa Cook cho biết thước đo lạm phát mục tiêu tăng 3,7% đến tháng 6, cao hơn mục tiêu khoảng 1,7 điểm phần trăm, trong khi thất nghiệp giữ ở 4,2%. Bà nhấn mạnh cú sốc Trung Đông và làn sóng đầu tư AI, trung tâm dữ liệu trên 1,5 nghìn tỷ USD có thể vừa nâng năng suất vừa tạo áp lực giá; Fed sẵn sàng hành động nếu giảm lạm phát đình trệ. Beige Book ghi nhận hoạt động kinh tế tăng nhẹ đến vừa tại 11/12 khu vực, việc làm tăng và giá cả tiếp tục đi lên mức vừa phải.","sourceName":"Federal Reserve Board","sourceUrl":"https://www.federalreserve.gov/newsevents/speech/cook20260715a.htm","reason":"đã có nhiều tin Fed hôm nay (Warsh/Waller/CPI) — tránh trùng chủ đề","addedAt":"2026-07-22"},{"date":"2026-07-15","category":"Chính trị","title":"Đức cảnh báo Mỹ không can thiệp bầu cử sau chương trình tài trợ cho các nhóm châu Âu","summary":"Thủ tướng Đức Friedrich Merz cảnh báo chống can thiệp bầu cử sau khi một chương trình tài trợ 3 triệu USD của Mỹ hướng tới các sáng kiến châu Âu về chủ quyền, di cư và kiểm duyệt gây tranh cãi. Merz nhấn mạnh tài trợ chính trị từ nước ngoài là bất hợp pháp theo luật Đức. Guardian và Caliber.Az mô tả chương trình có khả năng thu hút các nhóm cùng khuynh hướng MAGA, nhưng việc một tổ chức nhận tài trợ không đồng nghĩa có chỉ đạo bầu cử. Diễn biến cho thấy căng thẳng xuyên Đại Tây Dương đang mở rộng sang không gian chính trị và thông tin.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/us-news/2026/jul/15/germany-warns-against-election-interference-as-us-offers-funding-to-maga-aligned-causes-in-europe","reason":"chính trị tranh cãi/ảnh hưởng thông tin — ngoài gu thể chế-chiến lược","region":"Châu Âu/NATO","addedAt":"2026-07-22"},{"date":"2026-07-16","category":"Ngoại giao","title":"Đặc phái viên ASEAN sẽ báo cáo tham vấn Myanmar trước hội nghị Manila","summary":"Đặc phái viên ASEAN về Myanmar, Ngoại trưởng Philippines Ma. Theresa Lazaro, cho biết sẽ tiếp tục tiếp xúc với mọi bên liên quan và báo cáo các bộ trưởng tại Manila vào tuần tới. Hội nghị dự kiến quy tụ các ngoại trưởng lớn, trong đó có Marco Rubio, Vương Nghị và Sergei Lavrov; Myanmar, đàm phán Bộ quy tắc ứng xử Biển Đông và hệ quả xung đột Iran nằm trong chương trình rộng hơn. Tuyên bố “tiếp xúc mọi bên” chưa đồng nghĩa có đột phá với chính quyền quân sự hay lực lượng đối lập, nhưng giúp đo mức đoàn kết của ASEAN.","sourceName":"BusinessWorld Online","sourceUrl":"https://bworldonline.com/the-nation/2026/07/16/763894/asean-envoy-says-to-engage-all-myanmar-stakeholders-will-brief-ministers-at-manila-meeting-next-week/","reason":"chỉ là 'sẽ báo cáo/tham vấn', chưa có kết quả cụ thể","region":"Ấn Độ Dương - Thái Bình Dương","addedAt":"2026-07-22"},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"Space Force ký hợp đồng 69 triệu USD với Slingshot Aerospace cho huấn luyện AI phòng thủ không gian","summary":"Lực lượng Không gian Mỹ trao hợp đồng SBIR Phase III 69,2 triệu USD cho Slingshot Aerospace phát triển môi trường huấn luyện tích hợp AI 'Mentat', giúp Guardian diễn tập kịch bản bảo vệ vệ tinh và phản ứng trước hành động đối phương trong không gian.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-awards-slingshot-69-million-for-ai-enabled-training-technology/","region":"","reason":"hợp đồng huấn luyện - ưu tiên thấp, nhường chỗ tin khí tài nổi bật hơn cùng ngày","addedAt":"2026-07-22"},{"date":"2026-07-15","category":"Ngoại giao","title":"Israel và Lebanon kết thúc vòng đàm phán thứ 6 tại Rome về vùng thí điểm rút quân","summary":"Phái đoàn Israel và Lebanon kết thúc hai ngày đàm phán cấp đại sứ do Mỹ trung gian tại Rome, thống nhất 'cấu trúc và hướng dẫn' cho tiến trình vùng thí điểm ở Nam Lebanon; chưa có mốc thời gian rút quân cụ thể.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/15/lebanon-and-israel-end-sixth-round-of-us-brokered","region":"Trung Đông","reason":"đàm phán chưa có văn kiện/kết quả cụ thể; nguồn cần đối chiếu","addedAt":"2026-07-22"},{"date":"2026-07-13","category":"Ngoại giao","title":"AFRICOM và Morocco ký MOU lập Trung tâm Huấn luyện - Thử nghiệm Đa miền châu Phi (AMTEC)","summary":"Lực lượng Vũ trang Hoàng gia Morocco và AFRICOM ký MOU lập AMTEC ở Tan-Tan (vận hành từ 2030) gồm khu huấn luyện đa miền, học viện drone và trung tâm thử nghiệm, hỗ trợ đối tác châu Phi chống khủng bố bằng drone.","sourceName":"AFRICOM","sourceUrl":"https://www.africom.mil/pressrelease/36748/morocco-and-africom-seek-to-establish-the-africa-multidomain-training-and-experimentation","region":"Toàn cầu","reason":"ngoài khung 2 ngày (ký 13/07)","addedAt":"2026-07-22"},{"date":"2026-06-29","category":"Chính trị","title":"Tòa Tối cao Mỹ mở rộng quyền sa thải của Tổng thống với cơ quan độc lập (Trump v. Slaughter)","summary":"Tòa án Tối cao ra phán quyết 6-3 trong vụ Trump v. Slaughter, lật precedent 91 năm Humphrey's Executor, cho phép Tổng thống sa thải tùy ý thành viên cơ quan độc lập (như FTC), củng cố học thuyết 'unitary executive'; vẫn giữ ngoại lệ cho Thống đốc Fed.","sourceName":"NPR","sourceUrl":"https://www.npr.org/2026/06/29/nx-s1-5816232/supreme-court-ftc-independent-agencies-humphreys-executor","region":"","reason":"ngoài khung 2 ngày (phán quyết 29/06)","addedAt":"2026-07-22"},{"date":"2026-07-03","category":"Chính trị","title":"Quốc hội Pháp thông qua cập nhật Luật Chương tr function esc(s){s=(s==null?'':''+s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtVN(s){if(!s)return '';var p=(''+s).split('-');return p.length===3?(p[2]+'-'+p[1]+'-'+p[0].slice(2)):(''+s);}
/* Dấu "Cập nhật": ngày + GIỜ quét (HH:MM giờ VN). Giờ đi kèm đúng mốc ngày đang hiển thị —
   worldGeneratedAt thì lấy worldGeneratedTime, ngược lại lấy generatedTime. Bản dữ liệu cũ
   chưa có *Time thì chỉ hiện ngày như trước. */
function stampVN(){
  var wd=DATA.worldGeneratedAt,d=wd||DATA.generatedAt;
  var t=(wd?DATA.worldGeneratedTime:DATA.generatedTime)||'';
  /* Phiên chỉ nạp tin Mỹ không bump worldGeneratedTime — cùng ngày thì mượn generatedTime. */
  if(!t&&d&&d===DATA.generatedAt)t=DATA.generatedTime||'';
  var s=fmtVN(d);
  return s&&t?s+' '+t:s;
}

  var groups=LIVE_DOSSIERS.map(function(d){var arr=pool.filter(function(a){return (d[1].test(txtOf(a))||(d[2]&&d[2](a)))&&matchQ(a);});return [d[0],arr];});
  var chips='<div class="chips"><span class="chip'+(state.dossier==='Tất cả'?' on':'')+'" data-dossier="Tất cả">Tất cả ('+groups.length+')</span>';
  groups.forEach(function(g){chips+='<span class="chip'+(state.dossier===g[0]?' on':'')+'" data-dossier="'+esc(g[0])+'">'+esc(g[0])+' ('+g[1].length+')</span>';});
  chips+='</div>';
  var shown=groups.filter(function(g){return state.dossier==='Tất cả'||g[0]===state.dossier;});
  var body=shown.map(function(g){
    var arr=g[1];
    if(!arr.length)return '<section class="drill"><div class="drill-h"><div class="drill-name">'+esc(g[0])+'</div><div class="drill-meta">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có diễn biến mới.')+'</div></div></section>';
    var ds=arr.map(function(a){return a.date;}).filter(Boolean).slice().sort();
    var range=ds.length?(fmtVN(ds[0])+(ds[ds.length-1]!==ds[0]?' – '+fmtVN(ds[ds.length-1]):'')):'';
    var cards=arr.map(function(a){return card(a.handle?xCardInner(a):newsCardInner(a),idOf(a));}).join('');
    return '<section class="drill"><div class="drill-h"><div class="drill-name">'+esc(g[0])+'</div><div class="drill-meta">📰 '+arr.length+' tin'+(range?' · '+range:'')+'</div></div><div class="list">'+cards+'</div></section>';
  }).join('');
  return '<div class="note"><b>4 hồ sơ sống</b> — các câu chuyện lớn đang chạy, gom tin Thế giới + Mỹ + X theo chủ đề (tự động). Bấm chip để lọc từng hồ sơ.</div>'+chips+body;
}

/* ==== Bài "đã lưu" từ Báo Mới — đã LỌC đúng 4 chủ đề của web, trộn thẳng vào luồng tin (tự cập nhật hằng ngày qua Action sync-baomoi). Không có tab riêng. ==== */
var BAOMOI_MERGED=false;
function loadBaomoi(){
  if(BAOMOI_MERGED)return;
  fetch('baomoi-saved.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(sv){
    BAOMOI_MERGED=true;
    if(!sv||!sv.items||!sv.items.length)return;
    /* Dedupe theo CẢ url LẪN tiêu đề. Chỉ so tiêu đề là không đủ: phiên quét viết lại tiêu đề
       khi nạp bài vào DATA (vd thêm "PAC-3 ACE" vào cuối), nên bản client không nhận ra bài đã
       có và trộn thêm lần nữa -> tin hiện 2 lần trên web. url thì không bị viết lại. */
    var seen={},seenU={};
    (DATA.worldNews||[]).concat(DATA.usNews||[]).forEach(function(a){
      if(!a)return; if(a.title)seen[norm(a.title)]=1; if(a.sourceUrl)seenU[a.sourceUrl]=1;
      /* _baomoiUrl = bookmark gốc của bài đã được thay sang nguồn nước ngoài (xem
         scripts/replace_source.py). Thiếu dòng này thì bài đó bị trộn lại thành tin thứ hai. */
      if(a._baomoiUrl)seenU[a._baomoiUrl]=1;});
    var add=[];
    sv.items.forEach(function(it){
      var u=it.sourceUrl||it.url||'';if(u&&seenU[u])return;
      var k=norm(it.title||'');if(!k||seen[k])return;seen[k]=1;if(u)seenU[u]=1;
      add.push({date:it.date,category:it.category,title:it.title,summary:it.summary||'',
        sourceName:it.sourceName||it.source||'Báo Mới',sourceUrl:it.sourceUrl||it.url||'',
        region:it.region||'',_baomoi:true});
    });
    if(!add.length)return;
    DATA.worldNews=(DATA.worldNews||[]).concat(add);
    render();
  }).catch(function(){BAOMOI_MERGED=true;});
}

  /* 3 chủ đề trên Trang chủ (thay 2 cột Thế giới/Mỹ) */
  var _reUS=/hạ viện|thượng viện|nghị sĩ|dự luật|đạo luật|lưỡng viện|ndaa|h\.con|h\.r\.|\bfcc\b|\bustr\b|nhà trắng|tòa tối cao|sắc lệnh hành pháp|điều trần|phê chuẩn|luận tội|quốc hội mỹ|quốc hội hoa kỳ|ủy ban (quân vụ|tài chính|đối ngoại|tình báo|chuẩn chi|tư pháp)/i;
  var _reAUSC=/australia|aukus|canberra|penny wong|biển đông|south china sea|scarborough|cỏ mây|second thomas|trường sa|hoàng sa|marcos|philippines|(^|[^\p{L}])úc([^\p{L}]|$)/iu;
  var _reMILUS=/lầu năm góc|space force|lockheed|raytheon|\brtx\b|boeing|northrop|darpa|hải quân mỹ|không quân mỹ|lục quân mỹ|thủy quân lục chiến|pentagon|centcom|coaspire|anduril|l3harris|general dynamics|bộ chiến tranh|quân đội mỹ|(^|[^\p{L}])mỹ([^\p{L}]|$)/iu;
  var _uspool=sortD(DATA.usNews||[]);
  var _allpool=newsPool();
  /* Mỗi mục hiện TẤT CẢ tin mới quét trong ngày thuộc mục đó (không cắt còn 5). Mục nào hôm nay
     chưa có tin mới thì lùi về 5 tin gần nhất để trang chủ không trống. */
  function secOf(pool,re,extra){
    var all=pool.filter(function(a){return re.test(txtOf(a))&&(!extra||extra(a));});

    return fresh.length?{items:fresh,fresh:true}:{items:all.slice(0,5),fresh:false};
  }
  var s1=secOf(_uspool,_reUS);
  var s2=secOf(_allpool,_reAUSC);

  var _seen={};

      '<span class="chip chip-rej on" data-newsseg="rejected">🚫 Bị loại'+(n?' ('+n+')':'')+'</span></div>';
    return back+renderRejected();

function content(){
  if(state.tab==='home')return renderHome();
  /* Tương thích ngược: link/tab cũ. fresh/world/us/x → mở Điểm Tin với đúng chip lọc;
     rejected → mở mục Bị loại. */
  var SEG2FRESH={fresh:'Tất cả',world:'world',us:'us',x:'x'};
  if(SEG2FRESH[state.tab]!=null){state.fresh=SEG2FRESH[state.tab];state.newsSeg='fresh';state.tab='news';}
  else if(state.tab==='rejected'){state.newsSeg='rejected';state.tab='news';}
  if(state.tab==='news')return renderNews();
  if(state.tab==='analysis')return renderAnalysis();
  if(state.tab==='topic')return renderTopic();
  if(state.tab==='saved')return renderSaved();
  return renderNews();
}

/* ==== Bôi đen chữ trong tin → nút "Lưu khái niệm" ==== */
function cFab(){var f=document.getElementById('concept-fab');if(!f){f=document.createElement('button');f.id='concept-fab';f.type='button';f.textContent='★ Lưu khái niệm';document.body.appendChild(f);
  f.addEventListener('mousedown',function(e){e.preventDefault();});
  f.addEventListener('click',function(e){e.stopPropagation();addConcept(f._t||'');f.style.display='none';var s=window.getSelection&&window.getSelection();if(s)s.removeAllRanges();if(state.tab==='saved'&&state.savedSeg==='concepts')reContent();});}
  return f;}
function onSel(){
  var f=document.getElementById('concept-fab');
  var s=window.getSelection?window.getSelection():null;
  var txt=s&&s.rangeCount?(''+s).trim():'';
  var node=s&&s.anchorNode; node=node&&node.nodeType===3?node.parentNode:node;
  var host=node&&node.closest?node.closest('.sum,.take,.title,.relate,.drill-sum,.cexp'):null;
  if(host&&host.closest('.cexp'))host=null; // đừng lưu từ chính phần giải thích
  if(txt&&txt.length>=2&&txt.length<=90&&host){
    f=cFab();f._t=txt;
    var r=s.getRangeAt(0).getBoundingClientRect();
    var x=Math.max(8,Math.min(r.left,window.innerWidth-150)),y=r.top-42;
    if(y<6)y=r.bottom+8;
    f.style.left=x+'px';f.style.top=y+'px';f.style.display='block';
  }else if(f){f.style.display='none';}
}
document.addEventListener('mouseup',function(){setTimeout(onSel,10);});
document.addEventListener('touchend',function(){setTimeout(onSel,10);});
window.addEventListener('scroll',function(){var f=document.getElementById('concept-fab');if(f&&f.style.display==='block')f.style.display='none';});
