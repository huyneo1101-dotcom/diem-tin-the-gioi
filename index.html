g - Thái Bình Dương"},{"date":"2026-07-14","category":"Ngoại giao","title":"Anh và EU ký hiệp ước lịch sử về Gibraltar, dỡ bỏ biên giới cứng với Tây Ban Nha","summary":"Anh và EU chính thức ký tại Brussels hiệp ước về Gibraltar sau hơn 4 năm đàm phán, có sự chứng kiến của Thủ hiến Gibraltar và Ngoại trưởng Tây Ban Nha; hiệp ước áp dụng tạm thời từ 15/7, xóa bỏ kiểm soát biên giới cứng tồn tại 118 năm, đồng thời bảo đảm chủ quyền Anh và hoạt động của căn cứ quân sự Anh tại Gibraltar.","sourceName":"GOV.UK","sourceUrl":"https://www.gov.uk/government/news/uk-finalises-historic-treaty-with-eu-to-secure-economic-future-of-gibraltar","significance":"Hoàn tất khung pháp lý quan hệ Anh - EU hậu Brexit còn dang dở, đồng thời giữ nguyên quyền kiểm soát của Anh với căn cứ quân sự chiến lược ở cửa ngõ Địa Trung Hải.","region":"Châu Âu/NATO"},{"date":"2026-07-15","category":"Ngoại giao","title":"EU và Ukraine ký thỏa thuận hợp tác sản xuất drone quy mô toàn khối","summary":"Chủ tịch Ủy ban châu Âu Ursula von der Leyen và Tổng thống Ukraine Zelensky ký thỏa thuận hợp tác sản xuất drone nhân Quốc khánh Ukraine tại Kiev - thỏa thuận đầu tiên bao trùm toàn bộ nước/doanh nghiệp EU, EU cam kết tới 2 tỷ euro vốn mới để mở rộng năng lực sản xuất chung drone và tên lửa.","sourceName":"Euronews","sourceUrl":"https://www.euronews.com/my-europe/2026/07/15/von-der-leyen-and-zelenskyy-sign-eu-ukraine-drone-deal","significance":"Chuyển từ viện trợ song phương sang khung hợp tác công nghiệp quốc phòng toàn khối EU - Ukraine, phản ánh xu hướng tích hợp năng lực sản xuất vũ khí Ukraine vào chuỗi cung ứng châu Âu lâu dài.","region":"Châu Âu/NATO"},{"date":"2026-07-15","category":"Kinh tế","title":"Tăng trưởng GDP quý 2 Trung Quốc chậm lại còn 4,3%, thấp nhất kể từ 2022","summary":"Số liệu chính thức ngày 15/7 cho thấy GDP quý 2/2026 của Trung Quốc tăng 4,3% so với cùng kỳ, thấp hơn dự báo 4,5% và chậm lại từ 5,0% quý 1 - mức tăng chậm nhất kể từ quý 4/2022. Nhu cầu nội địa yếu và cú sốc giá dầu do chiến sự Iran là nguyên nhân chính; đầu tư tài sản cố định giảm 5,7% trong 6 tháng đầu năm.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/15/china-gdp-retail-sales-investment-june-.html","significance":"Đà giảm tốc của nền kinh tế lớn thứ hai thế giới cùng đầu tư tư nhân/bất động sản suy yếu làm sâu thêm mất cân đối cấu trúc - vấn đề CSIS ChinaPower, MERICS cảnh báo có thể buộc Bắc Kinh tăng kích thích tài khoá/tiền tệ nửa cuối năm.","region":"Đông Á"},{"date":"2026-07-14","category":"Kinh tế","title":"Thặng dư thương mại Trung Quốc với EU lập kỷ lục, căng thẳng thương mại leo thang","summary":"Số liệu hải quan ngày 14/7 cho thấy thặng dư thương mại của Trung Quốc với EU tăng 27% so với cùng kỳ, đạt 32,9 tỷ USD tháng 6 - mức kỷ lục mới, giữa lúc EU siết hạn ngạch thép miễn thuế (giảm 47%) và tăng gấp đôi thuế ngoài hạn ngạch lên 50% từ đầu tháng 7. Trung Quốc phát tín hiệu sẵn sàng đàm phán, hạn chót không chính thức tháng 10/2026.","sourceName":"Bloomberg","sourceUrl":"https://www.bloomberg.com/news/articles/2026-07-14/china-s-trade-surplus-with-eu-hits-record-as-tensions-intensify","significance":"Thâm hụt thương mại EU - Trung Quốc (~360 tỷ euro/năm) trở thành điểm nóng chính sách công nghiệp châu Âu; Atlantic Council và ECFR cảnh báo nguy cơ phi công nghiệp hoá nếu EU không phòng vệ thương mại mạnh hơn.","region":"Châu Âu/NATO"},{"date":"2026-07-15","category":"Công nghệ quân sự","title":"5 tập đoàn quốc phòng châu Âu lập liên danh Bliksem EXO phát triển thiết bị đánh chặn ngoài khí quyển","summary":"Airbus Defence and Space, Destinus, MBDA Deutschland, Safran Electronics & Defense và Thales ký Ý định thư tại Paris ngày 14/7 lập liên danh Bliksem EXO, phát triển thiết bị đánh chặn ngoài khí quyển đầu tiên do châu Âu tự chủ, tiêu diệt tên lửa đạn đạo tầm trung/liên lục địa bằng va chạm động năng. Hợp tác kỹ thuật bắt đầu tháng 8/2026, thử nghiệm trên không gian dự kiến 2027.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/15/european-firms-plan-exo-atmospheric-interceptor-for-2027-test/","significance":"Bước tiến cụ thể của nỗ lực phòng thủ tên lửa châu Âu - tiến tới năng lực đánh chặn tầng cao độc lập khỏi Mỹ, giảm phụ thuộc Patriot/THAAD giữa lúc đe dọa tên lửa từ Nga gia tăng.","region":"Châu Âu/NATO"},{"date":"2026-07-14","category":"Công nghệ quân sự","title":"UCAV Kızılelma của Thổ Nhĩ Kỳ bắn thử thành công tên lửa siêu âm Jet-230 tầm hơn 120km","summary":"Máy bay chiến đấu không người lái Bayraktar Kızılelma (Baykar) lần đầu bắn thử tên lửa không-đối-đất siêu âm JET-230 do Roketsan chế tạo, phóng từ hơn 120km và đánh trúng mục tiêu trên biển ngày 11/7 tại căn cứ Merzifon; Baykar công bố ngày 14/7.","sourceName":"Hürriyet Daily News","sourceUrl":"https://www.hurriyetdailynews.com/bayraktar-kizilelma-completes-supersonic-missile-firing-test-224337","significance":"Củng cố vị thế Thổ Nhĩ Kỳ trong công nghiệp UAV/UCAV toàn cầu, mở đường trang bị năng lực tấn công tầm xa độc lập cho Kızılelma - đáng chú ý với các nước NATO/Trung Đông tìm giải pháp UCAV chi phí thấp.","region":"Châu Âu/NATO"},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Mỹ lần đầu dùng xuồng tự sát không người lái Corsair tấn công tàu ngầm Iran ở Bandar Abbas","summary":"CENTCOM xác nhận 3 xuồng mặt nước không người lái Corsair của Saronic (Lực lượng Đặc nhiệm 59, Hạm đội 5) tấn công một tàu ngầm mini lớp Ghadir cùng cơ sở bảo trì tại Căn cứ Hải quân Bandar Abbas — lần đầu quân đội Mỹ dùng xuồng tấn công một chiều (one-way attack) trong thực chiến, nhằm suy giảm năng lực Iran đe doạ tàu thuyền qua eo Hormuz.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/centcom-saronic-corsair-usv-strike-iran-submarine-bandar-abbas/","significance":"Đánh dấu bước ngoặt đưa xuồng không người lái tấn công tự sát giá rẻ vào tác chiến hải quân Mỹ thực chiến, mở đường nhân rộng hạm đội robot mặt nước.","region":"Trung Đông"},{"date":"2026-07-13","category":"Chính trị","title":"EU trừng phạt tập đoàn VK và loạt công ty Nga cung cấp hạ tầng giám sát trong nước","summary":"Hội đồng EU liệt 4 cá nhân và 5 thực thể Nga vào diện trừng phạt nhân quyền, gồm tập đoàn VK (vận hành ứng dụng Max cài sẵn trên điện thoại bán tại Nga, dưới giám sát của FSB) và ba công ty Citadel, VAS Experts, Norsi-Trans sản xuất thiết bị hệ thống SORM theo dõi điện thoại, email, mạng xã hội nhắm vào nhà báo và người bất đồng chính kiến. Tổng số bị trừng phạt theo cơ chế nhân quyền Nga lên 98 cá nhân và 7 thực thể.","sourceName":"Council of the EU (Consilium)","sourceUrl":"https://www.consilium.europa.eu/en/press/press-releases/2026/07/13/human-rights-violations-in-russia-council-lists-four-individuals-and-five-entities-over-abusive-surveillance/","significance":"EU dùng cơ chế trừng phạt nhân quyền riêng để nhắm bộ máy giám sát-đàn áp nội địa của Nga, phản ánh chiến lược đa tầng nhằm cô lập cả hệ thống kiểm soát xã hội lẫn cỗ máy chiến tranh của Moscow.","region":"Châu Âu/NATO"},{"date":"2026-07-14","category":"Kinh tế","title":"Xuất nhập khẩu Trung Quốc tăng vọt tháng 6, xuất khẩu chip tăng hơn gấp đôi nhờ bùng nổ AI","summary":"Hải quan Trung Quốc (GACC) công bố xuất khẩu tháng 6 đạt 412,4 tỷ USD, tăng 27% so với cùng kỳ — mạnh nhất 4 tháng; nhập khẩu tăng 36%; thặng dư thương mại 125,6 tỷ USD. Xuất khẩu chip bán dẫn tăng hơn gấp đôi, thiết bị xử lý dữ liệu tăng 53,1%, phản ánh nhu cầu phần cứng AI toàn cầu và làn sóng đẩy nhanh giao hàng tránh nguy cơ Mỹ tăng thuế.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/14/china-june-trade-data-exports-imports.html","significance":"Chuỗi cung ứng bán dẫn Trung Quốc tiếp tục mở rộng bất chấp kiểm soát xuất khẩu của Mỹ, củng cố lo ngại của BIS/CSIS ChinaPower về khả năng phục hồi công nghiệp công nghệ cao và mất cân đối cung-cầu nội địa khi tiêu dùng vẫn yếu.","region":"Đông Á"},{"date":"2026-07-13","category":"Kinh tế","title":"Nvidia siết danh sách khách hàng châu Á, lập 'whitelist' chặn chip AI lọt sang Trung Quốc","summary":"Nvidia loại hơn một nửa khách hàng châu Á (chủ yếu nhà cung cấp neo-cloud) từng được phép mua chip AI, sau khi siết thẩm định tại Singapore, Malaysia và Nhật Bản — cử nhân viên kiểm tra trung tâm dữ liệu, hợp đồng và phỏng vấn người dùng cuối để xác nhận chip không chuyển tiếp sang Trung Quốc. Động thái diễn ra sau áp lực từ Washington và loạt vụ truy tố buôn lậu chip hàng tỷ USD.","sourceName":"Reuters","sourceUrl":"https://finance.yahoo.com/technology/ai/articles/nvidia-halves-asia-buyer-list-033140201.html","significance":"Thắt chặt tự nguyện của Nvidia cho thấy áp lực thực thi kiểm soát xuất khẩu bán dẫn của Mỹ lan sang cấp doanh nghiệp — bước bịt lỗ hổng chuyển chip AI cho Trung Quốc qua nước thứ ba mà CSET/CSIS từng cảnh báo.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-13","category":"Ngoại giao","title":"Thổ Nhĩ Kỳ - Ai Cập ký ghi nhớ hợp tác quốc phòng tại Ankara","summary":"Bộ trưởng Quốc phòng Thổ Nhĩ Kỳ Yaşar Güler và người đồng cấp Ai Cập Ashraf Salem Zaher ký biên bản ghi nhớ (MoU) hợp tác quốc phòng cùng thư bày tỏ ý định (LoI) về hợp tác công nghiệp quốc phòng tại Ankara ngày 13/7, tiếp nối Hiệp định khung quân sự hai nước ký tháng 2/2026 nhân chuyến thăm Cairo của Tổng thống Erdogan.","sourceName":"Daily Sabah","sourceUrl":"https://www.dailysabah.com/politics/diplomacy/turkiye-egypt-sign-defense-cooperation-mou","significance":"Đánh dấu giai đoạn mới trong bình thường hoá quan hệ Ankara - Cairo sau nhiều năm căng thẳng, mở đường hợp tác công nghiệp quốc phòng song phương giữa hai cường quốc quân sự Đông Địa Trung Hải.","region":"Trung Đông"},{"date":"2026-07-13","category":"Chính trị","title":"EU và Anh lần đầu áp lệnh trừng phạt chung nhắm vào mạng lưới tấn công mạng của Nga","summary":"EU trừng phạt 9 cá nhân và 4 tổ chức, Anh bổ sung 24 cái tên vào danh sách đen, cùng nhắm vào các nhân vật liên quan cơ quan an ninh FSB và tình báo quân đội GRU của Nga vì các chiến dịch tấn công mạng và hoạt động lai (hybrid) phá hoại tại châu Âu, trong đó có vụ tấn công lưới điện Ba Lan được quy cho đơn vị Centre 16 của FSB. Đây là gói trừng phạt mạng chung đầu tiên giữa EU và Anh kể từ Brexit.","sourceName":"GOV.UK","sourceUrl":"https://www.gov.uk/government/news/uk-and-eu-strike-russian-cyber-networks-with-new-sanctions","significance":"Đánh dấu bước thể chế hoá hợp tác an ninh mạng Anh-EU hậu Brexit, cho thấy xu hướng phối hợp trừng phạt xuyên châu Âu ngày càng chặt để đối phó chiến tranh lai của Nga thay vì hành động rời rạc.","region":"Châu Âu/NATO"},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Anh trao hợp đồng đầu tiên ở châu Âu cho tên lửa đánh chặn drone giá rẻ","summary":"Bộ Quốc phòng Anh trao 3,16 triệu bảng cho ba công ty Frankenberg Technologies, Greenjets và Cambridge Aerospace để phát triển và thử nghiệm các hệ thống đánh chặn giá rẻ (low-cost air defence effectors) chống drone, trở thành nước đầu tiên trong 5 nước châu Âu trao hợp đồng theo chương trình chung nhằm đối phó tấn công drone/tên lửa quy mô lớn.","sourceName":"GOV.UK","sourceUrl":"https://www.gov.uk/government/news/uk-leads-europe-with-contracts-for-low-cost-air-defence-systems","significance":"Phản ánh xu hướng châu Âu chuyển sang giải pháp phòng không chi phí thấp để đối phó drone giá rẻ sản xuất hàng loạt, bài toán cân bằng chi phí-hiệu quả mà các viện phân tích như RUSI đang theo dõi sát.","region":"Châu Âu/NATO"},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Canada dùng radar vượt đường chân trời của Úc để lấp khoảng trống giám sát Bắc Cực","summary":"Canada triển khai chương trình Radar Vượt Đường Chân Trời Bắc Cực (Arctic Over-The-Horizon Radar, A-OTHR) trị giá 1,75 tỷ USD dựa trên công nghệ Úc; BAE Systems Australia bắt đầu công việc, hướng tới đạt năng lực vận hành ban đầu cuối năm 2029 nhằm tăng cường giám sát NORAD từ biên giới Canada-Mỹ lên Bắc Cực.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/13/canada-to-plug-surveillance-gaps-with-aussie-over-the-horizon-radar/","significance":"Thương vụ radar lớn nhất trong lịch sử xuất khẩu quốc phòng Úc, cho thấy ưu tiên chiến lược ngày càng tăng của các đồng minh Ngũ Nhãn với giám sát Bắc Cực trước hiện diện quân sự Nga-Trung mở rộng.","region":"Châu Mỹ"},{"date":"2026-07-13","category":"Chính trị","title":"EU họp Hội đồng Đối ngoại, dự kiến thông qua gói trừng phạt Nga thứ 21","summary":"Hội đồng Đối ngoại EU họp tại Brussels ngày 13/7, dự kiến thông qua gói trừng phạt thứ 21 nhắm vào năng lượng, ngân hàng và vận tải biển của Nga, cùng các biện pháp liên quan hoạt động hỗn hợp và tấn công mạng của Nga tại châu Âu.","sourceName":"Council of the European Union","sourceUrl":"https://www.consilium.europa.eu/en/meetings/fac/2026/07/13/","significance":"Gói trừng phạt thứ 21 tiếp tục siết nguồn thu năng lượng và ngân hàng Nga, nhưng bị làm nhẹ do bất đồng nội bộ — cho thấy giới hạn đồng thuận 27 nước trong duy trì áp lực lên Moscow.","region":"Châu Âu/NATO"},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"EU và MBDA ký thỏa thuận phát triển tên lửa đánh chặn siêu vượt âm AQUILA trong dự án HYDIS","summary":"Ủy ban châu Âu và MBDA ký thỏa thuận tài trợ khởi động giai đoạn khái niệm 3 năm cho dự án HYDIS - hệ thống đánh chặn phòng thủ siêu vượt âm châu Âu, sau khi concept AQUILA được Pháp, Đức, Ý và Hà Lan lựa chọn. AQUILA kế thừa công nghệ từ họ tên lửa Aster của MBDA, thiết kế triển khai cả trên bộ lẫn trên hạm.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/eu-signs-grant-for-mbda-led-hydis-hypersonic-interceptor-project","significance":"Đánh dấu bước tiến của châu Âu hướng tới tự chủ năng lực phòng thủ trước tên lửa siêu vượt âm, giảm phụ thuộc vào hệ thống của Mỹ.","region":"Châu Âu/NATO"},{"date":"2026-07-11","category":"Ngoại giao","title":"Algeria và Mali khôi phục quan hệ ngoại giao sau hơn một năm rạn nứt","summary":"Tổng thống Algeria Abdelmadjid Tebboune ngày 11/7 thông báo đại sứ nước này sẽ trở lại Bamako sau khi bị triệu hồi từ tháng 4/2025; một ngày trước đó Algiers đã mở lại hoàn toàn không phận cho máy bay dân sự và quân sự đi/đến Mali, và Mali xác nhận có biện pháp đáp lại tương ứng. Rạn nứt bắt nguồn từ việc Algeria bắn hạ một drone của Mali.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/11/algeria-and-mali-restore-diplomatic-ties-following-yearlong-rift","significance":"Cho thấy các nước Sahel dưới chính quyền quân sự vẫn cần duy trì kênh ngoại giao thực dụng với láng giềng Bắc Phi bất chấp căng thẳng an ninh kéo dài."},{"date":"2026-07-10","category":"Kinh tế","title":"Giá dầu hướng tới tuần tăng khi rủi ro nguồn cung từ Trung Đông vẫn hiện hữu","summary":"Dầu Brent quanh 76,6 USD/thùng và WTI quanh 72,4 USD/thùng, hướng tới mức tăng theo tuần 5-6% sau khi Iran và Mỹ tái diễn các cuộc tấn công quân sự trong tuần, trì hoãn việc mở lại hoàn toàn Eo biển Hormuz. UAE đã nâng sản lượng lên mức kỷ lục để bù đắp rủi ro nguồn cung.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/10/oil-edges-lower-but-heads-for-weekly-gain-as-middle-east-supply-risks-persist.html","significance":"Nguy cơ gián đoạn qua Eo biển Hormuz tiếp tục đẩy giá dầu và rủi ro lạm phát toàn cầu lên cao.","region":"Trung Đông"},{"date":"2026-07-10","category":"Ngoại giao","title":"EU ra tuyên bố cảnh báo bạo lực leo thang tại El Obeid, Sudan","summary":"Đại diện Cấp cao EU ra tuyên bố ngày 10/7 bày tỏ quan ngại sâu sắc trước việc lực lượng RSF tăng cường quân sự đe dọa thành phố El Obeid, nơi trú ẩn của khoảng 500.000 dân thường bao gồm 100.000 người di tản. EU kêu gọi RSF chấm dứt ngay các hoạt động quân sự gây nguy hiểm cho dân thường.","sourceName":"Hội đồng châu Âu","sourceUrl":"https://www.consilium.europa.eu/en/press/press-releases/2026/07/10/sudan-statement-by-the-high-representative-on-behalf-of-the-eu-on-the-escalating-violence-in-el-obeid/","significance":"EU tiếp tục gây sức ép ngoại giao nhằm bảo vệ dân thường trong nội chiến Sudan.","region":"Toàn cầu"},{"date":"2026-07-09","category":"Ngoại giao","title":"Thái tử Saudi Arabia và Thủ tướng Canada bàn hợp tác song phương tại Jeddah","summary":"Thái tử kiêm Thủ tướng Saudi Arabia Mohammed bin Salman tiếp Thủ tướng Canada Mark Carney tại Jeddah ngày 9/7 - chuyến thăm đầu tiên của một Thủ tướng Canada tới Saudi Arabia sau 26 năm. Hai bên ký 13 thỏa thuận thương mại trị giá hơn 1 tỷ USD trong y tế, khai khoáng, hạ tầng và quốc phòng.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/saudi-arabia/2026/07/09/mbs-canada-s-carney-discuss-regional-developments-bilateral-ties-in-jeddah","significance":"Đánh dấu bước nâng cấp quan hệ Canada - Saudi Arabia sau nhiều năm trầm lắng.","region":"Trung Đông"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Hải quân Hoàng gia Anh thử thả tàu không người lái từ máy bay vận tải A400M","summary":"Kraken Technology Group và Capewell, được Hải quân Hoàng gia Anh hỗ trợ trong khuôn khổ Project Beehive, thực hiện thành công lần thả đầu tiên trên thế giới một tàu mặt nước không người lái (USV) từ máy bay vận tải A400M. Tàu K3 SCOUT được thả 4 lần từ độ cao 1.300 feet xuống vùng biển sóng cấp 4.","sourceName":"Royal Navy","sourceUrl":"https://www.royalnavy.mod.uk/news/2026/july/08/20260708-uncrewed-vessels-airdropped-in-pioneering-trial-supported-by-royal-navy","significance":"Mở ra năng lực mới đưa tàu không người lái vào vùng biển khó tiếp cận mà không cần tàu mẹ hay hạ tầng cảng.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Viện nghiên cứu Pháp-Đức ISL thử bắn tự do ngoài trời đầu tiên với súng ray điện từ","summary":"Viện nghiên cứu Saint-Louis (ISL, liên doanh Pháp-Đức) thực hiện thành công cuộc thử nghiệm bắn tự do ngoài trời đầu tiên với súng ray điện từ (railgun) tự phát triển tại trường bắn Baldersheim. Hệ thống đạt tốc độ đầu nòng hơn 2.000 m/s, đánh dấu bước chuyển từ phòng thí nghiệm sang thử nghiệm thực địa.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/isl-european-electromagnetic-railgun-free-flight-test/","significance":"Công nghệ súng ray điện từ được châu Âu xem là hướng đối phó vũ khí siêu thanh với chi phí thấp hơn tên lửa đánh chặn.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Công ty Đan Mạch J.A. Solutions ra mắt hệ thống triển khai tự động cho tàu không người lái","summary":"J.A. Solutions A/S (Đan Mạch) giới thiệu hệ thống triển khai tự động cho tàu mặt nước không người lái (USV), thử nghiệm trên tàu Orca USV. Hệ thống có hai cấu hình: thả bè cứu sinh cho tìm kiếm cứu nạn, và khung module đa năng mang thủy lôi, drone hoặc cảm biến tùy nhiệm vụ.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/j-a-solutions-introduces-automatic-deployment-system-for-usvs-and-surface-vessels/","significance":"Phản ánh xu hướng châu Âu phát triển hạ tầng module hóa để mở rộng vai trò tác chiến của tàu không người lái.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Ngoại giao","title":"LHQ cảnh báo nguy cơ leo thang sau các cuộc tấn công mới ở Eo biển Hormuz","summary":"Tổng thư ký LHQ Guterres gọi việc Mỹ-Iran nối lại tấn công và phản công trong 24 giờ qua là \"đáng báo động\", cảnh báo nguy cơ phá vỡ tiến trình ngoại giao đạt được từ khuôn khổ ngừng bắn tháng 4. Vận tải biển qua Eo biển Hormuz gần như tê liệt, khoảng 6.000 thủy thủ đoàn mắc kẹt trên hàng trăm tàu.","sourceName":"Liên Hợp Quốc","sourceUrl":"https://news.un.org/en/story/2026/07/1167898","significance":"Nguy cơ chiến sự Mỹ-Iran toàn diện trở lại đe dọa an ninh năng lượng và kinh tế toàn cầu.","region":"Trung Đông"},{"date":"2026-07-08","category":"Kinh tế","title":"Anh và Canada ra tuyên bố chung về tài trợ quốc phòng đa phương","summary":"Thủ tướng Anh Keir Starmer và Thủ tướng Canada Mark Carney ra tuyên bố chung tại Ankara bên lề Thượng đỉnh NATO, ủng hộ các sáng kiến tài trợ quốc phòng đa phương như Ngân hàng An ninh - Quốc phòng - Phục hồi (DSRB) và Cơ chế Quốc phòng Đa phương (MDM), nhằm cải thiện đầu tư vào chuỗi cung ứng công nghiệp quốc phòng.","sourceName":"Chính phủ Anh","sourceUrl":"https://www.gov.uk/government/news/joint-statement-from-prime-minister-starmer-and-prime-minister-carney-of-canada-on-defence-financing-8-july-2026","significance":"Cho thấy xu hướng các đồng minh phương Tây tìm cơ chế tài chính mới để mở rộng năng lực công nghiệp quốc phòng ngoài ngân sách truyền thống.","region":"Châu Âu/NATO"},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Anh đầu tư 2 tỷ bảng xây phòng thí nghiệm AI huấn luyện quân đội","summary":"Bộ Quốc phòng Anh công bố hợp đồng 2 tỷ bảng kéo dài 15 năm với liên danh do Raytheon UK dẫn đầu (Omnia Training) để xây \"Combat Laboratory\" ứng dụng AI, phân tích dữ liệu và mô phỏng, huấn luyện 60.000 binh sĩ mỗi năm. Dự án nằm trong Kế hoạch Đầu tư Quốc phòng 298 tỷ bảng của Anh.","sourceName":"Bộ Quốc phòng Anh","sourceUrl":"https://www.gov.uk/government/news/ai-battle-lab-to-prepare-british-army-for-modern-warfare","significance":"Phản ánh xu hướng quân đội phương Tây đẩy mạnh ứng dụng AI vào huấn luyện tác chiến sau kinh nghiệm chiến trường Ukraine.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Kinh tế","title":"World Bank duyệt 890 triệu USD hỗ trợ điện mặt trời áp mái Ấn Độ","summary":"Ban Giám đốc điều hành World Bank phê duyệt gói tài trợ 890 triệu USD cho chương trình PM Surya Ghar của Ấn Độ, đồng thời sẽ huy động thêm 4,2 tỷ USD vốn tư nhân. Chương trình hướng tới lắp điện mặt trời áp mái cho 10 triệu hộ gia đình, tạo khoảng 1,7 triệu việc làm.","sourceName":"World Bank","sourceUrl":"https://www.worldbank.org/en/news/press-release/2026/07/09/world-bank-supports-india-s-solar-rooftop-program-to-boost-clean-energy-create-jobs-and-unlock-private-capital","significance":"Một trong những khoản tài trợ khí hậu lớn nhất của World Bank cho Ấn Độ, thúc đẩy chuyển dịch năng lượng sạch quy mô lớn.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-09","category":"Kinh tế","title":"Giá vàng thế giới bật tăng trở lại giữa căng thẳng Trung Đông","summary":"Giá vàng giao ngay tăng 1,2% lên 4.124,8 USD/oz trong phiên 9/7 nhờ lực bắt đáy mạnh sau khi rơi xuống dưới 4.050 USD/oz, mức thấp nhất một tuần. Giá bạc cũng tăng 2,9% lên 60,1 USD/oz, trong bối cảnh căng thẳng Mỹ-Iran leo thang và giới đầu tư chờ tín hiệu chính sách lãi suất từ Fed.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/luc-bat-day-dua-gia-vang-bat-tang-tro-lai.htm","significance":"Biến động giá vàng phản ánh tâm lý phòng ngừa rủi ro của nhà đầu tư toàn cầu trước bất ổn địa chính trị và chính sách tiền tệ Mỹ.","region":"Toàn cầu"},{"date":"2026-07-10","category":"Kinh tế","title":"Nhu cầu nội địa ảm đạm, Trung Quốc đẩy mạnh xuất khẩu ô tô","summary":"Doanh số ô tô trong nước Trung Quốc giảm 21% trong nửa đầu năm do trợ cấp xe điện kết thúc và kinh tế giảm tốc, trong khi xuất khẩu ô tô tăng vọt 65,3% cùng kỳ. Các hãng như Chery, Great Wall, BYD đang đẩy mạnh bán hàng ra nước ngoài để bù đắp sụt giảm nhu cầu trong nước.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/nhu-cau-trong-nuoc-am-dam-trung-quoc-day-manh-xuat-khau-o-to.htm","significance":"Cho thấy sự phụ thuộc ngày càng lớn của ngành công nghiệp ô tô Trung Quốc vào thị trường xuất khẩu giữa lúc tiêu dùng nội địa suy yếu.","region":"Đông Á"},{"date":"2026-07-10","category":"Kinh tế","title":"SK Hynix huy động 26,5 tỷ USD trong đợt niêm yết kỷ lục tại Mỹ","summary":"Hãng chip nhớ Hàn Quốc SK Hynix chính thức chào sàn Nasdaq với giá 149 USD/ADR, huy động khoảng 26,5 tỷ USD — thương vụ niêm yết tại Mỹ lớn nhất từ trước đến nay của một doanh nghiệp nước ngoài, vượt qua Alibaba năm 2014. Vốn hóa công ty đã vượt 1.000 tỷ USD nhờ giá cổ phiếu tăng hơn 200% từ đầu năm.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/sk-hynix-tu-bo-vuc-pha-san-den-doanh-nghiep-von-hoa-nghin-ty-usd-niem-yet-tren-nasdaq.htm","significance":"Đánh dấu bước ngoặt cho làn sóng niêm yết của các hãng chip châu Á tại Mỹ giữa cơn sốt đầu tư AI toàn cầu.","region":"Đông Á"},{"date":"2026-07-09","category":"Chính trị","title":"Palestine ấn định bầu cử lập pháp đầu tiên sau 20 năm vào 28/11","summary":"Tổng thống Palestine Mahmoud Abbas ký sắc lệnh ấn định ngày 28/11/2026 tổ chức bầu cử lập pháp — cuộc bầu cử đầu tiên kể từ năm 2006, khi Hamas giành chiến thắng trước đảng Fatah của ông Abbas. Quyết định được đưa ra trong bối cảnh nỗ lực cải cách chính trị Palestine thời hậu chiến Gaza.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/09/palestinian-legislative-vote-set-for-nov-28-presidential-decree","significance":"Cuộc bầu cử đầu tiên sau 20 năm có thể định hình lại cục diện chính trị nội bộ Palestine thời hậu chiến.","region":"Trung Đông"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"NATO chọn mua tới 10 máy bay giám sát Saab GlobalEye thay thế phi đội E-3 AWACS","summary":"Tổng thư ký NATO Mark Rutte thông báo liên minh gồm Bỉ, Canada, Đan Mạch, Đức, Hà Lan, Latvia, Litva, Luxembourg, Na Uy, Romania và Thụy Điển đã chọn máy bay GlobalEye của Saab (khung Bombardier Global 6500, radar Erieye Extended Range) để thay thế phi đội E-3 Sentry từ năm 1982. NATO sẽ bắt đầu đàm phán chính thức với Saab, dự kiến máy bay hoạt động vào năm 2035.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/nato-to-acquire-up-to-10-saab-globaleye-for-e-3-replacement-says-secretary-general/","significance":"Quyết định hiện đại hóa lớn nhất về năng lực cảnh báo sớm trên không của NATO trong nhiều thập kỷ, đánh bật Boeing E-7 khỏi cuộc đua.","region":"Châu Âu/NATO"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Anh và Hà Lan ký thỏa thuận 2,4 tỷ bảng đóng tàu đổ bộ thế hệ mới","summary":"Thủ tướng Anh Keir Starmer và Thủ tướng Hà Lan Rob Jetten ký thỏa thuận bên lề hội nghị thượng đỉnh NATO tại Ankara, đóng 8 tàu đổ bộ 15.000 tấn theo thiết kế Hà Lan, mỗi nước vận hành 4 chiếc. Tàu dài 160m, tối ưu cho tác chiến hybrid với drone, có sàn đáp phục vụ hệ thống không người lái tầm xa.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/uk-netherlands-new-amphibious-ships-deal-2026/","significance":"Củng cố năng lực đổ bộ chung Anh-Hà Lan trong NATO, đánh dấu bước chuyển của Hải quân Hoàng gia Anh sang mô hình 'hybrid Navy' tích hợp drone.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Ngoại giao","title":"Mỹ xác nhận Lebanon-Israel bước vào giai đoạn tiếp theo của thỏa thuận giải giáp Hezbollah","summary":"Mỹ cho biết Lebanon và Israel đã bước vào giai đoạn tiếp theo của khung thỏa thuận giải giáp Hezbollah, với việc Israel chuẩn bị rút quân khỏi các \"khu vực thí điểm\" ở miền nam Lebanon để quân đội Lebanon tiếp quản an ninh. CENTCOM đang phối hợp với cả hai bên để triển khai giai đoạn thí điểm này trong những ngày tới.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/09/us-says-lebanon-israel-enter-next-phase-of-hezbollah-disarmament-deal","significance":"Bước tiến cụ thể đầu tiên trong việc thực thi khung thỏa thuận Israel-Lebanon do Mỹ làm trung gian.","region":"Trung Đông"},{"date":"2026-07-09","category":"Chính trị","title":"Trung Quốc tăng áp lực ngoại giao chống Philippines trước kỷ niệm phán quyết Biển Đông","summary":"Nhân Dân Nhật Báo, cơ quan chính thức của Đảng Cộng sản Trung Quốc, gia nhập chiến dịch truyền thông chống Philippines trước kỷ niệm 10 năm phán quyết trọng tài Biển Đông 2016 mà Bắc Kinh bác bỏ. Báo gọi phán quyết là \"lực lượng gây mất ổn định\" và yêu cầu Manila chuyển sang đàm phán trực tiếp.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3360164/peoples-daily-joins-beijing-blitz-against-philippines-over-2016-south-china-sea-ruling","significance":"Chiến lược truyền thông của Trung Quốc trước một kỷ niệm nhạy cảm trong tranh chấp Biển Đông.","region":"Đông Á"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Đức trở thành địa điểm sản xuất tên lửa ATACMS đầu tiên ngoài Mỹ","summary":"Lockheed Martin và Rheinmetall ký thỏa thuận hợp tác sản xuất tên lửa ATACMS tại nhà máy Rheinmetall ở Unterlüß, Đức — lần đầu tiên ATACMS được sản xuất ngoài lãnh thổ Mỹ, tạo một trung tâm cung ứng cho NATO và các lực lượng đồng minh.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/07/germany-set-to-become-first-international-site-for-atacms-missile-production/","significance":"Nâng cao khả năng sản xuất vũ khí chiến lược cho NATO thông qua hợp tác quốc tế.","region":"Châu Âu/NATO"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"8 nước NATO ra mắt sáng kiến chòm vệ tinh HALO","summary":"8 nước NATO (Đan Mạch, Canada, Phần Lan, Đức, Na Uy, Hà Lan, Thụy Điển, Thổ Nhĩ Kỳ) ra mắt sáng kiến HALO nhằm liên kết các vệ tinh quân sự quốc gia thành một mạng lưới thống nhất, nâng cao khả năng liên lạc tốc độ cao, tình báo và theo dõi tên lửa.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/space/2026/07/07/eight-nato-allies-launch-halo-satellite-constellation-initiative/","significance":"Tăng cường khả năng không gian quân sự của NATO thông qua hợp tác vệ tinh đa quốc gia.","region":"Toàn cầu"},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Rheinmetall, MBDA phát triển vũ khí laser cho hải quân Đức","summary":"Rheinmetall và MBDA Deutschland ký hợp đồng phát triển hệ thống vũ khí laser hướng năng lượng cho Hải quân Đức, giá trị hàng trăm triệu euro, dự kiến hoạt động năm 2029 với công suất mở rộng từ 20kW lên trên 100kW.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/10/rheinmetall-mbda-to-develop-laser-weapon-for-german-navy/","significance":"Đẩy mạnh phát triển công nghệ vũ khí hướng năng lượng tại châu Âu.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Nhà sản xuất robot mặt đất của Ukraine tăng gấp đôi sản lượng, tìm đối tác nước ngoài","summary":"Một nhà sản xuất phương tiện mặt đất không người lái (UGV) của Ukraine lên kế hoạch tăng gấp đôi sản lượng trong năm nay và đang đàm phán với các đối tác Pháp cùng một số nước châu Âu để mở dây chuyền ở nước ngoài.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/09/ukrainian-ground-robot-maker-doubles-production-eyes-ventures-with-foreign-partners/","significance":"Cho thấy ngành công nghiệp quốc phòng thời chiến của Ukraine trưởng thành nhanh và bắt đầu vươn ra thị trường châu Âu."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Anh muốn lập quỹ chung NATO 50 tỷ USD cho sáng kiến tấn công tầm xa","summary":"Anh đề xuất huy động tới 50 tỷ USD từ quỹ chung NATO cho một sáng kiến vũ khí tấn công tầm xa mới, nhằm tăng năng lực răn đe của châu Âu giữa lúc Mỹ phát tín hiệu giảm cam kết.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/09/uk-eyes-50-billion-in-pooled-nato-funds-for-new-long-range-strike-initiative/","significance":"Phản ánh nỗ lực của châu Âu tự chủ hơn về năng lực tấn công tầm xa, giảm phụ thuộc vào Mỹ khi Washington đòi chia sẻ gánh nặng."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Chiến thuật UAV của Ukraine gây thiệt hại lớn bên trong lãnh thổ Nga","summary":"Theo CNBC, các đòn tập kích bằng thiết bị bay không người lái (UAV) của Ukraine đang gây thiệt hại đáng kể sâu trong lãnh thổ Nga, buộc Moscow điều chỉnh bố trí phòng thủ và tác động tới tính toán của NATO.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/09/ukraine-drone-strikes-russia-nato.html","significance":"Cho thấy UAV giá rẻ đang định hình lại chiến tranh hiện đại, xóa mờ lợi thế chiều sâu chiến lược của các cường quốc."},{"date":"2026-07-09","category":"Kinh tế","title":"Kenya hạ dự báo tăng trưởng kinh tế xuống 4,3%","summary":"Kenya hạ dự báo tăng trưởng kinh tế năm nay xuống còn 4,3%, phản ánh áp lực từ gánh nặng nợ, chi phí vay cao và môi trường bên ngoài bất lợi.","sourceName":"Africanews","sourceUrl":"https://www.africanews.com/2026/07/09/kenya-growth-forecast-lowered-to-43/","significance":"Cho thấy các nền kinh tế lớn Đông Phi vẫn chật vật vì nợ công cao và điều kiện tài chính toàn cầu thắt chặt."},{"date":"2026-07-09","category":"Chính trị","title":"Italy trục xuất 2 nhân viên Đại sứ quán Nga vì cáo buộc gián điệp","summary":"Chính phủ Italy trục xuất hai nhân viên Đại sứ quán Nga với cáo buộc hoạt động gián điệp. Đây là diễn biến mới trong loạt căng thẳng tình báo giữa Nga và các nước châu Âu.","sourceName":"The Moscow Times","sourceUrl":"https://www.themoscowtimes.com/2026/07/09/italy-expels-2-russian-embassy-employees-for-spying-a93208","significance":"Phản ánh làn sóng trục xuất nhà ngoại giao Nga vì nghi vấn gián điệp vẫn tiếp diễn ở châu Âu, giữa quan hệ Nga–EU đóng băng."},{"date":"2026-07-09","category":"Chính trị","title":"Đoàn xe chở lính đánh thuê Nga bị tập kích ở Mali","summary":"Theo các nguồn tin, một đoàn xe chở các tay súng Nga (được cho là thuộc lực lượng bán quân sự) đã bị tấn công tại Mali. Vụ việc nối dài chuỗi bất ổn an ninh ở vùng Sahel nơi Nga mở rộng hiện diện quân sự.","sourceName":"The Straits Times","sourceUrl":"https://www.straitstimes.com/world/europe/convoy-carrying-russian-fighters-attacked-in-mali-sources-say","significance":"Cho thấy rủi ro ngày càng lớn với lực lượng Nga khi thế chân Pháp ở Sahel, giữa lúc các nhóm nổi dậy thánh chiến gia tăng hoạt động."},{"date":"2026-07-09","category":"Ngoại giao","title":"Tổ chức Cấm Vũ khí Hóa học (OPCW) khôi phục quyền bỏ phiếu cho Syria","summary":"OPCW khôi phục quyền bỏ phiếu của Syria sau nhiều năm đình chỉ, viện dẫn tiến bộ của Damascus trong tuân thủ công ước cấm vũ khí hóa học. Động thái diễn ra khi chính quyền Syria mới nỗ lực tái hòa nhập quốc tế.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/9/chemical-weapons-watchdog-restores-syrias-voting-rights-citing-progress","significance":"Phản ánh tiến trình Syria từng bước thoát cô lập ngoại giao thời hậu Assad, khi phương Tây dần công nhận ban lãnh đạo mới ở Damascus."},{"date":"2026-07-09","category":"Chính trị","title":"Iran tập kích trả đũa loạt căn cứ Mỹ ở Vùng Vịnh, Jordan chặn 8 tên lửa","summary":"Iran tuyên bố tấn công đáp trả nhằm vào các căn cứ Mỹ tại Kuwait (tổ hợp Patriot), Bahrain (\"trụ sở Hạm đội 5\") và một địa điểm quân sự ở Qatar, sau các đợt không kích của Mỹ. Jordan cho biết đã đánh chặn 8 tên lửa Iran bay qua không phận.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/iran-tan-cong-4-can-cu-my-ra-tuyen-bo-moi-ve-eo-bien-hormuz-185260709105914602.htm","significance":"Iran chọn đánh vào hạ tầng quân sự Mỹ thay vì mục tiêu dân sự, cho thấy Tehran vừa muốn thể hiện năng lực đáp trả vừa cố kiểm soát mức leo thang; việc tên lửa bay qua Jordan kéo thêm các nước thứ ba vào vòng nguy hiểm."},{"date":"2026-07-09","category":"Chính trị","title":"Iran an táng cố Lãnh tụ tối cao Khamenei, chuyển dịch quyền lực sang giới quân sự","summary":"Linh cữu cố Lãnh tụ tối cao Iran Ali Khamenei được đưa về an táng tại thành phố Mashhad, khép lại tang lễ quy mô lớn kéo dài nhiều ngày. Giới phân tích nhận định Iran đang chuyển từ mô hình \"thần quyền\" sang một ban lãnh đạo mang màu sắc quân sự - dân tộc chủ nghĩa.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/the-gioi/video-linh-cuu-co-lanh-tu-toi-cao-iran-ali-khamenei-duoc-cho-bang-may-bay-voi-tiem-kich-ho-tong-100260709183829036.htm","significance":"Cái chết của nhân vật cầm quyền tối cao suốt hơn ba thập kỷ mở ra giai đoạn chuyển giao bất định; nếu quyền lực nghiêng về Vệ binh Cách mạng, chính sách đối ngoại Iran có thể trở nên cứng rắn và khó đoán hơn."},{"date":"2026-07-09","category":"Kinh tế","title":"Nga cấm hoàn toàn xuất khẩu dầu diesel để bình ổn thị trường nội địa","summary":"Chính phủ Nga mở rộng thành lệnh cấm hoàn toàn xuất khẩu dầu diesel nhằm bù đắp thiếu hụt nguồn cung trong nước sau các đợt tập kích tầm xa của Ukraine vào cơ sở lọc dầu. Tổng thống Putin nói khó khăn chỉ mang tính tạm thời.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/nga-cam-hoan-toan-xuat-khau-dau-diesel.htm","significance":"Lệnh cấm cho thấy chiến dịch UAV của Ukraine đang gây sức ép thực sự lên hệ thống năng lượng Nga; siết xuất khẩu diesel có thể làm căng thêm nguồn cung nhiên liệu toàn cầu trong lúc giá dầu đã leo thang vì Trung Đông."},{"date":"2026-07-09","category":"Kinh tế","title":"ADB hạ dự báo tăng trưởng châu Á vì chiến tranh Mỹ - Iran kéo dài","summary":"Ngân hàng Phát triển châu Á (ADB) hạ dự báo tăng trưởng khu vực, cảnh báo cuộc chiến Mỹ - Iran kéo dài hơn dự kiến có thể để lại những \"vết sẹo dai dẳng\" trên thị trường năng lượng và chuỗi cung ứng.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/adb-ha-du-bao-tang-truong-kinh-te-chau-a.htm","significance":"Việc một định chế phát triển lớn hạ triển vọng phản ánh rủi ro địa chính trị Trung Đông đang lan sang các nền kinh tế châu Á phụ thuộc nhập khẩu năng lượng, trong đó có Việt Nam."},{"date":"2026-07-09","category":"Kinh tế","title":"IMF cảnh báo căng thẳng Trung Đông đẩy cao áp lực lạm phát toàn cầu","summary":"Quỹ Tiền tệ Quốc tế (IMF) cảnh báo xung đột quân sự tại Trung Đông có nguy cơ tái diễn sẽ khuếch đại rủi ro lạm phát đối với kinh tế thế giới, chủ yếu qua kênh giá năng lượng và gián đoạn vận tải biển.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/imf-cang-thang-o-trung-dong-se-day-cao-ap-luc-lam-phat-toan-cau.htm","significance":"Cảnh báo của IMF cho thấy các ngân hàng trung ương có thể buộc phải trì hoãn hạ lãi suất, giữ chi phí vốn ở mức cao lâu hơn, tác động trực tiếp tới tăng trưởng và dòng vốn ở các thị trường mới nổi."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Đức mua tên lửa hành trình Tomahawk của Mỹ, triển khai trên lãnh thổ","summary":"Đức đạt thỏa thuận với chính phủ Mỹ để mua tên lửa hành trình Tomahawk và bố trí chúng trên lãnh thổ Đức, đánh dấu bước chuyển hướng tới năng lực tấn công tầm xa của Berlin.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/my-duyet-ban-ten-lua-tomahawk-cho-duc-trien-khai-giua-luc-dia-100260709160955107.htm","significance":"Việc Đức sở hữu vũ khí tầm xa đánh dấu bước ngoặt trong tư duy quốc phòng thời hậu chiến của nước này và làm sâu sắc thế răn đe của NATO ở sườn đông trước Nga."},{"date":"2026-07-09","category":"Kinh tế","title":"Trung Quốc đặt đơn mua đậu tương Mỹ lớn nhất trong 7 tháng","summary":"Trung Quốc vừa đặt mua lượng đậu tương Mỹ lớn nhất trong một ngày kể từ tháng 11 năm ngoái, bổ sung vào loạt đơn hàng gần đây giữa lúc thương mại nông sản giữa hai nền kinh tế lớn nhất thế giới khởi sắc.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/trung-quoc-dat-mua-don-hang-dau-tuong-my-lon-nhat-7-thang.htm","significance":"Đơn hàng nông sản lớn là tín hiệu hạ nhiệt trên mặt trận thương mại Mỹ - Trung, đồng thời cho thấy Bắc Kinh dùng mua nông sản như một đòn bẩy ngoại giao để tạo thiện chí với Washington."},{"date":"2026-07-09","category":"Kinh tế","title":"Venezuela kêu gọi giải phóng tài sản bị đóng băng ở nước ngoài để tái thiết sau động đất","summary":"Chính phủ Venezuela kêu gọi các nước giải phóng những khoản tài sản bị phong tỏa quốc tế nhằm huy động tài chính tái thiết hạ tầng và cứu trợ nhân đạo sau trận động đất kép.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/venezuela-keu-goi-giai-phong-tai-san-dong-bang-o-nuoc-ngoai-de-tai-thiet-sau-dong-dat-100260709121855587.htm","significance":"Cho thấy Caracas đang tận dụng thảm họa nhân đạo như một đòn bẩy ngoại giao-kinh tế để đòi dỡ bỏ trừng phạt và giải tỏa tài sản bị đóng băng, đặt phương Tây vào thế khó giữa nguyên tắc trừng phạt và áp lực nhân đạo."},{"date":"2026-07-09","category":"Ngoại giao","title":"Ba Lan cảnh báo Ukraine: biểu tượng UPA có thể cản trở con đường gia nhập EU","summary":"Tổng thống Ba Lan Karol Nawrocki cảnh báo Tổng thống Zelensky rằng việc dùng biểu tượng gắn với tổ chức dân tộc UPA có thể 'giới hạn tương lai của Ukraine trong EU', liên quan vụ đổi tên một đơn vị quân đội thành 'Anh hùng UPA'. Hai bên vẫn xác định Nga là mối lo chung.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ba-lan-canh-bao-ukraine-ve-kha-nang-gia-nhap-eu-5095266.html","significance":"Cho thấy những vết thương lịch sử (thảm sát Volhynia) vẫn đủ sức gây ma sát giữa hai đồng minh thân cận, và Ba Lan — cửa ngõ viện trợ chính cho Kiev — có thể trở thành rào cản chính trị cho tiến trình EU của Ukraine dù hai bên cùng đối đầu Nga."},{"date":"2026-07-09","category":"Ngoại giao","title":"Nga chỉ trích cam kết viện trợ 70 tỷ euro của NATO cho Ukraine là 'vô trách nhiệm'","summary":"Người phát ngôn Bộ Ngoại giao Nga Maria Zakharova lên án các quyết định của thượng đỉnh NATO tại Thổ Nhĩ Kỳ, gọi cam kết 70 tỷ euro viện trợ quân sự cho Ukraine năm 2026 là 'vô trách nhiệm' và có thể dẫn tới 'thảm họa cho cả thế giới'. NATO xác định Nga là 'mối đe dọa dài hạn'.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nga-chi-trich-cam-ket-cua-nato-voi-ukraine-5095210.html","significance":"Phản ứng gay gắt của Moscow cho thấy thượng đỉnh Ankara đã củng cố lập trường cứng rắn của NATO bất chấp bất đồng nội khối, đồng thời báo hiệu khả năng hòa đàm Nga–phương Tây tiếp tục xa vời khi hai bên gia tăng cam kết đối đầu."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"NATO đàm phán mua tới 10 máy bay GlobalEye của Saab để thay phi đội AWACS Mỹ","summary":"Theo Tổng thư ký NATO Mark Rutte, khối đang đàm phán mua tới 10 máy bay cảnh báo sớm GlobalEye của hãng Saab (Thụy Điển), trị giá khoảng 4,5 tỷ USD, thay thế 14 chiếc E-3A Sentry cũ có từ năm 1982; dự kiến bàn giao từ 2030.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nato-vach-ke-hoach-thay-phi-doi-may-bay-mat-than-cua-my-5095100.html","significance":"Việc NATO chọn nền tảng châu Âu (Saab) thay vì máy bay Mỹ đánh dấu bước dịch chuyển đáng chú ý hướng tới tự chủ quốc phòng và giảm phụ thuộc vào công nghiệp vũ khí Mỹ, phù hợp xu thế châu Âu 'trám vết nứt' an ninh sau các bất đồng xuyên Đại Tây Dương."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Ukraine tuyên bố bắn rơi tiêm kích Su-35S của Nga bằng hệ thống Patriot","summary":"Không quân Ukraine thông báo bắn hạ một tiêm kích đa năng Su-35S của Nga hôm 8/7 gần Donetsk; theo phân tích, các tiêm kích F-16 đóng vai nghi binh trong khi tổ hợp Patriot đặt cách tiền tuyến khoảng 60 km khai hỏa. Phi công Nga được cho là đã nhảy dù an toàn.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ukraine-ban-roi-tiem-kich-su-35s-nga-5095240.html","significance":"Nếu được xác nhận, đây là tổn thất đáng kể với dòng tiêm kích 4++ chủ lực mà Nga chỉ sản xuất 15-20 chiếc/năm, đồng thời cho thấy chiến thuật phối hợp F-16 nghi binh và Patriot phục kích đang giúp Ukraine đe dọa cả không quân tinh nhuệ của đối phương."},{"date":"2026-07-09","category":"Ngoại giao","title":"Nga tuyên bố tiếp tục hỗ trợ quân sự cho các nước vùng Sahel","summary":"Moscow khẳng định duy trì và mở rộng hợp tác quân sự với các quốc gia vùng Sahel ở châu Phi, củng cố ảnh hưởng tại khu vực đang biến động.","sourceName":"Thế giới & Việt Nam","sourceUrl":"https://baoquocte.vn/noi-chau-phi-dang-thuc-tinh-lan-thu-hai-nga-tuyen-bo-tiep-tuc-ho-tro-quan-su-cho-cac-nuoc-vung-sahel-416229.html","significance":"Phản ánh chiến lược Nga lấp khoảng trống ảnh hưởng ở châu Phi khi phương Tây rút lui; xu hướng cạnh tranh nước lớn lan xuống Sahel, nơi các chính quyền quân sự ngả về Moscow để đổi lấy an ninh."},{"date":"2026-07-09","category":"Kinh tế","title":"Saudi Arabia cân nhắc mở rộng tuyến ống dẫn dầu ra Biển Đỏ","summary":"Saudi Arabia xem xét mở rộng hệ thống ống dẫn dầu ra Biển Đỏ nhằm giảm phụ thuộc vào tuyến vận chuyển qua eo biển Hormuz đang căng thẳng.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/saudi-arabia-can-nhac-mo-rong-tuyen-ong-dan-dau-ra-bien-do-c55575690.epi","significance":"Cho thấy nỗi lo dai dẳng về an ninh tuyến hàng hải qua eo Hormuz; phản ánh xu hướng các nước vùng Vịnh tìm đường xuất khẩu thay thế để giảm rủi ro khi căng thẳng với Iran leo thang."},{"date":"2026-07-09","category":"Kinh tế","title":"Các ngân hàng trung ương bớt mặn mà với USD, chuyển sang vàng","summary":"Nhiều ngân hàng trung ương trên thế giới giảm dự trữ USD và tăng nắm giữ vàng để phòng ngừa rủi ro địa chính trị và biến động tỷ giá.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/cac-ngan-hang-trung-uong-bot-man-ma-voi-usd-chuyen-sang-vang-c55575536.epi","significance":"Phản ánh xu hướng phi đô la hóa dự trữ và giảm niềm tin vào tài sản Mỹ giữa bất ổn địa chính trị; tín hiệu dài hạn làm suy yếu vị thế thống trị của đồng USD."},{"date":"2026-07-09","category":"Kinh tế","title":"ADB hạ dự báo tăng trưởng châu Á - Thái Bình Dương 2026 xuống 4,9%","summary":"Ngân hàng Phát triển châu Á (ADB) hạ dự báo tăng trưởng khu vực châu Á - Thái Bình Dương xuống 4,9% cho năm 2026, giảm so với mức 5,5% của năm 2025.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/adb-tang-truong-cua-chau-a-va-thai-binh-duong-se-chi-con-4-9-trong-nam-2026-c55575554.epi","significance":"Cho thấy đà giảm tốc của kinh tế châu Á vì thương chiến và cầu yếu; hàm ý áp lực lên các nền kinh tế xuất khẩu trong khu vực, gồm cả Việt Nam."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Ukraine tập kích 10 tàu Nga ở biển Azov và Hắc Hải, cắt tiếp tế Crimea","summary":"Trong đêm 6 rạng sáng 7/7, lực lượng UAV hải quân Ukraine đột kích quy mô lớn vào biển Azov và bắc Hắc Hải, tấn công tổng cộng 10 tàu nhằm cắt đứt tuyến hậu cần tiếp tế cho bán đảo Crimea bị chiếm đóng.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/ukrainian-drone-raid-russian-ships-crimea-supply-lines/","significance":"Đòn đánh cho thấy drone hải quân giá rẻ tiếp tục vô hiệu hóa ưu thế của hạm đội mặt nước Nga và biến vùng biển quanh Crimea thành khu vực tranh chấp, đe dọa tính bền vững của hậu cần Nga tại bán đảo này."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Trung Quốc thử tên lửa đạn đạo phóng từ tàu ngầm (SLBM) ra Thái Bình Dương","summary":"Ngày 6/7, hải quân Trung Quốc phóng thử một tên lửa đạn đạo chiến lược (nhiều khả năng là JL-3) từ tàu ngầm hạt nhân ra Nam Thái Bình Dương. Nhiều nước trong khu vực phản đối vì vụ thử được cho là làm suy yếu vùng phi hạt nhân Nam Thái Bình Dương.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/07/chinese-ballistic-missile-test-is-said-to-undermine-nuclear-weapons-free-zone-in-south-pacific/","significance":"Đây được cho là vụ phóng SLBM tầm xa ra Thái Bình Dương đầu tiên Trung Quốc công khai thừa nhận kể từ 1982, cho thấy Bắc Kinh đang tiến tới năng lực răn đe hạt nhân trên biển liên tục — một bước nhảy về sức mạnh chiến lược đáng lo ngại với Mỹ và đồng minh."}],"usNews":[{"date":"2026-07-22","category":"Ngoại giao","title":"Bulgaria thông qua cho Mỹ triển khai máy bay tiếp dầu KC-135 tại căn cứ Bezmer bất chấp đe dọa của Iran","summary":"Ủy ban Quốc phòng Quốc hội Bulgaria ngày 21/7 thông qua đề xuất cho phép Mỹ triển khai tới 8 máy bay tiếp dầu KC-135 cùng 250 quân nhân tại căn cứ không quân Bezmer từ 24/7 đến 1/10, phục vụ hoạt động quân sự của Mỹ nhắm vào Iran. Iran đã đưa ra cảnh báo ngầm với Bulgaria, nhưng Bộ Quốc phòng nước này khẳng định tình báo không phát hiện mối đe dọa an ninh trực tiếp.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/22/unfazed-by-irans-threats-bulgaria-moves-to-aid-us-military-operations/","significance":"Cho thấy một đồng minh NATO sẵn sàng hỗ trợ hậu cần cho chiến dịch của Mỹ nhắm vào Iran bất chấp sức ép từ Tehran, củng cố mạng lưới căn cứ tiếp dầu của Mỹ ở sườn đông NATO.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Kinh tế","title":"FCC thông qua cải cách lớn về cấp phép phổ tần vệ tinh, thúc đẩy ngành không gian Mỹ","summary":"Ủy ban Truyền thông Liên bang Mỹ (FCC) ngày 22/7 thông qua 'Sắc lệnh Hiện đại hóa Không gian cho Thế kỷ 21', đơn giản hóa quy trình cấp phép vệ tinh theo mô hình 'dây chuyền lắp ráp', đồng thời yêu cầu các nhà khai thác chia sẻ dữ liệu nhận thức tình huống không gian để đảm bảo an toàn. Ngành công nghiệp không gian thương mại hoan nghênh đây là bước đi quan trọng giúp Mỹ duy trì vị thế dẫn đầu.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/fcc-approves-satellite-spectrum-license-streamlining/","significance":"Giảm rào cản pháp lý cho các công ty vệ tinh phục vụ cả quân sự lẫn thương mại, phù hợp ưu tiên của chính quyền Trump nhằm củng cố ưu thế không gian của Mỹ trước Trung Quốc.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Công ty vũ trụ Vast lập bộ phận chuyên trách dự án an ninh quốc gia Mỹ","summary":"Công ty không gian tư nhân Vast công bố thành lập bộ phận 'chương trình đặc biệt' phục vụ cộng đồng quốc phòng và tình báo Mỹ, do bà Melanie Stricklan - cựu CEO Slingshot Aerospace, 21 năm phục vụ trong Không quân Mỹ - dẫn dắt. Bộ phận sẽ phát triển các nền tảng vệ tinh hiệu năng cao, trong bối cảnh quỹ In-Q-Tel liên kết tình báo Mỹ từng rót vốn vào Vast.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/vast-establishes-division-for-national-security-projects/","significance":"Phản ánh xu hướng các công ty không gian thương mại Mỹ ngày càng gắn sâu vào chuỗi cung ứng quốc phòng - tình báo, đón đầu nhu cầu ngày càng tăng của Space Force với năng lực không gian thương mại.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Kinh tế","title":"USTR chuẩn bị công bố thuế Section 301 cuối cùng lên 60 đối tác thương mại vì lao động cưỡng bức","summary":"Đại diện Thương mại Mỹ Jamieson Greer điều trần trước Ủy ban Tài chính Thượng viện ngày 22/7 rằng 'sớm nhất là ngày mai' (23/7), USTR sẽ ban hành hành động cuối cùng trong điều tra Section 301 với 60 đối tác thương mại lớn nhất vì không ngăn chặn hàng hóa sản xuất bằng lao động cưỡng bức. Mexico, EU, Canada, Anh chịu mức thuế bổ sung 10%, trong khi 46 nền kinh tế còn lại (gồm Hàn Quốc) chịu mức 12,5%.","sourceName":"U.S. Trade Representative","sourceUrl":"https://ustr.gov/about/policy-offices/congressional-affairs/congressional-hearings-and-testimony/2026/opening-statement-ambassador-greer-senate-finance-committee","significance":"Bước để chính quyền Trump tái lập một chế độ thuế quan toàn diện sau khi Tòa án Tối cao vô hiệu hóa thuế khẩn cấp IEEPA, đúng lúc phụ thu 10% toàn cầu theo Section 122 hết hạn ngày 24/7.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Kinh tế","title":"Đàm phán USMCA rẽ hai hướng: Mexico tiến xa, Canada giậm chân, đe dọa hiệp định ba bên","summary":"Trong khi Mexico bước vào vòng đàm phán song phương thứ ba với Mỹ tại Mexico City (Đại diện Thương mại Greer thăm Mexico 22-24/7), Canada vẫn chưa có đàm phán chính thức, chỉ trao đổi qua điện thoại. Giới quan sát lo ngại thỏa thuận song phương Mỹ-Mexico có thể trở thành khuôn mẫu buộc Canada phải chấp nhận hoặc thách thức, đe dọa phá vỡ tính toàn vẹn ba bên của USMCA.","sourceName":"Reuters","sourceUrl":"https://www.bnnbloomberg.ca/tariffs/2026/07/22/separate-us-talks-with-canada-mexico-test-north-americas-trilateral-trade-pact/","significance":"Rủi ro phân mảnh khối thương mại Bắc Mỹ tồn tại 32 năm có thể định hình lại chuỗi cung ứng khu vực (ô tô, thép nhôm, nông nghiệp) và tạo tiền lệ cho Mỹ đàm phán song phương thay vì đa phương.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Kinh tế","title":"Số đơn xin trợ cấp thất nghiệp Mỹ giảm xuống mức thấp nhất kể từ 1969","summary":"Số đơn xin trợ cấp thất nghiệp lần đầu trong tuần kết thúc 18/7 giảm 22.000 xuống 187.000, mức thấp nhất kể từ tháng 9/1969, thấp hơn nhiều so với dự báo 215.000 của giới kinh tế. Trung bình động 4 tuần cũng giảm còn 207.500.","sourceName":"Associated Press","sourceUrl":"https://www.pressdemocrat.com/2026/07/23/us-filings-unemployment-aid/","significance":"Thị trường lao động Mỹ vẫn vững dù giá năng lượng tăng vọt vì xung đột Trung Đông, củng cố quan điểm của Fed rằng chưa cần vội hạ lãi suất.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Chính trị","title":"Hạ viện Mỹ thông qua nghị quyết ngân sách tài khóa 2027 với tỷ lệ sít sao 216-214","summary":"Hạ viện thông qua H.Con.Res.113 thiết lập khung ngân sách liên bang tài khóa 2027 với tỷ lệ 216-214, chỉ 2 nghị sĩ Cộng hòa bỏ phiếu chống cùng toàn bộ Dân chủ. Nghị quyết giao 4 ủy ban Hạ viện soạn luật chi tiết, cho phép tới 73 tỷ USD chi quốc phòng/tình báo và 10 tỷ USD cho các quy định về ID cử tri.","sourceName":"Roll Call","sourceUrl":"https://rollcall.com/2026/07/22/gop-budget-blueprint-adopted-in-house-as-senate-resists/","significance":"Bước khởi động cho gói reconciliation ngân sách mới của Cộng hòa, nhưng cách biệt phiếu quá mong manh cho thấy khó khăn khi đưa qua Thượng viện.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Chính trị","title":"Hạ viện Mỹ thông qua luật cấm nghị sĩ mua bán cổ phiếu, gộp chung quy định ID cử tri","summary":"Hạ viện thông qua H.R.7008 (Stop Insider Trading Act) với tỷ lệ 232-198, cấm nghị sĩ Quốc hội cùng vợ/chồng và con phụ thuộc mua cổ phiếu niêm yết, buộc công khai ý định bán cổ phiếu trước 7-14 ngày. Đảng Cộng hòa gắn kèm điều khoản yêu cầu cử tri xuất trình giấy tờ tùy thân có ảnh khi bỏ phiếu, khiến nhiều Dân chủ phản đối dù ủng hộ nội dung cấm giao dịch cổ phiếu.","sourceName":"CBS News","sourceUrl":"https://www.cbsnews.com/news/congress-stock-trading-limits-house-vote/","significance":"Nỗ lực hiếm hoi lưỡng đảng nhằm hạn chế xung đột lợi ích của nghị sĩ, nhưng việc gộp với ID cử tri biến nó thành công cụ tranh cãi đảng phái trước bầu cử giữa kỳ; dự luật còn phải qua Thượng viện.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Công nghệ quân sự","title":"BETA Technologies bắt tay GE và Sikorsky làm máy bay không người lái quân sự hóa MV250","summary":"Tại Farnborough Airshow, BETA Technologies công bố MV250 - phiên bản không người lái quân sự hóa của máy bay cất hạ cánh thẳng đứng chạy điện, dùng động cơ turbine hybrid CT7 của GE Aerospace và bộ tự hành MATRIX của Sikorsky. Máy bay có tầm bay trinh sát 1.300 hải lý, tải trọng 2.000 pound, giá dưới 10 triệu USD, dự kiến diễn tập quân sự năm 2027 và sản xuất năm 2028.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/beta-teams-with-ge-sikorsky-for-militarized-unmanned-aircraft/","significance":"Mở rộng thị trường máy bay không người lái đa nhiệm (hậu cần, trinh sát, tấn công) cho Lục quân, Không quân và Thủy quân lục chiến Mỹ với chi phí thấp hơn nhiều so với máy bay có người lái.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Lục quân Mỹ mở chương trình TIGER gỡ nút thắt chuỗi cung ứng động cơ xe tăng Abrams","summary":"Lục quân Mỹ tổ chức 'hackathon' công nghiệp quy tụ hơn 40 nhà cung cấp để giải quyết tình trạng động cơ AGT1500 (do Honeywell sản xuất) có 166 linh kiện nguồn cung độc quyền gây chậm trễ hàng tháng tới cả năm. Lục quân sẽ mời thầu 122 linh kiện thuộc sở hữu trí tuệ của mình để tìm nguồn cung thứ hai.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/army-partners-with-industry-to-alleviate-abrams-engine-supply-chain-woes/","significance":"Nhắm khắc phục tình trạng nhiều xe tăng Abrams nằm bãi vì thiếu động cơ, ảnh hưởng trực tiếp đến khả năng sẵn sàng chiến đấu của lực lượng thiết giáp Mỹ.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Raytheon nhận hợp đồng gia hạn 1,8 tỷ USD radar SPY-6 cho Hải quân Mỹ","summary":"Raytheon ký hợp đồng mở rộng trị giá 1,8 tỷ USD (có thể lên tới 3,3 tỷ USD nếu thực hiện đủ tùy chọn) để tiếp tục sản xuất radar SPY-6, dự kiến lắp trên hơn 50 tàu chiến Mỹ trong thập kỷ tới. Hiện 2 tàu đã biên chế radar này và 11 tàu khác đang thử nghiệm; công ty đã đầu tư hơn 800 triệu USD nâng cấp nhà máy để tăng gấp đôi sản lượng vào năm 2028.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/raytheon-us-navy-spy6-radar-contract-extension/","significance":"Củng cố năng lực cảm biến phòng không/phòng thủ tên lửa của hạm đội Mỹ trong dài hạn, đồng thời giảm chi phí đơn vị nhờ tăng quy mô sản xuất.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Ngoại giao","title":"Rubio công bố gói 2,5 tỷ USD đầu tư chiến lược và 130 triệu USD rà phá bom mìn cho Đông Nam Á","summary":"Phát biểu tại Hội nghị Post-Ministerial ASEAN-Mỹ ở Manila ngày 22/7, Ngoại trưởng Marco Rubio công bố 2,5 tỷ USD đầu tư chiến lược của chính phủ Mỹ (trong đó 1,5 tỷ USD qua Tập đoàn Tài chính Phát triển Quốc tế Mỹ - DFC) cho hàng không, năng lượng và chuỗi cung ứng khu vực, cùng gần 130 triệu USD hỗ trợ rà phá bom mìn nhân đạo tại các nước ASEAN.","sourceName":"Mirage News","sourceUrl":"https://www.miragenews.com/boosting-us-security-and-growth-in-southeast-1714577/","significance":"Gói cam kết tài chính lớn nhằm trấn an các đồng minh Đông Nam Á rằng Washington không xao lãng khu vực dù đang tập trung vào khủng hoảng Iran, đồng thời cạnh tranh ảnh hưởng kinh tế với Trung Quốc.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Ngoại giao","title":"Rubio gặp Tổng thống Marcos, tái khẳng định liên minh Mỹ-Philippines và tăng viện trợ quân sự","summary":"Tại Manila ngày 22/7, Ngoại trưởng Rubio gặp Tổng thống Philippines Ferdinand Marcos Jr., tái khẳng định 'liên minh sắt đá' nhân kỷ niệm 10 năm phán quyết Trọng tài Biển Đông 2016. Mỹ xác nhận 100 triệu USD viện trợ quân sự cho Philippines trong năm tài khóa 2026 và thêm 9 triệu USD mở rộng cầu cảng tuần duyên tại Palawan.","sourceName":"UPI","sourceUrl":"https://www.upi.com/Top_News/US/2026/07/22/rubio-meets-Marcos-Manila/8191784759348/","significance":"Khoản hỗ trợ quân sự và hạ tầng tuần duyên cụ thể hóa cam kết của Mỹ với Philippines ngay sau vụ đụng độ mới tại Bãi Cỏ Mây, củng cố năng lực chấp pháp biển của Manila trước Trung Quốc.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-23","category":"Ngoại giao","title":"Rubio gặp Lavrov tại Manila, tìm cách khôi phục triển vọng hòa đàm Ukraine nhưng chưa có đột phá","summary":"Ngoại trưởng Mỹ Marco Rubio và Ngoại trưởng Nga Sergei Lavrov gặp nhau hơn 30 phút bên lề hội nghị ASEAN tại Manila ngày 23/7 để bàn về chiến tranh Ukraine. Rubio gọi cuộc trò chuyện là 'thẳng thắn', nói cần có đề xuất mới sau khi các ý tưởng hòa bình trước đó thất bại; Lavrov tái khẳng định Nga sẵn sàng cho giải pháp chính trị-ngoại giao nhưng phản đối tiếp tục viện trợ vũ khí cho Kiev.","sourceName":"Korea Times","sourceUrl":"https://www.koreatimes.co.kr/world/20260723/rubio-meets-russias-lavrov-in-manila-to-try-to-revive-prospect-of-us-helping-end-war-in-ukraine","significance":"Cuộc gặp diễn ra khi nỗ lực trung gian hòa giải của Mỹ đang chững lại do Washington chuyển trọng tâm sang khủng hoảng Iran, cho thấy kênh đối thoại Mỹ-Nga về Ukraine vẫn được duy trì dù chưa có tiến triển thực chất.","region":"","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Chính quyền Trump cân nhắc phương án quân sự tại Mali, gồm không kích drone nhắm JNIM","summary":"Theo Washington Post, các quan chức Mỹ đương nhiệm và cựu quan chức cho biết chính quyền Trump đang cân nhắc phương án can thiệp quân sự ở Mali nhằm vào Jama'at Nusrat al-Islam wal-Muslimin (JNIM) - nhóm liên kết al-Qaeda. Phương án bàn tới gồm không kích có mục tiêu bằng drone hoặc máy bay Mỹ nhắm thủ lĩnh thánh chiến. Nếu được duyệt, Mali sẽ là nước thứ tám bị Mỹ không kích dưới nhiệm kỳ hai của ông Trump. Giới chức Mỹ còn bất đồng: lo ngại đòn tấn công có thể khiến JNIM nhắm lại người Mỹ trong khu vực hoặc đẩy nhóm này xích gần al-Qaeda trung tâm.","sourceName":"The Washington Post","sourceUrl":"https://www.washingtonpost.com/national-security/2026/07/22/trump-administration-weighs-military-options-mali-officials-say/","significance":"Mở mặt trận chống khủng bố mới ở Sahel - nơi có lực lượng Nga (Africa Corps) hiện diện - đặt Mỹ vào thế cạnh tranh ảnh hưởng với Nga và rủi ro leo thang ngay giữa lúc JNIM đã siết phong tỏa nhiên liệu và tấn công tận thủ đô Bamako.","_addedDate":"2026-07-23"},{"date":"2026-07-22","category":"Kinh tế","title":"Carney và Trump nhất trí đẩy nhanh đàm phán thương mại sau khi Mỹ áp thuế 50% lên hàng Canada","summary":"Một ngày sau khi Tổng thống Trump áp thuế 50% lên loạt hàng Canada (ô tô, rượu, sữa) theo Mục 338 Đạo luật Thuế quan 1930 (nhắm mặt hàng từng được bảo hộ theo USMCA, ảnh hưởng khoảng 28 tỷ CAD kim ngạch/năm), Thủ tướng Canada Mark Carney thông báo hai bên nhất trí 'đẩy nhanh và làm sâu sắc' đàm phán thương mại trong vài tuần tới. Thuế có hiệu lực sau 30 ngày kể từ khi công bố (20/7).","sourceName":"Fortune","sourceUrl":"https://fortune.com/2026/07/22/carney-trump-tariffs-canadian-canada-goods-negotiations/","significance":"USMCA, khung thương mại Bắc Mỹ, đang bị định hình lại ngoài hiệp định cũ do Mỹ không gia hạn, ảnh hưởng trực tiếp ngành ô tô, nông sản, đồ uống xuyên biên giới Mỹ-Canada."},{"date":"2026-07-22","category":"Chính trị","title":"Hạ viện Mỹ thông qua ngân sách quốc phòng 1.150 tỷ USD, đổi tên Lầu Năm Góc thành Bộ Chiến tranh","summary":"Hạ viện thông qua Đạo luật Ủy quyền Quốc phòng (NDAA) tài khóa 2027 với tỷ lệ sít sao 216-212, gần như theo lằn ranh đảng phái. Ngân sách quốc phòng tăng từ 900,6 tỷ lên 1.150 tỷ USD, chính thức đổi tên Lầu Năm Góc thành 'Bộ Chiến tranh', tăng lương quân nhân 5-7% và mở rộng quân số. Dự luật còn phải qua Thượng viện rồi hòa giải khác biệt trước khi trình Tổng thống Trump ký.","sourceName":"Military Times","sourceUrl":"https://www.militarytimes.com/news/pentagon-congress/2026/07/22/house-passes-115-trillion-defense-budget-in-near-party-line-vote/","significance":"Phản ánh chia rẽ lưỡng đảng sâu sắc về quy mô ngân sách quốc phòng kỷ lục và việc tài trợ chiến dịch quân sự nhằm vào Iran, cho thấy Quốc hội Mỹ giằng co giữa kiểm soát chi tiêu và ủng hộ chiến sự đang diễn ra."},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Mỹ bổ sung 11,4 tỷ USD, tăng gần gấp 3 số vụ phóng cho Space Force","summary":"Lầu Năm Góc tăng trần hợp đồng phóng vệ tinh an ninh quốc gia NSSL Phase 3 Lane 1 thêm 11,4 tỷ USD để tài trợ 110 nhiệm vụ phóng bổ sung, nâng tổng số vụ phóng dự kiến giai đoạn 2025-2034 từ 60 lên khoảng 170; tổng giá trị hợp đồng tăng từ 5,6 tỷ lên 17 tỷ USD. SpaceX, ULA, Blue Origin, Rocket Lab, Stoke Space, Impulse Space và Relativity Federal là các nhà thầu cạnh tranh.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/extra-11-billion-to-fund-huge-leap-in-space-force-launches/","significance":"Phản ánh nhu cầu phóng vệ tinh quân sự tăng vọt để sớm đưa năng lực tình báo, cảnh báo tên lửa lên quỹ đạo."},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Lockheed Martin và RTX đàm phán sớm về sản xuất tên lửa Patriot ngay tại Ukraine","summary":"Sau khi Tổng thống Trump tuyên bố sẽ cấp phép sản xuất tên lửa đánh chặn Patriot tại Ukraine, lãnh đạo RTX (sản xuất đầu đạn GEM-T) và Lockheed Martin (sản xuất PAC-3) xác nhận đang trong giai đoạn đàm phán sơ khởi, vừa nghiên cứu tính khả thi vừa làm thủ tục cấp phép với chính phủ Mỹ.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/lockheed-rtx-in-early-talks-for-ukraine-patriot-production-execs-say/","significance":"Nếu thành hiện thực, đây sẽ là lần đầu tiên tên lửa phòng không Patriot được sản xuất ngay trên lãnh thổ Ukraine, rút ngắn chuỗi cung ứng giữa chiến sự."},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Nghị sĩ Mỹ trải nghiệm tấn công mạng bằng AI trong diễn tập chiến tranh Đài Loan","summary":"Trung tâm CSIS tổ chức diễn tập bàn cờ mô phỏng khủng hoảng Đài Loan năm 2027 cho các nghị sĩ Hạ viện (22/7). AI được dùng để mô phỏng tấn công mạng lưới giao thông và hậu cần, đánh cắp thông tin đăng nhập, và tấn công 'prompt injection' nhằm thao túng hệ thống AI. Dân biểu Michael McCaul cảnh báo Trung Quốc chỉ còn kém Mỹ về AI khoảng 3-5 tháng.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/threats/2026/07/lawmakers-get-taste-ai-enabled-cyberattacks-china-taiwan-war-game/414952/","significance":"Cho thấy giới lập pháp Mỹ ngày càng lo ngại năng lực tấn công mạng bằng AI có thể làm tê liệt khả năng triển khai quân sự trong một xung đột Đài Loan."},{"date":"2026-07-22","category":"Công nghệ quân sự","title":"Hải quân Mỹ trao 70 triệu USD phát triển tên lửa hành trình giá rẻ CHAOS cho đồng minh","summary":"CoAspire nhận hợp đồng nguyên mẫu 70 triệu USD phát triển tên lửa hành trình phóng từ mặt đất RAACM-ER trong chương trình CHAOS, nhằm tấn công cả mục tiêu trên bộ và tàu di động trên biển với chi phí thấp, ứng dụng công nghệ sản xuất đắp lớp để rút ngắn thời gian chỉnh sửa thiết kế. Hợp đồng phục vụ các nước đồng minh/đối tác qua hình thức bán quân sự nước ngoài.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/us-navy-coaspire-chaos-cruise-missile-raacm-er/","significance":"Mở rộng lựa chọn vũ khí tấn công chính xác giá rẻ cho đồng minh Mỹ, theo xu hướng vũ khí 'tiêu hao được' (attritable) thay thế tên lửa đắt tiền truyền thống."},{"date":"2026-07-22","category":"Ngoại giao","title":"Rubio gặp Ngoại trưởng Ấn Độ Jaishankar tại Manila, thúc đẩy thỏa thuận thương mại và quốc phòng","summary":"Ngoại trưởng Mỹ Marco Rubio gặp song phương Ngoại trưởng Ấn Độ S. Jaishankar bên lề AMM-Quad tại Manila ngày 22/7, nhất trí đẩy nhanh các thỏa thuận quốc phòng theo cam kết Trump-Modi và sớm hoàn tất thỏa thuận thương mại tạm thời được mô tả là 'gần hoàn thành', cùng bàn về khoáng sản thiết yếu và AI.","sourceName":"Business Standard","sourceUrl":"https://www.business-standard.com/external-affairs-defence-security/news/jaishankar-rubio-discuss-trade-tariffs-energy-defence-in-manila-126072200372_1.html","significance":"Tạo động lực mới cho quan hệ Đối tác Chiến lược Toàn diện Toàn cầu Mỹ-Ấn giữa lúc đàm phán thương mại kéo dài."},{"date":"2026-07-22","category":"Ngoại giao","title":"Mỹ - Nhật - Hàn tái khẳng định răn đe Triều Tiên, nhất trí triển khai MOU lò phản ứng module nhỏ","summary":"Ngoại trưởng Mỹ Rubio, Nhật Bản Motegi và Hàn Quốc Cho Hyun họp ba bên tại Manila ngày 22/7, tái khẳng định lập trường răn đe mạnh với Triều Tiên và phi hạt nhân hóa bán đảo Triều Tiên, nhất trí triển khai Biên bản ghi nhớ hợp tác về lò phản ứng module nhỏ (SMR), tăng cường an ninh hàng hải và chống tội phạm xuyên quốc gia.","sourceName":"The Korea Herald","sourceUrl":"https://www.koreaherald.com/article/10816976","significance":"Củng cố cơ chế phối hợp ba bên Mỹ-Nhật-Hàn về an ninh khu vực và hợp tác công nghệ hạt nhân dân sự."},{"date":"2026-07-21","category":"Chính trị","title":"Hạ viện Mỹ thông qua ngân sách tạm thời tới 4/12, tránh đóng cửa chính phủ trước bầu cử giữa kỳ","summary":"Ngày 21/7, Hạ viện Mỹ thông qua H.R. 9770 với tỷ lệ 220-205, gia hạn ngân sách liên bang ở mức hiện hành đến ngày 4/12/2026. Dự luật chuyển sang Thượng viện, nơi lãnh đạo phe Cộng hòa John Thune cho biết đang đàm phán với phía Dân chủ để ra phiên bản riêng trước kỳ nghỉ tháng 8.","sourceName":"Deseret News","sourceUrl":"https://www.deseret.com/politics/2026/07/21/republicans-push-ahead-on-spending-bills/","significance":"Cuộc bỏ phiếu định hình lịch trình ngân sách liên bang ngay trước bầu cử giữa kỳ và là phép thử khả năng lưỡng viện tránh lặp lại đợt đóng cửa 43 ngày mùa thu trước."},{"date":"2026-07-21","category":"Công nghệ quân sự","title":"Lục quân Mỹ đưa tên lửa siêu vượt âm Dark Eagle tới Guam, đặt Trung Quốc vào tầm bắn","summary":"Sư đoàn Bộ binh 7 của Lục quân Mỹ đã triển khai tên lửa siêu vượt âm tầm xa Dark Eagle (LRHW, tốc độ trên Mach 5, tầm khoảng 2.175 dặm) tới Guam trong diễn tập Valiant Shield (22/6-1/7/2026). Đô đốc Samuel Paparo, Tư lệnh Bộ Chỉ huy Ấn Độ Dương - Thái Bình Dương, trực tiếp kiểm tra hệ thống trong đợt huấn luyện.","sourceName":"Stars and Stripes","sourceUrl":"https://www.stripes.com/branches/army/2026-07-21/dark-eagle-guam-us-army-paparo-hypersonic-22323812.html","significance":"Đây là lần triển khai ở nước ngoài thứ hai của Dark Eagle sau Australia tháng 7/2025; đưa hệ thống tới Guam đặt một phần lãnh thổ Trung Quốc vào tầm bắn, giữa lúc Paparo cảnh báo Bắc Kinh được lệnh sẵn sàng tấn công Đài Loan vào năm 2027."},{"date":"2026-07-21","category":"Công nghệ quân sự","title":"Thủy quân lục chiến Mỹ chọn súng máy điều khiển bằng AI Bullfrog để hạ drone giá rẻ","summary":"Thủy quân lục chiến Mỹ đưa hệ thống vũ khí Bullfrog (dùng súng máy M240, do Allen Control Systems chế tạo) vào chương trình phòng không mặt đất GBAD và tích hợp vào hệ thống L-MADIS. Hệ thống dùng AI tự động phát hiện, bám và ngắm bắn drone cỡ trung đến lớn trong tầm khoảng 1 km.","sourceName":"C4ISRNet","sourceUrl":"https://www.c4isrnet.com/news/your-military/2026/07/21/us-marine-corps-turns-to-ai-powered-bullfrog-as-drone-threats-expand/","significance":"Chi phí mỗi lần diệt mục tiêu chỉ khoảng 10 USD, Bullfrog nhắm thẳng vào bài toán bất cân xứng chi phí khi phải dùng tên lửa đánh chặn hàng triệu USD để hạ drone giá rẻ như tại Ukraine và Trung Đông."},{"date":"2026-07-21","category":"Công nghệ quân sự","title":"X-Bow giới thiệu tên lửa đánh chặn drone Buckler giá dưới 100.000 USD","summary":"Công ty X-Bow ra mắt tên lửa đánh chặn siêu thanh Buckler tại triển lãm Farnborough 2026, thiết kế để tiêu diệt drone nhóm 3 (nặng tới khoảng 600 kg, bay dưới 18.000 feet) với giá dưới 100.000 USD mỗi quả. X-Bow tự sản xuất toàn bộ khung và động cơ đẩy, vừa hoàn tất thử nghiệm bay thành công.","sourceName":"C4ISRNet","sourceUrl":"https://www.c4isrnet.com/industry/techwatch/2026/07/21/x-bow-out-to-tackle-cost-quandary-with-sub-100000-drone-interceptor/","significance":"Lãnh đạo X-Bow nhấn mạnh không thể thắng cuộc chiến tiêu hao khi dùng tên lửa PAC-3 giá 4 triệu USD để đánh chặn drone Shahed-136 giá 35.000 USD - tỷ lệ chi phí 114:1 mà Buckler nhắm thu hẹp."},{"date":"2026-07-22","category":"Ngoại giao","title":"Trump phê duyệt thỏa thuận hạt nhân dân sự 30 năm với Saudi Arabia, kèm thương vụ F-35","summary":"Tổng thống Trump đã phê duyệt Hiệp định 123 về hợp tác hạt nhân dân sự kéo dài 30 năm với Saudi Arabia, cho phép doanh nghiệp Mỹ phát triển ngành hạt nhân dân sự tại vương quốc này và khả năng xây cơ sở làm giàu uranium sau một nghiên cứu chung. Cùng lúc hai bên ký thỏa thuận bán tiêm kích F-35; thỏa thuận hạt nhân sẽ được Quốc hội Mỹ xem xét trong 90 ngày.","sourceName":"CNN","sourceUrl":"https://www.cnn.com/2026/07/22/politics/us-saudi-nuclear-deal","significance":"Thỏa thuận thiếu 'chuẩn vàng' cấm làm giàu uranium và không kèm Nghị định thư Bổ sung của IAEA, làm dấy lo ngại phổ biến hạt nhân ở Trung Đông - đúng lý do Mỹ từng viện dẫn khi tấn công chương trình hạt nhân Iran."},{"date":"2026-07-21","category":"Ngoại giao","title":"Mỹ ký thư bày tỏ ý định đưa Peace Corps trở lại Quần đảo Solomon sau hơn 25 năm","summary":"Thứ trưởng Ngoại giao Mỹ Christopher Landau gặp Thủ tướng Quần đảo Solomon Matthew Wale tại Washington ngày 21/7 và ký Thư Bày tỏ Ý định đưa Peace Corps quay lại nước này sau hơn 25 năm vắng bóng. Hai bên cũng nêu Thỏa thuận Sáng kiến Đầu tư mới với Development Finance Corporation và khoản tài trợ 6 triệu USD mở rộng chương trình rà phá bom mìn chưa nổ.","sourceName":"U.S. Department of State","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/deputy-secretary-landaus-meeting-with-solomon-islands-prime-minister-wale","significance":"Động thái nằm trong nỗ lực của Mỹ tái can dự sâu hơn vào Nam Thái Bình Dương nhằm cân bằng ảnh hưởng ngày càng tăng của Trung Quốc tại Quần đảo Solomon kể từ hiệp ước an ninh Solomon - Trung Quốc năm 2022."},{"date":"2026-07-20","category":"Kinh tế","title":"Giá xăng Mỹ trở lại trên 4 USD/gallon khi Brent có lúc vượt 90 USD vì chiến sự Trung Đông","summary":"Giá Brent có lúc đạt 91,42 USD/thùng — cao nhất hơn một tháng — trước khi lùi về khoảng 88 USD khi Iran xác nhận đã nhận các đề xuất trung gian. Tại Mỹ, giá xăng bán lẻ bình quân tăng lên 4,003 USD/gallon, cao hơn hơn 30% so với lúc chiến sự leo thang cuối tháng 2. Nguyên nhân gồm dòng tàu qua Hormuz giảm mạnh, công suất lọc dầu toàn cầu bị thu hẹp và tồn kho nhiên liệu Mỹ dưới trung bình năm năm; các đòn đánh cơ sở dầu Nga của Ukraine tiếp tục bổ sung rủi ro nguồn cung.","significance":"Năng lượng đắt hơn có thể làm chậm quá trình giảm lạm phát, kéo dài lãi suất cao và gây sức ép lên thu nhập hộ gia đình. Với Mỹ, mốc 4 USD/gallon mang ý nghĩa chính trị lớn trước bầu cử giữa nhiệm kỳ và có thể ảnh hưởng trực tiếp tới lựa chọn quân sự, giải phóng dự trữ hoặc thúc đẩy đàm phán.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/business/energy/us-pump-prices-cross-4-again-renewed-fighting-middle-east-2026-07-20/"},{"date":"2026-07-20","category":"Kinh tế","title":"Triển vọng tăng trưởng Mexico giảm vì bất định thương mại với Mỹ và rà soát USMCA hằng năm","summary":"Khảo sát kinh tế mới hạ dự báo tăng trưởng Mexico xuống 1,1% năm 2026 và 1,8% năm 2027, phản ánh đầu tư suy yếu trước bất định trong quan hệ thương mại với Mỹ. Washington không gia hạn USMCA theo chu kỳ dài mà chuyển sang đánh giá thường niên, khiến doanh nghiệp khó lập kế hoạch vốn, đặc biệt trong ngành ô tô. Xuất khẩu vẫn tương đối mạnh nhưng sản xuất công nghiệp và đầu tư tư nhân chậm; lạm phát quanh 4%, khiến ngân hàng trung ương có thể phải giữ lãi suất 6,5% lâu hơn.","significance":"Mexico là mắt xích trung tâm của chiến lược nearshoring Bắc Mỹ. Nếu cơ chế rà soát hằng năm làm giảm đầu tư dài hạn, chuỗi cung ứng ô tô, điện tử và công nghiệp Mỹ sẽ chịu tác động, đồng thời lợi thế của Mexico trước Trung Quốc và các nước châu Á có thể bị thu hẹp.","sourceName":"Reuters","sourceUrl":"https://www.reuters.com/world/americas/mexico-economy-grow-less-than-previously-expected-trade-concerns-2026-07-20/"},{"date":"2026-07-17","category":"Ngoại giao","title":"Rubio tới Manila dự chuỗi hội nghị ASEAN, mở kênh chuẩn bị đối thoại Mỹ–Trung cấp cao","summary":"Ngoại trưởng Mỹ Marco Rubio tới Manila từ ngày 19 đến 23/7 để dự Hội nghị sau Bộ trưởng ASEAN, Hội nghị Bộ trưởng Cấp cao Đông Á và Diễn đàn Khu vực ASEAN. Ông dự kiến gặp các quan chức Ấn Độ Dương–Thái Bình Dương; cuộc tiếp xúc với Ngoại trưởng Trung Quốc Vương Nghị được trông đợi dù chưa bên nào xác nhận. Các chủ đề chính gồm chiến tranh Iran, Biển Đông, Myanmar, trung tâm lừa đảo xuyên quốc gia và khả năng chuẩn bị cho cuộc gặp Trump–Tập vào tháng 9. Ngoại trưởng Nga Sergei Lavrov cũng dự kiến có mặt.","significance":"Manila tạo một kênh quản trị cạnh tranh Mỹ–Trung trong lúc khủng hoảng Iran gây áp lực lên châu Á. Tiến triển về Bộ quy tắc ứng xử Biển Đông hoặc cuộc gặp Rubio–Vương có thể ảnh hưởng trực tiếp cân bằng khu vực.","sourceName":"U.S. Department of State","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/secretary-rubios-travel-to-manila-for-asean-foreign-ministerial-meetings/"},{"date":"2026-07-17","category":"Công nghệ quân sự","title":"AeroVironment nhận nhiệm vụ 80,5 triệu USD cho phòng thủ căn cứ trước drone nhỏ","summary":"AeroVironment được trao nhiệm vụ đầu tiên trị giá 80,5 triệu USD trong một hợp đồng khung 500 triệu USD để phát triển hệ thống phòng thủ nhiều lớp cho các căn cứ Không quân Mỹ trước drone nhỏ. Gói đầu tư tập trung vào giải pháp Titan, tích hợp khả năng phát hiện và đánh bại UAS, có thể triển khai tại địa điểm cố định hoặc cơ động. Quân đội Mỹ nhấn mạnh yêu cầu tương tác giữa các thành phần để tạo kiến trúc phòng thủ thống nhất. Thông tin công khai chưa nêu số lượng hệ thống, địa điểm triển khai hay tiến độ đạt năng lực tác chiến ban đầu.","significance":"Các cuộc chiến gần đây cho thấy drone giá rẻ có thể gây thiệt hại lớn cho căn cứ và hạ tầng. Hợp đồng phản ánh chuyển dịch ngân sách từ giải pháp đơn lẻ sang phòng thủ nhiều lớp có AI và khả năng tích hợp.","sourceName":"Association of Defense Communities","sourceUrl":"https://defensecommunities.org/2026/07/pentagon-awards-80m-drone-defense-contract/"},{"date":"2026-07-18","category":"Kinh tế","title":"Fed cải tổ triệt để cách truyền thông chính sách, Wall Street phải dùng AI để 'giải mã' Chủ tịch Warsh","summary":"Chủ tịch Fed Kevin Warsh đã rút ngắn tuyên bố sau cuộc họp FOMC tháng 6 xuống còn khoảng 130 từ (so với hơn 300 từ trước đây), chủ động bỏ định hướng chính sách tương lai (forward guidance) như một phần cải tổ truyền thông của một nhóm công tác Fed do ông lập ra. Trước thay đổi này, quỹ đầu tư F/m Investments phải xây dựng chatbot AI 'WarshGPT' (dùng mô hình Claude, chi phí dưới 1.000 USD) để phân tích gần 1.800 tài liệu/phát biểu của Warsh nhằm dự đoán cách ông tư duy về chính sách.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/18/warshgpt-federal-reserve-communications-task-force-warsh.html","significance":"Thay đổi phong cách truyền thông của Fed làm giảm khả năng dự đoán chính sách tiền tệ theo cách truyền thống, buộc thị trường phải thích ứng bằng công cụ mới — phản ánh bước ngoặt về minh bạch/thể chế dưới nhiệm kỳ Warsh."},{"date":"2026-07-18","category":"Công nghệ quân sự","title":"GAO cảnh báo Mỹ thiếu chiến lược thống nhất cho tên lửa siêu vượt âm CPS trị giá hơn 50 tỷ USD","summary":"GAO công bố báo cáo cho biết Hải quân Mỹ chậm khoảng 24 tháng trong việc cải hoán ba khu trục hạm Zumwalt để triển khai tên lửa Conventional Prompt Strike. Dây chuyền của Lockheed Martin hiện chỉ sản xuất khoảng sáu đến bảy đạn mỗi năm, xấp xỉ một nửa mục tiêu 12 quả của Hải quân, trong khi Lục quân dùng chung thiết kế và chuỗi cung ứng. Hai quân chủng dự kiến đầu tư tổng cộng hơn 50 tỷ USD nhưng chưa có chiến lược toàn diện để phối hợp mua sắm, thử nghiệm, cơ sở công nghiệp và lịch triển khai, làm tăng nguy cơ lãng phí và trùng lặp.","sourceName":"U.S. Government Accountability Office","sourceUrl":"https://www.gao.gov/products/gao-26-107974","significance":"CPS là năng lực tấn công tầm xa then chốt trước các đối thủ ngang hàng; chậm tiến độ và thiếu phối hợp có thể tạo khoảng trống răn đe ở Ấn Độ Dương–Thái Bình Dương."},{"date":"2026-07-17","category":"Công nghệ quân sự","title":"Không quân Mỹ tăng mạnh sản xuất tên lửa hành trình tàng hình JASSM và diệt hạm LRASM","summary":"Không quân Mỹ mở rộng hợp đồng mua tên lửa AGM-158 JASSM và AGM-158C LRASM của Lockheed Martin (lô 22-33 JASSM, lô 9-19 LRASM), nâng tổng số dự kiến từ 16.710 lên 23.095 quả - mức tăng lớn nhất từ trước tới nay cho dòng tên lửa tầm xa tàng hình này.","sourceName":"USNI News","sourceUrl":"https://news.usni.org/2026/07/17/u-s-air-force-increases-stealthy-cruise-anti-ship-missile-production","significance":"Dồn sức tăng kho JASSM/LRASM phản ánh ưu tiên của Lầu Năm Góc nhằm bảo đảm năng lực tấn công tầm xa xuyên thủng lưới phòng không dày đặc của Trung Quốc, phục vụ răn đe Ấn Độ Dương - Thái Bình Dương."},{"date":"2026-07-17","category":"Công nghệ quân sự","title":"Hải quân Mỹ chậm 2 năm lắp tên lửa siêu vượt âm lên khu trục hạm lớp Zumwalt","summary":"Theo báo cáo cơ quan giám sát chính phủ Mỹ, chương trình lắp hệ thống tên lửa siêu vượt âm Conventional Prompt Strike (CPS) lên 3 khu trục hạm lớp Zumwalt chậm khoảng 2 năm; đợt thử bay dự kiến 2025 nay lùi sang 2027.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/17/us-navy-2-years-behind-on-hypersonic-missile-installation-on-zumwalt-destroyers/","significance":"Sự chậm trễ lùi thời điểm hải quân Mỹ có năng lực tấn công siêu vượt âm tầm xa trên tàu mặt nước đầu tiên, ảnh hưởng lộ trình răn đe/chống tiếp cận ở Ấn Độ Dương - Thái Bình Dương."},{"date":"2026-07-17","cat
