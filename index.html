<style>
:root{--fs:1;
  --bg:#f5f2ec;--paper:#fff;--paper2:#f7f5f1;--ink:#1b1b1b;--title:#141414;--sum:#3a352e;
  --muted:#6b6459;--muted2:#8a8378;--line:#d8d2c6;--line2:#ded8cc;--accent:#b3282d;
  --soft:#efeae0;--note-ink:#5a5349;--star:#c4b48f;--star-on:#d4a017;--accent-soft:#fbeceb;
  --drill-bg:#fbfaf7;--relate-bg:#eef3ee;--green:#1f8a54}
[data-theme=dark]{
  --bg:#1a1712;--paper:#242019;--paper2:#2a251d;--ink:#ece7db;--title:#f5f1e8;--sum:#cfc8ba;
  --muted:#a89f8f;--muted2:#8f8676;--line:#3a352b;--line2:#322e26;--accent:#e07a6f;
  --soft:#2b2620;--note-ink:#cfc8ba;--star:#6b6353;--star-on:#e0b53a;--accent-soft:#3a2622;
  --drill-bg:#201d17;--relate-bg:#1e2620;--green:#4fb07a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double var(--ink);margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:7px 2px;font-size:calc(11.5px*var(--fs));color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;flex-wrap:wrap;gap:2px 4px;margin:14px 0 16px;border-bottom:2px solid var(--ink)}
.tb{white-space:nowrap;padding:9px 14px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted);cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
@media(max-width:520px){.tb{padding:8px 11px;font-size:calc(13.5px*var(--fs))}}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}
.note{font-size:calc(13px*var(--fs));color:var(--note-ink);background:var(--soft);border-left:3px solid var(--accent);padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:var(--paper);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.on .dot{outline:1px solid var(--paper)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid var(--line2);padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:var(--title)}
.sum{font-size:calc(14px*var(--fs));color:var(--sum)}
.take{font-size:calc(13.5px*var(--fs));color:var(--ink);background:var(--soft);border-radius:2px;padding:8px 11px;margin:7px 0}
.nbody{display:flex;gap:14px;align-items:flex-start}
.nbody .txt{flex:1;min-width:0}
.nthumb{flex:0 0 172px;width:172px;height:118px;object-fit:cover;border-radius:3px;background:var(--soft)}
@media(max-width:520px){.nbody{gap:10px}.nthumb{flex-basis:112px;width:112px;height:76px}}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:var(--muted2)}
.src{font-size:calc(12.5px*var(--fs));color:var(--accent);text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.favb{margin-left:auto;background:none;border:none;cursor:pointer;font-size:calc(18px*var(--fs));line-height:1;color:var(--star);padding:0 2px;font-family:inherit}
.favb:hover{color:var(--star-on)}
.favb.on{color:var(--star-on)}
.filterbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px 18px;margin:-2px 0 14px}
.fg{display:inline-flex;align-items:center;gap:6px}
.filterbar .fg>span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.filterbar>span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px}
.dsel{font-family:inherit;font-size:calc(13px*var(--fs));padding:6px 9px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);cursor:pointer}
.empty{color:var(--muted2);text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
/* ==== Tab Tập trận ==== */
.drill{margin-bottom:24px;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--drill-bg)}
.drill-h{padding:14px 14px 12px;background:var(--soft);border-bottom:1px solid var(--line2)}
.drill-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:6px}
.dpill{font-size:calc(10.5px*var(--fs));font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px}
.dpill.live{background:#c0392b;color:#fff}
.dpill.up{background:#2b5f9e;color:#fff}
.dpill.done{background:#1f8a54;color:#fff}
.seg{display:flex;gap:5px;margin:0 0 16px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;padding:4px}
.seg button{flex:1;padding:9px 6px;border:none;background:none;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700;font-size:calc(13.5px*var(--fs));color:var(--muted);white-space:nowrap}
.seg button.on{background:var(--ink);color:var(--bg)}
#concept-fab{position:fixed;z-index:90;background:var(--accent);color:#fff;border:none;border-radius:16px;padding:7px 13px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.32);display:none}
.cadd{display:flex;gap:7px;margin:0 0 14px}
.cadd input{flex:1;min-width:0;border:1px solid var(--line);background:var(--paper);border-radius:7px;padding:9px 11px;font-family:inherit;font-size:calc(13.5px*var(--fs));color:var(--ink);outline:none}
.cadd button{border:none;background:var(--ink);color:var(--bg);border-radius:7px;padding:9px 16px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.clist{display:flex;flex-direction:column;gap:10px}
.citem{border:1px solid var(--line2);border-radius:8px;padding:11px 13px;background:var(--drill-bg)}
.cterm{font-weight:800;font-size:calc(15px*var(--fs));color:var(--title);display:flex;align-items:center;gap:8px}
.cx{margin-left:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;font-family:inherit;line-height:1;padding:0 2px}
.cx:hover{color:var(--accent)}
.cexp{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:6px;line-height:1.55}
.cpend{font-style:italic;color:var(--muted2)}
.expbar{margin:0 0 14px}
.wbtn{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:7px;padding:9px 14px;font-weight:700;font-family:inherit;font-size:calc(13.5px*var(--fs));cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.wbtn:hover{border-color:var(--accent);color:var(--accent)}
.wbtn:active{transform:scale(.98)}
.drill-dates{font-size:calc(12px*var(--fs));color:var(--muted);font-weight:700}
.drill-name{font-family:inherit;font-size:calc(21px*var(--fs));font-weight:800;line-height:1.25;color:var(--title);margin-bottom:5px}
.drill-meta{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:2px}
.drill-sum{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:8px;line-height:1.5}
.drill .list{padding:0 14px 4px}
.drill .card{padding:14px 0}
.drill .card:last-child{border-bottom:none}
.relate{font-size:calc(13px*var(--fs));color:var(--ink);background:var(--relate-bg);border-left:3px solid var(--green);border-radius:2px;padding:8px 11px;margin:8px 0 2px;line-height:1.5}
.relate b{color:var(--green)}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double var(--ink);font-size:calc(11.5px*var(--fs));color:var(--muted2);text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:var(--muted2);margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid var(--line);background:var(--paper);border-radius:6px;cursor:pointer;font-size:16px;color:var(--ink)}
.rp-fonts button .vi{font-size:12px;color:var(--muted2);font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:var(--accent);background:var(--accent-soft)}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}

/* ==== Tính năng mới ==== */
.toolbar{display:flex;align-items:center;gap:8px;margin:0 0 14px}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 11px}
.search input{flex:1;min-width:0;border:none;background:none;outline:none;font-family:inherit;font-size:calc(14px*var(--fs));color:var(--ink)}
.search .sx{cursor:pointer;color:var(--muted2);border:none;background:none;font-size:16px;font-family:inherit;padding:0 2px;line-height:1}
.searchinfo{font-size:calc(12.5px*var(--fs));color:var(--muted2);margin:-4px 0 12px}
.card.read .title{color:var(--muted)}
.card.read .sum{opacity:.7}
.newb{display:inline-block;font-size:calc(9.5px*var(--fs));font-weight:800;letter-spacing:.5px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 6px;margin-right:6px;vertical-align:1px}
.foot-act{margin-left:auto;display:inline-flex;align-items:center;gap:9px}
.foot-act .favb{margin-left:0}
.shareb,.copyb{background:none;border:none;cursor:pointer;color:var(--muted2);padding:2px;line-height:0;display:inline-flex;align-items:center;border-radius:5px}
.shareb svg,.copyb svg{display:block}
.shareb:active,.copyb:active{transform:scale(.9)}
.shareb:hover,.copyb:hover{color:var(--accent)}
#toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(18px);z-index:80;background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:8px;font-size:14px;font-family:inherit;box-shadow:0 6px 24px rgba(0,0,0,.35);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.rp-themes{display:flex;gap:6px}
.rp-themes button{flex:1;padding:8px 6px;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-size:12.5px;font-family:inherit;color:var(--ink)}
.rp-themes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
</style>

<script>
var DATA = {"brand":"Điểm Tin Thế Giới","tagline":"Kinh tế · Chính trị · Ngoại giao · Công nghệ quân sự — cập nhật hằng ngày","generatedAt":"2026-07-09","worldGeneratedAt":"2026-07-09","usGeneratedAt":"2026-07-09","worldNews":[{"date":"2026-07-09","category":"Kinh tế","title":"IMF hạ dự báo tăng trưởng kinh tế toàn cầu 2026 xuống 3% vì hệ lụy chiến tranh Iran","summary":"Quỹ Tiền tệ Quốc tế (IMF) cắt giảm dự báo tăng trưởng toàn cầu năm 2026 từ 3,1% xuống 3%, do cú sốc năng lượng từ chiến sự Trung Đông; dự báo giá dầu tăng gần 32% và lạm phát tiêu dùng toàn cầu lên 4,7%. IMF giả định eo biển Hormuz bắt đầu mở lại từ giữa tháng 7.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/economy/2026/7/9/imf-cuts-2026-world-growth-forecast-citing-iran-war-fallout","significance":"Cho thấy xung đột ở Hormuz đã lan từ rủi ro an ninh sang cú sốc kinh tế thực sự, với lạm phát và giá dầu là kênh lây lan chính; đồng thời hé lộ khoảng cách tăng trưởng ngày càng lớn giữa các nền kinh tế (Mỹ, Trung Quốc) và một Eurozone trì trệ.","image":"https://www.aljazeera.com/wp-content/uploads/2026/07/2026-06-25T160830Z_53922505_RC2SBBAIW9GG_RTRMADP_3_IMF-OUTLOOK-1783555160_fa7720-1783556200.jpg?resize=1200%2C630&quality=80"},{"date":"2026-07-09","category":"Kinh tế","title":"Nga mở rộng lệnh cấm xuất khẩu dầu diesel, ông Putin chỉ đạo bình ổn thị trường trong nước","summary":"Nga mở rộng lệnh cấm xuất khẩu dầu diesel đến hết tháng 7, áp dụng cho cả nhà sản xuất lẫn thương nhân. Phó Thủ tướng Alexander Novak nói nhằm ổn định thị trường nội địa, còn Tổng thống Putin cho rằng tâm lý hoảng loạn đã đẩy nhu cầu tăng ảo 20-30%.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/nga-mo-rong-lenh-cam-xuat-khau-dau-diesel-ong-putin-chi-dao-nong-185260709091129024.htm","significance":"Việc một nước xuất khẩu năng lượng hàng đầu phải cấm xuất diesel để giữ nguồn cung trong nước phản ánh sức ép ngày càng lớn từ các đòn tập kích của Ukraine vào hạ tầng lọc dầu Nga, cho thấy 'mặt trận năng lượng' đang trở thành điểm yếu chiến lược của Moscow.","image":"https://images2.thanhnien.vn/zoom/1200_630/528068263637045248/2026/7/9/2026-07-08t154134z871580433rc2r9mau6x32rtrmadp3ukraine-crisis-russia-diesel-putin-17835626549261400425779-0-0-1340-2560-crop-17835630289381360010468.jpg"},{"date":"2026-07-09","category":"Kinh tế","title":"Venezuela kêu gọi giải phóng tài sản bị đóng băng ở nước ngoài để tái thiết sau động đất","summary":"Chính phủ Venezuela kêu gọi các nước giải phóng những khoản tài sản bị phong tỏa quốc tế nhằm huy động tài chính tái thiết hạ tầng và cứu trợ nhân đạo sau trận động đất kép.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/venezuela-keu-goi-giai-phong-tai-san-dong-bang-o-nuoc-ngoai-de-tai-thiet-sau-dong-dat-100260709121855587.htm","significance":"Cho thấy Caracas đang tận dụng thảm họa nhân đạo như một đòn bẩy ngoại giao-kinh tế để đòi dỡ bỏ trừng phạt và giải tỏa tài sản bị đóng băng, đặt phương Tây vào thế khó giữa nguyên tắc trừng phạt và áp lực nhân đạo.","image":"https://cdn2.tuoitre.vn/zoom/1200_630/471584752817336320/2026/7/9/venezuela-1783574200826123492699-249-0-1296-2000-crop-17835742628171296826834.jpg"},{"date":"2026-07-09","category":"Chính trị","title":"FSB Nga tuyên bố phá 'âm mưu khủng bố chưa từng có', quy trách nhiệm cho tình báo Ukraine","summary":"Cơ quan An ninh Liên bang Nga (FSB) thông báo phá vỡ âm mưu tấn công loạt hạ tầng và sĩ quan quân đội, bắt một phụ nữ 25 tuổi ở Moscow và một người đàn ông ở Krasnodar, cáo buộc do tình báo Ukraine tổ chức.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nga-pha-vo-am-muu-khung-bo-chua-tung-co-tien-le-5095591.html","significance":"Việc Nga liên tục công bố các vụ bắt giữ 'điệp viên Ukraine' vừa nhằm biện minh cho các đợt siết an ninh nội bộ, vừa củng cố tuyên truyền rằng Kiev tiến hành chiến tranh phá hoại ngầm, làm sâu thêm bầu không khí đối đầu không khoan nhượng giữa hai nước.","image":"https://i2-vnexpress.vnecdn.net/2026/07/09/screen-shot-at-1783595591-3883-1783596710.png?w=1200&h=675&q=100&dpr=1&fit=crop&s=Q8-hMF0rbwlsW9HqzX7tMA"},{"date":"2026-07-09","category":"Ngoại giao","title":"Ba Lan cảnh báo Ukraine: biểu tượng UPA có thể cản trở con đường gia nhập EU","summary":"Tổng thống Ba Lan Karol Nawrocki cảnh báo Tổng thống Zelensky rằng việc dùng biểu tượng gắn với tổ chức dân tộc UPA có thể 'giới hạn tương lai của Ukraine trong EU', liên quan vụ đổi tên một đơn vị quân đội thành 'Anh hùng UPA'. Hai bên vẫn xác định Nga là mối lo chung.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ba-lan-canh-bao-ukraine-ve-kha-nang-gia-nhap-eu-5095266.html","significance":"Cho thấy những vết thương lịch sử (thảm sát Volhynia) vẫn đủ sức gây ma sát giữa hai đồng minh thân cận, và Ba Lan — cửa ngõ viện trợ chính cho Kiev — có thể trở thành rào cản chính trị cho tiến trình EU của Ukraine dù hai bên cùng đối đầu Nga.","image":"https://i2-vnexpress.vnecdn.net/2026/07/09/ap26189211452643-1783566720-6398-1783566817.jpg?w=1200&h=675&q=100&dpr=1&fit=crop&s=MNC9Dnm8mMmKVLmzJbjxcw"},{"date":"2026-07-09","category":"Ngoại giao","title":"Nga chỉ trích cam kết viện trợ 70 tỷ euro của NATO cho Ukraine là 'vô trách nhiệm'","summary":"Người phát ngôn Bộ Ngoại giao Nga Maria Zakharova lên án các quyết định của thượng đỉnh NATO tại Thổ Nhĩ Kỳ, gọi cam kết 70 tỷ euro viện trợ quân sự cho Ukraine năm 2026 là 'vô trách nhiệm' và có thể dẫn tới 'thảm họa cho cả thế giới'. NATO xác định Nga là 'mối đe dọa dài hạn'.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nga-chi-trich-cam-ket-cua-nato-voi-ukraine-5095210.html","significance":"Phản ứng gay gắt của Moscow cho thấy thượng đỉnh Ankara đã củng cố lập trường cứng rắn của NATO bất chấp bất đồng nội khối, đồng thời báo hiệu khả năng hòa đàm Nga–phương Tây tiếp tục xa vời khi hai bên gia tăng cam kết đối đầu.","image":"https://i2-vnexpress.vnecdn.net/2026/07/09/1466379-1783554245-2579-1783554637.jpg?w=1200&h=675&q=100&dpr=1&fit=crop&s=2-IdwgdX8oLpZBexHU9nnw"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"NATO đàm phán mua tới 10 máy bay GlobalEye của Saab để thay phi đội AWACS Mỹ","summary":"Theo Tổng thư ký NATO Mark Rutte, khối đang đàm phán mua tới 10 máy bay cảnh báo sớm GlobalEye của hãng Saab (Thụy Điển), trị giá khoảng 4,5 tỷ USD, thay thế 14 chiếc E-3A Sentry cũ có từ năm 1982; dự kiến bàn giao từ 2030.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nato-vach-ke-hoach-thay-phi-doi-may-bay-mat-than-cua-my-5095100.html","significance":"Việc NATO chọn nền tảng châu Âu (Saab) thay vì máy bay Mỹ đánh dấu bước dịch chuyển đáng chú ý hướng tới tự chủ quốc phòng và giảm phụ thuộc vào công nghiệp vũ khí Mỹ, phù hợp xu thế châu Âu 'trám vết nứt' an ninh sau các bất đồng xuyên Đại Tây Dương.","image":"https://i2-vnexpress.vnecdn.net/2026/07/08/GlobalEye-1783507768-6708-1783508496.png?w=1200&h=675&q=100&dpr=1&fit=crop&s=GBX8ejlsOKzdTKpZP49NLA"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Ukraine tuyên bố bắn rơi tiêm kích Su-35S của Nga bằng hệ thống Patriot","summary":"Không quân Ukraine thông báo bắn hạ một tiêm kích đa năng Su-35S của Nga hôm 8/7 gần Donetsk; theo phân tích, các tiêm kích F-16 đóng vai nghi binh trong khi tổ hợp Patriot đặt cách tiền tuyến khoảng 60 km khai hỏa. Phi công Nga được cho là đã nhảy dù an toàn.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ukraine-ban-roi-tiem-kich-su-35s-nga-5095240.html","significance":"Nếu được xác nhận, đây là tổn thất đáng kể với dòng tiêm kích 4++ chủ lực mà Nga chỉ sản xuất 15-20 chiếc/năm, đồng thời cho thấy chiến thuật phối hợp F-16 nghi binh và Patriot phục kích đang giúp Ukraine đe dọa cả không quân tinh nhuệ của đối phương.","image":"https://i2-vnexpress.vnecdn.net/2026/07/09/su-1783566801-8552-1783566827.png?w=1200&h=675&q=100&dpr=1&fit=crop&s=_KYhVVk-NJghCA1b4zMQpg"},{"date":"2026-07-09","category":"Ngoại giao","title":"Nga tuyên bố tiếp tục hỗ trợ quân sự cho các nước vùng Sahel","summary":"Moscow khẳng định duy trì và mở rộng hợp tác quân sự với các quốc gia vùng Sahel ở châu Phi, củng cố ảnh hưởng tại khu vực đang biến động.","sourceName":"Thế giới & Việt Nam","sourceUrl":"https://baoquocte.vn/noi-chau-phi-dang-thuc-tinh-lan-thu-hai-nga-tuyen-bo-tiep-tuc-ho-tro-quan-su-cho-cac-nuoc-vung-sahel-416229.html","significance":"Phản ánh chiến lược Nga lấp khoảng trống ảnh hưởng ở châu Phi khi phương Tây rút lui; xu hướng cạnh tranh nước lớn lan xuống Sahel, nơi các chính quyền quân sự ngả về Moscow để đổi lấy an ninh.","image":"https://baoquocte.vn/stores/news_dataimages/2026/072026/09/06/in_social/noi-chau-phi-dang-thuc-tinh-lan-thu-hai-nga-tuyen-bo-tiep-tuc-ho-tro-quan-su-cho-cac-nuoc-vung-sahel-20260709063601.jpg?randTime=1783602950"},{"date":"2026-07-09","category":"Kinh tế","title":"Saudi Arabia cân nhắc mở rộng tuyến ống dẫn dầu ra Biển Đỏ","summary":"Saudi Arabia xem xét mở rộng hệ thống ống dẫn dầu ra Biển Đỏ nhằm giảm phụ thuộc vào tuyến vận chuyển qua eo biển Hormuz đang căng thẳng.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/saudi-arabia-can-nhac-mo-rong-tuyen-ong-dan-dau-ra-bien-do-c55575690.epi","significance":"Cho thấy nỗi lo dai dẳng về an ninh tuyến hàng hải qua eo Hormuz; phản ánh xu hướng các nước vùng Vịnh tìm đường xuất khẩu thay thế để giảm rủi ro khi căng thẳng với Iran leo thang.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_09_294_55575690/5f019c2bcd60243e7d71.jpg"},{"date":"2026-07-09","category":"Kinh tế","title":"Các ngân hàng trung ương bớt mặn mà với USD, chuyển sang vàng","summary":"Nhiều ngân hàng trung ương trên thế giới giảm dự trữ USD và tăng nắm giữ vàng để phòng ngừa rủi ro địa chính trị và biến động tỷ giá.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/cac-ngan-hang-trung-uong-bot-man-ma-voi-usd-chuyen-sang-vang-c55575536.epi","significance":"Phản ánh xu hướng phi đô la hóa dự trữ và giảm niềm tin vào tài sản Mỹ giữa bất ổn địa chính trị; tín hiệu dài hạn làm suy yếu vị thế thống trị của đồng USD.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_09_5_55575536/1ae576cd2786ced89797.jpg"},{"date":"2026-07-09","category":"Kinh tế","title":"ADB hạ dự báo tăng trưởng châu Á - Thái Bình Dương 2026 xuống 4,9%","summary":"Ngân hàng Phát triển châu Á (ADB) hạ dự báo tăng trưởng khu vực châu Á - Thái Bình Dương xuống 4,9% cho năm 2026, giảm so với mức 5,5% của năm 2025.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/adb-tang-truong-cua-chau-a-va-thai-binh-duong-se-chi-con-4-9-trong-nam-2026-c55575554.epi","significance":"Cho thấy đà giảm tốc của kinh tế châu Á vì thương chiến và cầu yếu; hàm ý áp lực lên các nền kinh tế xuất khẩu trong khu vực, gồm cả Việt Nam.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_09_365_55575554/2a0a0d225c69b537ec78.jpg"},{"date":"2026-07-09","category":"Kinh tế","title":"Đại gia công nghệ Saudi Arabia chọn Hong Kong làm cửa ngõ vào châu Á","summary":"Một tập đoàn công nghệ lớn của Saudi Arabia chọn Hong Kong làm điểm đến đầu tiên tại châu Á, bày tỏ mong muốn hợp tác phát triển thành phố thông minh và lập cửa ngõ chiến lược vào khu vực.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/hong-kong/hong-kong-economy/article/3359885/saudi-arabian-tech-giant-eyes-hong-kong-asia-gateway-and-smart-city-partner","significance":"Phản ánh trục hợp tác công nghệ Vùng Vịnh–Trung Quốc đang mạnh lên, một phần để né rào cản từ Mỹ; xu hướng vốn Trung Đông tìm cửa ngõ châu Á ngoài phương Tây.","image":"https://cdn.i-scmp.com/sites/default/files/styles/og_image_scmp_generic/public/d8/images/canvas/2026/07/08/8e1bd7ea-4fc3-45e6-8219-786f052ac422_9a007079.jpg?itok=dVcvH1Ri&v=1783517196"},{"date":"2026-07-08","category":"Chính trị","title":"Đan Mạch bác đòi hỏi của ông Trump về Greenland: 'Greenland không phải để bán'","summary":"Thủ tướng Đan Mạch Mette Frederiksen bác bỏ ý tưởng của Tổng thống Trump về việc Mỹ kiểm soát Greenland, khẳng định sẵn sàng 'bảo vệ từng tấc lãnh thổ NATO'. Thủ tướng Iceland cũng lên tiếng ủng hộ quyền tự quyết của Greenland.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/dan-mach-bac-yeu-cau-cua-ong-trump-khang-dinh-greenland-khong-de-ban-185260708150439032.htm","significance":"Phản ánh rạn nứt hiếm thấy ngay trong nội bộ NATO khi một đồng minh phải công khai bảo vệ chủ quyền trước chính nước bảo trợ an ninh của mình, làm lộ căng thẳng về niềm tin chiến lược xuyên Đại Tây Dương dưới thời Trump.","image":"https://images2.thanhnien.vn/zoom/1200_630/528068263637045248/2026/7/8/ap26189206000278-1783497688172522776924-202-0-1542-2560-crop-17834977770231865605177.jpg"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Trung Quốc lần đầu phóng tên lửa đạn đạo từ tàu ngầm ra Thái Bình Dương","summary":"Trung Quốc phóng một tên lửa đạn đạo liên lục địa từ tàu ngầm (SLBM) ra vùng biển quốc tế Thái Bình Dương hôm 6/7, tầm bay khoảng 7.300 km. Đây là lần đầu Bắc Kinh công khai phô diễn năng lực răn đe hạt nhân chiến lược từ tàu ngầm ở Ấn Độ Dương - Thái Bình Dương, khiến New Zealand và Australia chỉ trích.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/toan-tinh-cua-trung-quoc-trong-vu-phong-ten-lua-ra-thai-binh-duong-100260708225312091.htm","significance":"Cuộc thử nghiệm hiếm hoi là thông điệp răn đe rõ ràng nhằm phô trương bộ ba hạt nhân của Trung Quốc, dự báo sẽ thúc đẩy các nước Ấn Độ Dương - Thái Bình Dương siết chặt liên minh an ninh và đẩy nhanh chạy đua vũ trang trong khu vực.","image":"https://cdn2.tuoitre.vn/zoom/1200_630/471584752817336320/2026/7/8/35cb4d70-27bd-40ad-9039-538466230109b71fb9a3-1783524852234932824002-76-101-603-1107-crop-1783525699786225011688.png"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Hàn Quốc đề xuất 'Đối tác công nghiệp quốc phòng NATO 2.0'","summary":"Hàn Quốc đưa ra sáng kiến 'Đối tác công nghiệp quốc phòng NATO 2.0', thúc đẩy hợp tác sản xuất vũ khí và mở rộng vai trò trong chuỗi cung ứng quốc phòng phương Tây.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/han-quoc-de-xuat-doi-tac-cong-nghiep-quoc-phong-nato-2-0-c55574217.epi","significance":"Cho thấy Hàn Quốc muốn thành mắt xích trong chuỗi cung ứng quốc phòng phương Tây; phản ánh xu hướng công nghiệp quốc phòng châu Á vươn ra thị trường NATO khi nhu cầu vũ khí tăng vọt.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_08_294_55574217/0b1a60433108d8568119.jpg"},{"date":"2026-07-08","category":"Kinh tế","title":"Tây Ban Nha đề xuất cơ chế vay chung của EU trị giá 850 tỷ euro","summary":"Tây Ban Nha đề xuất một cơ chế vay chung của EU quy mô 850 tỷ euro, bất chấp các quan điểm chia rẽ giữa các thành viên về nợ chung.","sourceName":"Thế giới & Việt Nam","sourceUrl":"https://baoquocte.vn/tay-ban-nha-de-xuat-mot-co-che-vay-chung-cua-eu-bat-chap-cac-quan-diem-chia-re-416045.html","significance":"Phản ánh sức ép buộc EU hội nhập tài khóa sâu hơn để tài trợ tái vũ trang; tái hiện chia rẽ Bắc–Nam về nợ chung, một phép thử đoàn kết của khối.","image":"https://baoquocte.vn/stores/news_dataimages/2026/072026/08/16/in_social/gettyimages-2283837438-612x61220260708160703.jpg?randTime=1783602952"},{"date":"2026-07-08","category":"Kinh tế","title":"Mối lo tài khóa khiến lợi suất trái phiếu chính phủ Nhật Bản leo thang mạnh","summary":"Lợi suất trái phiếu chính phủ Nhật Bản tăng vọt khi giới đầu tư lo ngại về gánh nặng tài khóa, gây áp lực lên chi phí vay nợ của Tokyo.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/moi-lo-tai-khoa-khien-loi-suat-trai-phieu-chinh-phu-nhat-ban-leo-thang-manh.htm","significance":"Cho thấy lo ngại về bền vững nợ công của nền kinh tế nợ nhiều nhất thế giới; rủi ro lan tỏa toàn cầu nếu dòng vốn carry-trade bằng đồng yen đảo chiều.","image":"https://premedia.vneconomy.vn/files/uploads/2026/07/08/5f1bb3d13bb648df8cc3a25106b96541-103503.png?w=1200&h=630&mode=crop"},{"date":"2026-07-08","category":"Chính trị","title":"Tòa án Pháp cho phép bà Marine Le Pen tranh cử tổng thống 2027","summary":"Thủ lĩnh cực hữu Marine Le Pen được xóa rào cản pháp lý và đủ điều kiện ra tranh cử tổng thống Pháp năm 2027, mở lại cánh cửa quyền lực cho phe Tập hợp Quốc gia.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/video/newsfeed/2026/7/8/marine-le-pen-cleared-to-run-in-frances-2027-presidential-election","significance":"Mở lại cánh cửa quyền lực cho phe cực hữu Pháp; phản ánh đà trỗi dậy của chủ nghĩa dân tộc–hoài nghi EU ở châu Âu, tác động tới tương lai hội nhập và chính sách với Ukraine.","image":"https://www.aljazeera.com/wp-content/uploads/2026/07/DNREXP-260708-TakieedineR-Marine_Le_Pen-H-1783540963.jpg?resize=1920%2C1080&quality=80"},{"date":"2026-07-08","category":"Kinh tế","title":"Chiến tranh thuế quan đẩy thương mại Brazil ngả về Trung Quốc, thị phần Mỹ thấp kỷ lục","summary":"Nửa đầu 2026, thị phần Mỹ trong xuất khẩu của Brazil rơi xuống mức thấp nhất kể từ 1997 (9,4%), trong khi Trung Quốc mở rộng vị thế đối tác thương mại số một của Brazil.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3359906/trumps-tariff-war-pushes-brazils-trade-towards-china-us-share-hits-record-low","significance":"Bằng chứng rõ thương chiến của Mỹ đang đẩy đối tác về phía Trung Quốc; phản ánh xu hướng tái định hình chuỗi thương mại toàn cầu bất lợi cho ảnh hưởng kinh tế Mỹ.","image":"https://cdn.i-scmp.com/sites/default/files/styles/og_image_scmp_generic/public/d8/images/canvas/2026/07/09/ebc0bfad-9d18-4bb4-8bba-3974396fa2a5_d2f69709.jpg?itok=tTn03BUO&v=1783549067"}],"usNews":[{"date":"2026-07-09","category":"Kinh tế","title":"Trump chuẩn bị xé bỏ 'bản ghi nhớ' với Iran nhưng Phố Wall gần như phớt lờ","summary":"Dù Tổng thống Trump tuyên bố sẵn sàng hủy MOU và tái chiến với Iran, thị trường Mỹ chỉ dao động nhẹ trong phiên 9-7, dầu hạ nhiệt sau khi có lúc vượt 80 USD/thùng.","sourceName":"Fortune","sourceUrl":"https://fortune.com/2026/07/09/trump-iran-memorandum-of-understanding-stocks/","significance":"Phản ứng dửng dưng cho thấy nhà đầu tư đang định giá xung đột vùng Vịnh là rủi ro 'có kiểm soát', miễn là eo biển Hormuz chưa bị phong tỏa hoàn toàn.","image":"https://fortune.com/img-assets/wp-content/uploads/2026/07/GettyImages-2285242769-e1783590523307.jpg?resize=1200,600"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"CENTCOM hoàn tất đợt không kích thứ hai, đánh khoảng 90 mục tiêu quân sự Iran","summary":"Bộ Tư lệnh Trung tâm Mỹ cho biết đã tấn công khoảng 90 mục tiêu gồm hệ thống phòng không, trạm giám sát ven biển, kho tên lửa - UAV và năng lực hải quân dọc bờ biển Iran, sau đợt đánh 80 mục tiêu đêm trước.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/09/latest-strikes-hit-90-military-targets-in-iran-us-military","significance":"Chiến dịch tập trung phá hủy năng lực đe dọa hàng hải của Iran ở eo Hormuz cho thấy Mỹ theo đuổi mục tiêu quân sự có giới hạn - né đánh Tehran và cơ sở hạt nhân - nhưng vẫn duy trì áp lực hỏa lực cường độ cao."},{"date":"2026-07-09","category":"Chính trị","title":"Ông Trump khẳng định Mỹ muốn ở lại NATO","summary":"Tổng thống Trump tuyên bố Mỹ muốn tiếp tục là thành viên NATO, trấn an các đồng minh sau loạt phát ngôn dọa rút quân khỏi châu Âu.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/ong-trump-khang-dinh-my-muon-o-lai-nato-c55575411.epi","significance":"Trấn an sau loạt đe dọa rút quân; phản ánh chiến thuật \"gây sức ép rồi trấn an\" của Trump nhằm buộc đồng minh tăng chi, nhưng vẫn để lại hoài nghi về độ tin cậy của cam kết Mỹ.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_09_318_55575411/eb2eff00ae4b47151e5a.jpg"},{"date":"2026-07-09","category":"Chính trị","title":"Mỹ mở cuộc điều tra quy mô lớn về nghi vấn gian lận thị thực H-1B","summary":"Chính quyền Mỹ khởi động cuộc điều tra lớn nhằm vào các nghi vấn gian lận trong chương trình thị thực lao động tay nghề cao H-1B.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/my-mo-cuoc-dieu-tra-quy-mo-lon-ve-nghi-van-gian-lan-chuong-trinh-thi-thuc-h-1b-c55575527.epi","significance":"Phản ánh việc siết chặt nhập cư lao động tay nghề cao dưới chính quyền Trump; tác động trực tiếp tới ngành công nghệ Mỹ và lao động nước ngoài, trong đó nhiều người châu Á.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_09_294_55575527/cdea57c20689efd7b698.jpg"},{"date":"2026-07-09","category":"Chính trị","title":"Mỹ: Việc rút khỏi USMCA có thể buộc Quốc hội phải hành động","summary":"Khả năng Mỹ rút khỏi hiệp định thương mại USMCA với Canada và Mexico có thể buộc Quốc hội phải vào cuộc, đặt ra rủi ro cho chuỗi cung ứng Bắc Mỹ.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/my-viec-rut-khoi-usmca-co-the-se-buoc-quoc-hoi-phai-hanh-dong-c55575158.epi","significance":"Cho thấy rủi ro lớn với chuỗi cung ứng Bắc Mỹ nếu Mỹ rút khỏi hiệp định; phản ánh xu hướng bảo hộ và bất định thương mại lan cả sang các đối tác láng giềng thân cận.","image":"https://baomoi-photo-fbcrawler.bmcdn.me/w1200_r16x9/2026_07_09_294_55575158/9685e4a9b5e25cbc05f3.jpg"},{"date":"2026-07-08","category":"Kinh tế","title":"Iran tập kích 85 căn cứ Mỹ ở vùng Vịnh, chứng khoán toàn cầu bán tháo và giá dầu vọt tăng","summary":"Iran phóng loạt tên lửa - máy bay không người lái vào 85 mục tiêu Mỹ và đồng minh ở Bahrain, Kuwait; dầu Brent tăng từ 72 lên gần 78 USD/thùng, KOSPI Hàn Quốc mất 5,35%, S&P 500 futures giảm 0,82%.","sourceName":"Fortune","sourceUrl":"https://fortune.com/2026/07/08/iran-strikes-gulf-global-selloff-stocks-oil-price/","significance":"Xung đột Mỹ - Iran bước sang tháng thứ tư đang trở thành cú sốc năng lượng và rủi ro lạm phát lớn nhất với kinh tế Mỹ, đẩy lợi suất trái phiếu 10 năm lên trên 4,5%.","image":"https://fortune.com/img-assets/wp-content/uploads/2026/07/GettyImages-2285163163.jpg?resize=1200,600"},{"date":"2026-07-08","category":"Chính trị","title":"Trump tuyên bố lệnh ngừng bắn với Iran đã 'chấm dứt', ra lệnh không kích đợt mới","summary":"Từ hội nghị NATO, ông Trump nói ngừng bắn 'đã kết thúc' sau khi Iran tấn công tàu hàng qua eo Hormuz, đồng thời tuyên bố 'không chắc muốn có một thỏa thuận' và 'cứ làm cho xong việc'.","sourceName":"TIME","sourceUrl":"https://time.com/article/2026/07/08/us-iran-ceasefire-over-trump-strikes-strait-of-hormuz/","significance":"Quyết định đảo ngược ngừng bắn phản ánh chính sách Iran mang tính cá nhân, phản ứng nhanh của ông Trump và nguy cơ Mỹ bị cuốn sâu vào một cuộc chiến kéo dài ở vùng Vịnh.","image":"https://static.time.com/v3/assets/bltea6093859af6183b/bltd844f2f6d124fff9/6a4e25ac44440d542511b0cd/trump-cease-fire-over-july8.jpg?branch=production&width=2400&quality=75&auto=webp&crop=16:9"},{"date":"2026-07-08","category":"Chính trị","title":"Trump sẽ đề nghị Tòa Tối cao xét xử lại vụ quyền công dân theo nơi sinh","summary":"Ông Trump tuyên bố sẽ xin tái thẩm phán quyết 6-3 hồi tháng trước vốn vô hiệu hóa sắc lệnh hạn chế quyền công dân theo nơi sinh của ông.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/08/trump-supreme-court-birthright-citizenship-rehearing.html","significance":"Đây là nỗ lực gần như vô vọng - Tòa Tối cao Mỹ chưa từng đồng ý tái thẩm một vụ đã tranh tụng kể từ 1965 - cho thấy ông Trump quyết đối đầu tới cùng với phán quyết về Tu chính án 14.","image":"https://image.cnbcfm.com/api/v1/image/108286059-17750578042026-04-01t145941z_323167911_rc2egkaxsh4n_rtrmadp_0_usa-court-trump-birthright.jpeg?v=1783546426&w=1920&h=1080"},{"date":"2026-07-08","category":"Chính trị","title":"Thẩm phán ra lệnh chi 5,8 triệu USD cho E. Jean Carroll, ông Trump kháng cáo","summary":"Sau khi Tòa Tối cao từ chối thụ lý, thẩm phán Lewis Kaplan yêu cầu giải ngân 5,8 triệu USD (gồm lãi) cho nhà văn Carroll; luật sư ông Trump lập tức kháng cáo nhưng bị bác đề nghị hoãn.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/trump-ordered-to-pay-e-jean-carroll-5-8m-after-failed-appeal","significance":"Việc buộc một tổng thống đương nhiệm phải bồi thường trong vụ lạm dụng - phỉ báng khép lại chuỗi kháng cáo kéo dài, tái khẳng định giới hạn pháp lý đối với ông Trump.","image":"https://www.aljazeera.com/wp-content/uploads/2026/07/reuters_6a4ea0c6-1783537862.jpg?resize=1920%2C1440"},{"date":"2026-07-08","category":"Ngoại giao","title":"NATO cam kết 70 tỷ euro cho Ukraine tại thượng đỉnh Ankara, Trump ca ngợi 'tiến triển' hòa bình","summary":"Các đồng minh NATO cam kết 70 tỷ euro (khoảng 80 tỷ USD) viện trợ quân sự cho Ukraine năm 2026 và duy trì mức tương đương năm 2027; ông Trump nói tin tưởng một thỏa thuận chấm dứt chiến tranh 'đang tới gần'.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/nato-pledges-70-billion-euros-for-ukraine-as-trump-praises-peace-progress","significance":"Việc ông Trump chuyển từ đối đầu sang phối hợp với Zelensky và cam kết gói an ninh cho thấy lập trường mềm hơn của Washington về Ukraine ngay giữa lúc dồn sức cho mặt trận Iran.","image":"https://www.aljazeera.com/wp-content/uploads/2026/07/getty_6a4e729a28-1783526042.jpg?resize=1920%2C1440"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Anduril giành hợp đồng NATO đầu tiên với nền tảng AI Lattice","summary":"Cơ quan Thông tin - Truyền thông NATO (NCIA) chọn Anduril triển khai Lattice cho sáng kiến nền tảng dữ liệu Chỉ huy - Kiểm soát trên không tăng cường (eAirC2), qua giai đoạn đánh giá 9 tháng.","sourceName":"Anduril","sourceUrl":"https://www.anduril.com/news/anduril-secures-first-nato-contract-lattice-for-eairc2-data-platform-initiative","significance":"Hợp đồng NATO đầu tiên của một startup quốc phòng Mỹ cho thấy khối này đang chuyển sang kiến trúc dữ liệu mở, kết nối hệ thống thay vì thay thế, và mở đường cho công nghệ Thung lũng Silicon vào chỉ huy tác chiến.","image":"https://cdn.sanity.io/images/61nocsj5/production/459a0b6174c1d399635d03b10260940c800ebb86-1000x183.svg?rect=326,0,349,183&w=1200&h=630&fit=min&auto=format"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump cam kết cấp phép cho Ukraine tự sản xuất tên lửa đánh chặn Patriot","summary":"Bên lề thượng đỉnh NATO, Tổng thống Trump tuyên bố Mỹ sẽ cấp 'giấy phép' để Ukraine tự chế tạo đạn đánh chặn Patriot (PAC-3) nhằm tăng năng lực phòng không trước các đợt tập kích của Nga. Giới chuyên gia cảnh báo do ràng buộc chuỗi cung ứng, dây chuyền này khó đi vào hoạt động trong ngắn hạn.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/08/ukraine-to-get-license-for-making-patriot-interceptors-trump-pledges/","significance":"Bước hỗ trợ phòng không đáng kể cho Ukraine; phản ánh xu hướng chuyển từ viện trợ trực tiếp sang trao năng lực tự sản xuất, dù còn vướng ràng buộc chuỗi cung ứng.","image":"https://www.armytimes.com/resizer/v2/5KRTYBUZOFHULNBWWUKSEF4LI4.jpeg?width=1200&auth=bb90fde2f059fd34f3ce931167944f0d68a9483ccef16d4b414f75443bf0f34a"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump nghiêng về việc gỡ trừng phạt và bán lại F-35 cho Thổ Nhĩ Kỳ","summary":"Sau cuộc gặp Tổng thống Erdogan tại Ankara, ông Trump phát tín hiệu sẽ dỡ trừng phạt và cho Thổ Nhĩ Kỳ tái gia nhập chương trình tiêm kích tàng hình F-35. Israel lo ngại động thái này làm lung lay ưu thế quân sự khu vực của mình.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/07/us-will-lift-sanctions-on-turkey-possibly-sell-f-35-fighter-jets-trump-says/","significance":"Cú đảo chiều chính sách lớn nhằm thưởng cho Erdogan; phản ánh việc Mỹ ưu tiên kéo Thổ về phía mình, nhưng làm lung lay ưu thế quân sự của Israel và trật tự khu vực.","image":"https://www.armytimes.com/resizer/v2/DXXN4XP7ZFDK3OKUWWVDJQWWFA.JPG?width=1200&auth=16697e781348b46e2a06246cb1aee811437a10ee48676e90118d36ac890807ff"},{"date":"2026-07-08","category":"Kinh tế","title":"Chính quyền Trump gỡ hạn chế với OpenAI, mở đường phát hành rộng GPT-5.6","summary":"Nhà Trắng dỡ bỏ các hạn chế đối với mô hình mới nhất của OpenAI, cho phép hãng tiến hành phát hành rộng rãi GPT-5.6 ngay trong tuần sau giai đoạn kiểm thử bổ sung. Đây là bước nới lỏng chính sách công nghệ đáng chú ý giữa lúc Mỹ siết cạnh tranh AI.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/08/openai-gpt-trump-ban-lifted","significance":"Nới lỏng chính sách công nghệ để giữ lợi thế AI của Mỹ; phản ánh xu hướng ưu tiên chạy đua AI hơn là thận trọng về quản lý rủi ro."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lầu Năm Góc tìm phương án UAV giá rẻ thay thế 'Thần Chết' MQ-9 Reaper","summary":"Bộ Quốc phòng Mỹ và Đơn vị Đổi mới Quốc phòng (DIU) khởi động tìm kiếm các mẫu drone chi phí thấp có thể đảm nhận nhiệm vụ trinh sát-tấn công của MQ-9 Reaper, vốn ngày càng đắt đỏ và dễ tổn thương trước phòng không hiện đại.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/08/pentagon-to-explore-cheaper-replacements-for-the-mq-9-reaper/","significance":"Phản ánh xu hướng Mỹ chuyển sang UAV tiêu hao, giá rẻ, số lượng lớn thay cho khí tài đắt tiền.","image":"https://www.armytimes.com/resizer/v2/Z3DSJOKNHZEUXA362MOWBOVFWQ.jpeg?width=1200&auth=41b494d4675ea7abcd8b809836b3570737f8d51608f9cf3808626395031574f0"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung hai startup vào nhóm phóng tên lửa nhỏ và vừa","summary":"Space Force chọn thêm hai công ty khởi nghiệp tham gia cạnh tranh các nhiệm vụ phóng vệ tinh cỡ nhỏ và vừa, nhằm mở rộng nguồn cung phương tiện phóng và giảm phụ thuộc vào số ít nhà thầu lớn.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/space-force-adds-two-startups-to-small-medium-launch-pool/","significance":"Đa dạng hóa nhà cung cấp phóng giúp Mỹ tăng khả năng phục hồi và tốc độ triển khai vệ tinh quân sự.","image":"https://breakingdefense.com/wp-content/uploads/sites/13/2026/07/Terran-R-Render-Horizontal-scaled.png"},{"date":"2026-07-08","category":"Kinh tế","title":"Quân đội Mỹ 'gần cạn ngân sách', Lầu Năm Góc xin thêm 67 tỷ USD","summary":"Lầu Năm Góc đề nghị bổ sung 67 tỷ USD để bù thiếu hụt do chi phí chiến dịch quân sự nhằm vào Iran leo thang, dù đã được cấp gần 900 tỷ USD cho tài khóa 2026; Bộ Quốc phòng nói không đủ tiền mua đạn và sửa chữa hạ tầng căn cứ.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/quan-doi-my-gan-can-ngan-sach-5095015.html","significance":"Cho thấy chiến dịch quân sự nhằm Iran tốn kém vượt dự toán; phản ánh áp lực ngân sách và mức độ leo thang can dự quân sự của Mỹ ở Trung Đông.","image":"https://i2-vnexpress.vnecdn.net/2026/07/08/5563187178137269150a-178349572-2205-3798-1783495831.jpg?w=1200&h=675&q=100&dpr=1&fit=crop&s=Rsqn94sTUKFbwl_nmtsGZg"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Mỹ tấn công hơn 80 mục tiêu Iran, IRGC nói bắn hạ MQ-9","summary":"Bộ Chỉ huy Trung tâm Mỹ không kích hơn 80 mục tiêu Iran gồm hệ thống phòng không và trạm radar; Vệ binh Cách mạng Hồi giáo Iran tuyên bố bắn hạ một UAV MQ-9 của Mỹ và trả đũa nhằm vào 85 mục tiêu quân sự Mỹ trong khu vực.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/my-tan-cong-hon-80-muc-tieu-iran-irgc-noi-ban-ha-mq-9-185260708103206537.htm","significance":"Cho thấy đối đầu quân sự trực diện Mỹ–Iran; phản ánh vòng xoáy ăn miếng trả miếng đe dọa an ninh hàng hải và giá dầu toàn cầu.","image":"https://images2.thanhnien.vn/zoom/1200_630/528068263637045248/2026/7/8/may-bay-my-17834821023661937464498-0-0-561-1072-crop-17834821135201197953270.png"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump dọa cắt quan hệ thương mại với Tây Ban Nha, đòi Mỹ tiếp quản Greenland tại NATO","summary":"Tại thượng đỉnh NATO ở Ankara, Tổng thống Trump chỉ trích gay gắt các đồng minh, gọi Tây Ban Nha là 'đối tác tồi tệ' vì cách hành xử trong cuộc chiến Mỹ - Israel với Iran và dọa cắt quan hệ thương mại. Ông cũng nhắc lại đòi hỏi Mỹ tiếp quản Greenland, khoét sâu chia rẽ trong khối quanh vấn đề chi tiêu quốc phòng và chiến tranh Ukraine.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/trump-threatens-spain-trade-demands-us-take-over-greenland-at-nato-summit","significance":"Phơi bày phong cách ngoại giao cưỡng ép của Trump ngay trong nội khối NATO; phản ánh căng thẳng đồng minh và tham vọng lãnh thổ gây bất an cho châu Âu.","image":"https://www.aljazeera.com/wp-content/uploads/2026/07/AFP__20260708__B9L87BP__v1__HighRes__TurkeyUsNatoSummitDefence-1783512145.jpg?resize=1920%2C1440"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"NATO công bố loạt hợp đồng vũ khí 'hàng chục tỷ USD' tại Ankara","summary":"NATO trình làng gói đầu tư quốc phòng gồm 40 tỷ USD chống UAV trong 5 năm, hơn 26 tỷ USD phòng không - phòng thủ tên lửa tích hợp và 1,6 tỷ USD năng lực tấn công, với sự tham gia của Lockheed Martin, Raytheon, Palantir, Anduril, Rheinmetall...","sourceName":"Investing.com","sourceUrl":"https://www.investing.com/news/world-news/nato-to-unveil-big-arms-deals-in-ankara-before-summit-with-trump-4778196","significance":"Màn phô diễn hỏa lực nhằm chứng minh với ông Trump rằng châu Âu đang gánh vác chi tiêu quốc phòng, đồng thời mở cánh cửa lớn cho các nhà thầu quốc phòng Mỹ tại thị trường châu Âu."}],"analyses":[{"date":"2026-07-08","region":"Toàn cầu","topic":"An ninh","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Hải tặc Somalia trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Nạn hải tặc Somalia tái bùng phát với ba tàu hàng bị cướp gần Sừng châu Phi, sau gần một thập kỷ bị dẹp yên. Bối cảnh địa chính trị đã đổi khiến các liên minh hải quân đa quốc gia kiểu 2011 khó tái lập.","takeaway":"NATO đã dồn về phòng thủ lãnh thổ, Mỹ xoay trục sang Ấn Độ Dương - Thái Bình Dương và sa lầy hậu chiến Iran, châu Âu thiếu tàu; giải pháp phải là kiến trúc an ninh khu vực làm nòng cốt, có đối tác bên ngoài hỗ trợ và xử lý gốc rễ quản trị - kinh tế trên bờ.","url":"https://warontherocks.com/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-08","region":"Trung Đông","topic":"An ninh","outlet":"War on the Rocks","author":"Allison Minor","title":"Nhìn lại mối đe dọa của Houthi với vận tải biển","summary":"Tác giả xem lại phân tích năm 2024 của chính mình về các cuộc tấn công của Houthi trên Biển Đỏ, khi sự chú ý toàn cầu chuyển sang eo biển Hormuz. Dù các đợt không kích Mỹ - Israel làm suy giảm năng lực Houthi, nhóm này vẫn là mối đe dọa dai dẳng.","takeaway":"Houthi hiện đang tái tổ chức lực lượng thay vì tấn công chủ động, nhưng vẫn nắm ảnh hưởng lên các tuyến hàng hải thương mại nhờ nguy cơ ngầm về việc nối lại chiến sự.","url":"https://warontherocks.com/a-fresh-look-at-the-houthi-threat-to-maritime-shipping/"},{"date":"2026-07-08","region":"Châu Mỹ","topic":"Xét lại hiệp định USMCA","outlet":"CSIS","author":"William Alan Reinsch","title":"Giai đoạn tiếp theo của USMCA","summary":"Chính quyền Trump đã kích hoạt cơ chế rà soát 10 năm của USMCA vào ngày 1/7, bác bỏ phương án gia hạn đơn thuần. Đàm phán nay xoay quanh lo ngại an ninh — nhất là chặn hàng Trung Quốc đi vòng qua 'cửa sau' Bắc Mỹ — cùng tranh cãi về quy tắc xuất xứ và các vấn đề ngành.","takeaway":"Bất định kéo dài sẽ ghìm đầu tư doanh nghiệp, dù cách tiếp cận chuyên nghiệp của USTR để ngỏ khả năng đạt thỏa thuận sửa đổi.","url":"https://www.csis.org/analysis/next-phase-usmca"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Cướp biển Somalia trở lại","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Cướp biển Somalia đã trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Cướp biển Somalia tái xuất với các vụ bắt tàu hàng gần đây, nhưng liên minh hải quân đa quốc gia từng dẹp yên hồi 2011 không thể tái lập vì ưu tiên địa chính trị đã đổi. Tác giả đề xuất cấu trúc lấy khu vực làm trung tâm, để lực lượng biển địa phương dẫn dắt với hỗ trợ tình báo và năng lực chuyên biệt từ bên ngoài.","takeaway":"Giải pháp bền vững đòi hỏi an ninh hàng hải do khu vực dẫn dắt, đồng thời xử lý gốc rễ là quản trị yếu kém ở Somalia.","url":"https://warontherocks.com/2026/07/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-07","region":"Đông Á","topic":"An ninh","outlet":"CSIS","author":"Joseph Rodgers, Bonny Lin, Leon Li","title":"Vụ thử tên lửa đạn đạo phóng từ tàu ngầm của Trung Quốc cho thấy cần một thỏa thuận thông báo phóng","summary":"Ngày 6/7, Trung Quốc lần đầu bắn một tên lửa đạn đạo phóng từ tàu ngầm ra vùng biển quốc tế ở Thái Bình Dương, bay khoảng 7.300 km và có thể bay qua Philippines. Ba chuyên gia CSIS phân tích ý nghĩa chiến lược và rủi ro từ việc thiếu quy trình thông báo.","takeaway":"Vụ thử lần đầu phô diễn năng lực răn đe hạt nhân từ tàu ngầm của Bắc Kinh ngay tại Ấn Độ Dương - Thái Bình Dương; tác giả kêu gọi Trung Quốc tham gia Bộ Quy tắc Hague để tránh tính toán sai, giữa lúc kho đầu đạn tăng từ 200 lên hơn 600 trong sáu năm.","url":"https://www.csis.org/analysis/chinas-slbm-test-underscores-importance-ballistic-missile-launch-notification-agreement"},{"date":"2026-07-07","region":"Châu Âu/NATO","topic":"Dư luận Nga và chiến tranh Ukraine","outlet":"CSIS","author":"Maria Snegovaya & Jade McGlynn","title":"Thái độ người Nga đang đổi khi hệ quả chiến tranh về đến nhà","summary":"Các đợt tập kích bằng drone của Ukraine vào hạ tầng năng lượng Nga đang đưa hệ quả kinh tế của cuộc chiến đến tận người dân qua thiếu nhiên liệu và gián đoạn dịch vụ. Tác giả nhận định cú sốc kinh tế đời thường có sức bào mòn ủng hộ chiến tranh mạnh hơn các cú sốc quân sự đơn thuần.","takeaway":"Phương Tây nên phối hợp trừng phạt và truyền thông để gắn khó khăn trong nước Nga với lựa chọn gây chiến của Kremlin.","url":"https://www.csis.org/analysis/russian-attitudes-are-shifting-wars-effects-come-home"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Tự chủ quốc phòng châu Âu","outlet":"CSIS","author":"Max Bergmann & Otto Svendsen","title":"Hãy biến Thượng đỉnh Ankara thành chuyện tự chủ quốc phòng châu Âu","summary":"Các tác giả kêu gọi thành viên châu Âu của NATO dùng thượng đỉnh Ankara để chuẩn bị cho kịch bản Mỹ giảm hậu thuẫn, bằng kế hoạch cụ thể cho phòng thủ lục địa tự chủ. Việc Mỹ cạn nguồn lực, dồn sang Trung Quốc khiến tự lực của châu Âu là tất yếu.","takeaway":"Châu Âu cần lộ trình chuyển giao gánh nặng có thời hạn rõ, tăng tốc công nghiệp quốc phòng và cải tổ hợp tác NATO-EU.","url":"https://www.csis.org/analysis/make-ankara-summit-about-european-defense-autonomy"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Chiến tranh Nga - Ukraine","outlet":"Institute for the Study of War (ISW)","author":"Christina Harward, Jennie Olmsted, Tetiana Trach, Anna Thacker, Karolina Hird","title":"Đánh giá chiến dịch tấn công của Nga, ngày 6/7/2026","summary":"ISW ghi nhận Nga vừa thực hiện đợt tập kích tên lửa - drone quy mô lớn thứ tư kể từ 1/6, phóng tổng cộng 419 quả nhắm chủ yếu vào Kyiv, gây hàng chục thương vong dân thường. Nga khai thác việc Ukraine cạn kho đạn đánh chặn bằng cách dồn tên lửa đạn đạo trong mỗi gói tấn công. Đợt đánh diễn ra ngay trước thượng đỉnh NATO (7-8/7) nhằm phô trương sức ép. Đáp lại, Ukraine tập kích nhà máy lọc dầu lớn nhất của Nga ở Omsk, cách biên giới hơn 2.500 km.","takeaway":"Nga leo thang tập kích chiến lược và khiêu khích NATO để tạo áp lực trước thềm thượng đỉnh, trong khi Ukraine chứng minh năng lực đánh sâu chưa từng có.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-6-2026"},{"date":"2026-07-06","region":"Trung Đông","topic":"Hành lang thương mại - năng lượng","outlet":"Atlantic Council","author":"Allison Minor","title":"Các hành lang mới ở Trung Đông không chỉ để né eo biển Hormuz","summary":"Minor phân tích làn sóng dự án hạ tầng đường sắt, đường ống và logistics trên bộ đang nổi lên khắp Trung Đông sau những gián đoạn ở eo biển Hormuz. Saudi Arabia, UAE và Oman mở rộng mạng lưới đường sắt và trung tâm trung chuyển, trong khi Hành lang Ấn Độ - Trung Đông - châu Âu (IMEC) cần tái cấu trúc theo cách tiếp cận 'mạng lưới' thay vì một tuyến đơn lẻ. Thành công đòi hỏi tích hợp hải quan số, hài hòa quy định và cam kết chính trị bền vững, thậm chí mở ra một 'hành lang điện toán'.","takeaway":"Các hành lang này vượt xa mục tiêu né chốt chặn hàng hải, mở ra cơ hội đa dạng hóa kinh tế và hội nhập khu vực nếu có quản trị đủ mạnh.","url":"https://www.atlanticcouncil.org/blogs/menasource/new-middle-east-corridors-are-about-more-than-just-bypassing-the-strait-of-hormuz/"},{"date":"2026-07-06","region":"Đông Á","topic":"Trật tự toàn cầu - Trung Quốc","outlet":"The Diplomat","author":"","title":"Thời cơ để Trung Quốc định hình trật tự toàn cầu mới","summary":"Bài phân tích cho rằng chuyến thăm Bắc Kinh giữa tháng 5 của Tổng thống Mỹ Donald Trump đã bộc lộ một động lực mới trong quan hệ Mỹ - Trung, khi Bắc Kinh thể hiện vai trò chủ động hơn trong việc định hình quan hệ song phương. Theo tác giả, chuỗi tiếp xúc ngoại giao gần đây đưa Trung Quốc vào trung tâm sân khấu thế giới và củng cố năng lực định hình trật tự quốc tế, thay vì chỉ tuyên bố tham vọng. Bắc Kinh đang chuyển từ thế phòng thủ sang chủ động dẫn dắt chương trình nghị sự khu vực và toàn cầu.","takeaway":"Trung Quốc đang tận dụng thế chủ động ngoại giao mới để chuyển từ tuyên bố tham vọng sang thực sự định hình trật tự quốc tế.","url":"https://thediplomat.com/2026/07/chinas-moment-to-shape-a-new-global-order/"},{"date":"2026-07-03","region":"Châu Âu/NATO","topic":"Chiến lược quân Mỹ ở châu Âu","outlet":"War on the Rocks","author":"Benjamin H. Friedman & Moritz S. Graefrath","title":"Sai lầm và bị hiểu lầm: Cách tiếp cận của Trump với quân Mỹ tại châu Âu","summary":"Hai tác giả cho rằng sai lầm của chính quyền Trump không nằm ở việc dọa rút quân, mà ở chỗ không thực sự rút — thay vào đó theo đuổi 'bá quyền phi tự do', đổi sự hiện diện quân sự lấy các cam kết tăng chi tiêu mơ hồ của châu Âu.","takeaway":"Mỹ nên rút quân khỏi châu Âu theo lộ trình có kiểm soát vì mối đe dọa Nga hạn chế, thay vì mặc cả nửa vời.","url":"https://warontherocks.com/2026/07/misguided-and-misunderstood-trumps-approach-to-u-s-troops-in-europe/"},{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"An ninh","outlet":"Atlantic Council","author":"Ian Brzezinski, Philippe Dickinson","title":"Châu Âu nên đặt cược dài hạn vào Mỹ và quan hệ an ninh xuyên Đại Tây Dương","summary":"Bất chấp căng thẳng thời 'NATO 3.0' của Trump vốn đẩy trách nhiệm quốc phòng sang châu Âu, bài viết lập luận châu Âu nên duy trì cam kết dài hạn với quan hệ xuyên Đại Tây Dương. Lý do: sự ủng hộ của công chúng và Quốc hội Mỹ dành cho NATO vẫn vững.","takeaway":"Thái độ hoài nghi của chính quyền Trump không phản ánh tâm lý chung của người Mỹ (68% ủng hộ NATO, 76% ủng hộ đáp trả quân sự khi đồng minh bị tấn công); châu Âu nên chứng minh đóng góp quốc phòng tại Ankara và tránh những bước đi thúc đẩy Mỹ rút lui không thể đảo ngược.","url":"https://www.atlanticcouncil.org/dispatches/europe-should-take-the-long-bet-on-the-us-and-the-transatlantic-security-relationship/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân đội Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Giới phân tích phương Tây đang gặp lỗ hổng nghiêm trọng khi hiểu chiến lược quân sự Trung Quốc do văn bản học thuyết lỗi thời và việc PLA siết chặt nguồn thông tin. Sự thiếu hụt này buộc hoạch định chính sách phải dựa vào suy đoán.","takeaway":"Nên khôi phục một dịch vụ dịch thuật công khai kiểu FBIS qua Thư viện Quốc hội để có tư liệu quân sự Trung Quốc chuẩn xác.","url":"https://warontherocks.com/2026/07/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Mỹ","topic":"Thương mại Bắc Mỹ","outlet":"CSIS","author":"Diego Marroquín Bitar, Kellie Meiman Hock, Eric Miller, Juan Carlos Baker, William Alan Reinsch","title":"Mỹ chọn không gia hạn Hiệp định USMCA","summary":"Ngày 1/7/2026, Mỹ từ chối gia hạn USMCA thêm 16 năm, thay vào đó kích hoạt cơ chế rà soát hằng năm kéo dài đến 2036; hiệp định vẫn duy trì theo điều khoản hiện hành nhưng không có lộ trình đàm phán rõ ràng. Năm chuyên gia CSIS cảnh báo quyết định này tạo ra bất định kéo dài cho chuỗi cung ứng và đầu tư khắp Bắc Mỹ. Quan hệ Mỹ - Canada xuống mức thấp lịch sử; các vấn đề gỗ, sữa, quy tắc xuất xứ ô tô và vai trò kinh tế Trung Quốc vẫn treo lơ lửng.","takeaway":"Thay vì đổ vỡ, USMCA bước vào giai đoạn xói mòn chậm và bất định thường niên, gây rủi ro cho đầu tư và chuỗi cung ứng Bắc Mỹ.","url":"https://www.csis.org/analysis/united-states-has-opted-not-extend-usmca"},{"date":"2026-07-02","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Hợp tác quốc phòng - công nghiệp","outlet":"The Diplomat","author":"","title":"Chiến lược Ấn Độ Dương - Thái Bình Dương của Ý xoay trục sang hợp đồng quốc phòng","summary":"Bài viết chỉ ra Ý đang lặng lẽ tăng cường hiện diện ở khu vực thông qua hợp tác quân sự - công nghiệp thay vì ngoại giao truyền thống. Bộ trưởng Quốc phòng Guido Crosetto dự Đối thoại Shangri-La ở Singapore chỉ là một mảnh của bức tranh lớn: Rome mở rộng hợp tác quốc phòng với Malaysia và Quốc hội duyệt chuyển giao tàu sân bay hết niên hạn Giuseppe Garibaldi cho Indonesia. Khác Pháp, Ý không có hiện diện quân sự thường trực nên ảnh hưởng phụ thuộc vào triển khai hải quân, hợp tác công nghiệp và trao đổi quân sự dài hạn.","takeaway":"Ý tái nhập cuộc chơi Ấn Độ Dương - Thái Bình Dương bằng con đường hợp đồng quốc phòng và công nghiệp, tận dụng nhu cầu hiện đại hóa hải quân của Đông Nam Á.","url":"https://thediplomat.com/2026/07/italys-indo-pacific-strategy-turns-toward-defense-contracts/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chiến dịch Nga tại Ukraine","outlet":"Institute for the Study of War (ISW)","author":"","title":"Đánh giá chiến dịch tấn công của Nga, ngày 2 tháng 7 năm 2026","summary":"ISW ghi nhận Nga tiến hành đợt tập kích quy mô lớn bằng 570 drone và tên lửa vào Kyiv đêm 1-2/7, khiến ít nhất 27 người chết và 91 người bị thương, trong đó phòng không Ukraine đánh chặn khoảng 476 quả. Nga đang triển khai drone động cơ phản lực nhanh hơn và đổi tần số (3.900-4.100 MHz) khiến việc đánh chặn khó hơn nhiều, trong khi trên các mặt trận Kharkiv, Donetsk và Zaporizhia lực lượng Nga tiếp tục tấn công nhưng không tiến được.","takeaway":"Chiến dịch hè-thu 2026 của Nga vẫn bế tắc về lãnh thổ, đổi lại bằng tổn thất lớn và chiến thuật tập kích drone-tên lửa ngày càng gây hại cho dân thường.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-2-2026"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chính trị","outlet":"The Nation","author":"Stephen Crowley","title":"Trước thềm thượng đỉnh NATO, châu Âu tái vũ trang chống một 'nước Nga bóng ma'?","summary":"Nhiều nước châu Âu đang tăng chi quân sự mạnh dựa trên giả định Nga có thể tấn công NATO trong vài năm tới, trong khi kinh tế Nga trì trệ vì chiến tranh Ukraine và Điện Kremlin chật vật huy động dân chúng. Tác giả cho rằng thổi phồng mối đe dọa Nga làm chệch nguồn lực khỏi nhu cầu xã hội và khí hậu.","takeaway":"Hiểm họa thực sự với châu Âu đến từ bên trong - khó khăn kinh tế và bất mãn xã hội bị khoét sâu bởi chi tiêu quốc phòng - hơn là từ một cuộc tấn công quân sự của Nga.","url":"https://www.thenation.com/article/world/europe-russia-nato-rearmament-putin-military-spending-far-right-ukraine-war-analysis/"}],"xNews":[{"date":"2026-07-08","handle":"@EU_ISS","name":"EU Institute for Security Studies","title":"Phân tích: Tổng thống Erdogan nổi lên là bên hưởng lợi chính trị lớn nhất từ thượng đỉnh NATO tại Ankara.","url":"https://x.com/EU_ISS/status/2074778368210268419","summary":"Giới phân tích cho rằng việc đăng cai thượng đỉnh NATO tại Ankara giúp Tổng thống Erdogan củng cố vị thế cả trong nước lẫn trên trường quốc tế.","significance":"Phản ánh cách nước chủ nhà tận dụng sự kiện đa phương cho lợi ích chính trị; cho thấy Thổ Nhĩ Kỳ đang nâng vai trò cầu nối trong NATO."},{"date":"2026-07-08","handle":"@Reuters","name":"Reuters","title":"Reuters: 'Ủy ban Hòa bình' do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm ở Gaza.","url":"https://x.com/Reuters/status/2074932816211591392","summary":"Reuters đưa tin một \"Ủy ban Hòa bình\" do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm tại Gaza.","significance":"Phản ánh nỗ lực Mỹ định hình giai đoạn hậu xung đột ở Gaza; xu hướng quản trị vùng lãnh thổ bằng cơ chế do bên ngoài dẫn dắt, tiềm ẩn tranh cãi chủ quyền."},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Cơ quan thực thi pháp luật Ukraine khám xét hãng drone hàng đầu Vyriy Industries, làm dấy lên lo ngại siết chặt ngành công nghệ quốc phòng.","url":"https://x.com/KyivIndependent/status/2074623512027832799","summary":"Cơ quan thực thi pháp luật Ukraine khám xét Vyriy Industries, một nhà sản xuất drone hàng đầu, gây lo ngại trong ngành.","significance":"Cho thấy căng thẳng giữa nhu cầu giám sát và việc bảo vệ ngành công nghệ quốc phòng non trẻ; rủi ro làm nản lòng doanh nghiệp quốc phòng thời chiến."},{"date":"2026-07-07","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky ký thỏa thuận hợp tác sản xuất drone với Đan Mạch — thỏa thuận thứ chín thuộc mô hình liên kết quốc phòng của Ukraine.","url":"https://x.com/ZelenskyyUa/status/2074543396996161846","summary":"Tổng thống Zelensky ký thỏa thuận sản xuất drone chung với Đan Mạch — thỏa thuận thứ chín theo mô hình liên kết quốc phòng của Ukraine.","significance":"Phản ánh chiến lược Ukraine \"nội địa hóa + hợp tác\" để tự chủ vũ khí; xu hướng châu Âu gắn công nghiệp quốc phòng với Kyiv thay cho viện trợ đơn thuần."},{"date":"2026-07-07","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Iran tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz.","url":"https://x.com/TheStudyofWar/status/2074608031799652776","summary":"ISW đánh giá Iran đang tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz cho tàu bè.","significance":"Cho thấy Hormuz là đòn bẩy chiến lược của Iran; phản ánh nguy cơ gián đoạn nguồn cung dầu và leo thang xung đột hàng hải."},{"date":"2026-07-07","handle":"@MarketWatch","name":"MarketWatch","title":"Giá dầu thô tăng khi Mỹ mở các đợt không kích nhằm vào Iran.","url":"https://x.com/MarketWatch/status/2074618951120584923","summary":"Giá dầu thô đi lên sau khi Mỹ mở các đợt không kích nhằm vào Iran.","significance":"Phản ánh mức độ nhạy cảm của thị trường năng lượng với xung đột Trung Đông; xu hướng rủi ro địa chính trị định giá dầu mạnh hơn cung–cầu."},{"date":"2026-07-07","handle":"@Rory_Johnston","name":"Rory Johnston","title":"Mỹ thu hồi quyền miễn trừ trừng phạt dầu mỏ với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","url":"https://x.com/Rory_Johnston/status/2074568070908002448","summary":"Mỹ thu hồi các quyền miễn trừ trừng phạt dầu mỏ đối với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","significance":"Cho thấy Washington siết tối đa sức ép kinh tế lên Tehran; phản ánh việc dùng trừng phạt dầu mỏ như vũ khí trong đối đầu leo thang."},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Ước tính tổn thất chiến đấu của Nga tính đến ngày 7/7 theo số liệu của Lực lượng Vũ trang Ukraine.","url":"https://x.com/KyivIndependent/status/2074386662059024384","summary":"Bộ Tổng tham mưu Ukraine công bố ước tính tổn thất chiến đấu của Nga tính đến ngày 7/7.","significance":"Là số liệu một chiều cần thận trọng, nhưng phản ánh cường độ tiêu hao khốc liệt của cuộc chiến; công cụ tuyên truyền–tâm lý của cả hai bên."},{"date":"2026-07-07","handle":"@AJEnglish","name":"Al Jazeera English","title":"Hamas tuyên bố giải thể bộ máy dân sự cầm quyền ở Gaza sau gần 20 năm điều hành.","url":"https://x.com/AJEnglish/status/2074337860874912044","summary":"Hamas tuyên bố giải thể bộ máy hành chính cầm quyền ở Gaza sau gần 20 năm điều hành.","significance":"Bước ngoặt có thể mở đường cho một cơ chế quản trị mới ở Gaza; phản ánh sức ép buộc Hamas nhượng bộ và cục diện hậu chiến đang định hình."},{"date":"2026-07-07","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky nêu ưu tiên tại thượng đỉnh NATO Ankara: có thêm phòng không và củng cố vị thế ngoại giao cho Ukraine.","url":"https://x.com/ZelenskyyUa/status/2074565135969009718","summary":"Tổng thống Zelensky nêu ưu tiên tại thượng đỉnh NATO Ankara: bổ sung phòng không và củng cố vị thế ngoại giao cho Ukraine.","significance":"Phản ánh nhu cầu cấp bách của Kyiv trước các đợt tập kích của Nga; cho thấy Ukraine tận dụng diễn đàn NATO để giữ hậu thuẫn phương Tây."},{"date":"2026-07-07","handle":"@usf_army","name":"Ukraine Unmanned Systems Forces","title":"Đêm 6/7, lực lượng Ukraine tập kích 47 mục tiêu hậu phương Nga: phá 2 bệ phóng S-400, 2 tàu chở dầu 'hạm đội bóng tối' ở Biển Azov, đánh kho dầu Kerch.","url":"https://x.com/usf_army/status/2074099025750479261","summary":"Lực lượng Ukraine tập kích 47 mục tiêu hậu phương Nga trong đêm 6/7: phá 2 bệ phóng S-400, đánh 2 tàu chở dầu \"hạm đội bóng tối\" ở Biển Azov function glossary(){return (DATA.terms&&DATA.terms.length)?DATA.terms:TERMS;}
function explainTerm(t){var n=norm(t);if(!n)return null;var g=glossary();var hit=g.find(function(e){var tn=norm(e.term);return tn&&(tn===n||n.indexOf(tn)>=0||(tn.length>=5&&tn.indexOf(n)>=0));});return hit?hit.explain:null;}
function conceptList(){return jget('dt.concepts');}
function addConcept(t){t=(t||'').trim().replace(/\s+/g,' ');if(t.length<2)return;if(t.length>90)t=t.slice(0,90);var a=conceptList();var n=norm(t);if(a.some(function(x){return norm(x)===n;})){toast('Khái niệm đã có trong sổ tay');return;}a.unshift(t);if(a.length>200)a=a.slice(0,200);jset('dt.concepts',a);toast('Đã lưu khái niệm: '+t);}
function removeConcept(t){jset('dt.concepts',conceptList().filter(function(x){return x!==t;}));}

function dateBar(arr,cur,attr){
  var ds=[];arr.forEach(function(a){if(a.date&&ds.indexOf(a.date)<0)ds.push(a.date);});

  var o='<option value="Tất cả"'+(cur==='Tất cả'?' selected':'')+'>Tất cả ngày</option>';
  ds.forEach(function(d){o+='<option value="'+esc(d)+'"'+(cur===d?' selected':'')+'>'+fmtVN(d)+'</option>';});
  return '<div class="filterbar"><span>📅 Lọc ngày</span><select class="dsel" '+attr+'>'+o+'</select></div>';
}

function catFilters(arr){

  if(rs.length){var ord=REGIONS.map(function(x){return x[0];});rs.sort(function(a,b){return ord.indexOf(a)-ord.indexOf(b);});
    var o='<option value="Tất cả"'+(state.wregion==='Tất cả'?' selected':'')+'>Mọi khu vực</option>';
    rs.forEach(function(r){o+='<option value="'+esc(r)+'"'+(state.wregion===r?' selected':'')+'>'+esc(r)+' ('+arr.filter(function(a){return regionOf(a)===r;}).length+')</option>';});

  exs.sort(function(a,b){return (ord[a.status]==null?9:ord[a.status])-(ord[b.status]==null?9:ord[b.status]);});
  var chips='<div class="chips"><span class="chip'+(state.dip==='Tất cả'?' on':'')+'" data-dip="Tất cả">Tất cả ('+exs.length+')</span>';
  exs.forEach(function(e){var col=e.status==='ongoing'?'#c0392b':(e.status==='upcoming'?'#2b5f9e':'#1f8a54');chips+='<span class="chip'+(state.dip===e.name?' on':'')+'" data-dip="'+esc(e.name)+'"><i class="dot" style="background:'+col+'"></i>'+esc(e.name.split('(')[0].trim())+'</span>';});
  chips+='</div>';
  var shown=exs.filter(function(e){return state.dip==='Tất cả'||e.name===state.dip;});
  var body=shown.length?shown.map(function(ex){
    var items=sortD(ex.items||[]).filter(matchQ);
    var cards=items.length?items.map(function(a){return card(drillCardInner(a,'Liên quan sự kiện'),idOf(a));}).join(''):'<div class="empty" style="padding:16px">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin liên quan.')+'</div>';
    return '<section class="drill">'+drillHeader(ex)+'<div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">Chưa có sự kiện nào.</div>';
  return '<div class="note">Các <b>sự kiện ngoại giao</b> (thượng đỉnh, hội nghị, đàm phán…) — mỗi mục gom tin liên quan kèm <b>nhận xét</b> tin đó liên quan sự kiện thế nào.</div>'+chips+body;
}
function renderDossiers(){
  var pool=newsPool().filter(matchQ);
  var groups={},order=[];
  pool.forEach(function(a){var r=regionOf(a);if(!groups[r]){groups[r]=[];order.push(r);}groups[r].push(a);});
  order.sort(function(a,b){if(a==='Khác')return 1;if(b==='Khác')return -1;return groups[b].length-groups[a].length;});
  var chips='<div class="chips"><span class="chip'+(state.dossier==='Tất cả'?' on':'')+'" data-dossier="Tất cả">Tất cả ('+order.length+')</span>';
  order.forEach(function(r){chips+='<span class="chip'+(state.dossier===r?' on':'')+'" data-dossier="'+esc(r)+'">'+esc(r)+' ('+groups[r].length+')</span>';});
  chips+='</div>';
  var shown=order.filter(function(r){return state.dossier==='Tất cả'||r===state.dossier;});
  var body=shown.length?shown.map(function(r){
    var a2=groups[r];var ds=a2.map(function(a){return a.date;}).filter(Boolean).slice().sort();
    var range=ds.length?(fmtVN(ds[0])+(ds[ds.length-1]!==ds[0]?' – '+fmtVN(ds[ds.length-1]):'')):'';
    var cards=a2.map(function(a){return card(newsCardInner(a),idOf(a));}).join('');
    return '<section class="drill"><div class="drill-h"><div class="drill-name">'+esc(r)+'</div><div class="drill-meta">📰 '+a2.length+' tin'+(range?' · '+range:'')+'</div></div><div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">'+(state.q?'Không có hồ sơ khớp tìm kiếm.':'Chưa có hồ sơ.')+'</div>';
  return '<div class="note">Gom tin <b>Thế giới + Mỹ</b> theo <b>khu vực/chủ đề</b> — mỗi hồ sơ là một câu chuyện đang chạy (suy ra tự động từ nội dung). Sắp theo độ "nóng".</div>'+chips+body;
}
function renderTopic(){
  var segs=[['drills','🎯 Tập trận'],['dip','🕊️ Ngoại giao'],['dossier','🧵 Hồ sơ']];
  var seg='<div class="seg">'+segs.map(function(s){return '<button class="'+(state.topicSeg===s[0]?'on':'')+'" data-topicseg="'+s[0]+'">'+s[1]+'</button>';}).join('')+'</div>';
  var view=state.topicSeg==='dip'?renderDipEvents():(state.topicSeg==='dossier'?renderDossiers():renderExercises());
  return seg+view;
}
function content(){
  if(state.tab==='us')return renderCatNews(DATA.usNews,'<div class="note">Tin <b>yếu tố Mỹ</b> nổi bật trong <b>24 giờ qua</b> (giờ Mỹ) — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
  if(state.tab==='x')return renderX();
  if(state.tab==='analysis')return renderAnalysis();
  if(state.tab==='topic')return renderTopic();
  if(state.tab==='saved')return renderSaved();
  return renderCatNews(DATA.worldNews,'<div class="note">Tin <b>thế giới</b> nổi bật trong <b>24 giờ qua</b> — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
}
function render(){
  refreshFav();
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thế giới'],['us',USFLAG+'Mỹ'],['x',XLOGO+'X'],['topic','🗂️ Chuyên đề'],['analysis','🧠 Phân tích'],['saved','⭐ Đã lưu'+(FAV.length?' ('+FAV.length+')':'')]];
  var h='<div class="wrap">';
  h+='<div class="mast"><div class="kicker">Bản tin độc lập</div><h1>'+esc(DATA.brand)+'</h1><div class="tag">'+esc(DATA.tagline)+'</div></div>';
  h+='<div class="dateline"><span>Cập nhật '+stamp+'</span><span>Tổng hợp từ nguồn mở</span></div>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<button class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</nav>';
  h+='<div class="toolbar"><div class="search"><span aria-hidden="true">🔍</span><input id="q" type="search" autocomplete="off" placeholder="Tìm trong bản tin…" value="'+esc(state.q)+'">'+(state.q?'<button class="sx" data-sx="1" title="Xoá tìm kiếm">✕</button>':'')+'</div></div>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">'+esc(DATA.brand)+' — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Mỗi tin đều dẫn liên kết nguồn gốc. Không đại diện quan điểm của bất kỳ tổ chức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  if(window.scrollTo)window.scrollTo(0,0);
}
function reContent(){var c=document.getElementById('content');if(c)c.innerHTML=content();}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg],[data-xhandle],[data-drill],[data-dip],[data-dossier],[data-topicseg],[data-savedseg],[data-caddbtn],[data-crm],[data-fav],[data-share],[data-copy],[data-sx],[data-mark]'):null;if(!t)return;
  if(t.getAttribute('data-caddbtn')!=null){var ci=document.getElementById('cnew');if(ci){addConcept(ci.value);ci.value='';reContent();}return;}
  if(t.getAttribute('data-crm')!=null){removeConcept(t.getAttribute('data-crm'));reContent();return;}
  if(t.getAttribute('data-savedseg')!=null){state.savedSeg=t.getAttribute('data-savedseg');render();return;}
  if(t.getAttribute('data-export')!=null){exportWord();return;}
  if(t.getAttribute('data-share')!=null){doShare(t.getAttribute('data-url'),t.getAttribute('data-title'));return;}
  if(t.getAttribute('data-copy')!=null){doCopy(t.getAttribute('data-url'));return;}
  if(t.getAttribute('data-mark')!=null){markRead(t.getAttribute('data-mark'));setTimeout(reContent,250);return;}
  if(t.getAttribute('data-sx')!=null){state.q='';render();return;}
  if(t.getAttribute('data-fav')!=null){toggleFav(t.getAttribute('data-fav'));render();return;}
  if(t.getAttribute('data-topicseg')!=null){state.topicSeg=t.getAttribute('data-topicseg');state.drill='Tất cả';state.dip='Tất cả';state.dossier='Tất cả';render();return;}
  if(t.getAttribute('data-tab')){state.tab=t.getAttribute('data-tab');state.wcat='Tất cả';state.wdate='Tất cả';state.wregion='Tất cả';state.xhandle='Tất cả';state.xdate='Tất cả';state.drill='Tất cả';state.dip='Tất cả';state.dossier='Tất cả';}
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  else if(t.getAttribute('data-xhandle'))state.xhandle=t.getAttribute('data-xhandle');
  else if(t.getAttribute('data-drill')!=null)state.drill=t.getAttribute('data-drill');
  else if(t.getAttribute('data-dip')!=null)state.dip=t.getAttribute('data-dip');
  else if(t.getAttribute('data-dossier')!=null)state.dossier=t.getAttribute('data-dossier');
  render();
});
document.addEventListener('input',function(e){
  if(e.target&&e.target.id==='q'){var had=!!state.q;state.q=e.target.value;if((!had)!==(!state.q)){render();var el=document.getElementById('q');if(el){el.focus();var v=el.value;el.value='';el.value=v;}}else{reContent();}}
});
document.addEventListener('change',function(e){
  var s=e.target;if(!s||!s.getAttribute)return;
  if(s.getAttribute('data-wdate')!=null){state.wdate=s.value;render();}
  else if(s.getAttribute('data-wregion')!=null){state.wregion=s.value;render();}
  else if(s.getAttribute('data-adate')!=null){state.adate=s.value;render();}
  else if(s.getAttribute('data-xdate')!=null){state.xdate=s.value;render();}
});
refreshRead();
var _firstRun=false;try{_firstRun=localStorage.getItem('dt.seen')==null;}catch(e){}
initSeen();commitSeen();if(_firstRun)initSeen();
applyTheme(curTheme());
ensureReaderUI();
render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
/* ==== Bôi đen chữ trong tin → nút "Lưu khái niệm" ==== */
function cFab(){var f=document.getElementById('concept-fab');if(!f){f=document.createElement('button');f.id='concept-fab';f.type='button';f.textContent='★ Lưu khái niệm';document.body.appendChild(f);
  f.addEventListener('mousedown',function(e){e.preventDefault();});
  f.addEventListener('click',function(e){e.stopPropagation();addConcept(f._t||'');f.style.display='none';var s=window.getSelection&&window.getSelection();if(s)s.removeAllRanges();if(state.tab==='saved'&&state.savedSeg==='concepts')reContent();});}
  return f;}
function onSel(){
  var f=document.getElementById('concept-fab');
  var s=window.getSelection?window.getSelection():null;
  var txt=s&&s.rangeCount?(''+s).trim():'';
  var node=s&&s.anchorNode; node=node&&node.nodeType===3?node.parentNode:node;
  var host=node&&node.closest?node.closest('.sum,.take,.title,.relate,.drill-sum,.cexp'):null;
  if(host&&host.closest('.cexp'))host=null; // đừng lưu từ chính phần giải thích
  if(txt&&txt.length>=2&&txt.length<=90&&host){
    f=cFab();f._t=txt;
    var r=s.getRangeAt(0).getBoundingClientRect();
    var x=Math.max(8,Math.min(r.left,window.innerWidth-150)),y=r.top-42;
    if(y<6)y=r.bottom+8;
    f.style.left=x+'px';f.style.top=y+'px';f.style.display='block';
  }else if(f){f.style.display='none';}
}
document.addEventListener('mouseup',function(){setTimeout(onSel,10);});
document.addEventListener('touchend',function(){setTimeout(onSel,10);});
window.addEventListener('scroll',function(){var f=document.getElementById('concept-fab');if(f&&f.style.display==='block')f.style.display='none';});
</script>
