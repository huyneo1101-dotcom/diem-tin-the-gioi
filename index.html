iến lược đa tầng nhằm cô lập cả hệ thống kiểm soát xã hội lẫn cỗ máy chiến tranh của Moscow.","region":"Châu Âu/NATO"},{"date":"2026-07-14","category":"Kinh tế","title":"Xuất nhập khẩu Trung Quốc tăng vọt tháng 6, xuất khẩu chip tăng hơn gấp đôi nhờ bùng nổ AI","summary":"Hải quan Trung Quốc (GACC) công bố xuất khẩu tháng 6 đạt 412,4 tỷ USD, tăng 27% so với cùng kỳ — mạnh nhất 4 tháng; nhập khẩu tăng 36%; thặng dư thương mại 125,6 tỷ USD. Xuất khẩu chip bán dẫn tăng hơn gấp đôi, thiết bị xử lý dữ liệu tăng 53,1%, phản ánh nhu cầu phần cứng AI toàn cầu và làn sóng đẩy nhanh giao hàng tránh nguy cơ Mỹ tăng thuế.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/14/china-june-trade-data-exports-imports.html","significance":"Chuỗi cung ứng bán dẫn Trung Quốc tiếp tục mở rộng bất chấp kiểm soát xuất khẩu của Mỹ, củng cố lo ngại của BIS/CSIS ChinaPower về khả năng phục hồi công nghiệp công nghệ cao và mất cân đối cung-cầu nội địa khi tiêu dùng vẫn yếu.","region":"Đông Á"},{"date":"2026-07-13","category":"Kinh tế","title":"Nvidia siết danh sách khách hàng châu Á, lập 'whitelist' chặn chip AI lọt sang Trung Quốc","summary":"Nvidia loại hơn một nửa khách hàng châu Á (chủ yếu nhà cung cấp neo-cloud) từng được phép mua chip AI, sau khi siết thẩm định tại Singapore, Malaysia và Nhật Bản — cử nhân viên kiểm tra trung tâm dữ liệu, hợp đồng và phỏng vấn người dùng cuối để xác nhận chip không chuyển tiếp sang Trung Quốc. Động thái diễn ra sau áp lực từ Washington và loạt vụ truy tố buôn lậu chip hàng tỷ USD.","sourceName":"Reuters","sourceUrl":"https://finance.yahoo.com/technology/ai/articles/nvidia-halves-asia-buyer-list-033140201.html","significance":"Thắt chặt tự nguyện của Nvidia cho thấy áp lực thực thi kiểm soát xuất khẩu bán dẫn của Mỹ lan sang cấp doanh nghiệp — bước bịt lỗ hổng chuyển chip AI cho Trung Quốc qua nước thứ ba mà CSET/CSIS từng cảnh báo.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-13","category":"Ngoại giao","title":"Thổ Nhĩ Kỳ - Ai Cập ký ghi nhớ hợp tác quốc phòng tại Ankara","summary":"Bộ trưởng Quốc phòng Thổ Nhĩ Kỳ Yaşar Güler và người đồng cấp Ai Cập Ashraf Salem Zaher ký biên bản ghi nhớ (MoU) hợp tác quốc phòng cùng thư bày tỏ ý định (LoI) về hợp tác công nghiệp quốc phòng tại Ankara ngày 13/7, tiếp nối Hiệp định khung quân sự hai nước ký tháng 2/2026 nhân chuyến thăm Cairo của Tổng thống Erdogan.","sourceName":"Daily Sabah","sourceUrl":"https://www.dailysabah.com/politics/diplomacy/turkiye-egypt-sign-defense-cooperation-mou","significance":"Đánh dấu giai đoạn mới trong bình thường hoá quan hệ Ankara - Cairo sau nhiều năm căng thẳng, mở đường hợp tác công nghiệp quốc phòng song phương giữa hai cường quốc quân sự Đông Địa Trung Hải.","region":"Trung Đông"},{"date":"2026-07-13","category":"Chính trị","title":"EU và Anh lần đầu áp lệnh trừng phạt chung nhắm vào mạng lưới tấn công mạng của Nga","summary":"EU trừng phạt 9 cá nhân và 4 tổ chức, Anh bổ sung 24 cái tên vào danh sách đen, cùng nhắm vào các nhân vật liên quan cơ quan an ninh FSB và tình báo quân đội GRU của Nga vì các chiến dịch tấn công mạng và hoạt động lai (hybrid) phá hoại tại châu Âu, trong đó có vụ tấn công lưới điện Ba Lan được quy cho đơn vị Centre 16 của FSB. Đây là gói trừng phạt mạng chung đầu tiên giữa EU và Anh kể từ Brexit.","sourceName":"GOV.UK","sourceUrl":"https://www.gov.uk/government/news/uk-and-eu-strike-russian-cyber-networks-with-new-sanctions","significance":"Đánh dấu bước thể chế hoá hợp tác an ninh mạng Anh-EU hậu Brexit, cho thấy xu hướng phối hợp trừng phạt xuyên châu Âu ngày càng chặt để đối phó chiến tranh lai của Nga thay vì hành động rời rạc.","region":"Châu Âu/NATO"},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Anh trao hợp đồng đầu tiên ở châu Âu cho tên lửa đánh chặn drone giá rẻ","summary":"Bộ Quốc phòng Anh trao 3,16 triệu bảng cho ba công ty Frankenberg Technologies, Greenjets và Cambridge Aerospace để phát triển và thử nghiệm các hệ thống đánh chặn giá rẻ (low-cost air defence effectors) chống drone, trở thành nước đầu tiên trong 5 nước châu Âu trao hợp đồng theo chương trình chung nhằm đối phó tấn công drone/tên lửa quy mô lớn.","sourceName":"GOV.UK","sourceUrl":"https://www.gov.uk/government/news/uk-leads-europe-with-contracts-for-low-cost-air-defence-systems","significance":"Phản ánh xu hướng châu Âu chuyển sang giải pháp phòng không chi phí thấp để đối phó drone giá rẻ sản xuất hàng loạt, bài toán cân bằng chi phí-hiệu quả mà các viện phân tích như RUSI đang theo dõi sát.","region":"Châu Âu/NATO"},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Canada dùng radar vượt đường chân trời của Úc để lấp khoảng trống giám sát Bắc Cực","summary":"Canada triển khai chương trình Radar Vượt Đường Chân Trời Bắc Cực (Arctic Over-The-Horizon Radar, A-OTHR) trị giá 1,75 tỷ USD dựa trên công nghệ Úc; BAE Systems Australia bắt đầu công việc, hướng tới đạt năng lực vận hành ban đầu cuối năm 2029 nhằm tăng cường giám sát NORAD từ biên giới Canada-Mỹ lên Bắc Cực.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/13/canada-to-plug-surveillance-gaps-with-aussie-over-the-horizon-radar/","significance":"Thương vụ radar lớn nhất trong lịch sử xuất khẩu quốc phòng Úc, cho thấy ưu tiên chiến lược ngày càng tăng của các đồng minh Ngũ Nhãn với giám sát Bắc Cực trước hiện diện quân sự Nga-Trung mở rộng.","region":"Châu Mỹ"},{"date":"2026-07-13","category":"Chính trị","title":"EU họp Hội đồng Đối ngoại, dự kiến thông qua gói trừng phạt Nga thứ 21","summary":"Hội đồng Đối ngoại EU họp tại Brussels ngày 13/7, dự kiến thông qua gói trừng phạt thứ 21 nhắm vào năng lượng, ngân hàng và vận tải biển của Nga, cùng các biện pháp liên quan hoạt động hỗn hợp và tấn công mạng của Nga tại châu Âu.","sourceName":"Council of the European Union","sourceUrl":"https://www.consilium.europa.eu/en/meetings/fac/2026/07/13/","significance":"Gói trừng phạt thứ 21 tiếp tục siết nguồn thu năng lượng và ngân hàng Nga, nhưng bị làm nhẹ do bất đồng nội bộ — cho thấy giới hạn đồng thuận 27 nước trong duy trì áp lực lên Moscow.","region":"Châu Âu/NATO"},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"EU và MBDA ký thỏa thuận phát triển tên lửa đánh chặn siêu vượt âm AQUILA trong dự án HYDIS","summary":"Ủy ban châu Âu và MBDA ký thỏa thuận tài trợ khởi động giai đoạn khái niệm 3 năm cho dự án HYDIS - hệ thống đánh chặn phòng thủ siêu vượt âm châu Âu, sau khi concept AQUILA được Pháp, Đức, Ý và Hà Lan lựa chọn. AQUILA kế thừa công nghệ từ họ tên lửa Aster của MBDA, thiết kế triển khai cả trên bộ lẫn trên hạm.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/eu-signs-grant-for-mbda-led-hydis-hypersonic-interceptor-project","significance":"Đánh dấu bước tiến của châu Âu hướng tới tự chủ năng lực phòng thủ trước tên lửa siêu vượt âm, giảm phụ thuộc vào hệ thống của Mỹ.","region":"Châu Âu/NATO"},{"date":"2026-07-11","category":"Ngoại giao","title":"Algeria và Mali khôi phục quan hệ ngoại giao sau hơn một năm rạn nứt","summary":"Tổng thống Algeria Abdelmadjid Tebboune ngày 11/7 thông báo đại sứ nước này sẽ trở lại Bamako sau khi bị triệu hồi từ tháng 4/2025; một ngày trước đó Algiers đã mở lại hoàn toàn không phận cho máy bay dân sự và quân sự đi/đến Mali, và Mali xác nhận có biện pháp đáp lại tương ứng. Rạn nứt bắt nguồn từ việc Algeria bắn hạ một drone của Mali.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/11/algeria-and-mali-restore-diplomatic-ties-following-yearlong-rift","significance":"Cho thấy các nước Sahel dưới chính quyền quân sự vẫn cần duy trì kênh ngoại giao thực dụng với láng giềng Bắc Phi bất chấp căng thẳng an ninh kéo dài."},{"date":"2026-07-10","category":"Kinh tế","title":"Giá dầu hướng tới tuần tăng khi rủi ro nguồn cung từ Trung Đông vẫn hiện hữu","summary":"Dầu Brent quanh 76,6 USD/thùng và WTI quanh 72,4 USD/thùng, hướng tới mức tăng theo tuần 5-6% sau khi Iran và Mỹ tái diễn các cuộc tấn công quân sự trong tuần, trì hoãn việc mở lại hoàn toàn Eo biển Hormuz. UAE đã nâng sản lượng lên mức kỷ lục để bù đắp rủi ro nguồn cung.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/10/oil-edges-lower-but-heads-for-weekly-gain-as-middle-east-supply-risks-persist.html","significance":"Nguy cơ gián đoạn qua Eo biển Hormuz tiếp tục đẩy giá dầu và rủi ro lạm phát toàn cầu lên cao.","region":"Trung Đông"},{"date":"2026-07-10","category":"Ngoại giao","title":"EU ra tuyên bố cảnh báo bạo lực leo thang tại El Obeid, Sudan","summary":"Đại diện Cấp cao EU ra tuyên bố ngày 10/7 bày tỏ quan ngại sâu sắc trước việc lực lượng RSF tăng cường quân sự đe dọa thành phố El Obeid, nơi trú ẩn của khoảng 500.000 dân thường bao gồm 100.000 người di tản. EU kêu gọi RSF chấm dứt ngay các hoạt động quân sự gây nguy hiểm cho dân thường.","sourceName":"Hội đồng châu Âu","sourceUrl":"https://www.consilium.europa.eu/en/press/press-releases/2026/07/10/sudan-statement-by-the-high-representative-on-behalf-of-the-eu-on-the-escalating-violence-in-el-obeid/","significance":"EU tiếp tục gây sức ép ngoại giao nhằm bảo vệ dân thường trong nội chiến Sudan.","region":"Toàn cầu"},{"date":"2026-07-09","category":"Ngoại giao","title":"Thái tử Saudi Arabia và Thủ tướng Canada bàn hợp tác song phương tại Jeddah","summary":"Thái tử kiêm Thủ tướng Saudi Arabia Mohammed bin Salman tiếp Thủ tướng Canada Mark Carney tại Jeddah ngày 9/7 - chuyến thăm đầu tiên của một Thủ tướng Canada tới Saudi Arabia sau 26 năm. Hai bên ký 13 thỏa thuận thương mại trị giá hơn 1 tỷ USD trong y tế, khai khoáng, hạ tầng và quốc phòng.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/saudi-arabia/2026/07/09/mbs-canada-s-carney-discuss-regional-developments-bilateral-ties-in-jeddah","significance":"Đánh dấu bước nâng cấp quan hệ Canada - Saudi Arabia sau nhiều năm trầm lắng.","region":"Trung Đông"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Hải quân Hoàng gia Anh thử thả tàu không người lái từ máy bay vận tải A400M","summary":"Kraken Technology Group và Capewell, được Hải quân Hoàng gia Anh hỗ trợ trong khuôn khổ Project Beehive, thực hiện thành công lần thả đầu tiên trên thế giới một tàu mặt nước không người lái (USV) từ máy bay vận tải A400M. Tàu K3 SCOUT được thả 4 lần từ độ cao 1.300 feet xuống vùng biển sóng cấp 4.","sourceName":"Royal Navy","sourceUrl":"https://www.royalnavy.mod.uk/news/2026/july/08/20260708-uncrewed-vessels-airdropped-in-pioneering-trial-supported-by-royal-navy","significance":"Mở ra năng lực mới đưa tàu không người lái vào vùng biển khó tiếp cận mà không cần tàu mẹ hay hạ tầng cảng.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Viện nghiên cứu Pháp-Đức ISL thử bắn tự do ngoài trời đầu tiên với súng ray điện từ","summary":"Viện nghiên cứu Saint-Louis (ISL, liên doanh Pháp-Đức) thực hiện thành công cuộc thử nghiệm bắn tự do ngoài trời đầu tiên với súng ray điện từ (railgun) tự phát triển tại trường bắn Baldersheim. Hệ thống đạt tốc độ đầu nòng hơn 2.000 m/s, đánh dấu bước chuyển từ phòng thí nghiệm sang thử nghiệm thực địa.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/isl-european-electromagnetic-railgun-free-flight-test/","significance":"Công nghệ súng ray điện từ được châu Âu xem là hướng đối phó vũ khí siêu thanh với chi phí thấp hơn tên lửa đánh chặn.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Công ty Đan Mạch J.A. Solutions ra mắt hệ thống triển khai tự động cho tàu không người lái","summary":"J.A. Solutions A/S (Đan Mạch) giới thiệu hệ thống triển khai tự động cho tàu mặt nước không người lái (USV), thử nghiệm trên tàu Orca USV. Hệ thống có hai cấu hình: thả bè cứu sinh cho tìm kiếm cứu nạn, và khung module đa năng mang thủy lôi, drone hoặc cảm biến tùy nhiệm vụ.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/j-a-solutions-introduces-automatic-deployment-system-for-usvs-and-surface-vessels/","significance":"Phản ánh xu hướng châu Âu phát triển hạ tầng module hóa để mở rộng vai trò tác chiến của tàu không người lái.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Ngoại giao","title":"LHQ cảnh báo nguy cơ leo thang sau các cuộc tấn công mới ở Eo biển Hormuz","summary":"Tổng thư ký LHQ Guterres gọi việc Mỹ-Iran nối lại tấn công và phản công trong 24 giờ qua là \"đáng báo động\", cảnh báo nguy cơ phá vỡ tiến trình ngoại giao đạt được từ khuôn khổ ngừng bắn tháng 4. Vận tải biển qua Eo biển Hormuz gần như tê liệt, khoảng 6.000 thủy thủ đoàn mắc kẹt trên hàng trăm tàu.","sourceName":"Liên Hợp Quốc","sourceUrl":"https://news.un.org/en/story/2026/07/1167898","significance":"Nguy cơ chiến sự Mỹ-Iran toàn diện trở lại đe dọa an ninh năng lượng và kinh tế toàn cầu.","region":"Trung Đông"},{"date":"2026-07-08","category":"Kinh tế","title":"Anh và Canada ra tuyên bố chung về tài trợ quốc phòng đa phương","summary":"Thủ tướng Anh Keir Starmer và Thủ tướng Canada Mark Carney ra tuyên bố chung tại Ankara bên lề Thượng đỉnh NATO, ủng hộ các sáng kiến tài trợ quốc phòng đa phương như Ngân hàng An ninh - Quốc phòng - Phục hồi (DSRB) và Cơ chế Quốc phòng Đa phương (MDM), nhằm cải thiện đầu tư vào chuỗi cung ứng công nghiệp quốc phòng.","sourceName":"Chính phủ Anh","sourceUrl":"https://www.gov.uk/government/news/joint-statement-from-prime-minister-starmer-and-prime-minister-carney-of-canada-on-defence-financing-8-july-2026","significance":"Cho thấy xu hướng các đồng minh phương Tây tìm cơ chế tài chính mới để mở rộng năng lực công nghiệp quốc phòng ngoài ngân sách truyền thống.","region":"Châu Âu/NATO"},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Anh đầu tư 2 tỷ bảng xây phòng thí nghiệm AI huấn luyện quân đội","summary":"Bộ Quốc phòng Anh công bố hợp đồng 2 tỷ bảng kéo dài 15 năm với liên danh do Raytheon UK dẫn đầu (Omnia Training) để xây \"Combat Laboratory\" ứng dụng AI, phân tích dữ liệu và mô phỏng, huấn luyện 60.000 binh sĩ mỗi năm. Dự án nằm trong Kế hoạch Đầu tư Quốc phòng 298 tỷ bảng của Anh.","sourceName":"Bộ Quốc phòng Anh","sourceUrl":"https://www.gov.uk/government/news/ai-battle-lab-to-prepare-british-army-for-modern-warfare","significance":"Phản ánh xu hướng quân đội phương Tây đẩy mạnh ứng dụng AI vào huấn luyện tác chiến sau kinh nghiệm chiến trường Ukraine.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Kinh tế","title":"World Bank duyệt 890 triệu USD hỗ trợ điện mặt trời áp mái Ấn Độ","summary":"Ban Giám đốc điều hành World Bank phê duyệt gói tài trợ 890 triệu USD cho chương trình PM Surya Ghar của Ấn Độ, đồng thời sẽ huy động thêm 4,2 tỷ USD vốn tư nhân. Chương trình hướng tới lắp điện mặt trời áp mái cho 10 triệu hộ gia đình, tạo khoảng 1,7 triệu việc làm.","sourceName":"World Bank","sourceUrl":"https://www.worldbank.org/en/news/press-release/2026/07/09/world-bank-supports-india-s-solar-rooftop-program-to-boost-clean-energy-create-jobs-and-unlock-private-capital","significance":"Một trong những khoản tài trợ khí hậu lớn nhất của World Bank cho Ấn Độ, thúc đẩy chuyển dịch năng lượng sạch quy mô lớn.","region":"Ấn Độ Dương - Thái Bình Dương"},{"date":"2026-07-09","category":"Kinh tế","title":"Giá vàng thế giới bật tăng trở lại giữa căng thẳng Trung Đông","summary":"Giá vàng giao ngay tăng 1,2% lên 4.124,8 USD/oz trong phiên 9/7 nhờ lực bắt đáy mạnh sau khi rơi xuống dưới 4.050 USD/oz, mức thấp nhất một tuần. Giá bạc cũng tăng 2,9% lên 60,1 USD/oz, trong bối cảnh căng thẳng Mỹ-Iran leo thang và giới đầu tư chờ tín hiệu chính sách lãi suất từ Fed.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/luc-bat-day-dua-gia-vang-bat-tang-tro-lai.htm","significance":"Biến động giá vàng phản ánh tâm lý phòng ngừa rủi ro của nhà đầu tư toàn cầu trước bất ổn địa chính trị và chính sách tiền tệ Mỹ.","region":"Toàn cầu"},{"date":"2026-07-10","category":"Kinh tế","title":"Nhu cầu nội địa ảm đạm, Trung Quốc đẩy mạnh xuất khẩu ô tô","summary":"Doanh số ô tô trong nước Trung Quốc giảm 21% trong nửa đầu năm do trợ cấp xe điện kết thúc và kinh tế giảm tốc, trong khi xuất khẩu ô tô tăng vọt 65,3% cùng kỳ. Các hãng như Chery, Great Wall, BYD đang đẩy mạnh bán hàng ra nước ngoài để bù đắp sụt giảm nhu cầu trong nước.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/nhu-cau-trong-nuoc-am-dam-trung-quoc-day-manh-xuat-khau-o-to.htm","significance":"Cho thấy sự phụ thuộc ngày càng lớn của ngành công nghiệp ô tô Trung Quốc vào thị trường xuất khẩu giữa lúc tiêu dùng nội địa suy yếu.","region":"Đông Á"},{"date":"2026-07-10","category":"Kinh tế","title":"SK Hynix huy động 26,5 tỷ USD trong đợt niêm yết kỷ lục tại Mỹ","summary":"Hãng chip nhớ Hàn Quốc SK Hynix chính thức chào sàn Nasdaq với giá 149 USD/ADR, huy động khoảng 26,5 tỷ USD — thương vụ niêm yết tại Mỹ lớn nhất từ trước đến nay của một doanh nghiệp nước ngoài, vượt qua Alibaba năm 2014. Vốn hóa công ty đã vượt 1.000 tỷ USD nhờ giá cổ phiếu tăng hơn 200% từ đầu năm.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/sk-hynix-tu-bo-vuc-pha-san-den-doanh-nghiep-von-hoa-nghin-ty-usd-niem-yet-tren-nasdaq.htm","significance":"Đánh dấu bước ngoặt cho làn sóng niêm yết của các hãng chip châu Á tại Mỹ giữa cơn sốt đầu tư AI toàn cầu.","region":"Đông Á"},{"date":"2026-07-09","category":"Chính trị","title":"Palestine ấn định bầu cử lập pháp đầu tiên sau 20 năm vào 28/11","summary":"Tổng thống Palestine Mahmoud Abbas ký sắc lệnh ấn định ngày 28/11/2026 tổ chức bầu cử lập pháp — cuộc bầu cử đầu tiên kể từ năm 2006, khi Hamas giành chiến thắng trước đảng Fatah của ông Abbas. Quyết định được đưa ra trong bối cảnh nỗ lực cải cách chính trị Palestine thời hậu chiến Gaza.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/09/palestinian-legislative-vote-set-for-nov-28-presidential-decree","significance":"Cuộc bầu cử đầu tiên sau 20 năm có thể định hình lại cục diện chính trị nội bộ Palestine thời hậu chiến.","region":"Trung Đông"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"NATO chọn mua tới 10 máy bay giám sát Saab GlobalEye thay thế phi đội E-3 AWACS","summary":"Tổng thư ký NATO Mark Rutte thông báo liên minh gồm Bỉ, Canada, Đan Mạch, Đức, Hà Lan, Latvia, Litva, Luxembourg, Na Uy, Romania và Thụy Điển đã chọn máy bay GlobalEye của Saab (khung Bombardier Global 6500, radar Erieye Extended Range) để thay thế phi đội E-3 Sentry từ năm 1982. NATO sẽ bắt đầu đàm phán chính thức với Saab, dự kiến máy bay hoạt động vào năm 2035.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/nato-to-acquire-up-to-10-saab-globaleye-for-e-3-replacement-says-secretary-general/","significance":"Quyết định hiện đại hóa lớn nhất về năng lực cảnh báo sớm trên không của NATO trong nhiều thập kỷ, đánh bật Boeing E-7 khỏi cuộc đua.","region":"Châu Âu/NATO"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Anh và Hà Lan ký thỏa thuận 2,4 tỷ bảng đóng tàu đổ bộ thế hệ mới","summary":"Thủ tướng Anh Keir Starmer và Thủ tướng Hà Lan Rob Jetten ký thỏa thuận bên lề hội nghị thượng đỉnh NATO tại Ankara, đóng 8 tàu đổ bộ 15.000 tấn theo thiết kế Hà Lan, mỗi nước vận hành 4 chiếc. Tàu dài 160m, tối ưu cho tác chiến hybrid với drone, có sàn đáp phục vụ hệ thống không người lái tầm xa.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/uk-netherlands-new-amphibious-ships-deal-2026/","significance":"Củng cố năng lực đổ bộ chung Anh-Hà Lan trong NATO, đánh dấu bước chuyển của Hải quân Hoàng gia Anh sang mô hình 'hybrid Navy' tích hợp drone.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Ngoại giao","title":"Mỹ xác nhận Lebanon-Israel bước vào giai đoạn tiếp theo của thỏa thuận giải giáp Hezbollah","summary":"Mỹ cho biết Lebanon và Israel đã bước vào giai đoạn tiếp theo của khung thỏa thuận giải giáp Hezbollah, với việc Israel chuẩn bị rút quân khỏi các \"khu vực thí điểm\" ở miền nam Lebanon để quân đội Lebanon tiếp quản an ninh. CENTCOM đang phối hợp với cả hai bên để triển khai giai đoạn thí điểm này trong những ngày tới.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/09/us-says-lebanon-israel-enter-next-phase-of-hezbollah-disarmament-deal","significance":"Bước tiến cụ thể đầu tiên trong việc thực thi khung thỏa thuận Israel-Lebanon do Mỹ làm trung gian.","region":"Trung Đông"},{"date":"2026-07-09","category":"Chính trị","title":"Trung Quốc tăng áp lực ngoại giao chống Philippines trước kỷ niệm phán quyết Biển Đông","summary":"Nhân Dân Nhật Báo, cơ quan chính thức của Đảng Cộng sản Trung Quốc, gia nhập chiến dịch truyền thông chống Philippines trước kỷ niệm 10 năm phán quyết trọng tài Biển Đông 2016 mà Bắc Kinh bác bỏ. Báo gọi phán quyết là \"lực lượng gây mất ổn định\" và yêu cầu Manila chuyển sang đàm phán trực tiếp.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3360164/peoples-daily-joins-beijing-blitz-against-philippines-over-2016-south-china-sea-ruling","significance":"Chiến lược truyền thông của Trung Quốc trước một kỷ niệm nhạy cảm trong tranh chấp Biển Đông.","region":"Đông Á"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Đức trở thành địa điểm sản xuất tên lửa ATACMS đầu tiên ngoài Mỹ","summary":"Lockheed Martin và Rheinmetall ký thỏa thuận hợp tác sản xuất tên lửa ATACMS tại nhà máy Rheinmetall ở Unterlüß, Đức — lần đầu tiên ATACMS được sản xuất ngoài lãnh thổ Mỹ, tạo một trung tâm cung ứng cho NATO và các lực lượng đồng minh.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/07/germany-set-to-become-first-international-site-for-atacms-missile-production/","significance":"Nâng cao khả năng sản xuất vũ khí chiến lược cho NATO thông qua hợp tác quốc tế.","region":"Châu Âu/NATO"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"8 nước NATO ra mắt sáng kiến chòm vệ tinh HALO","summary":"8 nước NATO (Đan Mạch, Canada, Phần Lan, Đức, Na Uy, Hà Lan, Thụy Điển, Thổ Nhĩ Kỳ) ra mắt sáng kiến HALO nhằm liên kết các vệ tinh quân sự quốc gia thành một mạng lưới thống nhất, nâng cao khả năng liên lạc tốc độ cao, tình báo và theo dõi tên lửa.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/space/2026/07/07/eight-nato-allies-launch-halo-satellite-constellation-initiative/","significance":"Tăng cường khả năng không gian quân sự của NATO thông qua hợp tác vệ tinh đa quốc gia.","region":"Toàn cầu"},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Rheinmetall, MBDA phát triển vũ khí laser cho hải quân Đức","summary":"Rheinmetall và MBDA Deutschland ký hợp đồng phát triển hệ thống vũ khí laser hướng năng lượng cho Hải quân Đức, giá trị hàng trăm triệu euro, dự kiến hoạt động năm 2029 với công suất mở rộng từ 20kW lên trên 100kW.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/10/rheinmetall-mbda-to-develop-laser-weapon-for-german-navy/","significance":"Đẩy mạnh phát triển công nghệ vũ khí hướng năng lượng tại châu Âu.","region":"Châu Âu/NATO"},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Nhà sản xuất robot mặt đất của Ukraine tăng gấp đôi sản lượng, tìm đối tác nước ngoài","summary":"Một nhà sản xuất phương tiện mặt đất không người lái (UGV) của Ukraine lên kế hoạch tăng gấp đôi sản lượng trong năm nay và đang đàm phán với các đối tác Pháp cùng một số nước châu Âu để mở dây chuyền ở nước ngoài.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/09/ukrainian-ground-robot-maker-doubles-production-eyes-ventures-with-foreign-partners/","significance":"Cho thấy ngành công nghiệp quốc phòng thời chiến của Ukraine trưởng thành nhanh và bắt đầu vươn ra thị trường châu Âu."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Anh muốn lập quỹ chung NATO 50 tỷ USD cho sáng kiến tấn công tầm xa","summary":"Anh đề xuất huy động tới 50 tỷ USD từ quỹ chung NATO cho một sáng kiến vũ khí tấn công tầm xa mới, nhằm tăng năng lực răn đe của châu Âu giữa lúc Mỹ phát tín hiệu giảm cam kết.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/09/uk-eyes-50-billion-in-pooled-nato-funds-for-new-long-range-strike-initiative/","significance":"Phản ánh nỗ lực của châu Âu tự chủ hơn về năng lực tấn công tầm xa, giảm phụ thuộc vào Mỹ khi Washington đòi chia sẻ gánh nặng."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Chiến thuật UAV của Ukraine gây thiệt hại lớn bên trong lãnh thổ Nga","summary":"Theo CNBC, các đòn tập kích bằng thiết bị bay không người lái (UAV) của Ukraine đang gây thiệt hại đáng kể sâu trong lãnh thổ Nga, buộc Moscow điều chỉnh bố trí phòng thủ và tác động tới tính toán của NATO.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/09/ukraine-drone-strikes-russia-nato.html","significance":"Cho thấy UAV giá rẻ đang định hình lại chiến tranh hiện đại, xóa mờ lợi thế chiều sâu chiến lược của các cường quốc."},{"date":"2026-07-09","category":"Kinh tế","title":"Kenya hạ dự báo tăng trưởng kinh tế xuống 4,3%","summary":"Kenya hạ dự báo tăng trưởng kinh tế năm nay xuống còn 4,3%, phản ánh áp lực từ gánh nặng nợ, chi phí vay cao và môi trường bên ngoài bất lợi.","sourceName":"Africanews","sourceUrl":"https://www.africanews.com/2026/07/09/kenya-growth-forecast-lowered-to-43/","significance":"Cho thấy các nền kinh tế lớn Đông Phi vẫn chật vật vì nợ công cao và điều kiện tài chính toàn cầu thắt chặt."},{"date":"2026-07-09","category":"Chính trị","title":"Italy trục xuất 2 nhân viên Đại sứ quán Nga vì cáo buộc gián điệp","summary":"Chính phủ Italy trục xuất hai nhân viên Đại sứ quán Nga với cáo buộc hoạt động gián điệp. Đây là diễn biến mới trong loạt căng thẳng tình báo giữa Nga và các nước châu Âu.","sourceName":"The Moscow Times","sourceUrl":"https://www.themoscowtimes.com/2026/07/09/italy-expels-2-russian-embassy-employees-for-spying-a93208","significance":"Phản ánh làn sóng trục xuất nhà ngoại giao Nga vì nghi vấn gián điệp vẫn tiếp diễn ở châu Âu, giữa quan hệ Nga–EU đóng băng."},{"date":"2026-07-09","category":"Chính trị","title":"Đoàn xe chở lính đánh thuê Nga bị tập kích ở Mali","summary":"Theo các nguồn tin, một đoàn xe chở các tay súng Nga (được cho là thuộc lực lượng bán quân sự) đã bị tấn công tại Mali. Vụ việc nối dài chuỗi bất ổn an ninh ở vùng Sahel nơi Nga mở rộng hiện diện quân sự.","sourceName":"The Straits Times","sourceUrl":"https://www.straitstimes.com/world/europe/convoy-carrying-russian-fighters-attacked-in-mali-sources-say","significance":"Cho thấy rủi ro ngày càng lớn với lực lượng Nga khi thế chân Pháp ở Sahel, giữa lúc các nhóm nổi dậy thánh chiến gia tăng hoạt động."},{"date":"2026-07-09","category":"Ngoại giao","title":"Tổ chức Cấm Vũ khí Hóa học (OPCW) khôi phục quyền bỏ phiếu cho Syria","summary":"OPCW khôi phục quyền bỏ phiếu của Syria sau nhiều năm đình chỉ, viện dẫn tiến bộ của Damascus trong tuân thủ công ước cấm vũ khí hóa học. Động thái diễn ra khi chính quyền Syria mới nỗ lực tái hòa nhập quốc tế.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/9/chemical-weapons-watchdog-restores-syrias-voting-rights-citing-progress","significance":"Phản ánh tiến trình Syria từng bước thoát cô lập ngoại giao thời hậu Assad, khi phương Tây dần công nhận ban lãnh đạo mới ở Damascus."},{"date":"2026-07-09","category":"Chính trị","title":"Iran tập kích trả đũa loạt căn cứ Mỹ ở Vùng Vịnh, Jordan chặn 8 tên lửa","summary":"Iran tuyên bố tấn công đáp trả nhằm vào các căn cứ Mỹ tại Kuwait (tổ hợp Patriot), Bahrain (\"trụ sở Hạm đội 5\") và một địa điểm quân sự ở Qatar, sau các đợt không kích của Mỹ. Jordan cho biết đã đánh chặn 8 tên lửa Iran bay qua không phận.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/iran-tan-cong-4-can-cu-my-ra-tuyen-bo-moi-ve-eo-bien-hormuz-185260709105914602.htm","significance":"Iran chọn đánh vào hạ tầng quân sự Mỹ thay vì mục tiêu dân sự, cho thấy Tehran vừa muốn thể hiện năng lực đáp trả vừa cố kiểm soát mức leo thang; việc tên lửa bay qua Jordan kéo thêm các nước thứ ba vào vòng nguy hiểm."},{"date":"2026-07-09","category":"Chính trị","title":"Iran an táng cố Lãnh tụ tối cao Khamenei, chuyển dịch quyền lực sang giới quân sự","summary":"Linh cữu cố Lãnh tụ tối cao Iran Ali Khamenei được đưa về an táng tại thành phố Mashhad, khép lại tang lễ quy mô lớn kéo dài nhiều ngày. Giới phân tích nhận định Iran đang chuyển từ mô hình \"thần quyền\" sang một ban lãnh đạo mang màu sắc quân sự - dân tộc chủ nghĩa.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/the-gioi/video-linh-cuu-co-lanh-tu-toi-cao-iran-ali-khamenei-duoc-cho-bang-may-bay-voi-tiem-kich-ho-tong-100260709183829036.htm","significance":"Cái chết của nhân vật cầm quyền tối cao suốt hơn ba thập kỷ mở ra giai đoạn chuyển giao bất định; nếu quyền lực nghiêng về Vệ binh Cách mạng, chính sách đối ngoại Iran có thể trở nên cứng rắn và khó đoán hơn."},{"date":"2026-07-09","category":"Kinh tế","title":"Nga cấm hoàn toàn xuất khẩu dầu diesel để bình ổn thị trường nội địa","summary":"Chính phủ Nga mở rộng thành lệnh cấm hoàn toàn xuất khẩu dầu diesel nhằm bù đắp thiếu hụt nguồn cung trong nước sau các đợt tập kích tầm xa của Ukraine vào cơ sở lọc dầu. Tổng thống Putin nói khó khăn chỉ mang tính tạm thời.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/nga-cam-hoan-toan-xuat-khau-dau-diesel.htm","significance":"Lệnh cấm cho thấy chiến dịch UAV của Ukraine đang gây sức ép thực sự lên hệ thống năng lượng Nga; siết xuất khẩu diesel có thể làm căng thêm nguồn cung nhiên liệu toàn cầu trong lúc giá dầu đã leo thang vì Trung Đông."},{"date":"2026-07-09","category":"Kinh tế","title":"ADB hạ dự báo tăng trưởng châu Á vì chiến tranh Mỹ - Iran kéo dài","summary":"Ngân hàng Phát triển châu Á (ADB) hạ dự báo tăng trưởng khu vực, cảnh báo cuộc chiến Mỹ - Iran kéo dài hơn dự kiến có thể để lại những \"vết sẹo dai dẳng\" trên thị trường năng lượng và chuỗi cung ứng.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/adb-ha-du-bao-tang-truong-kinh-te-chau-a.htm","significance":"Việc một định chế phát triển lớn hạ triển vọng phản ánh rủi ro địa chính trị Trung Đông đang lan sang các nền kinh tế châu Á phụ thuộc nhập khẩu năng lượng, trong đó có Việt Nam."},{"date":"2026-07-09","category":"Kinh tế","title":"IMF cảnh báo căng thẳng Trung Đông đẩy cao áp lực lạm phát toàn cầu","summary":"Quỹ Tiền tệ Quốc tế (IMF) cảnh báo xung đột quân sự tại Trung Đông có nguy cơ tái diễn sẽ khuếch đại rủi ro lạm phát đối với kinh tế thế giới, chủ yếu qua kênh giá năng lượng và gián đoạn vận tải biển.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/imf-cang-thang-o-trung-dong-se-day-cao-ap-luc-lam-phat-toan-cau.htm","significance":"Cảnh báo của IMF cho thấy các ngân hàng trung ương có thể buộc phải trì hoãn hạ lãi suất, giữ chi phí vốn ở mức cao lâu hơn, tác động trực tiếp tới tăng trưởng và dòng vốn ở các thị trường mới nổi."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Đức mua tên lửa hành trình Tomahawk của Mỹ, triển khai trên lãnh thổ","summary":"Đức đạt thỏa thuận với chính phủ Mỹ để mua tên lửa hành trình Tomahawk và bố trí chúng trên lãnh thổ Đức, đánh dấu bước chuyển hướng tới năng lực tấn công tầm xa của Berlin.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/my-duyet-ban-ten-lua-tomahawk-cho-duc-trien-khai-giua-luc-dia-100260709160955107.htm","significance":"Việc Đức sở hữu vũ khí tầm xa đánh dấu bước ngoặt trong tư duy quốc phòng thời hậu chiến của nước này và làm sâu sắc thế răn đe của NATO ở sườn đông trước Nga."},{"date":"2026-07-09","category":"Kinh tế","title":"Trung Quốc đặt đơn mua đậu tương Mỹ lớn nhất trong 7 tháng","summary":"Trung Quốc vừa đặt mua lượng đậu tương Mỹ lớn nhất trong một ngày kể từ tháng 11 năm ngoái, bổ sung vào loạt đơn hàng gần đây giữa lúc thương mại nông sản giữa hai nền kinh tế lớn nhất thế giới khởi sắc.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/trung-quoc-dat-mua-don-hang-dau-tuong-my-lon-nhat-7-thang.htm","significance":"Đơn hàng nông sản lớn là tín hiệu hạ nhiệt trên mặt trận thương mại Mỹ - Trung, đồng thời cho thấy Bắc Kinh dùng mua nông sản như một đòn bẩy ngoại giao để tạo thiện chí với Washington."},{"date":"2026-07-09","category":"Kinh tế","title":"Venezuela kêu gọi giải phóng tài sản bị đóng băng ở nước ngoài để tái thiết sau động đất","summary":"Chính phủ Venezuela kêu gọi các nước giải phóng những khoản tài sản bị phong tỏa quốc tế nhằm huy động tài chính tái thiết hạ tầng và cứu trợ nhân đạo sau trận động đất kép.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/venezuela-keu-goi-giai-phong-tai-san-dong-bang-o-nuoc-ngoai-de-tai-thiet-sau-dong-dat-100260709121855587.htm","significance":"Cho thấy Caracas đang tận dụng thảm họa nhân đạo như một đòn bẩy ngoại giao-kinh tế để đòi dỡ bỏ trừng phạt và giải tỏa tài sản bị đóng băng, đặt phương Tây vào thế khó giữa nguyên tắc trừng phạt và áp lực nhân đạo."},{"date":"2026-07-09","category":"Ngoại giao","title":"Ba Lan cảnh báo Ukraine: biểu tượng UPA có thể cản trở con đường gia nhập EU","summary":"Tổng thống Ba Lan Karol Nawrocki cảnh báo Tổng thống Zelensky rằng việc dùng biểu tượng gắn với tổ chức dân tộc UPA có thể 'giới hạn tương lai của Ukraine trong EU', liên quan vụ đổi tên một đơn vị quân đội thành 'Anh hùng UPA'. Hai bên vẫn xác định Nga là mối lo chung.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ba-lan-canh-bao-ukraine-ve-kha-nang-gia-nhap-eu-5095266.html","significance":"Cho thấy những vết thương lịch sử (thảm sát Volhynia) vẫn đủ sức gây ma sát giữa hai đồng minh thân cận, và Ba Lan — cửa ngõ viện trợ chính cho Kiev — có thể trở thành rào cản chính trị cho tiến trình EU của Ukraine dù hai bên cùng đối đầu Nga."},{"date":"2026-07-09","category":"Ngoại giao","title":"Nga chỉ trích cam kết viện trợ 70 tỷ euro của NATO cho Ukraine là 'vô trách nhiệm'","summary":"Người phát ngôn Bộ Ngoại giao Nga Maria Zakharova lên án các quyết định của thượng đỉnh NATO tại Thổ Nhĩ Kỳ, gọi cam kết 70 tỷ euro viện trợ quân sự cho Ukraine năm 2026 là 'vô trách nhiệm' và có thể dẫn tới 'thảm họa cho cả thế giới'. NATO xác định Nga là 'mối đe dọa dài hạn'.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nga-chi-trich-cam-ket-cua-nato-voi-ukraine-5095210.html","significance":"Phản ứng gay gắt của Moscow cho thấy thượng đỉnh Ankara đã củng cố lập trường cứng rắn của NATO bất chấp bất đồng nội khối, đồng thời báo hiệu khả năng hòa đàm Nga–phương Tây tiếp tục xa vời khi hai bên gia tăng cam kết đối đầu."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"NATO đàm phán mua tới 10 máy bay GlobalEye của Saab để thay phi đội AWACS Mỹ","summary":"Theo Tổng thư ký NATO Mark Rutte, khối đang đàm phán mua tới 10 máy bay cảnh báo sớm GlobalEye của hãng Saab (Thụy Điển), trị giá khoảng 4,5 tỷ USD, thay thế 14 chiếc E-3A Sentry cũ có từ năm 1982; dự kiến bàn giao từ 2030.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/nato-vach-ke-hoach-thay-phi-doi-may-bay-mat-than-cua-my-5095100.html","significance":"Việc NATO chọn nền tảng châu Âu (Saab) thay vì máy bay Mỹ đánh dấu bước dịch chuyển đáng chú ý hướng tới tự chủ quốc phòng và giảm phụ thuộc vào công nghiệp vũ khí Mỹ, phù hợp xu thế châu Âu 'trám vết nứt' an ninh sau các bất đồng xuyên Đại Tây Dương."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Ukraine tuyên bố bắn rơi tiêm kích Su-35S của Nga bằng hệ thống Patriot","summary":"Không quân Ukraine thông báo bắn hạ một tiêm kích đa năng Su-35S của Nga hôm 8/7 gần Donetsk; theo phân tích, các tiêm kích F-16 đóng vai nghi binh trong khi tổ hợp Patriot đặt cách tiền tuyến khoảng 60 km khai hỏa. Phi công Nga được cho là đã nhảy dù an toàn.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ukraine-ban-roi-tiem-kich-su-35s-nga-5095240.html","significance":"Nếu được xác nhận, đây là tổn thất đáng kể với dòng tiêm kích 4++ chủ lực mà Nga chỉ sản xuất 15-20 chiếc/năm, đồng thời cho thấy chiến thuật phối hợp F-16 nghi binh và Patriot phục kích đang giúp Ukraine đe dọa cả không quân tinh nhuệ của đối phương."},{"date":"2026-07-09","category":"Ngoại giao","title":"Nga tuyên bố tiếp tục hỗ trợ quân sự cho các nước vùng Sahel","summary":"Moscow khẳng định duy trì và mở rộng hợp tác quân sự với các quốc gia vùng Sahel ở châu Phi, củng cố ảnh hưởng tại khu vực đang biến động.","sourceName":"Thế giới & Việt Nam","sourceUrl":"https://baoquocte.vn/noi-chau-phi-dang-thuc-tinh-lan-thu-hai-nga-tuyen-bo-tiep-tuc-ho-tro-quan-su-cho-cac-nuoc-vung-sahel-416229.html","significance":"Phản ánh chiến lược Nga lấp khoảng trống ảnh hưởng ở châu Phi khi phương Tây rút lui; xu hướng cạnh tranh nước lớn lan xuống Sahel, nơi các chính quyền quân sự ngả về Moscow để đổi lấy an ninh."},{"date":"2026-07-09","category":"Kinh tế","title":"Saudi Arabia cân nhắc mở rộng tuyến ống dẫn dầu ra Biển Đỏ","summary":"Saudi Arabia xem xét mở rộng hệ thống ống dẫn dầu ra Biển Đỏ nhằm giảm phụ thuộc vào tuyến vận chuyển qua eo biển Hormuz đang căng thẳng.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/saudi-arabia-can-nhac-mo-rong-tuyen-ong-dan-dau-ra-bien-do-c55575690.epi","significance":"Cho thấy nỗi lo dai dẳng về an ninh tuyến hàng hải qua eo Hormuz; phản ánh xu hướng các nước vùng Vịnh tìm đường xuất khẩu thay thế để giảm rủi ro khi căng thẳng với Iran leo thang."},{"date":"2026-07-09","category":"Kinh tế","title":"Các ngân hàng trung ương bớt mặn mà với USD, chuyển sang vàng","summary":"Nhiều ngân hàng trung ương trên thế giới giảm dự trữ USD và tăng nắm giữ vàng để phòng ngừa rủi ro địa chính trị và biến động tỷ giá.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/cac-ngan-hang-trung-uong-bot-man-ma-voi-usd-chuyen-sang-vang-c55575536.epi","significance":"Phản ánh xu hướng phi đô la hóa dự trữ và giảm niềm tin vào tài sản Mỹ giữa bất ổn địa chính trị; tín hiệu dài hạn làm suy yếu vị thế thống trị của đồng USD."},{"date":"2026-07-09","category":"Kinh tế","title":"ADB hạ dự báo tăng trưởng châu Á - Thái Bình Dương 2026 xuống 4,9%","summary":"Ngân hàng Phát triển châu Á (ADB) hạ dự báo tăng trưởng khu vực châu Á - Thái Bình Dương xuống 4,9% cho năm 2026, giảm so với mức 5,5% của năm 2025.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/adb-tang-truong-cua-chau-a-va-thai-binh-duong-se-chi-con-4-9-trong-nam-2026-c55575554.epi","significance":"Cho thấy đà giảm tốc của kinh tế châu Á vì thương chiến và cầu yếu; hàm ý áp lực lên các nền kinh tế xuất khẩu trong khu vực, gồm cả Việt Nam."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Ukraine tập kích 10 tàu Nga ở biển Azov và Hắc Hải, cắt tiếp tế Crimea","summary":"Trong đêm 6 rạng sáng 7/7, lực lượng UAV hải quân Ukraine đột kích quy mô lớn vào biển Azov và bắc Hắc Hải, tấn công tổng cộng 10 tàu nhằm cắt đứt tuyến hậu cần tiếp tế cho bán đảo Crimea bị chiếm đóng.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/ukrainian-drone-raid-russian-ships-crimea-supply-lines/","significance":"Đòn đánh cho thấy drone hải quân giá rẻ tiếp tục vô hiệu hóa ưu thế của hạm đội mặt nước Nga và biến vùng biển quanh Crimea thành khu vực tranh chấp, đe dọa tính bền vững của hậu cần Nga tại bán đảo này."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Trung Quốc thử tên lửa đạn đạo phóng từ tàu ngầm (SLBM) ra Thái Bình Dương","summary":"Ngày 6/7, hải quân Trung Quốc phóng thử một tên lửa đạn đạo chiến lược (nhiều khả năng là JL-3) từ tàu ngầm hạt nhân ra Nam Thái Bình Dương. Nhiều nước trong khu vực phản đối vì vụ thử được cho là làm suy yếu vùng phi hạt nhân Nam Thái Bình Dương.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/07/chinese-ballistic-missile-test-is-said-to-undermine-nuclear-weapons-free-zone-in-south-pacific/","significance":"Đây được cho là vụ phóng SLBM tầm xa ra Thái Bình Dương đầu tiên Trung Quốc công khai thừa nhận kể từ 1982, cho thấy Bắc Kinh đang tiến tới năng lực răn đe hạt nhân trên biển liên tục — một bước nhảy về sức mạnh chiến lược đáng lo ngại với Mỹ và đồng minh."}],"usNews":[{"date":"2026-07-13","category":"Công nghệ quân sự","title":"SDA trao 1,75 tỷ USD cho L3Harris và Sierra Space chế tạo 36 vệ tinh theo dõi tên lửa cho Golden Dome","summary":"Cơ quan Phát triển Không gian Mỹ (SDA) trao tổng cộng 1,75 tỷ USD cho L3Harris (955 triệu USD, 18 vệ tinh) và Sierra Space chế tạo 36 vệ tinh theo dõi mối đe doạ tên lửa thuộc chương trình Accelerated Missile Defense Tranche 3, mang cảm biến trường nhìn trung bình cung cấp dữ liệu kiểm soát hoả lực; sản xuất tại Indiana và Florida, phóng trước cuối 2028 phục vụ tầng cảm biến lá chắn Golden Dome.","sourceName":"Space Development Agency","sourceUrl":"https://www.sda.mil/space-development-agency-issues-awards-to-build-36-accelerated-missile-defense-tracking-layer-satellites-for-tranche-3-in-support-of-golden-dome-for-america/","significance":"Bước cụ thể đầu tiên hiện thực hoá tầng cảm biến không gian của Golden Dome, sau nhiều tháng bị CSIS đánh giá là chậm tiến độ triển khai thực tế."},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Lầu Năm Góc dừng khẩn cấp yêu cầu chứng nhận an ninh mạng CMMC Giai đoạn 2","summary":"Giám đốc Thông tin Lầu Năm Góc Kirsten Davies dừng ngay yêu cầu đánh giá an ninh mạng bên thứ ba theo Mô hình Chứng nhận Trưởng thành An ninh mạng (CMMC) Giai đoạn 2 — dự kiến áp dụng từ 10/11/2026 — sau khi phân tích cho thấy chi phí lên tới 593.800 USD/nhà thầu quốc phòng nhỏ; lập tổ công tác rà soát báo cáo trong 60 ngày, trong khi yêu cầu tự đánh giá Giai đoạn 1 vẫn giữ hiệu lực.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/pentagon-announces-immediate-suspension-of-cmmc-mandates/","significance":"Cho thấy áp lực buộc Lầu Năm Góc cân bằng giữa siết an ninh mạng chuỗi cung ứng quốc phòng và nguy cơ đẩy nhà thầu nhỏ ra khỏi thị trường — chủ đề CISA/CSET theo dõi sát."},{"date":"2026-07-13","category":"Kinh tế","title":"Thống đốc Fed Waller: có thể phải tăng lãi suất nếu lạm phát lõi tiếp tục nóng","summary":"Phát biểu tại New York Association for Business Economics, Thống đốc Fed Christopher Waller cho biết lạm phát lõi PCE đã tăng từ 3% (12/2025) lên 3,4% (5/2026), một phần do xung đột Trung Đông làm gián đoạn dầu mỏ. Ông cảnh báo nếu CPI/PPI tuần này tiếp tục nóng, FOMC sẽ phải cân nhắc thắt chặt trong ngắn hạn, dù cần thêm dữ liệu trước khi hành động.","sourceName":"Federal Reserve","sourceUrl":"https://www.federalreserve.gov/newsevents/speech/waller20260713a.htm","significance":"Đánh dấu khả năng Fed đảo chiều từ kỳ vọng cắt giảm sang cân nhắc tăng lãi suất khi lạm phát do thuế quan và cú sốc năng lượng Trung Đông cộng hưởng — đúng cảnh báo của BIS về điểm nghẽn áp lực kinh tế toàn cầu."},{"date":"2026-07-13","category":"Chính trị","title":"Bộ Tài chính Mỹ trừng phạt mạng lưới hạ tầng hỗ trợ ransomware, phối hợp với Anh","summary":"OFAC (Bộ Tài chính Mỹ) trừng phạt dịch vụ VPN FirstVPN (1VPNS) cùng quản trị viên Dmytro Rashevskyi và cá nhân Yevgeniy Silayev — người bán công cụ 'cryptor' giúp ransomware né phần mềm diệt virus. Hành động phối hợp cùng Bộ Ngoại giao Anh (FCDO), nhắm triệt hạ hạ tầng dịch vụ hỗ trợ các nhóm ransomware từng gây thiệt hại hạ tầng trọng yếu của Mỹ.","sourceName":"U.S. Department of the Treasury","sourceUrl":"https://home.treasury.gov/news/press-releases/sb0559","significance":"Bước chuyển chiến lược trừng phạt của Mỹ từ nhắm trực tiếp nhóm ransomware sang triệt hạ mạng lưới hạ tầng/dịch vụ hỗ trợ (VPN, cryptor) phía sau — mô hình phối hợp xuyên Đại Tây Dương ngày càng được thể chế hoá."},{"date":"2026-07-13","category":"Công nghệ quân sự","title":"Thượng viện Mỹ rót 40 triệu USD tích hợp tên lửa Bullseye cho Thủy quân lục chiến đối phó Trung Quốc","summary":"Bản dự thảo NDAA FY2027 của Ủy ban Quân vụ Thượng viện bổ sung 40 triệu USD để tích hợp và trình diễn tên lửa hành trình Bullseye (General Atomics, tầm bắn 300km, phát triển từ Ice Breaker của Rafael) cho các Trung đoàn Duyên hải Thủy quân lục chiến, phục vụ răn đe ở Tây Thái Bình Dương.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/usmc-general-atomics-bullseye-missile-china","significance":"Thể hiện ưu tiên ngân sách quốc phòng Mỹ dồn vào năng lực tấn công tầm xa chi phí thấp hơn tên lửa truyền thống, phù hợp chiến lược Marine Littoral Regiment đối phó Trung Quốc mà CSIS/CNAS đã phân tích."},{"date":"2026-07-11","category":"Kinh tế","title":"Sa thải tại Amazon phơi bày thị trường lao động Mỹ bị AI làm bão hòa","summary":"Hơn 8 tháng sau đợt cắt giảm nhân sự lớn nhất lịch sử, nhân viên bị Amazon sa thải đang vật lộn trong thị trường việc làm ngày càng bão hòa; ngành công nghệ Mỹ đã cắt khoảng 140.000 việc làm từ đầu 2026. AI được nêu là lý do chính trong 4 tháng liên tiếp, chiếm khoảng 23% tổng số thông báo sa thải năm 2026.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/11/burnout-frustration-and-heartbreak-amazon-layoffs-take-their-toll.html","significance":"Làn sóng sa thải do AI đang làm suy yếu thị trường lao động Mỹ ngay cả khi chứng khoán tăng mạnh nhờ kỳ vọng AI."},{"date":"2026-07-10","category":"Kinh tế","title":"Chứng khoán Mỹ lập đỉnh trong khi tăng trưởng thực chỉ quanh 1,9%, giới kinh tế chỉ ra AI","summary":"Chứng khoán Mỹ bùng nổ nửa đầu 2026 trong khi tăng trưởng GDP thực giảm từ ~3,3% (2023) xuống ~1,9%; tỷ lệ tham gia lực lượng lao động gần mức thấp nhất 50 năm. Các nhà kinh tế cho rằng đầu tư và lợi nhuận AI là động lực khiến thị trường tách rời khỏi nền kinh tế thực.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/10/stock-market-and-economy-out-of-sync.html","significance":"Sự phân kỳ giữa thị trường do AI dẫn dắt và nền kinh tế thực yếu hơn làm dấy lên lo ngại về tính bền vững của đà tăng."},{"date":"2026-07-10","category":"Chính trị","title":"Trump sa thải toàn bộ ủy viên còn lại của Ủy ban Hỗ trợ Bầu cử Mỹ","summary":"Nhà Trắng ngày 10/7 xác nhận Tổng thống Trump đã cách chức 3 ủy viên cuối cùng của Ủy ban Hỗ trợ Bầu cử (EAC) - cơ quan lưỡng đảng độc lập hỗ trợ vận hành bầu cử liên bang - khiến cơ quan này không còn ủy viên nào chỉ vài tháng trước bầu cử giữa kỳ.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/10/donald-trump-removes-final-members-of-independent-us-election-commission","significance":"Làm dấy lên lo ngại Nhà Trắng can thiệp sâu hơn vào tiến trình bầu cử giữa kỳ, sau khi Tòa Tối cao mở rộng quyền sa thải lãnh đạo cơ quan độc lập của tổng thống."},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Thủy quân lục chiến Mỹ thử nghiệm thành công hệ thống phòng không tầm trung MRIC tại Guam","summary":"Trong diễn tập Valiant Shield, Thủy quân lục chiến Mỹ tại Guam bắn thử thành công hệ thống Đánh chặn tầm trung (MRIC) dựa trên công nghệ Iron Dome của Israel — lần đầu binh chủng này có phòng không tầm trung kể từ khi loại biên HAWK thập niên 1990. MRIC dùng tên lửa SkyHunter của Raytheon, tầm bắn 4-70km.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-military/2026/07/10/us-marines-successfully-test-fire-new-medium-range-air-defense-system/","significance":"Lấp khoảng trống phòng không giữa Stinger vác vai và Patriot tầm xa, tăng bảo vệ các căn cứ tiền tiêu ở Thái Bình Dương như Guam."},{"date":"2026-07-11","category":"Công nghệ quân sự","title":"Space Force hậu thuẫn thử nghiệm động cơ đẩy lai DOTS của Parabilis cho vệ tinh CubeSat cơ động","summary":"Phối hợp cùng Space Delta 89, công ty Parabilis Space Technologies hoàn tất thử nghiệm bắn nóng hệ thống đẩy lai DOTS (module 2U) kết hợp nhiên liệu rắn với chất oxy hóa lỏng để đạt lực đẩy cao hơn động cơ lai truyền thống. Phần cứng sẵn sàng bay thử trên quỹ đạo sớm nhất năm 2027.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/parabilis-tests-propulsion-system-for-maneuverable-cubesats/","significance":"Giúp vệ tinh nhỏ cơ động nhanh hơn để né mảnh vỡ hoặc ghép nối trên quỹ đạo, phục vụ tác chiến không gian linh hoạt của Mỹ."},{"date":"2026-07-11","category":"Công nghệ quân sự","title":"Space Force đưa vào biên chế hệ thống gây nhiễu vệ tinh đối phương Meadowlands","summary":"Bộ Tư lệnh Tác chiến Không gian tiếp nhận hệ thống gây nhiễu mặt đất Meadowlands do L3Harris phát triển, có khả năng phát bức xạ điện từ vô hiệu hóa vệ tinh đối phương — vũ khí giúp 'phát hiện, từ chối, gây rối và làm suy giảm' năng lực đối phương trong không gian.","sourceName":"Task & Purpose","sourceUrl":"https://taskandpurpose.com/news/space-force-meadowlands-jamming-system/","significance":"Bước leo thang trong năng lực tác chiến phản vệ tinh công khai của Mỹ, phản ánh xu hướng quân sự hóa không gian."},{"date":"2026-07-10","category":"Kinh tế","title":"Fed công bố Báo cáo Chính sách Tiền tệ bán niên, tân Chủ tịch Warsh cam kết ổn định giá","summary":"Báo cáo trình Quốc hội đầu tiên dưới thời tân Chủ tịch Fed Kevin Warsh mô tả tăng trưởng kinh tế Mỹ vững chắc, năng suất mạnh, hệ thống ngân hàng ít rủi ro. Báo cáo ghi nhận lạm phát tăng do chiến tranh Iran, thuế quan và chi phí công nghệ, dù một số thước đo lạm phát khác đã giảm.","sourceName":"Federal Reserve","sourceUrl":"https://www.federalreserve.gov/monetarypolicy/files/20260710_mprfullreport.pdf","significance":"Báo cáo chính sách tiền tệ đầu tiên dưới thời tân Chủ tịch Kevin Warsh, định hình kỳ vọng thị trường về lãi suất nửa cuối năm."},{"date":"2026-07-10","category":"Ngoại giao","title":"Ngoại trưởng Mỹ điện đàm với Ngoại trưởng Saudi Arabia về an ninh khu vực","summary":"Ngoại trưởng Mỹ Marco Rubio điện đàm với Ngoại trưởng Saudi Arabia Hoàng tử Faisal bin Farhan Al Saud ngày 10/7, thảo luận các diễn biến khu vực và nhấn mạnh tầm quan trọng của việc phối hợp thúc đẩy an ninh, ổn định Trung Đông.","sourceName":"Bộ Ngoại giao Mỹ","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/secretary-rubios-call-with-saudi-foreign-minister-prince-faisal-bin-farhan-al-saud-13","significance":"Duy trì kênh đối thoại Mỹ - Saudi Arabia về an ninh khu vực giữa lúc căng thẳng Trung Đông tiếp diễn."},{"date":"2026-07-10","category":"Ngoại giao","title":"Mỹ và các nước \"Shield of the Americas\" ra tuyên bố chung về tiến trình bầu cử ở Colombia","summary":"Ngày 10/7, Mỹ cùng 12 nước thành viên sáng kiến \"Shield of the Americas\" ra tuyên bố chung bày tỏ quan ngại về những phát ngôn nghi ngờ tính toàn vẹn của tiến trình bầu cử tại Colombia mà không có căn cứ. Tuyên bố khẳng định ý chí cử tri, được cơ quan bầu cử có thẩm quyền xác nhận, là nền tảng duy nhất của tính chính danh quyền lực công.","sourceName":"Bộ Ngoại giao Mỹ","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/joint-statement-by-members-of-the-shield-of-the-americas-3","significance":"Thể hiện áp lực ngoại giao tập thể của Mỹ và các đối tác khu vực với tiến trình chính trị nội bộ Colombia."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lầu Năm Góc trao hợp đồng vũ khí laser cho Lockheed Martin và nLIGHT","summary":"Bộ Quốc phòng Mỹ trao hợp đồng cho Lockheed Martin Aculight và nLIGHT Defense phát triển Hệ thống Vũ khí Laser Liên quân (JLWS), giá trị khởi điểm 86 triệu USD, có thể tăng lên tối đa 847 triệu USD. Nguyên mẫu ban đầu công suất 150 kW, sau nâng lên 300-500 kW để đánh chặn tên lửa hành trình.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/pentagon-picks-lockheed-nlight-for-laser-defense-project/","significance":"Bước tiến quan trọng trong nỗ lực triển khai vũ khí laser chống drone và tên lửa hành trình quy mô lớn của quân đội Mỹ."},{"date":"2026-07-10","category":"Công nghệ quân sự","title":"Không quân Mỹ tìm giải pháp máy bay tiếp dầu cỡ nhỏ cho kịch bản chiến tranh Thái Bình Dương","summary":"Các cuộc diễn tập ở Thái Bình Dương liên tục cho thấy giải pháp phân tán máy bay tiếp dầu cỡ nhỏ như KC-390 của Embraer để duy trì nhiên liệu, thay vì phụ thuộc máy bay tiếp dầu lớn dễ tổn thương. Embraer đang hợp tác Northrop Grumman phát triển tiếp dầu bằng cần tự động theo yêu cầu của Không quân Mỹ.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/the-solution-to-the-tanker-problem-the-us-military-keeps-finding-in-pacific-wargames/","significance":"Phản ánh thay đổi tư duy hậu cần của Không quân Mỹ nhằm tăng khả năng sống sót trong xung đột ở Ấn Độ Dương-Thái Bình Dương."},{"date":"2026-07-10","category":"Chính trị","title":"Đạo luật nhà ở lớn nhất nhiều thập niên thành luật mà không cần chữ ký của Trump","summary":"Dự luật nhà ở lưỡng đảng '21st Century Road to Housing Act' chính thức thành luật rạng sáng 11/7 sau khi Tổng thống Trump từ chối cả ký lẫn phủ quyết trong thời hạn 10 ngày theo hiến pháp. Ông Trump nói không ký để 'phản đối' việc Thượng viện chưa thông qua dự luật xác minh cử tri SAVE Act mà ông ủng hộ.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/10/trump-housing-bill-affordability","significance":"Cho thấy giới hạn quyền phủ quyết của Tổng thống khi Quốc hội đồng thuận lưỡng đảng đủ mạnh."},{"date":"2026-07-10","category":"Chính trị","title":"Nghị sĩ Cộng hòa lo ngại nguy cơ chính phủ đóng cửa ngay trước bầu cử giữa kỳ","summary":"Các Thượng nghị sĩ Cộng hòa lo ngại khả năng chính phủ Mỹ đóng cửa khi hạn chót ngân sách 30/9 đến gần, chỉ một tháng trước bầu cử giữa kỳ tháng 11. Đàm phán ngân sách giữa bà Susan Collins và bà Patty Murray đã đình trệ, trong khi Thượng viện từng trải qua 3 lần đóng cửa trong năm qua.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/10/government-shutdown-congress-republicans-midterm-elections","significance":"Rủi ro đóng cửa chính phủ ngay trước bầu cử giữa kỳ có thể ảnh hưởng lớn tới triển vọng của đảng Cộng hòa."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ trao loạt hợp đồng công nghệ nhanh cho ngành công nghiệp thương mại","summary":"Lực lượng Không gian Mỹ công bố đã trao 7 thỏa thuận Other Transaction Authority (OTA) trong tháng 5-6/2026 và dự kiến trao thêm 6 thỏa thuận trong tháng 7, tổng cộng 13 hợp đồng trị giá hơn 500 triệu USD cho các nhà cung cấp thương mại để phát triển năng lực chiến đấu không gian. Chương trình phối hợp với Phòng thí nghiệm Nghiên cứu Không quân, Cơ quan Phòng thủ Tên lửa và NASA.","sourceName":"Lực lượng Không gian Mỹ","sourceUrl":"https://www.spaceforce.mil/News/Article-Display/Article/4537826/space-force-delivers-rapid-tech-awards-for-commercial-industry/","significance":"Cho thấy Mỹ đẩy nhanh chiến lược 'tech pull' để rút ngắn thời gian đưa công nghệ vũ trụ thương mại vào phục vụ quân sự."},{"date":"2026-07-09","category":"Kinh tế","title":"Ông Trump ký sắc lệnh yêu cầu đàm phán thương mại về máy bay, động cơ phản lực nhập khẩu","summary":"Ngày 9/7, Tổng thống Donald Trump ký tuyên bố theo Mục 232 Đạo luật Mở rộng Thương mại 1962, chỉ đạo Bộ Thương mại và Văn phòng Đại diện Thương mại Mỹ đàm phán với các đối tác về máy bay thương mại, động cơ phản lực và phụ tùng nhập khẩu vì lo ngại an ninh quốc gia. Sắc lệnh chưa áp thuế ngay nhưng cảnh báo có thể áp thuế nếu không đạt thỏa thuận trong 180 ngày.","sourceName":"Nhà Trắng","sourceUrl":"https://www.whitehouse.gov/fact-sheets/2026/07/fact-sheet-president-donald-j-trump-adjusts-imports-of-commercial-aircraft-jet-engines-and-aircraft-and-engine-parts-into-the-united-states/","significance":"Đặt ngành hàng không thương mại toàn cầu, gồm cả chuỗi cung ứng liên quan tới Boeing/Airbus, trước nguy cơ thuế quan mới nếu đàm phán thất bại."},{"date":"2026-07-08","category":"Ngoại giao","title":"Mỹ, Nhật Bản, Hàn Quốc ra tuyên bố chung tái khẳng định cam kết hòa bình eo biển Đài Loan","summary":"Bên lề Thượng đỉnh NATO tại Ankara, Ngoại trưởng Mỹ Marco Rubio cùng ngoại trưởng Nhật Bản và Hàn Quốc nhấn mạnh tầm quan trọng của hòa bình, ổn định tại eo biển Đài Loan, phản đối mọi hành động đơn phương thay đổi hiện trạng bằng vũ lực. Ba bên cũng ký biên bản ghi nhớ hợp tác năng lượng hạt nhân dân sự và tái khẳng định cam kết phi hạt nhân hóa Triều Tiên.","sourceName":"Bộ Ngoại giao Mỹ","sourceUrl":"https://www.state.gov/releases/office-of-the-spokesperson/2026/07/united-states-japan-republic-of-korea-rok-trilateral-foreign-ministers-meeting","significance":"Củng cố liên kết ba bên Mỹ-Nhật-Hàn về an ninh Ấn Độ Dương-Thái Bình Dương trong bối cảnh Trung Quốc gia tăng hoạt động quanh Đài Loan."},{"date":"2026-07-08","category":"Kinh tế","title":"Biên bản họp Fed hé lộ bất đồng sâu sắc về hướng đi lãi suất","summary":"Biên bản cuộc họp tháng 6 của Fed cho thấy các quan chức chia rẽ rõ rệt: một nhóm nghiêng về khả năng hạ lãi suất cuối năm nay, trong khi nhóm khác cho rằng mức lãi suất phù hợp phải cao hơn biên độ hiện tại 3,5%-3,75%. Ủy ban vẫn nhất trí giữ nguyên lãi suất tại cuộc họp đầu tiên do tân Chủ tịch Kevin Warsh điều hành.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/08/fed-minutes-june-2026-.html","significance":"Sự bất đồng trong nội bộ Fed làm gia tăng bất định về lộ trình lãi suất Mỹ nửa cuối năm, ảnh hưởng tới thị trường tài chính toàn cầu."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Giới chuyên gia: chương trình tên lửa đánh chặn giá rẻ của Lục quân Mỹ có triển vọng nhưng nhiều rủi ro","summary":"Hai tuần sau khi Lục quân Mỹ chính thức khởi động chương trình Low-Cost Interceptor (LCI) nhằm giảm phụ thuộc vào các hệ thống đánh chặn đắt đỏ như PAC-3 MSE, SM-3, SM-6 trước drone giá rẻ kiểu Shahed, chuyên gia Stacie Pettyjohn (CNAS) đánh giá hướng đi hợp lý nhưng cảnh báo nguy cơ nghẽn sản xuất linh kiện như đầu dò tên lửa và đất hiếm.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/theres-promise-and-pitfalls-in-the-armys-low-cost-interceptor-plan-experts-say/","significance":"Phản ánh áp lực tiêu hao đạn đánh chặn đắt tiền của Mỹ sau các đợt tiêu hao lớn, thúc đẩy tìm giải pháp đánh chặn rẻ hơn."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Hải quân Mỹ tiết lộ bước tiếp theo của chương trình tàu mặt nước không người lái MUSV","summary":"Theo thông báo ngày 7/7, Hải quân Mỹ chuẩn bị phát hành yêu cầu đề xuất nguyên mẫu (dự kiến tháng 8) cho dòng tàu mặt nước không người lái cỡ trung (MUSV) sức chứa lớn, phục vụ hậu cần và vận chuyển hàng hóa container hóa, theo mô hình 'marketplace' cạnh tranh mới Hải quân áp dụng từ đầu năm.","sourceName":"Defense One","sourceUrl":"https://www.defenseone.com/defense-systems/2026/07/navy-teases-next-step-key-drone-boat-program/414683/","significance":"Đánh dấu bước tiến cụ thể tiếp theo trong nỗ lực mở rộng hạm đội tàu không người lái của Hải quân Mỹ, sau khi chương trình mua sắm cấp tốc trước đó bị hủy và tái khởi động."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung Relativity Space và Impulse Space vào chương trình phóng an ninh quốc gia","summary":"Lực lượng Không gian Mỹ đưa 2 công ty khởi nghiệp California là Impulse Space và Relativity Federal vào hợp đồng phóng NSSL Phase 3 Lane 1 trị giá 5,6 tỷ USD, mỗi công ty nhận đơn hàng ban đầu 5 triệu USD để đánh giá năng lực. Impulse Space dùng tàu vũ trụ Helios chuyển tải từ quỹ đạo thấp lên quỹ đạo cao trong chưa đầy 1 ngày; Relativity Federal dự kiến phóng tên lửa tái sử dụng Terran R từ Cape Canaveral cuối năm nay.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-adds-relativity-impulse-space-to-national-security-launch-program/","significance":"Mở rộng cạnh tranh trong nhóm nhà cung cấp phóng vệ tinh an ninh quốc gia Mỹ, vốn đang bị đặt câu hỏi vì tập trung quá nhiều vào SpaceX."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump thông báo Quốc hội ý định đưa Syria ra khỏi danh sách quốc gia bảo trợ khủng bố","summary":"Tổng thống Trump thông báo cho Quốc hội Mỹ về quyết định đưa Syria ra khỏi danh sách quốc gia bảo trợ khủng bố mà nước này bị liệt vào từ năm 1979, sau cuộc gặp với Tổng thống Syria Ahmed al-Sharaa. Ngoại trưởng Marco Rubio dẫn các thay đổi tích cực và cam kết chống khủng bố của chính quyền al-Sharaa làm căn cứ; quyết định sẽ có hiệu lực sau 45 ngày nếu Quốc hội không ngăn cản.","sourceName":"Al Arabiya","sourceUrl":"https://english.alarabiya.net/News/middle-east/2026/07/08/trump-informs-congress-of-intent-to-remove-syria-from-state-sponsor-of-terror-list","significance":"Đánh dấu bước ngoại giao lớn nhất của Mỹ với chính quyền hậu Assad, chấm dứt 47 năm cô lập ngoại giao với Syria."},{"date":"2026-07-09","category":"Kinh tế","title":"Đơn xin trợ cấp thất nghiệp Mỹ giảm xuống 215.000 vào tuần kết thúc ngày 4/7","summary":"Số đơn xin trợ cấp thất nghiệp mới của Mỹ giảm 4.000 xuống 215.000 vào tuần kết thúc ngày 4 tháng 7, thấp hơn dự báo của các nhà kinh tế kỳ vọng 218.000-220.000. Dữ liệu cho thấy thị trường lao động Mỹ vẫn ổn định tuy đã chứng tỏ dấu hiệu nguội lạnh.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/video/2026/07/09/jobless-claims-moved-lower-during-holiday-week.html","significance":"Mức yêu cầu trợ cấp thấp hơn dự báo cho thấy sức khỏe tương đối của thị trường lao động Mỹ."},{"date":"2026-07-09","category":"Kinh tế","title":"Doanh số bán nhà cũ Mỹ giảm 2,4% tháng 6, giá đạt kỷ lục","summary":"Doanh số bán nhà cũ tại Mỹ giảm 2,4% từ tháng 5 xuống 4,09 triệu unit, vượt quá dự báo của các nhà phân tích. Tuy nhiên, giá trung vị của căn nhà đã bán đạt mức kỷ lục 440.600 USD, tăng 1,8% so với năm trước.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/09/june-home-sales-prices.html","significance":"Doanh số nhà cũ giảm dù giá cao kỷ lục phản ánh sự cạnh tranh dữ dội và căng thẳng của người mua nhà."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Quân đội Mỹ thử nghiệm hệ thống đặt mìn tự động Autonomous Volcano","summary":"Quân đội Mỹ thử nghiệm thành công phiên bản tự động của bộ phân tán mìn M139 lắp trên xe Palletized Load System. Hệ thống có thể đặt tới 960 mìn trên diện tích 32 mẫu Anh mà không cần điều khiển từ xa, tự động ghi vị trí lên bản đồ chiến trường chung.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-military/2026/07/07/us-army-tests-autonomous-mass-mine-laying/","significance":"Nâng cao khả năng công binh chiến đấu thông qua tự động hoá, giảm rủi ro cho binh sĩ."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lầu Năm Góc tiếp tục gặp khó trong phát triển vũ khí, báo cáo GAO","summary":"Báo cáo của Cơ quan Kiểm toán Chính phủ Mỹ (GAO) cho thấy thời gian phát triển vũ khí trung bình đã vượt 12 năm. Nhiều chương trình theo lộ trình rút gọn MTA dù công nghệ chưa chín muồi, gây đội chi phí và trễ tiến độ.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/pentagon-continues-to-struggle-with-key-weapons-development-timelines-gao/","significance":"Phản ánh thách thức dài hạn trong quá trình phát triển vũ khí hiệu quả của Lầu Năm Góc."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump tín hiệu sẵn sàng nâng cấp quan hệ với Thổ Nhĩ Kỳ, xem xét bán máy bay F-35","summary":"Trong cuộc gặp song phương ở Ankara, Tổng thống Trump thông báo sẽ nâng cấp quan hệ với Thổ Nhĩ Kỳ bằng cách dỡ bỏ lệnh trừng phạt và xem xét bán máy bay chiến đấu F-35. Trump khẳng định sẽ ra quyết định sớm về việc cho phép Thổ Nhĩ Kỳ quay trở lại chương trình F-35.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/7/trump-says-will-lift-sanctions-on-turkiye-consider-selling-f-35s","significance":"Động thái này đánh dấu sự thay đổi đáng kể trong chính sách Mỹ đối với Thổ Nhĩ Kỳ và có thể tác động đến cân bằng quân sự ở Trung Đông."},{"date":"2026-07-09","category":"Ngoại giao","title":"Mỹ cam kết tiếp tục đàm phán với Iran bất chấp các cuộc tấn công gần đây","summary":"Phát ngôn viên Mỹ xác nhận rằng Mỹ sẽ tiếp tục các cuộc đàm phán kỹ thuật với Iran mặc dù hai bên vừa trao đổi các cuộc tấn công. Các quan chức Mỹ nhấn mạnh cam kết của họ đối với quá trình đàm phán để tìm kiếm giải pháp lâu dài cho xung đột.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/09/trump-iran-strait-hormuz-battle","significance":"Cam kết tiếp tục đàm phán của Mỹ cho thấy kỳ vọng rằng hòa bình vẫn có thể đạt được bất chấp những thách thức quân sự gần đây."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ hoàn tất tái cơ cấu mua sắm, lập 9 danh mục đầu tư","summary":"US Space Force hoàn tất tái tổ chức hệ thống mua sắm, chia thành 9 danh mục đầu tư (acquisition portfolios) nhằm tăng tốc phát triển và triển khai năng lực không gian.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-completes-procurement-reorganization-creating-nine-acquisition-portfolios/","significance":"Cho thấy nỗ lực cải tổ quy trình mua sắm quốc phòng Mỹ để bắt kịp tốc độ cạnh tranh không gian với Trung Quốc và Nga."},{"date":"2026-07-09","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ trao 40 triệu USD cho Pulse Space phát triển truyền năng lượng bằng laser","summary":"Lực lượng Không gian Mỹ (US Space Force) cấp 40 triệu USD cho công ty Pulse Space để phát triển công nghệ truyền tải năng lượng bằng laser trên quỹ đạo.","sourceName":"SpaceNews","sourceUrl":"https://spacenews.com/space-force-awards-pulse-space-40-million-to-advance-laser-power-technology/","significance":"Phản ánh Mỹ đầu tư vào hạ tầng năng lượng không gian — nền tảng cho các hệ thống quân sự trên quỹ đạo thế hệ mới."},{"date":"2026-07-09","category":"Chính trị","title":"Dự luật lưỡng đảng có thể cho phép quân nhân Mỹ kiện quân đội vì bị tấn công tình dục","summary":"Một dự luật do các nghị sĩ Dân chủ và Cộng hòa giới thiệu có thể tháo gỡ 'học thuyết Feres' năm 1950 vốn cấm quân nhân tại ngũ kiện chính phủ, mở đường cho các vụ kiện liên quan tấn công tình dục trong quân đội.","sourceName":"Task & Purpose","sourceUrl":"https://taskandpurpose.com/news/military-law-assault-feres-lawsuit/","significance":"Nếu thông qua, sẽ đảo ngược tiền lệ pháp lý kéo dài 75 năm và thay đổi căn bản trách nhiệm giải trình của quân đội Mỹ."},{"date":"2026-07-09","category":"Chính trị","title":"Mỹ không kích 90 mục tiêu Iran, tuyên bố chấm dứt ngừng bắn","summary":"Bộ Tư lệnh Trung tâm Mỹ (CENTCOM) thông báo hoàn tất đợt không kích bổ sung nhằm vào khoảng 90 mục tiêu quân sự Iran ngày 8/7 — gồm hệ thống phòng không, kho tên lửa/UAV và hạ tầng hậu cần — nhằm làm suy yếu khả năng đe dọa hàng hải của Tehran ở eo biển Hormuz. Cả Mỹ và Iran đều tuyên bố ngừng bắn đã chấm dứt.","sourceName":"Dân Trí","sourceUrl":"https://dantri.com.vn/the-gioi/my-trut-hoa-luc-tan-cong-90-muc-tieu-cua-iran-20260709142425458.htm","significance":"Việc Mỹ tấn công cả hạ tầng bên trong Iran — lần đầu kể từ thỏa thuận ngừng bắn 8/4 — cho thấy lệnh ngừng bắn đã sụp đổ và nguy cơ quay lại chiến tranh toàn diện đang hiện hữu, kéo theo rủi ro cho giá dầu và an ninh hàng hải toàn cầu."},{"date":"2026-07-09","category":"Chính trị","title":"Lý do Tổng thống Trump phát lệnh không kích liên tiếp vào Iran","summary":"Một quan chức Mỹ nêu hai lý do chính khiến Tổng thống Trump quyết định tiến hành các đợt không kích mới nhằm vào Iran trong hai ngày, chủ yếu là để đáp trả các vụ tấn công tàu chở dầu ở eo biển Hormuz và răn đe Tehran đóng eo biển.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/vi-sao-tong-thong-trump-quyet-dinh-khoi-phuc-tan-cong-iran-tren-quy-mo-lon-185260709071823944.htm","significance":"Quyết định leo thang phản ánh Nhà Trắng ưu tiên bảo vệ tự do hàng hải và nguồn cung dầu hơn là giữ nguyên trạng ngừng bắn, đặt Trump vào thế phải chọn giữa xung đột kéo dài và áp lực cạn kho dự trữ dầu trong nước."},{"date":"2026-07-09","category":"Ngoại giao","title":"Trump dọa cấm vận thương mại Tây Ban Nha, đòi Greenland tại thượng đỉnh NATO","summary":"Tổng thống Trump chỉ trích gay gắt Tây Ban Nha vì đóng góp quốc phòng không đủ và muốn các nước NATO cắt toàn bộ giao thương với Madrid, đồng thời tái khẳng định yêu sách với Greenland, phơi bày rạn nứt trong liên minh.","sourceName":"VnEconomy","sourceUrl":"https://vneconomy.vn/tong-thong-trump-muon-cac-nuoc-nato-cat-toan-bo-giao-thuong-voi-tay-ban-nha.htm","significance":"Việc công khai gây sức ép với một đồng minh NATO cho thấy Trump sẵn sàng dùng công cụ kinh tế để ép chi tiêu quốc phòng, làm dấy lên lo ngại về sự gắn kết của liên minh ngay tại hội nghị được cho là biểu tượng đoàn kết."},{"date":"2026-07-09","category":"Ngoại giao","title":"Trump ngỏ ý rút bớt quân Mỹ khỏi châu Âu, gắn với vấn đề Greenland","summary":"Tổng thống Trump cho biết quyết định về quy mô hiện diện quân sự của Mỹ tại châu Âu sẽ phụ thuộc vào việc giải quyết vấn đề Greenland, tạo thêm sức ép lên các đồng minh sau thượng đỉnh NATO Ankara.","sourceName":"Dân Trí","sourceUrl":"https://dantri.com.vn/the-gioi/tong-thong-trump-noi-ve-kha-nang-rut-bot-quan-doi-my-khoi-chau-au-20260709143820283.htm","significance":"Gắn cam kết an ninh với một đòi hỏi lãnh thổ là bước đi chưa từng có, buộc châu Âu phải tính đến kịch bản tự chủ quốc phòng nếu chiếc ô an ninh Mỹ trở nên có điều kiện."},{"date":"2026-07-09","category":"Kinh tế","title":"Mỹ tái áp trừng phạt dầu mỏ Iran, giáng đòn nặng vào kinh tế Tehran","summary":"Việc Mỹ tái áp đặt các lệnh trừng phạt đối với dầu mỏ Iran được đánh giá là đòn giáng mạnh vào nền kinh tế Tehran vốn phụ thuộc lớn vào xuất khẩu dầu, giữa lúc xung đột quân sự tái bùng phát.","sourceName":"Tuổi Trẻ","sourceUrl":"https://tuoitre.vn/kinh-te-iran-hung-don-nang-sau-khi-my-tai-ap-lenh-trung-phat-100260709145610204.htm","significance":"Kết hợp đòn quân sự với trừng phạt kinh tế cho thấy Washington theo đuổi chiến lược gây sức ép tối đa; song siết dầu Iran cũng có thể phản tác dụng khi đẩy giá dầu toàn cầu lên cao."},{"date":"2026-07-09","category":"Kinh tế","title":"Dow Jones lao dốc khi giá dầu nhảy hơn 5% vì căng thẳng Vùng Vịnh","summary":"Chỉ số Dow Jones giảm mạnh khi giá dầu tăng hơn 5% do căng thẳng leo thang ở Trung Đông, khiến nhà đầu tư phải đánh giá lại
