<style>
:root{--fs:1}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2ec;color:#1b1b1b;font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double #1b1b1b;margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:#b3282d;font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:#6b6459;margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #d8d2c6;padding:7px 2px;font-size:calc(11.5px*var(--fs));color:#6b6459;text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;gap:2px;overflow-x:auto;margin:14px 0 16px;border-bottom:2px solid #1b1b1b}
.tb{white-space:nowrap;padding:9px 15px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:#6b6459;cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
.tb.on{color:#b3282d;border-bottom-color:#b3282d}
.note{font-size:calc(13px*var(--fs));color:#5a5349;background:#efeae0;border-left:3px solid #b3282d;padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:#fff;border:1px solid #d8d2c6;color:#6b6459;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:#1b1b1b;color:#fff;border-color:#1b1b1b}
.chip.on .dot{outline:1px solid #fff}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid #ded8cc;padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#b3282d}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:#8a8378;text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:#141414}
.sum{font-size:calc(14px*var(--fs));color:#3a352e}
.take{font-size:calc(13.5px*var(--fs));color:#1b1b1b;background:#efeae0;border-radius:2px;padding:8px 11px;margin:7px 0}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:#8a8378}
.src{font-size:calc(12.5px*var(--fs));color:#b3282d;text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.empty{color:#8a8378;text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double #1b1b1b;font-size:calc(11.5px*var(--fs));color:#8a8378;text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:#1b1b1b;color:#fff;border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:#fff;border:1px solid #d8d2c6;border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:#8a8378;margin-bottom:8px;border-bottom:1px solid #ece7dd;padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#8a8378;margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid #d8d2c6;background:#f7f5f1;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:#1b1b1b;color:#fff;border-color:#1b1b1b}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid #d8d2c6;background:#fff;border-radius:6px;cursor:pointer;font-size:16px;color:#1b1b1b}
.rp-fonts button .vi{font-size:12px;color:#8a8378;font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:#b3282d;background:#fbeceb}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}
</style>

<script>
var DATA = {"brand":"Điểm Tin Thế Giới","tagline":"Kinh tế · Chính trị · Ngoại giao · Công nghệ quân sự — cập nhật hằng ngày","generatedAt":"2026-07-06","worldGeneratedAt":"2026-07-06","usGeneratedAt":"2026-07-06","worldNews":[{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Thales thâu tóm hãng drone ngầm Exail của Pháp trong thương vụ 4,5 tỷ USD","summary":"Thales đồng ý mua 35,5% cổ phần hãng chế tạo drone ngầm Exail Technologies của Pháp từ gia đình Gorgé và sẽ chào mua phần còn lại với giá 134 euro/cổ phiếu, cao hơn 44% so với giá đóng cửa trước đó. Thương vụ 3,9 tỷ euro giúp Thales củng cố năng lực tác chiến dưới nước và mở rộng chuyên môn hệ thống dẫn đường quán tính trong thị trường rà phá thủy lôi không người lái đang tăng trưởng. Cùng lúc, hãng đóng tàu Ý Fincantieri công bố chi 600 triệu euro mua bốn công ty drone hàng hải.","significance":"Làn sóng hợp nhất công nghiệp quốc phòng châu Âu quanh drone ngầm phản ánh cuộc đua mới với Mỹ và Trung Quốc trong tác chiến tự động dưới biển.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/06/thales-to-buy-french-underwater-drone-maker-exail-in-45-billion-deal/"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Nga nã khoảng 400 tên lửa và drone vào Kyiv ngay trước thềm thượng đỉnh NATO, ít nhất 20 người chết","summary":"Nga tấn công Kyiv bằng khoảng 400 vũ khí (68 tên lửa, gồm 23 đạn đạo và 6 siêu vượt âm, cùng 351 drone), khiến ít nhất 20 người thiệt mạng; phòng không Ukraine không chặn được quả tên lửa đạn đạo hay siêu vượt âm nào giữa lúc thiếu hụt đạn đánh chặn do Mỹ sản xuất (US-made interceptors). Đòn tập kích diễn ra ngay trước cuộc gặp Trump-Zelensky tại thượng đỉnh NATO.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/world/europe/article/3359525/russia-strikes-kyiv-deadly-barrage-eve-nato-summit"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"KONGSBERG (Na Uy) và DevDroid (Ukraine) ký biên bản tích hợp trạm vũ khí điều khiển từ xa lên robot mặt đất chiến đấu","summary":"Ngày 3/7/2026, tập đoàn KONGSBERG của Na Uy và công ty quốc phòng Ukraine DevDroid ký biên bản ghi nhớ (MOU) nhằm kết hợp các trạm vũ khí điều khiển từ xa (remote weapon station) với xe mặt đất không người lái (UGV) đã được thử lửa trên chiến trường, hướng tới sản xuất quy mô lớn. DevDroid hiện có robot Droid TW 12.7 (súng máy 12,7mm) và Droid NW 40 (súng phóng lựu tự động 40mm), còn KONGSBERG mang kinh nghiệm từ chương trình CROWS của Lục quân Mỹ. Thoả thuận hướng tới chuẩn hoá robot chiến đấu thay cho các giải pháp ứng biến thời chiến.","sourceName":"Army Recognition","sourceUrl":"https://www.armyrecognition.com/news/army-news/2026/ukraine-devdroid-ground-robots-could-get-kongsberg-remote-weapon-stations-for-frontline-combat","significance":"Đánh dấu bước chuyển từ robot chiến đấu tự chế thời chiến sang hệ thống không người lái vũ trang được chuẩn hoá và sản xuất hàng loạt, kết hợp công nghệ NATO với kinh nghiệm thực chiến Ukraine."},{"date":"2026-07-05","category":"Ngoại giao","title":"Chiến hạm Nga cập cảng Thanh Đảo (Qingdao) của Trung Quốc trước thềm tập trận Joint Sea","summary":"Đội tàu Nga gồm tuần dương hạm mang tên lửa lớp Slava Varyag, tàu ngầm tấn công diesel-điện Ufa cùng một tàu hộ tống và tàu cứu hộ đã cập cảng Thanh Đảo hôm Chủ nhật. Chiến khu Miền Bắc của Quân Giải phóng Nhân dân Trung Quốc (PLA) tổ chức lễ đón; cuộc tập trận thường niên Joint Sea bắt đầu từ thứ Hai, sau đó hai bên tuần tra chung trên Thái Bình Dương.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/military/article/3359479/russian-warships-dock-chinese-port-ahead-joint-sea-exercises"},{"date":"2026-07-05","category":"Công nghệ quân sự","title":"Tên lửa diệt hạm Naval Strike Missile lần đầu xuất hiện trong biên chế Ukraine","summary":"Ukraine đã tiếp nhận tên lửa hành trình chống hạm Naval Strike Missile (NSM) do Na Uy sản xuất, nhiều khả năng chuyển giao qua Ba Lan, qua hình ảnh chuyến thăm Bộ Tư lệnh Hải quân của Tổng thống Zelensky. NSM là 'tên lửa chống hạm hiện đại nhất trong kho vũ khí Ukraine', tầm bắn hơn 300 km cùng khả năng cơ động giai đoạn cuối tiên tiến. Vũ khí này bổ sung cho Harpoon của Đan Mạch, RBS-15 của Thụy Điển và Neptune nội địa, tăng cường phòng thủ bờ biển chống Hạm đội Biển Đen của Nga.","significance":"Cho thấy phương Tây tiếp tục chuyển giao vũ khí diệt hạm hàng đầu cho Ukraine, dịch chuyển cán cân kiểm soát ở Biển Đen bất lợi cho hải quân Nga.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/naval-strike-missile-appears-in-ukrainian-service-for-the-first-time/"},{"date":"2026-07-05","category":"Ngoại giao","title":"Oman và Trung Quốc: những bên thắng thật sự trong thỏa thuận Iran của Trump?","summary":"Tác giả Alessandro Arduino phân tích bản ghi nhớ 14 điểm mà Trump ca ngợi là 'đột phá lịch sử' để mở lại Eo biển Hormuz, cho rằng Trung Quốc hưởng lợi chiến thuật tức thời còn Oman hưởng lợi chiến lược dài hạn, và cảnh báo Hormuz có thể trở thành một xung đột Trung Đông 'đóng băng', khủng hoảng triền miên thay vì hòa bình bền vững.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/week-asia/opinion/article/3359347/oman-and-china-real-winners-trumps-iran-deal"},{"date":"2026-07-04","category":"Công nghệ quân sự","title":"Anh công bố Kế hoạch Đầu tư Quốc phòng 298 tỷ bảng, rót 8 tỷ bảng cho tiêm kích GCAP Tempest","summary":"Kế hoạch Đầu tư Quốc phòng (DIP) của Anh là đợt tăng chi tiêu quốc phòng bền vững lớn nhất kể từ Chiến tranh Lạnh, với 8 tỷ bảng dành cho chương trình tiêm kích thế hệ 6 GCAP Tempest cùng đầu tư mạnh cho tàu ngầm hạt nhân và dự trữ đạn dược. Đổi lại, kế hoạch cắt giảm đáng kể, gồm loại biên sớm trực thăng Wildcat, máy bay trinh sát Shadow và hủy các khinh hạm Type 32, khu trục hạm Type 83 để chuyển sang mô hình 'Hải quân Lai'. Kế hoạch bị chỉ trích vì chưa đạt mục tiêu chi 3% GDP của NATO.","significance":"Định hình lại lực lượng vũ trang Anh quanh tiêm kích thế hệ 6 và răn đe hạt nhân, chấp nhận đánh đổi năng lực hải quân truyền thống.","sourceName":"The Aviationist","sourceUrl":"https://theaviationist.com/2026/07/04/uk-defence-investment-plan-at-a-glance/"},{"date":"2026-07-03","category":"Công nghệ quân sự","title":"Anh, Ý, Nhật trao hợp đồng phát triển 4,6 tỷ bảng cho Edgewing đẩy nhanh tiêm kích thế hệ 6 GCAP","summary":"Ba nước Anh, Ý và Nhật Bản trao hợp đồng phát triển trị giá 4,6 tỷ bảng (khoảng 6,1 tỷ USD) cho Edgewing - liên danh công nghiệp gồm BAE Systems, Leonardo và JAIEC - để hoàn thiện thiết kế tiêm kích tàng hình thế hệ 6 thuộc Chương trình Không quân Chiến đấu Toàn cầu (GCAP). Hợp đồng nối tiếp gói 686 triệu bảng hồi tháng 4/2026 và cấp vốn tới hết năm 2027. Anh cam kết 8,6 tỷ bảng trong bốn năm qua Kế hoạch Đầu tư Quốc phòng; các mẫu bay thử Excalibur và Combat Air Flying Demonstrator dự kiến cất cánh cuối 2027.","significance":"Tháo gỡ bế tắc tài chính (đặc biệt phía Nhật) và giữ nhịp cho một trong những chương trình tiêm kích thế hệ 6 lớn nhất của phương Tây, đối trọng với nỗ lực của Mỹ và Trung Quốc.","sourceName":"The Aviationist","sourceUrl":"https://theaviationist.com/2026/07/03/gcap-fighter-project-contract-edgewing/"},{"date":"2026-07-03","category":"Công nghệ quân sự","title":"Bỉ mua 20 tổ hợp phòng không Skyranger 30 và 10 bệ NASAMS để chống UAV","summary":"Bỉ có kế hoạch chi khoảng 3,1 tỷ euro để mua 20 hệ thống phòng không tầm ngắn Skyranger 30 của Rheinmetall cùng 10 bệ phóng NASAMS của Kongsberg. Thương vụ tận dụng khung hợp đồng sẵn có của Hà Lan nhằm đẩy nhanh tiến độ và đồng bộ hậu cần với các nước láng giềng, dự kiến công bố tại thượng đỉnh NATO ở Ankara ngày 7-8/7/2026. Đây là lời đáp cho lỗ hổng phòng thủ tầm thấp sau nhiều vụ UAV lạ xâm nhập hạ tầng chiến lược của Bỉ.","significance":"Cho thấy châu Âu đang gấp rút vá lỗ hổng phòng không tầm thấp trước mối đe dọa UAV ngày càng thường trực.","sourceName":"Army Recognition","sourceUrl":"https://www.armyrecognition.com/news/army-news/2026/skyranger-30-air-defense-system-belgium"},{"date":"2026-07-02","category":"Công nghệ quân sự","title":"Thổ Nhĩ Kỳ cân nhắc mua Patriot hoặc SAMP/T để tăng cường lá chắn tên lửa","summary":"Bộ trưởng Quốc phòng Thổ Nhĩ Kỳ Yasar Guler cho biết Ankara đang đánh giá phương án mua hệ thống phòng không Patriot hoặc SAMP/T nhằm bịt các lỗ hổng trong mạng lưới phòng thủ. Các cuộc thảo luận kỹ thuật và chính trị đang diễn ra với các nước liên quan, đề cao yếu tố chuyển giao công nghệ và sản xuất chung. Song song, Thổ Nhĩ Kỳ tiếp tục phát triển hệ thống nội địa như Siper tầm xa và mở rộng kiến trúc phòng không 'Steel Dome'.","significance":"Phản ánh nỗ lực đa dạng hóa và tự chủ phòng không của một thành viên NATO nằm ở giao điểm chiến lược Âu-Á.","sourceName":"The Defense Post","sourceUrl":"https://thedefensepost.com/2026/07/02/turkey-considering-patriot-sampt/"},{"date":"2026-07-02","category":"Công nghệ quân sự","title":"Trung Quốc bí mật huấn luyện hàng trăm binh sĩ Nga, thu nhận kinh nghiệm từ chiến tranh Ukraine","summary":"Một sắc lệnh mật của Bộ Quốc phòng Nga từ tháng 8/2025 cho phép cử khoảng 200 quân nhân Nga tới huấn luyện tại các cơ sở của Quân Giải phóng Nhân dân Trung Quốc trải khắp sáu thành phố. Chương trình đào tạo chuyên sâu về UAV góc nhìn thứ nhất (FPV), tác chiến điện tử và phòng chống phóng xạ - sinh - hóa, với học viên từ trung sĩ đến trung tá. Đây là bước leo thang đáng kể trong hợp tác quân sự Nga - Trung, chuyển từ diễn tập tượng trưng sang cơ chế chuyển giao tri thức trực tiếp.","significance":"Cho thấy trục Nga - Trung đang chuyển sang trao đổi kinh nghiệm thực chiến, làm dày thêm năng lực quân sự của cả hai bên.","sourceName":"Army Recognition","sourceUrl":"https://www.armyrecognition.com/news/army-news/2026/china-secretly-trains-russian-soldiers-ukraine-war"},{"date":"2026-07-01","category":"Công nghệ quân sự","title":"Kongsberg ký hợp đồng 472 triệu USD bán tên lửa Joint Strike Missile cho khách hàng mới","summary":"Tập đoàn Kongsberg (Na Uy) công bố hợp đồng trị giá 4,7 tỷ krone (khoảng 472 triệu USD) cung cấp tên lửa hành trình Joint Strike Missile (JSM) cho một khách hàng chưa được tiết lộ, trở thành quốc gia thứ sáu sở hữu loại vũ khí này. JSM là tên lửa hành trình phóng từ máy bay, thiết kế để nằm gọn trong khoang vũ khí của tiêm kích tàng hình F-35. Vũ khí có tầm bắn 350 km, dẫn đường quán tính kết hợp tham chiếu địa hình và hoạt động tốt trong môi trường bị chế áp GPS.","significance":"Mở rộng mạng lưới đối tác sở hữu vũ khí tấn công tầm xa phóng từ F-35, củng cố khả năng răn đe của phương Tây.","sourceName":"The Defense Post","sourceUrl":"https://thedefensepost.com/2026/07/01/kongsberg-jsm-new-customer/"}],"usNews":[{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Lầu Năm Góc trao gói thầu 80 triệu USD cho hệ thống AI bảo vệ căn cứ Không quân trước drone nhỏ","summary":"AeroVironment nhận đơn đặt hàng trị giá 80,5 triệu USD — gói đầu tiên trong hợp đồng khung 500 triệu USD của Lầu Năm Góc — để cung cấp hệ thống chống drone dùng AI bảo vệ các căn cứ của Bộ Tư lệnh Tấn công Toàn cầu Không quân. Nền tảng Titan-MS dùng thuật toán AI và học máy để phát hiện, nhận dạng và vô hiệu hóa mối đe dọa từ máy bay không người lái qua nhiều loại cảm biến. Nỗ lực này thuộc sáng kiến Domestic Shield do lực lượng đặc nhiệm JIATF-401 của Lục quân dẫn dắt.","significance":"Phản ánh việc Mỹ chuyển từ mua sắm lẻ tẻ sang triển khai đại trà lá chắn AI chống drone cho các căn cứ trong nước sau hàng loạt sự cố xâm nhập UAS.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/06/pentagon-awards-task-order-to-av-for-titan-drone-defense/"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Báo cáo giám sát: các chương trình vũ khí lớn nhất của Lầu Năm Góc chậm tiến độ 12 năm","summary":"Văn phòng Trách nhiệm Giải trình Chính phủ (GAO) phát hiện 104 chương trình vũ khí đắt đỏ nhất của Lầu Năm Góc hiện mất trung bình hơn 12 năm để đưa vào sử dụng, với tình trạng trễ tiến độ triền miên trên diện rộng. Báo cáo chỉ ra nhiều hệ thống bị đưa vào quy trình mua sắm nhanh dù công nghệ chưa hoàn thiện, làm hỏng mục tiêu triển khai nhanh. Các chương trình như drone MQ-25 Stingray của Hải quân và khu trục hạm DDG(X) đối mặt trễ hạn đáng kể.","significance":"Cho thấy điểm yếu cốt lõi trong năng lực trang bị vũ khí của Mỹ, đe dọa khả năng cạnh tranh quân sự với Trung Quốc trong thập kỷ tới.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/pentagon-congress/2026/07/06/pentagons-top-new-weapons-programs-are-12-years-behind-schedule-watchdog/"},{"date":"2026-07-06","category":"Kinh tế","title":"Trump rung chuông Sàn chứng khoán New York từ Nhà Trắng, khởi động ngày giao dịch đầu tiên của 'Trump accounts'","summary":"Tổng thống Donald Trump rung chuông mở cửa Sàn NYSE ngay tại Phòng Bầu dục để đánh dấu ngày giao dịch đầu tiên của 'tài khoản Trump' (Trump accounts) — chương trình cấp cho mỗi trẻ em sinh 2025–2028 khoản đầu tư 1.000 USD do liên bang tài trợ, lập qua Đạo luật One Big Beautiful Bill. Nhà sáng lập Dell góp 6,25 tỷ USD và CEO SpaceX Gwynne Shotwell góp 350 triệu USD cho quỹ.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/us-news/2026/jul/06/trump-accounts-trading-day-new-york-stock-exchange"},{"date":"2026-07-06","category":"Chính trị","title":"Tòa liên bang bác đơn xin hoãn của Trump, buộc thi hành khoản bồi thường 5,8 triệu USD cho E Jean Carroll","summary":"Thẩm phán liên bang Lewis Kaplan ra lệnh một câu bác yêu cầu của Tổng thống Trump xin gia hạn thanh toán khoản bồi thường dân sự 5,8 triệu USD cho nhà báo E Jean Carroll — người mà bồi thẩm đoàn New York kết luận đã bị Trump xâm hại tình dục năm 1996 và phỉ báng năm 2019. Diễn biến này đến sau khi Tòa Tối cao từ chối xem lại phán quyết.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/us-news/2026/jul/06/trump-denies-delay-e-jean-carroll-judgment-payment"},{"date":"2026-07-06","category":"Chính trị","title":"Siêu ủy ban MAGA Inc. của Trump ôm 350 triệu USD, phe Cộng hòa sốt ruột đòi chi cho bầu cử giữa kỳ","summary":"Nhiều nhà tài trợ và chiến lược gia Cộng hòa thúc giục Tổng thống Trump giải ngân hơn 350 triệu USD trong siêu ủy ban hành động chính trị MAGA Inc. để hỗ trợ ứng viên bầu cử giữa kỳ, nhưng MAGA Inc. chưa công bố kế hoạch chi tiêu và chưa rót tiền trực tiếp vào cuộc đua nào kể từ tháng Ba. Một quan chức Nhà Trắng nói quyết định 'không cần đưa ra trước đại hội đảng' ngày 9/9.","sourceName":"Politico","sourceUrl":"https://www.politico.com/news/2026/07/06/maga-donors-trump-spending-midterms-00985987"},{"date":"2026-07-06","category":"Chính trị","title":"Bộ trưởng An ninh Nội địa mới Markwayne Mullin âm thầm hóa chiến dịch trấn áp nhập cư, chấm dứt 'kịch tính' thời Noem","summary":"Sau ba tháng nhậm chức, Bộ trưởng An ninh Nội địa (DHS) Markwayne Mullin theo đuổi cách tiếp cận kín tiếng hơn: giảm bắt giữ công khai, hủy kế hoạch mở rộng nhà kho làm nơi giam giữ, và loại bỏ nhiều quan chức thời Kristi Noem. Chính quyền vẫn cam kết 'trục xuất hàng loạt' nhưng muốn tránh làn sóng biểu tình, nhất là sau vụ nhân viên nhập cư bắn chết hai công dân Mỹ ở Minneapolis.","sourceName":"Politico","sourceUrl":"https://www.politico.com/news/2026/07/06/mullins-mark-on-dhs-ending-the-drama-noem-unleashed-00985012"},{"date":"2026-07-06","category":"Ngoại giao","title":"Ông Trump lên đường dự thượng đỉnh NATO tại Ankara sau các đòn không kích chết chóc của Nga vào Kyiv","summary":"Tổng thống Donald Trump khởi hành tới hội nghị thượng đỉnh NATO ở Ankara (Thổ Nhĩ Kỳ), nơi các đòn tấn công mới của Nga có thể phủ bóng lên đàm phán. An ninh eo biển Hormuz và việc Mỹ 'điều chỉnh lại' đóng góp cho NATO nằm trong các chủ đề dự kiến; ông Trump nói đi dự vì tôn trọng Tổng thống Erdogan.","sourceName":"CNN","sourceUrl":"https://edition.cnn.com/2026/07/06/world/video/today-president-trump-heads-to-nato-summit-after-deadly-russian-strikes-on-kyiv-cnc"},{"date":"2026-07-06","category":"Chính trị","title":"Ông Trump nói đã đề nghị chủ tịch FIFA xem lại thẻ đỏ dành cho tiền đạo tuyển Mỹ Folarin Balogun","summary":"Tổng thống Donald Trump cho biết ông đích thân đề nghị Chủ tịch FIFA Gianni Infantino xem xét lại quyết định rút thẻ đỏ và án treo giò một trận với ngôi sao tuyển Mỹ Folarin Balogun tại World Cup, làm dấy lên tranh cãi về việc tổng thống can thiệp vào giải đấu.","sourceName":"CNN","sourceUrl":"https://www.cnn.com/2026/07/06/politics/trump-red-card-fifa-world-cup-balogun"},{"date":"2026-07-05","category":"Chính trị","title":"Đảng viên Dân chủ Mallory McMorrow rút khỏi cuộc đua Thượng viện Michigan, để lại cuộc đối đầu tả–trung","summary":"Bà Mallory McMorrow ở Michigan tuyên bố dừng chiến dịch tranh cử sơ bộ Thượng viện, đưa cuộc bầu cử sơ bộ tháng Tám thành màn so găng giữa phe cấp tiến Abdul El-Sayed (được Bernie Sanders và Alexandria Ocasio-Cortez ủng hộ) và phe trung dung Haley Stevens (được lãnh đạo Chuck Schumer hậu thuẫn). Đảng Dân chủ phải giữ được ghế này để có cơ hội giành quyền kiểm soát Thượng viện.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/us-news/2026/jul/05/mallory-mcmorrow-drops-out-senate-race-michigan"},{"date":"2026-07-05","category":"Ngoại giao","title":"Putin gọi điện chúc mừng Trump nhân Quốc khánh Mỹ, hai bên bàn về Ukraine và Iran","summary":"Theo trợ lý đối ngoại Điện Kremlin Yuri Ushakov, Tổng thống Nga Vladimir Putin và Tổng thống Mỹ Donald Trump điện đàm 85 phút hôm thứ Bảy, thảo luận giải pháp cho Ukraine trước thềm thượng đỉnh NATO tại Thổ Nhĩ Kỳ (7-8/7); các đặc phái viên Steve Witkoff và Jared Kushner sẵn sàng tới Moscow.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/world/russia-central-asia/article/3359445/putin-and-trump-discuss-ukraine-iran-us-independence-day-call"},{"date":"2026-07-04","category":"Chính trị","title":"Phó tổng thống Mỹ JD Vance: 'Nước Anh tuyệt vời nhưng đã bị giới lãnh đạo làm cho thất vọng'","summary":"Trong bài phỏng vấn độc quyền với The Times (Katy Balls), Phó tổng thống Mỹ JD Vance nói về tình trạng hỗn loạn chính trị ở Anh, lý do ông cho rằng Ukraine giờ đang có lợi thế chiến thuật, và hành trình tìm lại đức tin của mình.","sourceName":"The Times","sourceUrl":"https://www.thetimes.com/us/american-politics/article/jd-vance-interview-katy-balls-gv9z738fc"},{"date":"2026-07-04","category":"Kinh tế","title":"'Biển nợ' của nước Mỹ đang thổi bùng áp lực buộc phải tăng lãi suất","summary":"Nhà bình luận kinh tế Irwin Stelzer cảnh báo dư nợ thẻ tín dụng của Mỹ đã tăng 63% kể từ đại dịch, đặt câu hỏi liệu khối nợ phình to có đẩy nền kinh tế tới một điểm ngoặt then chốt hay không.","sourceName":"The Times","sourceUrl":"https://www.thetimes.com/business/economics/article/borrowing-us-rate-rise-n2rjsxndr"},{"date":"2026-07-04","category":"Công nghệ quân sự","title":"Saronic hạ thuỷ tàu mặt nước không người lái Mirage đầu tiên dài 16 mét, tầm hoạt động trên 2.500 hải lý","summary":"Saronic công bố hạ thuỷ chiếc Mirage đầu tiên vào ngày 2/7/2026, một tàu mặt nước tự hành (ASV) dài 52 ft (16 m) đạt tốc độ trên 35 hải lý/giờ, tầm hoạt động vượt 2.500 hải lý và tải trọng 3.500 pound. Mirage là nền tảng chủ lực thứ ba của hãng bên cạnh Corsair (24 ft) và Marauder (180 ft), được điều khiển qua nền tảng chỉ huy Echelon. Con tàu đi từ thiết kế đến hạ thuỷ trong chưa đầy một năm, hiện bắt đầu thử nghiệm trên mặt nước tại Galveston, Texas trong khi chiếc thứ hai đã lên dây chuyền.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/saronic-launches-first-mirage-16-meter-uncrewed-surface-vessel/","significance":"Thể hiện năng lực sản xuất hàng loạt tàu tự hành ở tốc độ và quy mô lớn của ngành công nghiệp Mỹ, phục vụ chiến lược hạm đội lai (hybrid fleet) với đông đảo tàu không người lái."},{"date":"2026-07-02","category":"Công nghệ quân sự","title":"80.000 nhà thầu quốc phòng Mỹ chỉ còn ~20 tháng để đạt chứng nhận an ninh mạng CMMC giữa tình trạng thiếu đơn vị đánh giá","summary":"National Defense cảnh báo cơ sở công nghiệp quốc phòng Mỹ có khoảng 20 tháng để chứng nhận ước tính 80.000 nhà thầu theo chuẩn an ninh mạng CMMC, trong khi chỉ có chưa tới 100 tổ chức được cấp phép đánh giá (khoảng 97 tính đến tháng 3). Giai đoạn 2 của CMMC bắt đầu từ 10/11 khi chứng nhận Cấp 2 trở thành điều kiện trao hợp đồng; chuẩn gồm 110 yêu cầu bảo mật theo NIST SP 800-171. Nhiều nhà thầu cần 12-18 tháng chuẩn bị, tạo khoảng cách lớn giữa cung và cầu đánh giá.","significance":"Nút thắt an ninh mạng có thể loại nhiều doanh nghiệp nhỏ khỏi chuỗi cung ứng quốc phòng Mỹ, ảnh hưởng trực tiếp tới năng lực và sức bền của cơ sở công nghiệp quốc phòng.","sourceName":"National Defense Magazine","sourceUrl":"https://www.nationaldefensemagazine.org/articles/2026/7/2/industry-should-apply-y2k-lessons-learned-to-cmmc-crunch"},{"date":"2026-06-30","category":"Công nghệ quân sự","title":"Lầu Năm Góc lập chương trình tuyển dụng \"War Force\" chiêu mộ kỹ sư AI cắm sâu tới cấp đơn vị","summary":"Lầu Năm Góc cùng Văn phòng Quản lý Nhân sự (OPM) công bố sáng kiến tuyển dụng mang tên \"War Force\" nhằm chiêu mộ chuyên gia AI và kỹ sư phần mềm cho các vị trí \"kỹ sư triển khai tiền phương\" (forward deployed engineer) cắm sâu tới cấp đơn vị. Mức lương tới gần 200.000 USD/năm cho cam kết hai năm, tìm người giỏi AI tiên phong, học máy, tự động hoá và hệ thống dữ liệu. CTO Emil Michael gọi đây là lời kêu gọi hành động theo Chiến lược Tăng tốc AI; OPM muốn tuyển \"hàng trăm\" kỹ sư, hạn nộp 17/7.","significance":"Cho thấy nỗ lực đưa nhân tài AI/phần mềm khu vực tư nhân trực tiếp vào các đơn vị tác chiến, đẩy nhanh ứng dụng AI ở cấp chiến thuật của quân đội Mỹ.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/06/30/trump-administration-announces-war-force-effort/"},{"date":"2026-06-29","category":"Công nghệ quân sự","title":"Bộ Tư lệnh Vận tải Mỹ (TRANSCOM) tìm đối tác nghiên cứu tàu thuyền tự hành chở quân, chở hàng cho tương lai","summary":"Bộ Tư lệnh Vận tải Mỹ (TRANSCOM) tìm kiếm các thoả thuận hợp tác nghiên cứu-phát triển (CRADA) để nghiên cứu tàu mặt nước tự hành (Maritime Autonomous Surface Ships - MASS) vận chuyển binh sĩ và hàng hoá trong mạng lưới cơ động toàn cầu và chuỗi cung ứng. Hạn nộp bản đề xuất (white paper) là 6/7, các CRADA dự kiến kéo dài khoảng 2 năm, tiếp nối yêu cầu của Quốc hội về kế hoạch tăng năng lực vận tải biển và giải pháp tự hành cho hậu cần trong môi trường tranh chấp.","significance":"Phản ánh việc quân đội Mỹ mở rộng tự động hoá sang lĩnh vực hậu cần - vận tải biển, hướng tới \"hậu cần trong môi trường tranh chấp\" trước nguy cơ xung đột ở Ấn Độ Dương - Thái Bình Dương.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/06/29/autonomous-cargo-moving-drone-boats-us-transportation-command/"}],"analyses":[{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân sự Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Morris lập luận rằng giới phân tích phương Tây bị bó hẹp nghiêm trọng trong việc hiểu chiến lược quân sự Trung Quốc do khó tiếp cận tài liệu học thuyết hiện hành của Quân Giải phóng Nhân dân (PLA) và phải dựa vào các nguồn tham chiếu đã lỗi thời. Sự thiếu hụt thông tin này buộc nhà hoạch định chính sách và người lập kế hoạch tác chiến phải suy đoán và 'soi gương' (mirror-imaging) thay vì dựa trên nguồn chính thống của Trung Quốc.","takeaway":"Nên khôi phục một Dịch vụ Thông tin Phát thanh Nước ngoài (FBIS) công khai, đặt tại Thư viện Quốc hội, để cung cấp bản dịch và phân tích ấn phẩm quân sự Trung Quốc cho giới nghiên cứu.","url":"https://warontherocks.com/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chiến dịch Nga tại Ukraine","outlet":"Institute for the Study of War (ISW)","author":"","title":"Đánh giá chiến dịch tấn công của Nga, ngày 2 tháng 7 năm 2026","summary":"ISW ghi nhận Nga tiến hành đợt tập kích quy mô lớn bằng 570 drone và tên lửa vào Kyiv đêm 1-2/7, khiến ít nhất 27 người chết và 91 người bị thương, trong đó phòng không Ukraine đánh chặn khoảng 476 quả. Nga đang triển khai drone động cơ phản lực nhanh hơn và đổi tần số (3.900-4.100 MHz) khiến việc đánh chặn khó hơn nhiều, trong khi trên các mặt trận Kharkiv, Donetsk và Zaporizhia lực lượng Nga tiếp tục tấn công nhưng không tiến được.","takeaway":"Chiến dịch hè-thu 2026 của Nga vẫn bế tắc về lãnh thổ, đổi lại bằng tổn thất lớn và chiến thuật tập kích drone-tên lửa ngày càng gây hại cho dân thường.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-2-2026"},{"date":"2026-07-01","region":"Trung Đông","topic":"Hizballah & Lebanon","outlet":"War on the Rocks","author":"Anthony Elghossain, Grace Wermenbol","title":"Thế lưỡng nan Hizballah: Vì sao cần một cách tiếp cận tích hợp","summary":"Hai tác giả lập luận rằng bản chất lai ghép của Hizballah - vừa là dân quân, đảng chính trị, mạng lưới dịch vụ xã hội, vừa là đường dây buôn lậu - khiến nó không thể bị hóa giải bằng những can thiệp đơn lẻ ở cấp khu vực hay địa phương. Họ cho rằng 'các giải pháp thuần khu vực hoặc thuần nội bộ đều không đủ' và cần chiến lược phối hợp giữa lãnh đạo Lebanon, các bên khu vực và giới chức Mỹ.","takeaway":"Kiềm chế Hizballah hiệu quả đòi hỏi cách tiếp cận tích hợp đồng thời trên các trục chính trị, quân sự, kinh tế và ngoại giao, thay vì các nỗ lực chắp vá.","url":"https://warontherocks.com/the-hizballah-predicament-why-an-integrated-approach-is-necessary/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Chính trị hóa tình báo Israel","outlet":"War on the Rocks","author":"Ofek Riemer, Ehud Eiran, Daniel F. Wajner","title":"Từ Shin Bet đến Mossad: Netanyahu định hình lại tình báo Israel","summary":"Các tác giả phân tích cách quan hệ giữa Netanyahu và các cơ quan tình báo Israel chuyển từ đối đầu công khai sang hợp tác bề ngoài, phản ánh sự củng cố quyền lực chính trị chứ không phải hòa giải thực chất. Những thất bại chính sách - nhất là về Iran - tạo ra vòng luẩn quẩn biến các định chế tình báo thành 'vật tế thần', biện minh cho việc chính trị hóa và làm suy yếu tính độc lập chuyên môn.","takeaway":"Sự xói mòn nguyên tắc statecraft phi đảng phái (mamlachtiut) cho thấy lãnh đạo dân túy dùng thất bại tình báo để hợp thức hóa cải tổ làm tổn hại nền quản trị dân chủ.","url":"https://warontherocks.com/from-shin-bet-to-mossad-netanyahu-reshapes-israeli-intelligence/"},{"date":"2026-06-25","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Đất hiếm & tàu ngầm Mỹ","outlet":"War on the Rocks","author":"Ryan Musto","title":"Lỗ hổng đất hiếm dưới đáy biển của Hải quân Mỹ","summary":"Musto cảnh báo chương trình tàu ngầm lớp Columbia đối mặt lỗ hổng chiến lược nghiêm trọng vì hệ thống động lực, tàng hình và dẫn đường gần như phụ thuộc hoàn toàn vào đất hiếm được tinh luyện tại Trung Quốc - nước kiểm soát khoảng 91% năng lực chế biến đất hiếm toàn cầu. Bắc Kinh đã vũ khí hóa ưu thế này bằng chu kỳ nâng giá rồi bán phá giá để làm phá sản đối thủ phương Tây (như vụ Molycorp sụp đổ năm 2015).","takeaway":"Thay vì bắt chước mô hình nhà nước nắm cổ phần của Bắc Kinh, Mỹ nên tạo tín hiệu cầu bền vững qua các khoản tài trợ DPA Title III, bảo lãnh vay và cam kết bao tiêu nhiều năm của Lầu Năm Góc để dựng chuỗi cung ứng nội địa và đồng minh trước năm 2030.","url":"https://warontherocks.com/cogs-of-war/the-u-s-navys-subsea-rare-earth-vulnerability/"}]};

  sizes.forEach(function(s){h+='<button data-fs="'+s[0]+'"'+(s[0]===curFs?' class="on"':'')+'>'+s[1]+'</button>';});
  h+='</div><div class="rp-lbl">Phông chữ (đọc tiếng Việt tốt)</div><div class="rp-fonts">';
  FONTS.forEach(function(f){h+='<button data-font="'+esc(f.s)+'" style="font-family:'+f.s+'"'+(f.s===curFont?' class="on"':'')+'>'+f.n+' <span class="vi">— '+f.note+'</span></button>';});
  h+='</div>';
  panel.innerHTML=h;
  document.body.appendChild(fab); document.body.appendChild(panel);
  fab.addEventListener('click',function(e){e.stopPropagation();panel.hidden=!panel.hidden;});
  panel.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return; e.stopPropagation();
    if(b.getAttribute('data-fs')!=null){var v=b.getAttribute('data-fs');applyFs(v);setPref('dt.fs',v);
      var ss=panel.querySelectorAll('.rp-sizes button'); for(var i=0;i<ss.length;i++)ss[i].classList.toggle('on',ss[i]===b);}
    else if(b.getAttribute('data-font')!=null){var s=b.getAttribute('data-font');applyFont(s);setPref('dt.font',s);
      var fs=panel.querySelectorAll('.rp-fonts button'); for(var j=0;j<fs.length;j++)fs[j].classList.toggle('on',fs[j]===b);}
  });
  document.addEventListener('click',function(){if(!panel.hidden)panel.hidden=true;});
}

function srcLink(o){var u=o.sourceUrl||o.url||'';var n=o.sourceName||o.outlet||u;return u?'<a class="src" href="'+esc(u)+'" target="_blank" rel="noreferrer">Nguồn ↗</a>':(n?'<span class="meta">'+esc(n)+'</span>':'');}
function card(inner){return '<div class="card">'+inner+'</div>';}
function renderCatNews(arr, note){
  arr=sortD(arr);
  var cats=[];arr.forEach(function(a){if(a.category&&cats.indexOf(a.category)<0)cats.push(a.category);});
  var items=state.wcat==='Tất cả'?arr:arr.filter(function(a){return a.category===state.wcat;});
  var chips='<div class="chips"><span class="chip'+(state.wcat==='Tất cả'?' on':'')+'" data-wcat="Tất cả">Tất cả ('+arr.length+')</span>';
  cats.forEach(function(c){var m=wmeta(c);chips+='<span class="chip'+(state.wcat===c?' on':'')+'" data-wcat="'+esc(c)+'"><i class="dot" style="background:'+m[1]+'"></i>'+m[0]+' '+esc(c)+' ('+arr.filter(function(a){return a.category===c;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){var m=wmeta(a.category);
    return card('<div class="crow"><span class="badge"><i class="dot" style="background:'+m[1]+'"></i>'+esc(a.category||'Thời sự')+'</span><span class="date">'+fmtVN(a.date)+'</span></div><div class="title">'+esc(a.title)+'</div>'+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+(a.significance?'<div class="take">'+esc(a.significance)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.sourceName||'')+'</span>'+srcLink(a)+'</div>');
  }).join(''):'<div class="empty">Chưa có tin.</div>';
  return note+chips+'<div class="list">'+cards+'</div>';
}
function renderAnalysis(){
  var arr=sortD(DATA.analyses);
  var regs=[];arr.forEach(function(a){if(a.region&&regs.indexOf(a.region)<0)regs.push(a.region);});
  var items=state.areg==='Tất cả'?arr:arr.filter(function(a){return a.region===state.areg;});
  var chips='<div class="chips"><span class="chip'+(state.areg==='Tất cả'?' on':'')+'" data-areg="Tất cả">Tất cả ('+arr.length+')</span>';
  regs.forEach(function(r){chips+='<span class="chip'+(state.areg===r?' on':'')+'" data-areg="'+esc(r)+'"><i class="dot" style="background:'+rcolor(r)+'"></i>'+esc(r)+' ('+arr.filter(function(a){return a.region===r;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){
    return card('<div class="crow"><span class="badge"><i class="dot" style="background:#7a4fb0"></i>'+esc(a.topic||'Phân tích')+'</span>'+(a.region?'<span class="date">'+esc(a.region)+'</span>':'')+'</div><div class="title">'+esc(a.title)+'</div>'+(a.takeaway?'<div class="take">'+esc(a.takeaway)+'</div>':'')+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.outlet||'')+(a.author?' · '+esc(a.author):'')+(a.date?' · '+fmtVN(a.date):'')+'</span>'+srcLink(a)+'</div>');
  }).join(''):'<div class="empty">Chưa có bài phân tích.</div>';
  return '<div class="note">Phân tích, báo cáo chiến lược từ các viện nghiên cứu (think tank) uy tín. Lọc theo khu vực.</div>'+chips+'<div class="list">'+cards+'</div>';
}
function content(){
  if(state.tab==='us')return renderCatNews(DATA.usNews,'<div class="note">Tin <b>yếu tố Mỹ</b> nổi bật trong <b>24 giờ qua</b> (giờ Mỹ) — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
  if(state.tab==='analysis')return renderAnalysis();
  return renderCatNews(DATA.worldNews,'<div class="note">Tin <b>thế giới</b> nổi bật trong <b>24 giờ qua</b> — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
}
function render(){
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thế giới'],['us','🇺🇸 Mỹ'],['analysis','🧠 Phân tích']];
  var h='<div class="wrap">';
  h+='<div class="mast"><div class="kicker">Bản tin độc lập</div><h1>'+esc(DATA.brand)+'</h1><div class="tag">'+esc(DATA.tagline)+'</div></div>';
  h+='<div class="dateline"><span>Cập nhật '+stamp+'</span><span>Tổng hợp từ nguồn mở</span></div>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<button class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</nav>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">'+esc(DATA.brand)+' — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Mỗi tin đều dẫn liên kết nguồn gốc. Không đại diện quan điểm của bất kỳ tổ chức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  if(window.scrollTo)window.scrollTo(0,0);
}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg]'):null;if(!t)return;
  if(t.getAttribute('data-tab')){state.tab=t.getAttribute('data-tab');state.wcat='Tất cả';}
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  render();
});
ensureReaderUI();
render();
</script>
</body>
</html>
