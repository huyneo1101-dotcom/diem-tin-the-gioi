<style>
:root{--fs:1}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2ec;color:#1b1b1b;font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double #1b1b1b;margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:#b3282d;font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:#6b6459;margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #d8d2c6;padding:7px 2px;font-size:calc(11.5px*var(--fs));color:#6b6459;text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;gap:2px;overflow-x:auto;margin:14px 0 16px;border-bottom:2px solid #1b1b1b}
.tb{white-space:nowrap;padding:9px 15px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:#6b6459;cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
.tb.on{color:#b3282d;border-bottom-color:#b3282d}
.note{font-size:calc(13px*var(--fs));color:#5a5349;background:#efeae0;border-left:3px solid #b3282d;padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:#fff;border:1px solid #d8d2c6;color:#6b6459;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:#1b1b1b;color:#fff;border-color:#1b1b1b}
.chip.on .dot{outline:1px solid #fff}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid #ded8cc;padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#b3282d}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:#8a8378;text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:#141414}
.sum{font-size:calc(14px*var(--fs));color:#3a352e}
.take{font-size:calc(13.5px*var(--fs));color:#1b1b1b;background:#efeae0;border-radius:2px;padding:8px 11px;margin:7px 0}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:#8a8378}
.src{font-size:calc(12.5px*var(--fs));color:#b3282d;text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.favb{margin-left:auto;background:none;border:none;cursor:pointer;font-size:calc(18px*var(--fs));line-height:1;color:#c4b48f;padding:0 2px;font-family:inherit}
.favb:hover{color:#d4a017}
.favb.on{color:#d4a017}
.filterbar{display:flex;align-items:center;gap:8px;margin:-2px 0 14px}
.filterbar span{font-size:calc(11px*var(--fs));color:#8a8378;text-transform:uppercase;letter-spacing:1px}
.dsel{font-family:inherit;font-size:calc(13px*var(--fs));padding:6px 9px;border:1px solid #d8d2c6;border-radius:3px;background:#fff;color:#1b1b1b;cursor:pointer}
.empty{color:#8a8378;text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double #1b1b1b;font-size:calc(11.5px*var(--fs));color:#8a8378;text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:#1b1b1b;color:#fff;border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:#fff;border:1px solid #d8d2c6;border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:#8a8378;margin-bottom:8px;border-bottom:1px solid #ece7dd;padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#8a8378;margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid #d8d2c6;background:#f7f5f1;border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:#1b1b1b;color:#fff;border-color:#1b1b1b}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid #d8d2c6;background:#fff;border-radius:6px;cursor:pointer;font-size:16px;color:#1b1b1b}
.rp-fonts button .vi{font-size:12px;color:#8a8378;font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:#b3282d;background:#fbeceb}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}
</style>
</head>

<script>
var DATA = {"brand":"Điểm Tin Thế Giới","tagline":"Kinh tế · Chính trị · Ngoại giao · Công nghệ quân sự — cập nhật hằng ngày","generatedAt":"2026-07-08","worldGeneratedAt":"2026-07-08","usGeneratedAt":"2026-07-08","worldNews":[{"date":"2026-07-08","category":"Ngoại giao","title":"NATO cam kết 70 tỷ euro viện trợ quân sự cho Ukraine tại thượng đỉnh Ankara","summary":"Các nước thành viên NATO xác nhận gói viện trợ trang bị, huấn luyện và hỗ trợ quốc phòng trị giá khoảng 70 tỷ euro (80 tỷ USD) cho Ukraine trong năm 2026, đặt mục tiêu duy trì mức tương đương năm 2027. Giới quan sát lưu ý phần lớn là 'đóng gói lại' các cam kết sẵn có cộng khoản vay của EU chứ không phải tiền mới, và Mỹ không góp phần tài trợ này. Đồng minh châu Âu và Canada cho biết đã tăng đầu tư quốc phòng thêm 139 tỷ USD và tái khẳng định lộ trình chi 5% GDP vào năm 2035.","sourceName":"Kyiv Post","sourceUrl":"https://www.kyivpost.com/post/79692"},{"date":"2026-07-08","category":"Chính trị","title":"Iraq cử hành tang lễ lãnh tụ tối cao Iran Khamenei bị sát hại","summary":"Lễ tang lãnh tụ tối cao Iran Ali Khamenei bắt đầu tại Iraq, linh cữu được rước qua các đường phố Najaf tới đền thờ Imam Ali trong chuỗi nghi lễ kéo dài sáu ngày. Sự kiện diễn ra giữa lúc căng thẳng Mỹ - Iran bùng phát trở lại, phản ánh tác động sâu rộng của cái chết của nhân vật quyền lực nhất Iran đối với cục diện khu vực.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/funeral-events-for-irans-slain-supreme-leader-khamenei-under-way-in-iraq"},{"date":"2026-07-08","category":"Ngoại giao","title":"Hai vụ nổ rung chuyển Damascus giữa chuyến thăm của Tổng thống Pháp Macron","summary":"Hai vụ nổ xảy ra tại trung tâm Damascus ngày 7/7 đúng lúc Tổng thống Pháp Emmanuel Macron thăm Syria, khiến một người chết và 36 người bị thương. Bộ Nội vụ Syria cho biết một quả bom được gài trong ô tô đỗ ven đường, quả còn lại trong thùng rác, phát nổ khi lực lượng chức năng tìm cách tháo gỡ. Ông Macron vẫn tiếp tục chuyến thăm, tuyên bố 'không để bị khuất phục', còn Tổng thống Syria Ahmed al-Sharaa ca ngợi 'lòng dũng cảm' của ông.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/syria-says-one-killed-36-wounded-after-damascus-blasts-during-macron-visit"},{"date":"2026-07-08","category":"Kinh tế","title":"Hơn nửa triệu người Nga vỡ nợ cá nhân giữa gánh nặng chiến tranh Ukraine","summary":"Theo một báo cáo tình báo châu Âu, hơn 500.000 người Nga tuyên bố phá sản trong năm 2025, tăng gần một phần ba so với năm trước. Nợ hộ gia đình phình to và các khoản vay rủi ro do ngân hàng Nga cấp gây sức ép lên hệ thống tài chính khi chính phủ dồn nguồn lực cho chiến tranh; khoảng 13 triệu người Nga đang gánh từ ba khoản vay trở lên và 1,7 nghìn tỷ rúp (22 tỷ USD) nợ cá nhân quá hạn. Dù vậy, giới chuyên gia cho rằng một cuộc khủng hoảng ngân hàng toàn diện khó xảy ra.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/economy/2026/7/8/why-have-half-a-million-russians-gone-bankrupt-amid-ukraine-war"},{"date":"2026-07-08","category":"Ngoại giao","title":"Mỹ - Hàn - Nhật tái khẳng định phi hạt nhân hóa Triều Tiên, siết hợp tác an ninh mạng","summary":"Bên lề thượng đỉnh NATO tại Ankara, ngoại trưởng Mỹ, Hàn Quốc và Nhật Bản trao đổi về tình hình Đông Bắc Á và Trung Đông, nhất trí tăng cường phối hợp trước các thách thức xuyên quốc gia. Ba bên cam kết duy trì hòa bình, ổn định trên bán đảo Triều Tiên thông qua đối thoại, kiên trì nguyên tắc phi hạt nhân hóa, đồng thời phối hợp ứng phó các hoạt động tấn công mạng phi pháp của Bình Nhưỡng.","sourceName":"UPI","sourceUrl":"https://www.upi.com/Top_News/World-News/2026/07/08/US-South-Korea-Japan-diplomats-trilateral-denuclearization-cyber-threat-NATO-Ankara/6231783502214/"},{"date":"2026-07-07","category":"Kinh tế","title":"Hãng tàu lớn trở lại kênh đào Suez khi Trung Đông hạ nhiệt","summary":"Maersk và Hapag-Lloyd, hai hãng vận tải container lớn thứ hai và thứ năm thế giới, thông báo nối lại hải trình qua kênh đào Suez lần đầu kể từ tháng 2 sau khi đánh giá lại an ninh Biển Đỏ. Năng lực vận tải giữa châu Á và bờ Tây nước Mỹ phục hồi lên mức kỷ lục hơn 350.000 TEU, so với 74.000 TEU hồi giữa tháng 6. Vận tải biển đảm nhận khoảng 90% thương mại toàn cầu.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/economy/2026/7/7/after-iran-war-upheaval-global-shipping-eyes-return-to-status-quo"},{"date":"2026-07-07","category":"Ngoại giao","title":"Thượng đỉnh NATO khai mạc tại Ankara giữa sức ép chi tiêu quốc phòng","summary":"Lãnh đạo toàn bộ 32 nước thành viên NATO nhóm họp tại Ankara (Thổ Nhĩ Kỳ), cùng các khách mời ngoài khối như Tổng thống Ukraine Volodymyr Zelenskyy và Tổng thống Hàn Quốc Lee Jae-myung. Hội nghị diễn ra khi Tổng thống Mỹ Donald Trump gia tăng ép các đồng minh nâng chi tiêu quốc phòng lên 5% GDP vào năm 2035. Ông Zelenskyy dự kiến gặp song phương ông Trump để đề nghị thêm hệ thống phòng không Patriot.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/7/nato-summit-begins-who-is-attending-and-what-is-at-stake"},{"date":"2026-07-07","category":"Ngoại giao","title":"Bắc Kinh bác yêu sách của Manila ở Biển Đông trước dịp kỷ niệm phán quyết La Haye 2016","summary":"Một viện nghiên cứu có liên hệ nhà nước Trung Quốc lên tiếng phản bác các yêu sách chủ quyền của Philippines ở Biển Đông, cho rằng chúng thiếu cơ sở lịch sử và pháp lý, ngay trước dịp kỷ niệm phán quyết của Tòa Trọng tài Thường trực La Haye năm 2016. Động thái phản ánh căng thẳng dai dẳng giữa hai nước quanh vùng biển tranh chấp.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/diplomacy/article/3359877/beijing-slams-manila-over-south-china-sea-claims-ahead-2016-hague-anniversary"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Vụ thử tên lửa từ tàu ngầm của Trung Quốc và tham vọng mở rộng bộ ba hạt nhân","summary":"Trung Quốc tiến hành thử tên lửa phóng từ tàu ngầm, được giới phân tích xem là tín hiệu về bước chuyển năng lực quân sự gửi tới cả khu vực lẫn toàn cầu. Vụ thử đặt ra câu hỏi về tốc độ Bắc Kinh mở rộng bộ ba hạt nhân (trên bộ, trên biển, trên không) trong bối cảnh cạnh tranh chiến lược với Mỹ.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/military/article/3359762/what-does-chinas-submarine-missile-test-mean-its-nuclear-triad-expansion","significance":"Năng lực răn đe hạt nhân trên biển giúp Trung Quốc bảo đảm đòn đánh trả thứ hai, làm thay đổi cân bằng chiến lược Mỹ - Trung ở Ấn Độ Dương - Thái Bình Dương."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Tranh cãi ngân sách đe dọa kế hoạch lá chắn phòng không 'T-Dome' của Đài Loan","summary":"Kế hoạch phòng không nhiều tầng 'T-Dome' của Đài Loan gặp trở ngại khi hệ thống 'Strong Bow' không được đưa vào gói ngân sách quốc phòng bổ sung do vướng mắc chính trị nội bộ. Bế tắc phân bổ ngân sách làm dấy lo ngại về khả năng Đài Bắc kịp xây dựng lá chắn tên lửa trước sức ép quân sự gia tăng từ Bắc Kinh.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/military/article/3359754/enemy-within-dispute-endangering-taiwans-t-dome-air-defence-plan","significance":"Sự chậm trễ trong phòng không đa tầng khoét sâu điểm yếu của Đài Loan trước kho tên lửa đạn đạo và hành trình ngày càng lớn của Trung Quốc."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Trung Quốc học hỏi kinh nghiệm cứu hộ tàu ngầm của Nga trong diễn tập ở Hoàng Hải","summary":"Hải quân Trung Quốc mở rộng hợp tác với Nga sang lĩnh vực cứu hộ tàu ngầm trong các cuộc diễn tập chung ở Hoàng Hải. Việc tiếp thu năng lực cứu hộ dưới nước cho thấy quan hệ quân sự Bắc Kinh - Moscow ngày càng đi vào chiều sâu kỹ thuật, giữa lúc phương Tây cảnh báo về liên kết Trung - Nga.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/news/china/military/article/3359880/china-eyes-russian-naval-expertise-yellow-sea-submarine-rescue-drills","significance":"Cứu hộ tàu ngầm là mắt xích hỗ trợ cho lực lượng tàu ngầm hạt nhân đang mở rộng của Trung Quốc, phản ánh chiều sâu hợp tác quốc phòng Trung - Nga."},{"date":"2026-07-06","category":"Chính trị","title":"Thượng viện Philippines mở phiên xét xử luận tội Phó Tổng thống Duterte","summary":"Các nghị sĩ Philippines bắt đầu cân nhắc chứng cứ trong phiên tòa có thể phế truất Phó Tổng thống Sara Duterte, với hàng nghìn cảnh sát bố trí quanh Thượng viện ở Manila. Hạ viện đã luận tội bà Duterte, 48 tuổi, con gái cựu Tổng thống Rodrigo Duterte, hồi tháng 5 với các cáo buộc tham nhũng, hối lộ và âm mưu ám sát Tổng thống Ferdinand Marcos. Phiên xử định đoạt tương lai chính trị của một trong những nhân vật gây tranh cãi nhất nước.","sourceName":"France 24","sourceUrl":"https://www.france24.com/en/live-news/20260706-philippine-senate-trial-to-decide-vp-duterte-s-political-future"},{"date":"2026-07-06","category":"Ngoại giao","title":"Tổng thống Pháp Macron thăm Syria trước thềm thượng đỉnh NATO","summary":"Tổng thống Pháp Emmanuel Macron tới Damascus tối thứ Hai, trở thành lãnh đạo Tây Âu đầu tiên thăm Syria kể từ khi chính quyền Bashar al-Assad sụp đổ năm 2024. Ông được Ngoại trưởng Asaad al-Shaibani đón, tuyên bố Pháp cam kết với “một Syria có chủ quyền, thống nhất trong đa dạng”. Macron đi cùng phái đoàn doanh nghiệp bàn về an ninh khu vực và cơ hội đầu tư, rồi cùng Tổng thống al-Sharaa sang Ankara dự thượng đỉnh NATO.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/6/macron-arrives-in-syria-for-talks-ahead-of-nato-summit-in-turkiye"},{"date":"2026-07-06","category":"Kinh tế","title":"OPEC+ tiếp tục tăng sản lượng dầu tháng thứ năm liên tiếp","summary":"Bảy nước OPEC+ gồm Saudi Arabia, Nga, Iraq, Kuwait, Kazakhstan, Algeria và Oman nhất trí nâng sản lượng thêm 188.000 thùng/ngày từ tháng 8, đánh dấu lần tăng thứ năm liên tiếp khi nhóm dần đảo ngược mức cắt giảm năm 2023. Động thái diễn ra giữa lúc thị trường năng lượng phục hồi sau xung đột Iran, giá dầu Brent về lại mức trước chiến sự khi vận tải qua eo biển Hormuz dần bình thường trở lại.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/economy/2026/7/6/opec-countries-say-they-will-expand-monthly-oil-production"},{"date":"2026-07-06","category":"Chính trị","title":"NATO họp thượng đỉnh tại Thổ Nhĩ Kỳ giữa nhiều rạn nứt","summary":"Lãnh đạo NATO nhóm họp tại Ankara để bàn tăng chi tiêu quốc phòng, mở rộng nền công nghiệp quốc phòng châu Âu và duy trì hỗ trợ quân sự cho Ukraine. Hội nghị bị phủ bóng bởi căng thẳng giữa Mỹ và các đồng minh châu Âu quanh việc Washington chỉ trích mức chi tiêu và dọa giảm hiện diện quân sự; giới chuyên gia cho rằng liên minh chưa đến mức tan vỡ nhưng đang bước vào 'giai đoạn điều chỉnh sâu sắc' khi châu Âu tìm cách tự chủ chiến lược.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/6/is-nato-at-breaking-point-as-it-meets-in-turkiye"},{"date":"2026-07-06","category":"Chính trị","title":"Trung Quốc thử tên lửa ở Nam Thái Bình Dương, Úc - New Zealand - Nhật phản đối","summary":"Quân đội Trung Quốc phóng thử một tên lửa đạn đạo tầm xa từ tàu ngầm hạt nhân ở Nam Thái Bình Dương hôm thứ Hai, gọi đây là hoạt động huấn luyện thường lệ. Ngoại trưởng Úc mô tả hành động này là 'gây bất ổn' khu vực và lo ngại về sự thiếu minh bạch trong tăng cường quân sự của Bắc Kinh; Nhật Bản và New Zealand cũng bày tỏ quan ngại, khẳng định không muốn Nam Thái Bình Dương trở thành nơi thử nghiệm năng lực tên lửa.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/6/china-missile-test-draws-criticism-from-australia-new-zealand-japan"},{"date":"2026-07-06","category":"Chính trị","title":"Bạo loạn nhà tù ở Sri Lanka khiến ít nhất 26 người chết","summary":"Bạo lực bùng phát tại nhà tù Negombo, cách Colombo khoảng 35 km về phía bắc, từ Chủ nhật và leo thang vào thứ Hai khi các nhóm tù nhân đối địch ẩu đả trong giờ ăn sáng. Ít nhất 26 người thiệt mạng, trong đó có 6 quản giáo, cùng hơn 100 người bị thương; nhà chức trách cho rằng vụ việc liên quan buôn bán ma túy và đã lập tổ điều tra do một cựu thẩm phán Tòa Tối cao dẫn đầu để làm rõ vụ bạo loạn nhà tù tồi tệ nhất nhiều năm qua.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/6/at-least-19-people-killed-in-sri-lanka-prison-clashes"},{"date":"2026-07-06","category":"Kinh tế","title":"Vì sao Trung Quốc tiếp quản Ngân hàng Zhongbang – dấu hiệu căng thẳng tài chính tiềm ẩn","summary":"Cơ quan quản lý Trung Quốc đã tiếp quản Ngân hàng Zhongbang có trụ sở tại Vũ Hán do 'rủi ro tín dụng nghiêm trọng' bắt nguồn từ việc mở rộng ồ ạt và quản trị yếu kém. Vụ can thiệp phơi bày điểm yếu chung của các ngân hàng khu vực nhỏ ở Trung Quốc, khi ngân hàng trung ương đã gắn cờ 312 tổ chức tín dụng có hồ sơ rủi ro cao.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/economy/china-economy/article/3359618/why-china-took-over-zhongbang-bank-and-what-it-says-about-hidden-financial-stress"},{"date":"2026-07-06","category":"Kinh tế","title":"Kẹt giữa Mỹ và Trung Quốc, châu Âu chật vật tìm lối đi riêng","summary":"Các lãnh đạo châu Âu tề tựu tại diễn đàn kinh tế thường niên ở Aix-en-Provence (Pháp) để bàn về vị thế mong manh của lục địa giữa căng thẳng Mỹ - Trung. Hội nghị đồng thuận rằng châu Âu đang bị đe dọa về an ninh, công nghệ, dân chủ và công nghiệp, kêu gọi hội nhập nhanh hơn và phát triển thị trường vốn.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/economy/global-economy/article/3359571/caught-between-us-and-china-squeezed-europe-strives-find-its-way"},{"date":"2026-07-06","category":"Kinh tế","title":"Hồng Kông nhắm cải tổ luật chứng khoán 2026 để thúc đẩy REIT và IPO","summary":"Hồng Kông dự kiến sửa đổi luật chứng khoán vào cuối năm 2026 nhằm củng cố vị thế trung tâm tài chính, thu hút thêm doanh nghiệp và quỹ tín thác bất động sản (REIT) niêm yết. Các thay đổi sẽ trao cho Ủy ban Chứng khoán và Hợp đồng tương lai quyền linh hoạt hơn khi xử lý hồ sơ cùng năng lực thực thi được tăng cường, đồng thời nâng cao minh bạch và bảo vệ nhà đầu tư.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/business/article/3359553/hong-kong-targets-2026-securities-law-overhaul-boost-reits-ipos"},{"date":"2026-07-06","category":"Kinh tế","title":"Cabo Verde gây tiếng vang tại World Cup – với cú hích kinh tế từ Trung Quốc","summary":"Cabo Verde lần đầu dự World Cup 2026, để thua Argentina 2-3 trong hiệp phụ nhưng vẫn giành được sự ngưỡng mộ toàn cầu nhờ màn trình diễn quả cảm. Trung Quốc hỗ trợ đáng kể cho hành trình của đội tuyển này khi sản xuất giày cho thủ môn và tài trợ xây sân vận động nơi đội tập luyện và thi đấu trận vòng loại lịch sử.","sourceName":"South China Morning Post","sourceUrl":"https://www.scmp.com/economy/china-economy/article/3359612/cabo-verde-wows-world-cup-economic-assist-china"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Thales thâu tóm hãng drone ngầm Exail của Pháp trong thương vụ 4,5 tỷ USD","summary":"Thales đồng ý mua 35,5% cổ phần hãng chế tạo drone ngầm Exail Technologies của Pháp từ gia đình Gorgé và sẽ chào mua phần còn lại với giá 134 euro/cổ phiếu, cao hơn 44% so với giá đóng cửa trước đó. Thương vụ 3,9 tỷ euro giúp Thales củng cố năng lực tác chiến dưới nước và mở rộng chuyên môn hệ thống dẫn đường quán tính trong thị trường rà phá thủy lôi không người lái đang tăng trưởng. Cùng lúc, hãng đóng tàu Ý Fincantieri công bố chi 600 triệu euro mua bốn công ty drone hàng hải.","significance":"Làn sóng hợp nhất công nghiệp quốc phòng châu Âu quanh drone ngầm phản ánh cuộc đua mới với Mỹ và Trung Quốc trong tác chiến tự động dưới biển.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/06/thales-to-buy-french-underwater-drone-maker-exail-in-45-billion-deal/"}],"usNews":[{"date":"2026-07-08","category":"Ngoại giao","title":"Trump tuyên bố lệnh ngừng bắn với Iran 'chấm dứt' sau khi hai bên đánh nhau trở lại","summary":"Tại thượng đỉnh NATO ở Ankara, Tổng thống Mỹ Donald Trump tuyên bố lệnh ngừng bắn với Iran đã 'chấm dứt' sau các đợt tấn công qua lại ở vùng Vịnh. Mỹ nã hơn 80 mục tiêu sau khi Iran tấn công ba tàu ở eo biển Hormuz, còn Vệ binh Cách mạng Iran đáp trả nhằm vào 85 vị trí quân sự Mỹ ở Bahrain và Kuwait. Dù nói 'tôi nghĩ là đã kết thúc', ông Trump vẫn để ngỏ khả năng đàm phán tiếp; diễn biến đe dọa thỏa thuận ngừng bắn hồi tháng 4.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/trump-says-ceasefire-over-after-us-iran-trade-attacks"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump dọa cắt quan hệ thương mại với Tây Ban Nha, đòi Mỹ tiếp quản Greenland tại NATO","summary":"Tại thượng đỉnh NATO ở Ankara, Tổng thống Trump chỉ trích gay gắt các đồng minh, gọi Tây Ban Nha là 'đối tác tồi tệ' vì cách hành xử trong cuộc chiến Mỹ - Israel với Iran và dọa cắt quan hệ thương mại. Ông cũng nhắc lại đòi hỏi Mỹ tiếp quản Greenland, khoét sâu chia rẽ trong khối quanh vấn đề chi tiêu quốc phòng và chiến tranh Ukraine.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/trump-threatens-spain-trade-demands-us-take-over-greenland-at-nato-summit"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"GAO: Các chương trình vũ khí siêu vượt âm của Lầu Năm Góc chật vật vì chậm tiến độ và sản xuất","summary":"Báo cáo thường niên của Cơ quan Kiểm toán Chính phủ Mỹ (GAO) chỉ ra rủi ro lớn ở ba chương trình vũ khí siêu vượt âm. Không quân buộc phải cắt số lần bay thử tên lửa hành trình tấn công siêu vượt âm (HACM) từ bảy xuống năm do chậm hoàn thiện thiết kế. Nút thắt sản xuất ở Lục quân và Hải quân khiến việc bàn giao khẩu đội LRHW thứ hai của Lục quân trễ ít nhất sáu tháng.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/07/gao-pentagon-hypersonic-programs-schedule-constraints-production-woes/","significance":"Chậm trễ vũ khí siêu vượt âm nới rộng khoảng cách với Trung Quốc và Nga trong lĩnh vực được xem là then chốt của răn đe thế hệ mới."},{"date":"2026-07-06","category":"Kinh tế","title":"Microsoft cắt 4.800 việc làm, tách bốn studio game khỏi mảng Xbox","summary":"Microsoft thông báo hôm 6/7 sẽ cắt ngay 4.800 việc làm, tương đương 2,1% nhân sự, trong nỗ lực giảm chi phí giữa thời đại trí tuệ nhân tạo (AI). Mảng Xbox chịu tổng cộng 3.200 vị trí bị cắt, một nửa nằm trong đợt này, phần còn lại rải trong năm tài chính 2027. Hãng cũng tách bốn studio game ra độc lập, khi doanh thu Windows, Surface và Xbox sụt giảm.","sourceName":"CNBC","sourceUrl":"https://www.cnbc.com/2026/07/06/microsoft-cuts-2point1percent-of-employees-as-xbox-unit-plans-to-spin-studios.html"},{"date":"2026-07-06","category":"Chính trị","title":"JD Vance củng cố vị thế người kế nhiệm của ông Trump sau mùa hè thuận lợi","summary":"Axios nhận định Phó Tổng thống JD Vance đang có mùa hè thuận lợi, giúp định vị ông là người thừa kế chính trị không thể tranh cãi của Tổng thống Trump nếu tranh cử năm 2028. Ông Vance ra sách bán chạy, góp phần môi giới thỏa thuận hòa bình sơ bộ với Iran, đẩy mạnh truyền thông và huy động khoảng 70 triệu USD cho Ủy ban Quốc gia đảng Cộng hòa (RNC) — mạng lưới quan trọng nếu ông ra tranh cử.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/06/vance-summer-trump-heir"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Hải quân Mỹ kết thúc tìm kiếm thủy thủ mất tích trên biển Arab","summary":"Hải quân Mỹ hôm 6/7 ngừng chiến dịch tìm kiếm một thủy thủ mất tích sau khi trực thăng MH-60S thuộc tàu sân bay USS George H.W. Bush (CVN-77) hạ cánh khẩn cấp xuống biển Arab. Cuộc tìm kiếm kéo dài bốn ngày, bao phủ 14.000 dặm vuông, huy động cả Không quân, tàu sân bay USS Abraham Lincoln (CVN-72) và các khu trục hạm USS Ross, Donald Cook, Higgins, Mason và John Finn.","sourceName":"USNI News","sourceUrl":"https://news.usni.org/2026/07/06/navy-ends-search-for-missing-george-h-w-bush-sailor-in-arabian-sea","significance":"Phản ánh cường độ hoạt động và rủi ro của các nhóm tác chiến tàu sân bay Mỹ tại vùng Vịnh giữa lúc căng thẳng với Iran."},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Lầu Năm Góc trao gói thầu 80 triệu USD cho hệ thống AI bảo vệ căn cứ Không quân trước drone nhỏ","summary":"AeroVironment nhận đơn đặt hàng trị giá 80,5 triệu USD — gói đầu tiên trong hợp đồng khung 500 triệu USD của Lầu Năm Góc — để cung cấp hệ thống chống drone dùng AI bảo vệ các căn cứ của Bộ Tư lệnh Tấn công Toàn cầu Không quân. Nền tảng Titan-MS dùng thuật toán AI và học máy để phát hiện, nhận dạng và vô hiệu hóa mối đe dọa từ máy bay không người lái qua nhiều loại cảm biến. Nỗ lực này thuộc sáng kiến Domestic Shield do lực lượng đặc nhiệm JIATF-401 của Lục quân dẫn dắt.","significance":"Phản ánh việc Mỹ chuyển từ mua sắm lẻ tẻ sang triển khai đại trà lá chắn AI chống drone cho các căn cứ trong nước sau hàng loạt sự cố xâm nhập UAS.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/06/pentagon-awards-task-order-to-av-for-titan-drone-defense/"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Báo cáo giám sát: các chương trình vũ khí lớn nhất của Lầu Năm Góc chậm tiến độ 12 năm","summary":"Văn phòng Trách nhiệm Giải trình Chính phủ (GAO) phát hiện 104 chương trình vũ khí đắt đỏ nhất của Lầu Năm Góc hiện mất trung bình hơn 12 năm để đưa vào sử dụng, với tình trạng trễ tiến độ triền miên trên diện rộng. Báo cáo chỉ ra nhiều hệ thống bị đưa vào quy trình mua sắm nhanh dù công nghệ chưa hoàn thiện, làm hỏng mục tiêu triển khai nhanh. Các chương trình như drone MQ-25 Stingray của Hải quân và khu trục hạm DDG(X) đối mặt trễ hạn đáng kể.","significance":"Cho thấy điểm yếu cốt lõi trong năng lực trang bị vũ khí của Mỹ, đe dọa khả năng cạnh tranh quân sự với Trung Quốc trong thập kỷ tới.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/pentagon-congress/2026/07/06/pentagons-top-new-weapons-programs-are-12-years-behind-schedule-watchdog/"},{"date":"2026-07-06","category":"Kinh tế","title":"Trump rung chuông Sàn chứng khoán New York từ Nhà Trắng, khởi động ngày giao dịch đầu tiên của 'Trump accounts'","summary":"Tổng thống Donald Trump rung chuông mở cửa Sàn NYSE ngay tại Phòng Bầu dục để đánh dấu ngày giao dịch đầu tiên của 'tài khoản Trump' (Trump accounts) — chương trình cấp cho mỗi trẻ em sinh 2025–2028 khoản đầu tư 1.000 USD do liên bang tài trợ, lập qua Đạo luật One Big Beautiful Bill. Nhà sáng lập Dell góp 6,25 tỷ USD và CEO SpaceX Gwynne Shotwell góp 350 triệu USD cho quỹ.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/us-news/2026/jul/06/trump-accounts-trading-day-new-york-stock-exchange"},{"date":"2026-07-06","category":"Chính trị","title":"Tòa liên bang bác đơn xin hoãn của Trump, buộc thi hành khoản bồi thường 5,8 triệu USD cho E Jean Carroll","summary":"Thẩm phán liên bang Lewis Kaplan ra lệnh một câu bác yêu cầu của Tổng thống Trump xin gia hạn thanh toán khoản bồi thường dân sự 5,8 triệu USD cho nhà báo E Jean Carroll — người mà bồi thẩm đoàn New York kết luận đã bị Trump xâm hại tình dục năm 1996 và phỉ báng năm 2019. Diễn biến này đến sau khi Tòa Tối cao từ chối xem lại phán quyết.","sourceName":"The Guardian","sourceUrl":"https://www.theguardian.com/us-news/2026/jul/06/trump-denies-delay-e-jean-carroll-judgment-payment"},{"date":"2026-07-06","category":"Chính trị","title":"Siêu ủy ban MAGA Inc. của Trump ôm 350 triệu USD, phe Cộng hòa sốt ruột đòi chi cho bầu cử giữa kỳ","summary":"Nhiều nhà tài trợ và chiến lược gia Cộng hòa thúc giục Tổng thống Trump giải ngân hơn 350 triệu USD trong siêu ủy ban hành động chính trị MAGA Inc. để hỗ trợ ứng viên bầu cử giữa kỳ, nhưng MAGA Inc. chưa công bố kế hoạch chi tiêu và chưa rót tiền trực tiếp vào cuộc đua nào kể từ tháng Ba. Một quan chức Nhà Trắng nói quyết định 'không cần đưa ra trước đại hội đảng' ngày 9/9.","sourceName":"Politico","sourceUrl":"https://www.politico.com/news/2026/07/06/maga-donors-trump-spending-midterms-00985987"},{"date":"2026-07-06","category":"Chính trị","title":"Bộ trưởng An ninh Nội địa mới Markwayne Mullin âm thầm hóa chiến dịch trấn áp nhập cư, chấm dứt 'kịch tính' thời Noem","summary":"Sau ba tháng nhậm chức, Bộ trưởng An ninh Nội địa (DHS) Markwayne Mullin theo đuổi cách tiếp cận kín tiếng hơn: giảm bắt giữ công khai, hủy kế hoạch mở rộng nhà kho làm nơi giam giữ, và loại bỏ nhiều quan chức thời Kristi Noem. Chính quyền vẫn cam kết 'trục xuất hàng loạt' nhưng muốn tránh làn sóng biểu tình, nhất là sau vụ nhân viên nhập cư bắn chết hai công dân Mỹ ở Minneapolis.","sourceName":"Politico","sourceUrl":"https://www.politico.com/news/2026/07/06/mullins-mark-on-dhs-ending-the-drama-noem-unleashed-00985012"},{"date":"2026-07-06","category":"Ngoại giao","title":"Ông Trump lên đường dự thượng đỉnh NATO tại Ankara sau các đòn không kích chết chóc của Nga vào Kyiv","summary":"Tổng thống Donald Trump khởi hành tới hội nghị thượng đỉnh NATO ở Ankara (Thổ Nhĩ Kỳ), nơi các đòn tấn công mới của Nga có thể phủ bóng lên đàm phán. An ninh eo biển Hormuz và việc Mỹ 'điều chỉnh lại' đóng góp cho NATO nằm trong các chủ đề dự kiến; ông Trump nói đi dự vì tôn trọng Tổng thống Erdogan.","sourceName":"CNN","sourceUrl":"https://edition.cnn.com/2026/07/06/world/video/today-president-trump-heads-to-nato-summit-after-deadly-russian-strikes-on-kyiv-cnc"},{"date":"2026-07-06","category":"Chính trị","title":"Ông Trump nói đã đề nghị chủ tịch FIFA xem lại thẻ đỏ dành cho tiền đạo tuyển Mỹ Folarin Balogun","summary":"Tổng thống Donald Trump cho biết ông đích thân đề nghị Chủ tịch FIFA Gianni Infantino xem xét lại quyết định rút thẻ đỏ và án treo giò một trận với ngôi sao tuyển Mỹ Folarin Balogun tại World Cup, làm dấy lên tranh cãi về việc tổng thống can thiệp vào giải đấu.","sourceName":"CNN","sourceUrl":"https://www.cnn.com/2026/07/06/politics/trump-red-card-fifa-world-cup-balogun"},{"date":"2026-07-06","category":"Kinh tế","title":"Việc làm Mỹ trái chiều: thất nghiệp giảm còn 4,2%, Fed nghiêng về giữ lãi suất","summary":"Báo cáo việc làm tháng 6 của Mỹ cho thấy tăng trưởng việc làm thấp hơn dự báo nhưng tỷ lệ thất nghiệp giảm còn 4,2%, giúp xoa dịu lo ngại suy thoái đồng thời giảm áp lực cắt giảm lãi suất sớm. Lạm phát vẫn cao hơn mục tiêu 2% do các cú sốc nguồn cung, đặc biệt ở năng lượng; thị trường hiện định giá khả năng có ít nhất một đợt tăng 25 điểm cơ bản trong năm 2026. Fed giữ lãi suất ở 3,50%-3,75% tại cuộc họp tháng 6.","sourceName":"Penn Mutual Asset Management","sourceUrl":"https://www.pennmutualam.com/market-insights-news/blogs/monday-morning-perspectives/2026-07-06-mixed-jobs-data-falling-yields-and-fed-watch-in-focus"},{"date":"2026-07-04","category":"Công nghệ quân sự","title":"Saronic hạ thuỷ tàu mặt nước không người lái Mirage đầu tiên dài 16 mét, tầm hoạt động trên 2.500 hải lý","summary":"Saronic công bố hạ thuỷ chiếc Mirage đầu tiên vào ngày 2/7/2026, một tàu mặt nước tự hành (ASV) dài 52 ft (16 m) đạt tốc độ trên 35 hải lý/giờ, tầm hoạt động vượt 2.500 hải lý và tải trọng 3.500 pound. Mirage là nền tảng chủ lực thứ ba của hãng bên cạnh Corsair (24 ft) và Marauder (180 ft), được điều khiển qua nền tảng chỉ huy Echelon. Con tàu đi từ thiết kế đến hạ thuỷ trong chưa đầy một năm, hiện bắt đầu thử nghiệm trên mặt nước tại Galveston, Texas trong khi chiếc thứ hai đã lên dây chuyền.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/saronic-launches-first-mirage-16-meter-uncrewed-surface-vessel/","significance":"Thể hiện năng lực sản xuất hàng loạt tàu tự hành ở tốc độ và quy mô lớn của ngành công nghiệp Mỹ, phục vụ chiến lược hạm đội lai (hybrid fleet) với đông đảo tàu không người lái."},{"date":"2026-07-02","category":"Công nghệ quân sự","title":"80.000 nhà thầu quốc phòng Mỹ chỉ còn ~20 tháng để đạt chứng nhận an ninh mạng CMMC giữa tình trạng thiếu đơn vị đánh giá","summary":"National Defense cảnh báo cơ sở công nghiệp quốc phòng Mỹ có khoảng 20 tháng để chứng nhận ước tính 80.000 nhà thầu theo chuẩn an ninh mạng CMMC, trong khi chỉ có chưa tới 100 tổ chức được cấp phép đánh giá (khoảng 97 tính đến tháng 3). Giai đoạn 2 của CMMC bắt đầu từ 10/11 khi chứng nhận Cấp 2 trở thành điều kiện trao hợp đồng; chuẩn gồm 110 yêu cầu bảo mật theo NIST SP 800-171. Nhiều nhà thầu cần 12-18 tháng chuẩn bị, tạo khoảng cách lớn giữa cung và cầu đánh giá.","significance":"Nút thắt an ninh mạng có thể loại nhiều doanh nghiệp nhỏ khỏi chuỗi cung ứng quốc phòng Mỹ, ảnh hưởng trực tiếp tới năng lực và sức bền của cơ sở công nghiệp quốc phòng.","sourceName":"National Defense Magazine","sourceUrl":"https://www.nationaldefensemagazine.org/articles/2026/7/2/industry-should-apply-y2k-lessons-learned-to-cmmc-crunch"}],"analyses":[{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Chiến tranh Nga - Ukraine","outlet":"Institute for the Study of War (ISW)","author":"Christina Harward, Jennie Olmsted, Tetiana Trach, Anna Thacker, Karolina Hird","title":"Đánh giá chiến dịch tấn công của Nga, ngày 6/7/2026","summary":"ISW ghi nhận Nga vừa thực hiện đợt tập kích tên lửa - drone quy mô lớn thứ tư kể từ 1/6, phóng tổng cộng 419 quả nhắm chủ yếu vào Kyiv, gây hàng chục thương vong dân thường. Nga khai thác việc Ukraine cạn kho đạn đánh chặn bằng cách dồn tên lửa đạn đạo trong mỗi gói tấn công. Đợt đánh diễn ra ngay trước thượng đỉnh NATO (7-8/7) nhằm phô trương sức ép. Đáp lại, Ukraine tập kích nhà máy lọc dầu lớn nhất của Nga ở Omsk, cách biên giới hơn 2.500 km.","takeaway":"Nga leo thang tập kích chiến lược và khiêu khích NATO để tạo áp lực trước thềm thượng đỉnh, trong khi Ukraine chứng minh năng lực đánh sâu chưa từng có.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-6-2026"},{"date":"2026-07-06","region":"Trung Đông","topic":"Hành lang thương mại - năng lượng","outlet":"Atlantic Council","author":"Allison Minor","title":"Các hành lang mới ở Trung Đông không chỉ để né eo biển Hormuz","summary":"Minor phân tích làn sóng dự án hạ tầng đường sắt, đường ống và logistics trên bộ đang nổi lên khắp Trung Đông sau những gián đoạn ở eo biển Hormuz. Saudi Arabia, UAE và Oman mở rộng mạng lưới đường sắt và trung tâm trung chuyển, trong khi Hành lang Ấn Độ - Trung Đông - châu Âu (IMEC) cần tái cấu trúc theo cách tiếp cận 'mạng lưới' thay vì một tuyến đơn lẻ. Thành công đòi hỏi tích hợp hải quan số, hài hòa quy định và cam kết chính trị bền vững, thậm chí mở ra một 'hành lang điện toán'.","takeaway":"Các hành lang này vượt xa mục tiêu né chốt chặn hàng hải, mở ra cơ hội đa dạng hóa kinh tế và hội nhập khu vực nếu có quản trị đủ mạnh.","url":"https://www.atlanticcouncil.org/blogs/menasource/new-middle-east-corridors-are-about-more-than-just-bypassing-the-strait-of-hormuz/"},{"date":"2026-07-06","region":"Đông Á","topic":"Trật tự toàn cầu - Trung Quốc","outlet":"The Diplomat","author":"","title":"Thời cơ để Trung Quốc định hình trật tự toàn cầu mới","summary":"Bài phân tích cho rằng chuyến thăm Bắc Kinh giữa tháng 5 của Tổng thống Mỹ Donald Trump đã bộc lộ một động lực mới trong quan hệ Mỹ - Trung, khi Bắc Kinh thể hiện vai trò chủ động hơn trong việc định hình quan hệ song phương. Theo tác giả, chuỗi tiếp xúc ngoại giao gần đây đưa Trung Quốc vào trung tâm sân khấu thế giới và củng cố năng lực định hình trật tự quốc tế, thay vì chỉ tuyên bố tham vọng. Bắc Kinh đang chuyển từ thế phòng thủ sang chủ động dẫn dắt chương trình nghị sự khu vực và toàn cầu.","takeaway":"Trung Quốc đang tận dụng thế chủ động ngoại giao mới để chuyển từ tuyên bố tham vọng sang thực sự định hình trật tự quốc tế.","url":"https://thediplomat.com/2026/07/chinas-moment-to-shape-a-new-global-order/"},{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Châu Mỹ","topic":"Thương mại Bắc Mỹ","outlet":"CSIS","author":"Diego Marroquín Bitar, Kellie Meiman Hock, Eric Miller, Juan Carlos Baker, William Alan Reinsch","title":"Mỹ chọn không gia hạn Hiệp định USMCA","summary":"Ngày 1/7/2026, Mỹ từ chối gia hạn USMCA thêm 16 năm, thay vào đó kích hoạt cơ chế rà soát hằng năm kéo dài đến 2036; hiệp định vẫn duy trì theo điều khoản hiện hành nhưng không có lộ trình đàm phán rõ ràng. Năm chuyên gia CSIS cảnh báo quyết định này tạo ra bất định kéo dài cho chuỗi cung ứng và đầu tư khắp Bắc Mỹ. Quan hệ Mỹ - Canada xuống mức thấp lịch sử; các vấn đề gỗ, sữa, quy tắc xuất xứ ô tô và vai trò kinh tế Trung Quốc vẫn treo lơ lửng.","takeaway":"Thay vì đổ vỡ, USMCA bước vào giai đoạn xói mòn chậm và bất định thường niên, gây rủi ro cho đầu tư và chuỗi cung ứng Bắc Mỹ.","url":"https://www.csis.org/analysis/united-states-has-opted-not-extend-usmca"},{"date":"2026-07-02","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Hợp tác quốc phòng - công nghiệp","outlet":"The Diplomat","author":"","title":"Chiến lược Ấn Độ Dương - Thái Bình Dương của Ý xoay trục sang hợp đồng quốc phòng","summary":"Bài viết chỉ ra Ý đang lặng lẽ tăng cường hiện diện ở khu vực thông qua hợp tác quân sự - công nghiệp thay vì ngoại giao truyền thống. Bộ trưởng Quốc phòng Guido Crosetto dự Đối thoại Shangri-La ở Singapore chỉ là một mảnh của bức tranh lớn: Rome mở rộng hợp tác quốc phòng với Malaysia và Quốc hội duyệt chuyển giao tàu sân bay hết niên hạn Giuseppe Garibaldi cho Indonesia. Khác Pháp, Ý không có hiện diện quân sự thường trực nên ảnh hưởng phụ thuộc vào triển khai hải quân, hợp tác công nghiệp và trao đổi quân sự dài hạn.","takeaway":"Ý tái nhập cuộc chơi Ấn Độ Dương - Thái Bình Dương bằng con đường hợp đồng quốc phòng và công nghiệp, tận dụng nhu cầu hiện đại hóa hải quân của Đông Nam Á.","url":"https://thediplomat.com/2026/07/italys-indo-pacific-strategy-turns-toward-defense-contracts/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân sự Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Morris lập luận rằng giới phân tích phương Tây bị bó hẹp nghiêm trọng trong việc hiểu chiến lược quân sự Trung Quốc do khó tiếp cận tài liệu học thuyết hiện hành của Quân Giải phóng Nhân dân (PLA) và phải dựa vào các nguồn tham chiếu đã lỗi thời. Sự thiếu hụt thông tin này buộc nhà hoạch định chính sách và người lập kế hoạch tác chiến phải suy đoán và 'soi gương' (mirror-imaging) thay vì dựa trên nguồn chính thống của Trung Quốc.","takeaway":"Nên khôi phục một Dịch vụ Thông tin Phát thanh Nước ngoài (FBIS) công khai, đặt tại Thư viện Quốc hội, để cung cấp bản dịch và phân tích ấn phẩm quân sự Trung Quốc cho giới nghiên cứu.","url":"https://warontherocks.com/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chiến dịch Nga tại Ukraine","outlet":"Institute for the Study of War (ISW)","author":"","title":"Đánh giá chiến dịch tấn công của Nga, ngày 2 tháng 7 năm 2026","summary":"ISW ghi nhận Nga tiến hành đợt tập kích quy mô lớn bằng 570 drone và tên lửa vào Kyiv đêm 1-2/7, khiến ít nhất 27 người chết và 91 người bị thương, trong đó phòng không Ukraine đánh chặn khoảng 476 quả. Nga đang triển khai drone động cơ phản lực nhanh hơn và đổi tần số (3.900-4.100 MHz) khiến việc đánh chặn khó hơn nhiều, trong khi trên các mặt trận Kharkiv, Donetsk và Zaporizhia lực lượng Nga tiếp tục tấn công nhưng không tiến được.","takeaway":"Chiến dịch hè-thu 2026 của Nga vẫn bế tắc về lãnh thổ, đổi lại bằng tổn thất lớn và chiến thuật tập kích drone-tên lửa ngày càng gây hại cho dân thường.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-2-2026"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chính trị","outlet":"The Nation","author":"Stephen Crowley","title":"Trước thềm thượng đỉnh NATO, châu Âu tái vũ trang chống một 'nước Nga bóng ma'?","summary":"Nhiều nước châu Âu đang tăng chi quân sự mạnh dựa trên giả định Nga có thể tấn công NATO trong vài năm tới, trong khi kinh tế Nga trì trệ vì chiến tranh Ukraine và Điện Kremlin chật vật huy động dân chúng. Tác giả cho rằng thổi phồng mối đe dọa Nga làm chệch nguồn lực khỏi nhu cầu xã hội và khí hậu.","takeaway":"Hiểm họa thực sự với châu Âu đến từ bên trong - khó khăn kinh tế và bất mãn xã hội bị khoét sâu bởi chi tiêu quốc phòng - hơn là từ một cuộc tấn công quân sự của Nga.","url":"https://www.thenation.com/article/world/europe-russia-nato-rearmament-putin-military-spending-far-right-ukraine-war-analysis/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Hizballah & Lebanon","outlet":"War on the Rocks","author":"Anthony Elghossain, Grace Wermenbol","title":"Thế lưỡng nan Hizballah: Vì sao cần một cách tiếp cận tích hợp","summary":"Hai tác giả lập luận rằng bản chất lai ghép của Hizballah - vừa là dân quân, đảng chính trị, mạng lưới dịch vụ xã hội, vừa là đường dây buôn lậu - khiến nó không thể bị hóa giải bằng những can thiệp đơn lẻ ở cấp khu vực hay địa phương. Họ cho rằng 'các giải pháp thuần khu vực hoặc thuần nội bộ đều không đủ' và cần chiến lược phối hợp giữa lãnh đạo Lebanon, các bên khu vực và giới chức Mỹ.","takeaway":"Kiềm chế Hizballah hiệu quả đòi hỏi cách tiếp cận tích hợp đồng thời trên các trục chính trị, quân sự, kinh tế và ngoại giao, thay vì các nỗ lực chắp vá.","url":"https://warontheroc   var o='<option value="Tất cả"'+(cur==='Tất cả'?' selected':'')+'>Tất cả ngày</option>';
  ds.forEach(function(d){o+='<option value="'+esc(d)+'"'+(cur===d?' selected':'')+'>'+fmtVN(d)+'</option>';});
  return '<div class="filterbar"><span>📅 Lọc ngày</span><select class="dsel" '+attr+'>'+o+'</select></div>';
}
function renderCatNews(arr, note){
  arr=sortD(arr);
  var cats=[];arr.forEach(function(a){if(a.category&&cats.indexOf(a.category)<0)cats.push(a.category);});
  var items=arr.filter(function(a){return (state.wcat==='Tất cả'||a.category===state.wcat)&&(state.wdate==='Tất cả'||a.date===state.wdate);});
  var chips='<div class="chips"><span class="chip'+(state.wcat==='Tất cả'?' on':'')+'" data-wcat="Tất cả">Tất cả ('+arr.length+')</span>';
  cats.forEach(function(c){var m=wmeta(c);chips+='<span class="chip'+(state.wcat===c?' on':'')+'" data-wcat="'+esc(c)+'"><i class="dot" style="background:'+m[1]+'"></i>'+m[0]+' '+esc(c)+' ('+arr.filter(function(a){return a.category===c;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){return card(newsCardInner(a));}).join(''):'<div class="empty">Không có tin khớp bộ lọc.</div>';
  return note+chips+dateBar(arr,state.wdate,'data-wdate')+'<div class="list">'+cards+'</div>';
}
function renderAnalysis(){
  var arr=sortD(DATA.analyses);
  var regs=[];arr.forEach(function(a){if(a.region&&regs.indexOf(a.region)<0)regs.push(a.region);});
  var items=arr.filter(function(a){return (state.areg==='Tất cả'||a.region===state.areg)&&(state.adate==='Tất cả'||a.date===state.adate);});
  var chips='<div class="chips"><span class="chip'+(state.areg==='Tất cả'?' on':'')+'" data-areg="Tất cả">Tất cả ('+arr.length+')</span>';
  regs.forEach(function(r){chips+='<span class="chip'+(state.areg===r?' on':'')+'" data-areg="'+esc(r)+'"><i class="dot" style="background:'+rcolor(r)+'"></i>'+esc(r)+' ('+arr.filter(function(a){return a.region===r;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){return card(analysisCardInner(a));}).join(''):'<div class="empty">Không có bài khớp bộ lọc.</div>';
  return '<div class="note">Phân tích, báo cáo chiến lược từ các viện nghiên cứu (think tank) uy tín.</div>'+chips+dateBar(arr,state.adate,'data-adate')+'<div class="list">'+cards+'</div>';
}
function renderSaved(){
  var arr=FAV.slice();
  arr.sort(function(x,y){return (''+(y.date||'')).localeCompare(''+(x.date||''));});
  if(!arr.length)return '<div class="note">Bấm ngôi sao ☆ ở mỗi tin để lưu lại đây. Tin đã lưu nằm trên máy này và giữ được cả khi tin gốc đã cũ.</div><div class="empty">Chưa lưu tin nào.</div>';
  var cards=arr.map(function(a){return card(a._kind==='x'?xCardInner(a):(a._kind==='analysis'?analysisCardInner(a):newsCardInner(a)));}).join('');
  return '<div class="note">Tin bạn đã lưu (trên máy này) — bấm ★ để bỏ lưu.</div><div class="list">'+cards+'</div>';
}
function content(){
  if(state.tab==='us')return renderCatNews(DATA.usNews,'<div class="note">Tin <b>yếu tố Mỹ</b> nổi bật trong <b>24 giờ qua</b> (giờ Mỹ) — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
  if(state.tab==='x')return renderX();
  if(state.tab==='analysis')return renderAnalysis();
  if(state.tab==='saved')return renderSaved();
  return renderCatNews(DATA.worldNews,'<div class="note">Tin <b>thế giới</b> nổi bật trong <b>24 giờ qua</b> — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
}
function render(){
  refreshFav();
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thế giới'],['us',USFLAG+'Mỹ'],['x',XLOGO+'X'],['analysis','🧠 Phân tích'],['saved','⭐ Đã lưu'+(FAV.length?' ('+FAV.length+')':'')]];
  var h='<div class="wrap">';
  h+='<div class="mast"><div class="kicker">Bản tin độc lập</div><h1>'+esc(DATA.brand)+'</h1><div class="tag">'+esc(DATA.tagline)+'</div></div>';
  h+='<div class="dateline"><span>Cập nhật '+stamp+'</span><span>Tổng hợp từ nguồn mở</span></div>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<button class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</nav>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">'+esc(DATA.brand)+' — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Mỗi tin đều dẫn liên kết nguồn gốc. Không đại diện quan điểm của bất kỳ tổ chức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  if(window.scrollTo)window.scrollTo(0,0);
}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg],[data-xhandle],[data-fav]'):null;if(!t)return;
  if(t.getAttribute('data-fav')!=null){toggleFav(t.getAttribute('data-fav'));render();return;}
  if(t.getAttribute('data-tab')){state.tab=t.getAttribute('data-tab');state.wcat='Tất cả';state.wdate='Tất cả';state.xhandle='Tất cả';state.xdate='Tất cả';}
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  else if(t.getAttribute('data-xhandle'))state.xhandle=t.getAttribute('data-xhandle');
  render();
});
document.addEventListener('change',function(e){
  var s=e.target;if(!s||!s.getAttribute)return;
  if(s.getAttribute('data-wdate')!=null){state.wdate=s.value;render();}
  else if(s.getAttribute('data-adate')!=null){state.adate=s.value;render();}
  else if(s.getAttribute('data-xdate')!=null){state.xdate=s.value;render();}
});
ensureReaderUI();
render();
</script>
</body>
</html>
