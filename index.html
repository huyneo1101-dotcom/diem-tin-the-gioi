e":"Axios","sourceUrl":"https://www.axios.com/2026/07/08/openai-gpt-trump-ban-lifted","significance":"Nới lỏng chính sách công nghệ để giữ lợi thế AI của Mỹ; phản ánh xu hướng ưu tiên chạy đua AI hơn là thận trọng về quản lý rủi ro."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung hai startup vào nhóm phóng tên lửa nhỏ và vừa","summary":"Space Force chọn thêm hai công ty khởi nghiệp tham gia cạnh tranh các nhiệm vụ phóng vệ tinh cỡ nhỏ và vừa, nhằm mở rộng nguồn cung phương tiện phóng và giảm phụ thuộc vào số ít nhà thầu lớn.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/space-force-adds-two-startups-to-small-medium-launch-pool/","significance":"Đa dạng hóa nhà cung cấp phóng giúp Mỹ tăng khả năng phục hồi và tốc độ triển khai vệ tinh quân sự."}],"analyses":[{"date":"2026-07-09","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Răn đe hạt nhân","outlet":"Naval News","author":"","title":"Phân tích: Vụ thử SLBM Thái Bình Dương của Trung Quốc báo hiệu chuyển sang răn đe trên biển liên tục","summary":"Naval News phân tích vụ thử SLBM ngày 6/7 của Trung Quốc, cho rằng nó phản ánh mức độ trưởng thành của lực lượng răn đe hạt nhân trên biển của PLAN và bước tiến tới tuần tra răn đe liên tục (CASD).","takeaway":"Nếu Trung Quốc đạt năng lực răn đe trên biển liên tục, cán cân hạt nhân ở Ấn Độ Dương - Thái Bình Dương sẽ thay đổi căn bản, gia tăng sức ép lên Mỹ và các đồng minh.","url":"https://www.navalnews.com/naval-news/2026/07/china-pacific-slbm-test-casd-nuclear-deterrence/"},{"date":"2026-07-09","region":"Châu Âu/NATO","topic":"Đoàn kết liên minh","outlet":"Al Jazeera","author":"","title":"Trump nhắm vào Tây Ban Nha, NATO hậu thuẫn Ukraine: Liên minh còn thống nhất?","summary":"Bài phân tích của Al Jazeera đánh giá dù các thành viên NATO nhất trí tăng chi tiêu quốc phòng, các đòn công kích của Trump nhằm vào Tây Ban Nha và Greenland đang đe dọa sự gắn kết của khối.","takeaway":"NATO đối mặt nghịch lý: cùng lúc tăng cường năng lực quân sự nhưng lại rạn nứt về chính trị nội bộ, làm suy yếu độ tin cậy của cam kết răn đe tập thể.","url":"https://www.aljazeera.com/news/2026/7/9/trump-targets-spain-nato-backs-ukraine-is-the-alliance-still-united"},{"date":"2026-07-08","region":"Trung Đông","topic":"Xung đột Mỹ - Iran","outlet":"CSIS","author":"","title":"Lệnh ngừng bắn Mỹ - Iran mong manh: những vấn đề cần theo dõi","summary":"CSIS phân tích tình trạng ngừng bắn Mỹ - Iran giữa bất định ở eo biển Hormuz và thị trường năng lượng, cho rằng đàm phán do Pakistan trung gian đang bế tắc dù đột phá bất ngờ vẫn có thể xảy ra.","takeaway":"Israel và Iran nhiều khả năng mắc kẹt trong xung đột cường độ thấp kéo dài thay vì đạt hòa bình bền vững; Mỹ khó áp đặt kết cục quân sự dứt điểm.","url":"https://www.csis.org/analysis/fragile-us-iran-ceasefire-issues-watch"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Hệ quả quốc phòng","outlet":"CSIS","author":"","title":"Những hệ quả ngoài dự tính của xung đột Mỹ - Iran với quốc phòng và an ninh","summary":"CSIS đánh giá các hệ quả ngoài dự tính của cuộc xung đột Mỹ - Iran đối với quốc phòng và an ninh, từ tiêu hao khí tài (như MQ-9) đến bài học về phòng không, hậu cần và sức bền công nghiệp quốc phòng.","takeaway":"Xung đột phơi bày điểm yếu về kho đạn và khí tài đắt tiền của Mỹ, thúc đẩy xu hướng chuyển sang vũ khí giá rẻ, sản xuất hàng loạt và tự động hóa.","url":"https://www.csis.org/analysis/what-are-unintended-consequences-us-iran-conflict-defense-and-security"},{"date":"2026-07-08","region":"Toàn cầu","topic":"An ninh","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Hải tặc Somalia trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Nạn hải tặc Somalia tái bùng phát với ba tàu hàng bị cướp gần Sừng châu Phi, sau gần một thập kỷ bị dẹp yên. Bối cảnh địa chính trị đã đổi khiến các liên minh hải quân đa quốc gia kiểu 2011 khó tái lập.","takeaway":"NATO đã dồn về phòng thủ lãnh thổ, Mỹ xoay trục sang Ấn Độ Dương - Thái Bình Dương và sa lầy hậu chiến Iran, châu Âu thiếu tàu; giải pháp phải là kiến trúc an ninh khu vực làm nòng cốt, có đối tác bên ngoài hỗ trợ và xử lý gốc rễ quản trị - kinh tế trên bờ.","url":"https://warontherocks.com/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-08","region":"Trung Đông","topic":"An ninh","outlet":"War on the Rocks","author":"Allison Minor","title":"Nhìn lại mối đe dọa của Houthi với vận tải biển","summary":"Tác giả xem lại phân tích năm 2024 của chính mình về các cuộc tấn công của Houthi trên Biển Đỏ, khi sự chú ý toàn cầu chuyển sang eo biển Hormuz. Dù các đợt không kích Mỹ - Israel làm suy giảm năng lực Houthi, nhóm này vẫn là mối đe dọa dai dẳng.","takeaway":"Houthi hiện đang tái tổ chức lực lượng thay vì tấn công chủ động, nhưng vẫn nắm ảnh hưởng lên các tuyến hàng hải thương mại nhờ nguy cơ ngầm về việc nối lại chiến sự.","url":"https://warontherocks.com/a-fresh-look-at-the-houthi-threat-to-maritime-shipping/"},{"date":"2026-07-08","region":"Châu Mỹ","topic":"Xét lại hiệp định USMCA","outlet":"CSIS","author":"William Alan Reinsch","title":"Giai đoạn tiếp theo của USMCA","summary":"Chính quyền Trump đã kích hoạt cơ chế rà soát 10 năm của USMCA vào ngày 1/7, bác bỏ phương án gia hạn đơn thuần. Đàm phán nay xoay quanh lo ngại an ninh — nhất là chặn hàng Trung Quốc đi vòng qua 'cửa sau' Bắc Mỹ — cùng tranh cãi về quy tắc xuất xứ và các vấn đề ngành.","takeaway":"Bất định kéo dài sẽ ghìm đầu tư doanh nghiệp, dù cách tiếp cận chuyên nghiệp của USTR để ngỏ khả năng đạt thỏa thuận sửa đổi.","url":"https://www.csis.org/analysis/next-phase-usmca"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Cướp biển Somalia trở lại","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Cướp biển Somalia đã trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Cướp biển Somalia tái xuất với các vụ bắt tàu hàng gần đây, nhưng liên minh hải quân đa quốc gia từng dẹp yên hồi 2011 không thể tái lập vì ưu tiên địa chính trị đã đổi. Tác giả đề xuất cấu trúc lấy khu vực làm trung tâm, để lực lượng biển địa phương dẫn dắt với hỗ trợ tình báo và năng lực chuyên biệt từ bên ngoài.","takeaway":"Giải pháp bền vững đòi hỏi an ninh hàng hải do khu vực dẫn dắt, đồng thời xử lý gốc rễ là quản trị yếu kém ở Somalia.","url":"https://warontherocks.com/2026/07/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-07","region":"Trung Đông","topic":"An ninh hàng hải","outlet":"CSIS","author":"","title":"Canh bạc eo biển Hormuz của Iran và giới hạn sức mạnh quân sự Mỹ","summary":"CSIS mổ xẻ chiến lược của Iran ở eo biển Hormuz và những giới hạn của sức mạnh quân sự Mỹ trong việc bảo đảm tự do hàng hải trước chiến thuật quấy rối bằng tàu nhỏ, thủy lôi và tên lửa bờ.","takeaway":"Mỹ có ưu thế hỏa lực áp đảo nhưng khó ngăn Iran gây gián đoạn ngắn hạn tuyến hàng hải huyết mạch, khiến rủi ro địa chính trị với giá dầu luôn thường trực.","url":"https://www.csis.org/analysis/irans-strait-hormuz-gambit-and-limits-us-military-power"},{"date":"2026-07-07","region":"Đông Á","topic":"An ninh","outlet":"CSIS","author":"Joseph Rodgers, Bonny Lin, Leon Li","title":"Vụ thử tên lửa đạn đạo phóng từ tàu ngầm của Trung Quốc cho thấy cần một thỏa thuận thông báo phóng","summary":"Ngày 6/7, Trung Quốc lần đầu bắn một tên lửa đạn đạo phóng từ tàu ngầm ra vùng biển quốc tế ở Thái Bình Dương, bay khoảng 7.300 km và có thể bay qua Philippines. Ba chuyên gia CSIS phân tích ý nghĩa chiến lược và rủi ro từ việc thiếu quy trình thông báo.","takeaway":"Vụ thử lần đầu phô diễn năng lực răn đe hạt nhân từ tàu ngầm của Bắc Kinh ngay tại Ấn Độ Dương - Thái Bình Dương; tác giả kêu gọi Trung Quốc tham gia Bộ Quy tắc Hague để tránh tính toán sai, giữa lúc kho đầu đạn tăng từ 200 lên hơn 600 trong sáu năm.","url":"https://www.csis.org/analysis/chinas-slbm-test-underscores-importance-ballistic-missile-launch-notification-agreement"},{"date":"2026-07-07","region":"Châu Âu/NATO","topic":"Dư luận Nga và chiến tranh Ukraine","outlet":"CSIS","author":"Maria Snegovaya & Jade McGlynn","title":"Thái độ người Nga đang đổi khi hệ quả chiến tranh về đến nhà","summary":"Các đợt tập kích bằng drone của Ukraine vào hạ tầng năng lượng Nga đang đưa hệ quả kinh tế của cuộc chiến đến tận người dân qua thiếu nhiên liệu và gián đoạn dịch vụ. Tác giả nhận định cú sốc kinh tế đời thường có sức bào mòn ủng hộ chiến tranh mạnh hơn các cú sốc quân sự đơn thuần.","takeaway":"Phương Tây nên phối hợp trừng phạt và truyền thông để gắn khó khăn trong nước Nga với lựa chọn gây chiến của Kremlin.","url":"https://www.csis.org/analysis/russian-attitudes-are-shifting-wars-effects-come-home"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Tự chủ quốc phòng châu Âu","outlet":"CSIS","author":"Max Bergmann & Otto Svendsen","title":"Hãy biến Thượng đỉnh Ankara thành chuyện tự chủ quốc phòng châu Âu","summary":"Các tác giả kêu gọi thành viên châu Âu của NATO dùng thượng đỉnh Ankara để chuẩn bị cho kịch bản Mỹ giảm hậu thuẫn, bằng kế hoạch cụ thể cho phòng thủ lục địa tự chủ. Việc Mỹ cạn nguồn lực, dồn sang Trung Quốc khiến tự lực của châu Âu là tất yếu.","takeaway":"Châu Âu cần lộ trình chuyển giao gánh nặng có thời hạn rõ, tăng tốc công nghiệp quốc phòng và cải tổ hợp tác NATO-EU.","url":"https://www.csis.org/analysis/make-ankara-summit-about-european-defense-autonomy"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Chiến tranh Nga - Ukraine","outlet":"Institute for the Study of War (ISW)","author":"Christina Harward, Jennie Olmsted, Tetiana Trach, Anna Thacker, Karolina Hird","title":"Đánh giá chiến dịch tấn công của Nga, ngày 6/7/2026","summary":"ISW ghi nhận Nga vừa thực hiện đợt tập kích tên lửa - drone quy mô lớn thứ tư kể từ 1/6, phóng tổng cộng 419 quả nhắm chủ yếu vào Kyiv, gây hàng chục thương vong dân thường. Nga khai thác việc Ukraine cạn kho đạn đánh chặn bằng cách dồn tên lửa đạn đạo trong mỗi gói tấn công. Đợt đánh diễn ra ngay trước thượng đỉnh NATO (7-8/7) nhằm phô trương sức ép. Đáp lại, Ukraine tập kích nhà máy lọc dầu lớn nhất của Nga ở Omsk, cách biên giới hơn 2.500 km.","takeaway":"Nga leo thang tập kích chiến lược và khiêu khích NATO để tạo áp lực trước thềm thượng đỉnh, trong khi Ukraine chứng minh năng lực đánh sâu chưa từng có.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-6-2026"},{"date":"2026-07-06","region":"Trung Đông","topic":"Hành lang thương mại - năng lượng","outlet":"Atlantic Council","author":"Allison Minor","title":"Các hành lang mới ở Trung Đông không chỉ để né eo biển Hormuz","summary":"Minor phân tích làn sóng dự án hạ tầng đường sắt, đường ống và logistics trên bộ đang nổi lên khắp Trung Đông sau những gián đoạn ở eo biển Hormuz. Saudi Arabia, UAE và Oman mở rộng mạng lưới đường sắt và trung tâm trung chuyển, trong khi Hành lang Ấn Độ - Trung Đông - châu Âu (IMEC) cần tái cấu trúc theo cách tiếp cận 'mạng lưới' thay vì một tuyến đơn lẻ. Thành công đòi hỏi tích hợp hải quan số, hài hòa quy định và cam kết chính trị bền vững, thậm chí mở ra một 'hành lang điện toán'.","takeaway":"Các hành lang này vượt xa mục tiêu né chốt chặn hàng hải, mở ra cơ hội đa dạng hóa kinh tế và hội nhập khu vực nếu có quản trị đủ mạnh.","url":"https://www.atlanticcouncil.org/blogs/menasource/new-middle-east-corridors-are-about-more-than-just-bypassing-the-strait-of-hormuz/"},{"date":"2026-07-06","region":"Đông Á","topic":"Trật tự toàn cầu - Trung Quốc","outlet":"The Diplomat","author":"","title":"Thời cơ để Trung Quốc định hình trật tự toàn cầu mới","summary":"Bài phân tích cho rằng chuyến thăm Bắc Kinh giữa tháng 5 của Tổng thống Mỹ Donald Trump đã bộc lộ một động lực mới trong quan hệ Mỹ - Trung, khi Bắc Kinh thể hiện vai trò chủ động hơn trong việc định hình quan hệ song phương. Theo tác giả, chuỗi tiếp xúc ngoại giao gần đây đưa Trung Quốc vào trung tâm sân khấu thế giới và củng cố năng lực định hình trật tự quốc tế, thay vì chỉ tuyên bố tham vọng. Bắc Kinh đang chuyển từ thế phòng thủ sang chủ động dẫn dắt chương trình nghị sự khu vực và toàn cầu.","takeaway":"Trung Quốc đang tận dụng thế chủ động ngoại giao mới để chuyển từ tuyên bố tham vọng sang thực sự định hình trật tự quốc tế.","url":"https://thediplomat.com/2026/07/chinas-moment-to-shape-a-new-global-order/"},{"date":"2026-07-03","region":"Châu Âu/NATO","topic":"Chiến lược quân Mỹ ở châu Âu","outlet":"War on the Rocks","author":"Benjamin H. Friedman & Moritz S. Graefrath","title":"Sai lầm và bị hiểu lầm: Cách tiếp cận của Trump với quân Mỹ tại châu Âu","summary":"Hai tác giả cho rằng sai lầm của chính quyền Trump không nằm ở việc dọa rút quân, mà ở chỗ không thực sự rút — thay vào đó theo đuổi 'bá quyền phi tự do', đổi sự hiện diện quân sự lấy các cam kết tăng chi tiêu mơ hồ của châu Âu.","takeaway":"Mỹ nên rút quân khỏi châu Âu theo lộ trình có kiểm soát vì mối đe dọa Nga hạn chế, thay vì mặc cả nửa vời.","url":"https://warontherocks.com/2026/07/misguided-and-misunderstood-trumps-approach-to-u-s-troops-in-europe/"},{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"An ninh","outlet":"Atlantic Council","author":"Ian Brzezinski, Philippe Dickinson","title":"Châu Âu nên đặt cược dài hạn vào Mỹ và quan hệ an ninh xuyên Đại Tây Dương","summary":"Bất chấp căng thẳng thời 'NATO 3.0' của Trump vốn đẩy trách nhiệm quốc phòng sang châu Âu, bài viết lập luận châu Âu nên duy trì cam kết dài hạn với quan hệ xuyên Đại Tây Dương. Lý do: sự ủng hộ của công chúng và Quốc hội Mỹ dành cho NATO vẫn vững.","takeaway":"Thái độ hoài nghi của chính quyền Trump không phản ánh tâm lý chung của người Mỹ (68% ủng hộ NATO, 76% ủng hộ đáp trả quân sự khi đồng minh bị tấn công); châu Âu nên chứng minh đóng góp quốc phòng tại Ankara và tránh những bước đi thúc đẩy Mỹ rút lui không thể đảo ngược.","url":"https://www.atlanticcouncil.org/dispatches/europe-should-take-the-long-bet-on-the-us-and-the-transatlantic-security-relationship/"}],"xNews":[{"date":"2026-07-13","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM tái áp đặt phong tỏa hải quân với Iran, hiệu lực từ 14/7","summary":"CENTCOM thông báo theo chỉ đạo của Tổng thống, lực lượng Mỹ tái phong tỏa tàu thuyền ra vào cảng Iran từ chiều 14/7 (giờ Mỹ), sau khi lệnh ngừng bắn Mỹ-Iran (tháng 6) đổ vỡ và giao tranh tái diễn tại eo Hormuz. Phong tỏa áp dụng với mọi tàu ra/vào cảng, kho dầu và vùng biển Iran; tàu không tuân thủ có thể bị chặn, chuyển hướng hoặc cưỡng chế.","significance":"Đảo ngược trạng thái 'Hormuz mở' ngày 12/7 — đánh dấu chấm dứt thỏa thuận ngừng bắn 60 ngày và nguy cơ leo thang toàn diện trở lại vùng Vịnh, tác động trực tiếp giá dầu và vận tải biển toàn cầu.","url":"https://x.com/CENTCOM/status/2076732825349628250"},{"date":"2026-07-13","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Ngừng bắn Mỹ-Iran về bản chất đã chấm dứt","summary":"Trong Iran Update ngày 13/7, ISW đánh giá lệnh ngừng bắn Mỹ-Iran đã 'về bản chất chấm dứt' với các đợt giao tranh dồn dập hơn tại vùng Vịnh, dù quy mô còn nhỏ hơn đợt tháng 3-4/2026; việc tái áp đặt phong tỏa và tăng không kích đánh dấu bước sang giai đoạn mới của xung đột.","significance":"Nhận định tầng 3 xác nhận xu hướng leo thang mà tuyên bố CENTCOM phản ánh, cảnh báo nguy cơ quay lại chiến sự toàn diện Mỹ-Iran thay vì căng thẳng cục bộ tạm thời.","url":"https://x.com/TheStudyofWar/status/2076846265736802511"},{"date":"2026-07-13","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky trình bày Chương trình Phòng thủ Chống tên lửa đạn đạo tại Paris","summary":"Bên lề hội nghị Liên minh Tự nguyện (Coalition of the Willing) và cuộc họp đầu tiên của liên minh phòng thủ chống tên lửa đạn đạo tại Paris, Tổng thống Zelensky cho biết sẽ trình bày với các đối tác Chương trình Phòng thủ Chống tên lửa đạn đạo của Ukraine, ưu tiên hàng đầu hiện nay nhằm tăng cường năng lực phòng không.","significance":"Cho thấy Ukraine thúc đẩy một khuôn khổ hợp tác phòng thủ chống tên lửa đạn đạo mới bên lề hội nghị nhiều nguyên thủ tại Paris, tiếp nối cam kết 70 tỷ euro viện trợ quân sự tại Thượng đỉnh NATO Ankara.","url":"https://x.com/ZelenskyyUa/status/2076634937990562023"},{"date":"2026-07-12","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM khẳng định eo biển Hormuz vẫn mở cho tàu bè qua lại","summary":"CENTCOM ra tuyên bố trên X bác bỏ tuyên bố của IRGC rằng Iran kiểm soát eo biển Hormuz, khẳng định tuyến hàng hải quốc tế này vẫn mở cho mọi tàu di chuyển hợp pháp và lực lượng Mỹ đã sẵn sàng bảo đảm tự do hàng hải bất chấp các đe dọa từ Iran.","significance":"Cho thấy Washington ưu tiên trấn an các hãng vận tải/bảo hiểm về rủi ro chiến sự leo thang ở Hormuz.","url":"https://x.com/CENTCOM/status/2076278945993888116"},{"date":"2026-07-11","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky công bố cải tổ ngoại giao để đẩy nhanh giao vũ khí từ đồng minh","summary":"Tổng thống Zelensky thông báo chuẩn bị thay đổi lớn trong bộ máy ngoại giao, phân công người phụ trách cụ thể cho từng hướng chính sách đối ngoại nhằm bảo đảm các thỏa thuận cấp lãnh đạo về cung cấp vũ khí được thực thi nhanh và đầy đủ hơn, ngay sau thượng đỉnh NATO Ankara.","significance":"Phản ánh sức ép từ Kyiv buộc đồng minh hiện thực hóa cam kết vũ khí giữa lúc kho Patriot cạn kiệt.","url":"https://x.com/ZelenskyyUa/status/2076264578229391430"},{"date":"2026-07-10","handle":"@IEA","name":"International Energy Agency","title":"IEA cảnh báo bất ổn thị trường dầu vì căng thẳng Hormuz tái bùng phát","summary":"IEA cho biết dòng chảy dầu qua eo biển Hormuz đã tăng mạnh sau lệnh ngừng bắn tạm thời hồi tháng 6, nhưng các hành động thù địch tái diễn trong tuần này làm gia tăng đáng kể sự bất định cho triển vọng thị trường dầu mỏ toàn cầu, theo Oil Market Report mới nhất.","significance":"Đánh giá của cơ quan năng lượng hàng đầu cho thấy khủng hoảng Hormuz tác động trực tiếp tới an ninh năng lượng toàn cầu.","url":"https://x.com/IEA/status/2075490712309686501"},{"date":"2026-07-10","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky lập bộ chỉ huy mới cho tấn công tầm xa, tuyên bố đã đánh trúng mọi nhà máy lọc dầu lớn của Nga","summary":"Tổng thống Zelensky thông báo ký sắc lệnh thành lập một bộ chỉ huy chuyên trách trong quân đội Ukraine phụ trách các đòn tấn công tầm xa vào Nga. Ông cho biết Ukraine giờ đã đánh trúng toàn bộ các nhà máy lọc dầu lớn nhất của Nga.","significance":"Đánh dấu bước thể chế hóa chiến dịch tấn công tầm xa của Ukraine thay vì các đợt tập kích rời rạc.","url":"https://x.com/ZelenskyyUa/status/2075668189778674113"},{"date":"2026-07-10","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Mỹ áp thêm trừng phạt Iran khi hai bên chuẩn bị nối lại đàm phán, lập trường Iran không đổi","summary":"Báo cáo của ISW ngày 10/7 cho biết Mỹ và Iran chuẩn bị nối lại đàm phán sau các đợt không kích 8-9/7, nhưng mục tiêu của Iran (kiểm soát Hormuz, giữ chương trình hạt nhân, bảo vệ Hezbollah) không đổi. Cùng ngày Mỹ áp thêm trừng phạt lên 8 cá nhân và 6 thực thể liên quan tài chính Iran.","significance":"Cho thấy đàm phán tái khởi động không đồng nghĩa nhượng bộ thực chất từ phía Iran.","url":"https://x.com/TheStudyofWar/status/2075718254853607591"},{"date":"2026-07-08","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky gặp Thủ tướng Ý Meloni giữa lúc Nga tiếp tục tấn công","summary":"Tổng thống Ukraine Volodymyr Zelensky cho biết đã có cuộc gặp quan trọng với Thủ tướng Ý Giorgia Meloni để thông báo tình hình Ukraine, trong ngày Nga tiếp tục phóng tên lửa đạn đạo và drone tấn công các thành phố. Ông bày tỏ tiếc thương về thương vong dân thường từ các đợt tấn công mới nhất.","significance":"Cho thấy Ukraine tiếp tục vận động ngoại giao với đồng minh châu Âu để duy trì hỗ trợ phòng không giữa lúc Nga leo thang tấn công.","url":"https://x.com/ZelenskyyUa/status/2074771617750622453"},{"date":"2026-07-09","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Ước tính tổn thất quân sự của Nga tính đến 09/07/2026","summary":"Theo Lực lượng Vũ trang Ukraine, Nga đã chịu khoảng 1.414.820 binh sĩ tổn thất kể từ khi bắt đầu cuộc xâm lược toàn diện ngày 24/2/2022 đến 09/07/2026, tăng thêm 1.310 người trong 24 giờ qua.","significance":"Con số tổn thất lớn cho thấy chi phí cao của cuộc xâm lược đối với Nga và khả năng phòng vệ bền bỉ của Ukraine.","url":"https://x.com/KyivIndependent/status/2075115022594830821"},{"date":"2026-07-08","handle":"@CENTCOM","name":"U.S. Central Command","title":"CENTCOM tuyên bố mở loạt đòn tấn công mạnh nhằm vào Iran để đáp trả các vụ tấn công tàu hàng ở Hormuz","summary":"Bộ Tư lệnh Trung tâm Mỹ thông báo bắt đầu loạt không kích nhằm vào Iran để \"áp đặt cái giá đắt\" cho việc Tehran nhắm vào tàu thương mại chở thủy thủ dân sự ở tuyến hàng hải quốc tế.","significance":"Tuyên bố chính thức của quân đội Mỹ xác nhận Washington chuyển từ răn đe sang hành động quân sự trực tiếp, đặt dấu chấm hết cho lệnh ngừng bắn.","url":"https://x.com/CENTCOM/status/2074603238175998290"},{"date":"2026-07-08","handle":"@Breaking911","name":"Breaking911","title":"CENTCOM tập kích khoảng 90 địa điểm quân sự Iran ngày 8/7","summary":"Đợt tấn công mới nhằm vào phòng không, giám sát bờ biển, kho tên lửa/UAV và hạ tầng hậu cần, tiếp nối đợt đánh khoảng 80 mục tiêu (gồm hơn 60 xuồng cao tốc IRGC) hôm trước.","significance":"Quy mô và loại mục tiêu cho thấy Mỹ tìm cách vô hiệu hóa năng lực đe dọa hàng hải của Iran ở Hormuz thay vì chỉ trả đũa tượng trưng.","url":"https://x.com/Breaking911/status/2075069861936422962"},{"date":"2026-07-08","handle":"@BarakRavid","name":"Barak Ravid (Axios)","title":"Mỹ lần đầu tập kích hạ tầng bên trong Iran kể từ ngừng bắn 8/4, bắn tên lửa hành trình vào 2 cầu đường sắt","summary":"Theo quan chức Mỹ, quân đội nước này đã tấn công hai cầu đường sắt ở miền bắc Iran bằng tên lửa hành trình trong đợt đánh ngày thứ Tư — lần đầu nhắm hạ tầng Iran kể từ ngừng bắn.","significance":"Mở rộng mục tiêu sang hạ tầng dân - quân sự cho thấy leo thang vượt khỏi phạm vi \"tự vệ hàng hải\", làm tăng nguy cơ chiến tranh toàn diện.","url":"https://x.com/BarakRavid/status/2075011509323796967"},{"date":"2026-07-08","handle":"@MarioNawfal","name":"Mario Nawfal","title":"Cảnh Bandar Abbas cho thấy đợt tập kích nặng nhất kể từ ngừng bắn, Iran có thể đóng eo biển","summary":"Hình ảnh mới từ cảng Bandar Abbas cho thấy mức thiệt hại được cho là nặng nhất kể từ khi thỏa thuận ngừng bắn ban đầu được ký, giữa lo ngại Iran đóng hoàn toàn eo biển Hormuz.","significance":"Nếu Iran đóng Hormuz — nơi trung chuyển khoảng 1/5 dầu thế giới — cú sốc giá dầu và vận tải biển toàn cầu sẽ rất lớn.","url":"https://x.com/MarioNawfal/status/2074615677764202845"},{"date":"2026-07-08","handle":"@straits_times","name":"The Straits Times","title":"Trump quay sang chỉ trích Tây Ban Nha và đòi Greenland, phơi bày rạn nứt NATO","summary":"Tại thượng đỉnh NATO, Trump công kích Tây Ban Nha vì chi tiêu quốc phòng thấp và tái nêu yêu sách Greenland, khiến hội nghị bộc lộ chia rẽ nội bộ.","significance":"Cho thấy mâu thuẫn Mỹ - đồng minh về chia sẻ gánh nặng và chủ quyền lãnh thổ đang thử thách sự gắn kết của liên minh.","url":"https://x.com/straits_times/status/2074824111709175894"},{"date":"2026-07-08","handle":"@SkyNews","name":"Sky News","title":"Trump nêu lại yêu sách Greenland, dọa rút quân khỏi châu Âu tại thượng đỉnh NATO","summary":"Tổng thống Trump tái khẳng định đòi hỏi với Greenland và dọa rút quân Mỹ khỏi châu Âu ngay tại hội nghị NATO ở Thổ Nhĩ Kỳ, trong khi Ukraine tiếp tục vận động gia nhập liên minh.","significance":"Đe dọa rút quân là quân bài gây sức ép mạnh, buộc châu Âu tính đến kịch bản tự lo an ninh.","url":"https://x.com/SkyNews/status/2074614570178498894"},{"date":"2026-07-08","handle":"@NATO","name":"NATO","title":"NATO công bố Tuyên bố thượng đỉnh Ankara","summary":"Các nguyên thủ và người đứng đầu chính phủ NATO ban hành Tuyên bố thượng đỉnh Ankara, ghi nhận các cam kết về chi tiêu quốc phòng và lập trường chung của liên minh.","significance":"Văn kiện chính thức phản ánh mẫu số chung đạt được bất chấp căng thẳng, là thước đo mức độ đoàn kết thực chất của khối.","url":"https://x.com/NATO/status/2074834022019014926"},{"date":"2026-07-08","handle":"@Defence_IDA","name":"International Defence Analysis","title":"Trung Quốc phô diễn tên lửa siêu vượt âm DF-17 trên truyền thông nhà nước giữa lúc RIMPAC diễn ra","summary":"Trung Quốc trưng ra tên lửa siêu vượt âm DF-17 (tầm 1.800–2.500 km, đầu đạn lượn cơ động) trên truyền thông nhà nước, được xem là tín hiệu răn đe giữa lúc tập trận RIMPAC diễn ra.","significance":"Phô trương khí tài đúng thời điểm RIMPAC là đòn tâm lý - chiến lược nhắm cảnh báo Mỹ và đồng minh về năng lực xuyên thủng lá chắn tên lửa.","url":"https://x.com/Defence_IDA/status/2074829888423645586"},{"date":"2026-07-08","handle":"@WarMonitor3","name":"WarMonitor","title":"Video UAV hải quân Ukraine đánh trúng tàu chở dầu lớn của Nga trên Hắc Hải","summary":"Đoạn video cho thấy một xuồng không người lái của Ukraine lao vào một tàu chở dầu cỡ lớn của Nga trên Hắc Hải giữa lúc thủy thủ đoàn bắn xối xả để ngăn chặn.","significance":"Minh chứng cho hiệu quả của drone hải quân giá rẻ trong việc đe dọa tàu lớn, làm thay đổi thế trận trên Hắc Hải. (Nguồn OSINT, cần đối chiếu thêm.)","url":"https://x.com/WarMonitor3/status/2074871209200689585"},{"date":"2026-07-08","handle":"@EU_ISS","name":"EU Institute for Security Studies","title":"Phân tích: Tổng thống Erdogan nổi lên là bên hưởng lợi chính trị lớn nhất từ thượng đỉnh NATO tại Ankara.","url":"https://x.com/EU_ISS/status/2074778368210268419","summary":"Giới phân tích cho rằng việc đăng cai thượng đỉnh NATO tại Ankara giúp Tổng thống Erdogan củng cố vị thế cả trong nước lẫn trên trường quốc tế.","significance":"Phản ánh cách nước chủ nhà tận dụng sự kiện đa phương cho lợi ích chính trị; cho thấy Thổ Nhĩ Kỳ đang nâng vai trò cầu nối trong NATO."},{"date":"2026-07-08","handle":"@Reuters","name":"Reuters","title":"Reuters: 'Ủy ban Hòa bình' do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm ở Gaza.","url":"https://x.com/Reuters/status/2074932816211591392","summary":"Reuters đưa tin một \"Ủy ban Hòa bình\" do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm tại Gaza.","significance":"Phản ánh nỗ lực Mỹ định hình giai đoạn hậu xung đột ở Gaza; xu hướng quản trị vùng lãnh thổ bằng cơ chế do bên ngoài dẫn dắt, tiềm ẩn tranh cãi chủ quyền."},{"date":"2026-07-07","handle":"@AndrewSErickson","name":"Andrew S. Erickson","title":"Vụ phóng SLBM 6/7 vào Nam TBD là lần đầu Trung Quốc công khai kể từ 1982","summary":"Chuyên gia hải quân Andrew Erickson nhận định vụ phóng ngày 6/7 vào vùng phi hạt nhân Nam Thái Bình Dương dường như là chuyến bay SLBM tầm xa ra Thái Bình Dương đầu tiên PLAN công khai thừa nhận kể từ vụ phóng JL-1 năm 1982.","significance":"Khoảng cách 44 năm cho thấy đây là cột mốc lịch sử trong tiến trình hoàn thiện bộ ba răn đe hạt nhân trên biển của Trung Quốc.","url":"https://x.com/AndrewSErickson/status/2074315675036721291"},{"date":"2026-07-07","handle":"@aadilbrar","name":"Aadil Brar","title":"Bằng chứng nghiêng về khả năng tên lửa Trung Quốc thử là JL-3","summary":"Nhà báo Aadil Brar phân tích hình ảnh do truyền thông nhà nước và PLA công bố, cho rằng tên lửa được thử nhiều khả năng là JL-3 dù giới phân tích quốc tế ban đầu còn chia rẽ giữa JL-2 và JL-3.","significance":"Xác định đúng loại tên lửa quan trọng để đánh giá tầm bắn và khả năng vươn tới lục địa Mỹ của lực lượng tàu ngầm hạt nhân Trung Quốc.","url":"https://x.com/aadilbrar/status/2074342035096768672"},{"date":"2026-07-07","handle":"@CBSNews","name":"CBS News","title":"Trung Quốc phóng thử tên lửa đạn đạo tầm xa từ tàu ngầm ở Nam TBD, khu vực phản đối","summary":"CBS News đưa tin quân đội Trung Quốc phóng thử một tên lửa đạn đạo tầm xa từ tàu ngầm hạt nhân ở Nam Thái Bình Dương, gây phản đối và quan ngại từ các nước trong khu vực.","significance":"Phản ứng của các quốc đảo Thái Bình Dương cho thấy vụ thử đụng chạm tới cam kết phi hạt nhân hóa khu vực và làm nóng cạnh tranh chiến lược.","url":"https://x.com/CBSNews/status/2074085955816804743"},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Cơ quan thực thi pháp luật Ukraine khám xét hãng drone hàng đầu Vyriy Industries, làm dấy lên lo ngại siết chặt ngành công nghệ quốc phòng.","url":"https://x.com/KyivIndependent/status/2074623512027832799","summary":"Cơ quan thực thi pháp luật Ukraine khám xét Vyriy Industries, một nhà sản xuất drone hàng đầu, gây lo ngại trong ngành.","significance":"Cho thấy căng thẳng giữa nhu cầu giám sát và việc bảo vệ ngành công nghệ quốc phòng non trẻ; rủi ro làm nản lòng doanh nghiệp quốc phòng thời chiến."},{"date":"2026-07-07","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky ký thỏa thuận hợp tác sản xuất drone với Đan Mạch — thỏa thuận thứ chín thuộc mô hình liên kết quốc phòng của Ukraine.","url":"https://x.com/ZelenskyyUa/status/2074543396996161846","summary":"Tổng thống Zelensky ký thỏa thuận sản xuất drone chung với Đan Mạch — thỏa thuận thứ chín theo mô hình liên kết quốc phòng của Ukraine.","significance":"Phản ánh chiến lược Ukraine \"nội địa hóa + hợp tác\" để tự chủ vũ khí; xu hướng châu Âu gắn công nghiệp quốc phòng với Kyiv thay cho viện trợ đơn thuần."},{"date":"2026-07-07","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Iran tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz.","url":"https://x.com/TheStudyofWar/status/2074608031799652776","summary":"ISW đánh giá Iran đang tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz cho tàu bè.","significance":"Cho thấy Hormuz là đòn bẩy chiến lược của Iran; phản ánh nguy cơ gián đoạn nguồn cung dầu và leo thang xung đột hàng hải."},{"date":"2026-07-07","handle":"@MarketWatch","name":"MarketWatch","title":"Giá dầu thô tăng khi Mỹ mở các đợt không kích nhằm vào Iran.","url":"https://x.com/MarketWatch/status/2074618951120584923","summary":"Giá dầu thô đi lên sau khi Mỹ mở các đợt không kích nhằm vào Iran.","significance":"Phản ánh mức độ nhạy cảm của thị trường năng lượng với xung đột Trung Đông; xu hướng rủi ro địa chính trị định giá dầu mạnh hơn cung–cầu."},{"date":"2026-07-07","handle":"@Rory_Johnston","name":"Rory Johnston","title":"Mỹ thu hồi quyền miễn trừ trừng phạt dầu mỏ với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","url":"https://x.com/Rory_Johnston/status/2074568070908002448","summary":"Mỹ thu hồi các quyền miễn trừ trừng phạt dầu mỏ đối với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","significance":"Cho thấy Washington siết tối đa sức ép kinh tế lên Tehran; phản ánh việc dùng trừng phạt dầu mỏ như vũ khí trong đối đầu leo thang."},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Ước tính tổn thất chiến đấu của Nga tính đến ngày 7/7 theo số liệu của Lực lượng Vũ trang Ukraine.","url":"https://x.com/KyivIndependent/status/2074386662059024384","summary":"Bộ Tổng tham mưu Ukraine công bố ước tính tổn thất chiến đấu của Nga tính đến ngày 7/7.","significance":"Là số liệu một chiều cần thận trọng, nhưng phản ánh cường độ tiêu hao khốc liệt của cuộc chiến; công cụ tuyên truyền–tâm lý của cả hai bên."},{"date":"2026-07-07","handle":"@AJEnglish","name":"Al Jazeera English","title":"Hamas tuyên bố giải thể bộ máy dân sự cầm quyền ở Gaza sau gần 20 năm điều hành.","url":"https://x.com/AJEnglish/status/2074337860874912044","summary":"Hamas tuyên bố giải thể bộ máy hành chính cầm quyền ở Gaza sau gần 20 năm điều hành.","significance":"Bước ngoặt có thể mở đường cho một cơ chế quản trị mới ở Gaza; phản ánh sức ép buộc Hamas nhượng bộ và cục diện hậu chiến đang định hình."},{"date":"2026-07-07","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky nêu ưu tiên tại thượng đỉnh NATO Ankara: có thêm phòng không và củng cố vị thế ngoại giao cho Ukraine.","url":"https://x.com/ZelenskyyUa/status/2074565135969009718","summary":"Tổng thống Zelensky nêu ưu tiên tại thượng đỉnh NATO Ankara: bổ sung phòng không và củng cố vị thế ngoại giao cho Ukraine.","significance":"Phản ánh nhu cầu cấp bách của Kyiv trước các đợt tập kích của Nga; cho thấy Ukraine tận dụng diễn đàn NATO để giữ hậu thuẫn phương Tây."},{"date":"2026-07-07","handle":"@usf_army","name":"Ukraine Unmanned Systems Forces","title":"Đêm 6/7, lực lượng Ukraine tập kích 47 mục tiêu hậu phương Nga: phá 2 bệ phóng S-400, 2 tàu chở dầu 'hạm đội bóng tối' ở Biển Azov, đánh kho dầu Kerch.","url":"https://x.com/usf_army/status/2074099025750479261","summary":"Lực lượng Ukraine tập kích 47 mục tiêu hậu phương Nga trong đêm 6/7: phá 2 bệ phóng S-400, đánh 2 tàu chở dầu \"hạm đội bóng tối\" ở Biển Azov và kho dầu Kerch.","significance":"Cho thấy Ukraine đánh sâu và có chọn lọc vào phòng không, năng lượng và đội tàu lách trừng phạt của Nga; phản ánh chiến lược làm suy yếu đồng thời sức mạnh quân sự lẫn nguồn thu dầu của Moscow."},{"date":"2026-07-06","handle":"@TheStudyofWar","name":"Institute f ,"significance":"Việc Nga điều soái hạm Hạm đội Thái Bình Dương tới cho thấy mức độ coi trọng cuộc tập trận và độ sâu hợp tác hải quân Trung - Nga. (Nguồn OSINT.)","url":"https://x.com/WarshipCam/status/2074680188416274448"},{"date":"2026-07-06","handle":"@NewsHour","name":"PBS NewsHour","title":"Tổng thư ký NATO Rutte yêu cầu các thành viên đưa ra kế hoạch 'rõ ràng, cụ thể, khả tín' để đạt mục tiêu chi tiêu quốc phòng.","url":"https://x.com/NewsHour/status/2074278726158672130","summary":"Tổng thư ký NATO Mark Rutte yêu cầu các thành viên trình kế hoạch \"rõ ràng, cụ thể, khả tín\" để đạt mục tiêu chi tiêu quốc phòng.","significance":"Phản ánh sức ép nội khối buộc các nước hiện thực hóa cam kết tăng chi; xu hướng NATO chuyển từ mục tiêu con số sang lộ trình thực thi."},{"date":"2026-07-06","handle":"@Reuters","name":"Reuters","title":"Reuters: Iran bắn tên lửa vào các tàu hàng thương mại tại eo biển Hormuz.","url":"https://x.com/Reuters/status/2074317554584031253","summary":"Reuters đưa tin Iran bắn tên lửa vào các tàu hàng thương mại tại eo biển Hormuz.","significance":"Cho thấy nguy cơ hiện hữu với tuyến vận tải dầu huyết mạch; phản ánh việc Iran sẵn sàng dùng đòn hàng hải để đáp trả sức ép của Mỹ."},{"date":"2026-07-06","handle":"@amnestyusa","name":"Amnesty International USA","title":"Ân xá Quốc tế: Sudan là cuộc khủng hoảng di tản tồi tệ nhất thế giới với hơn 10,5 triệu người phải rời bỏ nhà cửa.","url":"https://x.com/amnestyusa/status/2074142099021160926","summary":"Ân xá Quốc tế cảnh báo Sudan là cuộc khủng hoảng di tản tồi tệ nhất thế giới với hơn 10,5 triệu người phải rời bỏ nhà cửa.","significance":"Phản ánh quy mô thảm họa nhân đạo bị thế giới lãng quên; cho thấy khoảng trống chú ý và cứu trợ quốc tế giữa các điểm nóng cạnh tranh."},{"date":"2026-07-06","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky cho biết Nga tập kích Kyiv bằng 68 tên lửa và 351 drone trong đêm, gây thiệt hại tại hơn 10 địa điểm.","url":"https://x.com/ZelenskyyUa/status/2074026731581624489","summary":"Tổng thống Zelensky cho biết Nga tập kích Kyiv bằng 68 tên lửa và 351 drone trong đêm, gây thiệt hại tại hơn 10 địa điểm.","significance":"Cho thấy Nga duy trì chiến thuật tập kích bão hòa nhằm bào mòn phòng không Ukraine; phản ánh cuộc đua tiêu hao giữa số lượng đạn tấn công và năng lực đánh chặn."},{"date":"2026-07-06","handle":"@thewarzonewire","name":"The War Zone","title":"Cấu hình vũ khí mới trên tiêm kích Su-57 của Nga hé lộ nhiệm vụ phòng thủ chống drone và tên lửa hành trình.","url":"https://x.com/thewarzonewire/status/2072395726030524917","summary":"Cấu hình vũ khí mới trên tiêm kích tàng hình Su-57 của Nga hé lộ vai trò phòng thủ chống drone và tên lửa hành trình.","significance":"Phản ánh việc drone giá rẻ đang buộc cả tiêm kích đắt tiền phải thích ứng; xu hướng tái định nghĩa nhiệm vụ không quân trong chiến tranh drone."},{"date":"2026-07-06","handle":"@ReutersLegal","name":"Reuters Legal","title":"22 tổng chưởng lý bang thuộc phe Dân chủ phản đối kế hoạch áp thuế tới 12,5% của chính quyền Trump lên 59 nước và EU.","url":"https://x.com/ReutersLegal/status/2074264698564857881","summary":"22 tổng chưởng lý bang thuộc phe Dân chủ phản đối kế hoạch áp thuế tới 12,5% của chính quyền Trump lên 59 nước và EU.","significance":"Phản ánh mặt trận pháp lý–chính trị trong nước chống chính sách thuế quan; cho thấy thương chiến của Trump gây chia rẽ ngay trong lòng nước Mỹ."}],"xGeneratedAt":"2026-07-14","exercises":[{"name":"RIMPAC 2026 (Rim of the Pacific)","status":"ongoing","dates":"24/6 – 31/7/2026","location":"Quần đảo Hawaii và vùng biển lân cận","scale":"30 nước, ~31 tàu mặt nước, 5 tàu ngầm, 15 lực lượng bộ binh, hơn 200 máy bay, 30.000 quân — kỳ RIMPAC lớn nhất lịch sử (lần thứ 30)","summary":"RIMPAC là cuộc tập trận hải quân đa quốc gia lớn nhất thế giới do Hạm đội Thái Bình Dương Mỹ chủ trì, tổ chức hai năm một lần. Kỳ 2026 với chủ đề \"đối tác: hợp nhất và sẵn sàng\", có nhiều nước lần đầu tham gia (Ba Lan, Tây Ban Nha, Guatemala, Hy Lạp, Fiji) bên cạnh các thành viên thường xuyên như Úc, Nhật, Hàn, Anh, Pháp, Ấn Độ.","items":[{"date":"2026-07-14","title":"RIMPAC 2026 trình diễn in 3D kim loại trên tàu sân bay và tiếp tế bằng drone tự hành","summary":"Trong khuôn khổ RIMPAC 2026, Bộ Quốc phòng Mỹ thử nghiệm tích hợp in 3D tiên tiến với drone tự hành lớn nhất từ trước tới nay để tiếp tế hậu cần trên biển. Tàu sân bay USS Theodore Roosevelt lần đầu mang máy in 3D kim loại lai (HYBRiD-X) ngay trên tàu, trong khi drone mặt nước tự hành vận chuyển phụ tùng qua sóng cao tới 3,6m tới nhiều tàu Mỹ và đối tác.","sourceName":"Stars and Stripes","sourceUrl":"https://www.stripes.com/theaters/asia_pacific/2026-07-14/three-d-printing-autonomous-delivery-rimpac-22260494.html"},{"date":"2026-07-13","title":"RIMPAC 2026 bước vào giai đoạn tác chiến trên biển, nhấn mạnh gắn kết liên minh","summary":"Ấn phẩm của Bộ Tư lệnh Ấn Độ Dương - Thái Bình Dương Mỹ đưa tin RIMPAC 2026 đã vào giai đoạn tác chiến trên biển với 30 quốc gia, hơn 30 tàu mặt nước, 5 tàu ngầm và hơn 200 máy bay, do nhóm tác chiến tàu sân bay USS Theodore Roosevelt dẫn đầu. Đợt tập trận kiểm nghiệm phối hợp tác chiến đa miền và công nghệ mới; Philippines lần đầu cử tàu Cảnh sát biển tham gia bên cạnh tàu Hải quân.","sourceName":"Indo-Pacific Defense Forum","sourceUrl":"https://ipdefenseforum.com/2026/07/rimpac-2026-puts-coalition-cohesion-into-practice/"},{"date":"2026-07-08","title":"Máy bay tuần thám P-8A Hàn Quốc lần đầu diễn tập săn ngầm tại RIMPAC 2026","summary":"Trong giai đoạn trên biển của RIMPAC 2026 gần Honolulu, máy bay tuần thám săn ngầm P-8A Poseidon của Hải quân Hàn Quốc lần đầu thực hiện đầy đủ quy trình tác chiến chống ngầm, phối hợp cùng P-8A Mỹ dùng phao sonar truy tìm mục tiêu ngầm giả định. Đây là lần đầu Hàn Quốc triển khai loại máy bay này tại RIMPAC.","sourceName":"Korea Times","sourceUrl":"https://www.koreatimes.co.kr/southkorea/defense/20260708/korean-navys-p-8-demonstrates-submarine-hunting-capability-at-rimpac"},{"date":"2026-07-08","title":"Indonesia lần đầu tham gia tập trận RIMPAC 2026 tại Hawaii","summary":"Quân đội Indonesia chính thức gia nhập cuộc tập trận hải quân đa quốc gia RIMPAC 2026 với 37 binh sĩ, đánh dấu lần đầu tiên Indonesia tham gia cuộc tập trận quy mô 30 quốc gia này.","sourceName":"ANTARA News","sourceUrl":"https://en.antaranews.com/news/421996/indonesian-military-joins-2026-rimpac-to-reinforce-regional-stability"},{"date":"2026-07-08","title":"Trung Quốc phô diễn tên lửa siêu vượt âm DF-17 trên truyền hình nhà nước","summary":"Trung Quốc trưng ra clip tên lửa siêu vượt âm DF-17 trên truyền thông nhà nước; chuyên gia cho rằng đây là màn phô trương sức mạnh đáp lại các cuộc tập trận ở châu Á - TBD.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/08/china-shows-snazzy-clip-of-df-17-missile-on-state-tv-in-show-of-force/","relate":"Được giới chuyên gia đọc là đòn răn đe của Bắc Kinh nhằm đáp trả RIMPAC và trấn an nội bộ về năng lực xuyên thủng phòng thủ tên lửa của đối phương."},{"date":"2026-07-08","title":"Trung Quốc thử SLBM ra Nam Thái Bình Dương, bị nói làm suy yếu vùng phi hạt nhân","summary":"Vụ phóng SLBM ngày 6/7 của Trung Quốc ra Nam Thái Bình Dương vấp phản đối vì bị cho là làm suy yếu vùng phi hạt nhân khu vực; Bắc Kinh nhiều lần chỉ trích thỏa thuận tàu ngầm AUKUS.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/asia-pacific/2026/07/07/chinese-ballistic-missile-test-is-said-to-undermine-nuclear-weapons-free-zone-in-south-pacific/","relate":"Diễn ra ngay khi RIMPAC quy tụ 30 nước tại Thái Bình Dương, vụ thử là màn đối trọng chiến lược, phát tín hiệu răn đe hạt nhân của Trung Quốc với liên minh do Mỹ dẫn dắt."}]},{"name":"Joint Sea-2026 (Tập trận hải quân Trung - Nga)","status":"ongoing","dates":"Đầu tháng 7/2026","location":"Vùng biển và không phận gần Thanh Đảo (Hoàng Hải), Sơn Đông; nối tiếp tuần tra chung Bắc TBD","scale":"Chủ đề \"phản ứng chung với các mối đe dọa an ninh biển\"; Nga cử tuần dương hạm Varyag, khinh hạm Surovy, tàu ngầm cỡ lớn Ufa và tàu cứu hộ Igor Belousov","summary":"Joint Sea là cuộc tập trận hải quân thường niên giữa Trung Quốc và Nga. Kỳ 2026 khai mạc tại quân cảng Thanh Đảo ngày 6/7 sau khi biên đội tàu Nga tới hội quân ngày 5/7, triển khai theo ba giai đoạn: tập kết lực lượng, hiệp đồng tại cảng và tác chiến trên biển.","items":[{"date":"2026-07-13","title":"Trung Quốc, Nga kết thúc tập trận hải quân chung Joint Sea-2026 tại Thanh Đảo","summary":"Tân Hoa Xã đưa tin tập trận hải quân chung Joint Sea-2026 giữa Trung Quốc và Nga đã kết thúc tại quân cảng Thanh Đảo (Sơn Đông) hôm 13/7, hoàn tất các khoa mục đã định. Đây là lần thứ 12 trong chuỗi tập trận từ 2012, diễn ra 6-13/7 qua 3 giai đoạn gồm trinh sát liên hợp, phòng không - phòng thủ tên lửa và tấn công trên biển.","sourceName":"Xinhua","sourceUrl":"https://english.news.cn/20260713/9379d756304e40088458553afd2c8264/c.html"},{"date":"2026-07-09","title":"Hải quân Trung - Nga bắt đầu diễn tập bắn đạn thật trong khuôn khổ Joint Sea-2026","summary":"Ngày 9/7, tàu chiến Trung Quốc và Nga bắt đầu tiến hành các khoa mục bắn đạn thật tại khu vực chỉ định gần Thanh Đảo, đánh dấu bước tiếp theo của giai đoạn trên biển. Khu trục hạm Kaifeng của Trung Quốc thực hành bắn vào mục tiêu trên không, cùng các khoa mục trinh sát liên hợp, phòng không - phòng thủ tên lửa.","sourceName":"Xinhua","sourceUrl":"https://english.news.cn/20260709/092ca13570a74054af614464467bb24e/c.html"},{"date":"2026-07-09","title":"Tập trận hải quân Trung-Nga chuyển sang giai đoạn hoạt động trên biển","summary":"Sau khi hoàn thành giai đoạn lập kế hoạch tại cảng Thanh Đảo, tàu chiến Trung-Nga rời cảng sáng 9/7 để bắt đầu giai đoạn hoạt động trên biển, gồm tuần tra chung, phòng không-tên lửa, tấn công hàng hải và cứu hộ tàu ngầm.","sourceName":"CGTN","sourceUrl":"https://news.cgtn.com/news/2026-07-09/China-Russia-joint-naval-drills-move-to-at-sea-phase--1OE4RgJMxpu/p.html"},{"date":"2026-07-08","title":"Trung Quốc thử SLBM ra Thái Bình Dương (nhiều khả năng JL-3)","summary":"Hải quân Trung Quốc phóng thử tên lửa đạn đạo chiến lược từ tàu ngầm hạt nhân ra Nam Thái Bình Dương ngày 6/7, được cho là bước tiến tới răn đe trên biển liên tục.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/china-pacific-slbm-test-casd-nuclear-deterrence/","relate":"Diễn ra gần như đồng thời với Joint Sea-2026, cho thấy Bắc Kinh vừa phối hợp phô diễn sức mạnh với Nga vừa độc lập trình diễn năng lực răn đe hạt nhân trên biển ở Tây Thái Bình Dương."}]}],"dipEvents":[{"name":"Thượng đỉnh NATO Ankara 2026","status":"recent","dates":"7–8/7/2026","location":"Ankara, Thổ Nhĩ Kỳ (khu tổ hợp phủ tổng thống Beştepe/Külliye)","scale":"Nguyên thủ và người đứng đầu chính phủ các nước thành viên NATO; lần đầu một Tổng thống Mỹ thăm Thổ Nhĩ Kỳ kể từ 2015; ban hành Tuyên bố thượng đỉnh Ankara","summary":"Hội nghị thượng đỉnh thường niên của NATO năm 2026 do Thổ Nhĩ Kỳ đăng cai, tập trung vào chi tiêu quốc phòng, hỗ trợ Ukraine và loạt sáng kiến năng lực chung. Hội nghị diễn ra trong bầu không khí căng thẳng khi Mỹ công kích một số đồng minh và cuộc chiến Mỹ - Iran leo thang.","items":[{"date":"2026-07-10","title":"Zelensky thúc giục xúc tiến khẩn cấp việc sản xuất tên lửa Patriot tại Ukraine","summary":"Sau khi Tổng thống Trump đồng ý cấp phép tại thượng đỉnh NATO Ankara, Tổng thống Zelensky ngày 10/7 kêu gọi Ukraine gấp rút triển khai các bước kỹ thuật để bắt đầu tự sản xuất tên lửa đánh chặn Patriot (PAC-3), nhằm khắc phục tình trạng thiếu hụt nguồn cung khi Nga tăng cường tấn công tên lửa đạn đạo. Giới chức quốc phòng Ukraine cảnh báo việc thiết lập dây chuyền sản xuất trong nước có thể mất nhiều tháng.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/10/zelenskyy-urges-urgent-efforts-in-ukraine-to-start-patriot-production"},{"date":"2026-07-08","title":"NATO cam kết 70 tỷ euro viện trợ quân sự cho Ukraine giai đoạn 2026-2027","summary":"Kết thúc hội nghị thượng đỉnh tại Ankara, NATO chính thức cam kết cung cấp 70 tỷ euro viện trợ quân sự, thiết bị và huấn luyện cho Ukraine trong hai năm 2026-2027 — cam kết lớn nhất lịch sử liên minh dành cho một quốc gia đang xung đột.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/nato-pledges-70-billion-euros-for-ukraine-as-trump-praises-peace-progress"},{"date":"2026-07-08","title":"NATO phê duyệt sáng kiến 'Drone Edge' 40 tỷ USD và gói tái trang bị 50 tỷ euro","summary":"Bên lề thượng đỉnh Ankara, NATO công bố các thỏa thuận mua sắm quốc phòng mới trị giá hơn 50 tỷ euro và phê duyệt sáng kiến 'NATO Drone Edge' với khoản đầu tư 40 tỷ USD trong 5 năm cho hệ thống máy bay không người lái, cùng cam kết 27 tỷ euro cho hạ tầng nhiên liệu.","sourceName":"Kyiv Post","sourceUrl":"https://www.kyivpost.com/post/79928"},{"date":"2026-07-08","title":"Trump quay sang chỉ trích Tây Ban Nha, đòi Greenland","summary":"Tổng thống Trump công kích Tây Ban Nha vì chi tiêu quốc phòng thấp và tái nêu yêu sách Greenland, phơi bày rạn nứt trong liên minh; văn phòng Thủ tướng Sanchez nói xem đây là chuyện \"bình thường\".","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/08/trump-turns-on-spain-and-demands-greenland-as-nato-summit-exposes-cracks/","relate":"Là tâm điểm gây chia rẽ của thượng đỉnh, cho thấy mâu thuẫn Mỹ - đồng minh về chia sẻ gánh nặng và chủ quyền lãnh thổ ngay tại sự kiện biểu tượng đoàn kết."},{"date":"2026-07-08","title":"Trump ca ngợi NATO \"thống nhất\", nêu khả năng Ukraine tự lắp Patriot","summary":"Rời hội nghị, Trump ca ngợi sự \"thống nhất\" của NATO và gợi ý cấp phép cho Ukraine tự lắp ráp đạn đánh chặn Patriot, dù chuyên gia nói việc này mất nhiều tháng.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/trump-leaves-summit-praising-nato-unification-floats-ukraine-made-patriots/","relate":"Kết quả trực tiếp của thượng đỉnh về hồ sơ Ukraine, cân bằng lại thông điệp cứng rắn của Trump với cam kết hỗ trợ phòng không cho Kyiv."},{"date":"2026-07-09","title":"Đức mua tên lửa Tomahawk của Mỹ, triển khai trên lãnh thổ","summary":"Đức đạt thỏa thuận mua tên lửa hành trình Tomahawk của Mỹ và bố trí trên lãnh thổ, bước chuyển tới năng lực tấn công tầm xa được công bố quanh dịp thượng đỉnh.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/09/germany-to-buy-us-tomahawks-in-shift-toward-own-long-range-capability/","relate":"Nằm trong làn sóng cam kết tăng cường năng lực của các đồng minh xung quanh thượng đỉnh, củng cố răn đe của NATO ở sườn đông."},{"date":"2026-07-08","title":"Lithuania ký MoU tham gia chương trình tàu chuẩn hóa của Na Uy bên lề thượng đỉnh","summary":"Na Uy và Lithuania ký biên bản ghi nhớ liên chính phủ hợp tác về chương trình tàu chuẩn hóa của Na Uy, ký ngày 8/7 bên lề thượng đỉnh NATO.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/kongsberg-norway-standardised-vessels-lithuania-uk/","relate":"Minh họa cho hàng loạt thỏa thuận năng lực song phương/đa phương được chốt bên lề thượng đỉnh, làm sâu hội nhập quốc phòng Bắc Âu - Baltic."},{"date":"2026-07-09","title":"Phân tích: Trump nhắm Tây Ban Nha, NATO hậu thuẫn Ukraine — liên minh còn thống nhất?","summary":"Al Jazeera phân tích nghịch lý của thượng đỉnh: NATO nhất trí tăng chi tiêu quốc phòng nhưng công kích của Trump nhằm vào Tây Ban Nha và Greenland lại đe dọa sự gắn kết.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/9/trump-targets-spain-nato-backs-ukraine-is-the-alliance-still-united","relate":"Bài phân tích chiều sâu về kết quả và ẩn ý chiến lược của thượng đỉnh, đánh giá mức độ đoàn kết thực chất của khối."}]},{"name":"Nhật Bản – New Zealand nâng cấp hợp tác an ninh (ACSA 2026)","status":"recent","dates":"10/7/2026","location":"Tokyo, Nhật Bản","scale":"Ngoại trưởng Nhật Motegi Toshimitsu và Ngoại trưởng New Zealand Winston Peters; ký Hiệp định Trao đổi Hậu cần và Dịch vụ Tương hỗ (ACSA), Hiệp định Bảo mật Thông tin chính thức có hiệu lực","summary":"Nhân chuyến thăm Nhật Bản của Ngoại trưởng New Zealand Winston Peters, hai nước hoàn tất ký Hiệp định Trao đổi Hậu cần và Dịch vụ Tương hỗ (ACSA) và đưa Hiệp định Bảo mật Thông tin vào hiệu lực, đánh dấu bước nâng cấp khuôn khổ hợp tác an ninh - quốc phòng giữa hai đối tác quan trọng của Mỹ tại Ấn Độ Dương - Thái Bình Dương.","items":[{"date":"2026-07-10","title":"Nhật Bản - New Zealand ký thỏa thuận hậu cần quân sự ACSA, nâng cấp quan hệ song phương","summary":"Ngoại trưởng Nhật Bản Motegi Toshimitsu hội đàm với Ngoại trưởng New Zealand Winston Peters tại Tokyo ngày 10/7. Hai bên xác nhận ACSA đã được ký kết và Hiệp định Bảo mật Thông tin chính thức có hiệu lực, đồng thời cam kết tăng cường hợp tác song phương.","sourceName":"Bộ Ngoại giao Nhật Bản","sourceUrl":"https://www.mofa.go.jp/press/release/press1e_000382.html"}]},{"name":"Tuần lễ cấp cao Đại hội đồng LHQ khóa 81","status":"upcoming","dates":"Tháng 9/2026","location":"New York, Mỹ","scale":"Lãnh đạo và trưởng đoàn gần 200 quốc gia thành viên LHQ; các phiên thảo luận chung và loạt cuộc gặp song phương","summary":"Tuần lễ cấp cao thường niên của Đại hội đồng Liên Hợp Quốc, nơi lãnh đạo thế giới phát biểu và tiến hành ngoại giao bên lề. Kỳ 2026 dự kiến xoay quanh xung đột Trung Đông, chiến sự Ukraine và cạnh tranh nước lớn.","items":[]},{"name":"Thượng đỉnh G20 2026 (Mỹ chủ trì)","status":"upcoming","dates":"Cuối năm 2026","location":"Mỹ","scale":"Lãnh đạo 20 nền kinh tế lớn nhất thế giới cùng khách mời","summary":"Mỹ giữ chức chủ tịch luân phiên G20 năm 2026 và sẽ đăng cai hội nghị thượng đỉnh, tập trung vào kinh tế toàn cầu, năng lượng và thương mại trong bối cảnh căng thẳng địa chính trị gia tăng.","items":[]},{"name":"Thủ tướng Ấn Độ Modi công du Australia và New Zealand (07/2026)","status":"recent","dates":"08-11/07/2026","location":"Melbourne (Australia) và Auckland (New Zealand)","scale":"Thăm cấp nguyên thủ tại 2 nước, gồm Thượng đỉnh thường niên Ấn Độ - Australia lần thứ 3","summary":"Thủ tướng Ấn Độ Narendra Modi công du Australia (8-10/7) và New Zealand (10-11/7), đạt loạt kết quả cụ thể: với Australia là Tuyên bố chung Quốc phòng-An ninh, thỏa thuận uranium dân sự, hành lang khoáng sản thiết yếu và Lộ trình an ninh hàng hải Ấn Độ Dương - Thái Bình Dương; với New Zealand là nâng cấp lên Đối tác Chiến lược cùng thỏa thuận hợp tác hàng hải và hậu cần quốc phòng - chuyến thăm New Zealand đầu tiên của một Thủ tướng Ấn Độ trong 40 năm.","items":[{"date":"2026-07-09","title":"Ấn Độ - Australia ký Tuyên bố chung Quốc phòng-An ninh và thỏa thuận uranium dân sự","summary":"Tại Melbourne, Thủ tướng Modi và Thủ tướng Albanese công bố Tuyên bố chung Quốc phòng-An ninh, thỏa thuận xuất khẩu uranium dân sự cho chương trình điện hạt nhân Ấn Độ, hành lang khoáng sản thiết yếu và Lộ trình an ninh hàng hải Ấn Độ Dương - Thái Bình Dương.","sourceName":"Văn phòng Thủ tướng Australia","sourceUrl":"https://www.pm.gov.au/media/australia-india-joint-statement"},{"date":"2026-07-11","title":"Ấn Độ - New Zealand nâng cấp lên Đối tác Chiến lược, ký thỏa thuận hàng hải và hậu cần quốc phòng","summary":"Trong chuyến thăm New Zealand đầu tiên của một Thủ tướng Ấn Độ sau 40 năm, Thủ tướng Modi và Thủ tướng Christopher Luxon nâng quan hệ lên Đối tác Chiến lược, công bố Lộ trình đến 2030 và ký Thỏa thuận Hợp tác Hàng hải (MCA), Thỏa thuận Hỗ trợ Hậu cần song phương cùng hợp tác thủy văn - hải đồ.","sourceName":"Văn phòng Thủ tướng Ấn Độ","sourceUrl":"https://www.pmindia.gov.in/en/news_updates/india-new-zealand-joint-statement/"}]},{"name":"Liên minh phòng thủ tên lửa đạn đạo tích hợp châu Âu (Paris 2026)","status":"recent","dates":"13/07/2026","location":"Paris, Pháp (Điện Invalides)","scale":"10 nước sáng lập: Ukraine, Anh, Pháp, Đức, Ý, Đan Mạch, Hà Lan, Na Uy, Tây Ban Nha, Thụy Điển; ~25 lãnh đạo châu Âu dự","summary":"Ukraine cùng 9 nước châu Âu công bố thành lập Liên minh phòng thủ tên lửa đạn đạo tích hợp tại hội nghị Coalition of the Willing ở Điện Invalides (Paris) do Tổng thống Pháp Macron chủ trì, có Tổng thống Ukraine Zelensky tham dự. Mục tiêu xây dựng năng lực phòng thủ tên lửa đạn đạo chung cho châu Âu, hậu thuẫn dự án lá chắn Freyja do công ty Ukraine Fire Point phát triển (~700.000 USD/quả đánh chặn, rẻ hơn nhiều so với 3,8 triệu USD của Patriot PAC-3), kỳ vọng vận hành trong 12 tháng.","items":[{"date":"2026-07-13","title":"Pháp và 9 nước công bố thành lập Liên minh phòng thủ tên lửa đạn đạo tích hợp cho châu Âu","summary":"Tại Điện Invalides (Paris), Tổng thống Pháp Macron cùng Tổng thống Ukraine Zelensky và lãnh đạo 8 nước châu Âu (Anh, Đức, Ý, Đan Mạch, Hà Lan, Na Uy, Tây Ban Nha, Thụy Điển) ra tuyên bố chung thành lập Liên minh phòng thủ tên lửa đạn đạo tích hợp, nhằm xây dựng năng lực phòng thủ chung trước tên lửa đạn đạo Nga và hậu thuẫn dự án Freyja của Ukraine.","sourceName":"Élysée","sourceUrl":"https://www.elysee.fr/en/emmanuel-macron/2026/07/13/joint-declaration-on-the-establishment-of-the-integrated-anti-ballistic-missile-coalition"}]}],"terms":[{"term":"SLBM","explain":"Tên lửa đạn đạo phóng từ tàu ngầm — vũ khí hạt nhân chiến lược khó bị phát hiện, là trụ cột \"răn đe trên biển\" trong bộ ba hạt nhân."},{"term":"JL-3","explain":"Tên lửa đạn đạo phóng từ tàu ngầm thế hệ ba của Trung Quốc, tầm bắn ước tính trên 10.000 km, đủ vươn tới lục địa Mỹ từ vùng biển gần Trung Quốc."},{"term":"DF-17","explain":"Tên lửa của Trung Quốc mang đầu đạn lượn siêu vượt âm, tầm ~1.800–2.500 km, cơ động cao nhằm xuyên thủng các lá chắn phòng thủ tên lửa."},{"term":"MQ-9 Reaper","explain":"Máy bay không người lái vũ trang tầm xa của Mỹ, dùng cho trinh sát và tấn công; đơn giá cao khiến tổn thất lớn gây tốn kém."},{"term":"Patriot","explain":"Hệ thống tên lửa phòng không của Mỹ (biến thể PAC-3 chuyên đánh chặn tên lửa đạn đạo), được nhiều đồng minh sử dụng."},{"term":"Tomahawk","explain":"Tên lửa hành trình tấn công mặt đất tầm xa (~1.600 km) của Mỹ, phóng từ tàu chiến, tàu ngầm hoặc bệ mặt đất."},{"term":"Eo biển Hormuz","explain":"Điểm nghẽn hàng hải chiến lược giữa Vịnh Ba Tư và Vịnh Oman, nơi trung chuyển khoảng 1/5 lượng dầu tiêu thụ toàn cầu."},{"term":"CENTCOM","explain":"Bộ Tư lệnh Trung tâm Mỹ, phụ trách các hoạt động quân sự ở Trung Đông, Bắc Phi và Trung Á."},{"term":"IRGC","explain":"Vệ binh Cách mạng Hồi giáo Iran — lực lượng quân sự - chính trị tinh nhuệ, kiểm soát chương trình tên lửa và các lực lượng ủy nhiệm của Iran."},{"term":"Hạm đội 5","explain":"Hạm đội 5 Hải quân Mỹ, đặt bộ chỉ huy tại Bahrain, phụ trách vùng Vịnh, Biển Đỏ và Ấn Độ Dương."},{"term":"RIMPAC","explain":"Rim of the Pacific — cuộc tập trận hải quân đa quốc gia lớn nhất thế giới do Mỹ chủ trì hai năm một lần tại Hawaii."},{"term":"Joint Sea","explain":"Chuỗi tập trận hải quân chung thường niên giữa Trung Quốc và Nga, biểu tượng cho hợp tác quân sự ngày càng sâu giữa hai nước."},{"term":"NATO","explain":"Tổ chức Hiệp ước Bắc Đại Tây Dương — liên minh quân sự phòng thủ tập thể gồm Mỹ và các nước châu Âu, Canada, Thổ Nhĩ Kỳ."},{"term":"AUKUS","explain":"Hiệp ước an ninh ba bên Úc - Anh - Mỹ (2021), trọng tâm là trang bị tàu ngầm chạy bằng năng lượng hạt nhân cho Úc."},{"term":"ASBM","explain":"Tên lửa đạn đạo diệt hạm — tên lửa đạn đạo có khả năng đánh trúng tàu chiến di động trên biển, thay đổi cán cân tác chiến hải quân."},{"term":"CASD","explain":"Continuous At-Sea Deterrence — răn đe trên biển liên tục, tức luôn có ít nhất một tàu ngầm mang tên lửa hạt nhân tuần tra sẵn sàng."},{"term":"AWACS","explain":"Máy bay chỉ huy - cảnh báo sớm trên không (như E-3 Sentry), làm \"mắt thần\" quản lý không phận và điều phối tác chiến."},{"term":"ADB","explain":"Ngân hàng Phát triển châu Á — định chế tài chính đa phương hỗ trợ phát triển kinh tế - xã hội khu vực châu Á - Thái Bình Dương."},{"term":"IMF","explain":"Quỹ Tiền tệ Quốc tế — định chế giám sát ổn định tài chính toàn cầu, cho vay và tư vấn chính sách cho các nước thành viên."},{"term":"Vùng phi hạt nhân Nam Thái Bình Dương","explain":"Khu vực được Hiệp ước Rarotonga (1985) tuyên bố cấm thử, bố trí và tàng trữ vũ khí hạt nhân ở Nam Thái Bình Dương."},{"term":"Lợi suất trái phiếu","explain":"Mức sinh lời của trái phiếu; lợi suất tăng phản ánh nhà đầu tư đòi bù đắp rủi ro cao hơn hoặc lo ngại tài khóa/lạm phát."},{"term":"Phi đô la hóa","explain":"Xu hướng các nước giảm phụ thuộc vào đồng USD trong dự trữ, thanh toán và thương mại quốc tế."},{"term":"Đất hiếm","explain":"Nhóm 17 nguyên tố thiết yếu cho điện tử, xe điện và vũ khí công nghệ cao; Trung Quốc hiện thống trị khâu chế biến toàn cầu."},{"term":"Greenland","explain":"Hòn đảo tự trị thuộc Đan Mạch, vị trí chiến lược ở Bắc Cực và giàu khoáng sản; là mục tiêu tham vọng lãnh thổ của Trump."},{"term":"Su-35","explain":"Tiêm kích đa năng hạng nặng thế hệ 4++ của Nga, một trong những chiến đấu cơ chủ lực của không quân Nga."},{"term":"Vốn hóa thị trường","explain":"Tổng giá trị thị trường của toàn bộ cổ phiếu một công ty, bằng giá cổ phiếu nhân số cổ phiếu lưu hành."},{"term":"Lớp Slava","explain":"Lớp tuần dương hạm mang tên lửa dẫn đường thời Liên Xô (Project 1164) của Nga; soái hạm Varyag thuộc Hạm đội Thái Bình Dương."}],"rejectedNews":[{"date":"2026-07-13","category":"Ngoại giao","title":"Bộ trưởng Quốc phòng Nhật - Việt gặp tại Tokyo, khẳng định tăng cường hợp tác an ninh","summary":"Bộ trưởng Quốc phòng Nhật Shinjiro Koizumi đón Phó Thủ tướng, Bộ trưởng Quốc phòng Việt Nam Phan Văn Giang thăm chính thức Nhật Bản (12-15/7); hai bên nhất trí tiếp tục triển khai hợp tác đã thoả thuận, thúc đẩy hợp tác trang bị - công nghệ QP trong khuôn khổ Đối tác Chiến lược Toàn diện.","sourceName":"The Japan Times","sourceUrl":"https://www.japantimes.co.jp/news/2026/07/14/japan/vietnam-japan-defense/","region":"Đông Á","reason":"Tái khẳng định hợp tác đã có, KHÔNG có văn kiện MỚI ký — chưa đạt tiêu chí kết quả cụ thể (nhưng liên quan VN, để cân nhắc cứu)"},{   var news=newsPool().filter(function(a){return (VN_RE.test(txtOf(a))||regionOf(a)==='Biển Đông')&&matchQ(a);});
  var xs=sortD(DATA.xNews||[]).filter(function(a){return VN_RE.test(txtOf(a))&&matchQ(a);});
  var body='';
  if(news.length)body+='<div class="list">'+news.map(function(a){return card(newsCardInner(a),idOf(a));}).join('')+'</div>';
  if(xs.length)body+='<div class="rejsec">Từ X</div><div class="list">'+xs.map(function(a){return card(xCardInner(a),idOf(a));}).join('')+'</div>';
  if(!body)body='<div class="empty">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin Việt Nam / Biển Đông trong bản tin hiện tại.')+'</div>';
  return '<div class="note">Tin <b>Việt Nam gắn quốc tế</b> & <b>Biển Đông</b> — chủ quyền biển, an ninh khu vực, kinh tế đối ngoại. Gom tự động từ Thế giới + Mỹ + X.</div>'+searchInfo(news.length+xs.length)+body;
}

function card(inner,id){return '<div class="card'+(isRead(id)?' read':'')+'">'+inner+'</div>';}
function opBadge(){return '<span class="badge" style="color:#b5852a"><i class="dot" style="background:#b5852a"></i>💬 Bình luận</span>';}

  var head='<div class="crow">'+(a.opinion?opBadge():'')+'<span class="badge"><i class="dot" style="background:'+m[1]+'"></i>'+esc(a.category||'Thời sự')+'</span>'+tierBadge(a.sourceName)+'<span class="date">'+fmtVN(a.date)+'</span></div>';

  return head+body;
}
function analysisCardInner(a){
  return '<div class="crow"><span class="badge" style="color:#b5852a"><i class="dot" style="background:#b5852a"></i>'+esc(a.topic||'Phân tích')+'</span>'+(a.region?'<span class="date">'+esc(a.region)+'</span>':'')+'</div><div class="title">'+newBadge(idOf(a))+esc(a.title)+'</div>'+(a.takeaway?'<div class="take">'+esc(a.takeaway)+'</div>':'')+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.outlet||'')+(a.author?' · '+esc(a.author):'')+(a.date?' · '+fmtVN(a.date):'')+'</span>'+srcLink(a)+actions(a)+'</div>';
}

function dateBar(arr,cur,attr){
  var ds=[];arr.forEach(function(a){if(a.date&&ds.indexOf(a.date)<0)ds.push(a.date);});
  ds.sort();ds.reverse();
  if(ds.length<2)return '';
  var o='<option value="Tất cả"'+(cur==='Tất cả'?' selected':'')+'>Tất cả ngày</option>';
  ds.forEach(function(d){o+='<option value="'+esc(d)+'"'+(cur===d?' selected':'')+'>'+fmtVN(d)+'</option>';});
  return '<div class="filterbar"><span>📅 Lọc ngày</span><select class="dsel" '+attr+'>'+o+'</select></div>';
}
function renderCatNews(arr, note){
  arr=sortD(arr);
  var cats=[];arr.forEach(function(a){if(a.category&&cats.indexOf(a.category)<0)cats.push(a.category);});
  var items=arr.filter(function(a){return (state.wcat==='Tất cả'||a.category===state.wcat)&&(state.wregion==='Tất cả'||regionOf(a)===state.wregion)&&(state.wdate==='Tất cả'||a.date===state.wdate)&&matchQ(a);});
  var chips='<div class="chips"><span class="chip'+(state.wcat==='Tất cả'?' on':'')+'" data-wcat="Tất cả">Tất cả ('+arr.length+')</span>';
  cats.forEach(function(c){var m=wmeta(c);chips+='<span class="chip'+(state.wcat===c?' on':'')+'" data-wcat="'+esc(c)+'"><i class="dot" style="background:'+m[1]+'"></i>'+m[0]+' '+esc(c)+' ('+arr.filter(function(a){return a.category===c;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){return card(newsCardInner(a),idOf(a));}).join(''):'<div class="empty">'+(state.q?'Không có tin khớp tìm kiếm.':'Không có tin khớp bộ lọc.')+'</div>';
  return note+searchInfo(items.length)+chips+catFilters(arr)+'<div class="list">'+cards+'</div>';
}
function freshList(){
  var out=[];
  (DATA.worldNews||[]).forEach(function(a){out.push({it:a,fk:'world',rk:'news'});});
  (DATA.usNews||[]).forEach(function(a){out.push({it:a,fk:'us',rk:'news'});});
  (DATA.xNews||[]).forEach(function(a){out.push({it:a,fk:'x',rk:'x'});});
  (DATA.exercises||[]).forEach(function(e){(e.items||[]).forEach(function(it){out.push({it:it,fk:'event',rk:'drill'});});});
  (DATA.dipEvents||[]).forEach(function(e){(e.items||[]).forEach(function(it){out.push({it:it,fk:'event',rk:'dip'});});});
  out.sort(function(x,y){return (''+(y.it.date||'')).localeCompare(''+(x.it.date||''));});
  return out;
}
function freshCard(w){var a=w.it;var inner=w.rk==='x'?xCardInner(a):(w.rk==='drill'?drillCardInner(a):(w.rk==='dip'?drillCardInner(a,'Liên quan sự kiện'):newsCardInner(a)));return card(inner,idOf(a));}
function renderFresh(){
  var all=freshList();
  var kinds=[['Tất cả','Tất cả'],['world','🌍 Thế giới'],['us',USFLAG+'Mỹ'],['x','X'],['event','🗂️ Sự kiện']];
  var sel=state.fresh||'Tất cả';
  var byKind=all.filter(function(w){return sel==='Tất cả'||w.fk===sel;});
  var ds=[];byKind.forEach(function(w){var d=w.it.date;if(d&&ds.indexOf(d)<0)ds.push(d);});ds.sort();ds.reverse();
  var recent2=ds.slice(0,2);            // 2 ngày gần nhất
  var mode=state.freshDate||'__2d__';   // mặc định: 2 ngày gần nhất
  var items=byKind.filter(function(w){var d=w.it.date;var ok=mode==='__2d__'?(recent2.indexOf(d)>=0):(mode==='Tất cả'?true:(d===mode));return ok&&matchQ(w.it);});
  var nNew=all.filter(function(w){return isNew(idOf(w.it));}).length;
  var LIKEFT={'Công nghệ quân sự':1,'Ngoại giao':1};
  var feat=(mode!=='Tất cả'?items.filter(function(w){return w.rk==='news'&&LIKEFT[w.it.category]&&w.it.significance;}).slice(0,3):[]);
  var featIds={};feat.forEach(function(w){featIds[idOf(w.it)]=1;});
  var rest=items.filter(function(w){return !featIds[idOf(w.it)];});
  var cap=40, shown=rest.slice(0,cap);
  var chips='<div class="chips">'+kinds.map(function(k){var n=(k[0]==='Tất cả'?all:all.filter(function(w){return w.fk===k[0];})).length;return '<span class="chip'+(sel===k[0]?' on':'')+'" data-fresh="'+k[0]+'">'+k[1]+' ('+n+')</span>';}).join('')+'</div>';
  var dopts='<option value="__2d__"'+(mode==='__2d__'?' selected':'')+'>2 ngày gần nhất</option><option value="Tất cả"'+(mode==='Tất cả'?' selected':'')+'>Tất cả ngày</option>'+ds.map(function(d){return '<option value="'+esc(d)+'"'+(mode===d?' selected':'')+'>'+fmtVN(d)+'</option>';}).join('');
  var dsel=ds.length?'<div class="filterbar"><span>📅 Lọc ngày</span><select class="dsel" data-freshdate>'+dopts+'</select></div>':'';
  var dhint=mode==='__2d__'?(recent2.length?' Đang xem <b>2 ngày gần nhất</b> ('+recent2.map(fmtVN).join(', ')+').':''):(mode!=='Tất cả'?' Đang xem ngày <b>'+fmtVN(mode)+'</b> — chọn "2 ngày gần nhất" hoặc "Tất cả ngày" để xem thêm.':'');
  var note=nNew?'<div class="note">🆕 <b>'+nNew+'</b> tin mới kể từ lần bạn xem gần nhất (đánh dấu <span class="newb">MỚI</span>).'+dhint+'</div>':'<div class="note">Tổng hợp tin mới nhất từ mọi mục.'+dhint+'</div>';
  var cards=shown.length?shown.map(freshCard).join(''):'<div class="empty">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin ngày này.')+'</div>';
  var more=rest.length>cap?'<div class="note" style="text-align:center">Đang hiển thị '+cap+'/'+rest.length+' tin — vào từng mục để xem thêm.</div>':'';
  var featHtml=feat.length?'<div class="rejsec">⭐ Nổi bật — Công nghệ quân sự & Ngoại giao</div><div class="list">'+feat.map(freshCard).join('')+'</div>':'';
  var resc=rescuedItems().filter(function(a){var d=a.date;var ok=mode==='__2d__'?(recent2.indexOf(d)>=0):(mode==='Tất cả'?true:(d===mode));return ok&&matchQ(a);});
  var rescHtml=resc.length?'<div class="rejsec">⭐ Tin bạn đã cứu từ mục Bị loại ('+resc.length+')</div>'+resc.map(function(a){return card(newsCardInner(a),idOf(a));}).join(''):'';
  return note+searchInfo(shown.length)+chips+dsel+featHtml+rescHtml+'<div class="list">'+cards+'</div>'+more;
}
function searchInfo(n){return state.q?'<div class="searchinfo">Kết quả cho “'+esc(state.q)+'”: <b>'+n+'</b> tin.</div>':'';}
function catFilters(arr){
  var out='';
  var rs=[];arr.forEach(function(a){var r=regionOf(a);if(r!=='Khác'&&rs.indexOf(r)<0)rs.push(r);});
  if(rs.length){var ord=REGIONS.map(function(x){return x[0];});rs.sort(function(a,b){return ord.indexOf(a)-ord.indexOf(b);});
    var o='<option value="Tất cả"'+(state.wregion==='Tất cả'?' selected':'')+'>Mọi khu vực</option>';
    rs.forEach(function(r){o+='<option value="'+esc(r)+'"'+(state.wregion===r?' selected':'')+'>'+esc(r)+' ('+arr.filter(function(a){return regionOf(a)===r;}).length+')</option>';});
    out+='<span class="fg"><span>🌍 Khu vực</span><select class="dsel" data-wregion>'+o+'</select></span>';}
  var ds=[];arr.forEach(function(a){if(a.date&&ds.indexOf(a.date)<0)ds.push(a.date);});ds.sort();ds.reverse();
  if(ds.length>=2){var d='<option value="Tất cả"'+(state.wdate==='Tất cả'?' selected':'')+'>Tất cả ngày</option>';
    ds.forEach(function(x){d+='<option value="'+esc(x)+'"'+(state.wdate===x?' selected':'')+'>'+fmtVN(x)+'</option>';});
    out+='<span class="fg"><span>📅 Lọc ngày</span><select class="dsel" data-wdate>'+d+'</select></span>';}
  return out?'<div class="filterbar">'+out+'</div>':'';
}

function drillCardInner(a,label){

function drillHeader(ex){
  var pill=ex.status==='ongoing'?'<span class="dpill live">● Đang diễn ra</span>':(ex.status==='upcoming'?'<span class="dpill up">◷ Sắp diễn ra</span>':'<span class="dpill done">✓ Vừa diễn ra</span>');

function renderExercises(){
  var exs=((DATA.exercises&&DATA.exercises.length)?DATA.exercises:EXERCISES).slice();
  var ord={ongoing:0,upcoming:1};
  exs.sort(function(a,b){return (ord[a.status]==null?9:ord[a.status])-(ord[b.status]==null?9:ord[b.status]);});
  var live=exs.filter(function(e){return e.status==='ongoing';}).length;
  var up=exs.filter(function(e){return e.status==='upcoming';}).length;
  var chips='<div class="chips"><span class="chip'+(state.drill==='Tất cả'?' on':'')+'" data-drill="Tất cả">Tất cả ('+exs.length+')</span>';
  exs.forEach(function(e){var on=e.status==='ongoing';chips+='<span class="chip'+(state.drill===e.name?' on':'')+'" data-drill="'+esc(e.name)+'"><i class="dot" style="background:'+(on?'#c0392b':'#2b5f9e')+'"></i>'+esc(e.name.split('(')[0].trim())+'</span>';});
  chips+='</div>';
  var shown=exs.filter(function(e){return state.drill==='Tất cả'||e.name===state.drill;});
  var body=shown.length?shown.map(function(ex){

    var cards=items.length?items.map(function(a){return card(drillCardInner(a),idOf(a));}).join(''):'<div class="empty" style="padding:16px">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin liên quan.')+'</div>';
    return '<section class="drill">'+drillHeader(ex)+'<div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">Chưa có cuộc tập trận nào.</div>';
  return '<div class="note">Các cuộc tập trận quân sự <b>đang & sắp diễn ra</b> — mỗi mục gom tin liên quan kèm <b>nhận xét</b> tin đó liên quan tới cuộc tập trận thế nào. <b>'+live+'</b> đang diễn ra · <b>'+up+'</b> sắp diễn ra.</div>'+chips+body;
}
