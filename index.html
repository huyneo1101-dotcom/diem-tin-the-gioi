<title>Điểm Tin Thế Giới</title>

<style>
:root{--fs:1;
  --bg:#f5f2ec;--paper:#fff;--paper2:#f7f5f1;--ink:#1b1b1b;--title:#141414;--sum:#3a352e;
  --muted:#6b6459;--muted2:#8a8378;--line:#d8d2c6;--line2:#ded8cc;--accent:#b3282d;
  --soft:#efeae0;--note-ink:#5a5349;--star:#c4b48f;--star-on:#d4a017;--accent-soft:#fbeceb;
  --drill-bg:#fbfaf7;--relate-bg:#eef3ee;--green:#1f8a54}
[data-theme=dark]{
  --bg:#1a1712;--paper:#242019;--paper2:#2a251d;--ink:#ece7db;--title:#f5f1e8;--sum:#cfc8ba;
  --muted:#a89f8f;--muted2:#8f8676;--line:#3a352b;--line2:#322e26;--accent:#e07a6f;
  --soft:#2b2620;--note-ink:#cfc8ba;--star:#6b6353;--star-on:#e0b53a;--accent-soft:#3a2622;
  --drill-bg:#201d17;--relate-bg:#1e2620;--green:#4fb07a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double var(--ink);margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:7px 2px;font-size:calc(11.5px*var(--fs));color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;flex-wrap:wrap;gap:2px 4px;margin:14px 0 16px;border-bottom:2px solid var(--ink)}
.tb{white-space:nowrap;padding:9px 14px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted);cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
@media(max-width:520px){.tb{padding:8px 11px;font-size:calc(13.5px*var(--fs))}}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}
.note{font-size:calc(13px*var(--fs));color:var(--note-ink);background:var(--soft);border-left:3px solid var(--accent);padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:var(--paper);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.on .dot{outline:1px solid var(--paper)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid var(--line2);padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:var(--title)}
.sum{font-size:calc(14px*var(--fs));color:var(--sum)}
.take{font-size:calc(13.5px*var(--fs));color:var(--ink);background:var(--soft);border-radius:2px;padding:8px 11px;margin:7px 0}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:var(--muted2)}
.src{font-size:calc(12.5px*var(--fs));color:var(--accent);text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.favb{margin-left:auto;background:none;border:none;cursor:pointer;font-size:calc(18px*var(--fs));line-height:1;color:var(--star);padding:0 2px;font-family:inherit}
.favb:hover{color:var(--star-on)}
.favb.on{color:var(--star-on)}
.filterbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px 18px;margin:-2px 0 14px}
.fg{display:inline-flex;align-items:center;gap:6px}
.filterbar .fg>span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.filterbar>span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px}
.dsel{font-family:inherit;font-size:calc(13px*var(--fs));padding:6px 9px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);cursor:pointer}
.empty{color:var(--muted2);text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
/* ==== Tab Tập trận ==== */
.drill{margin-bottom:24px;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--drill-bg)}
.drill-h{padding:14px 14px 12px;background:var(--soft);border-bottom:1px solid var(--line2)}
.drill-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:6px}
.dpill{font-size:calc(10.5px*var(--fs));font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px}
.dpill.live{background:#c0392b;color:#fff}
.dpill.up{background:#2b5f9e;color:#fff}
.dpill.done{background:#1f8a54;color:#fff}
.seg{display:flex;gap:5px;margin:0 0 16px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;padding:4px}
.seg button{flex:1;padding:9px 6px;border:none;background:none;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700;font-size:calc(13.5px*var(--fs));color:var(--muted);white-space:nowrap}
.seg button.on{background:var(--ink);color:var(--bg)}
#concept-fab{position:fixed;z-index:90;background:var(--accent);color:#fff;border:none;border-radius:16px;padding:7px 13px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.32);display:none}
.cadd{display:flex;gap:7px;margin:0 0 14px}
.cadd input{flex:1;min-width:0;border:1px solid var(--line);background:var(--paper);border-radius:7px;padding:9px 11px;font-family:inherit;font-size:calc(13.5px*var(--fs));color:var(--ink);outline:none}
.cadd button{border:none;background:var(--ink);color:var(--bg);border-radius:7px;padding:9px 16px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.clist{display:flex;flex-direction:column;gap:10px}
.citem{border:1px solid var(--line2);border-radius:8px;padding:11px 13px;background:var(--drill-bg)}
.cterm{font-weight:800;font-size:calc(15px*var(--fs));color:var(--title);display:flex;align-items:center;gap:8px}
.cx{margin-left:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;font-family:inherit;line-height:1;padding:0 2px}
.cx:hover{color:var(--accent)}
.cexp{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:6px;line-height:1.55}
.cpend{font-style:italic;color:var(--muted2)}
.drill-dates{font-size:calc(12px*var(--fs));color:var(--muted);font-weight:700}
.drill-name{font-family:inherit;font-size:calc(21px*var(--fs));font-weight:800;line-height:1.25;color:var(--title);margin-bottom:5px}
.drill-meta{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:2px}
.drill-sum{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:8px;line-height:1.5}
.drill .list{padding:0 14px 4px}
.drill .card{padding:14px 0}
.drill .card:last-child{border-bottom:none}
.relate{font-size:calc(13px*var(--fs));color:var(--ink);background:var(--relate-bg);border-left:3px solid var(--green);border-radius:2px;padding:8px 11px;margin:8px 0 2px;line-height:1.5}
.relate b{color:var(--green)}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double var(--ink);font-size:calc(11.5px*var(--fs));color:var(--muted2);text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:var(--muted2);margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid var(--line);background:var(--paper);border-radius:6px;cursor:pointer;font-size:16px;color:var(--ink)}
.rp-fonts button .vi{font-size:12px;color:var(--muted2);font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:var(--accent);background:var(--accent-soft)}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}

/* ==== Tính năng mới ==== */
.toolbar{display:flex;align-items:center;gap:8px;margin:0 0 14px}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 11px}
.search input{flex:1;min-width:0;border:none;background:none;outline:none;font-family:inherit;font-size:calc(14px*var(--fs));color:var(--ink)}
.search .sx{cursor:pointer;color:var(--muted2);border:none;background:none;font-size:16px;font-family:inherit;padding:0 2px;line-height:1}
.searchinfo{font-size:calc(12.5px*var(--fs));color:var(--muted2);margin:-4px 0 12px}
.card.read .title{color:var(--muted)}
.card.read .sum{opacity:.7}
.newb{display:inline-block;font-size:calc(9.5px*var(--fs));font-weight:800;letter-spacing:.5px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 6px;margin-right:6px;vertical-align:1px}
.foot-act{margin-left:auto;display:inline-flex;align-items:center;gap:9px}
.foot-act .favb{margin-left:0}
.shareb,.copyb{background:none;border:none;cursor:pointer;color:var(--muted2);padding:2px;line-height:0;display:inline-flex;align-items:center;border-radius:5px}
.shareb svg,.copyb svg{display:block}
.shareb:active,.copyb:active{transform:scale(.9)}
.shareb:hover,.copyb:hover{color:var(--accent)}
#toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(18px);z-index:80;background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:8px;font-size:14px;font-family:inherit;box-shadow:0 6px 24px rgba(0,0,0,.35);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.rp-themes{display:flex;gap:6px}
.rp-themes button{flex:1;padding:8px 6px;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-size:12.5px;font-family:inherit;color:var(--ink)}
.rp-themes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
</style>
</head>

ine-to-get-license-for-making-patriot-interceptors-trump-pledges/","significance":"Bước hỗ trợ phòng không đáng kể cho Ukraine; phản ánh xu hướng chuyển từ viện trợ trực tiếp sang trao năng lực tự sản xuất, dù còn vướng ràng buộc chuỗi cung ứng."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump nghiêng về việc gỡ trừng phạt và bán lại F-35 cho Thổ Nhĩ Kỳ","summary":"Sau cuộc gặp Tổng thống Erdogan tại Ankara, ông Trump phát tín hiệu sẽ dỡ trừng phạt và cho Thổ Nhĩ Kỳ tái gia nhập chương trình tiêm kích tàng hình F-35. Israel lo ngại động thái này làm lung lay ưu thế quân sự khu vực của mình.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/07/us-will-lift-sanctions-on-turkey-possibly-sell-f-35-fighter-jets-trump-says/","significance":"Cú đảo chiều chính sách lớn nhằm thưởng cho Erdogan; phản ánh việc Mỹ ưu tiên kéo Thổ về phía mình, nhưng làm lung lay ưu thế quân sự của Israel và trật tự khu vực."},{"date":"2026-07-08","category":"Kinh tế","title":"Chính quyền Trump gỡ hạn chế với OpenAI, mở đường phát hành rộng GPT-5.6","summary":"Nhà Trắng dỡ bỏ các hạn chế đối với mô hình mới nhất của OpenAI, cho phép hãng tiến hành phát hành rộng rãi GPT-5.6 ngay trong tuần sau giai đoạn kiểm thử bổ sung. Đây là bước nới lỏng chính sách công nghệ đáng chú ý giữa lúc Mỹ siết cạnh tranh AI.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/08/openai-gpt-trump-ban-lifted","significance":"Nới lỏng chính sách công nghệ để giữ lợi thế AI của Mỹ; phản ánh xu hướng ưu tiên chạy đua AI hơn là thận trọng về quản lý rủi ro."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lầu Năm Góc tìm phương án UAV giá rẻ thay thế 'Thần Chết' MQ-9 Reaper","summary":"Bộ Quốc phòng Mỹ và Đơn vị Đổi mới Quốc phòng (DIU) khởi động tìm kiếm các mẫu drone chi phí thấp có thể đảm nhận nhiệm vụ trinh sát-tấn công của MQ-9 Reaper, vốn ngày càng đắt đỏ và dễ tổn thương trước phòng không hiện đại.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/08/pentagon-to-explore-cheaper-replacements-for-the-mq-9-reaper/","significance":"Phản ánh xu hướng Mỹ chuyển sang UAV tiêu hao, giá rẻ, số lượng lớn thay cho khí tài đắt tiền."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung hai startup vào nhóm phóng tên lửa nhỏ và vừa","summary":"Space Force chọn thêm hai công ty khởi nghiệp tham gia cạnh tranh các nhiệm vụ phóng vệ tinh cỡ nhỏ và vừa, nhằm mở rộng nguồn cung phương tiện phóng và giảm phụ thuộc vào số ít nhà thầu lớn.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/space-force-adds-two-startups-to-small-medium-launch-pool/","significance":"Đa dạng hóa nhà cung cấp phóng giúp Mỹ tăng khả năng phục hồi và tốc độ triển khai vệ tinh quân sự."},{"date":"2026-07-08","category":"Kinh tế","title":"Quân đội Mỹ 'gần cạn ngân sách', Lầu Năm Góc xin thêm 67 tỷ USD","summary":"Lầu Năm Góc đề nghị bổ sung 67 tỷ USD để bù thiếu hụt do chi phí chiến dịch quân sự nhằm vào Iran leo thang, dù đã được cấp gần 900 tỷ USD cho tài khóa 2026; Bộ Quốc phòng nói không đủ tiền mua đạn và sửa chữa hạ tầng căn cứ.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/quan-doi-my-gan-can-ngan-sach-5095015.html","significance":"Cho thấy chiến dịch quân sự nhằm Iran tốn kém vượt dự toán; phản ánh áp lực ngân sách và mức độ leo thang can dự quân sự của Mỹ ở Trung Đông."},{"date":"2026-07-08","category":"Chính trị","title":"Ông Trump: 'Lệnh ngừng bắn với Iran đã hết'","summary":"Tổng thống Trump tuyên bố thỏa thuận ngừng bắn với Iran đã chấm dứt sau đụng độ gần eo biển Hormuz, nói 'đàm phán chỉ tốn thời gian'; quân đội Mỹ không kích hơn 80 mục tiêu Iran, khiến Vệ binh Cách mạng phóng tên lửa trả đũa vào các vị trí Mỹ ở Bahrain và Kuwait.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ong-trump-lenh-ngung-ban-voi-iran-da-het-5095058.html","significance":"Đánh dấu xung đột Mỹ–Iran leo thang trở lại; phản ánh chiến lược gây sức ép tối đa và rủi ro chiến tranh mở rộng quanh eo biển Hormuz."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Mỹ tấn công hơn 80 mục tiêu Iran, IRGC nói bắn hạ MQ-9","summary":"Bộ Chỉ huy Trung tâm Mỹ không kích hơn 80 mục tiêu Iran gồm hệ thống phòng không và trạm radar; Vệ binh Cách mạng Hồi giáo Iran tuyên bố bắn hạ một UAV MQ-9 của Mỹ và trả đũa nhằm vào 85 mục tiêu quân sự Mỹ trong khu vực.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/my-tan-cong-hon-80-muc-tieu-iran-irgc-noi-ban-ha-mq-9-185260708103206537.htm","significance":"Cho thấy đối đầu quân sự trực diện Mỹ–Iran; phản ánh vòng xoáy ăn miếng trả miếng đe dọa an ninh hàng hải và giá dầu toàn cầu."},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump dọa cắt quan hệ thương mại với Tây Ban Nha, đòi Mỹ tiếp quản Greenland tại NATO","summary":"Tại thượng đỉnh NATO ở Ankara, Tổng thống Trump chỉ trích gay gắt các đồng minh, gọi Tây Ban Nha là 'đối tác tồi tệ' vì cách hành xử trong cuộc chiến Mỹ - Israel với Iran và dọa cắt quan hệ thương mại. Ông cũng nhắc lại đòi hỏi Mỹ tiếp quản Greenland, khoét sâu chia rẽ trong khối quanh vấn đề chi tiêu quốc phòng và chiến tranh Ukraine.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/trump-threatens-spain-trade-demands-us-take-over-greenland-at-nato-summit","significance":"Phơi bày phong cách ngoại giao cưỡng ép của Trump ngay trong nội khối NATO; phản ánh căng thẳng đồng minh và tham vọng lãnh thổ gây bất an cho châu Âu."},{"date":"2026-07-07","category":"Chính trị","title":"Thượng nghị sĩ Dân chủ chất vấn vụ hoán cải chiếc Air Force One do Qatar tặng","summary":"Nhóm nghị sĩ Dân chủ yêu cầu Không quân Mỹ và nhà thầu giải trình về chi phí, tiến độ và rủi ro an ninh của việc cải hoán chiếc máy bay do Qatar tặng để dùng làm chuyên cơ tổng thống, giữa lo ngại về minh bạch và xung đột lợi ích.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/senate-dems-seek-air-force-contractor-answers-on-qatari-gifted-air-force-one-conversion/","significance":"Nghi vấn về minh bạch và xung đột lợi ích; phản ánh giằng co giám sát giữa Quốc hội và chính quyền, giữa lo ngại an ninh và đạo đức công vụ."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Hải quân Mỹ lo tàu ngầm hạt nhân chiến lược có thể bị drone và rocket chống tăng đe dọa","summary":"Giới chức Hải quân Mỹ cảnh báo các tàu ngầm mang tên lửa đạn đạo (SSBN) khi ở cảng hoặc vùng nước nông có thể trở thành mục tiêu của drone giá rẻ và vũ khí cá nhân như rocket chống tăng, đặt ra yêu cầu mới về bảo vệ cận vệ.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/07/us-navy-fears-ballistic-missile-subs-can-be-hit-by-drones-anti-tank-rockets/","significance":"Cho thấy vũ khí không người lái giá rẻ đang thách thức cả trụ cột răn đe hạt nhân của Mỹ."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Lục quân Mỹ thử nghiệm rải mìn hàng loạt bằng phương tiện tự hành","summary":"Quân đội Mỹ tiến hành thử nghiệm rải mìn quy mô lớn bằng các phương tiện mặt đất tự hành, cho phép thiết lập bãi vật cản nhanh mà không cần đưa binh sĩ vào khu vực nguy hiểm.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-military/2026/07/07/us-army-tests-autonomous-mass-mine-laying/","significance":"Tự động hóa tác chiến công binh giúp tăng tốc độ và giảm rủi ro nhân mạng trong phòng ngự."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"GAO: Các chương trình vũ khí siêu vượt âm của Lầu Năm Góc chật vật vì chậm tiến độ và sản xuất","summary":"Báo cáo thường niên của Cơ quan Kiểm toán Chính phủ Mỹ (GAO) chỉ ra rủi ro lớn ở ba chương trình vũ khí siêu vượt âm. Không quân buộc phải cắt số lần bay thử tên lửa hành trình tấn công siêu vượt âm (HACM) từ bảy xuống năm do chậm hoàn thiện thiết kế. Nút thắt sản xuất ở Lục quân và Hải quân khiến việc bàn giao khẩu đội LRHW thứ hai của Lục quân trễ ít nhất sáu tháng.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/07/gao-pentagon-hypersonic-programs-schedule-constraints-production-woes/","significance":"Chậm trễ vũ khí siêu vượt âm nới rộng khoảng cách với Trung Quốc và Nga trong lĩnh vực được xem là then chốt của răn đe thế hệ mới."},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Hải quân Mỹ kết thúc tìm kiếm thủy thủ mất tích trên biển Arab","summary":"Hải quân Mỹ hôm 6/7 ngừng chiến dịch tìm kiếm một thủy thủ mất tích sau khi trực thăng MH-60S thuộc tàu sân bay USS George H.W. Bush (CVN-77) hạ cánh khẩn cấp xuống biển Arab. Cuộc tìm kiếm kéo dài bốn ngày, bao phủ 14.000 dặm vuông, huy động cả Không quân, tàu sân bay USS Abraham Lincoln (CVN-72) và các khu trục hạm USS Ross, Donald Cook, Higgins, Mason và John Finn.","sourceName":"USNI News","sourceUrl":"https://news.usni.org/2026/07/06/navy-ends-search-for-missing-george-h-w-bush-sailor-in-arabian-sea","significance":"Phản ánh cường độ hoạt động và rủi ro của các nhóm tác chiến tàu sân bay Mỹ tại vùng Vịnh giữa lúc căng thẳng với Iran."},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Lầu Năm Góc trao gói thầu 80 triệu USD cho hệ thống AI bảo vệ căn cứ Không quân trước drone nhỏ","summary":"AeroVironment nhận đơn đặt hàng trị giá 80,5 triệu USD — gói đầu tiên trong hợp đồng khung 500 triệu USD của Lầu Năm Góc — để cung cấp hệ thống chống drone dùng AI bảo vệ các căn cứ của Bộ Tư lệnh Tấn công Toàn cầu Không quân. Nền tảng Titan-MS dùng thuật toán AI và học máy để phát hiện, nhận dạng và vô hiệu hóa mối đe dọa từ máy bay không người lái qua nhiều loại cảm biến. Nỗ lực này thuộc sáng kiến Domestic Shield do lực lượng đặc nhiệm JIATF-401 của Lục quân dẫn dắt.","significance":"Phản ánh việc Mỹ chuyển từ mua sắm lẻ tẻ sang triển khai đại trà lá chắn AI chống drone cho các căn cứ trong nước sau hàng loạt sự cố xâm nhập UAS.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/06/pentagon-awards-task-order-to-av-for-titan-drone-defense/"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Báo cáo giám sát: các chương trình vũ khí lớn nhất của Lầu Năm Góc chậm tiến độ 12 năm","summary":"Văn phòng Trách nhiệm Giải trình Chính phủ (GAO) phát hiện 104 chương trình vũ khí đắt đỏ nhất của Lầu Năm Góc hiện mất trung bình hơn 12 năm để đưa vào sử dụng, với tình trạng trễ tiến độ triền miên trên diện rộng. Báo cáo chỉ ra nhiều hệ thống bị đưa vào quy trình mua sắm nhanh dù công nghệ chưa hoàn thiện, làm hỏng mục tiêu triển khai nhanh. Các chương trình như drone MQ-25 Stingray của Hải quân và khu trục hạm DDG(X) đối mặt trễ hạn đáng kể.","significance":"Cho thấy điểm yếu cốt lõi trong năng lực trang bị vũ khí của Mỹ, đe dọa khả năng cạnh tranh quân sự với Trung Quốc trong thập kỷ tới.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/pentagon-congress/2026/07/06/pentagons-top-new-weapons-programs-are-12-years-behind-schedule-watchdog/"},{"date":"2026-07-04","category":"Công nghệ quân sự","title":"Saronic hạ thuỷ tàu mặt nước không người lái Mirage đầu tiên dài 16 mét, tầm hoạt động trên 2.500 hải lý","summary":"Saronic công bố hạ thuỷ chiếc Mirage đầu tiên vào ngày 2/7/2026, một tàu mặt nước tự hành (ASV) dài 52 ft (16 m) đạt tốc độ trên 35 hải lý/giờ, tầm hoạt động vượt 2.500 hải lý và tải trọng 3.500 pound. Mirage là nền tảng chủ lực thứ ba của hãng bên cạnh Corsair (24 ft) và Marauder (180 ft), được điều khiển qua nền tảng chỉ huy Echelon. Con tàu đi từ thiết kế đến hạ thuỷ trong chưa đầy một năm, hiện bắt đầu thử nghiệm trên mặt nước tại Galveston, Texas trong khi chiếc thứ hai đã lên dây chuyền.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/saronic-launches-first-mirage-16-meter-uncrewed-surface-vessel/","significance":"Thể hiện năng lực sản xuất hàng loạt tàu tự hành ở tốc độ và quy mô lớn của ngành công nghiệp Mỹ, phục vụ chiến lược hạm đội lai (hybrid fleet) với đông đảo tàu không người lái."},{"date":"2026-07-02","category":"Công nghệ quân sự","title":"80.000 nhà thầu quốc phòng Mỹ chỉ còn ~20 tháng để đạt chứng nhận an ninh mạng CMMC giữa tình trạng thiếu đơn vị đánh giá","summary":"National Defense cảnh báo cơ sở công nghiệp quốc phòng Mỹ có khoảng 20 tháng để chứng nhận ước tính 80.000 nhà thầu theo chuẩn an ninh mạng CMMC, trong khi chỉ có chưa tới 100 tổ chức được cấp phép đánh giá (khoảng 97 tính đến tháng 3). Giai đoạn 2 của CMMC bắt đầu từ 10/11 khi chứng nhận Cấp 2 trở thành điều kiện trao hợp đồng; chuẩn gồm 110 yêu cầu bảo mật theo NIST SP 800-171. Nhiều nhà thầu cần 12-18 tháng chuẩn bị, tạo khoảng cách lớn giữa cung và cầu đánh giá.","significance":"Nút thắt an ninh mạng có thể loại nhiều doanh nghiệp nhỏ khỏi chuỗi cung ứng quốc phòng Mỹ, ảnh hưởng trực tiếp tới năng lực và sức bền của cơ sở công nghiệp quốc phòng.","sourceName":"National Defense Magazine","sourceUrl":"https://www.nationaldefensemagazine.org/articles/2026/7/2/industry-should-apply-y2k-lessons-learned-to-cmmc-crunch"}],"analyses":[{"date":"2026-07-08","region":"Châu Mỹ","topic":"Xét lại hiệp định USMCA","outlet":"CSIS","author":"William Alan Reinsch","title":"Giai đoạn tiếp theo của USMCA","summary":"Chính quyền Trump đã kích hoạt cơ chế rà soát 10 năm của USMCA vào ngày 1/7, bác bỏ phương án gia hạn đơn thuần. Đàm phán nay xoay quanh lo ngại an ninh — nhất là chặn hàng Trung Quốc đi vòng qua 'cửa sau' Bắc Mỹ — cùng tranh cãi về quy tắc xuất xứ và các vấn đề ngành.","takeaway":"Bất định kéo dài sẽ ghìm đầu tư doanh nghiệp, dù cách tiếp cận chuyên nghiệp của USTR để ngỏ khả năng đạt thỏa thuận sửa đổi.","url":"https://www.csis.org/analysis/next-phase-usmca"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Cướp biển Somalia trở lại","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Cướp biển Somalia đã trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Cướp biển Somalia tái xuất với các vụ bắt tàu hàng gần đây, nhưng liên minh hải quân đa quốc gia từng dẹp yên hồi 2011 không thể tái lập vì ưu tiên địa chính trị đã đổi. Tác giả đề xuất cấu trúc lấy khu vực làm trung tâm, để lực lượng biển địa phương dẫn dắt với hỗ trợ tình báo và năng lực chuyên biệt từ bên ngoài.","takeaway":"Giải pháp bền vững đòi hỏi an ninh hàng hải do khu vực dẫn dắt, đồng thời xử lý gốc rễ là quản trị yếu kém ở Somalia.","url":"https://warontherocks.com/2026/07/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-07","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Thử tên lửa hạt nhân của Trung Quốc","outlet":"CSIS","author":"Joseph Rodgers, Bonny Lin & Leon Li","title":"Vụ thử SLBM của Trung Quốc cho thấy cần một thỏa thuận thông báo phóng tên lửa đạn đạo","summary":"Vụ thử tên lửa đạn đạo phóng từ tàu ngầm ngày 6/7 ra vùng biển quốc tế là lần đầu Trung Quốc phô diễn công khai năng lực hạt nhân chiến lược ở Ấn Độ Dương - Thái Bình Dương. Bắc Kinh chỉ báo trước vài giờ thay vì 24 giờ theo Bộ Quy tắc Hague, cho thấy ý định thường lệ hóa các vụ thử mà né quy trình thông báo quốc tế.","takeaway":"Sự mờ ám của Trung Quốc về kho hạt nhân đang mở rộng làm xói mòn ổn định toàn cầu và cần một thỏa thuận thông báo phóng chuẩn hóa.","url":"https://www.csis.org/analysis/chinas-slbm-test-underscores-importance-ballistic-missile-launch-notification-agreement"},{"date":"2026-07-07","region":"Châu Âu/NATO","topic":"Dư luận Nga và chiến tranh Ukraine","outlet":"CSIS","author":"Maria Snegovaya & Jade McGlynn","title":"Thái độ người Nga đang đổi khi hệ quả chiến tranh về đến nhà","summary":"Các đợt tập kích bằng drone của Ukraine vào hạ tầng năng lượng Nga đang đưa hệ quả kinh tế của cuộc chiến đến tận người dân qua thiếu nhiên liệu và gián đoạn dịch vụ. Tác giả nhận định cú sốc kinh tế đời thường có sức bào mòn ủng hộ chiến tranh mạnh hơn các cú sốc quân sự đơn thuần.","takeaway":"Phương Tây nên phối hợp trừng phạt và truyền thông để gắn khó khăn trong nước Nga với lựa chọn gây chiến của Kremlin.","url":"https://www.csis.org/analysis/russian-attitudes-are-shifting-wars-effects-come-home"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Tự chủ quốc phòng châu Âu","outlet":"CSIS","author":"Max Bergmann & Otto Svendsen","title":"Hãy biến Thượng đỉnh Ankara thành chuyện tự chủ quốc phòng châu Âu","summary":"Các tác giả kêu gọi thành viên châu Âu của NATO dùng thượng đỉnh Ankara để chuẩn bị cho kịch bản Mỹ giảm hậu thuẫn, bằng kế hoạch cụ thể cho phòng thủ lục địa tự chủ. Việc Mỹ cạn nguồn lực, dồn sang Trung Quốc khiến tự lực của châu Âu là tất yếu.","takeaway":"Châu Âu cần lộ trình chuyển giao gánh nặng có thời hạn rõ, tăng tốc công nghiệp quốc phòng và cải tổ hợp tác NATO-EU.","url":"https://www.csis.org/analysis/make-ankara-summit-about-european-defense-autonomy"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Chiến tranh Nga - Ukraine","outlet":"Institute for the Study of War (ISW)","author":"Christina Harward, Jennie Olmsted, Tetiana Trach, Anna Thacker, Karolina Hird","title":"Đánh giá chiến dịch tấn công của Nga, ngày 6/7/2026","summary":"ISW ghi nhận Nga vừa thực hiện đợt tập kích tên lửa - drone quy mô lớn thứ tư kể từ 1/6, phóng tổng cộng 419 quả nhắm chủ yếu vào Kyiv, gây hàng chục thương vong dân thường. Nga khai thác việc Ukraine cạn kho đạn đánh chặn bằng cách dồn tên lửa đạn đạo trong mỗi gói tấn công. Đợt đánh diễn ra ngay trước thượng đỉnh NATO (7-8/7) nhằm phô trương sức ép. Đáp lại, Ukraine tập kích nhà máy lọc dầu lớn nhất của Nga ở Omsk, cách biên giới hơn 2.500 km.","takeaway":"Nga leo thang tập kích chiến lược và khiêu khích NATO để tạo áp lực trước thềm thượng đỉnh, trong khi Ukraine chứng minh năng lực đánh sâu chưa từng có.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-6-2026"},{"date":"2026-07-06","region":"Trung Đông","topic":"Hành lang thương mại - năng lượng","outlet":"Atlantic Council","author":"Allison Minor","title":"Các hành lang mới ở Trung Đông không chỉ để né eo biển Hormuz","summary":"Minor phân tích làn sóng dự án hạ tầng đường sắt, đường ống và logistics trên bộ đang nổi lên khắp Trung Đông sau những gián đoạn ở eo biển Hormuz. Saudi Arabia, UAE và Oman mở rộng mạng lưới đường sắt và trung tâm trung chuyển, trong khi Hành lang Ấn Độ - Trung Đông - châu Âu (IMEC) cần tái cấu trúc theo cách tiếp cận 'mạng lưới' thay vì một tuyến đơn lẻ. Thành công đòi hỏi tích hợp hải quan số, hài hòa quy định và cam kết chính trị bền vững, thậm chí mở ra một 'hành lang điện toán'.","takeaway":"Các hành lang này vượt xa mục tiêu né chốt chặn hàng hải, mở ra cơ hội đa dạng hóa kinh tế và hội nhập khu vực nếu có quản trị đủ mạnh.","url":"https://www.atlanticcouncil.org/blogs/menasource/new-middle-east-corridors-are-about-more-than-just-bypassing-the-strait-of-hormuz/"},{"date":"2026-07-06","region":"Đông Á","topic":"Trật tự toàn cầu - Trung Quốc","outlet":"The Diplomat","author":"","title":"Thời cơ để Trung Quốc định hình trật tự toàn cầu mới","summary":"Bài phân tích cho rằng chuyến thăm Bắc Kinh giữa tháng 5 của Tổng thống Mỹ Donald Trump đã bộc lộ một động lực mới trong quan hệ Mỹ - Trung, khi Bắc Kinh thể hiện vai trò chủ động hơn trong việc định hình quan hệ song phương. Theo tác giả, chuỗi tiếp xúc ngoại giao gần đây đưa Trung Quốc vào trung tâm sân khấu thế giới và củng cố năng lực định hình trật tự quốc tế, thay vì chỉ tuyên bố tham vọng. Bắc Kinh đang chuyển từ thế phòng thủ sang chủ động dẫn dắt chương trình nghị sự khu vực và toàn cầu.","takeaway":"Trung Quốc đang tận dụng thế chủ động ngoại giao mới để chuyển từ tuyên bố tham vọng sang thực sự định hình trật tự quốc tế.","url":"https://thediplomat.com/2026/07/chinas-moment-to-shape-a-new-global-order/"},{"date":"2026-07-03","region":"Châu Âu/NATO","topic":"Chiến lược quân Mỹ ở châu Âu","outlet":"War on the Rocks","author":"Benjamin H. Friedman & Moritz S. Graefrath","title":"Sai lầm và bị hiểu lầm: Cách tiếp cận của Trump với quân Mỹ tại châu Âu","summary":"Hai tác giả cho rằng sai lầm của chính quyền Trump không nằm ở việc dọa rút quân, mà ở chỗ không thực sự rút — thay vào đó theo đuổi 'bá quyền phi tự do', đổi sự hiện diện quân sự lấy các cam kết tăng chi tiêu mơ hồ của châu Âu.","takeaway":"Mỹ nên rút quân khỏi châu Âu theo lộ trình có kiểm soát vì mối đe dọa Nga hạn chế, thay vì mặc cả nửa vời.","url":"https://warontherocks.com/2026/07/misguided-and-misunderstood-trumps-approach-to-u-s-troops-in-europe/"},{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân đội Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Giới phân tích phương Tây đang gặp lỗ hổng nghiêm trọng khi hiểu chiến lược quân sự Trung Quốc do văn bản học thuyết lỗi thời và việc PLA siết chặt nguồn thông tin. Sự thiếu hụt này buộc hoạch định chính sách phải dựa vào suy đoán.","takeaway":"Nên khôi phục một dịch vụ dịch thuật công khai kiểu FBIS qua Thư viện Quốc hội để có tư liệu quân sự Trung Quốc chuẩn xác.","url":"https://warontherocks.com/2026/07/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Mỹ","topic":"Thương mại Bắc Mỹ","outlet":"CSIS","author":"Diego Marroquín Bitar, Kellie Meiman Hock, Eric Miller, Juan Carlos Baker, William Alan Reinsch","title":"Mỹ chọn không gia hạn Hiệp định USMCA","summary":"Ngày 1/7/2026, Mỹ từ chối gia hạn USMCA thêm 16 năm, thay vào đó kích hoạt cơ chế rà soát hằng năm kéo dài đến 2036; hiệp định vẫn duy trì theo điều khoản hiện hành nhưng không có lộ trình đàm phán rõ ràng. Năm chuyên gia CSIS cảnh báo quyết định này tạo ra bất định kéo dài cho chuỗi cung ứng và đầu tư khắp Bắc Mỹ. Quan hệ Mỹ - Canada xuống mức thấp lịch sử; các vấn đề gỗ, sữa, quy tắc xuất xứ ô tô và vai trò kinh tế Trung Quốc vẫn treo lơ lửng.","takeaway":"Thay vì đổ vỡ, USMCA bước vào giai đoạn xói mòn chậm và bất định thường niên, gây rủi ro cho đầu tư và chuỗi cung ứng Bắc Mỹ.","url":"https://www.csis.org/analysis/united-states-has-opted-not-extend-usmca"},{"date":"2026-07-02","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Hợp tác quốc phòng - công nghiệp","outlet":"The Diplomat","author":"","title":"Chiến lược Ấn Độ Dương - Thái Bình Dương của Ý xoay trục sang hợp đồng quốc phòng","summary":"Bài viết chỉ ra Ý đang lặng lẽ tăng cường hiện diện ở khu vực thông qua hợp tác quân sự - công nghiệp thay vì ngoại giao truyền thống. Bộ trưởng Quốc phòng Guido Crosetto dự Đối thoại Shangri-La ở Singapore chỉ là một mảnh của bức tranh lớn: Rome mở rộng hợp tác quốc phòng với Malaysia và Quốc hội duyệt chuyển giao tàu sân bay hết niên hạn Giuseppe Garibaldi cho Indonesia. Khác Pháp, Ý không có hiện diện quân sự thường trực nên ảnh hưởng phụ thuộc vào triển khai hải quân, hợp tác công nghiệp và trao đổi quân sự dài hạn.","takeaway":"Ý tái nhập cuộc chơi Ấn Độ Dương - Thái Bình Dương bằng con đường hợp đồng quốc phòng và công nghiệp, tận dụng nhu cầu hiện đại hóa hải quân của Đông Nam Á.","url":"https://thediplomat.com/2026/07/italys-indo-pacific-strategy-turns-toward-defense-contracts/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân sự Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Morris lập luận rằng giới phân tích phương Tây bị bó hẹp nghiêm trọng trong việc hiểu chiến lược quân sự Trung Quốc do khó tiếp cận tài liệu học thuyết hiện hành của Quân Giải phóng Nhân dân (PLA) và phải dựa vào các nguồn tham chiếu đã lỗi thời. Sự thiếu hụt thông tin này buộc nhà hoạch định chính sách và người lập kế hoạch tác chiến phải suy đoán và 'soi gương' (mirror-imaging) thay vì dựa trên nguồn chính thống của Trung Quốc.","takeaway":"Nên khôi phục một Dịch vụ Thông tin Phát thanh Nước ngoài (FBIS) công khai, đặt tại Thư viện Quốc hội, để cung cấp bản dịch và phân tích ấn phẩm quân sự Trung Quốc cho giới nghiên cứu.","url":"https://warontherocks.com/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chiến dịch Nga tại Ukraine","outlet":"Institute for the Study of War (ISW)","author":"","title":"Đánh giá chiến dịch tấn công của Nga, ngày 2 tháng 7 năm 2026","summary":"ISW ghi nhận Nga tiến hành đợt tập kích quy mô lớn bằng 570 drone và tên lửa vào Kyiv đêm 1-2/7, khiến ít nhất 27 người chết và 91 người bị thương, trong đó phòng không Ukraine đánh chặn khoảng 476 quả. Nga đang triển khai drone động cơ phản lực nhanh hơn và đổi tần số (3.900-4.100 MHz) khiến việc đánh chặn khó hơn nhiều, trong khi trên các mặt trận Kharkiv, Donetsk và Zaporizhia lực lượng Nga tiếp tục tấn công nhưng không tiến được.","takeaway":"Chiến dịch hè-thu 2026 của Nga vẫn bế tắc về lãnh thổ, đổi lại bằng tổn thất lớn và chiến thuật tập kích drone-tên lửa ngày càng gây hại cho dân thường.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-2-2026"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chính trị","outlet":"The Nation","author":"Stephen Crowley","title":"Trước thềm thượng đỉnh NATO, châu Âu tái vũ trang chống một 'nước Nga bóng ma'?","summary":"Nhiều nước châu Âu đang tăng chi quân sự mạnh dựa trên giả định Nga có thể tấn công NATO trong vài năm tới, trong khi kinh tế Nga trì trệ vì chiến tranh Ukraine và Điện Kremlin chật vật huy động dân chúng. Tác giả cho rằng thổi phồng mối đe dọa Nga làm chệch nguồn lực khỏi nhu cầu xã hội và khí hậu.","takeaway":"Hiểm họa thực sự với châu Âu đến từ bên trong - khó khăn kinh tế và bất mãn xã hội bị khoét sâu bởi chi tiêu quốc phòng - hơn là từ một cuộc tấn công quân sự của Nga.","url":"https://www.thenation.com/article/world/europe-russia-nato-rearmament-putin-military-spending-far-right-ukraine-war-analysis/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Netanyahu và tình báo Israel","outlet":"War on the Rocks","author":"Ofek Riemer, Ehud Eiran & Daniel F. Wajner","title":"Từ Shin Bet đến Mossad: Netanyahu định hình lại tình báo Israel","summary":"Quan hệ giữa Netanyahu và các cơ quan tình báo Israel đã chuyển từ đối đầu công khai sang hợp tác bề ngoài, nhưng theo các tác giả đây là dấu hiệu xói mòn chuẩn mực dân chủ chứ không phải cải thiện thực chất.","takeaway":"Lãnh đạo dân túy tạo vòng lặp tự củng cố, kiểm soát chính trị tình báo ngày càng sâu, làm suy yếu cả an ninh quốc gia lẫn quản trị dân chủ.","url":"https://warontherocks.com/2026/07/from-shin-bet-to-mossad-netanyahu-reshapes-israeli-intelligence/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Hizballah & Lebanon","outlet":"War on the Rocks","author":"Anthony Elghossain, Grace Wermenbol","title":"Thế lưỡng nan Hizballah: Vì sao cần một cách tiếp cận tích hợp","summary":"Hai tác giả lập luận rằng bản chất lai ghép của Hizballah - vừa là dân quân, đảng chính trị, mạng lưới dịch vụ xã hội, vừa là đường dây buôn lậu - khiến nó không thể bị hóa giải bằng những can thiệp đơn lẻ ở cấp khu vực hay địa phương. Họ cho rằng 'các giải pháp thuần khu vực hoặc thuần nội bộ đều không đủ' và cần chiến lược phối hợp giữa lãnh đạo Lebanon, các bên khu vực và giới chức Mỹ.","takeaway":"Kiềm chế Hizballah hiệu quả đòi hỏi cách tiếp cận tích hợp đồng thời trên các trục chính trị, quân sự, kinh tế và ngoại giao, thay vì các nỗ lực chắp vá.","url":"https://warontherocks.com/the-hizballah-predicament-why-an-integrated-approach-is-necessary/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Chính trị hóa tình báo Israel","outlet":"War on the Rocks","author":"Ofek Riemer, Ehud Eiran, Daniel F. Wajner","title":"Từ Shin Bet đến Mossad: Netanyahu định hình lại tình báo Israel","summary":"Các tác giả phân tích cách quan hệ giữa Netanyahu và các cơ quan tình báo Israel chuyển từ đối đầu công khai sang hợp tác bề ngoài, phản ánh sự củng cố quyền lực chính trị chứ không phải hòa giải thực chất. Những thất bại chính sách - nhất là về Iran - tạo ra vòng luẩn quẩn biến các định chế tình báo thành 'vật tế thần', biện minh cho việc chính trị hóa và làm suy yếu tính độc lập chuyên môn.","takeaway":"Sự xói mòn nguyên tắc statecraft phi đảng phái (mamlachtiut) cho thấy lãnh đạo dân túy dùng thất bại tình báo để hợp thức hóa cải tổ làm tổn hại nền quản trị dân chủ.","url":"https://warontherocks.com/from-shin-bet-to-mossad-netanyahu-reshapes-israeli-intelligence/"},{"date":"2026-06-25","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Đất hiếm & tàu ngầm Mỹ","outlet":"War on the Rocks","author":"Ryan Musto","title":"Lỗ hổng đất hiếm dưới đáy biển của Hải quân Mỹ","summary":"Musto cảnh báo chương trình tàu ngầm lớp Columbia đối mặt lỗ hổng chiến lược nghiêm trọng vì hệ thống động lực, tàng hình và dẫn đường gần như phụ thuộc hoàn toàn vào đất hiếm được tinh luyện tại Trung Quốc - nước kiểm soát khoảng 91% năng lực chế biến đất hiếm toàn cầu. Bắc Kinh đã vũ khí hóa ưu thế này bằng chu kỳ nâng giá rồi bán phá giá để làm phá sản đối thủ phương Tây (như vụ Molycorp sụp đổ năm 2015).","takeaway":"Thay vì bắt chước mô hình nhà nước nắm cổ phần của Bắc Kinh, Mỹ nên tạo tín hiệu cầu bền vững qua các khoản tài trợ DPA Title III, bảo lãnh vay và cam kết bao tiêu nhiều năm của Lầu Năm Góc để dựng chuỗi cung ứng nội địa và đồng minh trước năm 2030.","url":"https://warontherocks.com/cogs-of-war/the-u-s-navys-subsea-rare-earth-vulnerability/"}],"xNews":[{"date":"2026-07-08","handle":"@EU_ISS","name":"EU Institute for Security Studies","title":"Phân tích: Tổng thống Erdogan nổi lên là bên hưởng lợi chính trị lớn nhất từ thượng đỉnh NATO tại Ankara.","url":"https://x.com/EU_ISS/status/2074778368210268419","summary":"Giới phân tích cho rằng việc đăng cai thượng đỉnh NATO tại Ankara giúp Tổng thống Erdogan củng cố vị thế cả trong nước lẫn trên trường quốc tế.","significance":"Phản ánh cách nước chủ nhà tận dụng sự kiện đa phương cho lợi ích chính trị; cho thấy Thổ Nhĩ Kỳ đang nâng vai trò cầu nối trong NATO."},{"date":"2026-07-08","handle":"@Reuters","name":"Reuters","title":"Reuters: 'Ủy ban Hòa bình' do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm ở Gaza.","url":"https://x.com/Reuters/status/2074932816211591392","summary":"Reuters đưa tin một \"Ủy ban Hòa bình\" do Mỹ dẫn dắt lên kế hoạch lập vùng nhân đạo thí điểm tại Gaza.","significance":"Phản ánh nỗ lực Mỹ định hình giai đoạn hậu xung đột ở Gaza; xu hướng quản trị vùng lãnh thổ bằng cơ chế do bên ngoài dẫn dắt, tiềm ẩn tranh cãi chủ quyền."},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Cơ quan thực thi pháp luật Ukraine khám xét hãng drone hàng đầu Vyriy Industries, làm dấy lên lo ngại siết chặt ngành công nghệ quốc phòng.","url":"https://x.com/KyivIndependent/status/2074623512027832799","summary":"Cơ quan thực thi pháp luật Ukraine khám xét Vyriy Industries, một nhà sản xuất drone hàng đầu, gây lo ngại trong ngành.","significance":"Cho thấy căng thẳng giữa nhu cầu giám sát và việc bảo vệ ngành công nghệ quốc phòng non trẻ; rủi ro làm nản lòng doanh nghiệp quốc phòng thời chiến."},{"date":"2026-07-07","handle":"@ZelenskyyUa","name":"Volodymyr Zelenskyy","title":"Zelensky ký thỏa thuận hợp tác sản xuất drone với Đan Mạch — thỏa thuận thứ chín thuộc mô hình liên kết quốc phòng của Ukraine.","url":"https://x.com/ZelenskyyUa/status/2074543396996161846","summary":"Tổng thống Zelensky ký thỏa thuận sản xuất drone chung với Đan Mạch — thỏa thuận thứ chín theo mô hình liên kết quốc phòng của Ukraine.","significance":"Phản ánh chiến lược Ukraine \"nội địa hóa + hợp tác\" để tự chủ vũ khí; xu hướng châu Âu gắn công nghiệp quốc phòng với Kyiv thay cho viện trợ đơn thuần."},{"date":"2026-07-07","handle":"@TheStudyofWar","name":"Institute for the Study of War","title":"ISW: Iran tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz.","url":"https://x.com/TheStudyofWar/status/2074608031799652776","summary":"ISW đánh giá Iran đang tìm cách cản trở nỗ lực của phương Tây và vùng Vịnh nhằm mở lại eo biển Hormuz cho tàu bè.","significance":"Cho thấy Hormuz là đòn bẩy chiến lược của Iran; phản ánh nguy cơ gián đoạn nguồn cung dầu và leo thang xung đột hàng hải."},{"date":"2026-07-07","handle":"@MarketWatch","name":"MarketWatch","title":"Giá dầu thô tăng khi Mỹ mở các đợt không kích nhằm vào Iran.","url":"https://x.com/MarketWatch/status/2074618951120584923","summary":"Giá dầu thô đi lên sau khi Mỹ mở các đợt không kích nhằm vào Iran.","significance":"Phản ánh mức độ nhạy cảm của thị trường năng lượng với xung đột Trung Đông; xu hướng rủi ro địa chính trị định giá dầu mạnh hơn cung–cầu."},{"date":"2026-07-07","handle":"@Rory_Johnston","name":"Rory Johnston","title":"Mỹ thu hồi quyền miễn trừ trừng phạt dầu mỏ với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","url":"https://x.com/Rory_Johnston/status/2074568070908002448","summary":"Mỹ thu hồi các quyền miễn trừ trừng phạt dầu mỏ đối với Iran sau loạt vụ tấn công tàu chở dầu ở Hormuz.","significance":"Cho thấy Washington siết tối đa sức ép kinh tế lên Tehran; phản ánh việc dùng trừng phạt dầu mỏ như vũ khí trong đối đầu leo thang."},{"date":"2026-07-07","handle":"@KyivIndependent","name":"The Kyiv Independent","title":"Ước tính tổn thất chiến đấu của N   var body=shown.length?shown.map(function(ex){
    var items=sortD(ex.items||[]).filter(matchQ);
    var cards=items.length?items.map(function(a){return card(drillCardInner(a),idOf(a));}).join(''):'<div class="empty" style="padding:16px">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin liên quan.')+'</div>';
    return '<section class="drill">'+drillHeader(ex)+'<div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">Chưa có cuộc tập trận nào.</div>';
  return '<div class="note">Các cuộc tập trận quân sự <b>đang & sắp diễn ra</b> — mỗi mục gom tin liên quan kèm <b>nhận xét</b> tin đó liên quan tới cuộc tập trận thế nào. <b>'+live+'</b> đang diễn ra · <b>'+up+'</b> sắp diễn ra.</div>'+chips+body;
}
function renderDipEvents(){
  var exs=((DATA.dipEvents&&DATA.dipEvents.length)?DATA.dipEvents:DIPEVENTS).slice();
  var ord={ongoing:0,recent:1,upcoming:2};
  exs.sort(function(a,b){return (ord[a.status]==null?9:ord[a.status])-(ord[b.status]==null?9:ord[b.status]);});
  var chips='<div class="chips"><span class="chip'+(state.dip==='Tất cả'?' on':'')+'" data-dip="Tất cả">Tất cả ('+exs.length+')</span>';
  exs.forEach(function(e){var col=e.status==='ongoing'?'#c0392b':(e.status==='upcoming'?'#2b5f9e':'#1f8a54');chips+='<span class="chip'+(state.dip===e.name?' on':'')+'" data-dip="'+esc(e.name)+'"><i class="dot" style="background:'+col+'"></i>'+esc(e.name.split('(')[0].trim())+'</span>';});
  chips+='</div>';
  var shown=exs.filter(function(e){return state.dip==='Tất cả'||e.name===state.dip;});
  var body=shown.length?shown.map(function(ex){
    var items=sortD(ex.items||[]).filter(matchQ);
    var cards=items.length?items.map(function(a){return card(drillCardInner(a,'Liên quan sự kiện'),idOf(a));}).join(''):'<div class="empty" style="padding:16px">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin liên quan.')+'</div>';
    return '<section class="drill">'+drillHeader(ex)+'<div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">Chưa có sự kiện nào.</div>';
  return '<div class="note">Các <b>sự kiện ngoại giao</b> (thượng đỉnh, hội nghị, đàm phán…) — mỗi mục gom tin liên quan kèm <b>nhận xét</b> tin đó liên quan sự kiện thế nào.</div>'+chips+body;
}
function renderDossiers(){
  var pool=newsPool().filter(matchQ);
  var groups={},order=[];
  pool.forEach(function(a){var r=regionOf(a);if(!groups[r]){groups[r]=[];order.push(r);}groups[r].push(a);});
  order.sort(function(a,b){if(a==='Khác')return 1;if(b==='Khác')return -1;return groups[b].length-groups[a].length;});
  var chips='<div class="chips"><span class="chip'+(state.dossier==='Tất cả'?' on':'')+'" data-dossier="Tất cả">Tất cả ('+order.length+')</span>';
  order.forEach(function(r){chips+='<span class="chip'+(state.dossier===r?' on':'')+'" data-dossier="'+esc(r)+'">'+esc(r)+' ('+groups[r].length+')</span>';});
  chips+='</div>';
  var shown=order.filter(function(r){return state.dossier==='Tất cả'||r===state.dossier;});
  var body=shown.length?shown.map(function(r){
    var a2=groups[r];var ds=a2.map(function(a){return a.date;}).filter(Boolean).slice().sort();
    var range=ds.length?(fmtVN(ds[0])+(ds[ds.length-1]!==ds[0]?' – '+fmtVN(ds[ds.length-1]):'')):'';
    var cards=a2.map(function(a){return card(newsCardInner(a),idOf(a));}).join('');
    return '<section class="drill"><div class="drill-h"><div class="drill-name">'+esc(r)+'</div><div class="drill-meta">📰 '+a2.length+' tin'+(range?' · '+range:'')+'</div></div><div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">'+(state.q?'Không có hồ sơ khớp tìm kiếm.':'Chưa có hồ sơ.')+'</div>';
  return '<div class="note">Gom tin <b>Thế giới + Mỹ</b> theo <b>khu vực/chủ đề</b> — mỗi hồ sơ là một câu chuyện đang chạy (suy ra tự động từ nội dung). Sắp theo độ "nóng".</div>'+chips+body;
}
function renderTopic(){
  var segs=[['drills','🎯 Tập trận'],['dip','🕊️ Ngoại giao'],['dossier','🧵 Hồ sơ']];
  var seg='<div class="seg">'+segs.map(function(s){return '<button class="'+(state.topicSeg===s[0]?'on':'')+'" data-topicseg="'+s[0]+'">'+s[1]+'</button>';}).join('')+'</div>';
  var view=state.topicSeg==='dip'?renderDipEvents():(state.topicSeg==='dossier'?renderDossiers():renderExercises());
  return seg+view;
}
function content(){
  if(state.tab==='us')return renderCatNews(DATA.usNews,'<div class="note">Tin <b>yếu tố Mỹ</b> nổi bật trong <b>24 giờ qua</b> (giờ Mỹ) — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
  if(state.tab==='x')return renderX();
  if(state.tab==='analysis')return renderAnalysis();
  if(state.tab==='topic')return renderTopic();
  if(state.tab==='saved')return renderSaved();
  return renderCatNews(DATA.worldNews,'<div class="note">Tin <b>thế giới</b> nổi bật trong <b>24 giờ qua</b> — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
}
function render(){
  refreshFav();
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thế giới'],['us',USFLAG+'Mỹ'],['x',XLOGO+'X'],['topic','🗂️ Chuyên đề'],['analysis','🧠 Phân tích'],['saved','⭐ Đã lưu'+(FAV.length?' ('+FAV.length+')':'')]];
  var h='<div class="wrap">';
  h+='<div class="mast"><div class="kicker">Bản tin độc lập</div><h1>'+esc(DATA.brand)+'</h1><div class="tag">'+esc(DATA.tagline)+'</div></div>';
  h+='<div class="dateline"><span>Cập nhật '+stamp+'</span><span>Tổng hợp từ nguồn mở</span></div>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<button class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</nav>';
  h+='<div class="toolbar"><div class="search"><span aria-hidden="true">🔍</span><input id="q" type="search" autocomplete="off" placeholder="Tìm trong bản tin…" value="'+esc(state.q)+'">'+(state.q?'<button class="sx" data-sx="1" title="Xoá tìm kiếm">✕</button>':'')+'</div></div>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">'+esc(DATA.brand)+' — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Mỗi tin đều dẫn liên kết nguồn gốc. Không đại diện quan điểm của bất kỳ tổ chức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  if(window.scrollTo)window.scrollTo(0,0);
}
function reContent(){var c=document.getElementById('content');if(c)c.innerHTML=content();}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg],[data-xhandle],[data-drill],[data-dip],[data-dossier],[data-topicseg],[data-savedseg],[data-caddbtn],[data-crm],[data-fav],[data-share],[data-copy],[data-sx],[data-mark]'):null;if(!t)return;
  if(t.getAttribute('data-caddbtn')!=null){var ci=document.getElementById('cnew');if(ci){addConcept(ci.value);ci.value='';reContent();}return;}
  if(t.getAttribute('data-crm')!=null){removeConcept(t.getAttribute('data-crm'));reContent();return;}
  if(t.getAttribute('data-savedseg')!=null){state.savedSeg=t.getAttribute('data-savedseg');render();return;}
  if(t.getAttribute('data-share')!=null){doShare(t.getAttribute('data-url'),t.getAttribute('data-title'));return;}
  if(t.getAttribute('data-copy')!=null){doCopy(t.getAttribute('data-url'));return;}
  if(t.getAttribute('data-mark')!=null){markRead(t.getAttribute('data-mark'));setTimeout(reContent,250);return;}
  if(t.getAttribute('data-sx')!=null){state.q='';render();return;}
  if(t.getAttribute('data-fav')!=null){toggleFav(t.getAttribute('data-fav'));render();return;}
  if(t.getAttribute('data-topicseg')!=null){state.topicSeg=t.getAttribute('data-topicseg');state.drill='Tất cả';state.dip='Tất cả';state.dossier='Tất cả';render();return;}
  if(t.getAttribute('data-tab')){state.tab=t.getAttribute('data-tab');state.wcat='Tất cả';state.wdate='Tất cả';state.wregion='Tất cả';state.xhandle='Tất cả';state.xdate='Tất cả';state.drill='Tất cả';state.dip='Tất cả';state.dossier='Tất cả';}
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  else if(t.getAttribute('data-xhandle'))state.xhandle=t.getAttribute('data-xhandle');
  else if(t.getAttribute('data-drill')!=null)state.drill=t.getAttribute('data-drill');
  else if(t.getAttribute('data-dip')!=null)state.dip=t.getAttribute('data-dip');
  else if(t.getAttribute('data-dossier')!=null)state.dossier=t.getAttribute('data-dossier');
  render();
});
document.addEventListener('input',function(e){
  if(e.target&&e.target.id==='q'){var had=!!state.q;state.q=e.target.value;if((!had)!==(!state.q)){render();var el=document.getElementById('q');if(el){el.focus();var v=el.value;el.value='';el.value=v;}}else{reContent();}}
});
document.addEventListener('change',function(e){
  var s=e.target;if(!s||!s.getAttribute)return;
  if(s.getAttribute('data-wdate')!=null){state.wdate=s.value;render();}
  else if(s.getAttribute('data-wregion')!=null){state.wregion=s.value;render();}
  else if(s.getAttribute('data-adate')!=null){state.adate=s.value;render();}
  else if(s.getAttribute('data-xdate')!=null){state.xdate=s.value;render();}
});
refreshRead();
var _firstRun=false;try{_firstRun=localStorage.getItem('dt.seen')==null;}catch(e){}
initSeen();commitSeen();if(_firstRun)initSeen();
applyTheme(curTheme());
ensureReaderUI();
render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
/* ==== Bôi đen chữ trong tin → nút "Lưu khái niệm" ==== */
function cFab(){var f=document.getElementById('concept-fab');if(!f){f=document.createElement('button');f.id='concept-fab';f.type='button';f.textContent='★ Lưu khái niệm';document.body.appendChild(f);
  f.addEventListener('mousedown',function(e){e.preventDefault();});
  f.addEventListener('click',function(e){e.stopPropagation();addConcept(f._t||'');f.style.display='none';var s=window.getSelection&&window.getSelection();if(s)s.removeAllRanges();if(state.tab==='saved'&&state.savedSeg==='concepts')reContent();});}
  return f;}
function onSel(){
  var f=document.getElementById('concept-fab');
  var s=window.getSelection?window.getSelection():null;
  var txt=s&&s.rangeCount?(''+s).trim():'';
  var node=s&&s.anchorNode; node=node&&node.nodeType===3?node.parentNode:node;
  var host=node&&node.closest?node.closest('.sum,.take,.title,.relate,.drill-sum,.cexp'):null;
  if(host&&host.closest('.cexp'))host=null; // đừng lưu từ chính phần giải thích
  if(txt&&txt.length>=2&&txt.length<=90&&host){
    f=cFab();f._t=txt;
    var r=s.getRangeAt(0).getBoundingClientRect();
    var x=Math.max(8,Math.min(r.left,window.innerWidth-150)),y=r.top-42;
    if(y<6)y=r.bottom+8;
    f.style.left=x+'px';f.style.top=y+'px';f.style.display='block';
  }else if(f){f.style.display='none';}
}
document.addEventListener('mouseup',function(){setTimeout(onSel,10);});
document.addEventListener('touchend',function(){setTimeout(onSel,10);});
window.addEventListener('scroll',function(){var f=document.getElementById('concept-fab');if(f&&f.style.display==='block')f.style.display='none';});
</script>
