<style>
:root{--fs:1;
  --bg:#f5f2ec;--paper:#fff;--paper2:#f7f5f1;--ink:#1b1b1b;--title:#141414;--sum:#3a352e;
  --muted:#6b6459;--muted2:#8a8378;--line:#d8d2c6;--line2:#ded8cc;--accent:#b3282d;
  --soft:#efeae0;--note-ink:#5a5349;--star:#c4b48f;--star-on:#d4a017;--accent-soft:#fbeceb;
  --drill-bg:#fbfaf7;--relate-bg:#eef3ee;--green:#1f8a54}
[data-theme=dark]{
  --bg:#1a1712;--paper:#242019;--paper2:#2a251d;--ink:#ece7db;--title:#f5f1e8;--sum:#cfc8ba;
  --muted:#a89f8f;--muted2:#8f8676;--line:#3a352b;--line2:#322e26;--accent:#e07a6f;
  --soft:#2b2620;--note-ink:#cfc8ba;--star:#6b6353;--star-on:#e0b53a;--accent-soft:#3a2622;
  --drill-bg:#201d17;--relate-bg:#1e2620;--green:#4fb07a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--reader-font,'Times New Roman',Times,serif);line-height:1.55;-webkit-text-size-adjust:100%}
a{color:inherit}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.mast{text-align:center;padding:8px 0 14px;border-bottom:3px double var(--ink);margin-bottom:2px}
.mast .kicker{font-size:calc(11px*var(--fs));letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
.mast h1{font-family:inherit;font-size:calc(34px*var(--fs));font-weight:800;letter-spacing:1px;line-height:1.1}
.mast .tag{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:7px;font-style:italic}
.dateline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:7px 2px;font-size:calc(11.5px*var(--fs));color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-wrap:wrap;gap:6px}
.tabs{display:flex;gap:2px;overflow-x:auto;margin:14px 0 16px;border-bottom:2px solid var(--ink)}
.tb{white-space:nowrap;padding:9px 15px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted);cursor:pointer;font-size:calc(14.5px*var(--fs));font-weight:700;font-family:inherit}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}
.note{font-size:calc(13px*var(--fs));color:var(--note-ink);background:var(--soft);border-left:3px solid var(--accent);padding:10px 12px;border-radius:2px;margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.chip{font-size:calc(12.5px*var(--fs));padding:6px 11px;border-radius:2px;background:var(--paper);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.on .dot{outline:1px solid var(--paper)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.list{display:flex;flex-direction:column;gap:0}
.card{background:transparent;border-bottom:1px solid var(--line2);padding:16px 2px}
.card:first-child{padding-top:2px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.badge{font-size:calc(10.5px*var(--fs));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
.badge .dot{margin-right:5px}
.date{margin-left:auto;font-size:calc(11.5px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.title{font-family:inherit;font-size:calc(19px*var(--fs));font-weight:700;line-height:1.35;margin-bottom:6px;color:var(--title)}
.sum{font-size:calc(14px*var(--fs));color:var(--sum)}
.take{font-size:calc(13.5px*var(--fs));color:var(--ink);background:var(--soft);border-radius:2px;padding:8px 11px;margin:7px 0}
.foot{margin-top:9px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta{font-size:calc(12px*var(--fs));color:var(--muted2)}
.src{font-size:calc(12.5px*var(--fs));color:var(--accent);text-decoration:none;font-weight:700}
.src:hover{text-decoration:underline}
.favb{margin-left:auto;background:none;border:none;cursor:pointer;font-size:calc(18px*var(--fs));line-height:1;color:var(--star);padding:0 2px;font-family:inherit}
.favb:hover{color:var(--star-on)}
.favb.on{color:var(--star-on)}
.filterbar{display:flex;align-items:center;gap:8px;margin:-2px 0 14px}
.filterbar span{font-size:calc(11px*var(--fs));color:var(--muted2);text-transform:uppercase;letter-spacing:1px}
.dsel{font-family:inherit;font-size:calc(13px*var(--fs));padding:6px 9px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);cursor:pointer}
.empty{color:var(--muted2);text-align:center;padding:34px;font-style:italic;font-size:calc(14px*var(--fs))}
/* ==== Tab Tập trận ==== */
.drill{margin-bottom:24px;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--drill-bg)}
.drill-h{padding:14px 14px 12px;background:var(--soft);border-bottom:1px solid var(--line2)}
.drill-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:6px}
.dpill{font-size:calc(10.5px*var(--fs));font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px}
.dpill.live{background:#c0392b;color:#fff}
.dpill.up{background:#2b5f9e;color:#fff}
.drill-dates{font-size:calc(12px*var(--fs));color:var(--muted);font-weight:700}
.drill-name{font-family:inherit;font-size:calc(21px*var(--fs));font-weight:800;line-height:1.25;color:var(--title);margin-bottom:5px}
.drill-meta{font-size:calc(12.5px*var(--fs));color:var(--muted);margin-top:2px}
.drill-sum{font-size:calc(13.5px*var(--fs));color:var(--sum);margin-top:8px;line-height:1.5}
.drill .list{padding:0 14px 4px}
.drill .card{padding:14px 0}
.drill .card:last-child{border-bottom:none}
.relate{font-size:calc(13px*var(--fs));color:var(--ink);background:var(--relate-bg);border-left:3px solid var(--green);border-radius:2px;padding:8px 11px;margin:8px 0 2px;line-height:1.5}
.relate b{color:var(--green)}
.pgfoot{margin-top:30px;padding-top:16px;border-top:3px double var(--ink);font-size:calc(11.5px*var(--fs));color:var(--muted2);text-align:center;line-height:1.8}
/* Bảng chọn phông & cỡ chữ cho người đọc */
#reader-fab{position:fixed;right:16px;bottom:16px;z-index:60;width:48px;height:48px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.28);font-family:'Times New Roman',Times,serif}
#reader-panel{position:fixed;right:16px;bottom:74px;z-index:60;width:258px;max-width:calc(100vw - 32px);background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.24);padding:14px;font-family:'Times New Roman',Times,serif}
#reader-panel[hidden]{display:none}
.rp-h{font-weight:800;font-size:15px;margin-bottom:6px}
.rp-sub{font-size:11.5px;color:var(--muted2);margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px}
.rp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin:12px 0 6px}
.rp-sizes{display:flex;gap:6px}
.rp-sizes button{flex:1;padding:9px 0;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-family:'Times New Roman',Times,serif}
.rp-sizes button:nth-child(1){font-size:12px}.rp-sizes button:nth-child(2){font-size:15px}.rp-sizes button:nth-child(3){font-size:18px}.rp-sizes button:nth-child(4){font-size:21px}
.rp-sizes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.rp-fonts{display:flex;flex-direction:column;gap:6px;max-height:266px;overflow:auto}
.rp-fonts button{text-align:left;padding:9px 11px;border:1px solid var(--line);background:var(--paper);border-radius:6px;cursor:pointer;font-size:16px;color:var(--ink)}
.rp-fonts button .vi{font-size:12px;color:var(--muted2);font-family:'Times New Roman',serif}
.rp-fonts button.on{border-color:var(--accent);background:var(--accent-soft)}
@media(max-width:520px){.mast h1{font-size:calc(26px*var(--fs))}.title{font-size:calc(17.5px*var(--fs))}.dateline{justify-content:center}}

/* ==== Tính năng mới ==== */
.toolbar{display:flex;align-items:center;gap:8px;margin:0 0 14px}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 11px}
.search input{flex:1;min-width:0;border:none;background:none;outline:none;font-family:inherit;font-size:calc(14px*var(--fs));color:var(--ink)}
.search .sx{cursor:pointer;color:var(--muted2);border:none;background:none;font-size:16px;font-family:inherit;padding:0 2px;line-height:1}
.searchinfo{font-size:calc(12.5px*var(--fs));color:var(--muted2);margin:-4px 0 12px}
.card.read .title{color:var(--muted)}
.card.read .sum{opacity:.7}
.newb{display:inline-block;font-size:calc(9.5px*var(--fs));font-weight:800;letter-spacing:.5px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 6px;margin-right:6px;vertical-align:1px}
.foot-act{margin-left:auto;display:inline-flex;align-items:center;gap:9px}
.foot-act .favb{margin-left:0}
.shareb,.tgb{background:none;border:none;cursor:pointer;font-size:calc(15px*var(--fs));line-height:1;color:var(--muted2);padding:0 2px;font-family:inherit}
.shareb:hover,.tgb:hover{color:var(--accent)}
#toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(18px);z-index:80;background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:8px;font-size:14px;font-family:inherit;box-shadow:0 6px 24px rgba(0,0,0,.35);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.rp-themes{display:flex;gap:6px}
.rp-themes button{flex:1;padding:8px 6px;border:1px solid var(--line);background:var(--paper2);border-radius:6px;cursor:pointer;font-weight:700;font-size:12.5px;font-family:inherit;color:var(--ink)}
.rp-themes button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
</style>
</head>

e":"Báo Mới","sourceUrl":"https://baomoi.com/my-mo-cuoc-dieu-tra-quy-mo-lon-ve-nghi-van-gian-lan-chuong-trinh-thi-thuc-h-1b-c55575527.epi"},{"date":"2026-07-09","category":"Chính trị","title":"Mỹ: Việc rút khỏi USMCA có thể buộc Quốc hội phải hành động","summary":"Khả năng Mỹ rút khỏi hiệp định thương mại USMCA với Canada và Mexico có thể buộc Quốc hội phải vào cuộc, đặt ra rủi ro cho chuỗi cung ứng Bắc Mỹ.","sourceName":"Báo Mới","sourceUrl":"https://baomoi.com/my-viec-rut-khoi-usmca-co-the-se-buoc-quoc-hoi-phai-hanh-dong-c55575158.epi"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump cam kết cấp phép cho Ukraine tự sản xuất tên lửa đánh chặn Patriot","summary":"Bên lề thượng đỉnh NATO, Tổng thống Trump tuyên bố Mỹ sẽ cấp 'giấy phép' để Ukraine tự chế tạo đạn đánh chặn Patriot (PAC-3) nhằm tăng năng lực phòng không trước các đợt tập kích của Nga. Giới chuyên gia cảnh báo do ràng buộc chuỗi cung ứng, dây chuyền này khó đi vào hoạt động trong ngắn hạn.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/08/ukraine-to-get-license-for-making-patriot-interceptors-trump-pledges/"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump nghiêng về việc gỡ trừng phạt và bán lại F-35 cho Thổ Nhĩ Kỳ","summary":"Sau cuộc gặp Tổng thống Erdogan tại Ankara, ông Trump phát tín hiệu sẽ dỡ trừng phạt và cho Thổ Nhĩ Kỳ tái gia nhập chương trình tiêm kích tàng hình F-35. Israel lo ngại động thái này làm lung lay ưu thế quân sự khu vực của mình.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/global/europe/2026/07/07/us-will-lift-sanctions-on-turkey-possibly-sell-f-35-fighter-jets-trump-says/"},{"date":"2026-07-08","category":"Kinh tế","title":"Chính quyền Trump gỡ hạn chế với OpenAI, mở đường phát hành rộng GPT-5.6","summary":"Nhà Trắng dỡ bỏ các hạn chế đối với mô hình mới nhất của OpenAI, cho phép hãng tiến hành phát hành rộng rãi GPT-5.6 ngay trong tuần sau giai đoạn kiểm thử bổ sung. Đây là bước nới lỏng chính sách công nghệ đáng chú ý giữa lúc Mỹ siết cạnh tranh AI.","sourceName":"Axios","sourceUrl":"https://www.axios.com/2026/07/08/openai-gpt-trump-ban-lifted"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lầu Năm Góc tìm phương án UAV giá rẻ thay thế 'Thần Chết' MQ-9 Reaper","summary":"Bộ Quốc phòng Mỹ và Đơn vị Đổi mới Quốc phòng (DIU) khởi động tìm kiếm các mẫu drone chi phí thấp có thể đảm nhận nhiệm vụ trinh sát-tấn công của MQ-9 Reaper, vốn ngày càng đắt đỏ và dễ tổn thương trước phòng không hiện đại.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/08/pentagon-to-explore-cheaper-replacements-for-the-mq-9-reaper/","significance":"Phản ánh xu hướng Mỹ chuyển sang UAV tiêu hao, giá rẻ, số lượng lớn thay cho khí tài đắt tiền."},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Lực lượng Không gian Mỹ bổ sung hai startup vào nhóm phóng tên lửa nhỏ và vừa","summary":"Space Force chọn thêm hai công ty khởi nghiệp tham gia cạnh tranh các nhiệm vụ phóng vệ tinh cỡ nhỏ và vừa, nhằm mở rộng nguồn cung phương tiện phóng và giảm phụ thuộc vào số ít nhà thầu lớn.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/space-force-adds-two-startups-to-small-medium-launch-pool/","significance":"Đa dạng hóa nhà cung cấp phóng giúp Mỹ tăng khả năng phục hồi và tốc độ triển khai vệ tinh quân sự."},{"date":"2026-07-08","category":"Kinh tế","title":"Quân đội Mỹ 'gần cạn ngân sách', Lầu Năm Góc xin thêm 67 tỷ USD","summary":"Lầu Năm Góc đề nghị bổ sung 67 tỷ USD để bù thiếu hụt do chi phí chiến dịch quân sự nhằm vào Iran leo thang, dù đã được cấp gần 900 tỷ USD cho tài khóa 2026; Bộ Quốc phòng nói không đủ tiền mua đạn và sửa chữa hạ tầng căn cứ.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/quan-doi-my-gan-can-ngan-sach-5095015.html"},{"date":"2026-07-08","category":"Chính trị","title":"Ông Trump: 'Lệnh ngừng bắn với Iran đã hết'","summary":"Tổng thống Trump tuyên bố thỏa thuận ngừng bắn với Iran đã chấm dứt sau đụng độ gần eo biển Hormuz, nói 'đàm phán chỉ tốn thời gian'; quân đội Mỹ không kích hơn 80 mục tiêu Iran, khiến Vệ binh Cách mạng phóng tên lửa trả đũa vào các vị trí Mỹ ở Bahrain và Kuwait.","sourceName":"VnExpress","sourceUrl":"https://vnexpress.net/ong-trump-lenh-ngung-ban-voi-iran-da-het-5095058.html"},{"date":"2026-07-08","category":"Công nghệ quân sự","title":"Mỹ tấn công hơn 80 mục tiêu Iran, IRGC nói bắn hạ MQ-9","summary":"Bộ Chỉ huy Trung tâm Mỹ không kích hơn 80 mục tiêu Iran gồm hệ thống phòng không và trạm radar; Vệ binh Cách mạng Hồi giáo Iran tuyên bố bắn hạ một UAV MQ-9 của Mỹ và trả đũa nhằm vào 85 mục tiêu quân sự Mỹ trong khu vực.","sourceName":"Thanh Niên","sourceUrl":"https://thanhnien.vn/my-tan-cong-hon-80-muc-tieu-iran-irgc-noi-ban-ha-mq-9-185260708103206537.htm"},{"date":"2026-07-08","category":"Ngoại giao","title":"Trump dọa cắt quan hệ thương mại với Tây Ban Nha, đòi Mỹ tiếp quản Greenland tại NATO","summary":"Tại thượng đỉnh NATO ở Ankara, Tổng thống Trump chỉ trích gay gắt các đồng minh, gọi Tây Ban Nha là 'đối tác tồi tệ' vì cách hành xử trong cuộc chiến Mỹ - Israel với Iran và dọa cắt quan hệ thương mại. Ông cũng nhắc lại đòi hỏi Mỹ tiếp quản Greenland, khoét sâu chia rẽ trong khối quanh vấn đề chi tiêu quốc phòng và chiến tranh Ukraine.","sourceName":"Al Jazeera","sourceUrl":"https://www.aljazeera.com/news/2026/7/8/trump-threatens-spain-trade-demands-us-take-over-greenland-at-nato-summit"},{"date":"2026-07-07","category":"Chính trị","title":"Thượng nghị sĩ Dân chủ chất vấn vụ hoán cải chiếc Air Force One do Qatar tặng","summary":"Nhóm nghị sĩ Dân chủ yêu cầu Không quân Mỹ và nhà thầu giải trình về chi phí, tiến độ và rủi ro an ninh của việc cải hoán chiếc máy bay do Qatar tặng để dùng làm chuyên cơ tổng thống, giữa lo ngại về minh bạch và xung đột lợi ích.","sourceName":"Breaking Defense","sourceUrl":"https://breakingdefense.com/2026/07/senate-dems-seek-air-force-contractor-answers-on-qatari-gifted-air-force-one-conversion/"},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Hải quân Mỹ lo tàu ngầm hạt nhân chiến lược có thể bị drone và rocket chống tăng đe dọa","summary":"Giới chức Hải quân Mỹ cảnh báo các tàu ngầm mang tên lửa đạn đạo (SSBN) khi ở cảng hoặc vùng nước nông có thể trở thành mục tiêu của drone giá rẻ và vũ khí cá nhân như rocket chống tăng, đặt ra yêu cầu mới về bảo vệ cận vệ.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/industry/techwatch/2026/07/07/us-navy-fears-ballistic-missile-subs-can-be-hit-by-drones-anti-tank-rockets/","significance":"Cho thấy vũ khí không người lái giá rẻ đang thách thức cả trụ cột răn đe hạt nhân của Mỹ."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"Lục quân Mỹ thử nghiệm rải mìn hàng loạt bằng phương tiện tự hành","summary":"Quân đội Mỹ tiến hành thử nghiệm rải mìn quy mô lớn bằng các phương tiện mặt đất tự hành, cho phép thiết lập bãi vật cản nhanh mà không cần đưa binh sĩ vào khu vực nguy hiểm.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/your-military/2026/07/07/us-army-tests-autonomous-mass-mine-laying/","significance":"Tự động hóa tác chiến công binh giúp tăng tốc độ và giảm rủi ro nhân mạng trong phòng ngự."},{"date":"2026-07-07","category":"Công nghệ quân sự","title":"GAO: Các chương trình vũ khí siêu vượt âm của Lầu Năm Góc chật vật vì chậm tiến độ và sản xuất","summary":"Báo cáo thường niên của Cơ quan Kiểm toán Chính phủ Mỹ (GAO) chỉ ra rủi ro lớn ở ba chương trình vũ khí siêu vượt âm. Không quân buộc phải cắt số lần bay thử tên lửa hành trình tấn công siêu vượt âm (HACM) từ bảy xuống năm do chậm hoàn thiện thiết kế. Nút thắt sản xuất ở Lục quân và Hải quân khiến việc bàn giao khẩu đội LRHW thứ hai của Lục quân trễ ít nhất sáu tháng.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/07/gao-pentagon-hypersonic-programs-schedule-constraints-production-woes/","significance":"Chậm trễ vũ khí siêu vượt âm nới rộng khoảng cách với Trung Quốc và Nga trong lĩnh vực được xem là then chốt của răn đe thế hệ mới."},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Hải quân Mỹ kết thúc tìm kiếm thủy thủ mất tích trên biển Arab","summary":"Hải quân Mỹ hôm 6/7 ngừng chiến dịch tìm kiếm một thủy thủ mất tích sau khi trực thăng MH-60S thuộc tàu sân bay USS George H.W. Bush (CVN-77) hạ cánh khẩn cấp xuống biển Arab. Cuộc tìm kiếm kéo dài bốn ngày, bao phủ 14.000 dặm vuông, huy động cả Không quân, tàu sân bay USS Abraham Lincoln (CVN-72) và các khu trục hạm USS Ross, Donald Cook, Higgins, Mason và John Finn.","sourceName":"USNI News","sourceUrl":"https://news.usni.org/2026/07/06/navy-ends-search-for-missing-george-h-w-bush-sailor-in-arabian-sea","significance":"Phản ánh cường độ hoạt động và rủi ro của các nhóm tác chiến tàu sân bay Mỹ tại vùng Vịnh giữa lúc căng thẳng với Iran."},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Lầu Năm Góc trao gói thầu 80 triệu USD cho hệ thống AI bảo vệ căn cứ Không quân trước drone nhỏ","summary":"AeroVironment nhận đơn đặt hàng trị giá 80,5 triệu USD — gói đầu tiên trong hợp đồng khung 500 triệu USD của Lầu Năm Góc — để cung cấp hệ thống chống drone dùng AI bảo vệ các căn cứ của Bộ Tư lệnh Tấn công Toàn cầu Không quân. Nền tảng Titan-MS dùng thuật toán AI và học máy để phát hiện, nhận dạng và vô hiệu hóa mối đe dọa từ máy bay không người lái qua nhiều loại cảm biến. Nỗ lực này thuộc sáng kiến Domestic Shield do lực lượng đặc nhiệm JIATF-401 của Lục quân dẫn dắt.","significance":"Phản ánh việc Mỹ chuyển từ mua sắm lẻ tẻ sang triển khai đại trà lá chắn AI chống drone cho các căn cứ trong nước sau hàng loạt sự cố xâm nhập UAS.","sourceName":"DefenseScoop","sourceUrl":"https://defensescoop.com/2026/07/06/pentagon-awards-task-order-to-av-for-titan-drone-defense/"},{"date":"2026-07-06","category":"Công nghệ quân sự","title":"Báo cáo giám sát: các chương trình vũ khí lớn nhất của Lầu Năm Góc chậm tiến độ 12 năm","summary":"Văn phòng Trách nhiệm Giải trình Chính phủ (GAO) phát hiện 104 chương trình vũ khí đắt đỏ nhất của Lầu Năm Góc hiện mất trung bình hơn 12 năm để đưa vào sử dụng, với tình trạng trễ tiến độ triền miên trên diện rộng. Báo cáo chỉ ra nhiều hệ thống bị đưa vào quy trình mua sắm nhanh dù công nghệ chưa hoàn thiện, làm hỏng mục tiêu triển khai nhanh. Các chương trình như drone MQ-25 Stingray của Hải quân và khu trục hạm DDG(X) đối mặt trễ hạn đáng kể.","significance":"Cho thấy điểm yếu cốt lõi trong năng lực trang bị vũ khí của Mỹ, đe dọa khả năng cạnh tranh quân sự với Trung Quốc trong thập kỷ tới.","sourceName":"Defense News","sourceUrl":"https://www.defensenews.com/news/pentagon-congress/2026/07/06/pentagons-top-new-weapons-programs-are-12-years-behind-schedule-watchdog/"},{"date":"2026-07-04","category":"Công nghệ quân sự","title":"Saronic hạ thuỷ tàu mặt nước không người lái Mirage đầu tiên dài 16 mét, tầm hoạt động trên 2.500 hải lý","summary":"Saronic công bố hạ thuỷ chiếc Mirage đầu tiên vào ngày 2/7/2026, một tàu mặt nước tự hành (ASV) dài 52 ft (16 m) đạt tốc độ trên 35 hải lý/giờ, tầm hoạt động vượt 2.500 hải lý và tải trọng 3.500 pound. Mirage là nền tảng chủ lực thứ ba của hãng bên cạnh Corsair (24 ft) và Marauder (180 ft), được điều khiển qua nền tảng chỉ huy Echelon. Con tàu đi từ thiết kế đến hạ thuỷ trong chưa đầy một năm, hiện bắt đầu thử nghiệm trên mặt nước tại Galveston, Texas trong khi chiếc thứ hai đã lên dây chuyền.","sourceName":"Naval News","sourceUrl":"https://www.navalnews.com/naval-news/2026/07/saronic-launches-first-mirage-16-meter-uncrewed-surface-vessel/","significance":"Thể hiện năng lực sản xuất hàng loạt tàu tự hành ở tốc độ và quy mô lớn của ngành công nghiệp Mỹ, phục vụ chiến lược hạm đội lai (hybrid fleet) với đông đảo tàu không người lái."},{"date":"2026-07-02","category":"Công nghệ quân sự","title":"80.000 nhà thầu quốc phòng Mỹ chỉ còn ~20 tháng để đạt chứng nhận an ninh mạng CMMC giữa tình trạng thiếu đơn vị đánh giá","summary":"National Defense cảnh báo cơ sở công nghiệp quốc phòng Mỹ có khoảng 20 tháng để chứng nhận ước tính 80.000 nhà thầu theo chuẩn an ninh mạng CMMC, trong khi chỉ có chưa tới 100 tổ chức được cấp phép đánh giá (khoảng 97 tính đến tháng 3). Giai đoạn 2 của CMMC bắt đầu từ 10/11 khi chứng nhận Cấp 2 trở thành điều kiện trao hợp đồng; chuẩn gồm 110 yêu cầu bảo mật theo NIST SP 800-171. Nhiều nhà thầu cần 12-18 tháng chuẩn bị, tạo khoảng cách lớn giữa cung và cầu đánh giá.","significance":"Nút thắt an ninh mạng có thể loại nhiều doanh nghiệp nhỏ khỏi chuỗi cung ứng quốc phòng Mỹ, ảnh hưởng trực tiếp tới năng lực và sức bền của cơ sở công nghiệp quốc phòng.","sourceName":"National Defense Magazine","sourceUrl":"https://www.nationaldefensemagazine.org/articles/2026/7/2/industry-should-apply-y2k-lessons-learned-to-cmmc-crunch"}],"analyses":[{"date":"2026-07-08","region":"Châu Mỹ","topic":"Xét lại hiệp định USMCA","outlet":"CSIS","author":"William Alan Reinsch","title":"Giai đoạn tiếp theo của USMCA","summary":"Chính quyền Trump đã kích hoạt cơ chế rà soát 10 năm của USMCA vào ngày 1/7, bác bỏ phương án gia hạn đơn thuần. Đàm phán nay xoay quanh lo ngại an ninh — nhất là chặn hàng Trung Quốc đi vòng qua 'cửa sau' Bắc Mỹ — cùng tranh cãi về quy tắc xuất xứ và các vấn đề ngành.","takeaway":"Bất định kéo dài sẽ ghìm đầu tư doanh nghiệp, dù cách tiếp cận chuyên nghiệp của USTR để ngỏ khả năng đạt thỏa thuận sửa đổi.","url":"https://www.csis.org/analysis/next-phase-usmca"},{"date":"2026-07-08","region":"Toàn cầu","topic":"Cướp biển Somalia trở lại","outlet":"War on the Rocks","author":"Benoit Lefevre","title":"Cướp biển Somalia đã trở lại — nhưng liên minh từng đánh bại chúng thì không","summary":"Cướp biển Somalia tái xuất với các vụ bắt tàu hàng gần đây, nhưng liên minh hải quân đa quốc gia từng dẹp yên hồi 2011 không thể tái lập vì ưu tiên địa chính trị đã đổi. Tác giả đề xuất cấu trúc lấy khu vực làm trung tâm, để lực lượng biển địa phương dẫn dắt với hỗ trợ tình báo và năng lực chuyên biệt từ bên ngoài.","takeaway":"Giải pháp bền vững đòi hỏi an ninh hàng hải do khu vực dẫn dắt, đồng thời xử lý gốc rễ là quản trị yếu kém ở Somalia.","url":"https://warontherocks.com/2026/07/somali-pirates-are-back-but-the-coalition-that-beat-them-isnt-coming/"},{"date":"2026-07-07","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Thử tên lửa hạt nhân của Trung Quốc","outlet":"CSIS","author":"Joseph Rodgers, Bonny Lin & Leon Li","title":"Vụ thử SLBM của Trung Quốc cho thấy cần một thỏa thuận thông báo phóng tên lửa đạn đạo","summary":"Vụ thử tên lửa đạn đạo phóng từ tàu ngầm ngày 6/7 ra vùng biển quốc tế là lần đầu Trung Quốc phô diễn công khai năng lực hạt nhân chiến lược ở Ấn Độ Dương - Thái Bình Dương. Bắc Kinh chỉ báo trước vài giờ thay vì 24 giờ theo Bộ Quy tắc Hague, cho thấy ý định thường lệ hóa các vụ thử mà né quy trình thông báo quốc tế.","takeaway":"Sự mờ ám của Trung Quốc về kho hạt nhân đang mở rộng làm xói mòn ổn định toàn cầu và cần một thỏa thuận thông báo phóng chuẩn hóa.","url":"https://www.csis.org/analysis/chinas-slbm-test-underscores-importance-ballistic-missile-launch-notification-agreement"},{"date":"2026-07-07","region":"Châu Âu/NATO","topic":"Dư luận Nga và chiến tranh Ukraine","outlet":"CSIS","author":"Maria Snegovaya & Jade McGlynn","title":"Thái độ người Nga đang đổi khi hệ quả chiến tranh về đến nhà","summary":"Các đợt tập kích bằng drone của Ukraine vào hạ tầng năng lượng Nga đang đưa hệ quả kinh tế của cuộc chiến đến tận người dân qua thiếu nhiên liệu và gián đoạn dịch vụ. Tác giả nhận định cú sốc kinh tế đời thường có sức bào mòn ủng hộ chiến tranh mạnh hơn các cú sốc quân sự đơn thuần.","takeaway":"Phương Tây nên phối hợp trừng phạt và truyền thông để gắn khó khăn trong nước Nga với lựa chọn gây chiến của Kremlin.","url":"https://www.csis.org/analysis/russian-attitudes-are-shifting-wars-effects-come-home"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Tự chủ quốc phòng châu Âu","outlet":"CSIS","author":"Max Bergmann & Otto Svendsen","title":"Hãy biến Thượng đỉnh Ankara thành chuyện tự chủ quốc phòng châu Âu","summary":"Các tác giả kêu gọi thành viên châu Âu của NATO dùng thượng đỉnh Ankara để chuẩn bị cho kịch bản Mỹ giảm hậu thuẫn, bằng kế hoạch cụ thể cho phòng thủ lục địa tự chủ. Việc Mỹ cạn nguồn lực, dồn sang Trung Quốc khiến tự lực của châu Âu là tất yếu.","takeaway":"Châu Âu cần lộ trình chuyển giao gánh nặng có thời hạn rõ, tăng tốc công nghiệp quốc phòng và cải tổ hợp tác NATO-EU.","url":"https://www.csis.org/analysis/make-ankara-summit-about-european-defense-autonomy"},{"date":"2026-07-06","region":"Châu Âu/NATO","topic":"Chiến tranh Nga - Ukraine","outlet":"Institute for the Study of War (ISW)","author":"Christina Harward, Jennie Olmsted, Tetiana Trach, Anna Thacker, Karolina Hird","title":"Đánh giá chiến dịch tấn công của Nga, ngày 6/7/2026","summary":"ISW ghi nhận Nga vừa thực hiện đợt tập kích tên lửa - drone quy mô lớn thứ tư kể từ 1/6, phóng tổng cộng 419 quả nhắm chủ yếu vào Kyiv, gây hàng chục thương vong dân thường. Nga khai thác việc Ukraine cạn kho đạn đánh chặn bằng cách dồn tên lửa đạn đạo trong mỗi gói tấn công. Đợt đánh diễn ra ngay trước thượng đỉnh NATO (7-8/7) nhằm phô trương sức ép. Đáp lại, Ukraine tập kích nhà máy lọc dầu lớn nhất của Nga ở Omsk, cách biên giới hơn 2.500 km.","takeaway":"Nga leo thang tập kích chiến lược và khiêu khích NATO để tạo áp lực trước thềm thượng đỉnh, trong khi Ukraine chứng minh năng lực đánh sâu chưa từng có.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-6-2026"},{"date":"2026-07-06","region":"Trung Đông","topic":"Hành lang thương mại - năng lượng","outlet":"Atlantic Council","author":"Allison Minor","title":"Các hành lang mới ở Trung Đông không chỉ để né eo biển Hormuz","summary":"Minor phân tích làn sóng dự án hạ tầng đường sắt, đường ống và logistics trên bộ đang nổi lên khắp Trung Đông sau những gián đoạn ở eo biển Hormuz. Saudi Arabia, UAE và Oman mở rộng mạng lưới đường sắt và trung tâm trung chuyển, trong khi Hành lang Ấn Độ - Trung Đông - châu Âu (IMEC) cần tái cấu trúc theo cách tiếp cận 'mạng lưới' thay vì một tuyến đơn lẻ. Thành công đòi hỏi tích hợp hải quan số, hài hòa quy định và cam kết chính trị bền vững, thậm chí mở ra một 'hành lang điện toán'.","takeaway":"Các hành lang này vượt xa mục tiêu né chốt chặn hàng hải, mở ra cơ hội đa dạng hóa kinh tế và hội nhập khu vực nếu có quản trị đủ mạnh.","url":"https://www.atlanticcouncil.org/blogs/menasource/new-middle-east-corridors-are-about-more-than-just-bypassing-the-strait-of-hormuz/"},{"date":"2026-07-06","region":"Đông Á","topic":"Trật tự toàn cầu - Trung Quốc","outlet":"The Diplomat","author":"","title":"Thời cơ để Trung Quốc định hình trật tự toàn cầu mới","summary":"Bài phân tích cho rằng chuyến thăm Bắc Kinh giữa tháng 5 của Tổng thống Mỹ Donald Trump đã bộc lộ một động lực mới trong quan hệ Mỹ - Trung, khi Bắc Kinh thể hiện vai trò chủ động hơn trong việc định hình quan hệ song phương. Theo tác giả, chuỗi tiếp xúc ngoại giao gần đây đưa Trung Quốc vào trung tâm sân khấu thế giới và củng cố năng lực định hình trật tự quốc tế, thay vì chỉ tuyên bố tham vọng. Bắc Kinh đang chuyển từ thế phòng thủ sang chủ động dẫn dắt chương trình nghị sự khu vực và toàn cầu.","takeaway":"Trung Quốc đang tận dụng thế chủ động ngoại giao mới để chuyển từ tuyên bố tham vọng sang thực sự định hình trật tự quốc tế.","url":"https://thediplomat.com/2026/07/chinas-moment-to-shape-a-new-global-order/"},{"date":"2026-07-03","region":"Châu Âu/NATO","topic":"Chiến lược quân Mỹ ở châu Âu","outlet":"War on the Rocks","author":"Benjamin H. Friedman & Moritz S. Graefrath","title":"Sai lầm và bị hiểu lầm: Cách tiếp cận của Trump với quân Mỹ tại châu Âu","summary":"Hai tác giả cho rằng sai lầm của chính quyền Trump không nằm ở việc dọa rút quân, mà ở chỗ không thực sự rút — thay vào đó theo đuổi 'bá quyền phi tự do', đổi sự hiện diện quân sự lấy các cam kết tăng chi tiêu mơ hồ của châu Âu.","takeaway":"Mỹ nên rút quân khỏi châu Âu theo lộ trình có kiểm soát vì mối đe dọa Nga hạn chế, thay vì mặc cả nửa vời.","url":"https://warontherocks.com/2026/07/misguided-and-misunderstood-trumps-approach-to-u-s-troops-in-europe/"},{"date":"2026-07-03","region":"Toàn cầu","topic":"Bán dẫn & vai trò dẫn dắt AI","outlet":"War on the Rocks","author":"Sarah Kreps","title":"Vi mạch tích hợp và tương lai vị thế dẫn đầu về AI","summary":"Kreps đối chiếu cách Không quân Mỹ thời Chiến tranh Lạnh đầu tư vào mạch tích hợp (integrated circuit) để rồi nó trở thành nền tảng công nghệ dân dụng, với con đường tương tự của trí tuệ nhân tạo (AI) ngày nay do khối tư nhân dẫn dắt. Bà cảnh báo mô hình này vừa tạo sức bật đổi mới vừa sinh ra lỗ hổng chiến lược khi năng lực sản xuất dịch chuyển ra nước ngoài và nhà nước mất đòn bẩy.","takeaway":"Mỹ cần duy trì quan hệ đối tác công-tư linh hoạt, bền vững qua các chu kỳ chính trị và tiếp tục bảo lãnh rủi ro công nghệ để giữ vị thế dẫn đầu AI mà không rơi vào lệ thuộc.","url":"https://warontherocks.com/cogs-of-war/the-integrated-circuit-and-the-future-of-ai-leadership/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân đội Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Giới phân tích phương Tây đang gặp lỗ hổng nghiêm trọng khi hiểu chiến lược quân sự Trung Quốc do văn bản học thuyết lỗi thời và việc PLA siết chặt nguồn thông tin. Sự thiếu hụt này buộc hoạch định chính sách phải dựa vào suy đoán.","takeaway":"Nên khôi phục một dịch vụ dịch thuật công khai kiểu FBIS qua Thư viện Quốc hội để có tư liệu quân sự Trung Quốc chuẩn xác.","url":"https://warontherocks.com/2026/07/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Mỹ","topic":"Thương mại Bắc Mỹ","outlet":"CSIS","author":"Diego Marroquín Bitar, Kellie Meiman Hock, Eric Miller, Juan Carlos Baker, William Alan Reinsch","title":"Mỹ chọn không gia hạn Hiệp định USMCA","summary":"Ngày 1/7/2026, Mỹ từ chối gia hạn USMCA thêm 16 năm, thay vào đó kích hoạt cơ chế rà soát hằng năm kéo dài đến 2036; hiệp định vẫn duy trì theo điều khoản hiện hành nhưng không có lộ trình đàm phán rõ ràng. Năm chuyên gia CSIS cảnh báo quyết định này tạo ra bất định kéo dài cho chuỗi cung ứng và đầu tư khắp Bắc Mỹ. Quan hệ Mỹ - Canada xuống mức thấp lịch sử; các vấn đề gỗ, sữa, quy tắc xuất xứ ô tô và vai trò kinh tế Trung Quốc vẫn treo lơ lửng.","takeaway":"Thay vì đổ vỡ, USMCA bước vào giai đoạn xói mòn chậm và bất định thường niên, gây rủi ro cho đầu tư và chuỗi cung ứng Bắc Mỹ.","url":"https://www.csis.org/analysis/united-states-has-opted-not-extend-usmca"},{"date":"2026-07-02","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Hợp tác quốc phòng - công nghiệp","outlet":"The Diplomat","author":"","title":"Chiến lược Ấn Độ Dương - Thái Bình Dương của Ý xoay trục sang hợp đồng quốc phòng","summary":"Bài viết chỉ ra Ý đang lặng lẽ tăng cường hiện diện ở khu vực thông qua hợp tác quân sự - công nghiệp thay vì ngoại giao truyền thống. Bộ trưởng Quốc phòng Guido Crosetto dự Đối thoại Shangri-La ở Singapore chỉ là một mảnh của bức tranh lớn: Rome mở rộng hợp tác quốc phòng với Malaysia và Quốc hội duyệt chuyển giao tàu sân bay hết niên hạn Giuseppe Garibaldi cho Indonesia. Khác Pháp, Ý không có hiện diện quân sự thường trực nên ảnh hưởng phụ thuộc vào triển khai hải quân, hợp tác công nghiệp và trao đổi quân sự dài hạn.","takeaway":"Ý tái nhập cuộc chơi Ấn Độ Dương - Thái Bình Dương bằng con đường hợp đồng quốc phòng và công nghiệp, tận dụng nhu cầu hiện đại hóa hải quân của Đông Nam Á.","url":"https://thediplomat.com/2026/07/italys-indo-pacific-strategy-turns-toward-defense-contracts/"},{"date":"2026-07-02","region":"Đông Á","topic":"Nghiên cứu quân sự Trung Quốc","outlet":"War on the Rocks","author":"Lyle Morris","title":"Những điểm mù trong nghiên cứu quân sự Trung Quốc","summary":"Morris lập luận rằng giới phân tích phương Tây bị bó hẹp nghiêm trọng trong việc hiểu chiến lược quân sự Trung Quốc do khó tiếp cận tài liệu học thuyết hiện hành của Quân Giải phóng Nhân dân (PLA) và phải dựa vào các nguồn tham chiếu đã lỗi thời. Sự thiếu hụt thông tin này buộc nhà hoạch định chính sách và người lập kế hoạch tác chiến phải suy đoán và 'soi gương' (mirror-imaging) thay vì dựa trên nguồn chính thống của Trung Quốc.","takeaway":"Nên khôi phục một Dịch vụ Thông tin Phát thanh Nước ngoài (FBIS) công khai, đặt tại Thư viện Quốc hội, để cung cấp bản dịch và phân tích ấn phẩm quân sự Trung Quốc cho giới nghiên cứu.","url":"https://warontherocks.com/the-blind-spots-in-chinese-military-studies/"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chiến dịch Nga tại Ukraine","outlet":"Institute for the Study of War (ISW)","author":"","title":"Đánh giá chiến dịch tấn công của Nga, ngày 2 tháng 7 năm 2026","summary":"ISW ghi nhận Nga tiến hành đợt tập kích quy mô lớn bằng 570 drone và tên lửa vào Kyiv đêm 1-2/7, khiến ít nhất 27 người chết và 91 người bị thương, trong đó phòng không Ukraine đánh chặn khoảng 476 quả. Nga đang triển khai drone động cơ phản lực nhanh hơn và đổi tần số (3.900-4.100 MHz) khiến việc đánh chặn khó hơn nhiều, trong khi trên các mặt trận Kharkiv, Donetsk và Zaporizhia lực lượng Nga tiếp tục tấn công nhưng không tiến được.","takeaway":"Chiến dịch hè-thu 2026 của Nga vẫn bế tắc về lãnh thổ, đổi lại bằng tổn thất lớn và chiến thuật tập kích drone-tên lửa ngày càng gây hại cho dân thường.","url":"https://www.understandingwar.org/backgrounder/russian-offensive-campaign-assessment-july-2-2026"},{"date":"2026-07-02","region":"Châu Âu/NATO","topic":"Chính trị","outlet":"The Nation","author":"Stephen Crowley","title":"Trước thềm thượng đỉnh NATO, châu Âu tái vũ trang chống một 'nước Nga bóng ma'?","summary":"Nhiều nước châu Âu đang tăng chi quân sự mạnh dựa trên giả định Nga có thể tấn công NATO trong vài năm tới, trong khi kinh tế Nga trì trệ vì chiến tranh Ukraine và Điện Kremlin chật vật huy động dân chúng. Tác giả cho rằng thổi phồng mối đe dọa Nga làm chệch nguồn lực khỏi nhu cầu xã hội và khí hậu.","takeaway":"Hiểm họa thực sự với châu Âu đến từ bên trong - khó khăn kinh tế và bất mãn xã hội bị khoét sâu bởi chi tiêu quốc phòng - hơn là từ một cuộc tấn công quân sự của Nga.","url":"https://www.thenation.com/article/world/europe-russia-nato-rearmament-putin-military-spending-far-right-ukraine-war-analysis/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Netanyahu và tình báo Israel","outlet":"War on the Rocks","author":"Ofek Riemer, Ehud Eiran & Daniel F. Wajner","title":"Từ Shin Bet đến Mossad: Netanyahu định hình lại tình báo Israel","summary":"Quan hệ giữa Netanyahu và các cơ quan tình báo Israel đã chuyển từ đối đầu công khai sang hợp tác bề ngoài, nhưng theo các tác giả đây là dấu hiệu xói mòn chuẩn mực dân chủ chứ không phải cải thiện thực chất.","takeaway":"Lãnh đạo dân túy tạo vòng lặp tự củng cố, kiểm soát chính trị tình báo ngày càng sâu, làm suy yếu cả an ninh quốc gia lẫn quản trị dân chủ.","url":"https://warontherocks.com/2026/07/from-shin-bet-to-mossad-netanyahu-reshapes-israeli-intelligence/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Hizballah & Lebanon","outlet":"War on the Rocks","author":"Anthony Elghossain, Grace Wermenbol","title":"Thế lưỡng nan Hizballah: Vì sao cần một cách tiếp cận tích hợp","summary":"Hai tác giả lập luận rằng bản chất lai ghép của Hizballah - vừa là dân quân, đảng chính trị, mạng lưới dịch vụ xã hội, vừa là đường dây buôn lậu - khiến nó không thể bị hóa giải bằng những can thiệp đơn lẻ ở cấp khu vực hay địa phương. Họ cho rằng 'các giải pháp thuần khu vực hoặc thuần nội bộ đều không đủ' và cần chiến lược phối hợp giữa lãnh đạo Lebanon, các bên khu vực và giới chức Mỹ.","takeaway":"Kiềm chế Hizballah hiệu quả đòi hỏi cách tiếp cận tích hợp đồng thời trên các trục chính trị, quân sự, kinh tế và ngoại giao, thay vì các nỗ lực chắp vá.","url":"https://warontherocks.com/the-hizballah-predicament-why-an-integrated-approach-is-necessary/"},{"date":"2026-07-01","region":"Trung Đông","topic":"Chính trị hóa tình báo Israel","outlet":"War on the Rocks","author":"Ofek Riemer, Ehud Eiran, Daniel F. Wajner","title":"Từ Shin Bet đến Mossad: Netanyahu định hình lại tình báo Israel","summary":"Các tác giả phân tích cách quan hệ giữa Netanyahu và các cơ quan tình báo Israel chuyển từ đối đầu công khai sang hợp tác bề ngoài, phản ánh sự củng cố quyền lực chính trị chứ không phải hòa giải thực chất. Những thất bại chính sách - nhất là về Iran - tạo ra vòng luẩn quẩn biến các định chế tình báo thành 'vật tế thần', biện minh cho việc chính trị hóa và làm suy yếu tính độc lập chuyên môn.","takeaway":"Sự xói mòn nguyên tắc statecraft phi đảng phái (mamlachtiut) cho thấy lãnh đạo dân túy dùng thất bại tình báo để hợp thức hóa cải tổ làm tổn hại nền quản trị dân chủ.","url":"https://warontherocks.com/from-shin-bet-to-mossad-netanyahu-reshapes-israeli-intelligence/"},{"date":"2026-06-25","region":"Ấn Độ Dương - Thái Bình Dương","topic":"Đất hiếm & tàu ngầm Mỹ","outlet":"War on the Rocks","author":"Ryan Musto","title":"Lỗ hổng đất hiếm dưới đáy biển của Hải quân Mỹ","summary":"Musto cảnh báo chương trình tàu ngầm lớp Columbia đối mặt lỗ hổng chiến lược nghiêm trọng vì hệ thống động lực, tàng hình và dẫn đường gần như phụ thuộc hoàn toàn vào đất hiếm được tinh luyện tại Trung Quốc - nước kiểm soát khoảng 91% năng lực chế biến đất hiếm toàn cầu. Bắc Kinh đã vũ khí hóa ưu thế này bằng chu kỳ nâng giá rồi bán phá giá để làm phá sản đối thủ phương Tây (như vụ Molycorp sụp đổ năm 2015).","takeaway":"Thay vì bắt chước mô hình nhà nước nắm cổ phần của Bắc Kinh, Mỹ nên tạo tín hiệu cầu bền vững qua các khoản tài trợ DPA Title III, bảo lãnh vay và cam kết bao tiêu nhiều năm của Lầu Năm Góc để dựng chuỗi cung ứng nội địa và đồng minh trước năm 2030.","url":"https://warontherocks.com/cogs-of-war/the-u-s-navys-subsea-rare-earth-vulnerability/"}],"xNews":[{"date":"2026-07-08","handle":"@EU_ISS","na   h+='</div>';
  panel.innerHTML=h;
  document.body.appendChild(fab); document.body.appendChild(panel);
  fab.addEventListener('click',function(e){e.stopPropagation();panel.hidden=!panel.hidden;});
  panel.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return; e.stopPropagation();
    if(b.getAttribute('data-fs')!=null){var v=b.getAttribute('data-fs');applyFs(v);setPref('dt.fs',v);
      var ss=panel.querySelectorAll('.rp-sizes button'); for(var i=0;i<ss.length;i++)ss[i].classList.toggle('on',ss[i]===b);}
    else if(b.getAttribute('data-font')!=null){var s=b.getAttribute('data-font');applyFont(s);setPref('dt.font',s);
      var fs=panel.querySelectorAll('.rp-fonts button'); for(var j=0;j<fs.length;j++)fs[j].classList.toggle('on',fs[j]===b);}
    else if(b.getAttribute('data-theme')!=null){var th=b.getAttribute('data-theme');applyTheme(th);setPref('dt.theme',th);
      var ts=panel.querySelectorAll('.rp-themes button'); for(var t=0;t<ts.length;t++)ts[t].classList.toggle('on',ts[t]===b);}

}

function favList(){try{return JSON.parse(localStorage.getItem('dt.fav')||'[]');}catch(e){return [];}}

var FAV=[],FAVSET={};
function refreshFav(){FAV=favList();FAVSET={};FAV.forEach(function(x){if(x&&x._id)FAVSET[x._id]=1;});}
function isFav(id){return !!FAVSET[id];}
function findItemById(id){
  var src=[['world',DATA.worldNews],['us',DATA.usNews],['analysis',DATA.analyses],['x',DATA.xNews],['drill',drillItems()]];
  for(var i=0;i<src.length;i++){var arr=src[i][1]||[];for(var j=0;j<arr.length;j++){if(idOf(arr[j])===id)return {item:arr[j],kind:src[i][0]};}}
  return null;
}
function toggleFav(id){
  if(!id)return;
  var favs=favList(),i=-1;
  for(var k=0;k<favs.length;k++){if(favs[k]._id===id){i=k;break;}}
  if(i>=0){favs.splice(i,1);}
  else{var f=findItemById(id);if(!f)return;var snap={};for(var p in f.item)snap[p]=f.item[p];snap._id=id;snap._kind=f.kind;favs.unshift(snap);}
  saveFav(favs);refreshFav();
}

  accs.forEach(function(h){chips+='<span class="chip'+(state.xhandle===h?' on':'')+'" data-xhandle="'+esc(h)+'">'+esc(h)+' ('+arr.filter(function(a){return (a.handle||a.name)===h;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){return card(xCardInner(a),idOf(a));}).join(''):'<div class="empty">'+(state.q?'Không có bài khớp tìm kiếm.':'Chưa có bài từ X.')+'</div>';
  return '<div class="note">Bài đăng nổi bật trên <b>X</b> từ các tài khoản theo dõi — <b>nguồn sơ cấp, chưa kiểm chứng</b>, chỉ để tham khảo/nắm bắt nhanh. Bấm để xem bản gốc.</div>'+chips+dateBar(arr,state.xdate,'data-xdate')+'<div class="list">'+cards+'</div>';
}
function dateBar(arr,cur,attr){
  var ds=[];arr.forEach(function(a){if(a.date&&ds.indexOf(a.date)<0)ds.push(a.date);});
  ds.sort();ds.reverse();
  if(ds.length<2)return '';
  var o='<option value="Tất cả"'+(cur==='Tất cả'?' selected':'')+'>Tất cả ngày</option>';
  ds.forEach(function(d){o+='<option value="'+esc(d)+'"'+(cur===d?' selected':'')+'>'+fmtVN(d)+'</option>';});
  return '<div class="filterbar"><span>📅 Lọc ngày</span><select class="dsel" '+attr+'>'+o+'</select></div>';
}
function renderCatNews(arr, note){
  arr=sortD(arr);
  var cats=[];arr.forEach(function(a){if(a.category&&cats.indexOf(a.category)<0)cats.push(a.category);});
  var items=arr.filter(function(a){return (state.wcat==='Tất cả'||a.category===state.wcat)&&(state.wdate==='Tất cả'||a.date===state.wdate)&&matchQ(a);});
  var chips='<div class="chips"><span class="chip'+(state.wcat==='Tất cả'?' on':'')+'" data-wcat="Tất cả">Tất cả ('+arr.length+')</span>';
  cats.forEach(function(c){var m=wmeta(c);chips+='<span class="chip'+(state.wcat===c?' on':'')+'" data-wcat="'+esc(c)+'"><i class="dot" style="background:'+m[1]+'"></i>'+m[0]+' '+esc(c)+' ('+arr.filter(function(a){return a.category===c;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){return card(newsCardInner(a),idOf(a));}).join(''):'<div class="empty">'+(state.q?'Không có tin khớp tìm kiếm.':'Không có tin khớp bộ lọc.')+'</div>';
  return note+searchInfo(items.length)+chips+dateBar(arr,state.wdate,'data-wdate')+'<div class="list">'+cards+'</div>';
}
function searchInfo(n){return state.q?'<div class="searchinfo">Kết quả cho “'+esc(state.q)+'”: <b>'+n+'</b> tin.</div>':'';}
function renderAnalysis(){
  var arr=sortD(DATA.analyses);
  var regs=[];arr.forEach(function(a){if(a.region&&regs.indexOf(a.region)<0)regs.push(a.region);});
  var items=arr.filter(function(a){return (state.areg==='Tất cả'||a.region===state.areg)&&(state.adate==='Tất cả'||a.date===state.adate)&&matchQ(a);});
  var chips='<div class="chips"><span class="chip'+(state.areg==='Tất cả'?' on':'')+'" data-areg="Tất cả">Tất cả ('+arr.length+')</span>';
  regs.forEach(function(r){chips+='<span class="chip'+(state.areg===r?' on':'')+'" data-areg="'+esc(r)+'"><i class="dot" style="background:'+rcolor(r)+'"></i>'+esc(r)+' ('+arr.filter(function(a){return a.region===r;}).length+')</span>';});
  chips+='</div>';
  var cards=items.length?items.map(function(a){return card(analysisCardInner(a),idOf(a));}).join(''):'<div class="empty">'+(state.q?'Không có bài khớp tìm kiếm.':'Không có bài khớp bộ lọc.')+'</div>';
  return '<div class="note">Phân tích, báo cáo chiến lược từ các viện nghiên cứu (think tank) uy tín.</div>'+searchInfo(items.length)+chips+dateBar(arr,state.adate,'data-adate')+'<div class="list">'+cards+'</div>';
}
function renderSaved(){
  var arr=FAV.slice().filter(matchQ);
  arr.sort(function(x,y){return (''+(y.date||'')).localeCompare(''+(x.date||''));});
  if(!FAV.length)return '<div class="note">Bấm ngôi sao ☆ ở mỗi tin để lưu lại đây. Tin đã lưu nằm trên máy này và giữ được cả khi tin gốc đã cũ.</div><div class="empty">Chưa lưu tin nào.</div>';
  var cards=arr.length?arr.map(function(a){return card(a._kind==='x'?xCardInner(a):(a._kind==='analysis'?analysisCardInner(a):(a._kind==='drill'?drillCardInner(a):newsCardInner(a))),idOf(a));}).join(''):'<div class="empty">Không có tin đã lưu khớp tìm kiếm.</div>';
  return '<div class="note">Tin bạn đã lưu (trên máy này) — bấm ★ để bỏ lưu.</div>'+searchInfo(arr.length)+'<div class="list">'+cards+'</div>';
}
function drillCardInner(a){
  return '<div class="crow"><span class="badge" style="color:var(--green)"><i class="dot" style="background:var(--green)"></i>Tin liên quan</span><span class="date">'+fmtVN(a.date)+'</span></div><div class="title">'+newBadge(idOf(a))+esc(a.title)+'</div>'+(a.summary?'<div class="sum">'+esc(a.summary)+'</div>':'')+(a.relate?'<div class="relate"><b>Liên quan tập trận:</b> '+esc(a.relate)+'</div>':'')+'<div class="foot"><span class="meta">'+esc(a.sourceName||'')+'</span>'+srcLink(a)+actions(a)+'</div>';
}
function drillHeader(ex){
  var pill=ex.status==='ongoing'?'<span class="dpill live">● Đang diễn ra</span>':'<span class="dpill up">◷ Sắp diễn ra</span>';
  return '<div class="drill-h"><div class="drill-top">'+pill+(ex.dates?'<span class="drill-dates">'+esc(ex.dates)+'</span>':'')+'</div><div class="drill-name">'+esc(ex.name)+'</div>'+(ex.location?'<div class="drill-meta">📍 '+esc(ex.location)+'</div>':'')+(ex.scale?'<div class="drill-meta">🎖️ '+esc(ex.scale)+'</div>':'')+(ex.summary?'<div class="drill-sum">'+esc(ex.summary)+'</div>':'')+'</div>';
}
function renderExercises(){
  var exs=((DATA.exercises&&DATA.exercises.length)?DATA.exercises:EXERCISES).slice();
  var ord={ongoing:0,upcoming:1};
  exs.sort(function(a,b){return (ord[a.status]==null?9:ord[a.status])-(ord[b.status]==null?9:ord[b.status]);});
  var live=exs.filter(function(e){return e.status==='ongoing';}).length;
  var up=exs.filter(function(e){return e.status==='upcoming';}).length;
  var chips='<div class="chips"><span class="chip'+(state.drill==='Tất cả'?' on':'')+'" data-drill="Tất cả">Tất cả ('+exs.length+')</span>';
  exs.forEach(function(e){var on=e.status==='ongoing';chips+='<span class="chip'+(state.drill===e.name?' on':'')+'" data-drill="'+esc(e.name)+'"><i class="dot" style="background:'+(on?'#c0392b':'#2b5f9e')+'"></i>'+esc(e.name.split('(')[0].trim())+'</span>';});
  chips+='</div>';
  var shown=exs.filter(function(e){return state.drill==='Tất cả'||e.name===state.drill;});
  var body=shown.length?shown.map(function(ex){
    var items=sortD(ex.items||[]).filter(matchQ);
    var cards=items.length?items.map(function(a){return card(drillCardInner(a),idOf(a));}).join(''):'<div class="empty" style="padding:16px">'+(state.q?'Không có tin khớp tìm kiếm.':'Chưa có tin liên quan.')+'</div>';
    return '<section class="drill">'+drillHeader(ex)+'<div class="list">'+cards+'</div></section>';
  }).join(''):'<div class="empty">Chưa có cuộc tập trận nào.</div>';
  return '<div class="note">Các cuộc tập trận quân sự <b>đang & sắp diễn ra</b> — mỗi mục gom tin liên quan kèm <b>nhận xét</b> tin đó liên quan tới cuộc tập trận thế nào. <b>'+live+'</b> đang diễn ra · <b>'+up+'</b> sắp diễn ra.</div>'+chips+body;
}
function content(){
  if(state.tab==='us')return renderCatNews(DATA.usNews,'<div class="note">Tin <b>yếu tố Mỹ</b> nổi bật trong <b>24 giờ qua</b> (giờ Mỹ) — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
  if(state.tab==='x')return renderX();
  if(state.tab==='analysis')return renderAnalysis();
  if(state.tab==='drills')return renderExercises();
  if(state.tab==='saved')return renderSaved();
  return renderCatNews(DATA.worldNews,'<div class="note">Tin <b>thế giới</b> nổi bật trong <b>24 giờ qua</b> — kinh tế · chính trị · ngoại giao · công nghệ quân sự — tổng hợp từ các báo lớn.</div>');
}
function render(){
  refreshFav();
  var stamp=fmtVN(DATA.worldGeneratedAt||DATA.generatedAt);
  var tabs=[['world','🌍 Thế giới'],['us',USFLAG+'Mỹ'],['x',XLOGO+'X'],['drills','🎯 Tập trận'],['analysis','🧠 Phân tích'],['saved','⭐ Đã lưu'+(FAV.length?' ('+FAV.length+')':'')]];
  var h='<div class="wrap">';
  h+='<div class="mast"><div class="kicker">Bản tin độc lập</div><h1>'+esc(DATA.brand)+'</h1><div class="tag">'+esc(DATA.tagline)+'</div></div>';
  h+='<div class="dateline"><span>Cập nhật '+stamp+'</span><span>Tổng hợp từ nguồn mở</span></div>';
  h+='<nav class="tabs">'+tabs.map(function(x){return '<button class="tb'+(state.tab===x[0]?' on':'')+'" data-tab="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</nav>';
  h+='<div class="toolbar"><div class="search"><span aria-hidden="true">🔍</span><input id="q" type="search" autocomplete="off" placeholder="Tìm trong bản tin…" value="'+esc(state.q)+'">'+(state.q?'<button class="sx" data-sx="1" title="Xoá tìm kiếm">✕</button>':'')+'</div></div>';
  h+='<div id="content">'+content()+'</div>';
  h+='<div class="pgfoot">'+esc(DATA.brand)+' — bản tin tham khảo, tổng hợp từ nguồn mở, cập nhật tự động hằng ngày.<br>Mỗi tin đều dẫn liên kết nguồn gốc. Không đại diện quan điểm của bất kỳ tổ chức nào.</div>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  if(window.scrollTo)window.scrollTo(0,0);
}
function reContent(){var c=document.getElementById('content');if(c)c.innerHTML=content();}
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-tab],[data-wcat],[data-areg],[data-xhandle],[data-drill],[data-fav],[data-share],[data-tg],[data-sx],[data-mark]'):null;if(!t)return;
  if(t.getAttribute('data-share')!=null){doShare(t.getAttribute('data-url'),t.getAttribute('data-title'));return;}
  if(t.getAttribute('data-tg')!=null){tgShare(t.getAttribute('data-url'),t.getAttribute('data-title'));return;}
  if(t.getAttribute('data-mark')!=null){markRead(t.getAttribute('data-mark'));setTimeout(reContent,250);return;}
  if(t.getAttribute('data-sx')!=null){state.q='';render();return;}
  if(t.getAttribute('data-fav')!=null){toggleFav(t.getAttribute('data-fav'));render();return;}
  if(t.getAttribute('data-tab')){state.tab=t.getAttribute('data-tab');state.wcat='Tất cả';state.wdate='Tất cả';state.xhandle='Tất cả';state.xdate='Tất cả';state.drill='Tất cả';}
  else if(t.getAttribute('data-wcat'))state.wcat=t.getAttribute('data-wcat');
  else if(t.getAttribute('data-areg'))state.areg=t.getAttribute('data-areg');
  else if(t.getAttribute('data-xhandle'))state.xhandle=t.getAttribute('data-xhandle');
  else if(t.getAttribute('data-drill')!=null)state.drill=t.getAttribute('data-drill');
  render();
});
document.addEventListener('input',function(e){
  if(e.target&&e.target.id==='q'){var had=!!state.q;state.q=e.target.value;if((!had)!==(!state.q)){render();var el=document.getElementById('q');if(el){el.focus();var v=el.value;el.value='';el.value=v;}}else{reContent();}}
});
document.addEventListener('change',function(e){
  var s=e.target;if(!s||!s.getAttribute)return;
  if(s.getAttribute('data-wdate')!=null){state.wdate=s.value;render();}
  else if(s.getAttribute('data-adate')!=null){state.adate=s.value;render();}
  else if(s.getAttribute('data-xdate')!=null){state.xdate=s.value;render();}
});
refreshRead();
var _firstRun=false;try{_firstRun=localStorage.getItem('dt.seen')==null;}catch(e){}
initSeen();commitSeen();if(_firstRun)initSeen();
applyTheme(curTheme());
ensureReaderUI();
render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
