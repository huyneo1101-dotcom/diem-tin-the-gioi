.prog{position:sticky;top:0;background:var(--bg);padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--muted);z-index:5}

.badge{display:inline-block;font-size:11.5px;font-weight:700;color:var(--accent);background:#12203a;border-radius:20px;padding:2px 9px;margin:0 0 7px}

.src{color:var(--muted2);font-size:12.5px;margin:0 0 10px}
.vote{display:flex;gap:9px}
.vb{flex:1;border:1px solid var(--line);background:var(--paper2);color:var(--muted);border-radius:9px;padding:9px 0;font-size:17px;font-weight:700;transition:all .12s}
.vb.up.on{background:rgba(46,199,122,.16);border-color:var(--green);color:var(--green)}
.vb.down.on{background:rgba(255,93,93,.14);border-color:var(--red);color:var(--red)}
.vb:active{transform:scale(.96)}
.msg{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#2a313b;color:#fff;padding:9px 15px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:20}
.msg.on{opacity:1}
.done{color:var(--green);font-weight:700}
</style>

{c:"Ngoại giao",r:"Đông Á",s:"ASEAN",t:"ASEAN và Trung Quốc thông qua khung Bộ Quy tắc Ứng xử ở Biển Đông sau nhiều năm đàm phán",u:"Văn kiện đặt nền cho quản lý tranh chấp, dù tính ràng buộc pháp lý vẫn còn bỏ ngỏ."},
{c:"Ngoại giao",r:"Nam Á",s:"Bộ Ngoại giao Mỹ",t:"Mỹ và Ấn Độ ký thỏa thuận khung hợp tác công nghệ quốc phòng, bán dẫn và không gian",u:"Sáng kiến iCET được thể chế hóa nhằm tăng chuỗi cung ứng công nghệ then chốt giữa hai nước."},
{c:"Ngoại giao",r:"Châu Âu/NATO",s:"NATO",t:"Hàn Quốc ký chương trình đối tác cá thể hóa mở rộng hợp tác an ninh với NATO",u:"Hợp tác gồm chia sẻ tình báo, an ninh mạng và phối hợp về công nghiệp quốc phòng."},
{c:"Kinh tế",r:"Toàn cầu",s:"World Bank",t:"Ngân hàng Thế giới cảnh báo gánh nặng nợ của các nước đang phát triển đạt mức cao kỷ lục",u:"Chi phí trả nợ tăng vọt bào mòn ngân sách y tế, giáo dục ở nhiều nền kinh tế thu nhập thấp."},
{c:"Chính trị",r:"Châu Mỹ",s:"Reuters",t:"Quốc hội Mỹ thông qua luật cải cách quy trình chứng nhận kết quả bầu cử tổng thống",u:"Đạo luật thu hẹp khoảng trống pháp lý nhằm ngăn tranh cãi khi kiểm phiếu đại cử tri."}
];

function toast(m){var e=document.getElementById('msg');e.textContent=m;e.className='msg on';clearTimeout(e._t);e._t=setTimeout(function(){e.className='msg';},1600);}
function regionOf(it){return it.r||'';}
function idOf(i){return 'calib:'+String(i+1).padStart(3,'0');}

function loadSB(cb){
  if(window.supabase&&window.supabase.createClient)return cb();
  var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  s.onload=cb;s.onerror=function(){document.getElementById('acct').innerHTML='<div style="color:var(--red)">Không tải được thư viện Supabase (mạng?). Thử lại sau.</div>';};
  document.head.appendChild(s);
}
function init(){
  renderList();      // luôn hiển thị 100 tin, không phụ thuộc Supabase
  renderAcct();      // hiện form đăng nhập (nút sẽ chờ Supabase tải xong)
  loadSB(function(){
    try{SB=window.supabase.createClient(SB_URL,SB_ANON,{auth:{persistSession:true,autoRefreshToken:true}});}catch(e){}
    if(!SB){renderAcct();return;}
    SB.auth.getSession().then(function(r){onAuth(r&&r.data?r.data.session:null);});
    SB.auth.onAuthStateChange(function(_e,se){onAuth(se);});
  });
}
function onAuth(se){USER=se&&se.user?se.user:null;renderAcct();if(USER)pullVotes();renderList();}
function renderAcct(){
  var el=document.getElementById('acct');
  if(USER){el.innerHTML='<div class="who">👤 <b>'+esc(USER.email||'Đã đăng nhập')+'</b> — vote đang lưu vào tài khoản. <button class="pbtn" style="flex:0;padding:6px 12px" onclick="doOut()">Đăng xuất</button></div>';return;}
  el.innerHTML='<div style="font-size:13.5px;color:var(--muted);margin:0 0 8px">🔒 Đăng nhập bằng tài khoản trang bản tin để vote được lưu và đưa vào phân tích.</div>'+
    '<input id="em" type="email" placeholder="Email" autocomplete="email">'+
    '<input id="pw" type="password" placeholder="Mật khẩu" autocomplete="current-password">'+
    '<div class="btns"><button class="pbtn" onclick="doIn()">Đăng nhập</button><button class="pbtn" onclick="doUp()">Tạo tài khoản</button></div>';
}
function cred(){var e=(document.getElementById('em')||{}).value||'',p=(document.getElementById('pw')||{}).value||'';
  if(!e||e.indexOf('@')<0){toast('Nhập email hợp lệ');return null;}if(p.length<6){toast('Mật khẩu ≥ 6 ký tự');return null;}return {email:e.trim(),password:p};}
function doIn(){var c=cred();if(!c||!SB)return;SB.auth.signInWithPassword(c).then(function(r){toast(r&&r.error?('Lỗi: '+r.error.message):'Đã đăng nhập');});}
function doUp(){var c=cred();if(!c||!SB)return;SB.auth.signUp(c).then(function(r){toast(r&&r.error?('Lỗi: '+r.error.message):'Đã tạo tài khoản');});}
function doOut(){if(SB)SB.auth.signOut().then(function(){USER=null;renderAcct();renderList();});}
function pullVotes(){
  if(!SB||!USER)return;
  SB.from('votes').select('item_id,v').like('item_id','calib:%').then(function(r){
    if(r&&r.data){r.data.forEach(function(row){VOTES[row.item_id]=row.v;});renderList();}
  });
}
function castVote(i,val){
  var id=idOf(i),it=ITEMS[i];
  if(!SB||!USER){toast('Hãy đăng nhập trước khi vote');return;}
  var cur=VOTES[id]||0;
  if(cur===val){delete VOTES[id];SB.from('votes').delete().eq('user_id',USER.id).eq('item_id',id).then(function(){});}
  else{VOTES[id]=val;SB.from('votes').upsert([{user_id:USER.id,item_id:id,v:val,category:it.c,region:it.r,source:it.s,title:it.t,updated_at:new Date().toISOString()}],{onConflict:'user_id,item_id'}).then(function(r){if(r&&r.error)toast('Lỗi lưu: '+r.error.message);});}
  renderProg();paintCard(i);
}
function esc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function paintCard(i){
  var id=idOf(i),v=VOTES[id]||0;
  var up=document.getElementById('up'+i),dn=document.getElementById('dn'+i);
  if(up)up.className='vb up'+(v===1?' on':'');
  if(dn)dn.className='vb down'+(v===-1?' on':'');
}
function renderProg(){
  var n=0;for(var k in VOTES){if(('' +k).indexOf('calib:')===0&&VOTES[k])n++;}
  var el=document.getElementById('prog');
  el.innerHTML=n>=ITEMS.length?'<span class="done">✓ Đã chấm đủ '+ITEMS.length+'/'+ITEMS.length+' tin — cảm ơn!</span>':('Đã chấm <b>'+n+'</b>/'+ITEMS.length+' tin'+(USER?'':' — <b>hãy đăng nhập</b> để lưu'));
}
function renderList(){
  var h='';
  for(var i=0;i<ITEMS.length;i++){var it=ITEMS[i],id=idOf(i),v=VOTES[id]||0;
    h+='<div class="card"><span class="badge">'+esc(it.c)+' · '+esc(it.r)+'</span>'+
       '<div class="title">'+(i+1)+'. '+esc(it.t)+'</div>'+
       '<div class="summary">'+esc(it.u)+'</div>'+
       '<div class="src">Nguồn (mẫu): '+esc(it.s)+'</div>'+
       '<div class="vote"><button id="up'+i+'" class="vb up'+(v===1?' on':'')+'" onclick="castVote('+i+',1)">👍 Thích</button>'+
       '<button id="dn'+i+'" class="vb down'+(v===-1?' on':'')+'" onclick="castVote('+i+',-1)">👎 Không</button></div></div>';
  }
  document.getElementById('list').innerHTML=h;renderProg();
}
init();
</script>
</body>
</html>
